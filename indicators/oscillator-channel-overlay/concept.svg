    <line x1="300" y1="60" x2="300" y2="420"/><line x1="400" y1="60" x2="400" y2="420"/>
    <line x1="500" y1="60" x2="500" y2="420"/><line x1="600" y1="60" x2="600" y2="420"/>
    <line x1="700" y1="60" x2="700" y2="420"/>
    <line x1="60" y1="100" x2="750" y2="100"/><line x1="60" y1="160" x2="750" y2="160"/>
    <line x1="60" y1="220" x2="750" y2="220"/><line x1="60" y1="280" x2="750" y2="280"/>
    <line x1="60" y1="340" x2="750" y2="340"/><line x1="60" y1="400" x2="750" y2="400"/>
