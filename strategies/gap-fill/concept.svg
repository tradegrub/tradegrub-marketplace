<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="gapFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9800" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff9800" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Gap Fill Reversion Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- LEFT: Gap Up scenario -->
  <text x="200" y="75" text-anchor="middle" fill="#ef5350" font-size="12" font-weight="600">Gap Up (Fade Short)</text>

  <!-- Prior day candles -->
  <line x1="90" y1="238" x2="90" y2="280" stroke="#26a69a" stroke-width="1"/>
  <rect x="86" y="245" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="120" y1="230" x2="120" y2="270" stroke="#26a69a" stroke-width="1"/>
  <rect x="116" y="235" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="150" y1="225" x2="150" y2="260" stroke="#ef5350" stroke-width="1"/>
  <rect x="146" y="228" width="8" height="22" fill="#ef5350" rx="1"/>
  <!-- Last candle before gap - close at 225 -->
  <line x1="180" y1="218" x2="180" y2="255" stroke="#26a69a" stroke-width="1"/>
  <rect x="176" y="225" width="8" height="20" fill="#26a69a" rx="1"/>

  <!-- Prior close line -->
  <line x1="180" y1="225" x2="370" y2="225" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="372" y="229" fill="#ff9800" font-size="9">Prior Close (Target)</text>

  <!-- GAP zone -->
  <rect x="195" y="155" width="30" height="70" fill="url(#gapFill)" rx="2"/>
  <text x="210" y="195" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="500" transform="rotate(-90,210,195)">GAP</text>

  <!-- Session divider -->
  <line x1="195" y1="70" x2="195" y2="340" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="2,4"/>
  <text x="185" y="348" fill="#666" font-size="7">Close</text>
  <text x="210" y="348" fill="#666" font-size="7">Open</text>

  <!-- Gap up open candle -->
  <line x1="220" y1="135" x2="220" y2="175" stroke="#26a69a" stroke-width="1.5"/>
  <rect x="214" y="142" width="12" height="25" fill="#26a69a" rx="1"/>

  <!-- SHORT entry signal -->
  <g filter="url(#softGlow)">
    <polygon points="220,130 230,130 225,118" fill="#ef5350" transform="rotate(180,225,124)"/>
  </g>
  <rect x="235" y="128" width="85" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="277" y="141" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SHORT (Fade)</text>

  <!-- Filling candles -->
  <line x1="250" y1="148" x2="250" y2="182" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="155" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="280" y1="168" x2="280" y2="202" stroke="#ef5350" stroke-width="1"/>
  <rect x="276" y="172" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="310" y1="188" x2="310" y2="225" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="195" width="8" height="22" fill="#ef5350" rx="1"/>
  <!-- Gap filled -->
  <line x1="340" y1="215" x2="340" y2="248" stroke="#00e676" stroke-width="1.5"/>
  <rect x="334" y="218" width="12" height="22" fill="#00e676" rx="1" filter="url(#glow)"/>
  <text x="355" y="240" fill="#00e676" font-size="9" font-weight="500">Gap Filled!</text>

  <!-- Stop loss above -->
  <line x1="220" y1="110" x2="370" y2="110" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="372" y="114" fill="#ef5350" font-size="9">Stop (ATR)</text>

  <!-- DIVIDER -->
  <line x1="400" y1="70" x2="400" y2="420" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- RIGHT: Gap Down scenario -->
  <text x="600" y="75" text-anchor="middle" fill="#00e676" font-size="12" font-weight="600">Gap Down (Fade Long)</text>

  <!-- Prior day candles -->
  <line x1="470" y1="148" x2="470" y2="188" stroke="#ef5350" stroke-width="1"/>
  <rect x="466" y="155" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="500" y1="155" x2="500" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="496" y="162" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="530" y1="148" x2="530" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="526" y="155" width="8" height="20" fill="#26a69a" rx="1"/>
  <!-- Last candle - close at 165 -->
  <line x1="560" y1="152" x2="560" y2="188" stroke="#ef5350" stroke-width="1"/>
  <rect x="556" y="158" width="8" height="20" fill="#ef5350" rx="1"/>

  <!-- Prior close line -->
  <line x1="560" y1="165" x2="740" y2="165" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="742" y="169" fill="#ff9800" font-size="9">Target</text>

  <!-- Session divider -->
  <line x1="575" y1="70" x2="575" y2="340" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="2,4"/>

  <!-- GAP zone -->
  <rect x="575" y="178" width="30" height="70" fill="url(#gapFill)" rx="2"/>
  <text x="590" y="218" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="500" transform="rotate(-90,590,218)">GAP</text>

  <!-- Gap down open candle -->
  <line x1="600" y1="235" x2="600" y2="275" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="594" y="242" width="12" height="25" fill="#ef5350" rx="1"/>

  <!-- BUY signal -->
  <g filter="url(#softGlow)">
    <polygon points="600,280 610,280 605,292" fill="#00e676" transform="rotate(180,605,286)"/>
  </g>
  <rect x="612" y="270" width="75" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="650" y="283" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY (Fade)</text>

  <!-- Recovery candles filling gap -->
  <line x1="630" y1="228" x2="630" y2="262" stroke="#26a69a" stroke-width="1"/>
  <rect x="626" y="232" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="660" y1="210" x2="660" y2="245" stroke="#26a69a" stroke-width="1"/>
  <rect x="656" y="215" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="690" y1="188" x2="690" y2="222" stroke="#26a69a" stroke-width="1"/>
  <rect x="686" y="195" width="8" height="18" fill="#26a69a" rx="1"/>
  <!-- Filled -->
  <line x1="720" y1="158" x2="720" y2="195" stroke="#00e676" stroke-width="1.5"/>
  <rect x="714" y="162" width="12" height="25" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- Stop below -->
  <line x1="600" y1="300" x2="740" y2="300" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="742" y="304" fill="#ef5350" font-size="9">Stop (ATR)</text>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="86" y="395" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="116" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="146" y="400" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="176" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="214" y="388" width="12" height="24" fill="#26a69a" rx="1"/>
    <rect x="246" y="395" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="276" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="306" y="400" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="334" y="402" width="12" height="10" fill="#00e676" rx="1"/>
  </g>
  <g opacity="0.5">
    <rect x="466" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="496" y="400" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="526" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="556" y="395" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="594" y="385" width="12" height="27" fill="#ef5350" rx="1"/>
    <rect x="626" y="393" width="8" height="19" fill="#26a69a" rx="1"/>
    <rect x="656" y="395" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="686" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="714" y="400" width="12" height="12" fill="#00e676" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">Gap Zone</text>
    <circle cx="110" cy="20" r="4" fill="#00e676"/>
    <text x="120" y="24" fill="#999" font-size="9">Gap Filled / Buy</text>
    <circle cx="240" cy="20" r="4" fill="#ef5350"/>
    <text x="250" y="24" fill="#999" font-size="9">Fade Short / Stop</text>
    <circle cx="380" cy="20" r="4" fill="#42a5f5"/>
    <text x="390" y="24" fill="#999" font-size="9">Prior Close (Target)</text>
    <rect x="530" y="14" width="20" height="12" fill="#ff9800" opacity="0.3" rx="2"/>
    <text x="555" y="24" fill="#999" font-size="9">Gap Fill Area</text>
  </g>
</svg>