<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Overnight Gap Analyzer</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>
  <!-- Upper panel: price with gaps -->
  <line x1="60" y1="70" x2="60" y2="240" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="240" x2="760" y2="240" stroke="#333" stroke-width="1"/>
  <text x="55" y="85" text-anchor="end" fill="#666" font-family="Inter,sans-serif" font-size="9">Price</text>
  <!-- Candlesticks with gaps -->
  <rect x="100" y="140" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="130" y="130" width="8" height="25" fill="#4CAF50" rx="1"/>
  <!-- Gap up -->
  <rect x="155" y="105" width="30" height="15" fill="rgba(76,175,80,0.15)" stroke="rgba(76,175,80,0.3)" stroke-dasharray="2,2" rx="1"/>
  <text x="170" y="115" text-anchor="middle" fill="#4CAF50" font-family="Inter,sans-serif" font-size="7">G+</text>
  <rect x="160" y="90" width="8" height="25" fill="#4CAF50" rx="1"/>
  <rect x="190" y="95" width="8" height="30" fill="#ef5350" rx="1"/>
  <rect x="220" y="110" width="8" height="25" fill="#ef5350" rx="1"/>
  <rect x="250" y="120" width="8" height="30" fill="#ef5350" rx="1"/>
  <!-- Gap down -->
  <rect x="275" y="145" width="30" height="15" fill="rgba(239,83,80,0.15)" stroke="rgba(239,83,80,0.3)" stroke-dasharray="2,2" rx="1"/>
  <text x="290" y="155" text-anchor="middle" fill="#ef5350" font-family="Inter,sans-serif" font-size="7">G-</text>
  <rect x="280" y="155" width="8" height="25" fill="#ef5350" rx="1"/>
  <rect x="310" y="160" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="340" y="150" width="8" height="25" fill="#4CAF50" rx="1"/>
  <rect x="370" y="140" width="8" height="30" fill="#4CAF50" rx="1"/>
  <!-- Another gap up -->
  <rect x="395" y="110" width="30" height="15" fill="rgba(76,175,80,0.15)" stroke="rgba(76,175,80,0.3)" stroke-dasharray="2,2" rx="1"/>
  <rect x="400" y="95" width="8" height="25" fill="#4CAF50" rx="1"/>
  <rect x="430" y="100" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="460" y="90" width="8" height="25" fill="#4CAF50" rx="1"/>
  <rect x="490" y="100" width="8" height="30" fill="#ef5350" rx="1"/>
  <!-- Gap down -->
  <rect x="515" y="125" width="30" height="15" fill="rgba(239,83,80,0.15)" stroke="rgba(239,83,80,0.3)" stroke-dasharray="2,2" rx="1"/>
  <rect x="520" y="135" width="8" height="30" fill="#ef5350" rx="1"/>
  <rect x="550" y="145" width="8" height="25" fill="#ef5350" rx="1"/>
  <rect x="580" y="130" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="610" y="120" width="8" height="25" fill="#4CAF50" rx="1"/>
  <!-- Lower panel: gap stats -->
  <line x1="60" y1="260" x2="60" y2="420" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="420" x2="760" y2="420" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="340" x2="760" y2="340" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="55" y="275" text-anchor="end" fill="#666" font-family="Inter,sans-serif" font-size="9">Gap %</text>
  <!-- Gap percentage bars -->
  <rect x="158" y="300" width="12" height="40" fill="rgba(76,175,80,0.5)" rx="1"/>
  <rect x="278" y="340" width="12" height="35" fill="rgba(239,83,80,0.5)" rx="1"/>
  <rect x="398" y="295" width="12" height="45" fill="rgba(76,175,80,0.5)" rx="1"/>
  <rect x="518" y="340" width="12" height="40" fill="rgba(239,83,80,0.5)" rx="1"/>
  <!-- Fill rate line -->
  <polyline points="100,380 170,370 280,365 400,360 520,370 620,375 700,372" fill="none" stroke="#42A5F5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="710" y="370" fill="#42A5F5" font-family="Inter,sans-serif" font-size="9">Fill Rate</text>
  <!-- Legend -->
  <rect x="130" y="450" width="540" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
  <rect x="160" y="460" width="10" height="10" fill="rgba(76,175,80,0.5)" rx="1"/>
  <text x="176" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Gap Up</text>
  <rect x="240" y="460" width="10" height="10" fill="rgba(239,83,80,0.5)" rx="1"/>
  <text x="256" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Gap Down</text>
  <line x1="340" y1="465" x2="360" y2="465" stroke="#42A5F5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="366" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Fill Rate</text>
  <line x1="450" y1="465" x2="470" y2="465" stroke="#FFA726" stroke-width="1"/>
  <text x="476" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Avg Gap</text>
  <line x1="550" y1="465" x2="570" y2="465" stroke="#AB47BC" stroke-width="2"/>
  <text x="576" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Gap %</text>
</svg>