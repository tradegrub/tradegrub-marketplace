<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Day of Week Seasonality</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>
  <line x1="80" y1="70" x2="80" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="400" x2="740" y2="400" stroke="#333" stroke-width="1"/>
  <!-- Zero line -->
  <line x1="80" y1="230" x2="740" y2="230" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="745" y="234" fill="#666" font-family="Inter,sans-serif" font-size="9">0%</text>
  <!-- Day bars - average return -->
  <rect x="120" y="160" width="80" height="70" fill="rgba(76,175,80,0.4)" rx="3"/>
  <text x="160" y="155" text-anchor="middle" fill="#4CAF50" font-family="Inter,sans-serif" font-size="11">+0.12%</text>
  <rect x="240" y="200" width="80" height="30" fill="rgba(76,175,80,0.3)" rx="3"/>
  <text x="280" y="195" text-anchor="middle" fill="#4CAF50" font-family="Inter,sans-serif" font-size="11">+0.04%</text>
  <rect x="360" y="230" width="80" height="50" fill="rgba(239,83,80,0.3)" rx="3"/>
  <text x="400" y="290" text-anchor="middle" fill="#ef5350" font-family="Inter,sans-serif" font-size="11">-0.06%</text>
  <rect x="480" y="230" width="80" height="70" fill="rgba(239,83,80,0.4)" rx="3"/>
  <text x="520" y="310" text-anchor="middle" fill="#ef5350" font-family="Inter,sans-serif" font-size="11">-0.10%</text>
  <rect x="600" y="180" width="80" height="50" fill="rgba(76,175,80,0.35)" rx="3"/>
  <text x="640" y="175" text-anchor="middle" fill="#4CAF50" font-family="Inter,sans-serif" font-size="11">+0.08%</text>
  <!-- Day labels -->
  <text x="160" y="390" text-anchor="middle" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Mon</text>
  <text x="280" y="390" text-anchor="middle" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Tue</text>
  <text x="400" y="390" text-anchor="middle" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Wed</text>
  <text x="520" y="390" text-anchor="middle" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Thu</text>
  <text x="640" y="390" text-anchor="middle" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Fri</text>
  <!-- Win rate markers -->
  <circle cx="160" cy="340" r="4" fill="#FFA726"/>
  <text x="160" y="358" text-anchor="middle" fill="#FFA726" font-family="Inter,sans-serif" font-size="9">62%</text>
  <circle cx="280" cy="348" r="4" fill="#FFA726"/>
  <text x="280" y="366" text-anchor="middle" fill="#FFA726" font-family="Inter,sans-serif" font-size="9">54%</text>
  <circle cx="400" cy="352" r="4" fill="#FFA726"/>
  <text x="400" y="370" text-anchor="middle" fill="#FFA726" font-family="Inter,sans-serif" font-size="9">44%</text>
  <circle cx="520" cy="356" r="4" fill="#FFA726"/>
  <text x="520" y="374" text-anchor="middle" fill="#FFA726" font-family="Inter,sans-serif" font-size="9">38%</text>
  <circle cx="640" cy="345" r="4" fill="#FFA726"/>
  <text x="640" y="363" text-anchor="middle" fill="#FFA726" font-family="Inter,sans-serif" font-size="9">58%</text>
  <!-- Legend -->
  <rect x="170" y="450" width="460" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
  <rect x="200" y="460" width="12" height="10" fill="rgba(76,175,80,0.4)" rx="1"/>
  <text x="218" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bullish Avg</text>
  <rect x="310" y="460" width="12" height="10" fill="rgba(239,83,80,0.4)" rx="1"/>
  <text x="328" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bearish Avg</text>
  <circle cx="430" cy="465" r="3" fill="#FFA726"/>
  <text x="440" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Win Rate</text>
</svg>