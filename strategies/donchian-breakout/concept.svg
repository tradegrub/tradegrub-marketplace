<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="donchFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Donchian Channel Breakout (Turtle)</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Donchian channel fill -->
  <polygon points="80,160 180,160 280,155 380,148 430,148 430,148 480,120 530,108 580,100 630,95 680,92 720,88 720,305 680,302 630,308 580,310 530,312 480,312 430,310 380,308 280,310 180,308 80,305" fill="url(#donchFill)"/>

  <!-- Upper channel (highest high) - staircase -->
  <polyline points="80,160 180,160 280,155 380,148 430,148 480,120 530,108 580,100 630,95 680,92 720,88" fill="none" stroke="#26a69a" stroke-width="2" opacity="0.7"/>
  <text x="725" y="92" fill="#26a69a" font-size="9">High (20)</text>

  <!-- Lower channel (lowest low) - staircase -->
  <polyline points="80,305 180,308 280,310 380,308 430,310 480,312 530,312 580,310 630,308 680,302 720,305" fill="none" stroke="#ef5350" stroke-width="2" opacity="0.7"/>
  <text x="725" y="309" fill="#ef5350" font-size="9">Low (10 exit)</text>

  <!-- Middle line -->
  <polyline points="80,232 180,234 280,232 380,228 430,229 480,216 530,210 580,205 630,201 680,197 720,196" fill="none" stroke="#42a5f5" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Candles inside channel -->
  <line x1="100" y1="195" x2="100" y2="270" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="215" width="8" height="40" fill="#26a69a" rx="1"/>
  <line x1="130" y1="210" x2="130" y2="280" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="218" width="8" height="45" fill="#ef5350" rx="1"/>
  <line x1="160" y1="200" x2="160" y2="275" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="225" width="8" height="35" fill="#26a69a" rx="1"/>
  <line x1="190" y1="190" x2="190" y2="265" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="210" width="8" height="38" fill="#26a69a" rx="1"/>
  <line x1="220" y1="185" x2="220" y2="268" stroke="#ef5350" stroke-width="1"/>
  <rect x="216" y="195" width="8" height="55" fill="#ef5350" rx="1"/>
  <line x1="250" y1="192" x2="250" y2="272" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="218" width="8" height="38" fill="#26a69a" rx="1"/>
  <line x1="280" y1="188" x2="280" y2="270" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="208" width="8" height="45" fill="#26a69a" rx="1"/>
  <line x1="310" y1="180" x2="310" y2="265" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="190" width="8" height="55" fill="#ef5350" rx="1"/>
  <line x1="340" y1="175" x2="340" y2="260" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="195" width="8" height="48" fill="#26a69a" rx="1"/>
  <line x1="370" y1="170" x2="370" y2="255" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="188" width="8" height="50" fill="#26a69a" rx="1"/>
  <line x1="400" y1="168" x2="400" y2="258" stroke="#ef5350" stroke-width="1"/>
  <rect x="396" y="178" width="8" height="58" fill="#ef5350" rx="1"/>
  <line x1="430" y1="165" x2="430" y2="252" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="180" width="8" height="52" fill="#26a69a" rx="1"/>

  <!-- BREAKOUT candle above upper channel -->
  <line x1="465" y1="100" x2="465" y2="175" stroke="#00e676" stroke-width="1.5"/>
  <rect x="459" y="108" width="12" height="55" fill="#00e676" rx="1" filter="url(#glow)"/>

  <g filter="url(#softGlow)">
    <polygon points="465,95 475,95 470,82" fill="#00e676"/>
  </g>
  <rect x="480" y="75" width="155" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="557" y="89" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">LONG: New 20-bar High</text>

  <!-- Post-breakout trend -->
  <line x1="500" y1="90" x2="500" y2="155" stroke="#26a69a" stroke-width="1"/>
  <rect x="496" y="100" width="8" height="42" fill="#26a69a" rx="1"/>
  <line x1="530" y1="82" x2="530" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="526" y="92" width="8" height="42" fill="#26a69a" rx="1"/>
  <line x1="560" y1="75" x2="560" y2="140" stroke="#ef5350" stroke-width="1"/>
  <rect x="556" y="82" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="590" y1="72" x2="590" y2="135" stroke="#26a69a" stroke-width="1"/>
  <rect x="586" y="80" width="8" height="42" fill="#26a69a" rx="1"/>
  <line x1="620" y1="68" x2="620" y2="130" stroke="#26a69a" stroke-width="1"/>
  <rect x="616" y="75" width="8" height="42" fill="#26a69a" rx="1"/>

  <!-- Exit channel (lower, shorter lookback) -->
  <polyline points="465,175 500,170 530,165 560,162 590,158 620,155 660,152" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="665" y="156" fill="#ff9800" font-size="9">Exit Channel (10)</text>

  <!-- Turtle annotation -->
  <rect x="130" y="340" width="160" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="210" y="355" text-anchor="middle" fill="#bbb" font-size="10">Donchian Channel (20/10)</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="126" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="156" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="186" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="216" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="246" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="276" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="306" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="336" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="366" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="396" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="426" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
  </g>
  <rect x="459" y="375" width="12" height="40" fill="#00e676" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="496" y="388" width="8" height="27" fill="#26a69a" rx="1"/>
    <rect x="526" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="556" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="586" y="392" width="8" height="23" fill="#26a69a" rx="1"/>
    <rect x="616" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Upper Channel (20)</text>
    <circle cx="165" cy="20" r="4" fill="#ef5350"/>
    <text x="175" y="24" fill="#999" font-size="9">Lower Channel</text>
    <circle cx="290" cy="20" r="4" fill="#ff9800"/>
    <text x="300" y="24" fill="#999" font-size="9">Exit Channel (10)</text>
    <circle cx="430" cy="20" r="4" fill="#00e676"/>
    <text x="440" y="24" fill="#999" font-size="9">Breakout Signal</text>
    <rect x="560" y="12" width="20" height="16" fill="#42a5f5" opacity="0.3" rx="2"/>
    <text x="585" y="24" fill="#999" font-size="9">Channel Fill</text>
  </g>
</svg>