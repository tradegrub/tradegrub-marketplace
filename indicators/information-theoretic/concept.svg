<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Information Theoretic Indicator</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <rect x="60" y="70" width="700" height="130" fill="rgba(255,255,255,0.02)" rx="4"/>
  <g stroke-width="1.5">
    <line x1="100" y1="110" x2="100" y2="155" stroke="#4CAF50"/><rect x="96" y="118" width="8" height="24" fill="#4CAF50" rx="1"/>
    <line x1="140" y1="105" x2="140" y2="150" stroke="#4CAF50"/><rect x="136" y="110" width="8" height="26" fill="#4CAF50" rx="1"/>
    <line x1="180" y1="100" x2="180" y2="148" stroke="#4CAF50"/><rect x="176" y="105" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="220" y1="108" x2="220" y2="155" stroke="#EF5350"/><rect x="216" y="115" width="8" height="28" fill="#EF5350" rx="1"/>
    <line x1="260" y1="118" x2="260" y2="165" stroke="#EF5350"/><rect x="256" y="125" width="8" height="28" fill="#EF5350" rx="1"/>
    <line x1="300" y1="125" x2="300" y2="170" stroke="#EF5350"/><rect x="296" y="132" width="8" height="26" fill="#EF5350" rx="1"/>
    <line x1="340" y1="130" x2="340" y2="175" stroke="#4CAF50"/><rect x="336" y="135" width="8" height="26" fill="#4CAF50" rx="1"/>
    <line x1="380" y1="120" x2="380" y2="165" stroke="#4CAF50"/><rect x="376" y="125" width="8" height="26" fill="#4CAF50" rx="1"/>
    <line x1="420" y1="110" x2="420" y2="158" stroke="#4CAF50"/><rect x="416" y="115" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="460" y1="105" x2="460" y2="155" stroke="#4CAF50"/><rect x="456" y="110" width="8" height="30" fill="#4CAF50" rx="1"/>
    <line x1="500" y1="108" x2="500" y2="158" stroke="#EF5350"/><rect x="496" y="118" width="8" height="28" fill="#EF5350" rx="1"/>
    <line x1="540" y1="115" x2="540" y2="162" stroke="#EF5350"/><rect x="536" y="122" width="8" height="28" fill="#EF5350" rx="1"/>
    <line x1="580" y1="128" x2="580" y2="172" stroke="#EF5350"/><rect x="576" y="135" width="8" height="26" fill="#EF5350" rx="1"/>
    <line x1="620" y1="135" x2="620" y2="178" stroke="#4CAF50"/><rect x="616" y="140" width="8" height="26" fill="#4CAF50" rx="1"/>
    <line x1="660" y1="125" x2="660" y2="170" stroke="#4CAF50"/><rect x="656" y="130" width="8" height="26" fill="#4CAF50" rx="1"/>
    <line x1="700" y1="118" x2="700" y2="165" stroke="#4CAF50"/><rect x="696" y="124" width="8" height="26" fill="#4CAF50" rx="1"/>
  </g>

  <!-- Separator -->
  <line x1="60" y1="215" x2="760" y2="215" stroke="#444" stroke-width="1"/>

  <!-- Info subplot -->
  <rect x="60" y="225" width="700" height="210" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="75" y="242" fill="#666" font-family="Inter,sans-serif" font-size="10">Information Metrics (0-100)</text>

  <!-- Mid reference -->
  <line x1="60" y1="330" x2="760" y2="330" stroke="#555" stroke-width="0.5" stroke-dasharray="5,5"/>

  <!-- Mutual information (blue) -->
  <polyline points="100,380 140,370 180,340 220,310 260,290 300,310 340,340 380,320 420,290 460,270 500,280 540,310 580,340 620,360 660,345 700,320" fill="none" stroke="#42A5F5" stroke-width="2"/>

  <!-- Transfer entropy (purple) -->
  <polyline points="100,390 140,385 180,370 220,350 260,330 300,345 340,365 380,350 420,325 460,310 500,320 540,345 580,365 620,375 660,360 700,340" fill="none" stroke="#AB47BC" stroke-width="1.5"/>

  <!-- Self entropy (orange) -->
  <polyline points="100,360 140,355 180,350 220,340 260,345 300,355 340,350 380,345 420,340 460,345 500,350 540,355 580,350 620,355 660,350 700,348" fill="none" stroke="#FFA726" stroke-width="1.5"/>

  <!-- High MI annotation -->
  <text x="445" y="262" fill="#42A5F5" font-family="Inter,sans-serif" font-size="9">High MI</text>
  <line x1="460" y1="265" x2="460" y2="270" stroke="#42A5F5" stroke-width="0.5"/>

  <!-- Legend -->
  <rect x="120" y="455" width="560" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="145" y1="470" x2="175" y2="470" stroke="#42A5F5" stroke-width="2"/>
  <text x="180" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Mutual Info</text>
  <line x1="290" y1="470" x2="320" y2="470" stroke="#AB47BC" stroke-width="2"/>
  <text x="325" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Transfer Entropy</text>
  <line x1="465" y1="470" x2="495" y2="470" stroke="#FFA726" stroke-width="2"/>
  <text x="500" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Self Entropy</text>
</svg>