<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">ADX Trend + RSI Momentum Filter</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- ADX/DI Panel (top section, y=65 to y=195) -->
  <text x="75" y="75" fill="#888" font-size="9" text-anchor="end">ADX</text>

  <!-- ADX threshold line -->
  <line x1="80" y1="130" x2="740" y2="130" stroke="#42a5f5" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="745" y="134" fill="#42a5f5" font-size="8">25</text>

  <!-- ADX line -->
  <polyline points="100,175 140,168 180,158 220,145 260,128 300,115 340,108 380,105 420,110 460,118 500,130 540,142 580,155 620,148 660,135 700,120" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.8"/>
  <text x="710" y="118" fill="#42a5f5" font-size="9">ADX</text>

  <!-- +DI line -->
  <polyline points="100,165 140,155 180,142 220,130 260,118 300,108 340,102 380,98 420,115 460,128 500,140 540,152 580,160 620,145 660,130 700,112" fill="none" stroke="#26a69a" stroke-width="1.5" opacity="0.7"/>
  <text x="710" y="110" fill="#26a69a" font-size="8">+DI</text>

  <!-- -DI line -->
  <polyline points="100,180 140,178 180,175 220,172 260,168 300,165 340,168 380,172 420,140 460,135 500,128 540,125 580,130 620,142 660,148 700,155" fill="none" stroke="#ef5350" stroke-width="1.5" opacity="0.7"/>
  <text x="710" y="153" fill="#ef5350" font-size="8">-DI</text>

  <!-- ADX > 25 highlight zone -->
  <rect x="230" y="65" width="210" height="130" fill="#42a5f5" fill-opacity="0.04" rx="3"/>
  <text x="335" y="80" text-anchor="middle" fill="#42a5f5" font-size="8" opacity="0.6">ADX > 25 (trending)</text>

  <!-- RSI Panel (middle section, y=210 to y=310) -->
  <line x1="80" y1="210" x2="740" y2="210" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  <text x="75" y="220" fill="#888" font-size="9" text-anchor="end">RSI</text>

  <!-- RSI 65 line -->
  <line x1="80" y1="235" x2="740" y2="235" stroke="#00e676" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="745" y="238" fill="#00e676" font-size="7">65</text>

  <!-- RSI 50 line -->
  <line x1="80" y1="260" x2="740" y2="260" stroke="#888" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.2"/>

  <!-- RSI 35 line -->
  <line x1="80" y1="285" x2="740" y2="285" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="745" y="288" fill="#ef5350" font-size="7">35</text>

  <!-- RSI line -->
  <polyline points="100,268 140,262 180,255 220,248 260,238 300,228 340,222 380,220 420,252 460,268 500,275 540,282 580,288 620,278 660,265 700,248" fill="none" stroke="#ab47bc" stroke-width="2" opacity="0.8"/>
  <text x="710" y="246" fill="#ab47bc" font-size="9">RSI</text>

  <!-- BUY signal where all three align -->
  <line x1="300" y1="210" x2="300" y2="310" stroke="#00e676" stroke-width="1" opacity="0.3"/>
  <circle cx="300" cy="228" r="5" fill="#00e676" opacity="0.8" filter="url(#softGlow)"/>
  <rect x="305" y="240" width="48" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="329" y="253" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- SELL signal on right -->
  <line x1="660" y1="210" x2="660" y2="310" stroke="#ef5350" stroke-width="1" opacity="0.3"/>
  <circle cx="660" cy="265" r="5" fill="#ef5350" opacity="0.8" filter="url(#softGlow)"/>

  <!-- Price candles at bottom (y=320 to y=410) -->
  <line x1="80" y1="320" x2="740" y2="320" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  <text x="75" y="330" fill="#888" font-size="9" text-anchor="end">Price</text>

  <!-- Uptrend candles -->
  <line x1="100" y1="365" x2="100" y2="395" stroke="#26a69a" stroke-width="1"/>
  <rect x="97" y="372" width="6" height="15" fill="#26a69a" rx="1"/>
  <line x1="130" y1="358" x2="130" y2="388" stroke="#26a69a" stroke-width="1"/>
  <rect x="127" y="365" width="6" height="15" fill="#26a69a" rx="1"/>
  <line x1="160" y1="352" x2="160" y2="382" stroke="#26a69a" stroke-width="1"/>
  <rect x="157" y="358" width="6" height="15" fill="#26a69a" rx="1"/>
  <line x1="190" y1="345" x2="190" y2="378" stroke="#ef5350" stroke-width="1"/>
  <rect x="187" y="350" width="6" height="15" fill="#ef5350" rx="1"/>
  <line x1="220" y1="340" x2="220" y2="372" stroke="#26a69a" stroke-width="1"/>
  <rect x="217" y="345" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="250" y1="335" x2="250" y2="365" stroke="#26a69a" stroke-width="1"/>
  <rect x="247" y="340" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="280" y1="330" x2="280" y2="360" stroke="#26a69a" stroke-width="1"/>
  <rect x="277" y="335" width="6" height="18" fill="#26a69a" rx="1"/>
  <!-- Signal candle -->
  <line x1="300" y1="322" x2="300" y2="358" stroke="#00e676" stroke-width="1"/>
  <rect x="296" y="326" width="8" height="22" fill="#00e676" rx="1" filter="url(#softGlow)"/>
  <line x1="330" y1="328" x2="330" y2="355" stroke="#26a69a" stroke-width="1"/>
  <rect x="327" y="332" width="6" height="15" fill="#26a69a" rx="1"/>
  <line x1="360" y1="325" x2="360" y2="352" stroke="#26a69a" stroke-width="1"/>
  <rect x="357" y="330" width="6" height="15" fill="#26a69a" rx="1"/>
  <line x1="390" y1="330" x2="390" y2="358" stroke="#ef5350" stroke-width="1"/>
  <rect x="387" y="335" width="6" height="12" fill="#ef5350" rx="1"/>
  <line x1="420" y1="338" x2="420" y2="368" stroke="#ef5350" stroke-width="1"/>
  <rect x="417" y="342" width="6" height="18" fill="#ef5350" rx="1"/>
  <line x1="450" y1="345" x2="450" y2="375" stroke="#ef5350" stroke-width="1"/>
  <rect x="447" y="350" width="6" height="18" fill="#ef5350" rx="1"/>
  <line x1="480" y1="352" x2="480" y2="385" stroke="#26a69a" stroke-width="1"/>
  <rect x="477" y="368" width="6" height="10" fill="#26a69a" rx="1"/>
  <line x1="510" y1="358" x2="510" y2="392" stroke="#ef5350" stroke-width="1"/>
  <rect x="507" y="365" width="6" height="18" fill="#ef5350" rx="1"/>
  <line x1="540" y1="365" x2="540" y2="398" stroke="#ef5350" stroke-width="1"/>
  <rect x="537" y="370" width="6" height="20" fill="#ef5350" rx="1"/>

  <!-- Condition annotations -->
  <rect x="200" y="305" width="220" height="16" rx="3" fill="#ffffff" fill-opacity="0.05"/>
  <text x="310" y="316" text-anchor="middle" fill="#bbb" font-size="9">ADX>25 + DI>-DI + RSI>65 = Long</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">ADX</text>
    <circle cx="80" cy="20" r="4" fill="#26a69a"/>
    <text x="90" y="24" fill="#999" font-size="9">+DI</text>
    <circle cx="130" cy="20" r="4" fill="#ef5350"/>
    <text x="140" y="24" fill="#999" font-size="9">-DI</text>
    <circle cx="185" cy="20" r="4" fill="#ab47bc"/>
    <text x="195" y="24" fill="#999" font-size="9">RSI</text>
    <circle cx="240" cy="20" r="4" fill="#00e676"/>
    <text x="250" y="24" fill="#999" font-size="9">Long Signal</text>
    <circle cx="345" cy="20" r="4" fill="#ef5350"/>
    <text x="355" y="24" fill="#999" font-size="9">Short Signal</text>
    <rect x="460" y="12" width="20" height="16" fill="#42a5f5" opacity="0.3" rx="2"/>
    <text x="485" y="24" fill="#999" font-size="9">Trending Zone</text>
  </g>
</svg>