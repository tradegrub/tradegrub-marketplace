<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Grid Trader Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Grid levels -->
  <line x1="80" y1="90" x2="720" y2="90" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="725" y="94" fill="#ef5350" font-size="9">SELL $152</text>
  <line x1="80" y1="140" x2="720" y2="140" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="725" y="144" fill="#ef5350" font-size="9">SELL $148</text>
  <line x1="80" y1="190" x2="720" y2="190" stroke="#787b86" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="725" y="194" fill="#787b86" font-size="9">$144</text>
  <line x1="80" y1="240" x2="720" y2="240" stroke="#787b86" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="725" y="244" fill="#787b86" font-size="9">$140</text>
  <line x1="80" y1="290" x2="720" y2="290" stroke="#787b86" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="725" y="294" fill="#787b86" font-size="9">$136</text>
  <line x1="80" y1="340" x2="720" y2="340" stroke="#26a69a" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="725" y="344" fill="#26a69a" font-size="9">BUY $132</text>
  <line x1="80" y1="390" x2="720" y2="390" stroke="#26a69a" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="725" y="394" fill="#26a69a" font-size="9">BUY $128</text>

  <!-- Price line bouncing between grid levels -->
  <polyline points="80,240 120,220 160,190 200,160 230,140 260,160 300,200 340,250 370,290 400,340 430,310 460,270 490,230 520,190 550,140 570,160 600,200 640,260 680,300 710,340"
    fill="none" stroke="#2196F3" stroke-width="2.5"/>

  <!-- SELL arrows at upper levels -->
  <g filter="url(#glow)">
    <polygon points="230,125 225,135 235,135" fill="#ef5350"/>
    <text x="230" y="120" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">SELL</text>
    <polygon points="550,125 545,135 555,135" fill="#ef5350"/>
    <text x="550" y="120" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">SELL</text>
  </g>

  <!-- BUY arrows at lower levels -->
  <g filter="url(#glow)">
    <polygon points="400,355 395,345 405,345" fill="#26a69a"/>
    <text x="400" y="368" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">BUY</text>
    <polygon points="710,355 705,345 715,345" fill="#26a69a"/>
    <text x="710" y="368" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">BUY</text>
  </g>

  <!-- Profit annotations -->
  <rect x="280" y="138" width="55" height="16" rx="3" fill="#26a69a" fill-opacity="0.15"/>
  <text x="307" y="150" text-anchor="middle" fill="#26a69a" font-size="8">+$4 profit</text>
  <rect x="460" y="188" width="55" height="16" rx="3" fill="#26a69a" fill-opacity="0.15"/>
  <text x="487" y="200" text-anchor="middle" fill="#26a69a" font-size="8">+$4 profit</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <polygon points="20,14 15,24 25,24" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Buy at Lower Grid</text>
    <polygon points="175,24 170,14 180,14" fill="#ef5350"/>
    <text x="185" y="24" fill="#999" font-size="9">Sell at Upper Grid</text>
    <circle cx="320" cy="20" r="4" fill="#2196F3"/>
    <text x="330" y="24" fill="#999" font-size="9">Price (Range-Bound)</text>
    <line x1="460" y1="20" x2="480" y2="20" stroke="#787b86" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="485" y="24" fill="#999" font-size="9">Grid Levels</text>
  </g>
</svg>