<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="vwapZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ab47bc" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ab47bc" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">VWAP Bounce / Rejection Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- VWAP line -->
  <polyline points="80,230 120,228 160,225 200,222 240,220 280,218 320,216 360,215 400,214 440,213 480,212 520,212 560,212 600,213 640,214 680,215 720,216" fill="none" stroke="#ab47bc" stroke-width="2.5" opacity="0.8"/>
  <text x="730" y="220" fill="#ab47bc" font-size="10" font-weight="500">VWAP</text>

  <!-- VWAP proximity zone -->
  <rect x="80" y="205" width="660" height="22" fill="url(#vwapZone)" rx="2"/>

  <!-- Trend SMA -->
  <polyline points="80,250 120,248 160,245 200,242 240,238 280,235 320,232 360,230 400,228 440,226 480,225 520,224 560,224 600,225 640,226 680,228 720,230" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="730" y="233" fill="#ff9800" font-size="9">SMA(50)</text>

  <!-- Price action - above VWAP trending up, dipping to VWAP, bouncing -->
  <line x1="100" y1="185" x2="100" y2="225" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="195" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="130" y1="178" x2="130" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="188" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="160" y1="172" x2="160" y2="212" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="182" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="190" y1="165" x2="190" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="175" width="8" height="20" fill="#26a69a" rx="1"/>
  <!-- Pullback to VWAP -->
  <line x1="220" y1="175" x2="220" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="216" y="182" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="250" y1="185" x2="250" y2="222" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="192" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="280" y1="195" x2="280" y2="228" stroke="#ef5350" stroke-width="1"/>
  <rect x="276" y="202" width="8" height="18" fill="#ef5350" rx="1"/>

  <!-- BOUNCE candle at VWAP -->
  <line x1="310" y1="198" x2="310" y2="228" stroke="#00e676" stroke-width="1.5"/>
  <rect x="304" y="202" width="12" height="18" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- Bounce arrow -->
  <g filter="url(#softGlow)">
    <polygon points="310,192 318,192 314,182" fill="#00e676"/>
  </g>
  <rect x="325" y="178" width="95" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="372" y="192" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY (bounce)</text>

  <!-- Proximity annotation -->
  <path d="M 298,215 C 290,218 285,220 283,222" fill="none" stroke="#ab47bc" stroke-width="1" opacity="0.6"/>
  <text x="258" y="230" fill="#ab47bc" font-size="8" text-anchor="end">Near VWAP zone</text>

  <!-- Post-bounce uptrend -->
  <line x1="340" y1="188" x2="340" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="195" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="370" y1="175" x2="370" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="182" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="400" y1="165" x2="400" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="172" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="430" y1="155" x2="430" y2="192" stroke="#ef5350" stroke-width="1"/>
  <rect x="426" y="162" width="8" height="15" fill="#ef5350" rx="1"/>
  <line x1="460" y1="148" x2="460" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="155" width="8" height="20" fill="#26a69a" rx="1"/>

  <!-- Exit level -->
  <line x1="310" y1="155" x2="490" y2="155" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="495" y="158" fill="#00e676" font-size="9">Exit (VWAP + 1.5 ATR)</text>

  <!-- Second scenario: bearish rejection (right side) -->
  <!-- Price below VWAP, rally to VWAP, rejected -->
  <line x1="520" y1="215" x2="520" y2="258" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="225" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="550" y1="222" x2="550" y2="265" stroke="#ef5350" stroke-width="1"/>
  <rect x="546" y="232" width="8" height="22" fill="#ef5350" rx="1"/>
  <!-- Rally up to VWAP -->
  <line x1="580" y1="218" x2="580" y2="252" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="232" width="8" height="12" fill="#26a69a" rx="1"/>
  <line x1="610" y1="210" x2="610" y2="242" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="222" width="8" height="12" fill="#26a69a" rx="1"/>
  <!-- Rejection candle -->
  <line x1="640" y1="210" x2="640" y2="250" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="634" y="220" width="12" height="22" fill="#ef5350" rx="1" filter="url(#glow)"/>

  <!-- Rejection arrow -->
  <polygon points="640,255 648,255 644,265" fill="#ef5350" filter="url(#softGlow)"/>
  <rect x="652" y="255" width="85" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="694" y="269" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SELL (reject)</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="395" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="126" y="398" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="156" y="395" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="186" y="393" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="216" y="398" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="246" y="400" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="276" y="402" width="8" height="11" fill="#ef5350" rx="1"/>
  </g>
  <rect x="304" y="382" width="12" height="31" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="336" y="395" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="366" y="393" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="396" y="395" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="426" y="400" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="456" y="395" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="516" y="398" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="546" y="400" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="576" y="402" width="8" height="11" fill="#26a69a" rx="1"/>
    <rect x="606" y="403" width="8" height="10" fill="#26a69a" rx="1"/>
  </g>
  <rect x="634" y="385" width="12" height="28" fill="#ef5350" rx="1" opacity="0.6"/>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ab47bc"/>
    <text x="30" y="24" fill="#999" font-size="9">VWAP</text>
    <circle cx="90" cy="20" r="4" fill="#ff9800"/>
    <text x="100" y="24" fill="#999" font-size="9">Trend SMA</text>
    <circle cx="190" cy="20" r="4" fill="#00e676"/>
    <text x="200" y="24" fill="#999" font-size="9">Bounce Buy</text>
    <circle cx="295" cy="20" r="4" fill="#ef5350"/>
    <text x="305" y="24" fill="#999" font-size="9">Rejection Sell</text>
    <rect x="415" y="12" width="20" height="16" fill="#ab47bc" opacity="0.3" rx="2"/>
    <text x="440" y="24" fill="#999" font-size="9">Proximity Zone</text>
    <circle cx="550" cy="20" r="4" fill="#00e676"/>
    <text x="560" y="24" fill="#999" font-size="9">ATR Exit</text>
  </g>
</svg>