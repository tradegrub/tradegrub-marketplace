<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Anomaly Detector</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="160" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="88" fill="#888" font-family="Inter,sans-serif" font-size="10">Price</text>

  <!-- Normal candles -->
  <line x1="100" y1="155" x2="100" y2="185" stroke="#555" stroke-width="1"/><rect x="96" y="158" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="150" y1="150" x2="150" y2="180" stroke="#555" stroke-width="1"/><rect x="146" y="153" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="200" y1="148" x2="200" y2="178" stroke="#555" stroke-width="1"/><rect x="196" y="155" width="8" height="16" fill="#f44336" rx="1"/>
  <line x1="250" y1="150" x2="250" y2="180" stroke="#555" stroke-width="1"/><rect x="246" y="153" width="8" height="18" fill="#4CAF50" rx="1"/>

  <!-- Anomaly candle (big) -->
  <rect x="290" y="70" width="30" height="160" fill="rgba(255,82,82,0.08)" rx="2"/>
  <line x1="305" y1="100" x2="305" y2="195" stroke="#555" stroke-width="1"/><rect x="299" y="105" width="12" height="55" fill="#ff5252" rx="1"/>
  <polygon points="305,205 299,215 311,215" fill="#ff5252"/>

  <!-- Normal again -->
  <line x1="350" y1="110" x2="350" y2="145" stroke="#555" stroke-width="1"/><rect x="346" y="113" width="8" height="22" fill="#f44336" rx="1"/>
  <line x1="400" y1="120" x2="400" y2="152" stroke="#555" stroke-width="1"/><rect x="396" y="123" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="450" y1="115" x2="450" y2="148" stroke="#555" stroke-width="1"/><rect x="446" y="118" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="500" y1="112" x2="500" y2="145" stroke="#555" stroke-width="1"/><rect x="496" y="115" width="8" height="20" fill="#4CAF50" rx="1"/>

  <!-- Another anomaly -->
  <rect x="540" y="70" width="30" height="160" fill="rgba(255,82,82,0.08)" rx="2"/>
  <line x1="555" y1="85" x2="555" y2="165" stroke="#555" stroke-width="1"/><rect x="549" y="90" width="12" height="45" fill="#4CAF50" rx="1"/>
  <polygon points="555,175 549,185 561,185" fill="#ff5252"/>

  <line x1="600" y1="92" x2="600" y2="128" stroke="#555" stroke-width="1"/><rect x="596" y="95" width="8" height="22" fill="#4CAF50" rx="1"/>
  <line x1="650" y1="88" x2="650" y2="122" stroke="#555" stroke-width="1"/><rect x="646" y="91" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="700" y1="85" x2="700" y2="118" stroke="#555" stroke-width="1"/><rect x="696" y="88" width="8" height="18" fill="#4CAF50" rx="1"/>

  <!-- Anomaly score subplot -->
  <rect x="60" y="250" width="700" height="180" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="268" fill="#888" font-family="Inter,sans-serif" font-size="10">Anomaly Score</text>

  <!-- Alert bg -->
  <rect x="285" y="260" width="40" height="35" fill="rgba(255,82,82,0.12)"/>
  <rect x="535" y="260" width="40" height="35" fill="rgba(255,82,82,0.12)"/>

  <line x1="60" y1="295" x2="760" y2="295" stroke="#ff9800" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="765" y="299" fill="#ff9800" font-family="Inter,sans-serif" font-size="9">70</text>
  <line x1="60" y1="365" x2="760" y2="365" stroke="#4CAF50" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="765" y="369" fill="#4CAF50" font-family="Inter,sans-serif" font-size="9">30</text>

  <!-- Score line with spikes -->
  <polyline points="100,390 150,385 200,375 250,360 305,270 350,340 400,380 450,388 500,385 555,275 600,350 650,385 700,392"
    fill="none" stroke="#ff5252" stroke-width="2.5"/>

  <rect x="60" y="455" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="470" x2="100" y2="470" stroke="#ff5252" stroke-width="2.5"/>
  <text x="105" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Anomaly Score</text>
  <polygon points="245,475 239,467 251,467" fill="#ff5252"/>
  <text x="256" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Anomaly</text>
  <line x1="340" y1="470" x2="360" y2="470" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="365" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Alert (70)</text>
  <line x1="460" y1="470" x2="480" y2="470" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="485" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Normal (30)</text>
</svg>
