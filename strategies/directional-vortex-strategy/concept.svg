  <rect x="256" y="210" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="285" y1="200" x2="285" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="281" y="205" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="310" y1="192" x2="310" y2="228" stroke="#26a69a" stroke-width="1"/>
