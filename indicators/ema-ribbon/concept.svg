<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">EMA Ribbon</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- EMA lines - 6 Fibonacci-spaced EMAs -->
  <!-- Bullish fan (left): EMA8 on top, EMA89 on bottom -->
  <!-- Squeeze in middle, then bearish fan on right -->

  <!-- EMA 8 (cyan/fastest) -->
  <polyline fill="none" stroke="#00bcd4" stroke-width="1.8" opacity="0.9"
    points="80,280 110,260 140,240 170,218 200,195 230,175 260,160 290,150 320,148 350,152 380,168 410,192 440,220 470,240 500,252 530,248 560,232 590,212 620,190 650,172 680,158 710,148 740,142"/>

  <!-- EMA 13 (teal) -->
  <polyline fill="none" stroke="#009688" stroke-width="1.6" opacity="0.85"
    points="80,285 110,268 140,250 170,228 200,208 230,188 260,172 290,162 320,158 350,160 380,175 410,198 440,225 470,245 500,258 530,255 560,240 590,222 620,200 650,182 680,168 710,158 740,152"/>

  <!-- EMA 21 (green) -->
  <polyline fill="none" stroke="#4caf50" stroke-width="1.4" opacity="0.8"
    points="80,292 110,278 140,262 170,242 200,222 230,205 260,188 290,178 320,172 350,172 380,185 410,205 440,232 470,252 500,265 530,262 560,250 590,235 620,215 650,198 680,182 710,172 740,165"/>

  <!-- EMA 34 (amber) -->
  <polyline fill="none" stroke="#ffc107" stroke-width="1.2" opacity="0.75"
    points="80,300 110,290 140,278 170,260 200,242 230,225 260,210 290,200 320,192 350,190 380,198 410,215 440,238 470,258 500,272 530,272 560,262 590,250 620,232 650,218 680,202 710,190 740,182"/>

  <!-- EMA 55 (orange) -->
  <polyline fill="none" stroke="#ff9800" stroke-width="1.1" opacity="0.7"
    points="80,310 110,302 140,292 170,278 200,262 230,248 260,232 290,222 320,215 350,212 380,215 410,228 440,248 470,265 500,278 530,280 560,275 590,265 620,250 650,238 680,222 710,210 740,200"/>

  <!-- EMA 89 (red/slowest) -->
  <polyline fill="none" stroke="#f44336" stroke-width="1" opacity="0.65"
    points="80,320 110,315 140,308 170,298 200,285 230,272 260,258 290,248 320,242 350,238 380,238 410,245 440,258 470,272 500,285 530,288 560,285 590,278 620,268 650,258 680,245 710,232 740,222"/>

  <!-- Ribbon fills between adjacent EMAs -->
  <!-- Bullish fill (green tones) on left side -->
  <polygon points="80,280 110,260 140,240 170,218 200,195 230,175 260,160 290,150 320,148 320,242 290,248 260,258 230,272 200,285 170,298 140,308 110,315 80,320" fill="#00bcd4" opacity="0.06"/>

  <!-- Squeeze zone fill -->
  <polygon points="320,148 350,152 380,168 410,192 440,220 440,258 410,245 380,238 350,238 320,242" fill="#ffffff" opacity="0.04"/>

  <!-- Bearish becoming bullish fill on right -->
  <polygon points="440,220 470,240 500,252 530,248 560,232 590,212 620,190 650,172 680,158 710,148 740,142 740,222 710,232 680,245 650,258 620,268 590,278 560,285 530,288 500,285 470,272 440,258" fill="#00bcd4" opacity="0.06"/>

  <!-- Squeeze annotation -->
  <rect x="330" y="100" width="100" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="380" y="115" text-anchor="middle" fill="#bbb" font-size="11">Ribbon Squeeze</text>
  <line x1="380" y1="122" x2="380" y2="145" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Wide fan annotation (left) -->
  <path d="M 180,148 C 170,135 155,130 145,132" fill="none" stroke="#888" stroke-width="1"/>
  <polygon points="143,130 143,136 137,133" fill="#888"/>
  <rect x="80" y="120" width="68" height="18" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="114" y="133" text-anchor="middle" fill="#bbb" font-size="9">Wide Fan</text>

  <!-- New trend annotation (right) -->
  <rect x="620" y="120" width="100" height="22" rx="4" fill="#00e676" fill-opacity="0.1" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="670" y="135" text-anchor="middle" fill="#00e676" font-size="10" font-weight="500">New Uptrend</text>

  <!-- Candlesticks (sparse, behind ribbon for context) -->
  <g opacity="0.4">
    <line x1="110" y1="252" x2="110" y2="275" stroke="#26a69a" stroke-width="1"/><rect x="107" y="255" width="6" height="12" fill="#26a69a" rx="1"/>
    <line x1="170" y1="210" x2="170" y2="235" stroke="#26a69a" stroke-width="1"/><rect x="167" y="213" width="6" height="14" fill="#26a69a" rx="1"/>
    <line x1="230" y1="168" x2="230" y2="195" stroke="#26a69a" stroke-width="1"/><rect x="227" y="172" width="6" height="14" fill="#26a69a" rx="1"/>
    <line x1="290" y1="142" x2="290" y2="168" stroke="#26a69a" stroke-width="1"/><rect x="287" y="146" width="6" height="12" fill="#26a69a" rx="1"/>
    <line x1="350" y1="145" x2="350" y2="170" stroke="#ef5350" stroke-width="1"/><rect x="347" y="148" width="6" height="12" fill="#ef5350" rx="1"/>
    <line x1="410" y1="185" x2="410" y2="215" stroke="#ef5350" stroke-width="1"/><rect x="407" y="188" width="6" height="18" fill="#ef5350" rx="1"/>
    <line x1="470" y1="232" x2="470" y2="258" stroke="#ef5350" stroke-width="1"/><rect x="467" y="236" width="6" height="14" fill="#ef5350" rx="1"/>
    <line x1="530" y1="240" x2="530" y2="262" stroke="#26a69a" stroke-width="1"/><rect x="527" y="243" width="6" height="12" fill="#26a69a" rx="1"/>
    <line x1="590" y1="204" x2="590" y2="230" stroke="#26a69a" stroke-width="1"/><rect x="587" y="208" width="6" height="14" fill="#26a69a" rx="1"/>
    <line x1="650" y1="165" x2="650" y2="190" stroke="#26a69a" stroke-width="1"/><rect x="647" y="168" width="6" height="14" fill="#26a69a" rx="1"/>
    <line x1="710" y1="140" x2="710" y2="165" stroke="#26a69a" stroke-width="1"/><rect x="707" y="143" width="6" height="14" fill="#26a69a" rx="1"/>
  </g>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="107" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="167" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="227" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="287" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="347" y="405" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="407" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="467" y="405" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="527" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="587" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="647" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="707" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#00bcd4"/>
    <text x="30" y="24" fill="#999" font-size="9">EMA 8</text>
    <circle cx="85" cy="20" r="4" fill="#009688"/>
    <text x="95" y="24" fill="#999" font-size="9">EMA 13</text>
    <circle cx="155" cy="20" r="4" fill="#4caf50"/>
    <text x="165" y="24" fill="#999" font-size="9">EMA 21</text>
    <circle cx="225" cy="20" r="4" fill="#ffc107"/>
    <text x="235" y="24" fill="#999" font-size="9">EMA 34</text>
    <circle cx="295" cy="20" r="4" fill="#ff9800"/>
    <text x="305" y="24" fill="#999" font-size="9">EMA 55</text>
    <circle cx="365" cy="20" r="4" fill="#f44336"/>
    <text x="375" y="24" fill="#999" font-size="9">EMA 89</text>
    <rect x="430" y="12" width="20" height="16" fill="#00bcd4" opacity="0.3" rx="2"/>
    <text x="455" y="24" fill="#999" font-size="9">Ribbon Fill</text>
    <rect x="540" y="12" width="20" height="16" fill="#ffffff" opacity="0.1" rx="2"/>
    <text x="565" y="24" fill="#999" font-size="9">Squeeze</text>
  </g>
</svg>