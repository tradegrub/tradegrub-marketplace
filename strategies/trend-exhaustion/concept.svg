<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Trend Exhaustion Signal</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price chart area (top 55%) -->
  <!-- EMA line -->
  <polyline points="80,210 120,208 160,205 200,200 240,195 280,188 320,180 360,175 400,172 440,175 480,180 520,185 560,192 600,200 640,210 680,218 720,225" fill="none" stroke="#ff9800" stroke-width="2" opacity="0.6"/>
  <text x="725" y="228" fill="#ff9800" font-size="9">EMA(50)</text>

  <!-- Uptrend candles stretching away from EMA -->
  <line x1="100" y1="195" x2="100" y2="225" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="202" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="130" y1="188" x2="130" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="195" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="160" y1="175" x2="160" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="182" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="190" y1="158" x2="190" y2="198" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="165" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="220" y1="140" x2="220" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="148" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="250" y1="118" x2="250" y2="168" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="125" width="8" height="30" fill="#26a69a" rx="1"/>
  <!-- Exhaustion candle -->
  <line x1="280" y1="95" x2="280" y2="155" stroke="#00e676" stroke-width="1.5"/>
  <rect x="274" y="100" width="12" height="38" fill="#26a69a" rx="1" filter="url(#glow)"/>

  <!-- Bearish exhaustion signal -->
  <circle cx="280" cy="88" r="6" fill="none" stroke="#ef5350" stroke-width="2" filter="url(#softGlow)"/>
  <rect x="295" y="78" width="120" height="22" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="355" y="93" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SELL (Exhaustion)</text>

  <!-- Distance annotation -->
  <line x1="268" y1="100" x2="268" y2="188" stroke="#42a5f5" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="255" y="148" fill="#42a5f5" font-size="8" text-anchor="end" transform="rotate(-90,255,148)">Distance > 2x ATR</text>

  <!-- Reversal candles back to mean -->
  <line x1="310" y1="105" x2="310" y2="148" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="110" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="340" y1="118" x2="340" y2="160" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="125" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="370" y1="135" x2="370" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="155" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="400" y1="148" x2="400" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="396" y="155" width="8" height="20" fill="#ef5350" rx="1"/>

  <!-- Exit at EMA cross -->
  <text x="405" y="168" fill="#ff9800" font-size="9">Exit at EMA</text>

  <!-- Downtrend exhaustion (right side) -->
  <line x1="480" y1="175" x2="480" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="476" y="182" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="510" y1="195" x2="510" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="506" y="202" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="540" y1="215" x2="540" y2="260" stroke="#ef5350" stroke-width="1"/>
  <rect x="536" y="222" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="570" y1="240" x2="570" y2="290" stroke="#ef5350" stroke-width="1"/>
  <rect x="566" y="248" width="8" height="30" fill="#ef5350" rx="1"/>
  <!-- Exhaustion low -->
  <line x1="600" y1="268" x2="600" y2="325" stroke="#00e676" stroke-width="1.5"/>
  <rect x="594" y="280" width="12" height="32" fill="#ef5350" rx="1" filter="url(#glow)"/>

  <!-- Bullish exhaustion signal -->
  <circle cx="600" cy="330" r="6" fill="none" stroke="#00e676" stroke-width="2" filter="url(#softGlow)"/>
  <rect x="615" y="322" width="115" height="22" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="672" y="337" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY (Exhaustion)</text>

  <!-- RSI panel indicator (bottom) -->
  <line x1="80" y1="365" x2="740" y2="365" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  <text x="75" y="370" fill="#888" font-size="8" text-anchor="end">RSI</text>
  <!-- RSI overbought line -->
  <line x1="80" y1="378" x2="740" y2="378" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="745" y="381" fill="#ef5350" font-size="7">75</text>
  <!-- RSI oversold line -->
  <line x1="80" y1="408" x2="740" y2="408" stroke="#00e676" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="745" y="411" fill="#00e676" font-size="7">25</text>
  <!-- RSI line -->
  <polyline points="100,395 130,392 160,388 190,384 220,380 250,376 280,374 310,382 340,388 370,392 400,395 480,395 510,398 540,402 570,406 600,410 640,402 680,395" fill="none" stroke="#ab47bc" stroke-width="1.5" opacity="0.8"/>

  <!-- RSI extreme highlights -->
  <circle cx="280" cy="374" r="4" fill="#ef5350" opacity="0.8"/>
  <circle cx="600" cy="410" r="4" fill="#00e676" opacity="0.8"/>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">EMA Baseline</text>
    <circle cx="130" cy="20" r="4" fill="#ab47bc"/>
    <text x="140" y="24" fill="#999" font-size="9">RSI</text>
    <circle cx="200" cy="20" r="4" fill="#ef5350"/>
    <text x="210" y="24" fill="#999" font-size="9">Bearish Exhaustion</text>
    <circle cx="340" cy="20" r="4" fill="#00e676"/>
    <text x="350" y="24" fill="#999" font-size="9">Bullish Exhaustion</text>
    <circle cx="490" cy="20" r="4" fill="#42a5f5"/>
    <text x="500" y="24" fill="#999" font-size="9">ATR Distance</text>
    <rect x="590" y="12" width="20" height="16" fill="#00e676" opacity="0.5" rx="2"/>
    <text x="615" y="24" fill="#999" font-size="9">Volume Climax</text>
  </g>
</svg>