<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="150" x2="760" y2="150"/>
    <line x1="60" y1="200" x2="760" y2="200"/><line x1="60" y1="280" x2="760" y2="280"/>
    <line x1="60" y1="360" x2="760" y2="360"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Adaptive Cycle Momentum</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price line (subtle context) in upper area y80-200 -->
  <polyline points="80,175 105,170 130,162 155,158 180,165 205,172 230,168 255,155 280,145 305,138 330,142 355,150 380,160 405,168 430,172 455,165 480,155 505,142 530,135 555,130 580,138 605,148 630,155 655,160 680,152 710,145 740,140" fill="none" stroke="#00bcd4" stroke-width="1.5" opacity="0.35" filter="url(#softGlow)"/>
  <text x="745" y="138" fill="#00bcd4" font-size="9" opacity="0.4">Price</text>

  <!-- Separator -->
  <line x1="60" y1="220" x2="760" y2="220" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="238" fill="#555" font-size="9">OSCILLATOR</text>

  <!-- Zero line -->
  <line x1="80" y1="325" x2="740" y2="325" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="68" y="329" fill="#555" font-size="9" text-anchor="end">0</text>

  <!-- Adaptive Upper Band - widens during volatile (x250-400), narrows during calm (x450-600) -->
  <polyline points="80,300 105,298 130,296 155,295 180,292 205,288 230,282 255,272 280,265 305,260 330,262 355,268 380,275 405,282 430,290 455,296 480,300 505,302 530,304 555,303 580,300 605,296 630,292 655,288 680,284 710,280 740,278" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>

  <!-- Adaptive Lower Band -->
  <polyline points="80,350 105,352 130,354 155,355 180,358 205,362 230,368 255,378 280,385 305,390 330,388 355,382 380,375 405,368 430,360 455,354 480,350 505,348 530,346 555,347 580,350 605,354 630,358 655,362 680,366 710,370 740,372" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>

  <!-- Oscillator wave cycling above/below zero -->
  <polyline points="80,310 105,302 130,295 155,288 180,285 205,290 230,300 255,315 280,335 305,355 330,375 355,382 380,378 405,365 430,345 455,325 480,310 505,298 530,290 555,285 580,288 605,298 630,312 655,328 680,340 710,348 740,350" fill="none" stroke="#7c4dff" stroke-width="2.5" filter="url(#softGlow)"/>

  <!-- Annotation: Volatile Period -->
  <rect x="225" y="242" width="130" height="20" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="290" y="256" text-anchor="middle" fill="#bbb" font-size="10">Volatile - Bands Widen</text>
  <path d="M 290,262 L 290,268" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Annotation: Calm Period -->
  <rect x="455" y="242" width="125" height="20" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="517" y="256" text-anchor="middle" fill="#bbb" font-size="10">Calm - Bands Narrow</text>
  <path d="M 517,262 L 517,268" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Buy Signal 1: oscillator crosses up through lower band at ~x=380 -->
  <g filter="url(#glow)">
    <polygon points="375,385 385,385 380,372" fill="#00e676"/>
  </g>
  <rect x="390" y="375" width="42" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="411" y="388" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">BUY</text>

  <!-- Buy Signal 2: at ~x=555 -->
  <g filter="url(#glow)">
    <polygon points="550,352 560,352 555,339" fill="#00e676"/>
  </g>
  <rect x="563" y="340" width="42" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="584" y="353" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">BUY</text>

  <!-- Sell Signal 1: oscillator crosses down through upper band at ~x=180 -->
  <g filter="url(#glow)">
    <polygon points="175,280 185,280 180,293" fill="#ef5350"/>
  </g>
  <rect x="188" y="276" width="45" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="210" y="289" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">SELL</text>

  <!-- Sell Signal 2: at ~x=680 -->
  <g filter="url(#glow)">
    <polygon points="675,280 685,280 680,293" fill="#ef5350"/>
  </g>
  <rect x="688" y="276" width="45" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="710" y="289" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">SELL</text>

  <!-- Annotation: Crossover callout -->
  <rect x="115" y="73" width="145" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="187" y="88" text-anchor="middle" fill="#bbb" font-size="10">Crosses Upper Band</text>
  <path d="M 180,95 C 180,120 180,270 180,280" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="310" y="395" width="150" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="385" y="410" text-anchor="middle" fill="#bbb" font-size="10">Crosses Lower Band</text>
  <path d="M 380,395 C 380,392 380,388 380,385" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="86" y="405" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="111" y="402" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="136" y="400" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="161" y="403" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="186" y="406" width="8" height="11" fill="#ef5350" rx="1"/>
    <rect x="211" y="408" width="8" height="9" fill="#ef5350" rx="1"/>
    <rect x="236" y="395" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="261" y="390" width="8" height="27" fill="#ef5350" rx="1"/>
    <rect x="286" y="393" width="8" height="24" fill="#ef5350" rx="1"/>
    <rect x="311" y="397" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="336" y="400" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="361" y="398" width="8" height="19" fill="#26a69a" rx="1"/>
    <rect x="386" y="395" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="411" y="400" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="436" y="403" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="461" y="405" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="486" y="407" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="511" y="404" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="536" y="402" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="561" y="405" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="586" y="408" width="8" height="9" fill="#ef5350" rx="1"/>
    <rect x="611" y="406" width="8" height="11" fill="#ef5350" rx="1"/>
    <rect x="636" y="403" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="661" y="400" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="686" y="397" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="711" y="400" width="8" height="17" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#7c4dff"/>
    <text x="30" y="24" fill="#999" font-size="9">Oscillator</text>
    <circle cx="120" cy="20" r="4" fill="#ff9800"/>
    <text x="130" y="24" fill="#999" font-size="9">Adaptive Upper</text>
    <circle cx="250" cy="20" r="4" fill="#ff9800"/>
    <text x="260" y="24" fill="#999" font-size="9">Adaptive Lower</text>
    <circle cx="380" cy="20" r="4" fill="#00e676"/>
    <text x="390" y="24" fill="#999" font-size="9">Buy Signal</text>
    <circle cx="480" cy="20" r="4" fill="#ef5350"/>
    <text x="490" y="24" fill="#999" font-size="9">Sell Signal</text>
  </g>
</svg>