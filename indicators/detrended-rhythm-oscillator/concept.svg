<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="100" y1="80" x2="100" y2="410"/>
    <line x1="160" y1="80" x2="160" y2="410"/>
    <line x1="220" y1="80" x2="220" y2="410"/>
    <line x1="280" y1="80" x2="280" y2="410"/>
    <line x1="340" y1="80" x2="340" y2="410"/>
    <line x1="400" y1="80" x2="400" y2="410"/>
    <line x1="460" y1="80" x2="460" y2="410"/>
    <line x1="520" y1="80" x2="520" y2="410"/>
    <line x1="580" y1="80" x2="580" y2="410"/>
    <line x1="640" y1="80" x2="640" y2="410"/>
    <line x1="700" y1="80" x2="700" y2="410"/>
    <line x1="80" y1="110" x2="740" y2="110"/>
    <line x1="80" y1="145" x2="740" y2="145"/>
    <line x1="80" y1="180" x2="740" y2="180"/>
    <line x1="80" y1="215" x2="740" y2="215"/>
    <line x1="80" y1="285" x2="740" y2="285"/>
    <line x1="80" y1="320" x2="740" y2="320"/>
    <line x1="80" y1="355" x2="740" y2="355"/>
    <line x1="80" y1="390" x2="740" y2="390"/>
  </g>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Detrended Rhythm Oscillator</text>
  <text x="400" y="52" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Zero line (prominent white dashed) -->
  <line x1="80" y1="250" x2="740" y2="250" stroke="#ffffff" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.22"/>

  <!-- Y-axis labels -->
  <text x="72" y="114" text-anchor="end" fill="#666" font-size="8">+5</text>
  <text x="72" y="149" text-anchor="end" fill="#666" font-size="8">+4</text>
  <text x="72" y="184" text-anchor="end" fill="#666" font-size="8">+3</text>
  <text x="72" y="219" text-anchor="end" fill="#666" font-size="8">+2</text>
  <text x="72" y="254" text-anchor="end" fill="#888" font-size="9">0</text>
  <text x="72" y="289" text-anchor="end" fill="#666" font-size="8">-2</text>
  <text x="72" y="324" text-anchor="end" fill="#666" font-size="8">-3</text>
  <text x="72" y="359" text-anchor="end" fill="#666" font-size="8">-4</text>
  <text x="72" y="394" text-anchor="end" fill="#666" font-size="8">-5</text>

  <!-- X-axis bar numbers -->
  <text x="100" y="420" text-anchor="middle" fill="#555" font-size="7">0</text>
  <text x="160" y="420" text-anchor="middle" fill="#555" font-size="7">5</text>
  <text x="220" y="420" text-anchor="middle" fill="#555" font-size="7">10</text>
  <text x="280" y="420" text-anchor="middle" fill="#555" font-size="7">15</text>
  <text x="340" y="420" text-anchor="middle" fill="#555" font-size="7">20</text>
  <text x="400" y="420" text-anchor="middle" fill="#555" font-size="7">25</text>
  <text x="460" y="420" text-anchor="middle" fill="#555" font-size="7">30</text>
  <text x="520" y="420" text-anchor="middle" fill="#555" font-size="7">35</text>
  <text x="580" y="420" text-anchor="middle" fill="#555" font-size="7">40</text>
  <text x="640" y="420" text-anchor="middle" fill="#555" font-size="7">45</text>
  <text x="700" y="420" text-anchor="middle" fill="#555" font-size="7">50</text>

  <!-- Detrended wave (cyan polyline, oscillating around y=250, varying amplitude) -->
  <!-- ~35 points with realistic varying amplitude -->
  <polyline points="92,250 100,238 110,222 120,202 132,182 145,168 158,162 172,168 185,182 198,202 212,225 225,248 238,272 252,298 265,318 278,332 292,338 305,332 318,318 332,298 345,275 358,250 372,225 385,205 398,190 412,182 425,185 438,198 452,218 465,242 478,268 492,295 505,318 518,335 532,340 545,335 558,320 572,298 585,272 598,245 612,218 625,195 638,180 652,175 665,182 678,198 692,222 705,248 718,275 730,298" fill="none" stroke="#42d4f5" stroke-width="2.2" filter="url(#glow)"/>

  <!-- Peak markers (orange circles at wave peaks / local maxima above zero) -->
  <circle cx="158" cy="162" r="5" fill="#FF9800" filter="url(#softGlow)" opacity="0.9"/>
  <circle cx="412" cy="182" r="5" fill="#FF9800" filter="url(#softGlow)" opacity="0.9"/>
  <circle cx="652" cy="175" r="5" fill="#FF9800" filter="url(#softGlow)" opacity="0.9"/>

  <!-- Trough markers (cyan circles at wave troughs / local minima below zero) -->
  <circle cx="292" cy="338" r="5" fill="#42d4f5" filter="url(#softGlow)" opacity="0.9"/>
  <circle cx="532" cy="340" r="5" fill="#42d4f5" filter="url(#softGlow)" opacity="0.9"/>
  <circle cx="730" cy="298" r="4" fill="#42d4f5" filter="url(#softGlow)" opacity="0.7"/>

  <!-- Connecting dashed lines between consecutive peaks (showing cycle measurement) -->
  <line x1="158" y1="152" x2="412" y2="172" stroke="#FF9800" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="412" y1="172" x2="652" y2="165" stroke="#FF9800" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Connecting dashed lines between consecutive troughs -->
  <line x1="292" y1="348" x2="532" y2="350" stroke="#42d4f5" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- Cycle period labels between peaks -->
  <rect x="260" y="138" width="28" height="16" rx="3" fill="#1a1a2e" fill-opacity="0.7"/>
  <text x="274" y="150" text-anchor="middle" fill="#FF9800" font-size="11" font-weight="600">17</text>

  <rect x="508" y="148" width="28" height="16" rx="3" fill="#1a1a2e" fill-opacity="0.7"/>
  <text x="522" y="160" text-anchor="middle" fill="#FF9800" font-size="11" font-weight="600">19</text>

  <!-- Cycle period labels between troughs -->
  <rect x="395" y="362" width="28" height="16" rx="3" fill="#1a1a2e" fill-opacity="0.7"/>
  <text x="409" y="374" text-anchor="middle" fill="#42d4f5" font-size="11" font-weight="600">18</text>

  <!-- Projected next cycle -->
  <line x1="532" y1="350" x2="730" y2="305" stroke="#42d4f5" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>
  <rect x="612" y="348" width="28" height="16" rx="3" fill="#1a1a2e" fill-opacity="0.7"/>
  <text x="626" y="360" text-anchor="middle" fill="#42d4f5" font-size="11" font-weight="600">20</text>

  <!-- Dominant cycle annotation box -->
  <rect x="530" y="82" width="185" height="34" rx="5" fill="#1a1a2e" fill-opacity="0.88" stroke="#FF9800" stroke-width="1.2"/>
  <text x="622" y="98" text-anchor="middle" fill="#FF9800" font-size="11" font-weight="600">Dominant Cycle: 18 bars</text>
  <text x="622" y="110" text-anchor="middle" fill="#FF9800" font-size="8" opacity="0.6">avg of peak-to-peak intervals</text>

  <!-- Pointer from annotation to cycle label area -->
  <line x1="622" y1="116" x2="522" y2="148" stroke="#FF9800" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.4"/>

  <!-- Small amplitude variation annotation -->
  <rect x="100" y="82" width="140" height="24" rx="4" fill="#1a1a2e" fill-opacity="0.85" stroke="#42d4f5" stroke-width="0.8"/>
  <text x="170" y="98" text-anchor="middle" fill="#42d4f5" font-size="9">SMA-Detrended Price</text>

  <!-- Axis borders -->
  <line x1="80" y1="80" x2="80" y2="410" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="80" y1="410" x2="740" y2="410" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Legend bar -->
  <g transform="translate(60, 445)">
    <rect width="680" height="30" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="15" r="4" fill="#42d4f5"/>
    <text x="30" y="19" fill="#999" font-size="9">Detrended Price</text>
    <circle cx="145" cy="15" r="4" fill="#FF9800"/>
    <text x="155" y="19" fill="#999" font-size="9">Peak</text>
    <circle cx="200" cy="15" r="4" fill="#42d4f5" opacity="0.9"/>
    <text x="210" y="19" fill="#999" font-size="9">Trough</text>
    <line x1="265" y1="15" x2="290" y2="15" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="298" y="19" fill="#999" font-size="9">Dominant Cycle</text>
  </g>
</svg>
