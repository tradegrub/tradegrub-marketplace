  <rect x="634" y="368" width="12" height="22" fill="url(#barExtremeRight)" opacity="0.85"/>
  <rect x="647" y="374" width="12" height="16" fill="url(#barExtremeRight)" opacity="0.85"/>
  <rect x="660" y="378" width="12" height="12" fill="url(#barExtremeRight)" opacity="0.85"/>

  <!-- Vertical dashed lines at +/-2sigma -->
  <line x1="265" y1="80" x2="265" y2="390" stroke="#ffd93d" stroke-opacity="0.7" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="535" y1="80" x2="535" y2="390" stroke="#ffd93d" stroke-opacity="0.7" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="265" y="75" fill="#ffd93d" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" opacity="0.9">-2σ</text>
  <text x="535" y="75" fill="#ffd93d" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" opacity="0.9">+2σ</text>

  <!-- Vertical dashed lines at +/-3sigma -->
  <line x1="197" y1="80" x2="197" y2="390" stroke="#e17055" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="4,6"/>
  <line x1="603" y1="80" x2="603" y2="390" stroke="#e17055" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="4,6"/>
  <text x="197" y="75" fill="#e17055" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" opacity="0.9">-3σ</text>
  <text x="603" y="75" fill="#e17055" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" opacity="0.9">+3σ</text>

  <!-- Callout: Extreme Sell -->
  <text x="155" y="310" fill="#ff6b6b" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle" filter="url(#glow)">Extreme</text>
  <text x="155" y="324" fill="#ff6b6b" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle" filter="url(#glow)">Sell</text>
  <line x1="155" y1="330" x2="155" y2="355" stroke="#ff6b6b" stroke-opacity="0.5" stroke-width="1"/>
  <polygon points="152,355 155,362 158,355" fill="#ff6b6b" opacity="0.5"/>

  <!-- Callout: Normal Range -->
  <rect x="352" y="440" width="96" height="20" rx="3" fill="#2a9d8f" fill-opacity="0.2" stroke="#4ecdc4" stroke-opacity="0.4" stroke-width="1"/>
  <text x="400" y="454" fill="#4ecdc4" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Normal Range</text>
  <line x1="400" y1="440" x2="400" y2="395" stroke="#4ecdc4" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Callout: Extreme Buy -->
  <text x="640" y="310" fill="#e17055" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle" filter="url(#glow)">Extreme</text>
  <text x="640" y="324" fill="#e17055" font-family="Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle" filter="url(#glow)">Buy</text>
  <line x1="640" y1="330" x2="640" y2="355" stroke="#e17055" stroke-opacity="0.5" stroke-width="1"/>
  <polygon points="637,355 640,362 643,355" fill="#e17055" opacity="0.5"/>

  <!-- Current Bar marker (diamond at ~+1.8sigma) -->
  <polygon points="518,262 524,272 518,282 512,272" fill="#00ff88" stroke="#00ff88" stroke-width="1" filter="url(#glowStrong)"/>
  <text x="518" y="254" fill="#00ff88" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" filter="url(#glow)">Current</text>
  <text x="518" y="244" fill="#00ff88" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" opacity="0.8">+1.8σ</text>

  <!-- Title -->
  <text x="400" y="30" fill="#e0e0ff" font-family="Arial,sans-serif" font-size="17" font-weight="bold" text-anchor="middle" filter="url(#textShadow)">Normalized Return Extremes</text>
  <text x="400" y="48" fill="#8892b0" font-family="Arial,sans-serif" font-size="11" text-anchor="middle">tradegrub.finance</text>

  <!-- Legend bar at bottom -->
  <rect x="80" y="460" width="640" height="32" rx="6" fill="#0a0a1a" fill-opacity="0.6" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="110" y="471" width="10" height="10" rx="1" fill="url(#barNormal)"/>
  <text x="125" y="480" fill="#ccd6f6" font-family="Arial,sans-serif" font-size="10">Normal Returns</text>
  <rect x="240" y="471" width="10" height="10" rx="1" fill="#ff6b6b"/>
  <text x="255" y="480" fill="#ccd6f6" font-family="Arial,sans-serif" font-size="10">Extreme Returns</text>
  <line x1="385" y1="476" x2="405" y2="476" stroke="#ffd93d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="412" y="480" fill="#ccd6f6" font-family="Arial,sans-serif" font-size="10">σ Lines</text>
  <polygon points="500,471 504,476 500,481 496,476" fill="#00ff88"/>
  <text x="510" y="480" fill="#ccd6f6" font-family="Arial,sans-serif" font-size="10">Current Position</text>
