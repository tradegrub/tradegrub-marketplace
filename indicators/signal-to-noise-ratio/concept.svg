<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Signal to Noise Ratio</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <rect x="60" y="70" width="700" height="160" fill="rgba(255,255,255,0.02)" rx="4"/>
  <!-- Strong signal shading on price -->
  <rect x="140" y="70" width="120" height="160" fill="rgba(76,175,80,0.05)"/>
  <rect x="420" y="70" width="140" height="160" fill="rgba(76,175,80,0.05)"/>

  <g stroke-width="1.5">
    <line x1="100" y1="150" x2="100" y2="195" stroke="#EF5350"/><rect x="96" y="158" width="8" height="24" fill="#EF5350" rx="1"/>
    <line x1="140" y1="140" x2="140" y2="185" stroke="#4CAF50"/><rect x="136" y="145" width="8" height="26" fill="#4CAF50" rx="1"/>
    <line x1="180" y1="125" x2="180" y2="172" stroke="#4CAF50"/><rect x="176" y="130" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="220" y1="110" x2="220" y2="160" stroke="#4CAF50"/><rect x="216" y="115" width="8" height="30" fill="#4CAF50" rx="1"/>
    <line x1="260" y1="115" x2="260" y2="165" stroke="#EF5350"/><rect x="256" y="125" width="8" height="28" fill="#EF5350" rx="1"/>
    <line x1="300" y1="125" x2="300" y2="175" stroke="#EF5350"/><rect x="296" y="135" width="8" height="28" fill="#EF5350" rx="1"/>
    <line x1="340" y1="130" x2="340" y2="178" stroke="#4CAF50"/><rect x="336" y="135" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="380" y1="135" x2="380" y2="180" stroke="#EF5350"/><rect x="376" y="142" width="8" height="26" fill="#EF5350" rx="1"/>
    <line x1="420" y1="140" x2="420" y2="185" stroke="#4CAF50"/><rect x="416" y="145" width="8" height="26" fill="#4CAF50" rx="1"/>
    <line x1="460" y1="125" x2="460" y2="172" stroke="#4CAF50"/><rect x="456" y="130" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="500" y1="108" x2="500" y2="158" stroke="#4CAF50"/><rect x="496" y="112" width="8" height="30" fill="#4CAF50" rx="1"/>
    <line x1="540" y1="100" x2="540" y2="152" stroke="#4CAF50"/><rect x="536" y="105" width="8" height="30" fill="#4CAF50" rx="1"/>
    <line x1="580" y1="108" x2="580" y2="158" stroke="#EF5350"/><rect x="576" y="118" width="8" height="28" fill="#EF5350" rx="1"/>
    <line x1="620" y1="118" x2="620" y2="165" stroke="#EF5350"/><rect x="616" y="125" width="8" height="28" fill="#EF5350" rx="1"/>
    <line x1="660" y1="115" x2="660" y2="162" stroke="#4CAF50"/><rect x="656" y="120" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="700" y1="120" x2="700" y2="168" stroke="#EF5350"/><rect x="696" y="128" width="8" height="28" fill="#EF5350" rx="1"/>
  </g>

  <!-- Annotations -->
  <text x="195" y="88" fill="#4CAF50" font-family="Inter,sans-serif" font-size="9">Clean Trend</text>
  <text x="310" y="88" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">Choppy</text>
  <text x="475" y="88" fill="#4CAF50" font-family="Inter,sans-serif" font-size="9">Strong Signal</text>

  <!-- Separator -->
  <line x1="60" y1="245" x2="760" y2="245" stroke="#444" stroke-width="1"/>

  <!-- SNR subplot -->
  <rect x="60" y="255" width="700" height="180" fill="rgba(255,255,255,0.02)" rx="4"/>
  <rect x="140" y="255" width="120" height="180" fill="rgba(76,175,80,0.04)"/>
  <rect x="420" y="255" width="140" height="180" fill="rgba(76,175,80,0.04)"/>
  <text x="75" y="272" fill="#666" font-family="Inter,sans-serif" font-size="10">Signal Quality</text>

  <!-- Strong threshold -->
  <line x1="60" y1="320" x2="760" y2="320" stroke="#4CAF50" stroke-width="0.7" stroke-dasharray="6,4"/>
  <text x="765" y="324" fill="#4CAF50" font-family="Inter,sans-serif" font-size="9">1.5</text>

  <!-- Weak threshold -->
  <line x1="60" y1="400" x2="760" y2="400" stroke="#EF5350" stroke-width="0.7" stroke-dasharray="6,4"/>
  <text x="765" y="404" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">0.5</text>

  <!-- SNR line (blue) -->
  <polyline points="100,390 140,340 180,310 220,295 260,370 300,395 340,380 380,400 420,350 460,310 500,290 540,280 580,360 620,385 660,370 700,390" fill="none" stroke="#42A5F5" stroke-width="2"/>

  <!-- Efficiency (purple) -->
  <polyline points="100,395 140,350 180,320 220,305 260,380 300,400 340,390 380,405 420,360 460,325 500,300 540,290 580,370 620,390 660,380 700,395" fill="none" stroke="#AB47BC" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Legend -->
  <rect x="120" y="455" width="560" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="145" y1="470" x2="175" y2="470" stroke="#42A5F5" stroke-width="2"/>
  <text x="180" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="10">SNR</text>
  <line x1="240" y1="470" x2="270" y2="470" stroke="#AB47BC" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="275" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Efficiency</text>
  <line x1="380" y1="470" x2="410" y2="470" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="415" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Strong</text>
  <line x1="490" y1="470" x2="520" y2="470" stroke="#EF5350" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="525" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Weak</text>
</svg>