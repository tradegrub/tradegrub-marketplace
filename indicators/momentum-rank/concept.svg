  <rect x="411" y="260" width="20" height="133" fill="#ef5350" rx="2" opacity="0.8" filter="url(#glow)"/>
  <rect x="446" y="275" width="20" height="118" fill="#00e676" rx="2" opacity="0.7"/>
  <rect x="481" y="295" width="20" height="98" fill="#26a69a" rx="2" opacity="0.6"/>
