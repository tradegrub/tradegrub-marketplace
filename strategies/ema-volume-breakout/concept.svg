<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="breakoutGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">EMA Trend + Volume Breakout</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- EMA trend line (rising) -->
  <path d="M 80,300 Q 160,290 240,275 Q 320,258 400,242 Q 480,228 540,220 Q 600,218 660,215 Q 720,212 760,210" fill="none" stroke="#ff9800" stroke-width="2" opacity="0.7"/>
  <text x="762" y="207" fill="#ff9800" font-size="9">EMA(20)</text>

  <!-- Lookback channel high line -->
  <line x1="80" y1="240" x2="480" y2="185" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="85" y="235" fill="#42a5f5" font-size="9">Channel High</text>

  <!-- Candlesticks - consolidation then breakout -->
  <line x1="100" y1="268" x2="100" y2="300" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="275" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="130" y1="260" x2="130" y2="295" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="265" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="160" y1="255" x2="160" y2="288" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="262" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="190" y1="250" x2="190" y2="280" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="255" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="220" y1="245" x2="220" y2="275" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="250" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="250" y1="238" x2="250" y2="268" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="242" width="8" height="18" fill="#ef5350" rx="1"/>
  <!-- Tight range consolidation -->
  <line x1="280" y1="232" x2="280" y2="258" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="238" width="8" height="12" fill="#26a69a" rx="1"/>
  <line x1="310" y1="228" x2="310" y2="252" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="232" width="8" height="12" fill="#ef5350" rx="1"/>
  <line x1="340" y1="225" x2="340" y2="248" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="228" width="8" height="12" fill="#26a69a" rx="1"/>
  <line x1="370" y1="222" x2="370" y2="245" stroke="#ef5350" stroke-width="1"/>
  <rect x="366" y="225" width="8" height="12" fill="#ef5350" rx="1"/>
  <line x1="400" y1="218" x2="400" y2="242" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="222" width="8" height="12" fill="#26a69a" rx="1"/>
  <line x1="430" y1="215" x2="430" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="218" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="460" y1="210" x2="460" y2="238" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="215" width="8" height="15" fill="#26a69a" rx="1"/>

  <!-- BREAKOUT candle -->
  <line x1="500" y1="170" x2="500" y2="215" stroke="#00e676" stroke-width="1.5"/>
  <rect x="494" y="175" width="12" height="30" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- Breakout glow zone -->
  <rect x="490" y="165" width="270" height="40" fill="url(#breakoutGlow)" rx="4"/>

  <!-- Post-breakout -->
  <line x1="535" y1="160" x2="535" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="531" y="165" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="565" y1="150" x2="565" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="561" y="155" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="595" y1="145" x2="595" y2="178" stroke="#ef5350" stroke-width="1"/>
  <rect x="591" y="150" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="625" y1="140" x2="625" y2="172" stroke="#26a69a" stroke-width="1"/>
  <rect x="621" y="145" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="655" y1="135" x2="655" y2="165" stroke="#26a69a" stroke-width="1"/>
  <rect x="651" y="138" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- Entry line -->
  <line x1="500" y1="185" x2="700" y2="185" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="705" y="189" fill="#42a5f5" font-size="10">Entry</text>

  <!-- Stop loss -->
  <line x1="500" y1="230" x2="700" y2="230" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="705" y="234" fill="#ef5350" font-size="10">Stop Loss</text>

  <!-- Breakout arrow -->
  <g filter="url(#softGlow)">
    <polygon points="505,165 515,165 510,152" fill="#00e676"/>
  </g>
  <rect x="515" y="138" width="130" height="22" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="580" y="153" text-anchor="middle" fill="#00e676" font-size="11" font-weight="600">BREAKOUT + VOL</text>

  <!-- Three filter annotations -->
  <rect x="85" y="70" width="120" height="42" rx="4" fill="#ffffff" fill-opacity="0.05"/>
  <text x="95" y="85" fill="#bbb" font-size="9" font-weight="500">3 Filters Required:</text>
  <text x="95" y="98" fill="#ff9800" font-size="8">1. Price &gt; EMA (Trend)</text>
  <text x="95" y="108" fill="#42a5f5" font-size="8">2. Break Channel High</text>

  <!-- Volume panel -->
  <g opacity="0.5">
    <rect x="96" y="400" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="126" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="156" y="400" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="186" y="402" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="216" y="403" width="8" height="9" fill="#26a69a" rx="1"/>
    <rect x="246" y="405" width="8" height="7" fill="#ef5350" rx="1"/>
    <rect x="276" y="406" width="8" height="6" fill="#26a69a" rx="1"/>
    <rect x="306" y="407" width="8" height="5" fill="#ef5350" rx="1"/>
    <rect x="336" y="406" width="8" height="6" fill="#26a69a" rx="1"/>
    <rect x="366" y="407" width="8" height="5" fill="#ef5350" rx="1"/>
    <rect x="396" y="406" width="8" height="6" fill="#26a69a" rx="1"/>
    <rect x="426" y="405" width="8" height="7" fill="#26a69a" rx="1"/>
    <rect x="456" y="403" width="8" height="9" fill="#26a69a" rx="1"/>
  </g>
  <!-- Volume surge on breakout -->
  <rect x="494" y="370" width="12" height="42" fill="#00e676" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <!-- Avg volume line -->
  <line x1="80" y1="400" x2="700" y2="400" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="705" y="403" fill="#666" font-size="8">Avg Vol</text>
  <!-- Volume label -->
  <text x="475" y="368" fill="#00e676" font-size="8" font-weight="500">3. Vol Surge</text>
  <g opacity="0.4">
    <rect x="531" y="388" width="8" height="24" fill="#26a69a" rx="1"/>
    <rect x="561" y="390" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="591" y="395" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="621" y="393" width="8" height="19" fill="#26a69a" rx="1"/>
    <rect x="651" y="395" width="8" height="17" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">EMA Trend</text>
    <circle cx="120" cy="20" r="4" fill="#42a5f5"/>
    <text x="130" y="24" fill="#999" font-size="9">Channel High</text>
    <circle cx="230" cy="20" r="4" fill="#00e676"/>
    <text x="240" y="24" fill="#999" font-size="9">Breakout Signal</text>
    <rect x="360" y="12" width="20" height="16" fill="#00e676" opacity="0.5" rx="2"/>
    <text x="385" y="24" fill="#999" font-size="9">Volume Surge</text>
    <circle cx="480" cy="20" r="4" fill="#ef5350"/>
    <text x="490" y="24" fill="#999" font-size="9">Stop Loss</text>
  </g>
</svg>