<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Supertrend + ATR + Volume Filter</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price candles with Supertrend -->
  <!-- Bearish phase -->
  <line x1="100" y1="145" x2="100" y2="195" stroke="#ef5350" stroke-width="1"/>
  <rect x="96" y="155" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="130" y1="160" x2="130" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="168" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="160" y1="172" x2="160" y2="225" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="195" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="190" y1="182" x2="190" y2="238" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="192" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="220" y1="198" x2="220" y2="252" stroke="#ef5350" stroke-width="1"/>
  <rect x="216" y="208" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- ST flip candle (low volume - NO entry) -->
  <line x1="255" y1="205" x2="255" y2="260" stroke="#26a69a" stroke-width="1"/>
  <rect x="251" y="225" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- X mark - rejected -->
  <text x="255" y="198" text-anchor="middle" fill="#ef5350" font-size="14" font-weight="bold" opacity="0.8">X</text>
  <rect x="235" y="170" width="95" height="18" rx="4" fill="#ef5350" fill-opacity="0.1"/>
  <text x="282" y="183" text-anchor="middle" fill="#ef5350" font-size="8">No volume = rejected</text>

  <!-- Supertrend line bearish (above) -->
  <polyline points="100,135 130,148 160,162 190,175 220,190 255,200" fill="none" stroke="#ef5350" stroke-width="2" opacity="0.8"/>

  <!-- More candles - back bearish -->
  <line x1="290" y1="215" x2="290" y2="265" stroke="#ef5350" stroke-width="1"/>
  <rect x="286" y="225" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="320" y1="230" x2="320" y2="280" stroke="#ef5350" stroke-width="1"/>
  <rect x="316" y="238" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- ST flip with volume confirmation - VALID entry -->
  <line x1="355" y1="228" x2="355" y2="285" stroke="#00e676" stroke-width="1.5"/>
  <rect x="349" y="235" width="12" height="35" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- BUY arrow -->
  <g filter="url(#softGlow)">
    <polygon points="355,222 363,222 359,210" fill="#00e676"/>
  </g>
  <rect x="370" y="208" width="105" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="422" y="222" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY (confirmed)</text>

  <!-- Supertrend flip to bullish -->
  <polyline points="255,200 290,208 320,222 355,280 390,270 420,258 450,248 480,238 510,228 540,218" fill="none" stroke="#26a69a" stroke-width="2" opacity="0.8"/>

  <!-- Entry line -->
  <line x1="355" y1="235" x2="560" y2="235" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="565" y="238" fill="#42a5f5" font-size="9">Entry</text>

  <!-- Stop loss -->
  <line x1="355" y1="295" x2="560" y2="295" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="565" y="298" fill="#ef5350" font-size="9">Stop (ATR)</text>

  <!-- Uptrend candles -->
  <line x1="390" y1="218" x2="390" y2="262" stroke="#26a69a" stroke-width="1"/>
  <rect x="386" y="228" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="420" y1="205" x2="420" y2="248" stroke="#26a69a" stroke-width="1"/>
  <rect x="416" y="215" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="450" y1="192" x2="450" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="446" y="198" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="480" y1="178" x2="480" y2="222" stroke="#26a69a" stroke-width="1"/>
  <rect x="476" y="188" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="510" y1="165" x2="510" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="506" y="175" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Volume panel -->
  <line x1="80" y1="350" x2="740" y2="350" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  <text x="75" y="360" fill="#888" font-size="8" text-anchor="end">Vol</text>

  <!-- Volume avg line -->
  <line x1="80" y1="395" x2="580" y2="395" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="585" y="398" fill="#666" font-size="7">Avg x 1.2</text>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="96" y="392" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="126" y="388" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="156" y="400" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="186" y="393" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="216" y="395" width="8" height="15" fill="#ef5350" rx="1"/>
  </g>
  <!-- Low volume flip - small bar -->
  <rect x="251" y="405" width="8" height="5" fill="#26a69a" rx="1" opacity="0.5"/>
  <g opacity="0.5">
    <rect x="286" y="393" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="316" y="390" width="8" height="20" fill="#ef5350" rx="1"/>
  </g>
  <!-- Volume surge on valid flip -->
  <rect x="349" y="365" width="12" height="45" fill="#00e676" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <text x="340" y="362" fill="#00e676" font-size="8" text-anchor="end">Vol surge</text>
  <g opacity="0.4">
    <rect x="386" y="388" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="416" y="390" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="446" y="398" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="476" y="390" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="506" y="388" width="8" height="22" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Bullish ST</text>
    <circle cx="115" cy="20" r="4" fill="#ef5350"/>
    <text x="125" y="24" fill="#999" font-size="9">Bearish ST</text>
    <circle cx="210" cy="20" r="4" fill="#00e676"/>
    <text x="220" y="24" fill="#999" font-size="9">Volume Confirmed</text>
    <circle cx="345" cy="20" r="4" fill="#42a5f5"/>
    <text x="355" y="24" fill="#999" font-size="9">Entry / Stop</text>
    <rect x="455" y="12" width="20" height="16" fill="#00e676" opacity="0.5" rx="2"/>
    <text x="480" y="24" fill="#999" font-size="9">Volume Surge</text>
    <rect x="570" y="12" width="20" height="16" fill="#ef5350" opacity="0.3" rx="2"/>
    <text x="595" y="24" fill="#999" font-size="9">Rejected Flip</text>
  </g>
</svg>