<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSignal">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="obZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="osZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="60" x2="760" y2="60"/>
    <line x1="60" y1="105" x2="760" y2="105"/>
    <line x1="60" y1="150" x2="760" y2="150"/>
    <line x1="60" y1="195" x2="760" y2="195"/>
    <line x1="60" y1="240" x2="760" y2="240"/>
    <line x1="60" y1="310" x2="760" y2="310"/>
    <line x1="60" y1="350" x2="760" y2="350"/>
    <line x1="60" y1="390" x2="760" y2="390"/>
    <line x1="60" y1="430" x2="760" y2="430"/>
    <line x1="160" y1="50" x2="160" y2="435"/>
    <line x1="260" y1="50" x2="260" y2="435"/>
    <line x1="360" y1="50" x2="360" y2="435"/>
    <line x1="460" y1="50" x2="460" y2="435"/>
    <line x1="560" y1="50" x2="560" y2="435"/>
    <line x1="660" y1="50" x2="660" y2="435"/>
  </g>

  <!-- Divider between price and oscillator -->
  <line x1="60" y1="270" x2="760" y2="270" stroke="#475569" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="18" font-weight="bold">Internal Bar Strength</text>
  <text x="400" y="46" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Y-axis labels: price panel -->
  <text x="52" y="68" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">190</text>
  <text x="52" y="153" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">175</text>
  <text x="52" y="243" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">160</text>

  <!-- Y-axis labels: IBS panel -->
  <text x="52" y="288" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">1.0</text>
  <text x="52" y="316" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">0.8</text>
  <text x="52" y="370" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">0.5</text>
  <text x="52" y="416" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">0.2</text>
  <text x="52" y="438" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">0.0</text>

  <!-- Candlesticks (upper 60%: y 55-260) -->
