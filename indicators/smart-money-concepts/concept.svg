<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Smart Money Concepts</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Swing High level dashed -->
  <line x1="80" y1="120" x2="500" y2="120" stroke="#888" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="85" y="115" fill="#888" font-size="9">Prev Swing High</text>

  <!-- Swing Low level dashed -->
  <line x1="80" y1="320" x2="400" y2="320" stroke="#888" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="85" y="335" fill="#888" font-size="9">Prev Swing Low</text>

  <!-- Candlesticks - uptrend with pullback and BOS -->
  <!-- Candle 1 bullish -->
  <line x1="100" y1="280" x2="100" y2="340" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="295" width="8" height="30" fill="#26a69a" rx="1"/>
  <!-- Candle 2 bullish -->
  <line x1="135" y1="250" x2="135" y2="310" stroke="#26a69a" stroke-width="1"/>
  <rect x="131" y="260" width="8" height="35" fill="#26a69a" rx="1"/>
  <!-- Candle 3 bullish - swing high -->
  <line x1="170" y1="180" x2="170" y2="260" stroke="#26a69a" stroke-width="1"/>
  <rect x="166" y="195" width="8" height="45" fill="#26a69a" rx="1"/>
  <!-- Candle 4 bearish pullback -->
  <line x1="205" y1="210" x2="205" y2="290" stroke="#ef5350" stroke-width="1"/>
  <rect x="201" y="220" width="8" height="48" fill="#ef5350" rx="1"/>
  <!-- Candle 5 bearish -->
  <line x1="240" y1="240" x2="240" y2="310" stroke="#ef5350" stroke-width="1"/>
  <rect x="236" y="248" width="8" height="40" fill="#ef5350" rx="1"/>
  <!-- Candle 6 - swing low -->
  <line x1="275" y1="260" x2="275" y2="340" stroke="#ef5350" stroke-width="1"/>
  <rect x="271" y="275" width="8" height="42" fill="#ef5350" rx="1"/>

  <!-- FVG zone highlight between candle 6 and 8 -->
  <rect x="285" y="230" width="60" height="30" fill="#26a69a" fill-opacity="0.12" stroke="#26a69a" stroke-width="0.8" stroke-opacity="0.3" rx="2"/>
  <text x="315" y="225" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="500">FVG</text>

  <!-- Candle 7 bullish -->
  <line x1="310" y1="230" x2="310" y2="300" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="250" width="8" height="30" fill="#26a69a" rx="1"/>
  <!-- Candle 8 bullish strong -->
  <line x1="345" y1="190" x2="345" y2="265" stroke="#26a69a" stroke-width="1"/>
  <rect x="341" y="200" width="8" height="45" fill="#26a69a" rx="1"/>
  <!-- Candle 9 bullish -->
  <line x1="380" y1="160" x2="380" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="376" y="170" width="8" height="32" fill="#26a69a" rx="1"/>
  <!-- Candle 10 - BOS candle breaking above swing high -->
  <line x1="415" y1="100" x2="415" y2="175" stroke="#00e676" stroke-width="1.5"/>
  <rect x="409" y="108" width="12" height="50" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- BOS arrow and label -->
  <g filter="url(#softGlow)">
    <polygon points="420,95 430,95 425,82" fill="#00e676"/>
  </g>
  <rect x="435" y="78" width="100" height="22" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="485" y="93" text-anchor="middle" fill="#00e676" font-size="11" font-weight="600">BOS Up</text>

  <!-- Post-BOS candles -->
  <line x1="455" y1="95" x2="455" y2="140" stroke="#26a69a" stroke-width="1"/>
  <rect x="451" y="100" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="490" y1="88" x2="490" y2="130" stroke="#26a69a" stroke-width="1"/>
  <rect x="486" y="95" width="8" height="20" fill="#26a69a" rx="1"/>
  <!-- Pullback to FVG retest -->
  <line x1="525" y1="100" x2="525" y2="145" stroke="#ef5350" stroke-width="1"/>
  <rect x="521" y="108" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="560" y1="105" x2="560" y2="150" stroke="#ef5350" stroke-width="1"/>
  <rect x="556" y="115" width="8" height="22" fill="#ef5350" rx="1"/>

  <!-- Bearish FVG zone on right side -->
  <rect x="570" y="135" width="55" height="25" fill="#ef5350" fill-opacity="0.12" stroke="#ef5350" stroke-width="0.8" stroke-opacity="0.3" rx="2"/>
  <text x="598" y="132" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="500">Bear FVG</text>

  <!-- Recovery candles -->
  <line x1="595" y1="95" x2="595" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="591" y="105" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="630" y1="85" x2="630" y2="125" stroke="#26a69a" stroke-width="1"/>
  <rect x="626" y="90" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="665" y1="80" x2="665" y2="115" stroke="#26a69a" stroke-width="1"/>
  <rect x="661" y="85" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- BOS Down annotation on bearish break -->
  <rect x="250" y="348" width="90" height="20" rx="4" fill="#ef5350" fill-opacity="0.12" stroke="#ef5350" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="295" y="362" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="500">BOS Down risk</text>

  <!-- Structure annotation -->
  <path d="M 170,175 C 170,160 195,155 210,160" fill="none" stroke="#888" stroke-width="1"/>
  <rect x="210" y="150" width="80" height="18" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="250" y="163" text-anchor="middle" fill="#bbb" font-size="9">Swing Structure</text>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="96" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="131" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="166" y="388" width="8" height="27" fill="#26a69a" rx="1"/>
    <rect x="201" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="236" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="271" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="306" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="341" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="376" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
  </g>
  <rect x="409" y="378" width="12" height="37" fill="#00e676" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="451" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="486" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="521" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="556" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="591" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="626" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="661" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#00e676"/>
    <text x="30" y="24" fill="#999" font-size="9">BOS Signal</text>
    <circle cx="120" cy="20" r="4" fill="#26a69a"/>
    <text x="130" y="24" fill="#999" font-size="9">Bullish FVG</text>
    <circle cx="230" cy="20" r="4" fill="#ef5350"/>
    <text x="240" y="24" fill="#999" font-size="9">Bearish FVG</text>
    <circle cx="340" cy="20" r="4" fill="#888"/>
    <text x="350" y="24" fill="#999" font-size="9">Swing Structure</text>
    <rect x="460" y="12" width="20" height="16" fill="#00e676" opacity="0.5" rx="2"/>
    <text x="485" y="24" fill="#999" font-size="9">Volume Surge</text>
  </g>
</svg>