<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Fair Value Gap Detector</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="370" fill="rgba(255,255,255,0.02)" rx="4"/>

  <!-- Bullish FVG example -->
  <text x="200" y="100" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="12" opacity="0.8">Bullish FVG</text>

  <!-- Candle 1 -->
  <line x1="140" y1="300" x2="140" y2="360" stroke="#666" stroke-width="1"/>
  <rect x="136" y="320" width="8" height="30" fill="#ff5252" rx="1"/>
  <text x="140" y="380" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="9">C1</text>
  <!-- High of C1 marker -->
  <line x1="130" y1="300" x2="150" y2="300" stroke="#00e676" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- Candle 2 (impulse) -->
  <line x1="180" y1="340" x2="180" y2="220" stroke="#666" stroke-width="1"/>
  <rect x="176" y="240" width="8" height="80" fill="#4CAF50" rx="1"/>
  <text x="180" y="380" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="9">C2</text>

  <!-- Candle 3 -->
  <line x1="220" y1="270" x2="220" y2="200" stroke="#666" stroke-width="1"/>
  <rect x="216" y="210" width="8" height="40" fill="#4CAF50" rx="1"/>
  <text x="220" y="380" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="9">C3</text>
  <!-- Low of C3 marker -->
  <line x1="210" y1="270" x2="230" y2="270" stroke="#00e676" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- FVG zone box -->
  <rect x="130" y="270" width="160" height="30" fill="rgba(0,230,118,0.08)" stroke="rgba(0,230,118,0.4)" stroke-width="1.5" rx="2"/>
  <text x="210" y="288" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="10" font-weight="600">GAP</text>

  <!-- Brace showing gap -->
  <line x1="250" y1="270" x2="260" y2="270" stroke="#00e676" stroke-width="1"/>
  <line x1="260" y1="270" x2="260" y2="300" stroke="#00e676" stroke-width="1"/>
  <line x1="250" y1="300" x2="260" y2="300" stroke="#00e676" stroke-width="1"/>
  <text x="268" y="288" fill="#00e676" font-family="Inter,sans-serif" font-size="9">FVG</text>

  <!-- Bearish FVG example -->
  <text x="550" y="100" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="12" opacity="0.8">Bearish FVG</text>

  <!-- Candle 1 -->
  <line x1="480" y1="150" x2="480" y2="220" stroke="#666" stroke-width="1"/>
  <rect x="476" y="160" width="8" height="40" fill="#4CAF50" rx="1"/>
  <!-- Low of C1 -->
  <line x1="470" y1="220" x2="490" y2="220" stroke="#ff1744" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- Candle 2 (impulse down) -->
  <line x1="520" y1="180" x2="520" y2="320" stroke="#666" stroke-width="1"/>
  <rect x="516" y="200" width="8" height="100" fill="#ff5252" rx="1"/>

  <!-- Candle 3 -->
  <line x1="560" y1="260" x2="560" y2="340" stroke="#666" stroke-width="1"/>
  <rect x="556" y="280" width="8" height="40" fill="#ff5252" rx="1"/>
  <!-- High of C3 -->
  <line x1="550" y1="260" x2="570" y2="260" stroke="#ff1744" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- FVG zone box -->
  <rect x="470" y="220" width="160" height="40" fill="rgba(255,23,68,0.08)" stroke="rgba(255,23,68,0.4)" stroke-width="1.5" rx="2"/>
  <text x="550" y="244" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="10" font-weight="600">GAP</text>

  <!-- Legend -->
  <rect x="200" y="455" width="400" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <rect x="220" y="466" width="16" height="10" fill="rgba(0,230,118,0.15)" stroke="rgba(0,230,118,0.5)" stroke-width="1" rx="1"/>
  <text x="242" y="475" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bull FVG</text>
  <rect x="330" y="466" width="16" height="10" fill="rgba(255,23,68,0.15)" stroke="rgba(255,23,68,0.5)" stroke-width="1" rx="1"/>
  <text x="352" y="475" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bear FVG</text>
</svg>
