<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pulseGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="430"/><line x1="160" y1="60" x2="160" y2="430"/>
    <line x1="240" y1="60" x2="240" y2="430"/><line x1="320" y1="60" x2="320" y2="430"/>
    <line x1="400" y1="60" x2="400" y2="430"/><line x1="480" y1="60" x2="480" y2="430"/>
    <line x1="560" y1="60" x2="560" y2="430"/><line x1="640" y1="60" x2="640" y2="430"/>
    <line x1="720" y1="60" x2="720" y2="430"/>
    <line x1="60" y1="100" x2="750" y2="100"/><line x1="60" y1="150" x2="750" y2="150"/>
    <line x1="60" y1="200" x2="750" y2="200"/><line x1="60" y1="250" x2="750" y2="250"/>
    <line x1="60" y1="300" x2="750" y2="300"/><line x1="60" y1="350" x2="750" y2="350"/>
    <line x1="60" y1="400" x2="750" y2="400"/>
  </g>

  <!-- Regime background shading -->
  <!-- Trending zone 1: candles 1-10 (x: 70-290) -->
  <rect x="70" y="60" width="220" height="370" fill="rgba(0,255,0,0.05)"/>
  <!-- Mean-reverting zone: candles 11-20 (x: 290-510) -->
  <rect x="290" y="60" width="220" height="370" fill="rgba(128,0,255,0.05)"/>
  <!-- Trending zone 2: candles 21-30 (x: 510-730) -->
  <rect x="510" y="60" width="220" height="370" fill="rgba(0,255,0,0.05)"/>

  <!-- Regime transition lines -->
  <line x1="290" y1="60" x2="290" y2="430" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="510" y1="60" x2="510" y2="430" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Regime labels -->
  <text x="180" y="75" fill="#44ff88" font-size="10" text-anchor="middle" opacity="0.7">Trending</text>
  <text x="400" y="75" fill="#aa66ff" font-size="10" text-anchor="middle" opacity="0.7">Mean-Reverting</text>
  <text x="620" y="75" fill="#44ff88" font-size="10" text-anchor="middle" opacity="0.7">Trending</text>

  <!-- Candlesticks - 30 candles, spacing ~22px -->
  <!-- Trending up section (1-10) -->
  <line x1="82" y1="340" x2="82" y2="310" stroke="#888" stroke-width="1"/>
  <rect x="77" y="320" width="10" height="15" fill="#00c853" rx="1"/>
  <line x1="104" y1="330" x2="104" y2="295" stroke="#888" stroke-width="1"/>
  <rect x="99" y="305" width="10" height="18" fill="#00c853" rx="1"/>
  <line x1="126" y1="315" x2="126" y2="280" stroke="#888" stroke-width="1"/>
  <rect x="121" y="290" width="10" height="16" fill="#00c853" rx="1"/>
  <line x1="148" y1="300" x2="148" y2="262" stroke="#888" stroke-width="1"/>
  <rect x="143" y="270" width="10" height="20" fill="#00c853" rx="1"/>
  <line x1="170" y1="280" x2="170" y2="248" stroke="#888" stroke-width="1"/>
  <rect x="165" y="255" width="10" height="18" fill="#00c853" rx="1"/>
  <line x1="192" y1="265" x2="192" y2="230" stroke="#888" stroke-width="1"/>
  <rect x="187" y="238" width="10" height="20" fill="#00c853" rx="1"/>
  <line x1="214" y1="250" x2="214" y2="215" stroke="#888" stroke-width="1"/>
  <rect x="209" y="222" width="10" height="22" fill="#00c853" rx="1"/>
