    <rect x="128" y="435" width="6" height="23" rx="1"/>
    <rect x="148" y="432" width="6" height="26" rx="1"/>
    <rect x="168" y="428" width="6" height="30" rx="1"/>
    <rect x="188" y="426" width="6" height="32" rx="1"/>
    <rect x="208" y="424" width="6" height="34" rx="1"/>
    <rect x="228" y="430" width="6" height="28" rx="1"/>
    <rect x="248" y="440" width="6" height="18" rx="1"/>
    <rect x="268" y="445" width="6" height="13" rx="1"/>
    <rect x="288" y="448" width="6" height="10" rx="1"/>
    <rect x="308" y="450" width="6" height="8" rx="1"/>
    <rect x="328" y="448" width="6" height="10" rx="1"/>
    <rect x="348" y="442" width="6" height="16" rx="1"/>
    <rect x="368" y="436" width="6" height="22" rx="1"/>
    <rect x="388" y="430" width="6" height="28" rx="1"/>
    <rect x="408" y="426" width="6" height="32" rx="1"/>
    <rect x="428" y="432" width="6" height="26" rx="1"/>
    <rect x="448" y="440" width="6" height="18" rx="1"/>
    <rect x="468" y="444" width="6" height="14" rx="1"/>
    <rect x="488" y="448" width="6" height="10" rx="1"/>
    <rect x="508" y="442" width="6" height="16" rx="1"/>
    <rect x="528" y="435" width="6" height="23" rx="1"/>
    <rect x="548" y="430" width="6" height="28" rx="1"/>
    <rect x="568" y="426" width="6" height="32" rx="1"/>
    <rect x="588" y="424" width="6" height="34" rx="1"/>
    <rect x="608" y="425" width="6" height="33" rx="1"/>
    <rect x="628" y="430" width="6" height="28" rx="1"/>
    <rect x="648" y="440" width="6" height="18" rx="1"/>
    <rect x="668" y="443" width="6" height="15" rx="1"/>
    <rect x="688" y="442" width="6" height="16" rx="1"/>
    <rect x="708" y="438" width="6" height="20" rx="1"/>
  </g>

  <!-- Regime labels on chart -->
  <g font-size="9" font-weight="600">
    <rect x="140" y="78" width="48" height="16" fill="#26a69a" rx="3" opacity="0.8"/>
    <text x="164" y="90" fill="white" text-anchor="middle">Bullish</text>
    <rect x="355" y="110" width="48" height="16" fill="#ef5350" rx="3" opacity="0.8"/>
    <text x="379" y="122" fill="white" text-anchor="middle">Bearish</text>
    <rect x="530" y="130" width="48" height="16" fill="#26a69a" rx="3" opacity="0.8"/>
    <text x="554" y="142" fill="white" text-anchor="middle">Bullish</text>
  </g>

  <!-- Legend -->
  <g transform="translate(100, 488)" font-size="10">
    <line x1="0" y1="-4" x2="20" y2="-4" stroke="#26a69a" stroke-width="2"/>
    <text x="25" y="0" fill="#aaa">Bullish Prob</text>
    <line x1="130" y1="-4" x2="150" y2="-4" stroke="#ef5350" stroke-width="2"/>
    <text x="155" y="0" fill="#aaa">Bearish Prob</text>
    <rect x="260" y="-8" width="12" height="8" fill="#ff9800" opacity="0.6" rx="1"/>
    <text x="278" y="0" fill="#aaa">Confidence</text>
    <rect x="370" y="-8" width="12" height="8" fill="#26a69a" opacity="0.15" rx="1"/>
    <rect x="370" y="-8" width="12" height="8" stroke="#26a69a" stroke-width="0.5" fill="none" rx="1"/>
    <text x="388" y="0" fill="#aaa">High Confidence Zones</text>
