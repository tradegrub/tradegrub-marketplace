<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bbFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="290"/><line x1="200" y1="60" x2="200" y2="290"/>
    <line x1="320" y1="60" x2="320" y2="290"/><line x1="440" y1="60" x2="440" y2="290"/>
    <line x1="560" y1="60" x2="560" y2="290"/><line x1="680" y1="60" x2="680" y2="290"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">MACD + Bollinger Bands Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price panel (top 60%) -->
  <!-- BB fill -->
  <path d="M80,85 Q200,80 320,90 Q440,75 560,85 Q640,78 740,82 L740,255 Q640,270 560,260 Q440,272 320,262 Q200,275 80,265 Z" fill="url(#bbFill)"/>

  <!-- BB Upper -->
  <path d="M80,85 Q200,80 320,90 Q440,75 560,85 Q640,78 740,82" fill="none" stroke="#42a5f5" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- BB Basis -->
  <path d="M80,170 Q200,165 320,172 Q440,162 560,168 Q640,160 740,165" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.6"/>
  <text x="745" y="168" fill="#42a5f5" font-size="9">BB Basis</text>

  <!-- BB Lower -->
  <path d="M80,265 Q200,275 320,262 Q440,272 560,260 Q640,270 740,255" fill="none" stroke="#42a5f5" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Candlesticks in price panel -->
  <line x1="100" y1="155" x2="100" y2="200" stroke="#ef5350" stroke-width="1"/>
  <rect x="96" y="162" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="130" y1="170" x2="130" y2="220" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="180" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="160" y1="195" x2="160" y2="250" stroke="#ef5350" stroke-width="1"/>
  <rect x="156" y="205" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="190" y1="210" x2="190" y2="270" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="220" width="8" height="35" fill="#ef5350" rx="1"/>

  <!-- BUY signal - MACD cross up + price below basis -->
  <line x1="220" y1="225" x2="220" y2="275" stroke="#00e676" stroke-width="1.5"/>
  <rect x="214" y="232" width="12" height="30" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="218,222 228,222 223,209" fill="#00e676"/>
  </g>
  <rect x="232" y="205" width="85" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="274" y="219" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">BUY LONG</text>

  <!-- Price below basis annotation -->
  <rect x="235" y="235" width="95" height="16" rx="3" fill="#ffffff" fill-opacity="0.06"/>
  <text x="282" y="247" text-anchor="middle" fill="#bbb" font-size="8">Price &lt; BB Basis</text>

  <!-- Recovery candles -->
  <line x1="260" y1="200" x2="260" y2="245" stroke="#26a69a" stroke-width="1"/>
  <rect x="256" y="208" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="290" y1="175" x2="290" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="286" y="182" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="320" y1="155" x2="320" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="316" y="162" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="350" y1="135" x2="350" y2="175" stroke="#26a69a" stroke-width="1"/>
  <rect x="346" y="142" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="380" y1="120" x2="380" y2="158" stroke="#26a69a" stroke-width="1"/>
  <rect x="376" y="128" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="410" y1="108" x2="410" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="406" y="115" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="440" y1="115" x2="440" y2="160" stroke="#ef5350" stroke-width="1"/>
  <rect x="436" y="122" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="470" y1="130" x2="470" y2="175" stroke="#ef5350" stroke-width="1"/>
  <rect x="466" y="138" width="8" height="25" fill="#ef5350" rx="1"/>

  <!-- SHORT signal - MACD cross down + price above basis -->
  <line x1="500" y1="125" x2="500" y2="170" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="494" y="130" width="12" height="28" fill="#ef5350" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="498,178 508,178 503,191" fill="#ef5350"/>
  </g>
  <rect x="512" y="180" width="90" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="557" y="194" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">SELL SHORT</text>

  <!-- Price above basis annotation -->
  <rect x="512" y="140" width="95" height="16" rx="3" fill="#ffffff" fill-opacity="0.06"/>
  <text x="559" y="152" text-anchor="middle" fill="#bbb" font-size="8">Price &gt; BB Basis</text>

  <!-- Continuation candles -->
  <line x1="540" y1="145" x2="540" y2="190" stroke="#ef5350" stroke-width="1"/>
  <rect x="536" y="152" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="570" y1="162" x2="570" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="566" y="172" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="600" y1="180" x2="600" y2="228" stroke="#26a69a" stroke-width="1"/>
  <rect x="596" y="192" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="630" y1="195" x2="630" y2="240" stroke="#ef5350" stroke-width="1"/>
  <rect x="626" y="205" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="660" y1="210" x2="660" y2="252" stroke="#26a69a" stroke-width="1"/>
  <rect x="656" y="218" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="690" y1="195" x2="690" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="686" y="205" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="720" y1="178" x2="720" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="716" y="185" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Separator line -->
  <line x1="60" y1="295" x2="760" y2="295" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="310" fill="#888" font-size="9">MACD</text>

  <!-- MACD panel (bottom 30%) -->
  <!-- Zero line -->
  <line x1="80" y1="370" x2="740" y2="370" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="745" y="373" fill="#666" font-size="8">0</text>

  <!-- MACD Line -->
  <path d="M100,385 Q140,390 180,395 Q220,398 240,390 Q260,375 290,355 Q320,340 350,330 Q380,325 410,328 Q440,340 470,355 Q500,370 520,380 Q540,388 560,392 Q580,390 600,382 Q620,375 640,368 Q660,360 680,355 Q700,352 720,355" fill="none" stroke="#42a5f5" stroke-width="1.5"/>

  <!-- Signal Line -->
  <path d="M100,382 Q140,385 180,390 Q220,395 240,395 Q260,388 290,370 Q320,352 350,340 Q380,332 410,330 Q440,335 470,345 Q500,360 520,375 Q540,385 560,390 Q580,392 600,388 Q620,382 640,375 Q660,368 680,362 Q700,358 720,360" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- MACD Histogram bars -->
  <g opacity="0.5">
    <rect x="98" y="370" width="6" height="15" fill="#ef5350" rx="1"/>
    <rect x="128" y="370" width="6" height="18" fill="#ef5350" rx="1"/>
    <rect x="158" y="370" width="6" height="22" fill="#ef5350" rx="1"/>
    <rect x="188" y="370" width="6" height="25" fill="#ef5350" rx="1"/>
  </g>

  <!-- MACD crossover point - bullish -->
  <circle cx="225" cy="393" r="5" fill="none" stroke="#00e676" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="225" y="410" text-anchor="middle" fill="#00e676" font-size="8">Cross Up</text>

  <g opacity="0.5">
    <rect x="218" y="355" width="6" height="15" fill="#26a69a" rx="1"/>
    <rect x="248" y="342" width="6" height="28" fill="#26a69a" rx="1"/>
    <rect x="278" y="335" width="6" height="35" fill="#26a69a" rx="1"/>
    <rect x="308" y="330" width="6" height="40" fill="#26a69a" rx="1"/>
    <rect x="338" y="328" width="6" height="42" fill="#26a69a" rx="1"/>
    <rect x="368" y="330" width="6" height="40" fill="#26a69a" rx="1"/>
    <rect x="398" y="340" width="6" height="30" fill="#26a69a" rx="1"/>
    <rect x="428" y="355" width="6" height="15" fill="#26a69a" rx="1"/>
  </g>

  <!-- MACD crossover point - bearish -->
  <circle cx="490" cy="378" r="5" fill="none" stroke="#ef5350" stroke-width="1.5" filter="url(#softGlow)"/>
  <text x="490" y="410" text-anchor="middle" fill="#ef5350" font-size="8">Cross Down</text>

  <g opacity="0.5">
    <rect x="488" y="370" width="6" height="10" fill="#ef5350" rx="1"/>
    <rect x="518" y="370" width="6" height="15" fill="#ef5350" rx="1"/>
    <rect x="548" y="370" width="6" height="18" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">MACD / BB Bands</text>
    <circle cx="145" cy="20" r="4" fill="#ff9800"/>
    <text x="155" y="24" fill="#999" font-size="9">MACD Signal</text>
    <circle cx="260" cy="20" r="4" fill="#00e676"/>
    <text x="270" y="24" fill="#999" font-size="9">Bullish Cross + Below Basis</text>
    <circle cx="440" cy="20" r="4" fill="#ef5350"/>
    <text x="450" y="24" fill="#999" font-size="9">Bearish Cross + Above Basis</text>
  </g>
</svg>