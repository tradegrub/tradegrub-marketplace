<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Variance Ratio Test</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart area -->
  <rect x="60" y="70" width="700" height="160" fill="rgba(255,255,255,0.02)" rx="4"/>
  <!-- Candlesticks -->
  <line x1="100" y1="120" x2="100" y2="180" stroke="#666" stroke-width="1"/>
  <rect x="96" y="130" width="8" height="30" fill="#4CAF50"/>
  <line x1="160" y1="110" x2="160" y2="175" stroke="#666" stroke-width="1"/>
  <rect x="156" y="115" width="8" height="40" fill="#4CAF50"/>
  <line x1="220" y1="100" x2="220" y2="170" stroke="#666" stroke-width="1"/>
  <rect x="216" y="105" width="8" height="35" fill="#4CAF50"/>
  <line x1="280" y1="95" x2="280" y2="160" stroke="#666" stroke-width="1"/>
  <rect x="276" y="100" width="8" height="40" fill="#4CAF50"/>
  <!-- Trending section highlighted -->
  <rect x="80" y="70" width="230" height="160" fill="rgba(102,187,106,0.06)" rx="2"/>
  <text x="195" y="88" text-anchor="middle" fill="#66BB6A" font-family="Inter,sans-serif" font-size="10">TRENDING</text>

  <line x1="340" y1="130" x2="340" y2="190" stroke="#666" stroke-width="1"/>
  <rect x="336" y="140" width="8" height="30" fill="#EF5350"/>
  <line x1="400" y1="135" x2="400" y2="185" stroke="#666" stroke-width="1"/>
  <rect x="396" y="145" width="8" height="25" fill="#4CAF50"/>
  <line x1="460" y1="140" x2="460" y2="180" stroke="#666" stroke-width="1"/>
  <rect x="456" y="145" width="8" height="20" fill="#EF5350"/>
  <line x1="520" y1="138" x2="520" y2="182" stroke="#666" stroke-width="1"/>
  <rect x="516" y="142" width="8" height="25" fill="#4CAF50"/>
  <!-- Mean reverting section -->
  <rect x="320" y="70" width="230" height="160" fill="rgba(239,83,80,0.06)" rx="2"/>
  <text x="435" y="88" text-anchor="middle" fill="#EF5350" font-family="Inter,sans-serif" font-size="10">MEAN REVERTING</text>

  <line x1="580" y1="130" x2="580" y2="190" stroke="#666" stroke-width="1"/>
  <rect x="576" y="135" width="8" height="35" fill="#EF5350"/>
  <line x1="640" y1="140" x2="640" y2="200" stroke="#666" stroke-width="1"/>
  <rect x="636" y="150" width="8" height="30" fill="#EF5350"/>
  <line x1="700" y1="150" x2="700" y2="210" stroke="#666" stroke-width="1"/>
  <rect x="696" y="155" width="8" height="35" fill="#EF5350"/>

  <!-- VR subplot -->
  <rect x="60" y="260" width="700" height="170" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="75" y="278" fill="#999" font-family="Inter,sans-serif" font-size="10">Variance Ratio</text>
  <!-- Reference lines -->
  <line x1="60" y1="310" x2="760" y2="310" stroke="#66BB6A" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="765" y="314" fill="#66BB6A" font-family="Inter,sans-serif" font-size="9">1.5</text>
  <line x1="60" y1="345" x2="760" y2="345" stroke="#888" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="765" y="349" fill="#888" font-family="Inter,sans-serif" font-size="9">1.0</text>
  <line x1="60" y1="380" x2="760" y2="380" stroke="#EF5350" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="765" y="384" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">0.5</text>

  <!-- VR line -->
  <polyline points="100,300 160,295 220,305 280,308 340,360 400,385 460,390 520,375 580,350 640,345 700,340" fill="none" stroke="#42A5F5" stroke-width="2"/>

  <!-- Legend -->
  <rect x="60" y="455" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <circle cx="100" cy="470" r="4" fill="#42A5F5"/>
  <text x="110" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Variance Ratio</text>
  <circle cx="250" cy="470" r="4" fill="#66BB6A"/>
  <text x="260" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Trending (>1.5)</text>
  <circle cx="400" cy="470" r="4" fill="#EF5350"/>
  <text x="410" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Mean Reverting (<0.5)</text>
  <circle cx="580" cy="470" r="4" fill="#888"/>
  <text x="590" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Random Walk (1.0)</text>
</svg>