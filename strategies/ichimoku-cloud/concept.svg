<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bullCloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26a69a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#26a69a" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="bearCloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef5350" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Ichimoku Cloud Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Kumo (Cloud) - bearish then bullish -->
  <!-- Bearish cloud (Senkou A below Senkou B) -->
  <polygon points="80,230 140,240 200,248 260,252 320,250 320,210 260,215 200,218 140,215 80,210" fill="url(#bearCloud)"/>
  <!-- Cloud twist zone -->
  <polygon points="320,250 380,238 380,232 320,210" fill="url(#bearCloud)" opacity="0.5"/>
  <!-- Bullish cloud (Senkou A above Senkou B) -->
  <polygon points="380,232 440,220 500,210 560,205 620,208 680,215 740,218 740,245 680,240 620,238 560,235 500,238 440,242 380,238" fill="url(#bullCloud)"/>

  <!-- Senkou Span A -->
  <path d="M 80,210 Q 140,215 200,218 Q 260,215 320,210 Q 380,232 440,220 Q 500,210 560,205 Q 620,208 680,215 L 740,218" fill="none" stroke="#26a69a" stroke-width="1.5" opacity="0.6"/>
  <text x="745" y="215" fill="#26a69a" font-size="8">Span A</text>

  <!-- Senkou Span B -->
  <path d="M 80,230 Q 140,240 200,248 Q 260,252 320,250 Q 380,238 440,242 Q 500,238 560,235 Q 620,238 680,240 L 740,245" fill="none" stroke="#ef5350" stroke-width="1.5" opacity="0.6"/>
  <text x="745" y="242" fill="#ef5350" font-size="8">Span B</text>

  <!-- Cloud twist annotation -->
  <circle cx="350" cy="232" r="22" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="350" y="270" text-anchor="middle" fill="#ff9800" font-size="8">Cloud Twist</text>

  <!-- Tenkan-sen (fast) -->
  <path d="M 80,280 Q 120,290 160,298 Q 200,300 240,295 Q 280,282 320,265 Q 360,248 400,232 Q 440,218 480,208 Q 520,200 560,198 Q 600,202 640,210 Q 680,222 720,230" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.8"/>
  <text x="725" y="227" fill="#42a5f5" font-size="9">Tenkan</text>

  <!-- Kijun-sen (slow) -->
  <path d="M 80,275 Q 140,285 200,292 Q 260,295 320,285 Q 380,268 420,255 Q 460,242 500,232 Q 540,225 580,222 Q 620,225 660,232 Q 700,240 740,248" fill="none" stroke="#ef5350" stroke-width="2" opacity="0.8"/>
  <text x="745" y="245" fill="#ef5350" font-size="9">Kijun</text>

  <!-- Candlesticks -->
  <!-- Below cloud (bearish) -->
  <line x1="100" y1="278" x2="100" y2="312" stroke="#ef5350" stroke-width="1"/>
  <rect x="96" y="285" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="130" y1="288" x2="130" y2="322" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="295" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="160" y1="295" x2="160" y2="328" stroke="#ef5350" stroke-width="1"/>
  <rect x="156" y="300" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="190" y1="298" x2="190" y2="330" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="308" width="8" height="12" fill="#26a69a" rx="1"/>
  <line x1="220" y1="290" x2="220" y2="322" stroke="#ef5350" stroke-width="1"/>
  <rect x="216" y="295" width="8" height="18" fill="#ef5350" rx="1"/>
  <!-- Approaching cloud -->
  <line x1="250" y1="275" x2="250" y2="308" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="282" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="280" y1="260" x2="280" y2="295" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="268" width="8" height="18" fill="#26a69a" rx="1"/>
  <!-- Through cloud -->
  <line x1="310" y1="245" x2="310" y2="280" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="250" width="8" height="20" fill="#26a69a" rx="1"/>

  <!-- TK Cross inside/above cloud = BUY -->
  <line x1="350" y1="228" x2="350" y2="262" stroke="#00e676" stroke-width="1.5"/>
  <rect x="344" y="232" width="12" height="22" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- TK crossover annotation -->
  <g filter="url(#softGlow)">
    <polygon points="350,222 360,222 355,210" fill="#00e676"/>
  </g>
  <rect x="365" y="195" width="125" height="22" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="427" y="210" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">TK Cross + Cloud</text>

  <!-- Above cloud candles (bullish trend) -->
  <line x1="390" y1="215" x2="390" y2="248" stroke="#26a69a" stroke-width="1"/>
  <rect x="386" y="220" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="420" y1="205" x2="420" y2="238" stroke="#26a69a" stroke-width="1"/>
  <rect x="416" y="210" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="450" y1="198" x2="450" y2="228" stroke="#ef5350" stroke-width="1"/>
  <rect x="446" y="202" width="8" height="16" fill="#ef5350" rx="1"/>
  <line x1="480" y1="190" x2="480" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="476" y="195" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="510" y1="185" x2="510" y2="212" stroke="#26a69a" stroke-width="1"/>
  <rect x="506" y="188" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="540" y1="182" x2="540" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="536" y="185" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="570" y1="185" x2="570" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="566" y="190" width="8" height="16" fill="#ef5350" rx="1"/>
  <line x1="600" y1="192" x2="600" y2="222" stroke="#ef5350" stroke-width="1"/>
  <rect x="596" y="198" width="8" height="16" fill="#ef5350" rx="1"/>
  <line x1="630" y1="200" x2="630" y2="232" stroke="#ef5350" stroke-width="1"/>
  <rect x="626" y="208" width="8" height="16" fill="#ef5350" rx="1"/>
  <line x1="660" y1="212" x2="660" y2="242" stroke="#ef5350" stroke-width="1"/>
  <rect x="656" y="218" width="8" height="16" fill="#ef5350" rx="1"/>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="400" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="126" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="156" y="400" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="186" y="403" width="8" height="9" fill="#26a69a" rx="1"/>
    <rect x="216" y="400" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="246" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="276" y="395" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="306" y="393" width="8" height="19" fill="#26a69a" rx="1"/>
  </g>
  <rect x="344" y="382" width="12" height="30" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.35">
    <rect x="386" y="395" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="416" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="446" y="400" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="476" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="506" y="400" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="536" y="402" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="566" y="400" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="596" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="626" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="656" y="400" width="8" height="12" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">Tenkan-sen</text>
    <circle cx="120" cy="20" r="4" fill="#ef5350"/>
    <text x="130" y="24" fill="#999" font-size="9">Kijun-sen</text>
    <rect x="210" y="14" width="20" height="12" fill="#26a69a" opacity="0.3" rx="2"/>
    <text x="235" y="24" fill="#999" font-size="9">Bullish Cloud</text>
    <rect x="330" y="14" width="20" height="12" fill="#ef5350" opacity="0.3" rx="2"/>
    <text x="355" y="24" fill="#999" font-size="9">Bearish Cloud</text>
    <circle cx="460" cy="20" r="4" fill="#00e676"/>
    <text x="470" y="24" fill="#999" font-size="9">TK Cross Signal</text>
    <circle cx="580" cy="20" r="4" fill="#ff9800"/>
    <text x="590" y="24" fill="#999" font-size="9">Cloud Twist</text>
  </g>
</svg>