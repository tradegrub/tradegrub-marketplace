<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Volume Profile Distribution</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Left side: Volume profile histogram (horizontal bars) -->
  <!-- Range high and low lines -->
  <line x1="80" y1="85" x2="280" y2="85" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="285" y="89" fill="#888" font-size="8">Range High</text>

  <line x1="80" y1="380" x2="280" y2="380" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="285" y="384" fill="#888" font-size="8">Range Low</text>

  <!-- Mid price line -->
  <line x1="80" y1="232" x2="280" y2="232" stroke="#ff9800" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="285" y="236" fill="#ff9800" font-size="8">Mid Price</text>

  <!-- Volume histogram bars (horizontal, varying lengths) -->
  <!-- Above mid = bullish volume, below mid = bearish volume -->
  <rect x="80" y="90" width="35" height="18" fill="#26a69a" fill-opacity="0.15" rx="1"/>
  <rect x="80" y="110" width="55" height="18" fill="#26a69a" fill-opacity="0.2" rx="1"/>
  <rect x="80" y="130" width="85" height="18" fill="#26a69a" fill-opacity="0.25" rx="1"/>
  <rect x="80" y="150" width="120" height="18" fill="#26a69a" fill-opacity="0.35" rx="1"/>
  <rect x="80" y="170" width="160" height="18" fill="#26a69a" fill-opacity="0.45" rx="1"/>
  <rect x="80" y="190" width="180" height="18" fill="#26a69a" fill-opacity="0.55" rx="1"/>
  <rect x="80" y="210" width="150" height="18" fill="#26a69a" fill-opacity="0.4" rx="1"/>
  <!-- Below mid -->
  <rect x="80" y="235" width="130" height="18" fill="#ef5350" fill-opacity="0.35" rx="1"/>
  <rect x="80" y="255" width="100" height="18" fill="#ef5350" fill-opacity="0.3" rx="1"/>
  <rect x="80" y="275" width="70" height="18" fill="#ef5350" fill-opacity="0.25" rx="1"/>
  <rect x="80" y="295" width="50" height="18" fill="#ef5350" fill-opacity="0.2" rx="1"/>
  <rect x="80" y="315" width="90" height="18" fill="#ef5350" fill-opacity="0.28" rx="1"/>
  <rect x="80" y="335" width="60" height="18" fill="#ef5350" fill-opacity="0.2" rx="1"/>
  <rect x="80" y="355" width="30" height="18" fill="#ef5350" fill-opacity="0.12" rx="1"/>

  <!-- Skew Up annotation -->
  <rect x="100" y="185" width="65" height="16" rx="3" fill="#26a69a" fill-opacity="0.15" stroke="#26a69a" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="132" y="196" text-anchor="middle" fill="#26a69a" font-size="8" font-weight="500">Heavy Above</text>

  <!-- Right side: Price chart with ratio oscillator -->
  <!-- Price candles -->
  <line x1="370" y1="260" x2="370" y2="310" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="270" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="400" y1="245" x2="400" y2="290" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="252" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="430" y1="228" x2="430" y2="272" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="235" width="8" height="24" fill="#26a69a" rx="1"/>
  <line x1="460" y1="210" x2="460" y2="250" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="218" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="490" y1="195" x2="490" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="486" y="202" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="520" y1="180" x2="520" y2="218" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="185" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="550" y1="170" x2="550" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="175" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="580" y1="162" x2="580" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="168" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="610" y1="155" x2="610" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="606" y="160" width="8" height="15" fill="#ef5350" rx="1"/>
  <line x1="640" y1="148" x2="640" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="636" y="153" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="670" y1="142" x2="670" y2="170" stroke="#26a69a" stroke-width="1"/>
  <rect x="666" y="147" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="700" y1="138" x2="700" y2="165" stroke="#ef5350" stroke-width="1"/>
  <rect x="696" y="142" width="8" height="14" fill="#ef5350" rx="1"/>

  <!-- Mid price overlay on chart -->
  <line x1="360" y1="232" x2="720" y2="150" stroke="#ff9800" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- Volume Ratio oscillator panel (bottom, y 330-420) -->
  <text x="540" y="325" text-anchor="middle" fill="#bbb" font-size="10" font-weight="500">Volume Ratio (Above/Total %)</text>

  <!-- Skew Up threshold -->
  <line x1="360" y1="348" x2="720" y2="348" stroke="#26a69a" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>
  <text x="725" y="352" fill="#26a69a" font-size="7">70 (Bullish)</text>

  <!-- Skew Down threshold -->
  <line x1="360" y1="398" x2="720" y2="398" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>
  <text x="725" y="402" fill="#ef5350" font-size="7">30 (Bearish)</text>

  <!-- 50 line -->
  <line x1="360" y1="372" x2="720" y2="372" stroke="#888" stroke-width="0.5" stroke-dasharray="2,4" opacity="0.2"/>

  <!-- Ratio line - bullish bias rising -->
  <polyline points="370,388 400,378 430,365 460,352 490,345 520,355 550,348 580,342 610,350 640,345 670,340 700,348" stroke="#42a5f5" stroke-width="2" fill="none"/>

  <!-- Bullish zone fill -->
  <rect x="445" y="335" width="100" height="18" fill="#26a69a" fill-opacity="0.06" rx="3"/>
  <rect x="565" y="335" width="130" height="18" fill="#26a69a" fill-opacity="0.06" rx="3"/>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="366" y="408" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="396" y="405" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="426" y="403" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="456" y="400" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="486" y="398" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="516" y="403" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="546" y="400" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="576" y="402" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="606" y="405" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="636" y="403" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="666" y="400" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="696" y="405" width="8" height="15" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Vol Above Mid</text>
    <circle cx="140" cy="20" r="4" fill="#ef5350"/>
    <text x="150" y="24" fill="#999" font-size="9">Vol Below Mid</text>
    <circle cx="260" cy="20" r="4" fill="#42a5f5"/>
    <text x="270" y="24" fill="#999" font-size="9">Volume Ratio</text>
    <circle cx="375" cy="20" r="4" fill="#ff9800"/>
    <text x="385" y="24" fill="#999" font-size="9">Mid Price</text>
    <text x="490" y="24" fill="#888" font-size="9">Above 70 = Bullish Skew</text>
  </g>
</svg>