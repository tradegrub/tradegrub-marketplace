  <rect x="627" y="248" width="10" height="20" fill="#ff1744" rx="1"/>
  <line x1="654" y1="298" x2="654" y2="262" stroke="#888" stroke-width="1"/>
  <rect x="649" y="268" width="10" height="22" fill="#ff1744" rx="1"/>
  <line x1="676" y1="318" x2="676" y2="282" stroke="#888" stroke-width="1"/>
