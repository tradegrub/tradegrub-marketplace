<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="600">Swing Failure Pattern</text>
  <text x="400" y="56" text-anchor="middle" fill="#666688" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="80" y1="100" x2="720" y2="100"/>
    <line x1="80" y1="150" x2="720" y2="150"/>
    <line x1="80" y1="200" x2="720" y2="200"/>
    <line x1="80" y1="250" x2="720" y2="250"/>
    <line x1="80" y1="300" x2="720" y2="300"/>
    <line x1="80" y1="350" x2="720" y2="350"/>
    <line x1="80" y1="400" x2="720" y2="400"/>
    <line x1="150" y1="75" x2="150" y2="420"/>
    <line x1="250" y1="75" x2="250" y2="420"/>
    <line x1="350" y1="75" x2="350" y2="420"/>
    <line x1="450" y1="75" x2="450" y2="420"/>
    <line x1="550" y1="75" x2="550" y2="420"/>
    <line x1="650" y1="75" x2="650" y2="420"/>
  </g>

  <!-- Prior Swing High dotted line -->
  <line x1="80" y1="160" x2="720" y2="160" stroke="#888899" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="725" y="164" fill="#888899" font-size="9" opacity="0.7">Prior High</text>

  <!-- Price zigzag - uptrend to first swing high -->
  <polyline points="100,380 160,320 200,350 260,280 310,310 370,160" fill="none" stroke="#4fc3f7" stroke-width="2.5" filter="url(#glow)" stroke-linejoin="round"/>

  <!-- Pullback from first high -->
  <polyline points="370,160 420,260 460,290" fill="none" stroke="#4fc3f7" stroke-width="2.5" filter="url(#glow)" stroke-linejoin="round"/>

  <!-- Rally back up - sweeps above prior high -->
  <polyline points="460,290 500,230 530,200 555,140" fill="none" stroke="#4fc3f7" stroke-width="2.5" filter="url(#glow)" stroke-linejoin="round"/>

  <!-- Failure / reversal portion in red -->
  <polyline points="555,140 570,180 590,250 620,330 660,380 700,400" fill="none" stroke="#e53935" stroke-width="2.5" filter="url(#glow)" stroke-linejoin="round"/>

  <!-- First swing high marker -->
  <circle cx="370" cy="160" r="4" fill="#4fc3f7" opacity="0.8"/>
  <text x="370" y="148" text-anchor="middle" fill="#4fc3f7" font-size="10" opacity="0.8">Swing High</text>

  <!-- Sweep zone highlight -->
  <rect x="540" y="130" width="30" height="30" fill="#4fc3f7" opacity="0.06" rx="3"/>

  <!-- Sweep arrow pointing up -->
  <line x1="555" y1="125" x2="555" y2="105" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <defs>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4fc3f7"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e53935"/>
    </marker>
  </defs>
  <text x="555" y="98" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="600">Sweep</text>

  <!-- Failure arrow pointing down -->
  <line x1="600" y1="220" x2="600" y2="270" stroke="#e53935" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <text x="600" y="212" text-anchor="middle" fill="#e53935" font-size="11" font-weight="600">Failure</text>

  <!-- Liquidity Grab callout box -->
  <rect x="480" y="82" width="105" height="22" fill="none" stroke="#ffb74d" stroke-width="1" rx="3" opacity="0.8"/>
  <text x="532" y="97" text-anchor="middle" fill="#ffb74d" font-size="10" font-weight="600">Liquidity Grab</text>
  <line x1="532" y1="104" x2="555" y2="130" stroke="#ffb74d" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- Legend bar -->
  <g transform="translate(0,455)">
    <rect x="200" y="0" width="400" height="28" fill="#0d0d1a" rx="4" opacity="0.5"/>
    <rect x="220" y="9" width="10" height="10" fill="#4fc3f7" rx="2"/>
    <text x="236" y="18" fill="#aaaacc" font-size="10">Price</text>
    <rect x="290" y="9" width="10" height="10" fill="#e53935" rx="2"/>
    <text x="306" y="18" fill="#aaaacc" font-size="10">Reversal</text>
    <line x1="380" y1="14" x2="400" y2="14" stroke="#888899" stroke-width="0.8" stroke-dasharray="4,4"/>
    <text x="406" y="18" fill="#aaaacc" font-size="10">Prior High</text>
    <rect x="480" y="9" width="10" height="10" fill="none" stroke="#ffb74d" stroke-width="1" rx="2"/>
    <text x="496" y="18" fill="#aaaacc" font-size="10">Callout</text>
  </g>
</svg>