<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Premium Discount Zones</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Premium zone (top) -->
  <rect x="70" y="80" width="670" height="110" fill="#ff1744" fill-opacity="0.05" rx="2"/>
  <text x="755" y="135" fill="#ff1744" font-family="Inter,sans-serif" font-size="10" font-weight="600">PREMIUM</text>

  <!-- Equilibrium zone (middle) -->
  <rect x="70" y="190" width="670" height="60" fill="#ffffff" fill-opacity="0.02" rx="2"/>
  <text x="755" y="222" fill="#888" font-family="Inter,sans-serif" font-size="9">EQ</text>

  <!-- Discount zone (bottom) -->
  <rect x="70" y="250" width="670" height="120" fill="#00e676" fill-opacity="0.05" rx="2"/>
  <text x="755" y="310" fill="#00e676" font-family="Inter,sans-serif" font-size="10" font-weight="600">DISCOUNT</text>

  <!-- Range high line -->
  <line x1="70" y1="80" x2="740" y2="80" stroke="#ff1744" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="48" y="84" fill="#ff1744" font-family="Inter,sans-serif" font-size="8">High</text>

  <!-- Equilibrium line -->
  <line x1="70" y1="220" x2="740" y2="220" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="6,4"/>
  <text x="48" y="224" fill="#888" font-family="Inter,sans-serif" font-size="8">EQ</text>

  <!-- EQ band -->
  <line x1="70" y1="190" x2="740" y2="190" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.15"/>
  <line x1="70" y1="250" x2="740" y2="250" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Range low line -->
  <line x1="70" y1="370" x2="740" y2="370" stroke="#00e676" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="48" y="374" fill="#00e676" font-family="Inter,sans-serif" font-size="8">Low</text>

  <!-- Candlesticks oscillating through zones -->
  <line x1="100" y1="280" x2="100" y2="340" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="290" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="130" y1="260" x2="130" y2="320" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="268" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="160" y1="220" x2="160" y2="280" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="228" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="190" y1="180" x2="190" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="188" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="220" y1="140" x2="220" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="148" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="250" y1="100" x2="250" y2="160" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="108" width="8" height="30" fill="#26a69a" rx="1"/>

  <!-- Premium label -->
  <rect x="260" y="92" width="60" height="16" rx="3" fill="rgba(255,23,68,0.3)"/>
  <text x="290" y="104" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="8" font-weight="600">Premium</text>

  <!-- Reversal from premium -->
  <line x1="280" y1="95" x2="280" y2="150" stroke="#ef5350" stroke-width="1"/>
  <rect x="276" y="105" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="310" y1="120" x2="310" y2="180" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="130" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="340" y1="155" x2="340" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="165" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="370" y1="190" x2="370" y2="250" stroke="#ef5350" stroke-width="1"/>
  <rect x="366" y="200" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="400" y1="230" x2="400" y2="290" stroke="#ef5350" stroke-width="1"/>
  <rect x="396" y="240" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="430" y1="270" x2="430" y2="330" stroke="#ef5350" stroke-width="1"/>
  <rect x="426" y="280" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="460" y1="300" x2="460" y2="360" stroke="#ef5350" stroke-width="1"/>
  <rect x="456" y="310" width="8" height="30" fill="#ef5350" rx="1"/>

  <!-- Discount label -->
  <rect x="470" y="348" width="60" height="16" rx="3" fill="rgba(0,230,118,0.3)"/>
  <text x="500" y="360" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="8" font-weight="600">Discount</text>

  <!-- Bounce from discount -->
  <line x1="490" y1="310" x2="490" y2="365" stroke="#26a69a" stroke-width="1"/>
  <rect x="486" y="318" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="520" y1="280" x2="520" y2="340" stroke="#26a69a" stroke-width="1"/>
  <rect x="516" y="288" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="550" y1="250" x2="550" y2="310" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="258" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="580" y1="220" x2="580" y2="275" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="228" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="610" y1="195" x2="610" y2="248" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="202" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="640" y1="175" x2="640" y2="225" stroke="#ef5350" stroke-width="1"/>
  <rect x="636" y="182" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="670" y1="165" x2="670" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="666" y="172" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="700" y1="155" x2="700" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="696" y="162" width="8" height="25" fill="#26a69a" rx="1"/>

  <!-- Legend -->
  <g transform="translate(80, 440)">
    <rect width="640" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <rect x="15" y="12" width="20" height="16" fill="#ff1744" fill-opacity="0.2" rx="2"/>
    <text x="40" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Premium Zone</text>
    <rect x="150" y="12" width="20" height="16" fill="#00e676" fill-opacity="0.2" rx="2"/>
    <text x="175" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Discount Zone</text>
    <line x1="300" y1="20" x2="320" y2="20" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="4,3"/>
    <text x="325" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Equilibrium</text>
    <line x1="430" y1="20" x2="450" y2="20" stroke="#ff1744" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="455" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Range High</text>
    <line x1="540" y1="20" x2="560" y2="20" stroke="#00e676" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="565" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Range Low</text>
  </g>
</svg>
