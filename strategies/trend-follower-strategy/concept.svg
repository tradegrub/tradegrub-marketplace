<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="380"/><line x1="200" y1="60" x2="200" y2="380"/>
    <line x1="320" y1="60" x2="320" y2="380"/><line x1="440" y1="60" x2="440" y2="380"/>
    <line x1="560" y1="60" x2="560" y2="380"/><line x1="680" y1="60" x2="680" y2="380"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Trend Follower Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Candlesticks: 28 candles - downtrend with supertrend above, flip, uptrend with supertrend below, flip again -->
  <!-- Downtrend phase (candles 1-9) -->
  <line x1="85" y1="135" x2="85" y2="172" stroke="#ef5350" stroke-width="1"/>
  <rect x="81" y="142" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="110" y1="148" x2="110" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="106" y="155" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="135" y1="160" x2="135" y2="198" stroke="#ef5350" stroke-width="1"/>
  <rect x="131" y="168" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="160" y1="172" x2="160" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="156" y="180" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="185" y1="185" x2="185" y2="222" stroke="#ef5350" stroke-width="1"/>
  <rect x="181" y="192" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="210" y1="198" x2="210" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="206" y="205" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="235" y1="210" x2="235" y2="248" stroke="#ef5350" stroke-width="1"/>
  <rect x="231" y="218" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="260" y1="222" x2="260" y2="258" stroke="#26a69a" stroke-width="1"/>
  <rect x="256" y="235" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="285" y1="228" x2="285" y2="262" stroke="#ef5350" stroke-width="1"/>
  <rect x="281" y="232" width="8" height="18" fill="#ef5350" rx="1"/>

  <!-- Flip point / uptrend (candles 10-21) -->
  <line x1="310" y1="218" x2="310" y2="252" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="228" width="8" height="15" fill="#26a69a" rx="1"/>
