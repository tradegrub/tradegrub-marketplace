<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="vaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9800" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff9800" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Volume Profile POC</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Volume histogram on left side (horizontal bars) -->
  <text x="55" y="78" fill="#888" font-size="9" transform="rotate(-90,55,78)">Volume at Price</text>

  <!-- Histogram bars - bell curve distribution -->
  <rect x="80" y="82" width="18" height="14" fill="#42a5f5" fill-opacity="0.15" rx="1"/>
  <rect x="80" y="98" width="30" height="14" fill="#42a5f5" fill-opacity="0.2" rx="1"/>
  <rect x="80" y="114" width="45" height="14" fill="#42a5f5" fill-opacity="0.25" rx="1"/>
  <rect x="80" y="130" width="65" height="14" fill="#42a5f5" fill-opacity="0.3" rx="1"/>
  <rect x="80" y="146" width="90" height="14" fill="#42a5f5" fill-opacity="0.35" rx="1"/>
  <rect x="80" y="162" width="115" height="14" fill="#42a5f5" fill-opacity="0.4" rx="1"/>
  <rect x="80" y="178" width="140" height="14" fill="#42a5f5" fill-opacity="0.5" rx="1"/>
  <!-- POC row - highest volume -->
  <rect x="80" y="194" width="175" height="14" fill="#ff9800" fill-opacity="0.7" rx="1" filter="url(#softGlow)"/>
  <rect x="80" y="210" width="148" height="14" fill="#42a5f5" fill-opacity="0.5" rx="1"/>
  <rect x="80" y="226" width="125" height="14" fill="#42a5f5" fill-opacity="0.4" rx="1"/>
  <rect x="80" y="242" width="100" height="14" fill="#42a5f5" fill-opacity="0.35" rx="1"/>
  <rect x="80" y="258" width="75" height="14" fill="#42a5f5" fill-opacity="0.3" rx="1"/>
  <rect x="80" y="274" width="55" height="14" fill="#42a5f5" fill-opacity="0.25" rx="1"/>
  <rect x="80" y="290" width="38" height="14" fill="#42a5f5" fill-opacity="0.2" rx="1"/>
  <rect x="80" y="306" width="22" height="14" fill="#42a5f5" fill-opacity="0.15" rx="1"/>
  <rect x="80" y="322" width="12" height="14" fill="#42a5f5" fill-opacity="0.1" rx="1"/>

  <!-- Value Area fill -->
  <rect x="260" y="148" width="490" height="88" fill="url(#vaFill)" rx="3"/>

  <!-- VAH line -->
  <line x1="260" y1="148" x2="750" y2="148" stroke="#42a5f5" stroke-width="1.2" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="755" y="152" fill="#42a5f5" font-size="9" font-weight="500">VAH</text>

  <!-- POC line -->
  <line x1="260" y1="200" x2="750" y2="200" stroke="#ff9800" stroke-width="2" opacity="0.8" filter="url(#softGlow)"/>
  <text x="755" y="204" fill="#ff9800" font-size="9" font-weight="600">POC</text>

  <!-- VAL line -->
  <line x1="260" y1="236" x2="750" y2="236" stroke="#42a5f5" stroke-width="1.2" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="755" y="240" fill="#42a5f5" font-size="9" font-weight="500">VAL</text>

  <!-- Price candles oscillating around POC -->
  <line x1="280" y1="168" x2="280" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="178" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="310" y1="158" x2="310" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="165" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="340" y1="145" x2="340" y2="190" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="150" width="8" height="28" fill="#ef5350" rx="1"/>
  <!-- Bounce off VAH -->
  <line x1="370" y1="155" x2="370" y2="200" stroke="#ef5350" stroke-width="1"/>
  <rect x="366" y="162" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="400" y1="172" x2="400" y2="218" stroke="#ef5350" stroke-width="1"/>
  <rect x="396" y="180" width="8" height="25" fill="#ef5350" rx="1"/>
  <!-- Return to POC -->
  <line x1="430" y1="185" x2="430" y2="228" stroke="#ef5350" stroke-width="1"/>
  <rect x="426" y="192" width="8" height="22" fill="#ef5350" rx="1"/>

  <!-- POC magnet annotation -->
  <path d="M 440,200 C 455,195 460,188 455,180" fill="none" stroke="#ff9800" stroke-width="1" opacity="0.5"/>
  <rect x="445" y="168" width="88" height="18" rx="4" fill="#ff9800" fill-opacity="0.12" stroke="#ff9800" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="489" y="181" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="500">Price to POC</text>

  <line x1="460" y1="188" x2="460" y2="225" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="198" width="8" height="16" fill="#26a69a" rx="1"/>
  <!-- Drop to VAL -->
  <line x1="490" y1="205" x2="490" y2="248" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="212" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="520" y1="218" x2="520" y2="260" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="225" width="8" height="25" fill="#ef5350" rx="1"/>

  <!-- Bounce off VAL -->
  <rect x="530" y="246" width="55" height="18" rx="4" fill="#26a69a" fill-opacity="0.12" stroke="#26a69a" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="558" y="259" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="500">VAL Hold</text>

  <line x1="550" y1="215" x2="550" y2="252" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="225" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="580" y1="200" x2="580" y2="238" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="208" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="610" y1="188" x2="610" y2="222" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="195" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="640" y1="178" x2="640" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="636" y="182" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="670" y1="170" x2="670" y2="202" stroke="#26a69a" stroke-width="1"/>
  <rect x="666" y="175" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="700" y1="165" x2="700" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="696" y="170" width="8" height="16" fill="#26a69a" rx="1"/>

  <!-- Value Area annotation -->
  <text x="355" y="138" text-anchor="middle" fill="#42a5f5" font-size="9" opacity="0.7">Value Area (70% of Volume)</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="276" y="395" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="306" y="392" width="8" height="21" fill="#26a69a" rx="1"/>
    <rect x="336" y="390" width="8" height="23" fill="#ef5350" rx="1"/>
    <rect x="366" y="393" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="396" y="395" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="426" y="398" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="456" y="400" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="486" y="397" width="8" height="16" fill="#ef5350" rx="1"/>
    <rect x="516" y="395" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="546" y="393" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="576" y="395" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="606" y="397" width="8" height="16" fill="#26a69a" rx="1"/>
    <rect x="636" y="400" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="666" y="398" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="696" y="400" width="8" height="13" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">Point of Control</text>
    <circle cx="145" cy="20" r="4" fill="#42a5f5"/>
    <text x="155" y="24" fill="#999" font-size="9">VAH / VAL</text>
    <rect x="240" y="12" width="20" height="16" fill="#ff9800" opacity="0.2" rx="2"/>
    <text x="265" y="24" fill="#999" font-size="9">Value Area</text>
    <rect x="345" y="12" width="20" height="16" fill="#42a5f5" opacity="0.3" rx="2"/>
    <text x="370" y="24" fill="#999" font-size="9">Vol Histogram</text>
    <text x="490" y="24" fill="#888" font-size="9">POC = Fair Value Magnet</text>
  </g>
</svg>