    <rect x="480" y="112" width="280" height="14" fill="#0d1137"/>

    <!-- Row 5 -->
    <rect x="60" y="126" width="100" height="14" fill="#0d1137"/>
    <rect x="160" y="126" width="56" height="14" fill="#1a1150"/>
    <rect x="216" y="126" width="70" height="14" fill="#3d2680"/>
    <rect x="286" y="126" width="56" height="14" fill="#5c3d99"/>
    <rect x="342" y="126" width="70" height="14" fill="#3d2680"/>
    <rect x="412" y="126" width="56" height="14" fill="#1a1150"/>
