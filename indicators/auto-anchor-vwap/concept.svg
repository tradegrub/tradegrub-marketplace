<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="600">Auto-Anchor VWAP</text>

  <!-- Price line -->
  <polyline points="80,300 120,280 160,250 200,200 240,160 270,120 300,140 340,170 380,190 420,220 460,260 500,300 530,330 560,360 580,340 600,310 640,280 680,250 720,230"
    fill="none" stroke="#e2e8f0" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Swing high dot -->
  <circle cx="270" cy="120" r="6" fill="#ef5350" stroke="#ef5350" stroke-width="2"/>
  <text x="270" y="105" text-anchor="middle" fill="#ef5350" font-size="11" font-weight="500">Swing High</text>

  <!-- Swing low dot -->
  <circle cx="560" cy="360" r="6" fill="#26a69a" stroke="#26a69a" stroke-width="2"/>
  <text x="560" y="390" text-anchor="middle" fill="#26a69a" font-size="11" font-weight="500">Swing Low</text>

  <!-- Standard VWAP (blue) - runs full width -->
  <polyline points="80,310 120,295 160,275 200,255 240,240 280,230 320,225 360,225 400,230 440,240 480,252 520,265 560,275 600,278 640,275 680,268 720,260"
    fill="none" stroke="#2196F3" stroke-width="2" stroke-linejoin="round" opacity="0.9"/>

  <!-- VWAP from swing high (red) - starts at swing high point -->
  <polyline points="270,120 300,145 340,175 380,195 420,215 460,240 500,265 540,290 580,305 620,310 660,308 700,300 720,295"
    fill="none" stroke="#ef5350" stroke-width="2" stroke-linejoin="round" opacity="0.85"/>

  <!-- VWAP from swing low (green) - starts at swing low point -->
  <polyline points="560,360 580,345 600,325 640,300 680,278 720,260"
    fill="none" stroke="#26a69a" stroke-width="2" stroke-linejoin="round" opacity="0.85"/>

  <!-- Legend -->
  <line x1="100" y1="440" x2="130" y2="440" stroke="#2196F3" stroke-width="2"/>
  <text x="140" y="444" fill="#2196F3" font-size="12">Standard VWAP</text>

  <line x1="280" y1="440" x2="310" y2="440" stroke="#ef5350" stroke-width="2"/>
  <text x="320" y="444" fill="#ef5350" font-size="12">VWAP from Swing High</text>

  <line x1="500" y1="440" x2="530" y2="440" stroke="#26a69a" stroke-width="2"/>
  <text x="540" y="444" fill="#26a69a" font-size="12">VWAP from Swing Low</text>

  <!-- Axis labels -->
  <text x="400" y="475" text-anchor="middle" fill="#787b86" font-size="12">Time</text>
</svg>
