<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Wave Phase Coherence</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="360" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="88" fill="#888" font-family="Inter,sans-serif" font-size="10">Coherence / Magnitude</text>

  <!-- Zero line -->
  <line x1="60" y1="250" x2="760" y2="250" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Constructive bg highlights -->
  <rect x="150" y="70" width="80" height="360" fill="rgba(38,166,154,0.06)"/>
  <rect x="500" y="70" width="100" height="360" fill="rgba(239,83,80,0.06)"/>

  <!-- Coherence line -->
  <polyline points="100,250 150,220 200,180 250,200 300,240 350,260 400,250 450,270 500,300 550,320 600,280 650,250 700,240"
    fill="none" stroke="#26A69A" stroke-width="2.5"/>

  <!-- Magnitude line -->
  <polyline points="100,230 150,190 200,150 250,170 300,210 350,200 400,220 450,190 500,160 550,140 600,180 650,220 700,230"
    fill="none" stroke="#7E57C2" stroke-width="2"/>

  <!-- Legend -->
  <rect x="60" y="460" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="475" x2="110" y2="475" stroke="#26A69A" stroke-width="2.5"/>
  <text x="115" y="479" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Coherence</text>
  <line x1="250" y1="475" x2="280" y2="475" stroke="#7E57C2" stroke-width="2"/>
  <text x="285" y="479" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Magnitude</text>
</svg>
