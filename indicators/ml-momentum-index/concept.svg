<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">ML Momentum Index</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <rect x="60" y="70" width="700" height="150" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="88" fill="#888" font-family="Inter,sans-serif" font-size="10">Price</text>
  <line x1="100" y1="130" x2="100" y2="180" stroke="#555" stroke-width="1"/><rect x="96" y="135" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="150" y1="120" x2="150" y2="170" stroke="#555" stroke-width="1"/><rect x="146" y="125" width="8" height="28" fill="#4CAF50" rx="1"/>
  <line x1="200" y1="110" x2="200" y2="160" stroke="#555" stroke-width="1"/><rect x="196" y="115" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="250" y1="105" x2="250" y2="155" stroke="#555" stroke-width="1"/><rect x="246" y="108" width="8" height="28" fill="#4CAF50" rx="1"/>
  <line x1="300" y1="100" x2="300" y2="150" stroke="#555" stroke-width="1"/><rect x="296" y="110" width="8" height="30" fill="#f44336" rx="1"/>
  <line x1="350" y1="110" x2="350" y2="165" stroke="#555" stroke-width="1"/><rect x="346" y="120" width="8" height="32" fill="#f44336" rx="1"/>
  <line x1="400" y1="120" x2="400" y2="175" stroke="#555" stroke-width="1"/><rect x="396" y="130" width="8" height="30" fill="#f44336" rx="1"/>
  <line x1="450" y1="130" x2="450" y2="180" stroke="#555" stroke-width="1"/><rect x="446" y="135" width="8" height="28" fill="#f44336" rx="1"/>
  <line x1="500" y1="125" x2="500" y2="175" stroke="#555" stroke-width="1"/><rect x="496" y="128" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="550" y1="115" x2="550" y2="165" stroke="#555" stroke-width="1"/><rect x="546" y="118" width="8" height="28" fill="#4CAF50" rx="1"/>
  <line x1="600" y1="105" x2="600" y2="155" stroke="#555" stroke-width="1"/><rect x="596" y="108" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="650" y1="100" x2="650" y2="148" stroke="#555" stroke-width="1"/><rect x="646" y="103" width="8" height="26" fill="#4CAF50" rx="1"/>
  <line x1="700" y1="95" x2="700" y2="145" stroke="#555" stroke-width="1"/><rect x="696" y="98" width="8" height="28" fill="#4CAF50" rx="1"/>

  <!-- Oscillator subplot -->
  <rect x="60" y="240" width="700" height="190" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="258" fill="#888" font-family="Inter,sans-serif" font-size="10">ML Momentum Index</text>

  <!-- Bullish background -->
  <rect x="60" y="240" width="250" height="45" fill="rgba(76,175,80,0.08)"/>
  <rect x="480" y="240" width="280" height="45" fill="rgba(76,175,80,0.08)"/>
  <!-- Bearish background -->
  <rect x="350" y="385" width="180" height="45" fill="rgba(244,67,54,0.08)"/>

  <!-- Reference lines -->
  <line x1="60" y1="285" x2="760" y2="285" stroke="#4CAF50" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="765" y="289" fill="#4CAF50" font-family="Inter,sans-serif" font-size="9">60</text>
  <line x1="60" y1="345" x2="760" y2="345" stroke="#888" stroke-width="1" stroke-dasharray="5,4" opacity="0.3"/>
  <text x="765" y="349" fill="#888" font-family="Inter,sans-serif" font-size="9">50</text>
  <line x1="60" y1="385" x2="760" y2="385" stroke="#f44336" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="765" y="389" fill="#f44336" font-family="Inter,sans-serif" font-size="9">40</text>

  <!-- ML Momentum Index line (purple) -->
  <polyline points="100,275 150,270 200,265 250,275 300,290 350,320 400,370 450,395 500,380 550,320 600,280 650,268 700,260"
    fill="none" stroke="#e040fb" stroke-width="2.5"/>

  <!-- ML Score line (blue) -->
  <polyline points="100,280 150,272 200,260 250,280 300,300 350,335 400,380 450,400 500,370 550,310 600,275 650,265 700,255"
    fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.7"/>

  <!-- Annotations -->
  <text x="180" y="258" fill="#4CAF50" font-family="Inter,sans-serif" font-size="10">Bullish</text>
  <text x="410" y="415" fill="#f44336" font-family="Inter,sans-serif" font-size="10">Bearish</text>
  <text x="620" y="258" fill="#4CAF50" font-family="Inter,sans-serif" font-size="10">Bullish</text>

  <!-- Legend -->
  <rect x="60" y="455" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="470" x2="100" y2="470" stroke="#e040fb" stroke-width="2.5"/>
  <text x="105" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">ML Momentum Index</text>
  <line x1="260" y1="470" x2="280" y2="470" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="285" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">ML Score</text>
  <line x1="380" y1="470" x2="400" y2="470" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="405" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Bullish (60)</text>
  <line x1="510" y1="470" x2="530" y2="470" stroke="#f44336" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="535" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Bearish (40)</text>
</svg>
