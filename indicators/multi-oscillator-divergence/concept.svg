<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-family="Arial,sans-serif" font-size="17" font-weight="bold">Multi-Oscillator Divergence</text>
  <text x="400" y="46" text-anchor="middle" fill="#888" font-family="Arial,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="#fff" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="60" x2="60" y2="410"/><line x1="200" y1="60" x2="200" y2="410"/>
    <line x1="340" y1="60" x2="340" y2="410"/><line x1="480" y1="60" x2="480" y2="410"/>
    <line x1="620" y1="60" x2="620" y2="410"/><line x1="760" y1="60" x2="760" y2="410"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="140" x2="760" y2="140"/>
    <line x1="60" y1="180" x2="760" y2="180"/><line x1="60" y1="220" x2="760" y2="220"/>
    <line x1="60" y1="300" x2="760" y2="300"/><line x1="60" y1="360" x2="760" y2="360"/>
  </g>

  <!-- Panel borders -->
  <rect x="60" y="55" width="700" height="175" fill="none" stroke="#ffffff10" rx="4"/>
  <rect x="60" y="235" width="700" height="55" fill="none" stroke="#ffffff10" rx="4"/>
  <rect x="60" y="295" width="700" height="55" fill="none" stroke="#ffffff10" rx="4"/>
  <rect x="60" y="355" width="700" height="55" fill="none" stroke="#ffffff10" rx="4"/>

  <!-- Panel labels -->
  <text x="65" y="70" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Price</text>
  <text x="65" y="249" fill="#00e5ff" font-family="Arial,sans-serif" font-size="10">RSI</text>
  <text x="65" y="309" fill="#ff00ff" font-family="Arial,sans-serif" font-size="10">MACD</text>
  <text x="65" y="369" fill="#ffeb3b" font-family="Arial,sans-serif" font-size="10">Stochastic</text>

  <!-- Price line (higher highs) -->
  <polyline fill="none" stroke="#4caf50" stroke-width="2" filter="url(#glow)"
    points="80,200 120,185 160,195 210,170 260,180 320,160 370,175 440,130 490,155 540,140 590,148 660,100 710,125 740,115"/>

  <!-- Price higher highs markers -->
  <circle cx="440" cy="130" r="4" fill="#4caf50"/>
  <circle cx="660" cy="100" r="4" fill="#4caf50"/>
  <text x="440" y="122" text-anchor="middle" fill="#4caf50" font-family="Arial,sans-serif" font-size="9">HH</text>
  <text x="660" y="92" text-anchor="middle" fill="#4caf50" font-family="Arial,sans-serif" font-size="9">HH</text>

  <!-- Price divergence line (upward - higher highs) -->
  <line x1="440" y1="130" x2="660" y2="100" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- RSI line (lower highs in oscillator) -->
  <polyline fill="none" stroke="#00e5ff" stroke-width="1.5" filter="url(#glow)"
    points="80,270 120,265 160,272 210,260 260,266 320,262 370,268 440,245 490,262 540,260 590,264 660,256 710,263 740,260"/>

  <!-- RSI divergence markers and line -->
  <circle cx="440" cy="245" r="3" fill="#00e5ff"/>
  <circle cx="660" cy="256" r="3" fill="#00e5ff"/>
  <line x1="440" y1="245" x2="660" y2="256" stroke="#00e5ff" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="730" y="249" fill="#00e5ff" font-family="Arial,sans-serif" font-size="8">LH</text>

  <!-- MACD line (lower highs in oscillator) -->
  <polyline fill="none" stroke="#ff00ff" stroke-width="1.5" filter="url(#glow)"
    points="80,328 120,322 160,330 210,318 260,324 320,320 370,326 440,305 490,320 540,318 590,323 660,316 710,322 740,319"/>

  <!-- MACD divergence markers and line -->
  <circle cx="440" cy="305" r="3" fill="#ff00ff"/>
  <circle cx="660" cy="316" r="3" fill="#ff00ff"/>
  <line x1="440" y1="305" x2="660" y2="316" stroke="#ff00ff" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="730" y="309" fill="#ff00ff" font-family="Arial,sans-serif" font-size="8">LH</text>

  <!-- Stochastic line (lower highs in oscillator) -->
  <polyline fill="none" stroke="#ffeb3b" stroke-width="1.5" filter="url(#glow)"
    points="80,390 120,384 160,392 210,380 260,386 320,382 370,389 440,365 490,383 540,380 590,385 660,378 710,384 740,381"/>

  <!-- Stochastic divergence markers and line -->
  <circle cx="440" cy="365" r="3" fill="#ffeb3b"/>
  <circle cx="660" cy="378" r="3" fill="#ffeb3b"/>
  <line x1="440" y1="365" x2="660" y2="378" stroke="#ffeb3b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="730" y="369" fill="#ffeb3b" font-family="Arial,sans-serif" font-size="8">LH</text>

  <!-- Vertical connecting dashed lines at first high -->
  <line x1="440" y1="130" x2="440" y2="365" stroke="#ffffff" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.25"/>

  <!-- Vertical connecting dashed lines at second high -->
  <line x1="660" y1="100" x2="660" y2="378" stroke="#ffffff" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.25"/>

  <!-- Callout box -->
  <rect x="500" y="155" width="230" height="38" rx="6" fill="#1a1a2e" fill-opacity="0.92" stroke="#ffeb3b" stroke-width="1.5"/>
  <text x="615" y="172" text-anchor="middle" fill="#ffeb3b" font-family="Arial,sans-serif" font-size="12" font-weight="bold">3/3 Divergence = High Confidence</text>
  <text x="615" y="186" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="9">Bearish reversal signal</text>

  <!-- Legend bar -->
  <rect x="60" y="420" width="700" height="28" rx="4" fill="#0d0d1a" fill-opacity="0.6"/>
  <circle cx="100" cy="434" r="4" fill="#4caf50"/><text x="110" y="438" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Price</text>
  <circle cx="180" cy="434" r="4" fill="#00e5ff"/><text x="190" y="438" fill="#aaa" font-family="Arial,sans-serif" font-size="10">RSI</text>
  <circle cx="250" cy="434" r="4" fill="#ff00ff"/><text x="260" y="438" fill="#aaa" font-family="Arial,sans-serif" font-size="10">MACD</text>
  <circle cx="340" cy="434" r="4" fill="#ffeb3b"/><text x="350" y="438" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Stochastic</text>
  <line x1="440" y1="434" x2="470" y2="434" stroke="#fff" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="478" y="438" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Divergence</text>
  <line x1="570" y1="434" x2="600" y2="434" stroke="#fff" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.3"/>
  <text x="608" y="438" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Alignment</text>
</svg>