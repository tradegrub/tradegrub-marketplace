<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-family="Arial,sans-serif" font-size="17" font-weight="bold">Kinetic Slippage Index</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-family="Arial,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="80" x2="760" y2="80"/>
    <line x1="60" y1="130" x2="760" y2="130"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="230" x2="760" y2="230"/>
    <line x1="60" y1="280" x2="760" y2="280"/>
    <line x1="60" y1="330" x2="760" y2="330"/>
    <line x1="60" y1="380" x2="760" y2="380"/>
    <line x1="60" y1="430" x2="760" y2="430"/>
  </g>

  <!-- Zero line -->
  <line x1="60" y1="255" x2="760" y2="255" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5"/>
  <text x="52" y="259" text-anchor="end" fill="#666" font-family="Arial,sans-serif" font-size="9">0</text>

  <!-- Y-axis labels -->
  <text x="52" y="134" text-anchor="end" fill="#555" font-family="Arial,sans-serif" font-size="9">+3</text>
  <text x="52" y="184" text-anchor="end" fill="#555" font-family="Arial,sans-serif" font-size="9">+2</text>
  <text x="52" y="215" text-anchor="end" fill="#555" font-family="Arial,sans-serif" font-size="9">+1</text>
  <text x="52" y="300" text-anchor="end" fill="#555" font-family="Arial,sans-serif" font-size="9">-1</text>
  <text x="52" y="340" text-anchor="end" fill="#555" font-family="Arial,sans-serif" font-size="9">-2</text>
  <text x="52" y="385" text-anchor="end" fill="#555" font-family="Arial,sans-serif" font-size="9">-3</text>

  <!-- Period 1: small up -->
  <rect x="80" y="215" width="16" height="40" fill="#4a90d9" opacity="0.85" rx="2"/>
  <rect x="100" y="220" width="16" height="35" fill="#e8873a" opacity="0.85" rx="2"/>

  <!-- Period 2: moderate up -->
  <rect x="130" y="195" width="16" height="60" fill="#4a90d9" opacity="0.85" rx="2"/>
  <rect x="150" y="200" width="16" height="55" fill="#e8873a" opacity="0.85" rx="2"/>

  <!-- Period 3: absorption zone - expected big, actual small -->
  <rect x="175" y="155" width="60" height="100" fill="#9b2d6b" opacity="0.12" rx="4"/>
  <rect x="180" y="160" width="16" height="95" fill="#4a90d9" opacity="0.85" rx="2"/>
  <rect x="200" y="215" width="16" height="40" fill="#e8873a" opacity="0.85" rx="2"/>

  <!-- Period 4: small down -->
  <rect x="235" y="255" width="16" height="35" fill="#4a90d9" opacity="0.85" rx="2"/>
  <rect x="255" y="255" width="16" height="45" fill="#e8873a" opacity="0.85" rx="2"/>

  <!-- Period 5: moderate down -->
  <rect x="285" y="255" width="16" height="60" fill="#4a90d9" opacity="0.85" rx="2"/>
  <rect x="305" y="255" width="16" height="55" fill="#e8873a" opacity="0.85" rx="2"/>

  <!-- Period 6: breakout up - actual exceeds expected -->
  <rect x="335" y="210" width="16" height="45" fill="#4a90d9" opacity="0.85" rx="2"/>
  <rect x="355" y="165" width="16" height="90" fill="#e8873a" opacity="0.85" rx="2" filter="url(#glow)"/>

  <!-- Period 7: large absorption down -->
  <rect x="380" y="255" width="60" height="130" fill="#9b2d6b" opacity="0.12" rx="4"/>
  <rect x="385" y="255" width="16" height="120" fill="#4a90d9" opacity="0.85" rx="2"/>
  <rect x="405" y="255" width="16" height="30" fill="#e8873a" opacity="0.85" rx="2"/>

  <!-- Period 8: small up -->
  <rect x="445" y="225" width="16" height="30" fill="#4a90d9" opacity="0.85" rx="2"/>
  <rect x="465" y="220" width="16" height="35" fill="#e8873a" opacity="0.85" rx="2"/>

  <!-- Period 9: BIGGEST divergence - main callout target -->
  <rect x="490" y="115" width="60" height="140" fill="#9b2d6b" opacity="0.18" rx="4" stroke="#c44" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="495" y="120" width="16" height="135" fill="#4a90d9" opacity="0.85" rx="2" filter="url(#glow)"/>
  <rect x="515" y="230" width="16" height="25" fill="#e8873a" opacity="0.85" rx="2"/>

  <!-- Callout -->
  <line x1="540" y1="140" x2="600" y2="105" stroke="#ff6b6b" stroke-width="1.2" stroke-dasharray="4,3"/>
  <rect x="600" y="90" width="110" height="26" fill="#2a1525" rx="4" stroke="#c44" stroke-opacity="0.5" stroke-width="1"/>
  <text x="655" y="107" text-anchor="middle" fill="#ff6b6b" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Slippage: High</text>

  <!-- Period 10: moderate down -->
  <rect x="550" y="255" width="16" height="50" fill="#4a90d9" opacity="0.85" rx="2"/>
  <rect x="570" y="255" width="16" height="65" fill="#e8873a" opacity="0.85" rx="2"/>

  <!-- Period 11: breakout down -->
  <rect x="600" y="255" width="16" height="40" fill="#4a90d9" opacity="0.85" rx="2"/>
  <rect x="620" y="255" width="16" height="85" fill="#e8873a" opacity="0.85" rx="2" filter="url(#glow)"/>

  <!-- Period 12: small up -->
  <rect x="650" y="225" width="16" height="30" fill="#4a90d9" opacity="0.85" rx="2"/>
  <rect x="670" y="230" width="16" height="25" fill="#e8873a" opacity="0.85" rx="2"/>

  <!-- Period 13: moderate absorption up -->
  <rect x="695" y="175" width="55" height="80" fill="#9b2d6b" opacity="0.1" rx="4"/>
  <rect x="700" y="180" width="16" height="75" fill="#4a90d9" opacity="0.85" rx="2"/>
  <rect x="720" y="220" width="16" height="35" fill="#e8873a" opacity="0.85" rx="2"/>

  <!-- Legend bar -->
  <rect x="60" y="458" width="680" height="32" fill="#111827" rx="6" stroke="#333" stroke-width="0.5"/>
  <rect x="140" y="467" width="14" height="14" fill="#4a90d9" rx="2"/>
  <text x="160" y="478" fill="#aaa" font-family="Arial,sans-serif" font-size="11">Expected Movement</text>
  <rect x="320" y="467" width="14" height="14" fill="#e8873a" rx="2"/>
  <text x="340" y="478" fill="#aaa" font-family="Arial,sans-serif" font-size="11">Actual Movement</text>
  <rect x="500" y="467" width="14" height="14" fill="#9b2d6b" opacity="0.4" rx="2" stroke="#c44" stroke-opacity="0.4" stroke-width="1"/>
  <text x="520" y="478" fill="#aaa" font-family="Arial,sans-serif" font-size="11">Absorption Zone</text>
</svg>
