<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="600">HalfTrend</text>
  <text x="400" y="48" text-anchor="middle" fill="#6a6a8a" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="60" y1="80" x2="760" y2="80"/>
    <line x1="60" y1="140" x2="760" y2="140"/>
    <line x1="60" y1="200" x2="760" y2="200"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="320" x2="760" y2="320"/>
    <line x1="60" y1="380" x2="760" y2="380"/>
    <line x1="140" y1="60" x2="140" y2="420"/>
    <line x1="260" y1="60" x2="260" y2="420"/>
    <line x1="380" y1="60" x2="380" y2="420"/>
    <line x1="500" y1="60" x2="500" y2="420"/>
    <line x1="620" y1="60" x2="620" y2="420"/>
    <line x1="740" y1="60" x2="740" y2="420"/>
  </g>

  <!-- Candlesticks: Phase 1 - Downtrend (bars 1-8) -->
  <!-- Green candle -->
  <line x1="90" y1="220" x2="90" y2="280" stroke="#555" stroke-width="1"/>
  <rect x="86" y="240" width="8" height="25" fill="#26a69a" rx="1"/>
  <!-- Red candle -->
  <line x1="115" y1="230" x2="115" y2="300" stroke="#555" stroke-width="1"/>
  <rect x="111" y="240" width="8" height="40" fill="#ef5350" rx="1"/>
  <!-- Red candle -->
  <line x1="140" y1="250" x2="140" y2="320" stroke="#555" stroke-width="1"/>
  <rect x="136" y="260" width="8" height="40" fill="#ef5350" rx="1"/>
  <!-- Red candle -->
  <line x1="165" y1="270" x2="165" y2="340" stroke="#555" stroke-width="1"/>
  <rect x="161" y="275" width="8" height="45" fill="#ef5350" rx="1"/>
  <!-- Green candle -->
  <line x1="190" y1="290" x2="190" y2="350" stroke="#555" stroke-width="1"/>
  <rect x="186" y="310" width="8" height="20" fill="#26a69a" rx="1"/>
  <!-- Red candle -->
  <line x1="215" y1="300" x2="215" y2="370" stroke="#555" stroke-width="1"/>
  <rect x="211" y="310" width="8" height="40" fill="#ef5350" rx="1"/>
  <!-- Red candle -->
  <line x1="240" y1="310" x2="240" y2="380" stroke="#555" stroke-width="1"/>
  <rect x="236" y="320" width="8" height="42" fill="#ef5350" rx="1"/>
  <!-- Red candle (bottom) -->
  <line x1="265" y1="330" x2="265" y2="395" stroke="#555" stroke-width="1"/>
  <rect x="261" y="340" width="8" height="38" fill="#ef5350" rx="1"/>

  <!-- Candlesticks: Phase 2 - Uptrend (bars 9-18) -->
  <!-- Green candle (reversal) -->
  <line x1="290" y1="320" x2="290" y2="385" stroke="#555" stroke-width="1"/>
  <rect x="286" y="345" width="8" height="22" fill="#26a69a" rx="1"/>
  <!-- Green candle -->
  <line x1="315" y1="300" x2="315" y2="365" stroke="#555" stroke-width="1"/>
  <rect x="311" y="310" width="8" height="35" fill="#26a69a" rx="1"/>
  <!-- Green candle -->
  <line x1="340" y1="270" x2="340" y2="340" stroke="#555" stroke-width="1"/>
  <rect x="336" y="280" width="8" height="38" fill="#26a69a" rx="1"/>
  <!-- Red candle (pullback) -->
  <line x1="365" y1="260" x2="365" y2="320" stroke="#555" stroke-width="1"/>
  <rect x="361" y="270" width="8" height="28" fill="#ef5350" rx="1"/>
  <!-- Green candle -->
  <line x1="390" y1="240" x2="390" y2="310" stroke="#555" stroke-width="1"/>
  <rect x="386" y="250" width="8" height="38" fill="#26a69a" rx="1"/>
  <!-- Green candle -->
  <line x1="415" y1="210" x2="415" y2="280" stroke="#555" stroke-width="1"/>
  <rect x="411" y="220" width="8" height="38" fill="#26a69a" rx="1"/>
  <!-- Green candle -->
  <line x1="440" y1="190" x2="440" y2="260" stroke="#555" stroke-width="1"/>
  <rect x="436" y="200" width="8" height="35" fill="#26a69a" rx="1"/>
  <!-- Green candle -->
  <line x1="465" y1="170" x2="465" y2="235" stroke="#555" stroke-width="1"/>
  <rect x="461" y="180" width="8" height="32" fill="#26a69a" rx="1"/>
  <!-- Red candle (pullback) -->
  <line x1="490" y1="160" x2="490" y2="220" stroke="#555" stroke-width="1"/>
  <rect x="486" y="170" width="8" height="28" fill="#ef5350" rx="1"/>
  <!-- Green candle -->
  <line x1="515" y1="140" x2="515" y2="200" stroke="#555" stroke-width="1"/>
  <rect x="511" y="150" width="8" height="30" fill="#26a69a" rx="1"/>

  <!-- Candlesticks: Phase 3 - Downtrend (bars 19-26) -->
  <!-- Red candle (reversal) -->
  <line x1="540" y1="130" x2="540" y2="195" stroke="#555" stroke-width="1"/>
  <rect x="536" y="140" width="8" height="35" fill="#ef5350" rx="1"/>
  <!-- Red candle -->
  <line x1="565" y1="150" x2="565" y2="220" stroke="#555" stroke-width="1"/>
  <rect x="561" y="160" width="8" height="40" fill="#ef5350" rx="1"/>
  <!-- Green candle (pullback) -->
  <line x1="590" y1="170" x2="590" y2="230" stroke="#555" stroke-width="1"/>
  <rect x="586" y="190" width="8" height="20" fill="#26a69a" rx="1"/>
  <!-- Red candle -->
  <line x1="615" y1="190" x2="615" y2="260" stroke="#555" stroke-width="1"/>
  <rect x="611" y="200" width="8" height="42" fill="#ef5350" rx="1"/>
  <!-- Red candle -->
  <line x1="640" y1="210" x2="640" y2="290" stroke="#555" stroke-width="1"/>
  <rect x="636" y="220" width="8" height="48" fill="#ef5350" rx="1"/>
  <!-- Red candle -->
  <line x1="665" y1="240" x2="665" y2="310" stroke="#555" stroke-width="1"/>
  <rect x="661" y="250" width="8" height="42" fill="#ef5350" rx="1"/>
  <!-- Green candle -->
  <line x1="690" y1="260" x2="690" y2="330" stroke="#555" stroke-width="1"/>
  <rect x="686" y="285" width="8" height="22" fill="#26a69a" rx="1"/>
  <!-- Red candle -->
  <line x1="715" y1="280" x2="715" y2="350" stroke="#555" stroke-width="1"/>
  <rect x="711" y="290" width="8" height="40" fill="#ef5350" rx="1"/>

  <!-- HalfTrend stepped line: Red downtrend phase 1 -->
  <polyline points="90,248 115,248 140,248 165,270 190,285 215,310 240,330 265,350" fill="none" stroke="#ef5350" stroke-width="2.2" filter="url(#glow)"/>

  <!-- HalfTrend stepped line: Green uptrend phase 2 -->
  <polyline points="290,360 290,360 315,360 340,360 365,330 390,330 415,290 440,265 465,240 490,215 515,190" fill="none" stroke="#26a69a" stroke-width="2.2" filter="url(#glow)"/>

  <!-- HalfTrend stepped line: Red downtrend phase 3 -->
  <polyline points="540,150 540,150 565,150 590,150 615,195 640,195 665,245 690,270 715,295" fill="none" stroke="#ef5350" stroke-width="2.2" filter="url(#glow)"/>

  <!-- ATR channel bands (dotted) - Downtrend phase 1 upper -->
  <polyline points="90,228 115,228 140,228 165,250 190,265 215,290 240,310 265,330" fill="none" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- Downtrend phase 1 lower -->
  <polyline points="90,268 115,268 140,268 165,290 190,305 215,330 240,350 265,370" fill="none" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- ATR channel bands - Uptrend phase 2 upper -->
  <polyline points="290,340 315,340 340,340 365,310 390,310 415,270 440,245 465,220 490,195 515,170" fill="none" stroke="#26a69a" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- Uptrend phase 2 lower -->
  <polyline points="290,380 315,380 340,380 365,350 390,350 415,310 440,285 465,260 490,235 515,210" fill="none" stroke="#26a69a" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- ATR channel bands - Downtrend phase 3 upper -->
  <polyline points="540,130 565,130 590,130 615,175 640,175 665,225 690,250 715,275" fill="none" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- Downtrend phase 3 lower -->
  <polyline points="540,170 565,170 590,170 615,215 640,215 665,265 690,290 715,315" fill="none" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Buy arrow at flip 1 (red to green, bar ~9) -->
  <polygon points="290,400 282,415 298,415" fill="#26a69a" filter="url(#glow)"/>
  <text x="290" y="428" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">BUY</text>

  <!-- Sell arrow at flip 2 (green to red, bar ~19) -->
  <polygon points="540,120 532,105 548,105" fill="#ef5350" filter="url(#glow)"/>
  <text x="540" y="100" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">SELL</text>

  <!-- Legend bar -->
  <g transform="translate(0,460)">
    <rect x="60" y="0" width="700" height="30" fill="#0d0d1a" rx="4" opacity="0.6"/>
    <!-- HalfTrend Up -->
    <line x1="80" y1="15" x2="105" y2="15" stroke="#26a69a" stroke-width="2.2"/>
    <text x="112" y="19" fill="#8888aa" font-size="10">Uptrend</text>
    <!-- HalfTrend Down -->
    <line x1="180" y1="15" x2="205" y2="15" stroke="#ef5350" stroke-width="2.2"/>
    <text x="212" y="19" fill="#8888aa" font-size="10">Downtrend</text>
    <!-- ATR Channel -->
    <line x1="300" y1="15" x2="325" y2="15" stroke="#8888aa" stroke-width="0.8" stroke-dasharray="4,4"/>
    <text x="332" y="19" fill="#8888aa" font-size="10">ATR Channel</text>
    <!-- Buy signal -->
    <polygon points="430,10 425,20 435,20" fill="#26a69a"/>
    <text x="442" y="19" fill="#8888aa" font-size="10">Buy Signal</text>
    <!-- Sell signal -->
    <polygon points="530,20 525,10 535,10" fill="#ef5350"/>
    <text x="542" y="19" fill="#8888aa" font-size="10">Sell Signal</text>
    <!-- Green candle -->
    <rect x="630" y="8" width="6" height="14" fill="#26a69a" rx="1"/>
    <text x="642" y="19" fill="#8888aa" font-size="10">Bull</text>
    <!-- Red candle -->
    <rect x="680" y="8" width="6" height="14" fill="#ef5350" rx="1"/>
    <text x="692" y="19" fill="#8888aa" font-size="10">Bear</text>
  </g>
</svg>