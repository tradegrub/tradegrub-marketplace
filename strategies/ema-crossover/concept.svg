<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">EMA Crossover Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Trend Filter EMA(100) - long gentle curve -->
  <path d="M 80,300 Q 200,295 300,280 Q 400,260 500,240 Q 600,225 700,210 L 760,205" fill="none" stroke="#ff9800" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="762" y="202" fill="#ff9800" font-size="9">EMA(100)</text>

  <!-- Slow EMA(21) -->
  <path d="M 80,270 Q 140,290 200,295 Q 260,298 320,285 Q 380,265 420,248 Q 460,235 500,225 Q 540,218 580,215 Q 620,215 660,220 Q 700,228 740,232" fill="none" stroke="#ef5350" stroke-width="2" opacity="0.8"/>
  <text x="742" y="228" fill="#ef5350" font-size="9">Slow EMA(21)</text>

  <!-- Fast EMA(9) -->
  <path d="M 80,260 Q 120,300 160,315 Q 200,320 240,305 Q 280,278 320,260 Q 360,240 400,225 Q 430,218 460,210 Q 500,200 540,195 Q 580,198 620,208 Q 660,222 700,238 Q 730,248 750,252" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.8"/>
  <text x="752" y="248" fill="#42a5f5" font-size="9">Fast EMA(9)</text>

  <!-- Candlesticks following the price action -->
  <!-- Downtrend phase -->
  <line x1="100" y1="248" x2="100" y2="278" stroke="#ef5350" stroke-width="1"/>
  <rect x="96" y="252" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="130" y1="272" x2="130" y2="308" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="278" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="160" y1="298" x2="160" y2="330" stroke="#ef5350" stroke-width="1"/>
  <rect x="156" y="302" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="190" y1="305" x2="190" y2="338" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="310" width="8" height="18" fill="#ef5350" rx="1"/>
  <!-- Bottoming -->
  <line x1="220" y1="308" x2="220" y2="335" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="315" width="8" height="12" fill="#26a69a" rx="1"/>
  <line x1="250" y1="295" x2="250" y2="322" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="300" width="8" height="14" fill="#26a69a" rx="1"/>
  <!-- Crossover zone -->
  <line x1="280" y1="270" x2="280" y2="298" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="275" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="310" y1="255" x2="310" y2="282" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="258" width="8" height="16" fill="#26a69a" rx="1"/>
  <!-- Bullish crossover signal candle -->
  <line x1="340" y1="238" x2="340" y2="272" stroke="#00e676" stroke-width="1.5"/>
  <rect x="334" y="242" width="12" height="22" fill="#00e676" rx="1" filter="url(#glow)"/>
  <!-- Post crossover uptrend -->
  <line x1="370" y1="225" x2="370" y2="255" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="228" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="400" y1="215" x2="400" y2="242" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="218" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="430" y1="205" x2="430" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="208" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="460" y1="198" x2="460" y2="225" stroke="#ef5350" stroke-width="1"/>
  <rect x="456" y="202" width="8" height="14" fill="#ef5350" rx="1"/>
  <line x1="490" y1="190" x2="490" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="486" y="193" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="520" y1="185" x2="520" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="516" y="188" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="550" y1="188" x2="550" y2="212" stroke="#ef5350" stroke-width="1"/>
  <rect x="546" y="192" width="8" height="12" fill="#ef5350" rx="1"/>
  <line x1="580" y1="192" x2="580" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="195" width="8" height="14" fill="#26a69a" rx="1"/>
  <!-- Topping -->
  <line x1="610" y1="198" x2="610" y2="228" stroke="#ef5350" stroke-width="1"/>
  <rect x="606" y="202" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="640" y1="210" x2="640" y2="240" stroke="#ef5350" stroke-width="1"/>
  <rect x="636" y="215" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="670" y1="218" x2="670" y2="248" stroke="#ef5350" stroke-width="1"/>
  <rect x="666" y="222" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="700" y1="228" x2="700" y2="258" stroke="#ef5350" stroke-width="1"/>
  <rect x="696" y="232" width="8" height="18" fill="#ef5350" rx="1"/>

  <!-- Crossover point annotation -->
  <g filter="url(#softGlow)">
    <polygon points="340,232 350,232 345,220" fill="#00e676"/>
  </g>
  <rect x="350" y="210" width="100" height="22" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="400" y="225" text-anchor="middle" fill="#00e676" font-size="11" font-weight="600">BUY SIGNAL</text>

  <!-- Crossover circle -->
  <circle cx="325" cy="272" r="18" fill="none" stroke="#00e676" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="325" y="300" text-anchor="middle" fill="#00e676" font-size="8">Crossover</text>

  <!-- Trend filter annotation -->
  <rect x="120" y="335" width="165" height="18" rx="4" fill="#ff9800" fill-opacity="0.1" stroke="#ff9800" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="202" y="348" text-anchor="middle" fill="#ff9800" font-size="9">Below EMA(100): No Longs</text>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="96" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="126" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="156" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="186" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="216" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="246" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="276" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="306" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
  </g>
  <rect x="334" y="385" width="12" height="30" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="366" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="396" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="426" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="456" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="486" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="516" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="546" y="405" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="576" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="606" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="636" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="666" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="696" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">Fast EMA(9)</text>
    <circle cx="130" cy="20" r="4" fill="#ef5350"/>
    <text x="140" y="24" fill="#999" font-size="9">Slow EMA(21)</text>
    <circle cx="250" cy="20" r="4" fill="#ff9800"/>
    <text x="260" y="24" fill="#999" font-size="9">Trend Filter EMA(100)</text>
    <circle cx="410" cy="20" r="4" fill="#00e676"/>
    <text x="420" y="24" fill="#999" font-size="9">Crossover Signal</text>
    <rect x="530" y="12" width="20" height="16" fill="#00e676" opacity="0.5" rx="2"/>
    <text x="555" y="24" fill="#999" font-size="9">Volume Confirmation</text>
  </g>
</svg>