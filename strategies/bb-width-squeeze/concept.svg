<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="squeezeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9800" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff9800" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="170" x2="760" y2="170"/>
    <line x1="60" y1="240" x2="760" y2="240"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">BB Width Squeeze Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Upper BB - converging then expanding -->
  <polyline points="80,100 130,110 180,125 230,145 280,158 330,168 380,175 430,178 460,165 490,140 520,115 550,95 580,85 620,80 660,78 700,75" fill="none" stroke="#9c27b0" stroke-width="1.5" opacity="0.6"/>

  <!-- Basis -->
  <polyline points="80,175 130,178 180,182 230,190 280,195 330,198 380,200 430,202 460,198 490,190 520,178 550,165 580,155 620,148 660,142 700,138" fill="none" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Lower BB - converging then expanding -->
  <polyline points="80,250 130,245 180,238 230,232 280,230 330,228 380,225 430,225 460,230 490,240 520,248 550,245 580,235 620,225 660,218 700,210" fill="none" stroke="#9c27b0" stroke-width="1.5" opacity="0.6"/>

  <!-- Squeeze zone highlight -->
  <rect x="330" y="165" width="120" height="65" fill="url(#squeezeFill)" rx="4"/>
  <text x="390" y="160" text-anchor="middle" fill="#ff9800" font-size="10" font-weight="500">SQUEEZE</text>

  <!-- Candles - tight in squeeze, explosive after -->
  <line x1="100" y1="155" x2="100" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="96" y="162" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="130" y1="160" x2="130" y2="215" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="175" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="160" y1="165" x2="160" y2="218" stroke="#ef5350" stroke-width="1"/>
  <rect x="156" y="170" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="190" y1="172" x2="190" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="182" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="220" y1="178" x2="220" y2="222" stroke="#ef5350" stroke-width="1"/>
  <rect x="216" y="182" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="250" y1="182" x2="250" y2="222" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="188" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="280" y1="185" x2="280" y2="220" stroke="#ef5350" stroke-width="1"/>
  <rect x="276" y="190" width="8" height="20" fill="#ef5350" rx="1"/>
  <!-- Tight squeeze candles -->
  <line x1="310" y1="188" x2="310" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="195" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="340" y1="190" x2="340" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="195" width="8" height="12" fill="#ef5350" rx="1"/>
  <line x1="370" y1="192" x2="370" y2="212" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="196" width="8" height="10" fill="#26a69a" rx="1"/>
  <line x1="400" y1="190" x2="400" y2="212" stroke="#ef5350" stroke-width="1"/>
  <rect x="396" y="194" width="8" height="10" fill="#ef5350" rx="1"/>
  <line x1="430" y1="192" x2="430" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="196" width="8" height="8" fill="#26a69a" rx="1"/>

  <!-- BREAKOUT candle -->
  <line x1="460" y1="148" x2="460" y2="205" stroke="#00e676" stroke-width="1.5"/>
  <rect x="454" y="155" width="12" height="42" fill="#00e676" rx="1" filter="url(#glow)"/>

  <g filter="url(#softGlow)">
    <polygon points="460,145 470,145 465,132" fill="#00e676"/>
  </g>
  <rect x="475" y="128" width="145" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="547" y="142" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BREAKOUT: Squeeze Fire</text>

  <!-- Post-breakout expansion -->
  <line x1="490" y1="130" x2="490" y2="175" stroke="#26a69a" stroke-width="1"/>
  <rect x="486" y="135" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="520" y1="112" x2="520" y2="158" stroke="#26a69a" stroke-width="1"/>
  <rect x="516" y="118" width="8" height="32" fill="#26a69a" rx="1"/>
  <line x1="550" y1="95" x2="550" y2="142" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="100" width="8" height="32" fill="#26a69a" rx="1"/>
  <line x1="580" y1="85" x2="580" y2="132" stroke="#ef5350" stroke-width="1"/>
  <rect x="576" y="90" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="610" y1="80" x2="610" y2="125" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="85" width="8" height="30" fill="#26a69a" rx="1"/>

  <!-- Separator -->
  <line x1="60" y1="280" x2="760" y2="280" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="295" fill="#888" font-size="9">BB Width</text>

  <!-- BB Width oscillator -->
  <polyline points="100,310 130,315 160,318 190,322 220,328 250,335 280,342 310,350 340,358 370,362 400,365 430,368 460,340 490,320 520,305 550,295 580,290 610,288 650,285 690,282" fill="none" stroke="#ff9800" stroke-width="2" opacity="0.8"/>

  <!-- Squeeze threshold -->
  <line x1="80" y1="355" x2="720" y2="355" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="725" y="359" fill="#ff9800" font-size="8" opacity="0.6">Squeeze Level</text>

  <!-- Squeeze zone in oscillator -->
  <rect x="330" y="352" width="120" height="20" fill="#ff9800" fill-opacity="0.06" rx="3"/>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="126" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="156" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="186" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="216" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="246" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="276" y="406" width="8" height="9" fill="#ef5350" rx="1"/>
    <rect x="306" y="407" width="8" height="8" fill="#26a69a" rx="1"/>
    <rect x="336" y="408" width="8" height="7" fill="#ef5350" rx="1"/>
    <rect x="366" y="409" width="8" height="6" fill="#26a69a" rx="1"/>
    <rect x="396" y="409" width="8" height="6" fill="#ef5350" rx="1"/>
    <rect x="426" y="409" width="8" height="6" fill="#26a69a" rx="1"/>
  </g>
  <rect x="454" y="382" width="12" height="33" fill="#00e676" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="486" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="516" y="392" width="8" height="23" fill="#26a69a" rx="1"/>
    <rect x="546" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="576" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="606" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#9c27b0"/>
    <text x="30" y="24" fill="#999" font-size="9">Bollinger Bands</text>
    <circle cx="145" cy="20" r="4" fill="#ff9800"/>
    <text x="155" y="24" fill="#999" font-size="9">BB Width</text>
    <circle cx="245" cy="20" r="4" fill="#42a5f5"/>
    <text x="255" y="24" fill="#999" font-size="9">Basis</text>
    <circle cx="330" cy="20" r="4" fill="#00e676"/>
    <text x="340" y="24" fill="#999" font-size="9">Squeeze Breakout</text>
    <rect x="465" y="12" width="20" height="16" fill="#ff9800" opacity="0.3" rx="2"/>
    <text x="490" y="24" fill="#999" font-size="9">Squeeze Zone</text>
  </g>
</svg>