<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Multi-Period Supertrend Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Candles - ranging then trending up -->
  <line x1="90" y1="235" x2="90" y2="285" stroke="#ef5350" stroke-width="1"/>
  <rect x="86" y="245" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="115" y1="240" x2="115" y2="290" stroke="#26a69a" stroke-width="1"/>
  <rect x="111" y="260" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="140" y1="248" x2="140" y2="298" stroke="#ef5350" stroke-width="1"/>
  <rect x="136" y="258" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="165" y1="255" x2="165" y2="305" stroke="#26a69a" stroke-width="1"/>
  <rect x="161" y="275" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="190" y1="260" x2="190" y2="310" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="268" width="8" height="30" fill="#ef5350" rx="1"/>
  <!-- Transition candles -->
  <line x1="215" y1="265" x2="215" y2="315" stroke="#26a69a" stroke-width="1"/>
  <rect x="211" y="285" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="240" y1="255" x2="240" y2="300" stroke="#26a69a" stroke-width="1"/>
  <rect x="236" y="268" width="8" height="22" fill="#26a69a" rx="1"/>
  <!-- Both align - BUY -->
  <line x1="270" y1="238" x2="270" y2="288" stroke="#00e676" stroke-width="1.5"/>
  <rect x="264" y="245" width="12" height="30" fill="#00e676" rx="1" filter="url(#glow)"/>
  <!-- Uptrend -->
  <line x1="300" y1="222" x2="300" y2="268" stroke="#26a69a" stroke-width="1"/>
  <rect x="296" y="230" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="330" y1="210" x2="330" y2="255" stroke="#26a69a" stroke-width="1"/>
  <rect x="326" y="218" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="360" y1="195" x2="360" y2="242" stroke="#ef5350" stroke-width="1"/>
  <rect x="356" y="202" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="390" y1="182" x2="390" y2="228" stroke="#26a69a" stroke-width="1"/>
  <rect x="386" y="192" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="420" y1="168" x2="420" y2="215" stroke="#26a69a" stroke-width="1"/>
  <rect x="416" y="178" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="450" y1="155" x2="450" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="446" y="162" width="8" height="25" fill="#26a69a" rx="1"/>
  <!-- Fast ST flips - EXIT -->
  <line x1="480" y1="148" x2="480" y2="198" stroke="#ef5350" stroke-width="1"/>
  <rect x="474" y="152" width="12" height="35" fill="#ef5350" rx="1"/>
  <line x1="510" y1="158" x2="510" y2="205" stroke="#ef5350" stroke-width="1"/>
  <rect x="506" y="165" width="8" height="28" fill="#ef5350" rx="1"/>
  <!-- Disagree zone -->
  <line x1="540" y1="170" x2="540" y2="215" stroke="#26a69a" stroke-width="1"/>
  <rect x="536" y="185" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="570" y1="165" x2="570" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="566" y="172" width="8" height="22" fill="#ef5350" rx="1"/>

  <!-- Fast Supertrend line (orange/yellow) -->
  <polyline points="90,225 115,230 140,238 165,245 190,250 215,255 240,248 270,235 300,218 330,205 360,192 390,178 420,165 450,152 480,195 510,200 540,190 570,185" fill="none" stroke="#ff9800" stroke-width="2" opacity="0.85"/>
  <text x="580" y="182" fill="#ff9800" font-size="10" font-weight="500">Fast ST</text>

  <!-- Slow Supertrend line (purple) -->
  <polyline points="90,230 115,235 140,242 165,248 190,255 215,260 240,258 270,252 300,242 330,230 360,218 390,205 420,192 450,180 480,172 510,170 540,168 570,166" fill="none" stroke="#ab47bc" stroke-width="2" stroke-dasharray="8,4" opacity="0.85"/>
  <text x="580" y="164" fill="#ab47bc" font-size="10" font-weight="500">Slow ST</text>

  <!-- Both Agree zone highlight -->
  <rect x="260" y="65" width="200" height="18" rx="4" fill="#00e676" fill-opacity="0.08"/>
  <text x="360" y="78" text-anchor="middle" fill="#00e676" font-size="10">Both Bullish = TRADE</text>

  <!-- Disagree zone highlight -->
  <rect x="470" y="65" width="120" height="18" rx="4" fill="#ff9800" fill-opacity="0.08"/>
  <text x="530" y="78" text-anchor="middle" fill="#ff9800" font-size="10">Disagree = FLAT</text>

  <!-- Buy arrow -->
  <g filter="url(#softGlow)">
    <polygon points="270,232 278,232 274,220" fill="#00e676"/>
  </g>
  <rect x="280" y="215" width="55" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="307" y="229" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- Exit label -->
  <rect x="490" y="135" width="60" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="520" y="149" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">EXIT</text>
  <path d="M 485,148 C 485,155 482,158 480,160" fill="none" stroke="#ef5350" stroke-width="1"/>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="86" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="111" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="136" y="397" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="161" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="186" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="211" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="236" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
  </g>
  <rect x="264" y="382" width="12" height="33" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="296" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="326" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="356" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="386" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="416" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="446" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="474" y="395" width="12" height="20" fill="#ef5350" rx="1"/>
    <rect x="506" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="536" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="566" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">Fast Supertrend</text>
    <circle cx="155" cy="20" r="4" fill="#ab47bc"/>
    <text x="165" y="24" fill="#999" font-size="9">Slow Supertrend</text>
    <circle cx="290" cy="20" r="4" fill="#00e676"/>
    <text x="300" y="24" fill="#999" font-size="9">Both Agree Signal</text>
    <circle cx="430" cy="20" r="4" fill="#ef5350"/>
    <text x="440" y="24" fill="#999" font-size="9">Fast Flip Exit</text>
    <rect x="555" y="12" width="20" height="16" fill="#00e676" opacity="0.5" rx="2"/>
    <text x="580" y="24" fill="#999" font-size="9">Volume</text>
  </g>
</svg>