<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="100" y1="70" x2="100" y2="410"/>
    <line x1="160" y1="70" x2="160" y2="410"/>
    <line x1="220" y1="70" x2="220" y2="410"/>
    <line x1="280" y1="70" x2="280" y2="410"/>
    <line x1="340" y1="70" x2="340" y2="410"/>
    <line x1="400" y1="70" x2="400" y2="410"/>
    <line x1="460" y1="70" x2="460" y2="410"/>
    <line x1="520" y1="70" x2="520" y2="410"/>
    <line x1="580" y1="70" x2="580" y2="410"/>
    <line x1="640" y1="70" x2="640" y2="410"/>
    <line x1="700" y1="70" x2="700" y2="410"/>
    <line x1="80" y1="100" x2="740" y2="100"/>
    <line x1="80" y1="140" x2="740" y2="140"/>
    <line x1="80" y1="180" x2="740" y2="180"/>
    <line x1="80" y1="220" x2="740" y2="220"/>
    <line x1="80" y1="260" x2="740" y2="260"/>
    <line x1="80" y1="300" x2="740" y2="300"/>
    <line x1="80" y1="340" x2="740" y2="340"/>
    <line x1="80" y1="380" x2="740" y2="380"/>
  </g>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Cybernetic Oscillator</text>
  <text x="400" y="52" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Y-axis labels -->
  <text x="72" y="104" text-anchor="end" fill="#666" font-size="8">+6</text>
  <text x="72" y="144" text-anchor="end" fill="#666" font-size="8">+4</text>
  <text x="72" y="184" text-anchor="end" fill="#666" font-size="8">+2</text>
  <text x="72" y="244" text-anchor="end" fill="#888" font-size="9">0</text>
  <text x="72" y="304" text-anchor="end" fill="#666" font-size="8">-2</text>
  <text x="72" y="344" text-anchor="end" fill="#666" font-size="8">-4</text>
  <text x="72" y="384" text-anchor="end" fill="#666" font-size="8">-6</text>

  <!-- X-axis bar numbers -->
  <text x="100" y="420" text-anchor="middle" fill="#555" font-size="7">0</text>
  <text x="160" y="420" text-anchor="middle" fill="#555" font-size="7">5</text>
  <text x="220" y="420" text-anchor="middle" fill="#555" font-size="7">10</text>
  <text x="280" y="420" text-anchor="middle" fill="#555" font-size="7">15</text>
  <text x="340" y="420" text-anchor="middle" fill="#555" font-size="7">20</text>
  <text x="400" y="420" text-anchor="middle" fill="#555" font-size="7">25</text>
  <text x="460" y="420" text-anchor="middle" fill="#555" font-size="7">30</text>
  <text x="520" y="420" text-anchor="middle" fill="#555" font-size="7">35</text>
  <text x="580" y="420" text-anchor="middle" fill="#555" font-size="7">40</text>
  <text x="640" y="420" text-anchor="middle" fill="#555" font-size="7">45</text>
  <text x="700" y="420" text-anchor="middle" fill="#555" font-size="7">50</text>

  <!-- Zero line -->
  <line x1="80" y1="240" x2="740" y2="240" stroke="#ffffff" stroke-width="1" stroke-dasharray="5,4" opacity="0.18"/>

  <!-- Shaded passband region between upper and lower bounds -->
  <polygon points="90,148 120,142 160,135 200,140 240,148 280,142 320,132 360,136 400,145 440,140 480,132 520,136 560,142 600,135 640,140 680,145 720,136 735,140 735,342 720,345 680,338 640,342 600,348 560,340 520,345 480,348 440,342 400,338 360,345 320,350 280,340 240,332 200,342 160,348 120,340 90,332" fill="#FF9800" fill-opacity="0.04"/>

  <!-- Raw noisy signal (white/gray, ~45 jagged points) -->
  <polyline points="90,238 96,220 102,255 108,225 114,262 120,212 126,250 132,192 138,242 144,272 150,208 156,258 162,188 168,232 174,268 180,198 186,248 192,172 198,238 204,262 210,192 216,242 222,178 228,228 234,272 240,208 246,252 252,182 258,242 264,268 270,192 276,238 282,172 288,222 294,262 300,198 306,248 312,178 318,232 324,268 330,192 336,242 342,172 348,228 354,262 360,198 366,248 372,178 378,232 384,268 390,192 396,242 402,175 408,228 414,262 420,198 426,245 432,180 438,232 444,268 450,195 456,240 462,178 468,230 474,265 480,195 486,242 492,178 498,228 504,262 510,198 516,240 522,180 528,228 534,265 540,195 546,238 552,182 558,228 564,260 570,198 576,240 582,178 588,225 594,262 600,195 606,238 612,182 618,228 624,260 630,198 636,240 642,178 648,225 654,260 660,198 666,240 672,180 678,228 684,262 690,198 696,238 702,182 708,228 714,258 720,198 726,235 732,260" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.22"/>

  <!-- Bandpass filtered wave (smooth cyan sine, ~32 points) -->
  <polyline points="90,240 102,220 115,198 130,180 148,170 168,172 188,185 208,205 228,228 248,252 268,272 288,285 308,288 328,280 348,262 368,238 388,212 408,190 428,178 448,178 468,192 488,212 508,238 528,262 548,280 568,288 588,282 608,265 628,242 648,218 668,198 688,185 708,182 728,192" fill="none" stroke="#42d4f5" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Dots on bandpass peaks and troughs -->
  <circle cx="148" cy="170" r="3" fill="#42d4f5" opacity="0.7"/>
  <circle cx="308" cy="288" r="3" fill="#42d4f5" opacity="0.7"/>
  <circle cx="448" cy="178" r="3" fill="#42d4f5" opacity="0.7"/>
  <circle cx="568" cy="288" r="3" fill="#42d4f5" opacity="0.7"/>
  <circle cx="708" cy="182" r="3" fill="#42d4f5" opacity="0.7"/>

  <!-- Upper frequency bound (orange dashed) -->
  <polyline points="90,148 120,142 160,135 200,140 240,148 280,142 320,132 360,136 400,145 440,140 480,132 520,136 560,142 600,135 640,140 680,145 720,136 735,140" fill="none" stroke="#FF9800" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.55"/>

  <!-- Lower frequency bound (orange dashed) -->
  <polyline points="90,332 120,340 160,348 200,342 240,332 280,340 320,350 360,345 400,338 440,342 480,348 520,345 560,340 600,348 640,342 680,338 720,345 735,342" fill="none" stroke="#FF9800" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.55"/>

  <!-- Annotation: Raw Signal -->
  <rect x="115" y="115" width="120" height="28" rx="5" fill="#1a1a2e" fill-opacity="0.88" stroke="#888" stroke-width="1"/>
  <text x="175" y="128" text-anchor="middle" fill="#bbb" font-size="10" font-weight="500">Raw Signal (Noisy)</text>
  <text x="175" y="138" text-anchor="middle" fill="#888" font-size="7">unfiltered price data</text>
  <line x1="175" y1="143" x2="168" y2="188" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.45"/>

  <!-- Annotation: Bandpass Filtered -->
  <rect x="435" y="115" width="130" height="28" rx="5" fill="#1a1a2e" fill-opacity="0.88" stroke="#42d4f5" stroke-width="1"/>
  <text x="500" y="128" text-anchor="middle" fill="#42d4f5" font-size="10" font-weight="500">Bandpass Filtered</text>
  <text x="500" y="138" text-anchor="middle" fill="#42d4f5" font-size="7" opacity="0.6">isolated frequency band</text>
  <line x1="500" y1="143" x2="508" y2="235" stroke="#42d4f5" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.45"/>

  <!-- Passband label -->
  <rect x="560" y="365" width="155" height="28" rx="5" fill="#1a1a2e" fill-opacity="0.88" stroke="#FF9800" stroke-width="1"/>
  <text x="637" y="379" text-anchor="middle" fill="#FF9800" font-size="10" font-weight="600">Passband: 10-25 bars</text>
  <text x="637" y="389" text-anchor="middle" fill="#FF9800" font-size="7" opacity="0.6">bandpass filter range</text>

  <!-- Zero line label -->
  <text x="755" y="244" fill="#666" font-size="8">Zero</text>

  <!-- Cycle period markers on bandpass wave -->
  <line x1="148" y1="162" x2="448" y2="170" stroke="#42d4f5" stroke-width="0.6" stroke-dasharray="3,2" opacity="0.3"/>
  <text x="298" y="160" text-anchor="middle" fill="#42d4f5" font-size="8" opacity="0.5">~25 bars</text>

  <!-- Axis borders -->
  <line x1="80" y1="70" x2="80" y2="410" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="80" y1="410" x2="740" y2="410" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Legend bar -->
  <g transform="translate(60, 445)">
    <rect width="680" height="30" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="15" r="4" fill="#ffffff" opacity="0.25"/>
    <text x="30" y="19" fill="#999" font-size="9">Raw Signal</text>
    <circle cx="120" cy="15" r="4" fill="#42d4f5"/>
    <text x="130" y="19" fill="#999" font-size="9">Bandpass Output</text>
    <circle cx="255" cy="15" r="4" fill="#FF9800"/>
    <text x="265" y="19" fill="#999" font-size="9">Frequency Bounds</text>
    <line x1="385" y1="15" x2="402" y2="15" stroke="#ffffff" stroke-width="1" stroke-dasharray="3,2" opacity="0.25"/>
    <text x="410" y="19" fill="#999" font-size="9">Zero Line</text>
  </g>
</svg>
