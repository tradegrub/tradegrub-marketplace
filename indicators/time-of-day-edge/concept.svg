<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Time of Day Edge Analyzer</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>
  <line x1="80" y1="70" x2="80" y2="400" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="250" x2="740" y2="250" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="400" x2="740" y2="400" stroke="#333" stroke-width="1"/>
  <!-- Bull/Bear edge thresholds -->
  <line x1="80" y1="170" x2="740" y2="170" stroke="rgba(76,175,80,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="80" y1="330" x2="740" y2="330" stroke="rgba(239,83,80,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="745" y="174" fill="rgba(76,175,80,0.5)" font-family="Inter,sans-serif" font-size="9">+0.5</text>
  <text x="745" y="254" fill="#666" font-family="Inter,sans-serif" font-size="9">0</text>
  <text x="745" y="334" fill="rgba(239,83,80,0.5)" font-family="Inter,sans-serif" font-size="9">-0.5</text>
  <!-- Background shading for strong edges -->
  <rect x="140" y="70" width="60" height="330" fill="rgba(76,175,80,0.06)"/>
  <rect x="340" y="70" width="60" height="330" fill="rgba(239,83,80,0.06)"/>
  <rect x="540" y="70" width="60" height="330" fill="rgba(76,175,80,0.06)"/>
  <!-- Edge score line -->
  <polyline points="100,260 140,200 200,240 260,230 320,270 380,310 440,260 500,220 560,160 620,240 680,280 720,250" fill="none" stroke="#AB47BC" stroke-width="2"/>
  <!-- Average return line -->
  <polyline points="100,255 140,220 200,245 260,240 320,260 380,290 440,255 500,235 560,190 620,245 680,270 720,252" fill="none" stroke="#42A5F5" stroke-width="1"/>
  <!-- Win rate dots -->
  <circle cx="100" cy="370" r="3" fill="#FFA726"/>
  <circle cx="140" cy="350" r="3" fill="#FFA726"/>
  <circle cx="200" cy="365" r="3" fill="#FFA726"/>
  <circle cx="260" cy="360" r="3" fill="#FFA726"/>
  <circle cx="320" cy="375" r="3" fill="#FFA726"/>
  <circle cx="380" cy="385" r="3" fill="#FFA726"/>
  <circle cx="440" cy="370" r="3" fill="#FFA726"/>
  <circle cx="500" cy="355" r="3" fill="#FFA726"/>
  <circle cx="560" cy="340" r="3" fill="#FFA726"/>
  <circle cx="620" cy="365" r="3" fill="#FFA726"/>
  <circle cx="680" cy="380" r="3" fill="#FFA726"/>
  <!-- Bar position labels -->
  <text x="100" y="415" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="9">1</text>
  <text x="160" y="415" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="9">2</text>
  <text x="220" y="415" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="9">3</text>
  <text x="280" y="415" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="9">4</text>
  <text x="340" y="415" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="9">5</text>
  <text x="400" y="415" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="9">6</text>
  <text x="460" y="415" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="9">7</text>
  <text x="520" y="415" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="9">8</text>
  <text x="580" y="415" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="9">9</text>
  <text x="640" y="415" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="9">10</text>
  <!-- Legend -->
  <rect x="130" y="450" width="540" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
  <line x1="160" y1="465" x2="180" y2="465" stroke="#AB47BC" stroke-width="2"/>
  <text x="186" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Edge Score</text>
  <line x1="290" y1="465" x2="310" y2="465" stroke="#42A5F5" stroke-width="1"/>
  <text x="316" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Avg Return</text>
  <circle cx="420" cy="465" r="3" fill="#FFA726"/>
  <text x="430" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Win Rate</text>
  <rect x="510" y="460" width="10" height="10" fill="rgba(76,175,80,0.1)" rx="1"/>
  <text x="526" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bull Edge</text>
  <rect x="600" y="460" width="10" height="10" fill="rgba(239,83,80,0.1)" rx="1"/>
  <text x="616" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bear Edge</text>
</svg>