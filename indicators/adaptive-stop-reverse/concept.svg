<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <text x="400" y="60" text-anchor="middle" font-family="Inter,sans-serif" font-size="24" fill="#e0e0e0" font-weight="600">Adaptive Stop and Reverse</text>
  <text x="400" y="140" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#90caf9">Dynamic SAR with volatility-adaptive acceleration factor</text>
  <text x="400" y="170" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#90caf9">Speeds up in trending markets, slows in choppy conditions</text>
  <text x="400" y="200" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#90caf9">ATR z-score regime detection over configurable lookback</text>
  <text x="400" y="230" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="#90caf9">Reversal labels and trend-colored background shading</text>
</svg>
