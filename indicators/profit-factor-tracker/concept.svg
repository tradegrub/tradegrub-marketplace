<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Profit Factor Tracker</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Y axis -->
  <text x="50" y="100" text-anchor="end" fill="#555" font-family="Inter,sans-serif" font-size="9">3.0</text>
  <text x="50" y="180" text-anchor="end" fill="#555" font-family="Inter,sans-serif" font-size="9">2.0</text>
  <text x="50" y="230" text-anchor="end" fill="#00e676" font-family="Inter,sans-serif" font-size="9">1.5</text>
  <text x="50" y="310" text-anchor="end" fill="#ff5252" font-family="Inter,sans-serif" font-size="9">1.0</text>
  <text x="50" y="390" text-anchor="end" fill="#555" font-family="Inter,sans-serif" font-size="9">0.5</text>

  <!-- Reference lines -->
  <line x1="60" y1="310" x2="740" y2="310" stroke="#555555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="230" x2="740" y2="230" stroke="#00e676" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="60" y1="310" x2="740" y2="310" stroke="#ff5252" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Good zone bg -->
  <rect x="80" y="70" width="200" height="350" fill="rgba(76,175,80,0.04)" rx="2"/>
  <rect x="500" y="70" width="240" height="350" fill="rgba(76,175,80,0.04)" rx="2"/>
  <!-- Warning zone bg -->
  <rect x="350" y="70" width="150" height="350" fill="rgba(255,82,82,0.04)" rx="2"/>

  <!-- Rolling PF (blue) -->
  <polyline points="80,200 120,190 160,210 200,195 240,220 280,240 320,260 360,300 400,330 440,320 480,290 520,250 560,220 600,200 640,210 680,195 720,180" fill="none" stroke="#42a5f5" stroke-width="2"/>

  <!-- Cumulative PF (orange) -->
  <polyline points="80,220 120,215 160,218 200,215 240,220 280,225 320,230 360,240 400,250 440,248 480,240 520,232 560,225 600,220 640,218 680,215 720,212" fill="none" stroke="#ffa726" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="725" y="176" fill="#42a5f5" font-family="Inter,sans-serif" font-size="9">PF: 2.1</text>
  <text x="725" y="208" fill="#ffa726" font-family="Inter,sans-serif" font-size="9">Cum: 1.8</text>
  <text x="745" y="314" fill="#555" font-family="Inter,sans-serif" font-size="8">Breakeven</text>
  <text x="745" y="234" fill="#00e676" font-family="Inter,sans-serif" font-size="8">Good</text>

  <!-- Legend -->
  <g transform="translate(120, 445)">
    <rect x="0" y="0" width="560" height="35" fill="rgba(255,255,255,0.03)" rx="6"/>
    <line x1="20" y1="18" x2="45" y2="18" stroke="#42a5f5" stroke-width="2"/>
    <text x="50" y="22" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Rolling PF</text>
    <line x1="145" y1="18" x2="170" y2="18" stroke="#ffa726" stroke-width="1.5"/>
    <text x="175" y="22" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Cumulative PF</text>
    <rect x="290" y="10" width="14" height="14" fill="rgba(76,175,80,0.15)" rx="2"/>
    <text x="309" y="22" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Healthy</text>
    <rect x="370" y="10" width="14" height="14" fill="rgba(255,82,82,0.15)" rx="2"/>
    <text x="389" y="22" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Warning</text>
  </g>
</svg>