  <line x1="410" y1="160" x2="410" y2="198" stroke="#26a69a" stroke-width="1"/>
  <rect x="406" y="168" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="435" y1="148" x2="435" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="431" y="155" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="460" y1="135" x2="460" y2="172" stroke="#26a69a" stroke-width="1"/>
