<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#26C6DA">Distance Classifier</text>
  <text x="400" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8899aa">KNN directional classification using Lorentzian distance</text>

  <!-- Feature boxes -->
  <rect x="50" y="140" width="130" height="50" rx="8" fill="rgba(38,198,218,0.15)" stroke="#26C6DA" stroke-width="1"/>
  <text x="115" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#26C6DA">RSI (14)</text>

  <rect x="200" y="140" width="130" height="50" rx="8" fill="rgba(38,198,218,0.15)" stroke="#26C6DA" stroke-width="1"/>
  <text x="265" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#26C6DA">CCI (20)</text>

  <rect x="350" y="140" width="130" height="50" rx="8" fill="rgba(38,198,218,0.15)" stroke="#26C6DA" stroke-width="1"/>
  <text x="415" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#26C6DA">ADX Proxy</text>

  <rect x="500" y="140" width="130" height="50" rx="8" fill="rgba(38,198,218,0.15)" stroke="#26C6DA" stroke-width="1"/>
  <text x="565" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#26C6DA">ROC (10)</text>

  <rect x="650" y="140" width="130" height="50" rx="8" fill="rgba(38,198,218,0.15)" stroke="#26C6DA" stroke-width="1"/>
  <text x="715" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#26C6DA">Vol Ratio</text>

  <!-- Arrow down -->
  <line x1="400" y1="200" x2="400" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#555"/></marker></defs>

  <!-- Distance formula -->
  <rect x="200" y="250" width="400" height="60" rx="10" fill="rgba(255,255,255,0.05)" stroke="#555" stroke-width="1"/>
  <text x="400" y="275" text-anchor="middle" font-family="monospace" font-size="15" fill="#e0e0e0">d = sum( log(1 + |fi - fj|) )</text>
  <text x="400" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8899aa">Lorentzian Distance (robust to outliers)</text>

  <!-- Arrow down -->
  <line x1="400" y1="320" x2="400" y2="350" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- KNN voting -->
  <rect x="250" y="360" width="300" height="50" rx="10" fill="rgba(76,175,80,0.12)" stroke="#4CAF50" stroke-width="1"/>
  <text x="400" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4CAF50">K Nearest Neighbors Vote</text>

  <!-- Output -->
  <text x="400" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#e0e0e0">Score: -100 (bearish) to +100 (bullish)</text>
  <rect x="150" y="460" width="200" height="8" rx="4" fill="#EF5350" opacity="0.6"/>
  <rect x="350" y="460" width="100" height="8" rx="4" fill="#888" opacity="0.4"/>
  <rect x="450" y="460" width="200" height="8" rx="4" fill="#4CAF50" opacity="0.6"/>
</svg>
