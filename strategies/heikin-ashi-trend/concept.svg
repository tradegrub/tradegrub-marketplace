  <line x1="290" y1="228" x2="290" y2="255" stroke="#26a69a" stroke-width="1"/>
  <rect x="286" y="232" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="315" y1="218" x2="315" y2="242" stroke="#26a69a" stroke-width="1"/>
  <rect x="311" y="220" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="340" y1="205" x2="340" y2="232" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="208" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="365" y1="195" x2="365" y2="222" stroke="#26a69a" stroke-width="1"/>
  <rect x="361" y="198" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="390" y1="188" x2="390" y2="212" stroke="#26a69a" stroke-width="1"/>
  <rect x="386" y="190" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="415" y1="182" x2="415" y2="206" stroke="#26a69a" stroke-width="1"/>
  <rect x="411" y="185" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="440" y1="178" x2="440" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="436" y="180" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="465" y1="175" x2="465" y2="198" stroke="#26a69a" stroke-width="1"/>
  <rect x="461" y="178" width="8" height="12" fill="#26a69a" rx="1"/>
  <line x1="490" y1="172" x2="490" y2="195" stroke="#26a69a" stroke-width="1"/>
