  <rect x="427" y="407" width="10" height="13" fill="#ee4444" opacity="0.25"/>
  <rect x="455" y="383" width="10" height="37" fill="#00cc66" opacity="0.6"/>
  <rect x="482" y="345" width="12" height="75" fill="#00ff77" filter="url(#glow)"/>
  <rect x="511" y="382" width="10" height="38" fill="#00cc66" opacity="0.6"/>
  <rect x="539" y="405" width="10" height="15" fill="#ee4444" opacity="0.25"/>
  <rect x="567" y="385" width="10" height="35" fill="#ee4444" opacity="0.6"/>
  <rect x="595" y="406" width="10" height="14" fill="#00cc66" opacity="0.25"/>
  <rect x="622" y="350" width="12" height="70" fill="#ff3333" filter="url(#glow)"/>
  <rect x="651" y="383" width="10" height="37" fill="#ee4444" opacity="0.6"/>
  <rect x="679" y="407" width="10" height="13" fill="#00cc66" opacity="0.25"/>
  <rect x="707" y="386" width="10" height="34" fill="#00cc66" opacity="0.6"/>
  <rect x="735" y="408" width="10" height="12" fill="#00cc66" opacity="0.25"/>

  <!-- Volume label -->
  <text x="18" y="390" font-family="Arial, sans-serif" font-size="9" fill="#555" transform="rotate(-90,18,390)">Volume</text>

  <!-- Legend bar -->
  <rect x="50" y="450" width="710" height="40" rx="4" fill="#0d0d1a" opacity="0.6"/>
  <rect x="80" y="463" width="18" height="14" fill="#00cc66" opacity="0.25" rx="2"/>
  <text x="104" y="475" font-family="Arial, sans-serif" font-size="10" fill="#777">Low Vol (0-25%)</text>
  <rect x="260" y="463" width="18" height="14" fill="#00cc66" opacity="0.6" rx="2"/>
  <text x="284" y="475" font-family="Arial, sans-serif" font-size="10" fill="#aaa">Med Vol (25-75%)</text>
  <rect x="460" y="463" width="18" height="14" fill="#00ff77" rx="2" filter="url(#glow)"/>
  <text x="484" y="475" font-family="Arial, sans-serif" font-size="10" fill="#dddddd" font-weight="bold">High Vol (75-100%)</text>
  <text x="670" y="475" font-family="Arial, sans-serif" font-size="9" fill="#555">Opacity = Vol Percentile</text>
