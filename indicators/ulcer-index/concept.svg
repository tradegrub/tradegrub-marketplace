<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Ulcer Index</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <rect x="60" y="70" width="700" height="150" fill="rgba(255,255,255,0.02)" rx="4"/>
  <polyline points="100,180 160,160 220,140 280,130 340,120 400,140 460,160 520,175 580,150 640,130 700,125" fill="none" stroke="#66BB6A" stroke-width="2" opacity="0.7"/>
  <!-- Rolling high -->
  <polyline points="100,180 160,160 220,140 280,130 340,120 400,120 460,120 520,120 580,120 640,120 700,120" fill="none" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- Drawdown shading -->
  <polygon points="400,140 460,160 520,175 580,150 640,130 700,125 700,120 640,120 580,120 520,120 460,120 400,120" fill="rgba(244,67,54,0.1)"/>

  <text x="550" y="110" fill="#FF9800" font-family="Inter,sans-serif" font-size="9">Rolling High</text>
  <text x="520" y="190" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">Drawdown Depth</text>

  <!-- Subplot -->
  <rect x="60" y="250" width="700" height="180" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="270" fill="#888" font-family="Inter,sans-serif" font-size="10">Ulcer Index / Drawdown %</text>

  <line x1="60" y1="340" x2="760" y2="340" stroke="#888" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <line x1="60" y1="310" x2="760" y2="310" stroke="#FF9800" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="762" y="314" fill="#FF9800" font-family="Inter,sans-serif" font-size="9">Stress</text>

  <!-- Ulcer line -->
  <polyline points="100,400 160,395 220,390 280,385 340,380 400,350 460,310 520,290 580,330 640,370 700,380" fill="none" stroke="#AB47BC" stroke-width="2"/>
  <!-- Drawdown % line -->
  <polyline points="100,340 160,340 220,340 280,340 340,340 400,355 460,375 520,395 580,360 640,345 700,342" fill="none" stroke="#EF5350" stroke-width="1"/>

  <!-- Stress bg -->
  <rect x="430" y="250" width="120" height="180" fill="rgba(244,67,54,0.06)"/>

  <!-- Legend -->
  <rect x="60" y="460" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="475" x2="100" y2="475" stroke="#AB47BC" stroke-width="2"/>
  <text x="105" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Ulcer Index</text>
  <line x1="230" y1="475" x2="250" y2="475" stroke="#EF5350" stroke-width="1"/>
  <text x="255" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Drawdown %</text>
  <rect x="380" y="470" width="10" height="10" fill="rgba(244,67,54,0.3)"/>
  <text x="395" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Stress Zone</text>
</svg>
