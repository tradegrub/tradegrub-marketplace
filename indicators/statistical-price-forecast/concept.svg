<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00cc66" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#ffcc00" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ff4444" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="60" x2="60" y2="420"/><line x1="130" y1="60" x2="130" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/><line x1="270" y1="60" x2="270" y2="420"/>
    <line x1="340" y1="60" x2="340" y2="420"/><line x1="410" y1="60" x2="410" y2="420"/>
    <line x1="480" y1="60" x2="480" y2="420"/><line x1="550" y1="60" x2="550" y2="420"/>
    <line x1="620" y1="60" x2="620" y2="420"/><line x1="690" y1="60" x2="690" y2="420"/>
    <line x1="760" y1="60" x2="760" y2="420"/>
    <line x1="60" y1="60" x2="760" y2="60"/><line x1="60" y1="120" x2="760" y2="120"/>
    <line x1="60" y1="180" x2="760" y2="180"/><line x1="60" y1="240" x2="760" y2="240"/>
    <line x1="60" y1="300" x2="760" y2="300"/><line x1="60" y1="360" x2="760" y2="360"/>
    <line x1="60" y1="420" x2="760" y2="420"/>
  </g>
  <!-- Title -->
  <text x="60" y="30" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="bold">Statistical Price Forecast</text>
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="11" fill="#888888">tradegrub.finance</text>
  <!-- Y-axis labels -->
  <text x="30" y="108" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">180</text>
  <text x="30" y="168" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">170</text>
  <text x="30" y="228" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">160</text>
  <text x="30" y="288" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">150</text>
  <text x="30" y="348" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">140</text>
  <text x="30" y="408" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="middle">130</text>
  <!-- Historical price line (solid white) - 20 bars -->
  <polyline fill="none" stroke="#e0e0e0" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"
    points="
      80,350 102,342 124,355 146,338 168,325 190,332 212,318 234,305
      256,312 278,298 300,285 322,278 344,270 366,262 388,255
      410,248 432,240 454,235 476,228 498,222
    "/>
  <!-- Small dots on historical -->
  <circle cx="80" cy="350" r="2" fill="#e0e0e0" opacity="0.4"/>
  <circle cx="498" cy="222" r="3.5" fill="#e0e0e0"/>
  <!-- Forecast start vertical line -->
  <line x1="498" y1="80" x2="498" y2="415" stroke="#aaaacc" stroke-width="1" stroke-dasharray="5,4" stroke-opacity="0.5"/>
  <!-- Forecast label -->
  <rect x="500" y="82" width="72" height="16" rx="3" fill="#aaaacc" fill-opacity="0.12" stroke="#aaaacc" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="536" y="93" font-family="Arial, sans-serif" font-size="10" fill="#aaaacc" text-anchor="middle">Forecast &#8594;</text>
  <!-- Forecast cone (fill between high and low paths) -->
  <polygon fill="url(#cone)" points="
    498,222
    520,210 542,195 564,182 586,168 608,155 630,142 652,130 674,118 696,108 718,98 740,90
    740,360
    718,348 696,335 674,322 652,310 630,298 608,288 586,278 564,270 542,262 520,255
    498,222
  "/>
  <!-- High probability path (green dashed) -->
  <polyline fill="none" stroke="#00cc66" stroke-width="2" stroke-dasharray="8,5" stroke-linecap="round" filter="url(#glow)"
    points="498,222 520,210 542,195 564,182 586,168 608,155 630,142 652,130 674,118 696,108 718,98 740,90"/>
  <!-- Mid path (yellow dashed) -->
  <polyline fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="8,5" stroke-linecap="round" filter="url(#glow)"
    points="498,222 520,220 542,218 564,215 586,212 608,210 630,208 652,205 674,202 696,200 718,198 740,195"/>
  <!-- Low path (red dashed) -->
  <polyline fill="none" stroke="#ff4444" stroke-width="2" stroke-dasharray="8,5" stroke-linecap="round" filter="url(#glow)"
    points="498,222 520,255 542,262 564,270 586,278 608,288 630,298 652,310 674,322 696,335 718,348 740,360"/>
  <!-- Path probability labels -->
  <rect x="742" y="83" width="32" height="14" rx="2" fill="#00cc66" fill-opacity="0.15"/>
  <text x="758" y="93" font-family="Arial, sans-serif" font-size="10" fill="#00cc66" text-anchor="middle" font-weight="bold">72%</text>
  <rect x="742" y="188" width="32" height="14" rx="2" fill="#ffcc00" fill-opacity="0.15"/>
  <text x="758" y="198" font-family="Arial, sans-serif" font-size="10" fill="#ffcc00" text-anchor="middle" font-weight="bold">54%</text>
  <rect x="742" y="353" width="32" height="14" rx="2" fill="#ff4444" fill-opacity="0.15"/>
  <text x="758" y="363" font-family="Arial, sans-serif" font-size="10" fill="#ff4444" text-anchor="middle" font-weight="bold">31%</text>
  <!-- Endpoint dots -->
  <circle cx="740" cy="90" r="4" fill="#00cc66" filter="url(#glow)"/>
  <circle cx="740" cy="195" r="4" fill="#ffcc00" filter="url(#glow)"/>
  <circle cx="740" cy="360" r="4" fill="#ff4444" filter="url(#glow)"/>
  <!-- Legend bar -->
  <g transform="translate(0,455)">
    <rect x="55" y="-5" width="700" height="30" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <line x1="80" y1="10" x2="110" y2="10" stroke="#e0e0e0" stroke-width="2"/>
    <text x="115" y="14" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">Historical</text>
    <line x1="210" y1="10" x2="240" y2="10" stroke="#00cc66" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="245" y="14" font-family="Arial, sans-serif" font-size="11" fill="#00cc66">High (72%)</text>
    <line x1="350" y1="10" x2="380" y2="10" stroke="#ffcc00" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="385" y="14" font-family="Arial, sans-serif" font-size="11" fill="#ffcc00">Mid (54%)</text>
    <line x1="480" y1="10" x2="510" y2="10" stroke="#ff4444" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="515" y="14" font-family="Arial, sans-serif" font-size="11" fill="#ff4444">Low (31%)</text>
    <rect x="605" y="2" width="20" height="16" rx="2" fill="#ffffff" fill-opacity="0.04" stroke="#aaaacc" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="630" y="14" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">Cone</text>
  </g>
</svg>