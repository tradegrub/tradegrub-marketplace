<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="50" y1="60" x2="50" y2="440"/><line x1="150" y1="60" x2="150" y2="440"/>
    <line x1="250" y1="60" x2="250" y2="440"/><line x1="350" y1="60" x2="350" y2="440"/>
    <line x1="450" y1="60" x2="450" y2="440"/><line x1="550" y1="60" x2="550" y2="440"/>
    <line x1="650" y1="60" x2="650" y2="440"/><line x1="750" y1="60" x2="750" y2="440"/>
    <line x1="50" y1="100" x2="770" y2="100"/><line x1="50" y1="155" x2="770" y2="155"/>
    <line x1="50" y1="210" x2="770" y2="210"/><line x1="50" y1="265" x2="770" y2="265"/>
    <line x1="50" y1="320" x2="770" y2="320"/><line x1="50" y1="375" x2="770" y2="375"/>
    <line x1="50" y1="430" x2="770" y2="430"/>
  </g>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-family="Arial,sans-serif" font-size="17" font-weight="bold">Topographic Volume Nodes</text>
  <text x="400" y="50" text-anchor="middle" fill="#888" font-family="Arial,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Volume Profile Histogram (left side, bars extend rightward) -->
  <!-- LVN zones (dim teal) -->
  <rect x="50" y="75"  width="28"  height="8" fill="#1a6b5a" opacity="0.5" rx="1"/>
  <rect x="50" y="85"  width="35"  height="8" fill="#1a6b5a" opacity="0.5" rx="1"/>
  <rect x="50" y="95"  width="22"  height="8" fill="#1a6b5a" opacity="0.4" rx="1"/>
  <rect x="50" y="105" width="18"  height="8" fill="#1a6b5a" opacity="0.4" rx="1"/>

  <!-- HVN Zone 1 (~y130-170, upper consolidation) -->
  <rect x="50" y="115" width="45"  height="8" fill="#2a9d6a" opacity="0.6" rx="1"/>
  <rect x="50" y="125" width="80"  height="8" fill="#3dcc88" opacity="0.7" rx="1"/>
  <rect x="50" y="135" width="140" height="8" fill="#50e89e" opacity="0.85" rx="1" filter="url(#glow)"/>
  <rect x="50" y="145" width="170" height="8" fill="#66ffb2" opacity="0.95" rx="1" filter="url(#glow)"/>
  <rect x="50" y="155" width="155" height="8" fill="#50e89e" opacity="0.85" rx="1" filter="url(#glow)"/>
  <rect x="50" y="165" width="95"  height="8" fill="#3dcc88" opacity="0.7" rx="1"/>
  <rect x="50" y="175" width="50"  height="8" fill="#2a9d6a" opacity="0.6" rx="1"/>

  <!-- LVN zone (valley between nodes) -->
  <rect x="50" y="185" width="20"  height="8" fill="#1a6b5a" opacity="0.35" rx="1"/>
  <rect x="50" y="195" width="15"  height="8" fill="#165e4e" opacity="0.3" rx="1"/>
  <rect x="50" y="205" width="12"  height="8" fill="#165e4e" opacity="0.25" rx="1"/>
  <rect x="50" y="215" width="14"  height="8" fill="#165e4e" opacity="0.3" rx="1"/>
  <rect x="50" y="225" width="18"  height="8" fill="#1a6b5a" opacity="0.35" rx="1"/>

  <!-- HVN Zone 2 (~y240-290, main consolidation) -->
  <rect x="50" y="235" width="55"  height="8" fill="#2a9d6a" opacity="0.6" rx="1"/>
  <rect x="50" y="245" width="100" height="8" fill="#3dcc88" opacity="0.7" rx="1"/>
  <rect x="50" y="255" width="150" height="8" fill="#50e89e" opacity="0.8" rx="1" filter="url(#glow)"/>
  <rect x="50" y="265" width="195" height="8" fill="#66ffb2" opacity="0.95" rx="1" filter="url(#glowStrong)"/>
  <rect x="50" y="275" width="185" height="8" fill="#66ffb2" opacity="0.9" rx="1" filter="url(#glow)"/>
  <rect x="50" y="285" width="135" height="8" fill="#50e89e" opacity="0.8" rx="1" filter="url(#glow)"/>
  <rect x="50" y="295" width="75"  height="8" fill="#3dcc88" opacity="0.65" rx="1"/>
  <rect x="50" y="305" width="40"  height="8" fill="#2a9d6a" opacity="0.55" rx="1"/>

  <!-- LVN zone -->
  <rect x="50" y="315" width="16"  height="8" fill="#165e4e" opacity="0.3" rx="1"/>
  <rect x="50" y="325" width="12"  height="8" fill="#165e4e" opacity="0.25" rx="1"/>
  <rect x="50" y="335" width="10"  height="8" fill="#134540" opacity="0.2" rx="1"/>
  <rect x="50" y="345" width="14"  height="8" fill="#165e4e" opacity="0.25" rx="1"/>

  <!-- Small HVN Zone 3 (~y355-385) -->
  <rect x="50" y="355" width="40"  height="8" fill="#2a9d6a" opacity="0.55" rx="1"/>
  <rect x="50" y="365" width="90"  height="8" fill="#3dcc88" opacity="0.7" rx="1"/>
  <rect x="50" y="375" width="110" height="8" fill="#50e89e" opacity="0.8" rx="1" filter="url(#glow)"/>
  <rect x="50" y="385" width="70"  height="8" fill="#3dcc88" opacity="0.65" rx="1"/>
  <rect x="50" y="395" width="30"  height="8" fill="#2a9d6a" opacity="0.5" rx="1"/>

  <!-- LVN tail -->
  <rect x="50" y="405" width="15"  height="8" fill="#1a6b5a" opacity="0.3" rx="1"/>
  <rect x="50" y="415" width="20"  height="8" fill="#1a6b5a" opacity="0.35" rx="1"/>
  <rect x="50" y="425" width="12"  height="8" fill="#165e4e" opacity="0.25" rx="1"/>

  <!-- Topographic Contour Lines around HVN Zone 1 -->
  <ellipse cx="130" cy="148" rx="110" ry="30" fill="none" stroke="#50e89e" stroke-width="0.8" opacity="0.15"/>
  <ellipse cx="125" cy="148" rx="85" ry="22" fill="none" stroke="#66ffb2" stroke-width="0.8" opacity="0.2"/>
  <ellipse cx="120" cy="148" rx="60" ry="14" fill="none" stroke="#66ffb2" stroke-width="1" opacity="0.25"/>

  <!-- Topographic Contour Lines around HVN Zone 2 -->
  <ellipse cx="145" cy="270" rx="130" ry="38" fill="none" stroke="#50e89e" stroke-width="0.8" opacity="0.12"/>
  <ellipse cx="140" cy="270" rx="105" ry="30" fill="none" stroke="#50e89e" stroke-width="0.8" opacity="0.18"/>
  <ellipse cx="135" cy="270" rx="80" ry="22" fill="none" stroke="#66ffb2" stroke-width="1" opacity="0.22"/>
  <ellipse cx="130" cy="270" rx="55" ry="14" fill="none" stroke="#66ffb2" stroke-width="1" opacity="0.28"/>

  <!-- Topographic Contour Lines around HVN Zone 3 -->
  <ellipse cx="110" cy="375" rx="80" ry="24" fill="none" stroke="#50e89e" stroke-width="0.8" opacity="0.15"/>
  <ellipse cx="105" cy="375" rx="55" ry="16" fill="none" stroke="#66ffb2" stroke-width="0.8" opacity="0.2"/>

  <!-- HVN / LVN Labels -->
  <text x="232" y="150" fill="#66ffb2" font-family="Arial,sans-serif" font-size="10" font-weight="bold" opacity="0.9">HVN</text>
  <text x="258" y="272" fill="#66ffb2" font-family="Arial,sans-serif" font-size="11" font-weight="bold" opacity="0.95">HVN</text>
  <text x="172" y="378" fill="#66ffb2" font-family="Arial,sans-serif" font-size="10" font-weight="bold" opacity="0.85">HVN</text>
  <text x="82" y="210" fill="#5a7a74" font-family="Arial,sans-serif" font-size="9" opacity="0.7">LVN</text>
  <text x="72" y="335" fill="#5a7a74" font-family="Arial,sans-serif" font-size="9" opacity="0.7">LVN</text>

  <!-- HVN horizontal reference lines extending into price area -->
  <line x1="250" y1="148" x2="770" y2="148" stroke="#66ffb2" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.2"/>
  <line x1="250" y1="270" x2="770" y2="270" stroke="#66ffb2" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.25"/>
  <line x1="250" y1="375" x2="770" y2="375" stroke="#66ffb2" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.2"/>

  <!-- Price Line (cyan, right 2/3, reacting at HVN levels) -->
  <polyline
    points="
      280,100
      300,108
      320,115
      340,125
      355,135
      365,145
      375,148
      390,150
      410,147
      425,145
      435,148
      450,150
      460,146
      470,140
      480,130
      495,120
      510,115
      520,125
      530,140
      545,160
      555,185
      565,210
      575,240
      580,255
      585,265
      590,270
      600,272
      615,268
      625,270
      635,275
      645,270
      655,268
      665,272
      675,270
      685,265
      690,260
      695,250
      700,240
      710,260
      715,270
      720,280
      725,300
      730,320
      735,345
      740,365
      745,372
      748,375
      752,378
      758,375
      762,370
      766,375
    "
    fill="none" stroke="#00d4ff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Consolidation highlights at HVN zones on price line -->
  <rect x="365" y="142" width="100" height="14" fill="#66ffb2" opacity="0.04" rx="3"/>
  <rect x="585" y="262" width="105" height="18" fill="#66ffb2" opacity="0.05" rx="3"/>

  <!-- Legend bar -->
  <rect x="50" y="460" width="700" height="28" fill="#111827" opacity="0.6" rx="4"/>
  <rect x="70" y="469" width="10" height="10" fill="#66ffb2" rx="2"/>
  <text x="86" y="478" fill="#aaa" font-family="Arial,sans-serif" font-size="10">HVN (High Volume Node)</text>
  <rect x="240" y="469" width="10" height="10" fill="#165e4e" opacity="0.6" rx="2"/>
  <text x="256" y="478" fill="#aaa" font-family="Arial,sans-serif" font-size="10">LVN (Low Volume Node)</text>
  <line x1="410" y1="474" x2="435" y2="474" stroke="#00d4ff" stroke-width="2"/>
  <text x="441" y="478" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Price</text>
  <ellipse cx="505" cy="474" rx="15" ry="6" fill="none" stroke="#50e89e" stroke-width="0.8" opacity="0.5"/>
  <text x="526" y="478" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Contour</text>
</svg>