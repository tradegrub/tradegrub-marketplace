<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="60" x2="60" y2="430"/><line x1="135" y1="60" x2="135" y2="430"/>
    <line x1="210" y1="60" x2="210" y2="430"/><line x1="285" y1="60" x2="285" y2="430"/>
    <line x1="360" y1="60" x2="360" y2="430"/><line x1="435" y1="60" x2="435" y2="430"/>
    <line x1="510" y1="60" x2="510" y2="430"/><line x1="585" y1="60" x2="585" y2="430"/>
    <line x1="660" y1="60" x2="660" y2="430"/>
    <line x1="60" y1="100" x2="680" y2="100"/><line x1="60" y1="160" x2="680" y2="160"/>
    <line x1="60" y1="220" x2="680" y2="220"/><line x1="60" y1="280" x2="680" y2="280"/>
    <line x1="60" y1="340" x2="680" y2="340"/><line x1="60" y1="400" x2="680" y2="400"/>
  </g>

  <!-- Title -->
  <text x="60" y="35" fill="#e0e0e0" font-size="17" font-weight="600">Tilson T3 Moving Average</text>
  <text x="60" y="50" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Candles: 30 candles from x=70 to x=650, spacing ~20px -->
  <!-- Price data simulates uptrend with pullback then continuation -->
  <g>
    <!-- Candle 1: green -->
    <line x1="75" y1="340" x2="75" y2="295" stroke="#555" stroke-width="1"/>
    <rect x="71" y="310" width="8" height="25" fill="#26a69a" rx="1"/>
    <!-- Candle 2: green -->
    <line x1="95" y1="330" x2="95" y2="285" stroke="#555" stroke-width="1"/>
    <rect x="91" y="300" width="8" height="22" fill="#26a69a" rx="1"/>
    <!-- Candle 3: red -->
    <line x1="115" y1="335" x2="115" y2="290" stroke="#555" stroke-width="1"/>
    <rect x="111" y="295" width="8" height="28" fill="#ef5350" rx="1"/>
    <!-- Candle 4: green -->
    <line x1="135" y1="325" x2="135" y2="275" stroke="#555" stroke-width="1"/>
    <rect x="131" y="285" width="8" height="26" fill="#26a69a" rx="1"/>
    <!-- Candle 5: green -->
    <line x1="155" y1="310" x2="155" y2="260" stroke="#555" stroke-width="1"/>
    <rect x="151" y="270" width="8" height="28" fill="#26a69a" rx="1"/>
    <!-- Candle 6: red -->
    <line x1="175" y1="305" x2="175" y2="258" stroke="#555" stroke-width="1"/>
    <rect x="171" y="262" width="8" height="30" fill="#ef5350" rx="1"/>
    <!-- Candle 7: red -->
    <line x1="195" y1="315" x2="195" y2="268" stroke="#555" stroke-width="1"/>
    <rect x="191" y="272" width="8" height="32" fill="#ef5350" rx="1"/>
    <!-- Candle 8: green -->
    <line x1="215" y1="310" x2="215" y2="255" stroke="#555" stroke-width="1"/>
    <rect x="211" y="265" width="8" height="30" fill="#26a69a" rx="1"/>
    <!-- Candle 9: green -->
    <line x1="235" y1="295" x2="235" y2="240" stroke="#555" stroke-width="1"/>
    <rect x="231" y="250" width="8" height="30" fill="#26a69a" rx="1"/>
    <!-- Candle 10: green -->
    <line x1="255" y1="280" x2="255" y2="230" stroke="#555" stroke-width="1"/>
    <rect x="251" y="238" width="8" height="28" fill="#26a69a" rx="1"/>
    <!-- Candle 11: red -->
    <line x1="275" y1="275" x2="275" y2="225" stroke="#555" stroke-width="1"/>
    <rect x="271" y="230" width="8" height="32" fill="#ef5350" rx="1"/>
    <!-- Candle 12: red pullback -->
    <line x1="295" y1="285" x2="295" y2="240" stroke="#555" stroke-width="1"/>
    <rect x="291" y="245" width="8" height="30" fill="#ef5350" rx="1"/>
    <!-- Candle 13: red -->
    <line x1="315" y1="295" x2="315" y2="250" stroke="#555" stroke-width="1"/>
    <rect x="311" y="255" width="8" height="28" fill="#ef5350" rx="1"/>
    <!-- Candle 14: doji -->
    <line x1="335" y1="290" x2="335" y2="255" stroke="#555" stroke-width="1"/>
    <rect x="331" y="270" width="8" height="4" fill="#26a69a" rx="1"/>
    <!-- Candle 15: green reversal -->
    <line x1="355" y1="280" x2="355" y2="245" stroke="#555" stroke-width="1"/>
    <rect x="351" y="252" width="8" height="22" fill="#26a69a" rx="1"/>
    <!-- Candle 16: green -->
    <line x1="375" y1="268" x2="375" y2="230" stroke="#555" stroke-width="1"/>
    <rect x="371" y="238" width="8" height="24" fill="#26a69a" rx="1"/>
    <!-- Candle 17: green -->
    <line x1="395" y1="255" x2="395" y2="215" stroke="#555" stroke-width="1"/>
    <rect x="391" y="222" width="8" height="26" fill="#26a69a" rx="1"/>
    <!-- Candle 18: red -->
    <line x1="415" y1="248" x2="415" y2="210" stroke="#555" stroke-width="1"/>
    <rect x="411" y="214" width="8" height="26" fill="#ef5350" rx="1"/>
    <!-- Candle 19: green -->
    <line x1="435" y1="240" x2="435" y2="198" stroke="#555" stroke-width="1"/>
    <rect x="431" y="205" width="8" height="26" fill="#26a69a" rx="1"/>
    <!-- Candle 20: green -->
    <line x1="455" y1="228" x2="455" y2="185" stroke="#555" stroke-width="1"/>
    <rect x="451" y="192" width="8" height="28" fill="#26a69a" rx="1"/>
    <!-- Candle 21: red -->
    <line x1="475" y1="225" x2="475" y2="182" stroke="#555" stroke-width="1"/>
    <rect x="471" y="186" width="8" height="30" fill="#ef5350" rx="1"/>
    <!-- Candle 22: red pullback -->
    <line x1="495" y1="232" x2="495" y2="192" stroke="#555" stroke-width="1"/>
    <rect x="491" y="196" width="8" height="28" fill="#ef5350" rx="1"/>
    <!-- Candle 23: green -->
    <line x1="515" y1="225" x2="515" y2="180" stroke="#555" stroke-width="1"/>
    <rect x="511" y="188" width="8" height="28" fill="#26a69a" rx="1"/>
    <!-- Candle 24: green -->
    <line x1="535" y1="210" x2="535" y2="165" stroke="#555" stroke-width="1"/>
    <rect x="531" y="172" width="8" height="30" fill="#26a69a" rx="1"/>
    <!-- Candle 25: green -->
    <line x1="555" y1="198" x2="555" y2="152" stroke="#555" stroke-width="1"/>
    <rect x="551" y="158" width="8" height="30" fill="#26a69a" rx="1"/>
    <!-- Candle 26: red -->
    <line x1="575" y1="192" x2="575" y2="148" stroke="#555" stroke-width="1"/>
    <rect x="571" y="152" width="8" height="30" fill="#ef5350" rx="1"/>
    <!-- Candle 27: green -->
    <line x1="595" y1="180" x2="595" y2="135" stroke="#555" stroke-width="1"/>
    <rect x="591" y="142" width="8" height="28" fill="#26a69a" rx="1"/>
    <!-- Candle 28: green -->
    <line x1="615" y1="170" x2="615" y2="125" stroke="#555" stroke-width="1"/>
    <rect x="611" y="132" width="8" height="28" fill="#26a69a" rx="1"/>
    <!-- Candle 29: red -->
    <line x1="635" y1="165" x2="635" y2="120" stroke="#555" stroke-width="1"/>
    <rect x="631" y="124" width="8" height="30" fill="#ef5350" rx="1"/>
    <!-- Candle 30: green -->
    <line x1="655" y1="155" x2="655" y2="110" stroke="#555" stroke-width="1"/>
    <rect x="651" y="118" width="8" height="26" fill="#26a69a" rx="1"/>
  </g>

  <!-- EMA line (orange, laggy/choppy) -->
  <polyline fill="none" stroke="#ff9800" stroke-width="1.8" stroke-opacity="0.85" filter="url(#glow)"
    points="75,328 95,318 115,316 135,308 155,296 175,290 195,292 215,286 235,274 255,260 275,252 295,256 315,262 335,268 355,262 375,254 395,242 415,236 435,226 455,216 475,212 495,216 515,208 535,196 555,182 575,174 595,164 615,154 635,148 655,138"/>

  <!-- T3 line (cyan, very smooth, hugs price closely) -->
  <polyline fill="none" stroke="#00e5ff" stroke-width="2.2" stroke-opacity="0.95" filter="url(#glow)"
    points="75,322 95,312 115,306 135,294 155,278 175,272 195,278 215,268 235,254 255,242 275,236 295,242 315,250 335,258 355,248 375,238 395,224 415,220 435,208 455,196 475,190 495,198 515,190 535,176 555,160 575,154 595,144 615,134 635,128 655,120"/>

  <!-- 6x EMA Cascade inset (top-right) -->
  <g transform="translate(700, 60)">
    <rect x="-5" y="-8" width="82" height="168" rx="6" fill="#0d1025" fill-opacity="0.85" stroke="#334" stroke-width="1"/>
    <text x="36" y="8" fill="#aaa" font-size="8" text-anchor="middle" font-weight="600">6x EMA Cascade</text>
    <g fill="none" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.6">
      <!-- EMA boxes -->
      <rect x="12" y="18" width="48" height="16" rx="3" fill="#162040" stroke="#00e5ff" stroke-opacity="0.5"/>
      <text x="36" y="30" fill="#00e5ff" font-size="8" text-anchor="middle">EMA1</text>
      <line x1="36" y1="34" x2="36" y2="40" stroke="#00e5ff" stroke-opacity="0.4" marker-end="none"/>
      <polygon points="33,39 36,44 39,39" fill="#00e5ff" fill-opacity="0.4"/>

      <rect x="12" y="44" width="48" height="16" rx="3" fill="#162040" stroke="#00e5ff" stroke-opacity="0.5"/>
      <text x="36" y="56" fill="#00e5ff" font-size="8" text-anchor="middle">EMA2</text>
      <line x1="36" y1="60" x2="36" y2="66" stroke="#00e5ff" stroke-opacity="0.4"/>
      <polygon points="33,65 36,70 39,65" fill="#00e5ff" fill-opacity="0.4"/>

      <rect x="12" y="70" width="48" height="16" rx="3" fill="#162040" stroke="#00e5ff" stroke-opacity="0.5"/>
      <text x="36" y="82" fill="#00e5ff" font-size="8" text-anchor="middle">EMA3</text>
      <line x1="36" y1="86" x2="36" y2="92" stroke="#00e5ff" stroke-opacity="0.4"/>
      <polygon points="33,91 36,96 39,91" fill="#00e5ff" fill-opacity="0.4"/>

      <rect x="12" y="96" width="48" height="16" rx="3" fill="#162040" stroke="#00e5ff" stroke-opacity="0.5"/>
      <text x="36" y="108" fill="#00e5ff" font-size="8" text-anchor="middle">EMA4</text>
      <line x1="36" y1="112" x2="36" y2="118" stroke="#00e5ff" stroke-opacity="0.4"/>
      <polygon points="33,117 36,122 39,117" fill="#00e5ff" fill-opacity="0.4"/>

      <rect x="12" y="122" width="48" height="16" rx="3" fill="#162040" stroke="#00e5ff" stroke-opacity="0.5"/>
      <text x="36" y="134" fill="#00e5ff" font-size="8" text-anchor="middle">EMA5</text>
      <line x1="36" y1="138" x2="36" y2="144" stroke="#00e5ff" stroke-opacity="0.4"/>
      <polygon points="33,143 36,148 39,143" fill="#00e5ff" fill-opacity="0.4"/>

      <rect x="12" y="148" width="48" height="16" rx="3" fill="#162040" stroke="#00e5ff" stroke-opacity="0.5"/>
      <text x="36" y="160" fill="#00e5ff" font-size="8" text-anchor="middle">EMA6</text>
    </g>
  </g>

  <!-- Legend bar -->
  <g transform="translate(60, 460)">
    <rect x="-10" y="-14" width="620" height="28" rx="4" fill="#0d1025" fill-opacity="0.6"/>
    <line x1="0" y1="0" x2="30" y2="0" stroke="#ff9800" stroke-width="2"/>
    <text x="36" y="4" fill="#ccc" font-size="11">EMA (21) - Standard</text>
    <line x1="180" y1="0" x2="210" y2="0" stroke="#00e5ff" stroke-width="2.2"/>
    <text x="216" y="4" fill="#ccc" font-size="11">T3 (21, 0.7) - Tilson Smoothed</text>
    <rect x="430" y="-6" width="8" height="12" fill="#26a69a" rx="1"/>
    <text x="444" y="4" fill="#888" font-size="10">Bullish</text>
    <rect x="490" y="-6" width="8" height="12" fill="#ef5350" rx="1"/>
    <text x="504" y="4" fill="#888" font-size="10">Bearish</text>
  </g>
</svg>
