<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Bollinger Width Percentile</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart with BB -->
  <rect x="60" y="70" width="700" height="150" fill="rgba(255,255,255,0.02)" rx="4"/>
  <!-- BB upper -->
  <polyline points="100,120 160,115 220,118 280,125 340,100 400,85 460,90 520,110 580,115 640,118 700,112" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.4"/>
  <!-- BB lower -->
  <polyline points="100,165 160,168 220,162 280,155 340,170 400,185 460,180 520,168 580,165 640,162 700,168" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.4"/>
  <!-- BB fill -->
  <polygon points="100,120 160,115 220,118 280,125 340,100 400,85 460,90 520,110 580,115 640,118 700,112 700,168 640,162 580,165 520,168 460,180 400,185 340,170 280,155 220,162 160,168 100,165" fill="rgba(66,165,245,0.06)"/>
  <!-- Price -->
  <polyline points="100,145 160,140 220,138 280,140 340,130 400,135 460,140 520,142 580,138 640,135 700,138" fill="none" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Squeeze annotation -->
  <text x="180" y="90" fill="#66BB6A" font-family="Inter,sans-serif" font-size="9">Narrow Bands</text>
  <!-- Expansion annotation -->
  <text x="400" y="80" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">Wide Bands</text>

  <!-- Percentile subplot -->
  <rect x="60" y="250" width="700" height="180" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="270" fill="#888" font-family="Inter,sans-serif" font-size="10">Width Percentile (0-100)</text>

  <!-- Squeeze bg -->
  <rect x="80" y="250" width="200" height="180" fill="rgba(76,175,80,0.06)"/>
  <!-- Expansion bg -->
  <rect x="340" y="250" width="180" height="180" fill="rgba(244,67,54,0.06)"/>

  <!-- Thresholds -->
  <line x1="60" y1="395" x2="760" y2="395" stroke="#66BB6A" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="762" y="399" fill="#66BB6A" font-family="Inter,sans-serif" font-size="9">20%</text>
  <line x1="60" y1="295" x2="760" y2="295" stroke="#EF5350" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="762" y="299" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">80%</text>
  <line x1="60" y1="340" x2="760" y2="340" stroke="#888" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <text x="762" y="344" fill="#888" font-family="Inter,sans-serif" font-size="9">50%</text>

  <!-- Percentile line -->
  <polyline points="100,405 160,410 220,400 280,390 340,310 400,280 460,285 520,350 580,380 640,395 700,390" fill="none" stroke="#42A5F5" stroke-width="2"/>

  <!-- Legend -->
  <rect x="60" y="460" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="475" x2="100" y2="475" stroke="#42A5F5" stroke-width="2"/>
  <text x="105" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Width Percentile</text>
  <rect x="260" y="470" width="10" height="10" fill="rgba(76,175,80,0.3)"/>
  <text x="275" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Squeeze</text>
  <rect x="370" y="470" width="10" height="10" fill="rgba(244,67,54,0.3)"/>
  <text x="385" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Expansion</text>
</svg>
