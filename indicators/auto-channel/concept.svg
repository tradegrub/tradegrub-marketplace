<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Auto Channel Detection</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>
  <line x1="60" y1="70" x2="60" y2="420" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="420" x2="760" y2="420" stroke="#333" stroke-width="1"/>
  <!-- Channel fill -->
  <polygon points="100,310 740,110 740,200 100,400" fill="rgba(66,165,245,0.04)"/>
  <!-- Upper channel line -->
  <line x1="100" y1="310" x2="740" y2="110" stroke="#42A5F5" stroke-width="2"/>
  <!-- Lower channel line -->
  <line x1="100" y1="400" x2="740" y2="200" stroke="#42A5F5" stroke-width="2"/>
  <!-- Midline -->
  <line x1="100" y1="355" x2="740" y2="155" stroke="rgba(66,165,245,0.4)" stroke-width="1" stroke-dasharray="6,4"/>
  <!-- Candlesticks within channel -->
  <rect x="110" y="360" width="8" height="25" fill="#4CAF50" rx="1"/>
  <rect x="145" y="370" width="8" height="20" fill="#ef5350" rx="1"/>
  <rect x="180" y="345" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="215" y="330" width="8" height="25" fill="#4CAF50" rx="1"/>
  <rect x="250" y="340" width="8" height="30" fill="#ef5350" rx="1"/>
  <rect x="285" y="310" width="8" height="25" fill="#4CAF50" rx="1"/>
  <rect x="320" y="295" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="355" y="285" width="8" height="20" fill="#ef5350" rx="1"/>
  <rect x="390" y="270" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="425" y="255" width="8" height="25" fill="#ef5350" rx="1"/>
  <rect x="460" y="240" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="495" y="225" width="8" height="25" fill="#4CAF50" rx="1"/>
  <rect x="530" y="215" width="8" height="30" fill="#ef5350" rx="1"/>
  <rect x="565" y="195" width="8" height="25" fill="#4CAF50" rx="1"/>
  <rect x="600" y="180" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="635" y="170" width="8" height="20" fill="#ef5350" rx="1"/>
  <rect x="670" y="155" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="705" y="140" width="8" height="25" fill="#4CAF50" rx="1"/>
  <!-- Labels -->
  <text x="745" y="108" fill="#42A5F5" font-family="Inter,sans-serif" font-size="10">Upper</text>
  <text x="745" y="153" fill="rgba(66,165,245,0.6)" font-family="Inter,sans-serif" font-size="10">Mid</text>
  <text x="745" y="198" fill="#42A5F5" font-family="Inter,sans-serif" font-size="10">Lower</text>
  <!-- Legend -->
  <rect x="200" y="450" width="400" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
  <line x1="230" y1="465" x2="250" y2="465" stroke="#42A5F5" stroke-width="2"/>
  <text x="256" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Channel Bounds</text>
  <line x1="380" y1="465" x2="400" y2="465" stroke="rgba(66,165,245,0.4)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="406" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Regression Midline</text>
</svg>