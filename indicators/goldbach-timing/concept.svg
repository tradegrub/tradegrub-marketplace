<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-family="system-ui,sans-serif" font-size="17" font-weight="600">Prime Cycle Timing</text>
  <text x="400" y="48" text-anchor="middle" fill="#667" font-family="system-ui,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Chart area: x=60..760, y=65..410 -->
  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="65" x2="60" y2="410"/>
    <line x1="200" y1="65" x2="200" y2="410"/>
    <line x1="340" y1="65" x2="340" y2="410"/>
    <line x1="480" y1="65" x2="480" y2="410"/>
    <line x1="620" y1="65" x2="620" y2="410"/>
    <line x1="760" y1="65" x2="760" y2="410"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="170" x2="760" y2="170"/>
    <line x1="60" y1="240" x2="760" y2="240"/>
    <line x1="60" y1="310" x2="760" y2="310"/>
    <line x1="60" y1="380" x2="760" y2="380"/>
  </g>

  <!-- Axes -->
  <line x1="60" y1="410" x2="760" y2="410" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="60" y1="65" x2="60" y2="410" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Bar scale: 25 bars across, each bar = 28px, starting at x=60 -->
  <!-- Prime vertical lines at bars 2,3,5,7,11,13,17,19,23 -->
  <g stroke="#00b4d8" stroke-opacity="0.5" stroke-width="1" stroke-dasharray="4,3">
    <line x1="116" y1="65" x2="116" y2="410"/>
    <line x1="144" y1="65" x2="144" y2="410"/>
    <line x1="200" y1="65" x2="200" y2="410"/>
    <line x1="256" y1="65" x2="256" y2="410"/>
    <line x1="368" y1="65" x2="368" y2="410"/>
    <line x1="424" y1="65" x2="424" y2="410"/>
    <line x1="536" y1="65" x2="536" y2="410"/>
    <line x1="592" y1="65" x2="592" y2="410"/>
    <line x1="704" y1="65" x2="704" y2="410"/>
  </g>
  <!-- Prime labels -->
  <g fill="#00b4d8" font-family="monospace" font-size="9" text-anchor="middle" opacity="0.7">
    <text x="116" y="422">2</text>
    <text x="144" y="422">3</text>
    <text x="200" y="422">5</text>
    <text x="256" y="422">7</text>
    <text x="368" y="422">11</text>
    <text x="424" y="422">13</text>
    <text x="536" y="422">17</text>
    <text x="592" y="422">19</text>
    <text x="704" y="422">23</text>
  </g>

  <!-- Fibonacci vertical lines at bars 1,2,3,5,8,13,21 -->
  <g stroke="#f0a500" stroke-opacity="0.45" stroke-width="1" stroke-dasharray="6,4">
    <line x1="88" y1="65" x2="88" y2="410"/>
    <line x1="116" y1="65" x2="116" y2="410"/>
    <line x1="144" y1="65" x2="144" y2="410"/>
    <line x1="200" y1="65" x2="200" y2="410"/>
    <line x1="284" y1="65" x2="284" y2="410"/>
    <line x1="424" y1="65" x2="424" y2="410"/>
    <line x1="648" y1="65" x2="648" y2="410"/>
  </g>
  <!-- Fibonacci labels -->
  <g fill="#f0a500" font-family="monospace" font-size="9" text-anchor="middle" opacity="0.7">
    <text x="88" y="432">F1</text>
    <text x="284" y="432">F8</text>
    <text x="648" y="432">F21</text>
  </g>

  <!-- Price line -->
  <polyline fill="none" stroke="#8ecae6" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"
    points="60,280 74,270 88,260 102,255 116,230 130,245 144,270 158,260 172,240 186,225 200,195 214,210 228,230 242,250 256,265 270,255 284,240 298,260 312,275 326,285 340,270 354,250 368,235 382,250 396,270 410,280 424,310 438,295 452,275 466,260 480,250 494,260 508,280 522,295 536,290 550,270 564,255 578,240 592,220 606,235 620,260 634,275 648,290 662,280 676,265 690,255 704,230 718,245 732,260 746,270 760,275"/>

  <!-- Convergence points (prime AND fibonacci): bars 2,3,5,13 -->
  <g filter="url(#glowStrong)">
    <circle cx="116" cy="230" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.9"/>
    <circle cx="144" cy="270" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.9"/>
    <circle cx="200" cy="195" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.9"/>
    <circle cx="424" cy="310" r="6" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.9"/>
  </g>
  <!-- Inner dots -->
  <g>
    <circle cx="116" cy="230" r="2.5" fill="#ff6b6b" opacity="0.8"/>
    <circle cx="144" cy="270" r="2.5" fill="#ff6b6b" opacity="0.8"/>
    <circle cx="200" cy="195" r="2.5" fill="#ff6b6b" opacity="0.8"/>
    <circle cx="424" cy="310" r="2.5" fill="#ff6b6b" opacity="0.8"/>
  </g>

  <!-- Reversal arrows near convergence points -->
  <g fill="#8ecae6" opacity="0.5" font-family="system-ui,sans-serif" font-size="8">
    <text x="116" y="218" text-anchor="middle">&#x25BC;</text>
    <text x="200" y="183" text-anchor="middle">&#x25BC;</text>
    <text x="424" y="322" text-anchor="middle">&#x25B2;</text>
  </g>

  <!-- Callout box pointing to bar 13 convergence -->
  <rect x="460" y="285" width="165" height="42" rx="4" fill="#16213e" stroke="#ff6b6b" stroke-width="1" opacity="0.9"/>
  <text x="542" y="302" text-anchor="middle" fill="#ff6b6b" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Potential Reversal Window</text>
  <text x="542" y="318" text-anchor="middle" fill="#999" font-family="system-ui,sans-serif" font-size="8.5">Prime 13 + Fibonacci 13 converge</text>
  <line x1="460" y1="310" x2="432" y2="310" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="2,2" opacity="0.7"/>

  <!-- Mathematical formula decoration -->
  <text x="740" y="82" text-anchor="end" fill="#ffffff" font-family="monospace" font-size="9" opacity="0.15">P(n) &#x2229; F(n)</text>

  <!-- Legend bar -->
  <rect x="60" y="445" width="700" height="40" rx="4" fill="#0d1117" opacity="0.6"/>
  <g font-family="system-ui,sans-serif" font-size="10">
    <line x1="90" y1="465" x2="120" y2="465" stroke="#00b4d8" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="128" y="469" fill="#00b4d8">Prime Intervals</text>
    <line x1="270" y1="465" x2="300" y2="465" stroke="#f0a500" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="308" y="469" fill="#f0a500">Fibonacci Intervals</text>
    <circle cx="480" cy="465" r="5" fill="none" stroke="#ff6b6b" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="480" cy="465" r="2" fill="#ff6b6b"/>
    <text x="492" y="469" fill="#ff6b6b">Convergence Points</text>
    <line x1="640" y1="465" x2="670" y2="465" stroke="#8ecae6" stroke-width="1.5"/>
    <text x="678" y="469" fill="#8ecae6">Price</text>
  </g>
</svg>