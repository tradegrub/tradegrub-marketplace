<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Optimal Trade Entry Zone</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="70" x2="80" y2="410"/><line x1="200" y1="70" x2="200" y2="410"/>
    <line x1="320" y1="70" x2="320" y2="410"/><line x1="440" y1="70" x2="440" y2="410"/>
    <line x1="560" y1="70" x2="560" y2="410"/><line x1="680" y1="70" x2="680" y2="410"/>
  </g>

  <!-- Swing low -->
  <circle cx="120" cy="350" r="4" fill="none" stroke="#00e676" stroke-width="1.5"/>
  <text x="120" y="370" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="9">Swing Low</text>

  <!-- Uptrend candles to swing high -->
  <line x1="120" y1="330" x2="120" y2="360" stroke="#26a69a" stroke-width="1"/>
  <rect x="116" y="335" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="155" y1="310" x2="155" y2="340" stroke="#26a69a" stroke-width="1"/>
  <rect x="151" y="315" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="190" y1="280" x2="190" y2="315" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="285" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="225" y1="240" x2="225" y2="280" stroke="#26a69a" stroke-width="1"/>
  <rect x="221" y="248" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="260" y1="190" x2="260" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="256" y="198" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="295" y1="140" x2="295" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="291" y="148" width="8" height="32" fill="#26a69a" rx="1"/>
  <line x1="330" y1="100" x2="330" y2="155" stroke="#26a69a" stroke-width="1"/>
  <rect x="326" y="108" width="8" height="30" fill="#26a69a" rx="1"/>

  <!-- Swing high -->
  <circle cx="330" cy="95" r="4" fill="none" stroke="#ff1744" stroke-width="1.5"/>
  <text x="330" y="85" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="9">Swing High</text>

  <!-- Fibonacci levels -->
  <line x1="340" y1="350" x2="700" y2="350" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.15" stroke-dasharray="3,3"/>
  <text x="710" y="354" fill="#666" font-family="Inter,sans-serif" font-size="8">0%</text>
  <line x1="340" y1="225" x2="700" y2="225" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,4"/>
  <text x="710" y="229" fill="#aaa" font-family="Inter,sans-serif" font-size="8">50%</text>
  <line x1="340" y1="100" x2="700" y2="100" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.15" stroke-dasharray="3,3"/>
  <text x="710" y="104" fill="#666" font-family="Inter,sans-serif" font-size="8">100%</text>

  <!-- OTE Zone (61.8% to 78.6%) -->
  <rect x="340" y="195" width="360" height="65" fill="#42A5F5" fill-opacity="0.08" rx="2"/>
  <line x1="340" y1="195" x2="700" y2="195" stroke="#42A5F5" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="710" y="199" fill="#42A5F5" font-family="Inter,sans-serif" font-size="8">61.8%</text>
  <line x1="340" y1="260" x2="700" y2="260" stroke="#42A5F5" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="710" y="264" fill="#42A5F5" font-family="Inter,sans-serif" font-size="8">78.6%</text>

  <rect x="430" y="210" width="80" height="20" rx="4" fill="rgba(66,165,245,0.2)" stroke="#42A5F5" stroke-width="0.5"/>
  <text x="470" y="224" text-anchor="middle" fill="#42A5F5" font-family="Inter,sans-serif" font-size="10" font-weight="600">OTE ZONE</text>

  <!-- Pullback candles into OTE zone -->
  <line x1="365" y1="120" x2="365" y2="170" stroke="#ef5350" stroke-width="1"/>
  <rect x="361" y="128" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="400" y1="150" x2="400" y2="200" stroke="#ef5350" stroke-width="1"/>
  <rect x="396" y="158" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="435" y1="180" x2="435" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="431" y="190" width="8" height="30" fill="#ef5350" rx="1"/>
  <!-- Entry candle in OTE zone -->
  <line x1="470" y1="210" x2="470" y2="260" stroke="#ef5350" stroke-width="1"/>
  <rect x="466" y="220" width="8" height="25" fill="#ef5350" rx="1"/>
  <polygon points="466,268 478,268 472,278" fill="#00e676"/>

  <!-- Bounce from OTE -->
  <line x1="505" y1="200" x2="505" y2="250" stroke="#26a69a" stroke-width="1"/>
  <rect x="501" y="208" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="540" y1="175" x2="540" y2="225" stroke="#26a69a" stroke-width="1"/>
  <rect x="536" y="182" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="575" y1="150" x2="575" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="571" y="158" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="610" y1="125" x2="610" y2="175" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="132" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="645" y1="105" x2="645" y2="150" stroke="#26a69a" stroke-width="1"/>
  <rect x="641" y="112" width="8" height="25" fill="#26a69a" rx="1"/>

  <!-- Legend -->
  <g transform="translate(80, 440)">
    <rect width="640" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <rect x="15" y="12" width="20" height="16" fill="#42A5F5" fill-opacity="0.3" rx="2"/>
    <text x="40" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">OTE Zone (61.8-78.6%)</text>
    <line x1="200" y1="20" x2="220" y2="20" stroke="#ffffff" stroke-width="0.8" stroke-dasharray="4,4" stroke-opacity="0.3"/>
    <text x="225" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">50% Equilibrium</text>
    <circle cx="370" cy="20" r="3" fill="none" stroke="#00e676" stroke-width="1.5"/>
    <text x="378" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Swing Low</text>
    <circle cx="460" cy="20" r="3" fill="none" stroke="#ff1744" stroke-width="1.5"/>
    <text x="468" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Swing High</text>
  </g>
</svg>
