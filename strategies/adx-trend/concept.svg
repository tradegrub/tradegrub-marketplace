<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="120" x2="760" y2="120"/><line x1="60" y1="200" x2="760" y2="200"/>
    <line x1="60" y1="280" x2="760" y2="280"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">ADX Trend Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price candles - sideways then trending up -->
  <!-- Sideways chop zone -->
  <rect x="75" y="175" width="170" height="70" fill="#ef5350" fill-opacity="0.04" rx="3"/>
  <text x="160" y="170" text-anchor="middle" fill="#ef5350" font-size="9" opacity="0.6">No Trade (ADX &lt; 20)</text>

  <line x1="95" y1="195" x2="95" y2="230" stroke="#ef5350" stroke-width="1"/>
  <rect x="91" y="200" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="120" y1="200" x2="120" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="116" y="210" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="145" y1="192" x2="145" y2="228" stroke="#ef5350" stroke-width="1"/>
  <rect x="141" y="198" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="170" y1="198" x2="170" y2="232" stroke="#26a69a" stroke-width="1"/>
  <rect x="166" y="205" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="195" y1="195" x2="195" y2="230" stroke="#ef5350" stroke-width="1"/>
  <rect x="191" y="200" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="220" y1="198" x2="220" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="208" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- +DI crosses above -DI signal -->
  <line x1="250" y1="185" x2="250" y2="225" stroke="#00e676" stroke-width="1.5"/>
  <rect x="244" y="190" width="12" height="28" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- Entry arrow -->
  <g filter="url(#softGlow)">
    <polygon points="250,182 260,182 255,170" fill="#00e676"/>
  </g>
  <rect x="262" y="165" width="115" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="319" y="179" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">LONG: +DI &gt; -DI</text>

  <!-- Trending up candles -->
  <line x1="280" y1="175" x2="280" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="180" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="310" y1="165" x2="310" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="170" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="340" y1="155" x2="340" y2="192" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="160" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="370" y1="148" x2="370" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="366" y="152" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="400" y1="140" x2="400" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="145" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="430" y1="128" x2="430" y2="168" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="132" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="460" y1="120" x2="460" y2="158" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="125" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="490" y1="118" x2="490" y2="155" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="122" width="8" height="20" fill="#ef5350" rx="1"/>
  <!-- -DI crosses above +DI exit -->
  <line x1="520" y1="125" x2="520" y2="165" stroke="#ef5350" stroke-width="1"/>
  <rect x="514" y="128" width="12" height="28" fill="#ef5350" rx="1"/>

  <rect x="530" y="120" width="110" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="585" y="134" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">EXIT: -DI &gt; +DI</text>

  <!-- Separator -->
  <line x1="60" y1="270" x2="760" y2="270" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="285" fill="#888" font-size="9">ADX / DI Panel</text>

  <!-- ADX threshold -->
  <line x1="80" y1="340" x2="560" y2="340" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="565" y="344" fill="#ff9800" font-size="9" opacity="0.7">ADX = 20</text>

  <!-- ADX line -->
  <polyline points="95,375 120,370 145,365 170,368 195,372 220,360 250,335 280,320 310,310 340,305 370,308 400,300 430,295 460,298 490,305 520,315" fill="none" stroke="#e0e0e0" stroke-width="2" opacity="0.9"/>

  <!-- +DI line -->
  <polyline points="95,355 120,360 145,358 170,362 195,355 220,350 250,325 280,318 310,312 340,308 370,315 400,305 430,298 460,300 490,310 520,330" fill="none" stroke="#26a69a" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.7"/>

  <!-- -DI line -->
  <polyline points="95,352 120,348 145,355 170,350 195,358 220,355 250,360 280,365 310,368 340,370 370,365 400,368 430,372 460,370 490,362 520,325" fill="none" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.7"/>

  <!-- Crossover points -->
  <circle cx="250" cy="342" r="5" fill="none" stroke="#00e676" stroke-width="1.5" filter="url(#softGlow)"/>
  <circle cx="520" cy="327" r="5" fill="none" stroke="#ef5350" stroke-width="1.5"/>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="91" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="116" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="141" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="166" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="191" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="216" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
  </g>
  <rect x="244" y="392" width="12" height="23" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="276" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="306" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="336" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="366" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="396" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="426" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="456" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="486" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="514" y="400" width="12" height="15" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#e0e0e0"/>
    <text x="30" y="24" fill="#999" font-size="9">ADX Line</text>
    <circle cx="110" cy="20" r="4" fill="#26a69a"/>
    <text x="120" y="24" fill="#999" font-size="9">+DI (Bullish)</text>
    <circle cx="220" cy="20" r="4" fill="#ef5350"/>
    <text x="230" y="24" fill="#999" font-size="9">-DI (Bearish)</text>
    <circle cx="330" cy="20" r="4" fill="#ff9800"/>
    <text x="340" y="24" fill="#999" font-size="9">ADX Threshold</text>
    <circle cx="460" cy="20" r="4" fill="#00e676"/>
    <text x="470" y="24" fill="#999" font-size="9">Entry Signal</text>
  </g>
</svg>