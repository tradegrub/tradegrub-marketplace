<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">ML RSI Classifier</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price panel (top 55%) -->
  <!-- Background classification zones -->
  <rect x="80" y="60" width="140" height="200" fill="#26a69a" fill-opacity="0.05"/>
  <rect x="220" y="60" width="120" height="200" fill="#ff9800" fill-opacity="0.05"/>
  <rect x="340" y="60" width="80" height="200" fill="#e040fb" fill-opacity="0.05"/>
  <rect x="420" y="60" width="160" height="200" fill="#ef5350" fill-opacity="0.05"/>
  <rect x="580" y="60" width="100" height="200" fill="#e040fb" fill-opacity="0.05"/>
  <rect x="680" y="60" width="80" height="200" fill="#26a69a" fill-opacity="0.05"/>

  <!-- Classification labels at top -->
  <text x="150" y="75" text-anchor="middle" fill="#26a69a" font-size="9" opacity="0.7">Trend Up</text>
  <text x="280" y="75" text-anchor="middle" fill="#ff9800" font-size="9" opacity="0.7">Ranging</text>
  <text x="380" y="75" text-anchor="middle" fill="#e040fb" font-size="9" opacity="0.7">Reversal</text>
  <text x="500" y="75" text-anchor="middle" fill="#ef5350" font-size="9" opacity="0.7">Trend Down</text>
  <text x="630" y="75" text-anchor="middle" fill="#e040fb" font-size="9" opacity="0.7">Reversal</text>
  <text x="720" y="75" text-anchor="middle" fill="#26a69a" font-size="9" opacity="0.7">Trend Up</text>

  <!-- Candlesticks - uptrend, range, reversal, downtrend, reversal, uptrend start -->
  <line x1="100" y1="200" x2="100" y2="240" stroke="#26a69a" stroke-width="1"/><rect x="96" y="208" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="125" y1="185" x2="125" y2="225" stroke="#26a69a" stroke-width="1"/><rect x="121" y="192" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="150" y1="165" x2="150" y2="210" stroke="#26a69a" stroke-width="1"/><rect x="146" y="172" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="175" y1="148" x2="175" y2="195" stroke="#26a69a" stroke-width="1"/><rect x="171" y="155" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="200" y1="130" x2="200" y2="175" stroke="#26a69a" stroke-width="1"/><rect x="196" y="138" width="8" height="22" fill="#26a69a" rx="1"/>
  <!-- Ranging -->
  <line x1="235" y1="125" x2="235" y2="165" stroke="#ef5350" stroke-width="1"/><rect x="231" y="130" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="260" y1="128" x2="260" y2="162" stroke="#26a69a" stroke-width="1"/><rect x="256" y="138" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="285" y1="122" x2="285" y2="158" stroke="#ef5350" stroke-width="1"/><rect x="281" y="128" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="310" y1="126" x2="310" y2="160" stroke="#26a69a" stroke-width="1"/><rect x="306" y="135" width="8" height="15" fill="#26a69a" rx="1"/>
  <!-- Reversal -->
  <line x1="350" y1="118" x2="350" y2="158" stroke="#ef5350" stroke-width="1"/><rect x="346" y="122" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="375" y1="130" x2="375" y2="175" stroke="#ef5350" stroke-width="1"/><rect x="371" y="135" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="400" y1="148" x2="400" y2="190" stroke="#ef5350" stroke-width="1"/><rect x="396" y="152" width="8" height="25" fill="#ef5350" rx="1"/>
  <!-- Trend down -->
  <line x1="435" y1="160" x2="435" y2="208" stroke="#ef5350" stroke-width="1"/><rect x="431" y="165" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="460" y1="178" x2="460" y2="225" stroke="#26a69a" stroke-width="1"/><rect x="456" y="195" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="485" y1="195" x2="485" y2="240" stroke="#ef5350" stroke-width="1"/><rect x="481" y="200" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="510" y1="210" x2="510" y2="252" stroke="#ef5350" stroke-width="1"/><rect x="506" y="215" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="535" y1="225" x2="535" y2="258" stroke="#ef5350" stroke-width="1"/><rect x="531" y="230" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="560" y1="235" x2="560" y2="260" stroke="#ef5350" stroke-width="1"/><rect x="556" y="238" width="8" height="15" fill="#ef5350" rx="1"/>
  <!-- Reversal -->
  <line x1="595" y1="238" x2="595" y2="258" stroke="#26a69a" stroke-width="1"/><rect x="591" y="242" width="8" height="10" fill="#26a69a" rx="1"/>
  <line x1="620" y1="230" x2="620" y2="255" stroke="#26a69a" stroke-width="1"/><rect x="616" y="238" width="8" height="10" fill="#26a69a" rx="1"/>
  <line x1="645" y1="220" x2="645" y2="250" stroke="#26a69a" stroke-width="1"/><rect x="641" y="228" width="8" height="12" fill="#26a69a" rx="1"/>
  <line x1="670" y1="215" x2="670" y2="248" stroke="#26a69a" stroke-width="1"/><rect x="666" y="222" width="8" height="15" fill="#26a69a" rx="1"/>
  <!-- New uptrend -->
  <line x1="700" y1="200" x2="700" y2="240" stroke="#26a69a" stroke-width="1"/><rect x="696" y="208" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="725" y1="185" x2="725" y2="225" stroke="#26a69a" stroke-width="1"/><rect x="721" y="192" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="750" y1="172" x2="750" y2="215" stroke="#26a69a" stroke-width="1"/><rect x="746" y="180" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Separator -->
  <line x1="60" y1="280" x2="760" y2="280" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="295" fill="#888" font-size="9">RSI + KNN Classification</text>

  <!-- RSI overbought/oversold zones -->
  <rect x="80" y="290" width="680" height="15" fill="#ef5350" fill-opacity="0.06"/>
  <rect x="80" y="380" width="680" height="30" fill="#26a69a" fill-opacity="0.06"/>
  <line x1="80" y1="305" x2="760" y2="305" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="765" y="308" fill="#ef5350" font-size="7" opacity="0.5">70</text>
  <line x1="80" y1="380" x2="760" y2="380" stroke="#26a69a" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="765" y="383" fill="#26a69a" font-size="7" opacity="0.5">30</text>
  <line x1="80" y1="340" x2="760" y2="340" stroke="#888" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.2"/>
  <text x="765" y="343" fill="#888" font-size="7" opacity="0.4">50</text>

  <!-- RSI line colored by classification -->
  <polyline points="100,365 125,350 150,335 175,325 200,310 235,320 260,330 285,325 310,330 350,315 375,330 400,345 435,355 460,348 485,365 510,375 535,385 560,390 595,388 620,378 645,365 670,355 700,340 725,330 750,318" fill="none" stroke="#ab47bc" stroke-width="2" opacity="0.9"/>

  <!-- Confidence bars under RSI (small bars showing KNN confidence) -->
  <g opacity="0.5">
    <rect x="96" y="402" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="121" y="400" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="146" y="398" width="8" height="16" fill="#26a69a" rx="1"/>
    <rect x="171" y="396" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="196" y="400" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="231" y="404" width="8" height="10" fill="#ff9800" rx="1"/>
    <rect x="256" y="406" width="8" height="8" fill="#ff9800" rx="1"/>
    <rect x="281" y="405" width="8" height="9" fill="#ff9800" rx="1"/>
    <rect x="306" y="404" width="8" height="10" fill="#ff9800" rx="1"/>
    <rect x="346" y="400" width="8" height="14" fill="#e040fb" rx="1"/>
    <rect x="371" y="398" width="8" height="16" fill="#e040fb" rx="1"/>
    <rect x="396" y="400" width="8" height="14" fill="#e040fb" rx="1"/>
    <rect x="431" y="396" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="456" y="400" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="481" y="398" width="8" height="16" fill="#ef5350" rx="1"/>
    <rect x="506" y="396" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="531" y="400" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="556" y="402" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="591" y="400" width="8" height="14" fill="#e040fb" rx="1"/>
    <rect x="616" y="398" width="8" height="16" fill="#e040fb" rx="1"/>
    <rect x="641" y="400" width="8" height="14" fill="#e040fb" rx="1"/>
    <rect x="666" y="402" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="696" y="398" width="8" height="16" fill="#26a69a" rx="1"/>
    <rect x="721" y="396" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="746" y="395" width="8" height="19" fill="#26a69a" rx="1"/>
  </g>

  <!-- Feature annotation -->
  <rect x="200" y="85" width="180" height="45" rx="4" fill="#ffffff" fill-opacity="0.06" stroke="#ab47bc" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="290" y="100" text-anchor="middle" fill="#bbb" font-size="9">KNN Features:</text>
  <text x="290" y="114" text-anchor="middle" fill="#999" font-size="8">momentum | acceleration | z-score</text>
  <text x="290" y="126" text-anchor="middle" fill="#999" font-size="8">divergence | vol-adjusted level</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Trend Up</text>
    <circle cx="110" cy="20" r="4" fill="#ef5350"/>
    <text x="120" y="24" fill="#999" font-size="9">Trend Down</text>
    <circle cx="210" cy="20" r="4" fill="#ff9800"/>
    <text x="220" y="24" fill="#999" font-size="9">Ranging</text>
    <circle cx="300" cy="20" r="4" fill="#e040fb"/>
    <text x="310" y="24" fill="#999" font-size="9">Reversal</text>
    <circle cx="390" cy="20" r="4" fill="#ab47bc"/>
    <text x="400" y="24" fill="#999" font-size="9">RSI Line</text>
    <rect x="480" y="12" width="16" height="16" rx="2" fill="#26a69a" opacity="0.4"/>
    <text x="502" y="24" fill="#999" font-size="9">Confidence</text>
  </g>
</svg>