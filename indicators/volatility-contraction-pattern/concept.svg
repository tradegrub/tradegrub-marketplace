<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="600">Volatility Contraction Pattern</text>
  <text x="400" y="48" text-anchor="middle" fill="#666688" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="60" y1="80" x2="760" y2="80"/><line x1="60" y1="120" x2="760" y2="120"/>
    <line x1="60" y1="160" x2="760" y2="160"/><line x1="60" y1="200" x2="760" y2="200"/>
    <line x1="60" y1="240" x2="760" y2="240"/><line x1="60" y1="280" x2="760" y2="280"/>
    <line x1="60" y1="320" x2="760" y2="320"/><line x1="60" y1="360" x2="760" y2="360"/>
    <line x1="120" y1="60" x2="120" y2="400"/><line x1="200" y1="60" x2="200" y2="400"/>
    <line x1="280" y1="60" x2="280" y2="400"/><line x1="360" y1="60" x2="360" y2="400"/>
    <line x1="440" y1="60" x2="440" y2="400"/><line x1="520" y1="60" x2="520" y2="400"/>
    <line x1="600" y1="60" x2="600" y2="400"/><line x1="680" y1="60" x2="680" y2="400"/>
  </g>

  <!-- Candlesticks: progressively tighter ranges, then breakout -->
  <g>
    <!-- Candle 1: wide red -->
    <line x1="95" y1="100" x2="95" y2="290" stroke="#ef5350" stroke-width="1"/>
    <rect x="88" y="140" width="14" height="110" fill="#ef5350" rx="1"/>

    <!-- Candle 2: wide green -->
    <line x1="130" y1="120" x2="130" y2="300" stroke="#26a69a" stroke-width="1"/>
    <rect x="123" y="150" width="14" height="100" fill="#26a69a" rx="1"/>

    <!-- Candle 3: medium red -->
    <line x1="165" y1="130" x2="165" y2="280" stroke="#ef5350" stroke-width="1"/>
    <rect x="158" y="155" width="14" height="90" fill="#ef5350" rx="1"/>

    <!-- Candle 4: medium green -->
    <line x1="200" y1="140" x2="200" y2="275" stroke="#26a69a" stroke-width="1"/>
    <rect x="193" y="160" width="14" height="80" fill="#26a69a" rx="1"/>

    <!-- Candle 5: narrowing red -->
    <line x1="235" y1="155" x2="235" y2="265" stroke="#ef5350" stroke-width="1"/>
    <rect x="228" y="175" width="14" height="60" fill="#ef5350" rx="1"/>

    <!-- Candle 6: narrowing green -->
    <line x1="270" y1="160" x2="270" y2="260" stroke="#26a69a" stroke-width="1"/>
    <rect x="263" y="180" width="14" height="50" fill="#26a69a" rx="1"/>

    <!-- Candle 7: tighter red -->
    <line x1="305" y1="170" x2="305" y2="255" stroke="#ef5350" stroke-width="1"/>
    <rect x="298" y="190" width="14" height="40" fill="#ef5350" rx="1"/>

    <!-- Candle 8: tighter green -->
    <line x1="340" y1="178" x2="340" y2="248" stroke="#26a69a" stroke-width="1"/>
    <rect x="333" y="195" width="14" height="30" fill="#26a69a" rx="1"/>

    <!-- Candle 9: very tight red -->
    <line x1="375" y1="185" x2="375" y2="240" stroke="#ef5350" stroke-width="1"/>
    <rect x="368" y="200" width="14" height="22" fill="#ef5350" rx="1"/>

    <!-- Candle 10: very tight green -->
    <line x1="410" y1="190" x2="410" y2="235" stroke="#26a69a" stroke-width="1"/>
    <rect x="403" y="203" width="14" height="18" fill="#26a69a" rx="1"/>

    <!-- Candle 11: tightest red (doji-like) -->
    <line x1="445" y1="195" x2="445" y2="230" stroke="#ef5350" stroke-width="1"/>
    <rect x="438" y="206" width="14" height="12" fill="#ef5350" rx="1"/>

    <!-- Candle 12: tightest green -->
    <line x1="480" y1="198" x2="480" y2="225" stroke="#26a69a" stroke-width="1"/>
    <rect x="473" y="207" width="14" height="10" fill="#26a69a" rx="1"/>

    <!-- Candle 13: tiny red -->
    <line x1="515" y1="200" x2="515" y2="222" stroke="#ef5350" stroke-width="1"/>
    <rect x="508" y="206" width="14" height="10" fill="#ef5350" rx="1"/>

    <!-- Candle 14: tiny green -->
    <line x1="550" y1="202" x2="550" y2="220" stroke="#26a69a" stroke-width="1"/>
    <rect x="543" y="206" width="14" height="8" fill="#26a69a" rx="1"/>

    <!-- Candle 15: smallest -->
    <line x1="585" y1="204" x2="585" y2="218" stroke="#26a69a" stroke-width="1"/>
    <rect x="578" y="207" width="14" height="6" fill="#26a69a" rx="1"/>

    <!-- Candle 16: BREAKOUT big green -->
    <line x1="620" y1="100" x2="620" y2="212" stroke="#26a69a" stroke-width="1.5"/>
    <rect x="613" y="120" width="14" height="88" fill="#26a69a" rx="1" filter="url(#glow)"/>

    <!-- Candle 17: continuation green -->
    <line x1="655" y1="70" x2="655" y2="130" stroke="#26a69a" stroke-width="1.5"/>
    <rect x="648" y="80" width="14" height="40" fill="#26a69a" rx="1" filter="url(#glow)"/>
  </g>

  <!-- Converging trendlines -->
  <line x1="88" y1="98" x2="580" y2="200" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <line x1="88" y1="302" x2="580" y2="222" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>

  <!-- VCP Stage 3 label -->
  <text x="440" y="172" text-anchor="middle" fill="#ff9800" font-size="11" font-weight="500" opacity="0.85">VCP Stage 3</text>

  <!-- Breakout arrow -->
  <polyline points="630,108 630,72 634,80" fill="none" stroke="#26a69a" stroke-width="2.5" filter="url(#glow)"/>
  <polyline points="630,72 626,80" fill="none" stroke="#26a69a" stroke-width="2.5" filter="url(#glow)"/>
  <text x="645" y="68" fill="#26a69a" font-size="10" font-weight="600" filter="url(#glow)">Breakout</text>

  <!-- Volume bars (declining then spike) -->
  <g opacity="0.6">
    <rect x="88" y="378" width="12" height="32" fill="#ef5350" rx="1"/>
    <rect x="123" y="382" width="12" height="28" fill="#26a69a" rx="1"/>
    <rect x="158" y="386" width="12" height="24" fill="#ef5350" rx="1"/>
    <rect x="193" y="388" width="12" height="22" fill="#26a69a" rx="1"/>
    <rect x="228" y="392" width="12" height="18" fill="#ef5350" rx="1"/>
    <rect x="263" y="394" width="12" height="16" fill="#26a69a" rx="1"/>
    <rect x="298" y="396" width="12" height="14" fill="#ef5350" rx="1"/>
    <rect x="333" y="398" width="12" height="12" fill="#26a69a" rx="1"/>
    <rect x="368" y="400" width="12" height="10" fill="#ef5350" rx="1"/>
    <rect x="403" y="402" width="12" height="8" fill="#26a69a" rx="1"/>
    <rect x="438" y="403" width="12" height="7" fill="#ef5350" rx="1"/>
    <rect x="473" y="404" width="12" height="6" fill="#26a69a" rx="1"/>
    <rect x="508" y="405" width="12" height="5" fill="#ef5350" rx="1"/>
    <rect x="543" y="406" width="12" height="4" fill="#26a69a" rx="1"/>
    <rect x="578" y="407" width="12" height="3" fill="#26a69a" rx="1"/>
    <!-- Breakout volume spike -->
    <rect x="613" y="368" width="12" height="42" fill="#26a69a" rx="1" filter="url(#glow)"/>
    <rect x="648" y="374" width="12" height="36" fill="#26a69a" rx="1" filter="url(#glow)"/>
  </g>

  <!-- Legend bar -->
  <g>
    <rect x="60" y="440" width="700" height="36" fill="#111128" rx="6" opacity="0.6"/>
    <rect x="80" y="452" width="10" height="10" fill="#26a69a" rx="2"/>
    <text x="96" y="461" fill="#aaaacc" font-size="10">Bullish</text>
    <rect x="155" y="452" width="10" height="10" fill="#ef5350" rx="2"/>
    <text x="171" y="461" fill="#aaaacc" font-size="10">Bearish</text>
    <line x1="235" y1="457" x2="270" y2="457" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="278" y="461" fill="#aaaacc" font-size="10">Contraction Lines</text>
    <rect x="395" y="452" width="10" height="10" fill="#26a69a" rx="2" opacity="0.6"/>
    <text x="411" y="461" fill="#aaaacc" font-size="10">Volume</text>
    <circle cx="475" cy="457" r="4" fill="#26a69a" filter="url(#glow)"/>
    <text x="485" y="461" fill="#aaaacc" font-size="10">Breakout Signal</text>
  </g>
</svg>