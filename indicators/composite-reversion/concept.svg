<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Composite Reversion Score</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="360" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="88" fill="#888" font-family="Inter,sans-serif" font-size="10">Score (0-100)</text>

  <!-- 80 line -->
  <line x1="60" y1="142" x2="760" y2="142" stroke="#EF5350" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="765" y="146" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">80</text>

  <!-- 50 line -->
  <line x1="60" y1="250" x2="760" y2="250" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 20 line -->
  <line x1="60" y1="358" x2="760" y2="358" stroke="#26A69A" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="765" y="362" fill="#26A69A" font-family="Inter,sans-serif" font-size="9">20</text>

  <!-- Overbought bg -->
  <rect x="200" y="70" width="80" height="72" fill="rgba(239,83,80,0.06)"/>
  <!-- Oversold bg -->
  <rect x="480" y="358" width="80" height="72" fill="rgba(38,166,154,0.06)"/>

  <!-- Composite line -->
  <polyline points="100,250 150,220 200,140 250,120 280,160 320,230 370,260 420,280 480,370 520,380 560,340 600,280 650,250 700,240"
    fill="none" stroke="#7E57C2" stroke-width="2.5"/>

  <!-- Legend -->
  <rect x="60" y="460" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="475" x2="110" y2="475" stroke="#7E57C2" stroke-width="2.5"/>
  <text x="115" y="479" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Composite Score</text>
  <line x1="310" y1="475" x2="340" y2="475" stroke="#EF5350" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="345" y="479" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Overbought (80)</text>
  <line x1="520" y1="475" x2="550" y2="475" stroke="#26A69A" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="555" y="479" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Oversold (20)</text>
</svg>
