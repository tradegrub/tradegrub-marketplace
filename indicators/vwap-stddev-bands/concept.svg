<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bandFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26a69a" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#26a69a" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#26a69a" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">VWAP StdDev Bands</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Band fill area -->
  <polygon points="100,130 160,120 220,115 280,108 340,112 400,100 460,95 520,102 580,92 640,88 700,82 740,80 740,310 700,302 640,308 580,312 520,322 460,315 400,320 340,332 280,328 220,335 160,340 100,350" fill="url(#bandFill)"/>

  <!-- Upper band -->
  <polyline points="100,130 160,120 220,115 280,108 340,112 400,100 460,95 520,102 580,92 640,88 700,82 740,80" stroke="#26a69a" stroke-width="1.2" fill="none" opacity="0.5" stroke-dasharray="6,3"/>
  <text x="745" y="84" fill="#26a69a" font-size="8">+2 StdDev</text>

  <!-- VWAP line (center) -->
  <polyline points="100,240 160,230 220,225 280,218 340,222 400,210 460,205 520,212 580,202 640,198 700,192 740,190" stroke="#ff9800" stroke-width="2.5" fill="none" filter="url(#softGlow)"/>
  <text x="745" y="194" fill="#ff9800" font-size="9" font-weight="600">VWAP</text>

  <!-- Lower band -->
  <polyline points="100,350 160,340 220,335 280,328 340,332 400,320 460,315 520,322 580,312 640,308 700,302 740,310" stroke="#26a69a" stroke-width="1.2" fill="none" opacity="0.5" stroke-dasharray="6,3"/>
  <text x="745" y="314" fill="#26a69a" font-size="8">-2 StdDev</text>

  <!-- Candlesticks oscillating within bands, touching edges -->
  <line x1="100" y1="215" x2="100" y2="265" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="225" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="130" y1="205" x2="130" y2="248" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="212" width="8" height="24" fill="#26a69a" rx="1"/>
  <line x1="160" y1="190" x2="160" y2="238" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="198" width="8" height="26" fill="#26a69a" rx="1"/>
  <!-- Touch upper band area -->
  <line x1="190" y1="150" x2="190" y2="208" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="158" width="8" height="32" fill="#26a69a" rx="1"/>
  <line x1="220" y1="120" x2="220" y2="180" stroke="#26a69a" stroke-width="1.5"/>
  <rect x="214" y="125" width="12" height="38" fill="#26a69a" rx="1"/>

  <!-- Sell zone annotation at upper band touch -->
  <rect x="235" y="108" width="72" height="18" rx="4" fill="#ef5350" fill-opacity="0.12" stroke="#ef5350" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="271" y="121" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="500">Sell Zone</text>

  <!-- Mean reversion down -->
  <line x1="250" y1="140" x2="250" y2="200" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="148" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="280" y1="175" x2="280" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="276" y="185" width="8" height="32" fill="#ef5350" rx="1"/>
  <!-- Return to VWAP -->
  <line x1="310" y1="200" x2="310" y2="248" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="208" width="8" height="26" fill="#ef5350" rx="1"/>

  <!-- Mean reversion arrow -->
  <path d="M 295,155 C 300,180 305,200 310,215" fill="none" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <polygon points="307,215 313,215 310,222" fill="#ff9800" opacity="0.6"/>
  <text x="320" y="185" fill="#ff9800" font-size="8" opacity="0.7">Revert to VWAP</text>

  <line x1="340" y1="205" x2="340" y2="245" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="213" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="370" y1="195" x2="370" y2="232" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="202" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="400" y1="188" x2="400" y2="225" stroke="#ef5350" stroke-width="1"/>
  <rect x="396" y="195" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="430" y1="182" x2="430" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="188" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="460" y1="178" x2="460" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="456" y="185" width="8" height="18" fill="#ef5350" rx="1"/>

  <!-- Drop to lower band -->
  <line x1="490" y1="220" x2="490" y2="270" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="228" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="520" y1="265" x2="520" y2="318" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="514" y="272" width="12" height="32" fill="#ef5350" rx="1"/>

  <!-- Buy zone annotation at lower band touch -->
  <rect x="535" y="312" width="72" height="18" rx="4" fill="#00e676" fill-opacity="0.12" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="571" y="325" text-anchor="middle" fill="#00e676" font-size="9" font-weight="500">Buy Zone</text>

  <!-- Mean reversion up -->
  <line x1="550" y1="260" x2="550" y2="310" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="272" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="580" y1="235" x2="580" y2="282" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="242" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="610" y1="210" x2="610" y2="252" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="218" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="640" y1="195" x2="640" y2="228" stroke="#26a69a" stroke-width="1"/>
  <rect x="636" y="200" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="670" y1="182" x2="670" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="666" y="188" width="8" height="16" fill="#ef5350" rx="1"/>
  <line x1="700" y1="178" x2="700" y2="208" stroke="#26a69a" stroke-width="1"/>
  <rect x="696" y="182" width="8" height="17" fill="#26a69a" rx="1"/>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="126" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="156" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="186" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="214" y="385" width="12" height="30" fill="#26a69a" rx="1"/>
    <rect x="246" y="390" width="8" height="25" fill="#ef5350" rx="1"/>
    <rect x="276" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="306" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="336" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="366" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="396" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="426" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="456" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="486" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="514" y="388" width="12" height="27" fill="#ef5350" rx="1"/>
    <rect x="546" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="576" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="606" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="636" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="666" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="696" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">VWAP</text>
    <circle cx="90" cy="20" r="4" fill="#26a69a"/>
    <text x="100" y="24" fill="#999" font-size="9">StdDev Bands</text>
    <circle cx="210" cy="20" r="4" fill="#ef5350"/>
    <text x="220" y="24" fill="#999" font-size="9">Sell Zone (Upper)</text>
    <circle cx="340" cy="20" r="4" fill="#00e676"/>
    <text x="350" y="24" fill="#999" font-size="9">Buy Zone (Lower)</text>
    <text x="510" y="24" fill="#888" font-size="9">Mean Reversion to VWAP</text>
  </g>
</svg>