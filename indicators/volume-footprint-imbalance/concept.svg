<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="buyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#26a69a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#26a69a" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="sellGrad" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef5350" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff0d" stroke-width="0.5">
