<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Volatility Regime</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price candles top 50% - showing varying volatility -->
  <!-- Low vol zone (tight candles) -->
  <rect x="90" y="65" width="160" height="175" fill="#26a69a" fill-opacity="0.03" rx="4"/>
  <text x="170" y="80" text-anchor="middle" fill="#26a69a" font-size="9" opacity="0.6">Low Volatility (Squeeze)</text>

  <line x1="100" y1="162" x2="100" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="97" y="165" width="6" height="8" fill="#26a69a" rx="1"/>
  <line x1="125" y1="160" x2="125" y2="175" stroke="#ef5350" stroke-width="1"/>
  <rect x="122" y="162" width="6" height="8" fill="#ef5350" rx="1"/>
  <line x1="150" y1="158" x2="150" y2="174" stroke="#26a69a" stroke-width="1"/>
  <rect x="147" y="160" width="6" height="9" fill="#26a69a" rx="1"/>
  <line x1="175" y1="156" x2="175" y2="172" stroke="#26a69a" stroke-width="1"/>
  <rect x="172" y="158" width="6" height="9" fill="#26a69a" rx="1"/>
  <line x1="200" y1="155" x2="200" y2="170" stroke="#ef5350" stroke-width="1"/>
  <rect x="197" y="157" width="6" height="8" fill="#ef5350" rx="1"/>
  <line x1="225" y1="153" x2="225" y2="168" stroke="#26a69a" stroke-width="1"/>
  <rect x="222" y="155" width="6" height="8" fill="#26a69a" rx="1"/>

  <!-- High vol expansion (wide candles) -->
  <rect x="260" y="65" width="220" height="175" fill="#ef5350" fill-opacity="0.03" rx="4"/>
  <text x="370" y="80" text-anchor="middle" fill="#ef5350" font-size="9" opacity="0.6">High Volatility (Expansion)</text>

  <line x1="270" y1="120" x2="270" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="266" y="130" width="8" height="45" fill="#26a69a" rx="1"/>
  <line x1="300" y1="105" x2="300" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="296" y="115" width="8" height="48" fill="#26a69a" rx="1"/>
  <line x1="330" y1="95" x2="330" y2="170" stroke="#ef5350" stroke-width="1"/>
  <rect x="326" y="100" width="8" height="50" fill="#ef5350" rx="1"/>
  <line x1="360" y1="108" x2="360" y2="190" stroke="#26a69a" stroke-width="1"/>
  <rect x="356" y="135" width="8" height="40" fill="#26a69a" rx="1"/>
  <line x1="390" y1="100" x2="390" y2="175" stroke="#ef5350" stroke-width="1"/>
  <rect x="386" y="105" width="8" height="52" fill="#ef5350" rx="1"/>
  <line x1="420" y1="115" x2="420" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="416" y="120" width="8" height="48" fill="#ef5350" rx="1"/>
  <line x1="450" y1="130" x2="450" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="446" y="148" width="8" height="32" fill="#26a69a" rx="1"/>

  <!-- Low vol again -->
  <rect x="485" y="65" width="160" height="175" fill="#26a69a" fill-opacity="0.03" rx="4"/>
  <text x="565" y="80" text-anchor="middle" fill="#26a69a" font-size="9" opacity="0.6">Low Volatility</text>

  <line x1="495" y1="155" x2="495" y2="175" stroke="#26a69a" stroke-width="1"/>
  <rect x="492" y="158" width="6" height="10" fill="#26a69a" rx="1"/>
  <line x1="520" y1="152" x2="520" y2="170" stroke="#ef5350" stroke-width="1"/>
  <rect x="517" y="155" width="6" height="10" fill="#ef5350" rx="1"/>
  <line x1="545" y1="150" x2="545" y2="168" stroke="#26a69a" stroke-width="1"/>
  <rect x="542" y="153" width="6" height="10" fill="#26a69a" rx="1"/>
  <line x1="570" y1="148" x2="570" y2="165" stroke="#26a69a" stroke-width="1"/>
  <rect x="567" y="150" width="6" height="10" fill="#26a69a" rx="1"/>
  <line x1="595" y1="146" x2="595" y2="162" stroke="#ef5350" stroke-width="1"/>
  <rect x="592" y="148" width="6" height="9" fill="#ef5350" rx="1"/>
  <line x1="620" y1="144" x2="620" y2="160" stroke="#26a69a" stroke-width="1"/>
  <rect x="617" y="146" width="6" height="9" fill="#26a69a" rx="1"/>

  <!-- Neutral transition -->
  <line x1="650" y1="135" x2="650" y2="165" stroke="#26a69a" stroke-width="1"/>
  <rect x="647" y="140" width="6" height="16" fill="#26a69a" rx="1"/>
  <line x1="675" y1="128" x2="675" y2="162" stroke="#26a69a" stroke-width="1"/>
  <rect x="672" y="135" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="700" y1="120" x2="700" y2="160" stroke="#ef5350" stroke-width="1"/>
  <rect x="697" y="125" width="6" height="24" fill="#ef5350" rx="1"/>
  <line x1="725" y1="115" x2="725" y2="158" stroke="#26a69a" stroke-width="1"/>
  <rect x="722" y="122" width="6" height="25" fill="#26a69a" rx="1"/>

  <!-- Oscillator panel (bottom) -->
  <!-- Axis labels -->
  <text x="72" y="270" text-anchor="end" fill="#888" font-size="8">100</text>
  <text x="72" y="298" text-anchor="end" fill="#888" font-size="8">80</text>
  <text x="72" y="340" text-anchor="end" fill="#888" font-size="8">50</text>
  <text x="72" y="383" text-anchor="end" fill="#888" font-size="8">20</text>
  <text x="72" y="410" text-anchor="end" fill="#888" font-size="8">0</text>

  <!-- High vol threshold -->
  <line x1="80" y1="296" x2="740" y2="296" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="745" y="300" fill="#ef5350" font-size="8">High (80)</text>

  <!-- Low vol threshold -->
  <line x1="80" y1="381" x2="740" y2="381" stroke="#26a69a" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="745" y="385" fill="#26a69a" font-size="8">Low (20)</text>

  <!-- ATR percentile line -->
  <polyline points="100,390 125,392 150,388 175,385 200,387 225,390 270,340 300,295 330,280 360,290 390,275 420,285 450,320 495,385 520,390 545,392 570,388 595,390 620,392 650,370 675,350 700,325 725,310" stroke="#42a5f5" stroke-width="1.5" fill="none" opacity="0.7"/>

  <!-- BBW percentile line -->
  <polyline points="100,395 125,390 150,392 175,388 200,390 225,385 270,330 300,288 330,270 360,285 390,280 420,290 450,335 495,388 520,395 545,390 570,392 595,395 620,390 650,365 675,340 700,315 725,300" stroke="#e040fb" stroke-width="1.5" fill="none" opacity="0.7" stroke-dasharray="6,3"/>

  <!-- Composite regime score (average) -->
  <polyline points="100,393 125,391 150,390 175,387 200,389 225,388 270,335 300,292 330,275 360,288 390,278 420,288 450,328 495,387 520,393 545,391 570,390 595,393 620,391 650,368 675,345 700,320 725,305" stroke="#ff9800" stroke-width="2.5" fill="none"/>

  <!-- High zone background -->
  <rect x="255" y="265" width="210" height="35" fill="#ef5350" fill-opacity="0.06" rx="3"/>
  <!-- Low zone backgrounds -->
  <rect x="90" y="378" width="170" height="35" fill="#26a69a" fill-opacity="0.06" rx="3"/>
  <rect x="485" y="378" width="155" height="35" fill="#26a69a" fill-opacity="0.06" rx="3"/>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">Regime Score</text>
    <circle cx="135" cy="20" r="4" fill="#42a5f5"/>
    <text x="145" y="24" fill="#999" font-size="9">ATR Percentile</text>
    <circle cx="260" cy="20" r="4" fill="#e040fb"/>
    <text x="270" y="24" fill="#999" font-size="9">BBW Percentile</text>
    <rect x="385" y="12" width="16" height="16" fill="#ef5350" opacity="0.2" rx="2"/>
    <text x="406" y="24" fill="#999" font-size="9">High Vol</text>
    <rect x="475" y="12" width="16" height="16" fill="#26a69a" opacity="0.2" rx="2"/>
    <text x="496" y="24" fill="#999" font-size="9">Low Vol (Squeeze)</text>
  </g>
</svg>