<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Elder Impulse System</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price panel (top 55%) with colored bars -->
  <!-- EMA(13) line -->
  <path d="M 90,250 C 130,245 160,235 200,220 Q 240,205 280,190 Q 320,178 360,172 Q 400,170 440,175 Q 480,185 520,200 Q 560,218 600,230 Q 640,238 680,232 Q 710,225 730,215" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.7"/>
  <text x="735" y="212" fill="#42a5f5" font-size="9">EMA(13)</text>

  <!-- GREEN bars (EMA rising + MACD hist rising) -->
  <line x1="280" y1="175" x2="280" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="182" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="310" y1="168" x2="310" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="172" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="340" y1="160" x2="340" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="165" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="370" y1="155" x2="370" y2="188" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="160" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- GREEN label -->
  <rect x="280" y="140" width="110" height="18" rx="4" fill="#26a69a" fill-opacity="0.12" stroke="#26a69a" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="335" y="153" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">GREEN (Bullish)</text>

  <!-- BLUE/neutral bars -->
  <line x1="400" y1="162" x2="400" y2="195" stroke="#42a5f5" stroke-width="1"/>
  <rect x="396" y="168" width="8" height="16" fill="#42a5f5" rx="1"/>
  <line x1="430" y1="166" x2="430" y2="200" stroke="#42a5f5" stroke-width="1"/>
  <rect x="426" y="172" width="8" height="18" fill="#42a5f5" rx="1"/>
  <line x1="460" y1="170" x2="460" y2="208" stroke="#42a5f5" stroke-width="1"/>
  <rect x="456" y="178" width="8" height="20" fill="#42a5f5" rx="1"/>

  <!-- BLUE label -->
  <rect x="400" y="148" width="90" height="18" rx="4" fill="#42a5f5" fill-opacity="0.12" stroke="#42a5f5" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="445" y="161" text-anchor="middle" fill="#42a5f5" font-size="9" font-weight="600">BLUE (Neutral)</text>

  <!-- RED bars (EMA falling + MACD hist falling) -->
  <line x1="490" y1="180" x2="490" y2="225" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="188" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="520" y1="190" x2="520" y2="240" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="198" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="550" y1="200" x2="550" y2="252" stroke="#ef5350" stroke-width="1"/>
  <rect x="546" y="208" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="580" y1="210" x2="580" y2="258" stroke="#ef5350" stroke-width="1"/>
  <rect x="576" y="218" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- RED label -->
  <rect x="500" y="170" width="105" height="18" rx="4" fill="#ef5350" fill-opacity="0.12" stroke="#ef5350" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="552" y="183" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">RED (Bearish)</text>

  <!-- Continuation GREEN bars -->
  <line x1="640" y1="222" x2="640" y2="255" stroke="#26a69a" stroke-width="1"/>
  <rect x="636" y="228" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="670" y1="215" x2="670" y2="248" stroke="#26a69a" stroke-width="1"/>
  <rect x="666" y="220" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="700" y1="205" x2="700" y2="238" stroke="#26a69a" stroke-width="1"/>
  <rect x="696" y="210" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- Earlier bars -->
  <line x1="100" y1="235" x2="100" y2="270" stroke="#ef5350" stroke-width="1"/>
  <rect x="96" y="240" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="130" y1="230" x2="130" y2="268" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="238" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="160" y1="238" x2="160" y2="265" stroke="#42a5f5" stroke-width="1"/>
  <rect x="156" y="242" width="8" height="14" fill="#42a5f5" rx="1"/>
  <line x1="190" y1="232" x2="190" y2="260" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="236" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="220" y1="220" x2="220" y2="252" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="225" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="250" y1="210" x2="250" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="215" width="8" height="16" fill="#26a69a" rx="1"/>

  <!-- MACD Histogram panel (bottom 30%) -->
  <line x1="60" y1="290" x2="760" y2="290" stroke="#888" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="65" y="287" fill="#888" font-size="8">MACD Histogram</text>
  <!-- Zero line -->
  <line x1="60" y1="350" x2="760" y2="350" stroke="#888" stroke-width="0.8" opacity="0.3"/>
  <text x="45" y="353" fill="#666" font-size="8">0</text>

  <!-- MACD hist bars - RED falling -->
  <rect x="97" y="350" width="7" height="22" fill="#ef5350" rx="1" opacity="0.7"/>
  <rect x="127" y="350" width="7" height="28" fill="#ef5350" rx="1" opacity="0.7"/>
  <rect x="157" y="350" width="7" height="15" fill="#ef5350" rx="1" opacity="0.7"/>
  <!-- Rising (GREEN impulse) -->
  <rect x="187" y="338" width="7" height="12" fill="#26a69a" rx="1" opacity="0.7"/>
  <rect x="217" y="330" width="7" height="20" fill="#26a69a" rx="1" opacity="0.7"/>
  <rect x="247" y="322" width="7" height="28" fill="#26a69a" rx="1" opacity="0.7"/>
  <rect x="277" y="315" width="7" height="35" fill="#26a69a" rx="1" opacity="0.7"/>
  <rect x="307" y="310" width="7" height="40" fill="#26a69a" rx="1" opacity="0.7"/>
  <rect x="337" y="308" width="7" height="42" fill="#26a69a" rx="1" opacity="0.7"/>
  <rect x="367" y="312" width="7" height="38" fill="#26a69a" rx="1" opacity="0.7"/>
  <!-- Mixed / falling (BLUE then RED) -->
  <rect x="397" y="318" width="7" height="32" fill="#42a5f5" rx="1" opacity="0.7"/>
  <rect x="427" y="328" width="7" height="22" fill="#42a5f5" rx="1" opacity="0.7"/>
  <rect x="457" y="338" width="7" height="12" fill="#42a5f5" rx="1" opacity="0.7"/>
  <!-- RED falling hist -->
  <rect x="487" y="350" width="7" height="15" fill="#ef5350" rx="1" opacity="0.7"/>
  <rect x="517" y="350" width="7" height="25" fill="#ef5350" rx="1" opacity="0.7"/>
  <rect x="547" y="350" width="7" height="32" fill="#ef5350" rx="1" opacity="0.7"/>
  <rect x="577" y="350" width="7" height="28" fill="#ef5350" rx="1" opacity="0.7"/>
  <!-- Rising again -->
  <rect x="607" y="350" width="7" height="18" fill="#ef5350" rx="1" opacity="0.5"/>
  <rect x="637" y="335" width="7" height="15" fill="#26a69a" rx="1" opacity="0.7"/>
  <rect x="667" y="325" width="7" height="25" fill="#26a69a" rx="1" opacity="0.7"/>
  <rect x="697" y="318" width="7" height="32" fill="#26a69a" rx="1" opacity="0.7"/>

  <!-- Annotations -->
  <path d="M 325,300 L 325,295 L 340,295" fill="none" stroke="#26a69a" stroke-width="1" opacity="0.6"/>
  <text x="343" y="298" fill="#26a69a" font-size="8">Hist Rising</text>

  <path d="M 540,385 L 540,390 L 555,390" fill="none" stroke="#ef5350" stroke-width="1" opacity="0.6"/>
  <text x="558" y="393" fill="#ef5350" font-size="8">Hist Falling</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Green Bar (Both Rising)</text>
    <circle cx="180" cy="20" r="4" fill="#ef5350"/>
    <text x="190" y="24" fill="#999" font-size="9">Red Bar (Both Falling)</text>
    <circle cx="340" cy="20" r="4" fill="#42a5f5"/>
    <text x="350" y="24" fill="#999" font-size="9">Blue Bar (Mixed)</text>
    <rect x="490" y="14" width="30" height="12" fill="#42a5f5" opacity="0.4" rx="2"/>
    <text x="525" y="24" fill="#999" font-size="9">EMA(13)</text>
    <rect x="590" y="14" width="20" height="12" fill="#888" opacity="0.4" rx="2"/>
    <text x="615" y="24" fill="#999" font-size="9">MACD Hist</text>
  </g>
</svg>