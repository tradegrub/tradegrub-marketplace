  <text x="280" y="235" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7" opacity="0.7">Hammer</text>
  <text x="333" y="235" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7" opacity="0.7">Marubozu</text>
  <text x="388" y="235" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7" opacity="0.7">Spin Top</text>
