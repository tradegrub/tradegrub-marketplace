<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Half-Life Mean Reversion</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <rect x="60" y="70" width="700" height="150" fill="rgba(255,255,255,0.02)" rx="4"/>
  <!-- MA line -->
  <polyline points="100,145 160,143 220,140 280,138 340,137 400,138 460,140 520,142 580,143 640,142 700,140" fill="none" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Price oscillating around MA -->
  <polyline points="100,160 160,130 220,155 280,125 340,150 400,128 460,152 520,135 580,148 640,138 700,142" fill="none" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- Spread arrows -->
  <line x1="160" y1="130" x2="160" y2="143" stroke="#66BB6A" stroke-width="1" marker-end="none"/>
  <line x1="220" y1="155" x2="220" y2="140" stroke="#EF5350" stroke-width="1"/>
  <text x="350" y="90" fill="#888" font-family="Inter,sans-serif" font-size="9">Price oscillates around mean</text>

  <!-- Subplot: Half-life + Spread -->
  <rect x="60" y="250" width="700" height="180" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="270" fill="#888" font-family="Inter,sans-serif" font-size="10">Half-Life / Spread</text>

  <!-- Fast reversion bg -->
  <rect x="80" y="250" width="300" height="180" fill="rgba(76,175,80,0.06)"/>

  <!-- Zero line for spread -->
  <line x1="60" y1="350" x2="760" y2="350" stroke="#888" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <!-- Fast reversion line (10 bars) at y=320 -->
  <line x1="60" y1="320" x2="760" y2="320" stroke="#66BB6A" stroke-width="1" stroke-dasharray="5,5" opacity="0.4"/>
  <text x="762" y="324" fill="#66BB6A" font-family="Inter,sans-serif" font-size="9">10</text>

  <!-- Half-life line (blue) -->
  <polyline points="100,310 160,305 220,315 280,308 340,312 400,345 460,380 520,390 580,370 640,340 700,330" fill="none" stroke="#42A5F5" stroke-width="2"/>
  <!-- Norm spread (orange) -->
  <polyline points="100,370 160,330 220,375 280,325 340,365 400,340 460,360 520,345 580,355 640,348 700,350" fill="none" stroke="#FF9800" stroke-width="1"/>

  <text x="200" y="245" text-anchor="middle" fill="#66BB6A" font-family="Inter,sans-serif" font-size="10">Fast Reversion</text>

  <!-- Legend -->
  <rect x="60" y="460" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="475" x2="100" y2="475" stroke="#42A5F5" stroke-width="2"/>
  <text x="105" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Half-Life</text>
  <line x1="220" y1="475" x2="240" y2="475" stroke="#FF9800" stroke-width="1"/>
  <text x="245" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Norm Spread</text>
  <rect x="380" y="470" width="10" height="10" fill="rgba(76,175,80,0.3)"/>
  <text x="395" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Fast Reversion Zone</text>
</svg>
