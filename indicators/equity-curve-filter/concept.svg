<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Equity Curve Trading Filter</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Trading on/off zones -->
  <rect x="60" y="70" width="200" height="350" fill="rgba(76,175,80,0.04)" rx="2"/>
  <rect x="260" y="70" width="160" height="350" fill="rgba(255,82,82,0.06)" rx="2"/>
  <rect x="420" y="70" width="320" height="350" fill="rgba(76,175,80,0.04)" rx="2"/>
  <text x="160" y="410" text-anchor="middle" fill="rgba(76,175,80,0.4)" font-family="Inter,sans-serif" font-size="10">TRADING ON</text>
  <text x="340" y="410" text-anchor="middle" fill="rgba(255,82,82,0.4)" font-family="Inter,sans-serif" font-size="10">PAUSED</text>
  <text x="580" y="410" text-anchor="middle" fill="rgba(76,175,80,0.4)" font-family="Inter,sans-serif" font-size="10">TRADING ON</text>

  <!-- Raw equity (blue) -->
  <polyline points="80,300 120,280 160,260 200,240 240,220 280,250 320,280 360,300 400,290 440,260 480,230 520,210 560,190 600,175 640,160 680,150 720,140" fill="none" stroke="#42a5f5" stroke-width="1.5"/>

  <!-- Equity MA (orange) -->
  <polyline points="80,310 120,295 160,275 200,255 240,240 280,240 320,255 360,270 400,280 440,275 480,255 520,235 560,215 600,200 640,185 680,170 720,160" fill="none" stroke="#ffa726" stroke-width="1"/>

  <!-- Filtered equity (green, stays flat during pause) -->
  <polyline points="80,300 120,280 160,260 200,240 240,220 280,220 320,220 360,220 400,220 440,190 480,160 520,140 560,120 600,105 640,90 680,80 720,70" fill="none" stroke="#00e676" stroke-width="2.5"/>

  <!-- Annotations -->
  <line x1="260" y1="70" x2="260" y2="420" stroke="rgba(255,82,82,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="420" y1="70" x2="420" y2="420" stroke="rgba(76,175,80,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="262" y="86" fill="#ff5252" font-family="Inter,sans-serif" font-size="9">Equity &lt; MA</text>
  <text x="422" y="86" fill="#00e676" font-family="Inter,sans-serif" font-size="9">Recovery</text>

  <!-- Legend -->
  <g transform="translate(100, 445)">
    <rect x="0" y="0" width="600" height="35" fill="rgba(255,255,255,0.03)" rx="6"/>
    <line x1="20" y1="18" x2="45" y2="18" stroke="#42a5f5" stroke-width="1.5"/>
    <text x="50" y="22" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Raw Equity</text>
    <line x1="150" y1="18" x2="175" y2="18" stroke="#ffa726" stroke-width="1"/>
    <text x="180" y="22" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Equity MA</text>
    <line x1="265" y1="18" x2="290" y2="18" stroke="#00e676" stroke-width="2.5"/>
    <text x="295" y="22" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Filtered Equity</text>
    <rect x="420" y="10" width="14" height="14" fill="rgba(255,82,82,0.15)" rx="2"/>
    <text x="439" y="22" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Paused</text>
  </g>
</svg>