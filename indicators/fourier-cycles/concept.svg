    <text x="383" y="22" fill="#999" font-size="9">FFT Strength</text>
    <circle cx="480" cy="18" r="4" fill="#26a69a"/>
    <text x="490" y="22" fill="#999" font-size="9">Cycle Component</text>
  </g>
