<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="440"/><line x1="160" y1="60" x2="160" y2="440"/>
    <line x1="240" y1="60" x2="240" y2="440"/><line x1="320" y1="60" x2="320" y2="440"/>
    <line x1="400" y1="60" x2="400" y2="440"/><line x1="480" y1="60" x2="480" y2="440"/>
    <line x1="560" y1="60" x2="560" y2="440"/><line x1="640" y1="60" x2="640" y2="440"/>
    <line x1="720" y1="60" x2="720" y2="440"/>
    <line x1="60" y1="98" x2="750" y2="98"/><line x1="60" y1="136" x2="750" y2="136"/>
    <line x1="60" y1="174" x2="750" y2="174"/><line x1="60" y1="212" x2="750" y2="212"/>
    <line x1="60" y1="250" x2="750" y2="250"/><line x1="60" y1="288" x2="750" y2="288"/>
    <line x1="60" y1="326" x2="750" y2="326"/><line x1="60" y1="364" x2="750" y2="364"/>
    <line x1="60" y1="402" x2="750" y2="402"/>
  </g>

  <!-- Y-axis labels -->
  <text x="45" y="64" fill="#888" font-size="10" text-anchor="end">100</text>
  <text x="45" y="140" fill="#888" font-size="10" text-anchor="end">80</text>
  <text x="45" y="250" fill="#888" font-size="10" text-anchor="end">50</text>
  <text x="45" y="368" fill="#888" font-size="10" text-anchor="end">20</text>
  <text x="45" y="444" fill="#888" font-size="10" text-anchor="end">0</text>

  <!-- Overbought zone -->
  <rect x="60" y="60" width="690" height="76" fill="#ff0000" opacity="0.1"/>
  <line x1="60" y1="136" x2="750" y2="136" stroke="#ff4444" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="755" y="140" fill="#ff6666" font-size="9" opacity="0.7">OB 80</text>

  <!-- Oversold zone -->
  <rect x="60" y="364" width="690" height="76" fill="#00ff00" opacity="0.1"/>
  <line x1="60" y1="364" x2="750" y2="364" stroke="#44ff44" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="755" y="368" fill="#66ff66" font-size="9" opacity="0.7">OS 20</text>

  <!-- 50 line -->
  <line x1="60" y1="250" x2="750" y2="250" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.2"/>

  <!-- SCI Main line (cyan) - 40 points -->
  <polyline fill="none" stroke="#00e5ff" stroke-width="2" filter="url(#glow)" opacity="0.9"
    points="
      77,350 94,370 111,390 128,400 145,385 162,355 179,320 196,280
      213,240 230,200 247,165 264,140 281,120 298,105 315,115 332,140
      349,175 366,220 383,270 400,310 417,345 434,370 451,395 468,405
      485,390 502,360 519,320 536,275 553,230 570,185 587,145 604,115
      621,100 638,95 655,110 672,135 689,170 706,215 723,260 740,300
    "/>

  <!-- Signal line (orange) -->
  <polyline fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.8"
    points="
      77,360 94,365 111,380 128,395 145,395 162,370 179,340 196,300
      213,260 230,220 247,185 264,155 281,135 298,115 315,110 332,125
      349,155 366,200 383,250 400,290 417,330 434,360 451,380 468,400
      485,400 502,380 519,345 536,300 553,255 570,210 587,165 604,130
      621,110 638,100 655,100 672,120 689,150 706,195 723,240 740,280
    "/>

  <!-- Buy signals in oversold zone -->
  <circle cx="128" cy="400" r="5" fill="#00ff88" filter="url(#glow)" opacity="0.9"/>
  <circle cx="128" cy="400" r="2" fill="#ffffff"/>
  <text x="128" y="422" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle" filter="url(#textGlow)">BUY</text>

  <circle cx="468" cy="405" r="5" fill="#00ff88" filter="url(#glow)" opacity="0.9"/>
  <circle cx="468" cy="405" r="2" fill="#ffffff"/>
  <text x="468" y="427" fill="#00ff88" font-size="11" font-weight="bold" text-anchor="middle" filter="url(#textGlow)">BUY</text>

  <!-- Sell signals in overbought zone -->
  <circle cx="315" cy="112" r="5" fill="#ff4444" filter="url(#glow)" opacity="0.9"/>
  <circle cx="315" cy="112" r="2" fill="#ffffff"/>
  <text x="315" y="90" fill="#ff4444" font-size="11" font-weight="bold" text-anchor="middle" filter="url(#textGlow)">SELL</text>

  <circle cx="655" cy="105" r="5" fill="#ff4444" filter="url(#glow)" opacity="0.9"/>
  <circle cx="655" cy="105" r="2" fill="#ffffff"/>
  <text x="655" y="85" fill="#ff4444" font-size="11" font-weight="bold" text-anchor="middle" filter="url(#textGlow)">SELL</text>

  <!-- Title -->
  <text x="20" y="28" fill="#ffffff" font-size="17" font-weight="bold">Stochastic Convergence Index</text>
  <text x="20" y="45" fill="#888888" font-size="11">tradegrub.finance</text>

  <!-- Legend bar -->
  <rect x="0" y="455" width="800" height="45" fill="#0d0d1a" opacity="0.6"/>
  <line x1="60" y1="475" x2="85" y2="475" stroke="#00e5ff" stroke-width="2"/>
  <text x="90" y="479" fill="#cccccc" font-size="11">SCI Main</text>
  <line x1="170" y1="475" x2="195" y2="475" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="200" y="479" fill="#cccccc" font-size="11">Signal</text>
  <circle cx="280" cy="475" r="4" fill="#00ff88"/>
  <text x="290" y="479" fill="#cccccc" font-size="11">Buy Signal</text>
  <circle cx="380" cy="475" r="4" fill="#ff4444"/>
  <text x="390" y="479" fill="#cccccc" font-size="11">Sell Signal</text>
  <rect x="480" y="470" width="18" height="10" fill="#ff0000" opacity="0.2" stroke="#ff4444" stroke-width="0.5"/>
  <text x="503" y="479" fill="#cccccc" font-size="11">Overbought</text>
  <rect x="590" y="470" width="18" height="10" fill="#00ff00" opacity="0.2" stroke="#44ff44" stroke-width="0.5"/>
  <text x="613" y="479" fill="#cccccc" font-size="11">Oversold</text>
</svg>