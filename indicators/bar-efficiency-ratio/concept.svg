<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Bar Efficiency Ratio</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="380" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="88" fill="#888" font-family="Inter,sans-serif" font-size="10">Efficiency (0-1)</text>

  <!-- Reference lines -->
  <line x1="60" y1="158" x2="760" y2="158" stroke="#4CAF50" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="765" y="162" fill="#4CAF50" font-family="Inter,sans-serif" font-size="9">0.7</text>
  <line x1="60" y1="290" x2="760" y2="290" stroke="#f44336" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="765" y="294" fill="#f44336" font-family="Inter,sans-serif" font-size="9">0.3</text>

  <!-- Raw efficiency (noisy) -->
  <polyline points="100,180 140,320 180,140 220,350 260,160 300,200 340,310 380,120 420,250 460,150 500,280 540,130 580,340 620,170 660,190 700,300"
    fill="none" stroke="#7E57C2" stroke-width="1" opacity="0.6"/>

  <!-- Smoothed -->
  <polyline points="100,230 180,220 260,210 340,230 420,200 500,210 580,220 660,210 700,225"
    fill="none" stroke="#FF9800" stroke-width="2.5"/>

  <!-- Legend -->
  <rect x="60" y="460" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="475" x2="110" y2="475" stroke="#7E57C2" stroke-width="1.5"/>
  <text x="115" y="479" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Raw Efficiency</text>
  <line x1="270" y1="475" x2="300" y2="475" stroke="#FF9800" stroke-width="2.5"/>
  <text x="305" y="479" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Smoothed</text>
  <line x1="420" y1="475" x2="450" y2="475" stroke="#4CAF50" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="455" y="479" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Directional (0.7)</text>
  <line x1="600" y1="475" x2="630" y2="475" stroke="#f44336" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="635" y="479" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Indecisive (0.3)</text>
</svg>
