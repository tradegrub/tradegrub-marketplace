  <text x="263" y="348" text-anchor="middle" fill="#00e676" font-size="8">Zero Cross</text>

  <!-- EXIT signal - oscillator crosses below zero at x=440 -->
  <circle cx="440" cy="332" r="8" fill="none" stroke="#ef5350" stroke-width="2" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
