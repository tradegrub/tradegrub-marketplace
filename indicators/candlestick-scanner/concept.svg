<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Candlestick Pattern Scanner</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="360" fill="rgba(255,255,255,0.02)" rx="4"/>

  <!-- Downtrend candles -->
  <line x1="110" y1="120" x2="110" y2="200" stroke="#666" stroke-width="1"/>
  <rect x="105" y="130" width="10" height="50" fill="#EF5350"/>
  <line x1="150" y1="150" x2="150" y2="230" stroke="#666" stroke-width="1"/>
  <rect x="145" y="160" width="10" height="50" fill="#EF5350"/>
  <line x1="190" y1="180" x2="190" y2="270" stroke="#666" stroke-width="1"/>
  <rect x="185" y="190" width="10" height="55" fill="#EF5350"/>

  <!-- Hammer -->
  <line x1="230" y1="230" x2="230" y2="340" stroke="#666" stroke-width="1"/>
  <rect x="225" y="235" width="10" height="15" fill="#4CAF50"/>
  <polygon points="230,355 225,365 235,365" fill="#00e676"/>
  <text x="230" y="380" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="9">Hammer</text>

  <!-- Bullish engulfing -->
  <line x1="290" y1="240" x2="290" y2="310" stroke="#666" stroke-width="1"/>
  <rect x="285" y="260" width="10" height="30" fill="#EF5350"/>
  <line x1="320" y1="220" x2="320" y2="320" stroke="#666" stroke-width="1"/>
  <rect x="315" y="230" width="10" height="65" fill="#4CAF50"/>
  <polygon points="320,335 315,345 325,345" fill="#00e676"/>
  <text x="305" y="360" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="9">Engulfing</text>

  <!-- Uptrend -->
  <line x1="370" y1="180" x2="370" y2="260" stroke="#666" stroke-width="1"/>
  <rect x="365" y="190" width="10" height="50" fill="#4CAF50"/>
  <line x1="410" y1="150" x2="410" y2="230" stroke="#666" stroke-width="1"/>
  <rect x="405" y="160" width="10" height="50" fill="#4CAF50"/>
  <line x1="450" y1="120" x2="450" y2="200" stroke="#666" stroke-width="1"/>
  <rect x="445" y="130" width="10" height="50" fill="#4CAF50"/>

  <!-- Doji -->
  <line x1="490" y1="100" x2="490" y2="200" stroke="#666" stroke-width="1"/>
  <rect x="485" y="148" width="10" height="4" fill="#FFD54F"/>
  <polygon points="490,95 485,85 495,85" fill="#FF5252"/>
  <text x="490" y="78" text-anchor="middle" fill="#FF5252" font-family="Inter,sans-serif" font-size="9">Doji</text>

  <!-- Shooting star -->
  <line x1="540" y1="90" x2="540" y2="190" stroke="#666" stroke-width="1"/>
  <rect x="535" y="170" width="10" height="15" fill="#EF5350"/>
  <polygon points="540,85 535,75 545,75" fill="#FF5252"/>
  <text x="540" y="68" text-anchor="middle" fill="#FF5252" font-family="Inter,sans-serif" font-size="9">Shooting Star</text>

  <!-- Bearish engulfing -->
  <line x1="600" y1="130" x2="600" y2="200" stroke="#666" stroke-width="1"/>
  <rect x="595" y="140" width="10" height="35" fill="#4CAF50"/>
  <line x1="640" y1="110" x2="640" y2="230" stroke="#666" stroke-width="1"/>
  <rect x="635" y="120" width="10" height="85" fill="#EF5350"/>
  <polygon points="640,105 635,95 645,95" fill="#FF5252"/>
  <text x="620" y="88" text-anchor="middle" fill="#FF5252" font-family="Inter,sans-serif" font-size="9">Bearish Engulfing</text>

  <!-- Harami -->
  <line x1="700" y1="160" x2="700" y2="280" stroke="#666" stroke-width="1"/>
  <rect x="695" y="170" width="10" height="80" fill="#EF5350"/>
  <line x1="730" y1="190" x2="730" y2="240" stroke="#666" stroke-width="1"/>
  <rect x="725" y="200" width="10" height="25" fill="#4CAF50"/>
  <polygon points="730,255 725,265 735,265" fill="#00e676"/>
  <text x="715" y="280" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="9">Harami</text>

  <!-- Legend -->
  <rect x="60" y="455" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <circle cx="100" cy="470" r="4" fill="#00e676"/>
  <text x="110" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Bullish Pattern</text>
  <circle cx="250" cy="470" r="4" fill="#FF5252"/>
  <text x="260" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Bearish Pattern</text>
  <circle cx="400" cy="470" r="4" fill="#42A5F5"/>
  <text x="410" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Pattern ID</text>
</svg>