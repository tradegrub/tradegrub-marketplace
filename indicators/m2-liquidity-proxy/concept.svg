<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="inflowFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00c853" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00c853" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="outflowFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff1744" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="chartClip"><rect x="80" y="70" width="640" height="360"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e8e8f0" font-size="17" font-weight="600">Liquidity Flow Proxy</text>
  <text x="400" y="48" text-anchor="middle" fill="#6a6a8a" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="80" y1="120" x2="720" y2="120"/>
    <line x1="80" y1="170" x2="720" y2="170"/>
    <line x1="80" y1="220" x2="720" y2="220"/>
    <line x1="80" y1="270" x2="720" y2="270"/>
    <line x1="80" y1="320" x2="720" y2="320"/>
    <line x1="80" y1="370" x2="720" y2="370"/>
    <line x1="160" y1="70" x2="160" y2="430"/>
    <line x1="240" y1="70" x2="240" y2="430"/>
    <line x1="320" y1="70" x2="320" y2="430"/>
    <line x1="400" y1="70" x2="400" y2="430"/>
    <line x1="480" y1="70" x2="480" y2="430"/>
    <line x1="560" y1="70" x2="560" y2="430"/>
    <line x1="640" y1="70" x2="640" y2="430"/>
  </g>

  <!-- Zero line for liquidity flow -->
  <line x1="80" y1="270" x2="720" y2="270" stroke="#555577" stroke-width="0.7" stroke-dasharray="4,3" opacity="0.3"/>
  <text x="74" y="274" text-anchor="end" fill="#555577" font-size="9">0</text>

  <!-- Inflow area (green, above zero line in early/mid section) -->
  <g clip-path="url(#chartClip)">
    <!-- Inflow zone 1: bars 1-6 where liquidity is above zero -->
    <path d="M95,270 L95,230 L135,200 L175,180 L215,160 L255,150 L295,155 L335,170 L355,200 L375,230 L395,260 L395,270 Z" fill="url(#inflowFill)"/>

    <!-- Inflow zone 2: recovery -->
    <path d="M505,270 L505,240 L535,220 L565,210 L595,215 L625,225 L655,235 L685,240 L705,245 L705,270 Z" fill="url(#inflowFill)"/>

    <!-- Outflow zone: bars where liquidity falls below zero -->
    <path d="M395,270 L395,280 L415,300 L435,330 L455,355 L475,370 L495,365 L505,340 L505,270 Z" fill="url(#outflowFill)"/>
  </g>

  <!-- Cumulative liquidity flow line -->
  <polyline points="95,230 135,200 175,180 215,160 255,150 295,155 335,170 375,230 395,260 415,300 435,330 455,355 475,370 495,365 505,340 535,220 565,210 595,215 625,225 655,235 685,240 705,245" fill="none" stroke="#4fc3f7" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Price overlay line (showing divergence - rises while liquidity falls) -->
  <polyline points="95,350 135,340 175,325 215,310 255,295 295,280 335,265 375,250 395,240 415,230 435,218 455,208 475,195 495,185 505,178 535,172 565,168 595,165 625,160 655,155 685,148 705,142" fill="none" stroke="#ffab40" stroke-width="2" stroke-dasharray="8,4" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>

  <!-- Inflow label -->
  <text x="215" y="140" fill="#00e676" font-size="12" font-weight="600" opacity="0.9">Inflow</text>
  <line x1="215" y1="143" x2="215" y2="158" stroke="#00e676" stroke-width="0.8" opacity="0.5"/>

  <!-- Outflow label -->
  <text x="445" y="400" fill="#ff5252" font-size="12" font-weight="600" opacity="0.9">Outflow</text>
  <line x1="455" y1="393" x2="455" y2="375" stroke="#ff5252" stroke-width="0.8" opacity="0.5"/>

  <!-- Divergence annotation -->
  <g transform="translate(540,120)">
    <rect x="-70" y="-16" width="140" height="38" rx="4" fill="#1a1a2e" stroke="#ff9800" stroke-width="1" opacity="0.9"/>
    <text x="0" y="-1" text-anchor="middle" fill="#ffab40" font-size="10" font-weight="600">Bearish Divergence</text>
    <text x="0" y="13" text-anchor="middle" fill="#8888aa" font-size="9">Price up / Liquidity down</text>
  </g>
  <!-- Divergence arrow pointing to the zone -->
  <line x1="540" y1="142" x2="490" y2="185" stroke="#ff9800" stroke-width="1" opacity="0.6" marker-end="url(#arrowOrange)"/>
  <defs>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ff9800" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Divergence visual: dotted lines showing the spread -->
  <line x1="415" y1="230" x2="415" y2="300" stroke="#ff9800" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.4"/>
  <line x1="475" y1="195" x2="475" y2="370" stroke="#ff9800" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.4"/>

  <!-- Small dots on liquidity line at key points -->
  <circle cx="255" cy="150" r="3" fill="#4fc3f7" filter="url(#glow)"/>
  <circle cx="455" cy="355" r="3" fill="#ff5252" filter="url(#glow)"/>
  <circle cx="565" cy="210" r="3" fill="#4fc3f7" filter="url(#glow)"/>

  <!-- Legend bar at bottom -->
  <rect x="80" y="450" width="640" height="36" rx="4" fill="#0d0d1a" opacity="0.5"/>
  <line x1="160" y1="468" x2="185" y2="468" stroke="#4fc3f7" stroke-width="2.5"/>
  <text x="190" y="472" fill="#aaaacc" font-size="11">Liquidity Flow</text>
  <line x1="310" y1="468" x2="335" y2="468" stroke="#ffab40" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="340" y="472" fill="#aaaacc" font-size="11">Price</text>
  <rect x="410" y="462" width="12" height="12" fill="#00c853" opacity="0.4" rx="2"/>
  <text x="428" y="472" fill="#aaaacc" font-size="11">Inflow Zone</text>
  <rect x="530" y="462" width="12" height="12" fill="#ff1744" opacity="0.4" rx="2"/>
  <text x="548" y="472" fill="#aaaacc" font-size="11">Outflow Zone</text>
</svg>
