<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Auto Price Grid</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Grid lines - evenly spaced -->
  <line x1="80" y1="80" x2="720" y2="80" stroke="#787b86" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="725" y="84" fill="#787b86" font-size="9">$150</text>
  <line x1="80" y1="130" x2="720" y2="130" stroke="#787b86" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="725" y="134" fill="#787b86" font-size="9">$145</text>
  <line x1="80" y1="180" x2="720" y2="180" stroke="#787b86" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="725" y="184" fill="#787b86" font-size="9">$140</text>
  <line x1="80" y1="230" x2="720" y2="230" stroke="#787b86" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="725" y="234" fill="#787b86" font-size="9">$135</text>
  <line x1="80" y1="280" x2="720" y2="280" stroke="#787b86" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="725" y="284" fill="#787b86" font-size="9">$130</text>
  <line x1="80" y1="330" x2="720" y2="330" stroke="#787b86" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="725" y="334" fill="#787b86" font-size="9">$125</text>
  <line x1="80" y1="380" x2="720" y2="380" stroke="#787b86" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="725" y="384" fill="#787b86" font-size="9">$120</text>

  <!-- Current zone highlight -->
  <rect x="80" y="230" width="640" height="50" fill="#2196F3" fill-opacity="0.08" rx="2"/>
  <text x="85" y="260" fill="#2196F3" font-size="10" font-weight="500">Current Zone</text>

  <!-- Price line weaving through grid -->
  <polyline points="80,350 120,330 160,310 200,280 240,260 280,240 310,250 340,235 380,220 420,200 460,180 500,195 530,210 560,240 590,250 620,235 660,220 700,200"
    fill="none" stroke="#2196F3" stroke-width="2.5"/>

  <!-- Current price dot -->
  <circle cx="700" cy="200" r="5" fill="#2196F3"/>
  <text x="670" y="192" fill="#2196F3" font-size="10" font-weight="500">$139.50</text>

  <!-- Grid spacing annotation -->
  <line x1="55" y1="230" x2="55" y2="280" stroke="#FF9800" stroke-width="1.5"/>
  <line x1="50" y1="230" x2="60" y2="230" stroke="#FF9800" stroke-width="1.5"/>
  <line x1="50" y1="280" x2="60" y2="280" stroke="#FF9800" stroke-width="1.5"/>
  <text x="42" y="260" fill="#FF9800" font-size="9" text-anchor="middle" transform="rotate(-90, 42, 260)">$5 step</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <line x1="10" y1="20" x2="30" y2="20" stroke="#787b86" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="35" y="24" fill="#999" font-size="9">Auto Grid Levels</text>
    <rect x="170" y="12" width="20" height="16" fill="#2196F3" opacity="0.2" rx="2"/>
    <text x="195" y="24" fill="#999" font-size="9">Current Zone</text>
    <circle cx="310" cy="20" r="4" fill="#2196F3"/>
    <text x="320" y="24" fill="#999" font-size="9">Price</text>
    <circle cx="390" cy="20" r="4" fill="#FF9800"/>
    <text x="400" y="24" fill="#999" font-size="9">Grid Spacing (ATR-based)</text>
  </g>
</svg>