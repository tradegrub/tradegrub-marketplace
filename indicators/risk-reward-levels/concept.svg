<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="riskZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ef5350" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="rewardZone1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Risk Reward Level Plotter</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Bullish setup - price trending up on left side -->
  <line x1="100" y1="320" x2="100" y2="360" stroke="#26a69a" stroke-width="1"/><rect x="96" y="328" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="130" y1="310" x2="130" y2="350" stroke="#26a69a" stroke-width="1"/><rect x="126" y="318" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="160" y1="298" x2="160" y2="340" stroke="#ef5350" stroke-width="1"/><rect x="156" y="305" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="190" y1="285" x2="190" y2="328" stroke="#26a69a" stroke-width="1"/><rect x="186" y="292" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="220" y1="275" x2="220" y2="318" stroke="#26a69a" stroke-width="1"/><rect x="216" y="282" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="250" y1="268" x2="250" y2="308" stroke="#26a69a" stroke-width="1"/><rect x="246" y="275" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="280" y1="258" x2="280" y2="298" stroke="#ef5350" stroke-width="1"/><rect x="276" y="265" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="310" y1="248" x2="310" y2="290" stroke="#26a69a" stroke-width="1"/><rect x="306" y="258" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="340" y1="240" x2="340" y2="282" stroke="#26a69a" stroke-width="1"/><rect x="336" y="248" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="370" y1="232" x2="370" y2="275" stroke="#26a69a" stroke-width="1"/><rect x="366" y="240" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Current price area with level projections -->
  <line x1="400" y1="225" x2="400" y2="268" stroke="#ef5350" stroke-width="1"/><rect x="396" y="232" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="430" y1="218" x2="430" y2="260" stroke="#26a69a" stroke-width="1"/><rect x="426" y="228" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="460" y1="222" x2="460" y2="262" stroke="#26a69a" stroke-width="1"/><rect x="456" y="232" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- Risk zone (entry to stop loss) -->
  <rect x="480" y="245" width="280" height="55" fill="url(#riskZone)" rx="2"/>

  <!-- Reward zone 1 (entry to TP1) -->
  <rect x="480" y="188" width="280" height="57" fill="url(#rewardZone1)" rx="2"/>

  <!-- Reward zone 2 (TP1 to TP2) -->
  <rect x="480" y="128" width="280" height="60" fill="#00e676" fill-opacity="0.03" rx="2"/>

  <!-- Entry line -->
  <line x1="470" y1="245" x2="760" y2="245" stroke="#42a5f5" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="765" y="249" fill="#42a5f5" font-size="10" font-weight="600">Entry</text>

  <!-- Stop Loss line (1x ATR below) -->
  <line x1="470" y1="300" x2="760" y2="300" stroke="#ef5350" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="765" y="304" fill="#ef5350" font-size="10" font-weight="600">Stop (1x ATR)</text>

  <!-- Take Profit 1 (1:1 R:R) -->
  <line x1="470" y1="188" x2="760" y2="188" stroke="#00e676" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="765" y="192" fill="#00e676" font-size="10" font-weight="500">TP1 (1:1)</text>

  <!-- Take Profit 2 (2:1 R:R) -->
  <line x1="470" y1="128" x2="760" y2="128" stroke="#00e676" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="765" y="132" fill="#00e676" font-size="10" font-weight="500">TP2 (2:1)</text>

  <!-- Take Profit 3 (3:1 R:R) -->
  <line x1="470" y1="68" x2="760" y2="68" stroke="#00e676" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="765" y="72" fill="#00e676" font-size="10" font-weight="500">TP3 (3:1)</text>

  <!-- ATR distance bracket -->
  <line x1="475" y1="245" x2="475" y2="300" stroke="#ff9800" stroke-width="1.5" opacity="0.5"/>
  <line x1="472" y1="245" x2="478" y2="245" stroke="#ff9800" stroke-width="1.5" opacity="0.5"/>
  <line x1="472" y1="300" x2="478" y2="300" stroke="#ff9800" stroke-width="1.5" opacity="0.5"/>
  <text x="468" y="276" fill="#ff9800" font-size="9" text-anchor="end" opacity="0.8">1x ATR</text>

  <!-- R:R labels in zones -->
  <rect x="580" y="268" width="60" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="610" y="281" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="500">Risk Zone</text>

  <rect x="580" y="210" width="70" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="615" y="223" text-anchor="middle" fill="#00e676" font-size="9" font-weight="500">1:1 Reward</text>

  <rect x="580" y="150" width="70" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="615" y="163" text-anchor="middle" fill="#00e676" font-size="9" font-weight="500">2:1 Reward</text>

  <!-- EMA direction arrow -->
  <rect x="120" y="82" width="140" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="190" y="97" text-anchor="middle" fill="#bbb" font-size="10">EMA Bullish Bias (Up)</text>

  <!-- EMA line overlay -->
  <polyline points="100,345 130,335 160,320 190,305 220,292 250,282 280,275 310,265 340,258 370,250 400,245 430,238 460,238" fill="none" stroke="#ff9800" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="126" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="156" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="186" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="216" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="246" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="276" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="306" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="336" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="366" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="396" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="426" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="456" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">Entry Level</text>
    <circle cx="120" cy="20" r="4" fill="#ef5350"/>
    <text x="130" y="24" fill="#999" font-size="9">Stop Loss</text>
    <circle cx="220" cy="20" r="4" fill="#00e676"/>
    <text x="230" y="24" fill="#999" font-size="9">Take Profit (1:1, 2:1, 3:1)</text>
    <circle cx="410" cy="20" r="4" fill="#ff9800"/>
    <text x="420" y="24" fill="#999" font-size="9">EMA / ATR</text>
  </g>
</svg>