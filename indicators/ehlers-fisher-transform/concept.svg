<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Fisher Transform</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="160" fill="rgba(255,255,255,0.02)" rx="4"/>
  <line x1="100" y1="180" x2="100" y2="130" stroke="#666" stroke-width="1"/><rect x="96" y="140" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="180" y1="165" x2="180" y2="115" stroke="#666" stroke-width="1"/><rect x="176" y="125" width="8" height="28" fill="#4CAF50" rx="1"/>
  <line x1="260" y1="150" x2="260" y2="100" stroke="#666" stroke-width="1"/><rect x="256" y="108" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="340" y1="120" x2="340" y2="90" stroke="#666" stroke-width="1"/><rect x="336" y="100" width="8" height="15" fill="#ff5252" rx="1"/>
  <line x1="420" y1="135" x2="420" y2="105" stroke="#666" stroke-width="1"/><rect x="416" y="110" width="8" height="20" fill="#ff5252" rx="1"/>
  <line x1="500" y1="155" x2="500" y2="120" stroke="#666" stroke-width="1"/><rect x="496" y="125" width="8" height="25" fill="#ff5252" rx="1"/>
  <line x1="580" y1="170" x2="580" y2="130" stroke="#666" stroke-width="1"/><rect x="576" y="135" width="8" height="28" fill="#4CAF50" rx="1"/>
  <line x1="660" y1="155" x2="660" y2="110" stroke="#666" stroke-width="1"/><rect x="656" y="118" width="8" height="28" fill="#4CAF50" rx="1"/>

  <!-- Subplot -->
  <rect x="60" y="250" width="700" height="200" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="275" fill="#888" font-family="Inter,sans-serif" font-size="10">+3</text>
  <text x="70" y="310" fill="#888" font-family="Inter,sans-serif" font-size="10">+1.5</text>
  <text x="70" y="350" fill="#888" font-family="Inter,sans-serif" font-size="10">0</text>
  <text x="70" y="390" fill="#888" font-family="Inter,sans-serif" font-size="10">-1.5</text>
  <text x="70" y="430" fill="#888" font-family="Inter,sans-serif" font-size="10">-3</text>

  <!-- Reference lines -->
  <line x1="95" y1="350" x2="755" y2="350" stroke="#666" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="95" y1="310" x2="755" y2="310" stroke="#ff5252" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="95" y1="390" x2="755" y2="390" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Fisher line - sharp peaks -->
  <polyline points="100,380 180,340 260,290 340,280 420,320 500,380 580,400 660,330"
            fill="none" stroke="#42A5F5" stroke-width="2"/>
  <!-- Trigger line -->
  <polyline points="100,390 180,370 260,320 340,285 420,300 500,360 580,395 660,370"
            fill="none" stroke="#ff9800" stroke-width="1.5"/>

  <!-- Turning point annotations -->
  <circle cx="340" cy="280" r="4" fill="none" stroke="#ff1744" stroke-width="1.5"/>
  <text x="350" y="275" fill="#ff1744" font-family="Inter,sans-serif" font-size="9">Peak</text>
  <circle cx="580" cy="400" r="4" fill="none" stroke="#00e676" stroke-width="1.5"/>
  <text x="590" y="415" fill="#00e676" font-family="Inter,sans-serif" font-size="9">Trough</text>

  <!-- Legend -->
  <rect x="200" y="465" width="400" height="25" fill="rgba(255,255,255,0.03)" rx="4"/>
  <rect x="220" y="474" width="12" height="3" fill="#42A5F5"/>
  <text x="238" y="480" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Fisher</text>
  <rect x="300" y="474" width="12" height="3" fill="#ff9800"/>
  <text x="318" y="480" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Trigger</text>
</svg>
