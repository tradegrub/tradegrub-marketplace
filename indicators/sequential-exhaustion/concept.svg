<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="600">Sequential Exhaustion Counter</text>
  <text x="400" y="48" text-anchor="middle" fill="#667" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="60" y1="80" x2="760" y2="80"/>
    <line x1="60" y1="140" x2="760" y2="140"/>
    <line x1="60" y1="200" x2="760" y2="200"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="320" x2="760" y2="320"/>
    <line x1="60" y1="380" x2="760" y2="380"/>
    <line x1="140" y1="60" x2="140" y2="420"/>
    <line x1="260" y1="60" x2="260" y2="420"/>
    <line x1="380" y1="60" x2="380" y2="420"/>
    <line x1="500" y1="60" x2="500" y2="420"/>
    <line x1="620" y1="60" x2="620" y2="420"/>
    <line x1="740" y1="60" x2="740" y2="420"/>
  </g>

  <!-- Price axis labels -->
  <g fill="#555" font-size="9">
    <text x="55" y="83" text-anchor="end">152</text>
    <text x="55" y="143" text-anchor="end">148</text>
    <text x="55" y="203" text-anchor="end">144</text>
    <text x="55" y="263" text-anchor="end">140</text>
    <text x="55" y="323" text-anchor="end">136</text>
    <text x="55" y="383" text-anchor="end">132</text>
  </g>

  <!-- Candlesticks: 28 candles, each 24px apart starting at x=80 -->
  <!-- Pre-setup candles (no numbers) candles 1-3: sideways -->
  <!-- Candle 1: bullish -->
  <line x1="80" y1="270" x2="80" y2="310" stroke="#777" stroke-width="1"/>
  <rect x="76" y="280" width="8" height="20" fill="#26a69a" rx="1"/>
  <!-- Candle 2: bearish -->
  <line x1="104" y1="265" x2="104" y2="305" stroke="#777" stroke-width="1"/>
  <rect x="100" y="272" width="8" height="22" fill="#ef5350" rx="1"/>
  <!-- Candle 3: bullish -->
  <line x1="128" y1="260" x2="128" y2="298" stroke="#777" stroke-width="1"/>
  <rect x="124" y="268" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- BUY SETUP phase: 9 consecutive closes below close 4 bars earlier (price trending down) -->
  <!-- Setup candle 1 -->
  <line x1="152" y1="275" x2="152" y2="318" stroke="#777" stroke-width="1"/>
  <rect x="148" y="282" width="8" height="26" fill="#ef5350" rx="1"/>
  <text x="152" y="330" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">1</text>

  <!-- Setup candle 2 -->
  <line x1="176" y1="290" x2="176" y2="335" stroke="#777" stroke-width="1"/>
  <rect x="172" y="298" width="8" height="24" fill="#ef5350" rx="1"/>
  <text x="176" y="347" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">2</text>

  <!-- Setup candle 3 -->
  <line x1="200" y1="300" x2="200" y2="348" stroke="#777" stroke-width="1"/>
  <rect x="196" y="308" width="8" height="28" fill="#ef5350" rx="1"/>
  <text x="200" y="360" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">3</text>

  <!-- Setup candle 4 -->
  <line x1="224" y1="310" x2="224" y2="355" stroke="#777" stroke-width="1"/>
  <rect x="220" y="318" width="8" height="25" fill="#ef5350" rx="1"/>
  <text x="224" y="367" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">4</text>

  <!-- Setup candle 5 -->
  <line x1="248" y1="320" x2="248" y2="362" stroke="#777" stroke-width="1"/>
  <rect x="244" y="328" width="8" height="22" fill="#ef5350" rx="1"/>
  <text x="248" y="374" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">5</text>

  <!-- Setup candle 6 -->
  <line x1="272" y1="325" x2="272" y2="370" stroke="#777" stroke-width="1"/>
  <rect x="268" y="332" width="8" height="27" fill="#ef5350" rx="1"/>
  <text x="272" y="382" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">6</text>

  <!-- Setup candle 7 -->
  <line x1="296" y1="335" x2="296" y2="378" stroke="#777" stroke-width="1"/>
  <rect x="292" y="342" width="8" height="24" fill="#ef5350" rx="1"/>
  <text x="296" y="390" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">7</text>

  <!-- Setup candle 8 -->
  <line x1="320" y1="340" x2="320" y2="388" stroke="#777" stroke-width="1"/>
  <rect x="316" y="350" width="8" height="26" fill="#ef5350" rx="1"/>
  <text x="320" y="400" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">8</text>

  <!-- Setup candle 9 - with "Setup Complete" callout -->
  <line x1="344" y1="348" x2="344" y2="395" stroke="#777" stroke-width="1"/>
  <rect x="340" y="358" width="8" height="28" fill="#ef5350" rx="1"/>
  <text x="344" y="410" text-anchor="middle" fill="#26a69a" font-size="10" font-weight="700" filter="url(#glow)">9</text>

  <!-- Setup Complete callout -->
  <rect x="355" y="388" width="90" height="18" fill="#26a69a" rx="3" opacity="0.85"/>
  <text x="400" y="401" text-anchor="middle" fill="#1a1a2e" font-size="9" font-weight="700">Setup Complete</text>
  <line x1="355" y1="397" x2="348" y2="400" stroke="#26a69a" stroke-width="1.5"/>
  <polygon points="348,400 355,394 355,400" fill="#26a69a" opacity="0.85"/>

  <!-- COUNTDOWN phase: 13 bars, price starts to reverse (bounce up from bottom) -->
  <!-- Countdown 1 -->
  <line x1="368" y1="355" x2="368" y2="390" stroke="#777" stroke-width="1"/>
  <rect x="364" y="360" width="8" height="20" fill="#26a69a" rx="1"/>
  <text x="368" y="354" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="600">1</text>

  <!-- Countdown 2 -->
  <line x1="392" y1="348" x2="392" y2="382" stroke="#777" stroke-width="1"/>
  <rect x="388" y="352" width="8" height="22" fill="#ef5350" rx="1"/>
  <text x="392" y="346" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="600">2</text>

  <!-- Countdown 3 -->
  <line x1="416" y1="340" x2="416" y2="378" stroke="#777" stroke-width="1"/>
  <rect x="412" y="348" width="8" height="20" fill="#26a69a" rx="1"/>
  <text x="416" y="338" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="600">3</text>

  <!-- Countdown 4 -->
  <line x1="440" y1="335" x2="440" y2="370" stroke="#777" stroke-width="1"/>
  <rect x="436" y="340" width="8" height="22" fill="#ef5350" rx="1"/>
  <text x="440" y="333" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="600">4</text>

  <!-- Countdown 5 -->
  <line x1="464" y1="325" x2="464" y2="362" stroke="#777" stroke-width="1"/>
  <rect x="460" y="330" width="8" height="24" fill="#26a69a" rx="1"/>
  <text x="464" y="323" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="600">5</text>

  <!-- Countdown 6 -->
  <line x1="488" y1="318" x2="488" y2="355" stroke="#777" stroke-width="1"/>
  <rect x="484" y="325" width="8" height="20" fill="#26a69a" rx="1"/>
  <text x="488" y="316" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="600">6</text>

  <!-- Countdown 7 -->
  <line x1="512" y1="310" x2="512" y2="348" stroke="#777" stroke-width="1"/>
  <rect x="508" y="318" width="8" height="22" fill="#ef5350" rx="1"/>
  <text x="512" y="308" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="600">7</text>

  <!-- Countdown 8 -->
  <line x1="536" y1="300" x2="536" y2="340" stroke="#777" stroke-width="1"/>
  <rect x="532" y="308" width="8" height="24" fill="#26a69a" rx="1"/>
  <text x="536" y="298" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="600">8</text>

  <!-- Countdown 9 -->
  <line x1="560" y1="290" x2="560" y2="332" stroke="#777" stroke-width="1"/>
  <rect x="556" y="298" width="8" height="24" fill="#26a69a" rx="1"/>
  <text x="560" y="288" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="600">9</text>

  <!-- Countdown 10 -->
  <line x1="584" y1="282" x2="584" y2="322" stroke="#777" stroke-width="1"/>
  <rect x="580" y="290" width="8" height="22" fill="#ef5350" rx="1"/>
  <text x="584" y="280" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="600">10</text>

  <!-- Countdown 11 -->
  <line x1="608" y1="272" x2="608" y2="310" stroke="#777" stroke-width="1"/>
  <rect x="604" y="278" width="8" height="24" fill="#26a69a" rx="1"/>
  <text x="608" y="270" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="600">11</text>

  <!-- Countdown 12 -->
  <line x1="632" y1="260" x2="632" y2="300" stroke="#777" stroke-width="1"/>
  <rect x="628" y="268" width="8" height="22" fill="#26a69a" rx="1"/>
  <text x="632" y="258" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="600">12</text>

  <!-- Countdown 13 - final exhaustion signal -->
  <line x1="656" y1="248" x2="656" y2="292" stroke="#777" stroke-width="1"/>
  <rect x="652" y="256" width="8" height="26" fill="#26a69a" rx="1"/>
  <text x="656" y="246" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="700" filter="url(#glow)">13</text>

  <!-- Post-countdown candles (reversal confirmation) -->
  <line x1="680" y1="242" x2="680" y2="278" stroke="#777" stroke-width="1"/>
  <rect x="676" y="248" width="8" height="20" fill="#26a69a" rx="1"/>

  <line x1="704" y1="235" x2="704" y2="268" stroke="#777" stroke-width="1"/>
  <rect x="700" y="240" width="8" height="18" fill="#26a69a" rx="1"/>

  <line x1="728" y1="228" x2="728" y2="260" stroke="#777" stroke-width="1"/>
  <rect x="724" y="232" width="8" height="20" fill="#ef5350" rx="1"/>

  <!-- Legend bar -->
  <rect x="60" y="440" width="700" height="40" fill="#111125" rx="4" opacity="0.6"/>
  <g font-size="10" fill="#99a">
    <rect x="80" y="454" width="10" height="10" fill="#26a69a" rx="2"/>
    <text x="96" y="463">Buy Setup (1-9)</text>
    <rect x="210" y="454" width="10" height="10" fill="#ef5350" rx="2"/>
    <text x="226" y="463">Sell Countdown (1-13)</text>
    <rect x="380" y="454" width="10" height="10" fill="#26a69a" rx="2" opacity="0.85"/>
    <text x="396" y="463">Setup Complete Signal</text>
    <circle cx="545" cy="459" r="4" fill="#ef5350" filter="url(#glow)"/>
    <text x="555" y="463">Exhaustion (13)</text>
  </g>
</svg>
