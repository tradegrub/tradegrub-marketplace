<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Squeeze Momentum Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- PRICE PANEL with BB and KC (top 55%) -->
  <text x="70" y="78" fill="#888" font-size="9">Price</text>

  <!-- Keltner Channel (wider) -->
  <path d="M 100,130 Q 200,125 300,128 Q 350,132 400,138 L 400,138 Q 420,125 450,100 Q 500,80 560,70 Q 620,75 680,85" fill="none" stroke="#ff9800" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <path d="M 100,250 Q 200,255 300,252 Q 350,248 400,242 L 400,242 Q 420,235 450,220 Q 500,210 560,215 Q 620,220 680,225" fill="none" stroke="#ff9800" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="685" y="82" fill="#ff9800" font-size="8" opacity="0.6">KC</text>

  <!-- Bollinger Bands (narrower during squeeze, then expands) -->
  <path d="M 100,155 Q 200,152 300,158 Q 350,165 400,170 L 400,170 Q 415,148 440,115 Q 480,85 530,72 Q 580,75 640,82 Q 660,85 680,90" fill="none" stroke="#42a5f5" stroke-width="1.2" opacity="0.6"/>
  <path d="M 100,225 Q 200,228 300,222 Q 350,215 400,210 L 400,210 Q 415,215 440,205 Q 480,200 530,208 Q 580,212 640,218 Q 660,220 680,222" fill="none" stroke="#42a5f5" stroke-width="1.2" opacity="0.6"/>
  <text x="685" y="93" fill="#42a5f5" font-size="8" opacity="0.6">BB</text>

  <!-- Squeeze zone background (BB inside KC) -->
  <rect x="100" y="150" width="300" height="60" rx="4" fill="#ef5350" fill-opacity="0.06"/>

  <!-- Squeeze ON dots -->
  <g fill="#ef5350">
    <circle cx="120" cy="190" r="3" opacity="0.7"/>
    <circle cx="150" cy="190" r="3" opacity="0.7"/>
    <circle cx="180" cy="190" r="3" opacity="0.7"/>
    <circle cx="210" cy="190" r="3" opacity="0.7"/>
    <circle cx="240" cy="190" r="3" opacity="0.7"/>
    <circle cx="270" cy="190" r="3" opacity="0.7"/>
    <circle cx="300" cy="190" r="3" opacity="0.7"/>
    <circle cx="330" cy="190" r="3" opacity="0.7"/>
    <circle cx="360" cy="190" r="3" opacity="0.7"/>
    <circle cx="390" cy="190" r="3" opacity="0.7"/>
  </g>
  <text x="250" y="175" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="500">SQUEEZE ON (BB inside KC)</text>

  <!-- Squeeze OFF / Release point -->
  <circle cx="420" cy="165" r="5" fill="#00e676" filter="url(#glow)"/>
  <text x="420" y="155" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">RELEASE</text>

  <!-- Consolidation candles (tight) -->
  <line x1="120" y1="178" x2="120" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="117" y="185" width="6" height="12" fill="#26a69a" rx="1"/>
  <line x1="150" y1="175" x2="150" y2="208" stroke="#ef5350" stroke-width="1"/>
  <rect x="147" y="180" width="6" height="15" fill="#ef5350" rx="1"/>
  <line x1="180" y1="178" x2="180" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="177" y="188" width="6" height="10" fill="#26a69a" rx="1"/>
  <line x1="210" y1="176" x2="210" y2="204" stroke="#ef5350" stroke-width="1"/>
  <rect x="207" y="180" width="6" height="14" fill="#ef5350" rx="1"/>
  <line x1="240" y1="178" x2="240" y2="202" stroke="#26a69a" stroke-width="1"/>
  <rect x="237" y="185" width="6" height="10" fill="#26a69a" rx="1"/>
  <line x1="270" y1="175" x2="270" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="267" y="182" width="6" height="10" fill="#26a69a" rx="1"/>
  <line x1="300" y1="172" x2="300" y2="198" stroke="#ef5350" stroke-width="1"/>
  <rect x="297" y="176" width="6" height="14" fill="#ef5350" rx="1"/>
  <line x1="330" y1="170" x2="330" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="327" y="178" width="6" height="10" fill="#26a69a" rx="1"/>
  <line x1="360" y1="168" x2="360" y2="192" stroke="#26a69a" stroke-width="1"/>
  <rect x="357" y="174" width="6" height="10" fill="#26a69a" rx="1"/>
  <line x1="390" y1="165" x2="390" y2="190" stroke="#26a69a" stroke-width="1"/>
  <rect x="387" y="172" width="6" height="10" fill="#26a69a" rx="1"/>

  <!-- Breakout candle -->
  <line x1="420" y1="135" x2="420" y2="178" stroke="#00e676" stroke-width="1.5"/>
  <rect x="415" y="140" width="10" height="28" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- BUY arrow -->
  <g filter="url(#softGlow)">
    <polygon points="416,133 424,133 420,122" fill="#00e676"/>
  </g>
  <rect x="432" y="120" width="50" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="457" y="134" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- Post-squeeze trending candles -->
  <line x1="450" y1="118" x2="450" y2="155" stroke="#26a69a" stroke-width="1"/>
  <rect x="447" y="125" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="475" y1="105" x2="475" y2="140" stroke="#26a69a" stroke-width="1"/>
  <rect x="472" y="110" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="500" y1="92" x2="500" y2="128" stroke="#26a69a" stroke-width="1"/>
  <rect x="497" y="97" width="6" height="20" fill="#26a69a" rx="1"/>
  <line x1="525" y1="82" x2="525" y2="118" stroke="#26a69a" stroke-width="1"/>
  <rect x="522" y="87" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="550" y1="78" x2="550" y2="112" stroke="#ef5350" stroke-width="1"/>
  <rect x="547" y="82" width="6" height="16" fill="#ef5350" rx="1"/>
  <line x1="575" y1="75" x2="575" y2="108" stroke="#26a69a" stroke-width="1"/>
  <rect x="572" y="80" width="6" height="16" fill="#26a69a" rx="1"/>

  <!-- Separator -->
  <line x1="60" y1="268" x2="760" y2="268" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- MOMENTUM PANEL (bottom) -->
  <text x="70" y="285" fill="#888" font-size="9">Momentum</text>

  <!-- Zero line -->
  <line x1="80" y1="350" x2="720" y2="350" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="725" y="354" fill="#666" font-size="8">0</text>

  <!-- Momentum histogram bars -->
  <!-- Negative/low during squeeze -->
  <rect x="117" y="350" width="6" height="12" fill="#ef5350" opacity="0.5" rx="1"/>
  <rect x="147" y="345" width="6" height="5" fill="#ef5350" opacity="0.5" rx="1" transform="rotate(180,150,347)"/>
  <rect x="177" y="350" width="6" height="8" fill="#ef5350" opacity="0.5" rx="1"/>
  <rect x="207" y="342" width="6" height="8" fill="#ef5350" opacity="0.5" rx="1" transform="rotate(180,210,346)"/>
  <rect x="237" y="350" width="6" height="5" fill="#ef5350" opacity="0.5" rx="1"/>
  <rect x="267" y="346" width="6" height="4" fill="#26a69a" opacity="0.5" rx="1" transform="rotate(180,270,348)"/>
  <rect x="297" y="350" width="6" height="6" fill="#ef5350" opacity="0.5" rx="1"/>
  <rect x="327" y="345" width="6" height="5" fill="#26a69a" opacity="0.5" rx="1" transform="rotate(180,330,347)"/>
  <rect x="357" y="343" width="6" height="7" fill="#26a69a" opacity="0.5" rx="1" transform="rotate(180,360,346)"/>
  <rect x="387" y="340" width="6" height="10" fill="#26a69a" opacity="0.5" rx="1" transform="rotate(180,390,345)"/>

  <!-- Positive momentum after release -->
  <rect x="415" y="330" width="8" height="20" fill="#00e676" opacity="0.7" rx="1"/>
  <rect x="445" y="322" width="6" height="28" fill="#26a69a" opacity="0.6" rx="1"/>
  <rect x="472" y="315" width="6" height="35" fill="#26a69a" opacity="0.6" rx="1"/>
  <rect x="497" y="310" width="6" height="40" fill="#26a69a" opacity="0.6" rx="1"/>
  <rect x="522" y="315" width="6" height="35" fill="#26a69a" opacity="0.6" rx="1"/>
  <rect x="547" y="320" width="6" height="30" fill="#26a69a" opacity="0.5" rx="1"/>
  <rect x="572" y="325" width="6" height="25" fill="#26a69a" opacity="0.5" rx="1"/>
  <rect x="597" y="335" width="6" height="15" fill="#26a69a" opacity="0.4" rx="1"/>
  <rect x="622" y="342" width="6" height="8" fill="#26a69a" opacity="0.4" rx="1"/>
  <!-- Momentum crosses zero - EXIT -->
  <rect x="647" y="350" width="6" height="10" fill="#ef5350" opacity="0.5" rx="1"/>

  <!-- EXIT annotation -->
  <rect x="620" y="370" width="55" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="647" y="383" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="500">EXIT</text>
  <text x="647" y="398" text-anchor="middle" fill="#888" font-size="8">Mom &lt; 0</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">Bollinger Bands</text>
    <circle cx="140" cy="20" r="4" fill="#ff9800"/>
    <text x="150" y="24" fill="#999" font-size="9">Keltner Channel</text>
    <circle cx="270" cy="20" r="4" fill="#ef5350"/>
    <text x="280" y="24" fill="#999" font-size="9">Squeeze ON</text>
    <circle cx="370" cy="20" r="4" fill="#00e676"/>
    <text x="380" y="24" fill="#999" font-size="9">Release + Buy</text>
    <rect x="490" y="12" width="20" height="16" fill="#26a69a" opacity="0.5" rx="2"/>
    <text x="515" y="24" fill="#999" font-size="9">Pos. Momentum</text>
    <rect x="600" y="12" width="20" height="16" fill="#ef5350" opacity="0.5" rx="2"/>
    <text x="625" y="24" fill="#999" font-size="9">Neg. Momentum</text>
  </g>
</svg>