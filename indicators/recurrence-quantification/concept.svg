<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Recurrence Quantification Analysis</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <rect x="60" y="70" width="700" height="140" fill="rgba(255,255,255,0.02)" rx="4"/>
  <g stroke-width="1.5">
    <line x1="100" y1="130" x2="100" y2="175" stroke="#4CAF50"/><rect x="96" y="138" width="8" height="24" fill="#4CAF50" rx="1"/>
    <line x1="140" y1="125" x2="140" y2="170" stroke="#4CAF50"/><rect x="136" y="130" width="8" height="26" fill="#4CAF50" rx="1"/>
    <line x1="180" y1="120" x2="180" y2="165" stroke="#4CAF50"/><rect x="176" y="125" width="8" height="26" fill="#4CAF50" rx="1"/>
    <line x1="220" y1="122" x2="220" y2="168" stroke="#EF5350"/><rect x="216" y="130" width="8" height="26" fill="#EF5350" rx="1"/>
    <line x1="260" y1="128" x2="260" y2="175" stroke="#EF5350"/><rect x="256" y="138" width="8" height="26" fill="#EF5350" rx="1"/>
    <line x1="300" y1="135" x2="300" y2="180" stroke="#EF5350"/><rect x="296" y="142" width="8" height="26" fill="#EF5350" rx="1"/>
    <line x1="340" y1="140" x2="340" y2="185" stroke="#4CAF50"/><rect x="336" y="145" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="380" y1="132" x2="380" y2="178" stroke="#4CAF50"/><rect x="376" y="138" width="8" height="26" fill="#4CAF50" rx="1"/>
    <line x1="420" y1="125" x2="420" y2="172" stroke="#4CAF50"/><rect x="416" y="130" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="460" y1="118" x2="460" y2="168" stroke="#4CAF50"/><rect x="456" y="122" width="8" height="30" fill="#4CAF50" rx="1"/>
    <line x1="500" y1="115" x2="500" y2="165" stroke="#EF5350"/><rect x="496" y="122" width="8" height="30" fill="#EF5350" rx="1"/>
    <line x1="540" y1="125" x2="540" y2="172" stroke="#EF5350"/><rect x="536" y="132" width="8" height="28" fill="#EF5350" rx="1"/>
    <line x1="580" y1="138" x2="580" y2="182" stroke="#EF5350"/><rect x="576" y="145" width="8" height="26" fill="#EF5350" rx="1"/>
    <line x1="620" y1="145" x2="620" y2="188" stroke="#4CAF50"/><rect x="616" y="150" width="8" height="26" fill="#4CAF50" rx="1"/>
    <line x1="660" y1="135" x2="660" y2="180" stroke="#4CAF50"/><rect x="656" y="140" width="8" height="26" fill="#4CAF50" rx="1"/>
    <line x1="700" y1="128" x2="700" y2="175" stroke="#4CAF50"/><rect x="696" y="134" width="8" height="26" fill="#4CAF50" rx="1"/>
  </g>

  <!-- Separator -->
  <line x1="60" y1="225" x2="760" y2="225" stroke="#444" stroke-width="1"/>

  <!-- RQA subplot -->
  <rect x="60" y="235" width="700" height="200" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="75" y="252" fill="#666" font-family="Inter,sans-serif" font-size="10">RQA Metrics</text>

  <!-- Mid reference -->
  <line x1="60" y1="335" x2="760" y2="335" stroke="#555" stroke-width="0.5" stroke-dasharray="5,5"/>
  <text x="765" y="339" fill="#555" font-family="Inter,sans-serif" font-size="9">50</text>

  <!-- Recurrence rate (blue) -->
  <polyline points="100,360 140,355 180,340 220,325 260,310 300,330 340,350 380,345 420,320 460,300 500,290 540,310 580,340 620,360 660,350 700,330" fill="none" stroke="#42A5F5" stroke-width="2"/>

  <!-- Determinism (green) -->
  <polyline points="100,370 140,365 180,350 220,330 260,315 300,320 340,340 380,330 420,310 460,295 500,285 540,305 580,330 620,345 660,335 700,320" fill="none" stroke="#4CAF50" stroke-width="1.5"/>

  <!-- Complexity (orange) -->
  <polyline points="100,380 140,375 180,360 220,355 260,365 300,370 340,360 380,355 420,350 460,355 500,365 540,370 580,365 620,370 660,360 700,355" fill="none" stroke="#FFA726" stroke-width="1.5"/>

  <!-- Regime change annotation -->
  <line x1="460" y1="235" x2="460" y2="435" stroke="#EF5350" stroke-width="0.7" stroke-dasharray="3,3"/>
  <text x="465" y="252" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">Regime Shift</text>

  <!-- Legend -->
  <rect x="120" y="455" width="560" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="145" y1="470" x2="175" y2="470" stroke="#42A5F5" stroke-width="2"/>
  <text x="180" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Recurrence</text>
  <line x1="290" y1="470" x2="320" y2="470" stroke="#4CAF50" stroke-width="2"/>
  <text x="325" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Determinism</text>
  <line x1="440" y1="470" x2="470" y2="470" stroke="#FFA726" stroke-width="2"/>
  <text x="475" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Complexity</text>
</svg>