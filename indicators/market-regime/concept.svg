<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Market Regime Detector</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Background regime zones on price panel -->
  <!-- Trending zone (green tint) -->
  <rect x="80" y="60" width="200" height="200" fill="#26a69a" fill-opacity="0.06"/>
  <!-- Ranging zone (yellow tint) -->
  <rect x="280" y="60" width="180" height="200" fill="#ff9800" fill-opacity="0.06"/>
  <!-- Trending zone again -->
  <rect x="460" y="60" width="220" height="200" fill="#26a69a" fill-opacity="0.06"/>
  <!-- Ranging -->
  <rect x="680" y="60" width="80" height="200" fill="#ff9800" fill-opacity="0.06"/>

  <!-- Regime labels -->
  <text x="180" y="78" text-anchor="middle" fill="#26a69a" font-size="10" font-weight="500" opacity="0.7">TRENDING</text>
  <text x="370" y="78" text-anchor="middle" fill="#ff9800" font-size="10" font-weight="500" opacity="0.7">RANGING</text>
  <text x="570" y="78" text-anchor="middle" fill="#26a69a" font-size="10" font-weight="500" opacity="0.7">TRENDING</text>
  <text x="720" y="78" text-anchor="middle" fill="#ff9800" font-size="10" font-weight="500" opacity="0.7">RANGING</text>

  <!-- Price candlesticks - trending up, then sideways, then trending down, then sideways -->
  <!-- Trending up -->
  <line x1="100" y1="210" x2="100" y2="240" stroke="#26a69a" stroke-width="1"/><rect x="96" y="215" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="125" y1="195" x2="125" y2="230" stroke="#26a69a" stroke-width="1"/><rect x="121" y="200" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="150" y1="175" x2="150" y2="215" stroke="#26a69a" stroke-width="1"/><rect x="146" y="182" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="175" y1="155" x2="175" y2="198" stroke="#ef5350" stroke-width="1"/><rect x="171" y="160" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="200" y1="135" x2="200" y2="180" stroke="#26a69a" stroke-width="1"/><rect x="196" y="142" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="225" y1="120" x2="225" y2="165" stroke="#26a69a" stroke-width="1"/><rect x="221" y="128" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="250" y1="105" x2="250" y2="150" stroke="#26a69a" stroke-width="1"/><rect x="246" y="112" width="8" height="25" fill="#26a69a" rx="1"/>
  <!-- Ranging -->
  <line x1="290" y1="100" x2="290" y2="145" stroke="#ef5350" stroke-width="1"/><rect x="286" y="105" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="315" y1="108" x2="315" y2="148" stroke="#26a69a" stroke-width="1"/><rect x="311" y="118" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="340" y1="98" x2="340" y2="140" stroke="#ef5350" stroke-width="1"/><rect x="336" y="102" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="365" y1="105" x2="365" y2="145" stroke="#26a69a" stroke-width="1"/><rect x="361" y="120" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="390" y1="100" x2="390" y2="142" stroke="#ef5350" stroke-width="1"/><rect x="386" y="108" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="415" y1="105" x2="415" y2="148" stroke="#26a69a" stroke-width="1"/><rect x="411" y="115" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="440" y1="102" x2="440" y2="145" stroke="#ef5350" stroke-width="1"/><rect x="436" y="110" width="8" height="18" fill="#ef5350" rx="1"/>
  <!-- Trending down -->
  <line x1="470" y1="110" x2="470" y2="155" stroke="#ef5350" stroke-width="1"/><rect x="466" y="115" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="495" y1="125" x2="495" y2="175" stroke="#ef5350" stroke-width="1"/><rect x="491" y="132" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="520" y1="145" x2="520" y2="195" stroke="#26a69a" stroke-width="1"/><rect x="516" y="160" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="545" y1="160" x2="545" y2="210" stroke="#ef5350" stroke-width="1"/><rect x="541" y="168" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="570" y1="180" x2="570" y2="230" stroke="#ef5350" stroke-width="1"/><rect x="566" y="185" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="595" y1="195" x2="595" y2="240" stroke="#ef5350" stroke-width="1"/><rect x="591" y="200" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="620" y1="210" x2="620" y2="250" stroke="#26a69a" stroke-width="1"/><rect x="616" y="225" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="645" y1="215" x2="645" y2="252" stroke="#ef5350" stroke-width="1"/><rect x="641" y="220" width="8" height="22" fill="#ef5350" rx="1"/>
  <!-- Small ranging -->
  <line x1="690" y1="218" x2="690" y2="252" stroke="#26a69a" stroke-width="1"/><rect x="686" y="228" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="715" y1="215" x2="715" y2="250" stroke="#ef5350" stroke-width="1"/><rect x="711" y="222" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="740" y1="220" x2="740" y2="255" stroke="#26a69a" stroke-width="1"/><rect x="736" y="230" width="8" height="15" fill="#26a69a" rx="1"/>

  <!-- Separator -->
  <line x1="60" y1="275" x2="760" y2="275" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="290" fill="#888" font-size="9">ADX / Choppiness</text>

  <!-- ADX line (high in trending, low in ranging) -->
  <polyline points="100,350 125,340 150,325 175,315 200,305 225,298 250,295 290,330 315,345 340,350 365,348 390,352 415,350 440,355 470,335 495,318 520,308 545,300 570,295 595,298 620,310 645,315 690,350 715,352 740,348" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.9"/>

  <!-- ADX threshold line at 25 -->
  <line x1="80" y1="335" x2="760" y2="335" stroke="#42a5f5" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="765" y="338" fill="#42a5f5" font-size="8" opacity="0.6">ADX=25</text>

  <!-- Choppiness Index line (low in trending, high in ranging) -->
  <polyline points="100,330 125,340 150,348 175,355 200,358 225,362 250,365 290,330 315,315 340,310 365,312 390,308 415,310 440,305 470,325 495,342 520,352 545,358 570,362 595,360 620,348 645,342 690,308 715,305 740,310" fill="none" stroke="#ff9800" stroke-width="2" opacity="0.9"/>

  <!-- Choppiness threshold -->
  <line x1="80" y1="325" x2="760" y2="325" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="765" y="328" fill="#ff9800" font-size="8" opacity="0.6">Chop=61.8</text>

  <!-- Oscillator zone labels -->
  <text x="180" y="370" text-anchor="middle" fill="#26a69a" font-size="9" opacity="0.6">ADX high + Chop low = Trend</text>
  <text x="370" y="370" text-anchor="middle" fill="#ff9800" font-size="9" opacity="0.6">ADX low + Chop high = Range</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="121" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="146" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="171" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="196" y="392" width="8" height="23" fill="#26a69a" rx="1"/>
    <rect x="221" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="246" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="286" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="311" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="336" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="361" y="407" width="8" height="8" fill="#26a69a" rx="1"/>
    <rect x="386" y="405" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="411" y="406" width="8" height="9" fill="#26a69a" rx="1"/>
    <rect x="436" y="405" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="466" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="491" y="390" width="8" height="25" fill="#ef5350" rx="1"/>
    <rect x="516" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="541" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="566" y="388" width="8" height="27" fill="#ef5350" rx="1"/>
    <rect x="591" y="392" width="8" height="23" fill="#ef5350" rx="1"/>
    <rect x="616" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="641" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="686" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="711" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="736" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">ADX</text>
    <circle cx="90" cy="20" r="4" fill="#ff9800"/>
    <text x="100" y="24" fill="#999" font-size="9">Choppiness Index</text>
    <rect x="210" y="12" width="16" height="16" rx="2" fill="#26a69a" opacity="0.3"/>
    <text x="232" y="24" fill="#999" font-size="9">Trending Zone</text>
    <rect x="330" y="12" width="16" height="16" rx="2" fill="#ff9800" opacity="0.3"/>
    <text x="352" y="24" fill="#999" font-size="9">Ranging Zone</text>
    <rect x="460" y="12" width="20" height="16" fill="#26a69a" opacity="0.5" rx="2"/>
    <rect x="460" y="12" width="10" height="16" fill="#ef5350" opacity="0.5" rx="2"/>
    <text x="486" y="24" fill="#999" font-size="9">Candlesticks</text>
  </g>
</svg>