<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">First Hour Range Predictor</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Candlesticks -->
  <g stroke-width="1.5">
    <line x1="100" y1="200" x2="100" y2="300" stroke="#666"/>
    <rect x="94" y="220" width="12" height="60" fill="#ff5252" rx="1"/>
    <line x1="140" y1="210" x2="140" y2="310" stroke="#666"/>
    <rect x="134" y="230" width="12" height="50" fill="#ff5252" rx="1"/>
    <line x1="180" y1="240" x2="180" y2="320" stroke="#666"/>
    <rect x="174" y="250" width="12" height="40" fill="#4CAF50" rx="1"/>
    <line x1="220" y1="220" x2="220" y2="290" stroke="#666"/>
    <rect x="214" y="230" width="12" height="40" fill="#4CAF50" rx="1"/>
    <line x1="260" y1="200" x2="260" y2="270" stroke="#666"/>
    <rect x="254" y="210" width="12" height="40" fill="#4CAF50" rx="1"/>
    <line x1="300" y1="180" x2="300" y2="260" stroke="#666"/>
    <rect x="294" y="190" width="12" height="50" fill="#4CAF50" rx="1"/>
    <line x1="340" y1="170" x2="340" y2="240" stroke="#666"/>
    <rect x="334" y="180" width="12" height="40" fill="#4CAF50" rx="1"/>
    <line x1="380" y1="160" x2="380" y2="230" stroke="#666"/>
    <rect x="374" y="175" width="12" height="35" fill="#ff5252" rx="1"/>
    <line x1="420" y1="175" x2="420" y2="250" stroke="#666"/>
    <rect x="414" y="185" width="12" height="45" fill="#ff5252" rx="1"/>
    <line x1="460" y1="190" x2="460" y2="260" stroke="#666"/>
    <rect x="454" y="200" width="12" height="40" fill="#4CAF50" rx="1"/>
    <line x1="500" y1="180" x2="500" y2="250" stroke="#666"/>
    <rect x="494" y="190" width="12" height="40" fill="#4CAF50" rx="1"/>
    <line x1="540" y1="165" x2="540" y2="230" stroke="#666"/>
    <rect x="534" y="175" width="12" height="35" fill="#4CAF50" rx="1"/>
    <line x1="580" y1="155" x2="580" y2="220" stroke="#666"/>
    <rect x="574" y="165" width="12" height="35" fill="#4CAF50" rx="1"/>
    <line x1="620" y1="150" x2="620" y2="210" stroke="#666"/>
    <rect x="614" y="160" width="12" height="30" fill="#ff5252" rx="1"/>
    <line x1="660" y1="160" x2="660" y2="220" stroke="#666"/>
    <rect x="654" y="170" width="12" height="30" fill="#4CAF50" rx="1"/>
  </g>

  <!-- First hour range box -->
  <rect x="88" y="195" width="85" height="125" fill="rgba(66,165,245,0.08)" stroke="rgba(66,165,245,0.4)" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <text x="130" y="340" text-anchor="middle" fill="#42a5f5" font-family="Inter,sans-serif" font-size="10">First Hour Range</text>

  <!-- Upper full target line -->
  <line x1="180" y1="120" x2="700" y2="120" stroke="#00e676" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="710" y="124" fill="#00e676" font-family="Inter,sans-serif" font-size="9">Upper Full</text>

  <!-- Upper mid target line -->
  <line x1="180" y1="150" x2="700" y2="150" stroke="rgba(0,230,118,0.5)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="710" y="154" fill="rgba(0,230,118,0.6)" font-family="Inter,sans-serif" font-size="9">Upper Mid</text>

  <!-- Lower mid target line -->
  <line x1="180" y1="310" x2="700" y2="310" stroke="rgba(255,82,82,0.5)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="710" y="314" fill="rgba(255,82,82,0.6)" font-family="Inter,sans-serif" font-size="9">Lower Mid</text>

  <!-- Lower full target line -->
  <line x1="180" y1="340" x2="700" y2="340" stroke="#ff5252" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="710" y="344" fill="#ff5252" font-family="Inter,sans-serif" font-size="9">Lower Full</text>

  <!-- Stop levels -->
  <line x1="180" y1="200" x2="700" y2="200" stroke="#42a5f5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="180" y1="315" x2="700" y2="315" stroke="#ffa726" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <g transform="translate(100, 440)">
    <rect x="0" y="0" width="600" height="40" fill="rgba(255,255,255,0.03)" rx="6"/>
    <line x1="20" y1="20" x2="40" y2="20" stroke="#00e676" stroke-width="2"/>
    <text x="45" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Upper Target</text>
    <line x1="150" y1="20" x2="170" y2="20" stroke="#ff5252" stroke-width="2"/>
    <text x="175" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Lower Target</text>
    <line x1="280" y1="20" x2="300" y2="20" stroke="#42a5f5" stroke-width="1"/>
    <text x="305" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Long Stop</text>
    <line x1="390" y1="20" x2="410" y2="20" stroke="#ffa726" stroke-width="1"/>
    <text x="415" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Short Stop</text>
    <rect x="490" y="12" width="16" height="16" fill="rgba(66,165,245,0.15)" stroke="#42a5f5" stroke-width="0.5" rx="2"/>
    <text x="512" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">1st Hour</text>
  </g>
</svg>