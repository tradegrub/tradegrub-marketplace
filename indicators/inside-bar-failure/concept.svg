<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="600">Inside Bar Failure Pattern</text>

  <!-- Mother bar high/low reference lines -->
  <line x1="100" y1="120" x2="700" y2="120" stroke="#787b86" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="100" y1="360" x2="700" y2="360" stroke="#787b86" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="90" y="124" text-anchor="end" fill="#787b86" font-size="11">High</text>
  <text x="90" y="364" text-anchor="end" fill="#787b86" font-size="11">Low</text>

  <!-- 1. Mother Bar (large, bearish/neutral) -->
  <!-- Wick -->
  <line x1="200" y1="100" x2="200" y2="380" stroke="#787b86" stroke-width="2"/>
  <!-- Body -->
  <rect x="175" y="120" width="50" height="240" fill="#787b86" opacity="0.6" rx="2"/>
  <!-- Label -->
  <text x="200" y="420" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="500">Mother Bar</text>

  <!-- 2. Inside Bar (small, within mother bar range) -->
  <!-- Wick -->
  <line x1="320" y1="180" x2="320" y2="300" stroke="#2196F3" stroke-width="2"/>
  <!-- Body -->
  <rect x="295" y="200" width="50" height="80" fill="#2196F3" opacity="0.7" rx="2"/>
  <!-- Label -->
  <text x="320" y="420" text-anchor="middle" fill="#2196F3" font-size="14" font-weight="500">Inside Bar</text>

  <!-- 3. Breakout candle (green, breaks above mother bar high) -->
  <!-- Wick -->
  <line x1="440" y1="80" x2="440" y2="220" stroke="#26a69a" stroke-width="2"/>
  <!-- Body -->
  <rect x="415" y="100" width="50" height="100" fill="#26a69a" opacity="0.8" rx="2"/>
  <!-- Up arrow -->
  <path d="M440,65 L430,80 M440,65 L450,80" fill="none" stroke="#26a69a" stroke-width="2"/>
  <line x1="440" y1="65" x2="440" y2="80" stroke="#26a69a" stroke-width="2"/>
  <!-- Label -->
  <text x="440" y="420" text-anchor="middle" fill="#26a69a" font-size="14" font-weight="500">Breakout</text>

  <!-- 4. Failure candle (red, reverses down through mother bar low) -->
  <!-- Wick -->
  <line x1="570" y1="130" x2="570" y2="440" stroke="#ef5350" stroke-width="2"/>
  <!-- Body -->
  <rect x="545" y="160" width="50" height="260" fill="#ef5350" opacity="0.8" rx="2"/>
  <!-- Down arrow -->
  <path d="M570,455 L560,440 M570,455 L580,440" fill="none" stroke="#ef5350" stroke-width="2.5"/>
  <line x1="570" y1="440" x2="570" y2="455" stroke="#ef5350" stroke-width="2.5"/>
  <!-- Label -->
  <text x="570" y="420" text-anchor="middle" fill="#ef5350" font-size="14" font-weight="600">FAILURE</text>

  <!-- Failure annotation: price breaks below mother bar low -->
  <path d="M620,370 L650,370 L650,440 L635,440" fill="none" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="660" y="410" fill="#ef5350" font-size="12">Breaks below</text>
  <text x="660" y="425" fill="#ef5350" font-size="12">mother bar low</text>

  <!-- Sequence arrow -->
  <line x1="130" y1="460" x2="670" y2="460" stroke="#787b86" stroke-width="1" opacity="0.4"/>
  <path d="M670,460 L660,455 M670,460 L660,465" fill="none" stroke="#787b86" stroke-width="1" opacity="0.4"/>
  <text x="400" y="485" text-anchor="middle" fill="#787b86" font-size="12">Time</text>
</svg>