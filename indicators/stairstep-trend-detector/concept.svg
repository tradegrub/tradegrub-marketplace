<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="600">Stair-Step Trend</text>
  <text x="400" y="54" text-anchor="middle" fill="#666688" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="80" y1="100" x2="740" y2="100"/>
    <line x1="80" y1="150" x2="740" y2="150"/>
    <line x1="80" y1="200" x2="740" y2="200"/>
    <line x1="80" y1="250" x2="740" y2="250"/>
    <line x1="80" y1="300" x2="740" y2="300"/>
    <line x1="80" y1="350" x2="740" y2="350"/>
    <line x1="80" y1="400" x2="740" y2="400"/>
    <line x1="180" y1="70" x2="180" y2="430"/>
    <line x1="280" y1="70" x2="280" y2="430"/>
    <line x1="380" y1="70" x2="380" y2="430"/>
    <line x1="480" y1="70" x2="480" y2="430"/>
    <line x1="580" y1="70" x2="580" y2="430"/>
    <line x1="680" y1="70" x2="680" y2="430"/>
  </g>

  <!-- Step levels (dashed horizontal lines) -->
  <line x1="80" y1="370" x2="210" y2="370" stroke="#4ade80" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="170" y1="310" x2="340" y2="310" stroke="#4ade80" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="300" y1="250" x2="470" y2="250" stroke="#4ade80" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="430" y1="190" x2="600" y2="190" stroke="#4ade80" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="560" y1="130" x2="730" y2="130" stroke="#4ade80" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Price line: flat, sharp up, flat, sharp up... -->
  <polyline points="
    90,372 110,370 130,374 150,369 170,371
    180,340 190,312
    210,314 240,308 270,312 300,310
    310,280 320,252
    340,254 370,248 400,252 430,250
    440,220 450,192
    470,194 500,188 530,192 560,190
    570,160 580,132
    600,134 630,128 660,132 690,130 720,131
  " fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Step height annotations -->
  <!-- Step 1 arrow -->
  <line x1="175" y1="370" x2="175" y2="310" stroke="#facc15" stroke-width="1" marker-end="url(#arrowUp)" marker-start="url(#arrowDown)"/>
  <polygon points="175,314 171,322 179,322" fill="#facc15"/>
  <polygon points="175,366 171,358 179,358" fill="#facc15"/>
  <text x="162" y="344" fill="#facc15" font-size="9" text-anchor="end">Step 1</text>

  <!-- Step 2 arrow -->
  <line x1="305" y1="310" x2="305" y2="250" stroke="#facc15" stroke-width="1"/>
  <polygon points="305,254 301,262 309,262" fill="#facc15"/>
  <polygon points="305,306 301,298 309,298" fill="#facc15"/>
  <text x="292" y="284" fill="#facc15" font-size="9" text-anchor="end">Step 2</text>

  <!-- Step 3 arrow -->
  <line x1="435" y1="250" x2="435" y2="190" stroke="#facc15" stroke-width="1"/>
  <polygon points="435,194 431,202 439,202" fill="#facc15"/>
  <polygon points="435,246 431,238 439,238" fill="#facc15"/>
  <text x="422" y="224" fill="#facc15" font-size="9" text-anchor="end">Step 3</text>

  <!-- Step 4 arrow -->
  <line x1="565" y1="190" x2="565" y2="130" stroke="#facc15" stroke-width="1"/>
  <polygon points="565,134 561,142 569,142" fill="#facc15"/>
  <polygon points="565,186 561,178 569,178" fill="#facc15"/>
  <text x="552" y="164" fill="#facc15" font-size="9" text-anchor="end">Step 4</text>

  <!-- Institutional Accumulation label -->
  <rect x="222" y="316" width="145" height="20" rx="3" fill="#1a1a2e" opacity="0.85"/>
  <text x="295" y="331" text-anchor="middle" fill="#60a5fa" font-size="10" font-style="italic">Institutional Accumulation</text>

  <!-- Consolidation zone shading -->
  <rect x="210" y="305" width="90" height="14" fill="#4ade80" opacity="0.04" rx="2"/>

  <!-- Legend bar -->
  <g transform="translate(0,455)">
    <line x1="100" y1="0" x2="700" y2="0" stroke="#333355" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="130" y2="0" stroke="#4ade80" stroke-width="2.5"/>
    <text x="136" y="4" fill="#aaaacc" font-size="10">Price</text>
    <line x1="200" y1="0" x2="230" y2="0" stroke="#4ade80" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="236" y="4" fill="#aaaacc" font-size="10">Step Level</text>
    <line x1="330" y1="0" x2="345" y2="0" stroke="#facc15" stroke-width="1"/>
    <polygon points="345,-3 345,3 337,0" fill="#facc15"/>
    <text x="352" y="4" fill="#aaaacc" font-size="10">Step Height</text>
    <rect x="450" y="-5" width="10" height="10" fill="#4ade80" opacity="0.15" rx="1"/>
    <text x="466" y="4" fill="#aaaacc" font-size="10">Accumulation Zone</text>
  </g>
</svg>