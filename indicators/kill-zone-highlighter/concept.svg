    <line x1="620" y1="215" x2="620" y2="280" stroke="#666"/><rect x="614" y="225" width="12" height="30" fill="#ff5252" rx="1"/>
    <line x1="650" y1="220" x2="650" y2="285" stroke="#666"/><rect x="644" y="230" width="12" height="30" fill="#4CAF50" rx="1"/>
