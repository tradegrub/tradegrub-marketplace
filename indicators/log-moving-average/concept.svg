  <!-- Crossover: Buy signal (cyan crosses below orange = bullish) -->
  <polygon points="240,258 248,248 256,258 252,258 252,268 244,268 244,258" fill="#26a69a" filter="url(#glowStrong)"/>
  <text x="248" y="244" text-anchor="middle" fill="#26a69a" font-size="8" font-weight="bold">BUY</text>

  <polygon points="374,238 382,228 390,238 386,238 386,248 378,248 378,238" fill="#26a69a" filter="url(#glowStrong)"/>
