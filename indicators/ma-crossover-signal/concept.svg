<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="120" x2="760" y2="120"/><line x1="60" y1="200" x2="760" y2="200"/>
    <line x1="60" y1="280" x2="760" y2="280"/><line x1="60" y1="360" x2="760" y2="360"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">MA Crossover Signal</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Candlesticks - downtrend then uptrend -->
  <line x1="100" y1="140" x2="100" y2="200" stroke="#26a69a" stroke-width="1"/><rect x="96" y="155" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="130" y1="160" x2="130" y2="220" stroke="#ef5350" stroke-width="1"/><rect x="126" y="165" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="160" y1="180" x2="160" y2="250" stroke="#ef5350" stroke-width="1"/><rect x="156" y="190" width="8" height="40" fill="#ef5350" rx="1"/>
  <line x1="190" y1="210" x2="190" y2="275" stroke="#ef5350" stroke-width="1"/><rect x="186" y="218" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="220" y1="240" x2="220" y2="300" stroke="#ef5350" stroke-width="1"/><rect x="216" y="248" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="250" y1="260" x2="250" y2="320" stroke="#26a69a" stroke-width="1"/><rect x="246" y="280" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="280" y1="275" x2="280" y2="335" stroke="#ef5350" stroke-width="1"/><rect x="276" y="280" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="310" y1="280" x2="310" y2="340" stroke="#26a69a" stroke-width="1"/><rect x="306" y="300" width="8" height="20" fill="#26a69a" rx="1"/>
  <!-- Bottom / crossover zone -->
  <line x1="340" y1="285" x2="340" y2="345" stroke="#26a69a" stroke-width="1"/><rect x="336" y="310" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="370" y1="275" x2="370" y2="330" stroke="#26a69a" stroke-width="1"/><rect x="366" y="290" width="8" height="22" fill="#26a69a" rx="1"/>
  <!-- Uptrend begins -->
  <line x1="400" y1="255" x2="400" y2="310" stroke="#26a69a" stroke-width="1"/><rect x="396" y="265" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="430" y1="235" x2="430" y2="290" stroke="#26a69a" stroke-width="1"/><rect x="426" y="245" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="460" y1="215" x2="460" y2="270" stroke="#ef5350" stroke-width="1"/><rect x="456" y="222" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="490" y1="200" x2="490" y2="255" stroke="#26a69a" stroke-width="1"/><rect x="486" y="210" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="520" y1="180" x2="520" y2="240" stroke="#26a69a" stroke-width="1"/><rect x="516" y="190" width="8" height="30" fill="#26a69a" rx="1"/>
  <!-- Sell crossover area -->
  <line x1="550" y1="170" x2="550" y2="225" stroke="#ef5350" stroke-width="1"/><rect x="546" y="175" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="580" y1="185" x2="580" y2="240" stroke="#ef5350" stroke-width="1"/><rect x="576" y="190" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="610" y1="200" x2="610" y2="255" stroke="#ef5350" stroke-width="1"/><rect x="606" y="208" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="640" y1="215" x2="640" y2="265" stroke="#26a69a" stroke-width="1"/><rect x="636" y="235" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="670" y1="225" x2="670" y2="275" stroke="#ef5350" stroke-width="1"/><rect x="666" y="230" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="700" y1="235" x2="700" y2="285" stroke="#26a69a" stroke-width="1"/><rect x="696" y="255" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- Fast MA (9) - follows price closely -->
  <polyline points="100,170 130,190 160,220 190,245 220,270 250,290 280,300 310,310 340,315 370,295 400,270 430,250 460,230 490,215 520,198 550,185 580,200 610,218 640,238 670,248 700,258" fill="none" stroke="#ff9800" stroke-width="2" opacity="0.9"/>

  <!-- Slow MA (21) - smoother -->
  <polyline points="100,165 130,178 160,198 190,220 220,245 250,268 280,288 310,302 340,310 370,312 400,305 430,290 460,270 490,250 520,230 550,215 580,205 610,200 640,205 670,215 700,228" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.9"/>

  <!-- Golden Cross (buy) at ~x=355 -->
  <g filter="url(#glow)">
    <polygon points="350,325 360,325 355,312" fill="#00e676"/>
  </g>
  <rect x="365" y="318" width="55" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="392" y="332" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- Death Cross (sell) at ~x=590 -->
  <g filter="url(#glow)">
    <polygon points="585,188 595,188 590,200" fill="#ef5350"/>
  </g>
  <rect x="598" y="182" width="55" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="625" y="196" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SELL</text>

  <!-- Crossover annotations -->
  <rect x="290" y="80" width="145" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="362" y="95" text-anchor="middle" fill="#bbb" font-size="11">Golden Cross (Fast > Slow)</text>
  <path d="M 355,100 C 355,110 355,305 355,312" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="520" y="140" width="140" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="590" y="155" text-anchor="middle" fill="#bbb" font-size="11">Death Cross (Fast &lt; Slow)</text>
  <path d="M 590,162 C 590,170 590,180 590,188" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="96" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="126" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="156" y="390" width="8" height="25" fill="#ef5350" rx="1"/>
    <rect x="186" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="216" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="246" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="276" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="306" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="336" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="366" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="396" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="426" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="456" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="486" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="516" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="546" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="576" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="606" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="636" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="666" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="696" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">Fast MA (9)</text>
    <circle cx="130" cy="20" r="4" fill="#42a5f5"/>
    <text x="140" y="24" fill="#999" font-size="9">Slow MA (21)</text>
    <circle cx="250" cy="20" r="4" fill="#00e676"/>
    <text x="260" y="24" fill="#999" font-size="9">Buy Signal</text>
    <circle cx="360" cy="20" r="4" fill="#ef5350"/>
    <text x="370" y="24" fill="#999" font-size="9">Sell Signal</text>
    <rect x="460" y="12" width="30" height="16" rx="2" fill="#26a69a" opacity="0.5"/>
    <rect x="460" y="12" width="15" height="16" rx="2" fill="#ef5350" opacity="0.5"/>
    <text x="500" y="24" fill="#999" font-size="9">Candlesticks</text>
  </g>
</svg>