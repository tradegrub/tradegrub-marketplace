<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">SuperTrend Pro Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- LONG phase: uptrend candles -->
  <line x1="90" y1="280" x2="90" y2="330" stroke="#26a69a" stroke-width="1"/>
  <rect x="86" y="295" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="115" y1="265" x2="115" y2="310" stroke="#26a69a" stroke-width="1"/>
  <rect x="111" y="275" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="140" y1="250" x2="140" y2="295" stroke="#26a69a" stroke-width="1"/>
  <rect x="136" y="258" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="165" y1="238" x2="165" y2="280" stroke="#ef5350" stroke-width="1"/>
  <rect x="161" y="245" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="190" y1="222" x2="190" y2="265" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="232" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="215" y1="208" x2="215" y2="250" stroke="#26a69a" stroke-width="1"/>
  <rect x="211" y="215" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="240" y1="192" x2="240" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="236" y="200" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="265" y1="178" x2="265" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="261" y="185" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- SuperTrend line - bullish (green, below) -->
  <polyline points="90,340 115,322 140,305 165,292 190,278 215,262 240,248 265,232" fill="none" stroke="#26a69a" stroke-width="2.5" opacity="0.9"/>

  <!-- Trailing stop line (dashed, rising) -->
  <polyline points="90,348 115,335 140,318 165,308 190,295 215,280 240,265 265,250" fill="none" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- BUY label -->
  <g filter="url(#softGlow)">
    <polygon points="90,272 98,272 94,262" fill="#00e676"/>
  </g>
  <rect x="72" y="248" width="48" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="96" y="261" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- FLIP point - direction changes to bearish -->
  <line x1="295" y1="168" x2="295" y2="225" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="289" y="172" width="12" height="40" fill="#ef5350" rx="1"/>

  <!-- Flip marker -->
  <polygon points="295,230 303,230 299,240" fill="#ef5350" filter="url(#softGlow)"/>

  <!-- SHORT phase: downtrend candles -->
  <line x1="325" y1="180" x2="325" y2="228" stroke="#ef5350" stroke-width="1"/>
  <rect x="321" y="188" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="355" y1="195" x2="355" y2="245" stroke="#ef5350" stroke-width="1"/>
  <rect x="351" y="205" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="385" y1="212" x2="385" y2="260" stroke="#26a69a" stroke-width="1"/>
  <rect x="381" y="235" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="415" y1="225" x2="415" y2="278" stroke="#ef5350" stroke-width="1"/>
  <rect x="411" y="235" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="445" y1="245" x2="445" y2="298" stroke="#ef5350" stroke-width="1"/>
  <rect x="441" y="255" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="475" y1="260" x2="475" y2="315" stroke="#ef5350" stroke-width="1"/>
  <rect x="471" y="270" width="8" height="30" fill="#ef5350" rx="1"/>

  <!-- SuperTrend line - bearish (red, above) -->
  <polyline points="295,160 325,168 355,182 385,198 415,212 445,230 475,248" fill="none" stroke="#ef5350" stroke-width="2.5" opacity="0.9"/>

  <!-- Trailing stop for short (dashed, falling) -->
  <polyline points="295,152 325,158 355,170 385,185 415,198 445,215 475,232" fill="none" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- SELL label -->
  <rect x="300" y="145" width="55" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="327" y="158" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SHORT</text>

  <!-- Second flip back to bullish -->
  <line x1="505" y1="268" x2="505" y2="325" stroke="#00e676" stroke-width="1.5"/>
  <rect x="499" y="275" width="12" height="35" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- BUY 2 label -->
  <g filter="url(#softGlow)">
    <polygon points="505,265 513,265 509,255" fill="#00e676"/>
  </g>
  <rect x="518" y="256" width="48" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="542" y="269" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- Trailing stop annotation -->
  <path d="M 200,355 C 195,360 188,362 180,360" fill="none" stroke="#42a5f5" stroke-width="1"/>
  <rect x="200" y="348" width="120" height="18" rx="4" fill="#42a5f5" fill-opacity="0.1"/>
  <text x="260" y="361" text-anchor="middle" fill="#42a5f5" font-size="9" font-weight="500">ATR Trailing Stop</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="86" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="111" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="136" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="161" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="186" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="211" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="236" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="261" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="289" y="388" width="12" height="27" fill="#ef5350" rx="1"/>
    <rect x="321" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="351" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="381" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="411" y="397" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="441" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="471" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
  </g>
  <rect x="499" y="382" width="12" height="33" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Bullish ST</text>
    <circle cx="115" cy="20" r="4" fill="#ef5350"/>
    <text x="125" y="24" fill="#999" font-size="9">Bearish ST</text>
    <circle cx="210" cy="20" r="4" fill="#42a5f5"/>
    <text x="220" y="24" fill="#999" font-size="9">Trailing Stop</text>
    <circle cx="325" cy="20" r="4" fill="#00e676"/>
    <text x="335" y="24" fill="#999" font-size="9">Long Entry</text>
    <circle cx="430" cy="20" r="4" fill="#ef5350"/>
    <text x="440" y="24" fill="#999" font-size="9">Short Entry</text>
    <rect x="555" y="12" width="20" height="16" fill="#00e676" opacity="0.5" rx="2"/>
    <text x="580" y="24" fill="#999" font-size="9">Volume</text>
  </g>
</svg>