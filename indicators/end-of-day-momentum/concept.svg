<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">End of Day Momentum</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart area -->
  <rect x="60" y="70" width="680" height="180" fill="rgba(255,255,255,0.02)" rx="4"/>
  <polyline points="80,200 120,190 160,195 200,180 240,170 280,160 320,155 360,165 400,175 440,180 480,170 520,155 560,145 600,150 640,160 680,155 720,140" fill="none" stroke="#666" stroke-width="1.5"/>

  <!-- Separator -->
  <line x1="60" y1="270" x2="740" y2="270" stroke="#333" stroke-width="0.5"/>

  <!-- Momentum subplot -->
  <line x1="60" y1="370" x2="740" y2="370" stroke="#555555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="745" y="374" fill="#555" font-family="Inter,sans-serif" font-size="9">0</text>

  <!-- Bullish bg -->
  <rect x="200" y="280" width="200" height="170" fill="rgba(76,175,80,0.06)" rx="2"/>
  <!-- Bearish bg -->
  <rect x="400" y="280" width="120" height="170" fill="rgba(255,82,82,0.06)" rx="2"/>
  <rect x="520" y="280" width="60" height="170" fill="rgba(76,175,80,0.06)" rx="2"/>

  <!-- Momentum bars -->
  <rect x="78" y="370" width="14" height="15" fill="#ff5252" rx="1" transform="translate(0,-15)"/>
  <rect x="118" y="370" width="14" height="10" fill="#ff5252" rx="1" transform="translate(0,-10)"/>
  <rect x="158" y="340" width="14" height="30" fill="#42a5f5" rx="1" transform="rotate(180,165,355)"/>
  <rect x="198" y="345" width="14" height="25" fill="#42a5f5" rx="1" transform="rotate(180,205,357)"/>
  <rect x="238" y="340" width="14" height="30" fill="#42a5f5" rx="1" transform="rotate(180,245,355)"/>
  <rect x="278" y="335" width="14" height="35" fill="#42a5f5" rx="1" transform="rotate(180,285,352)"/>
  <rect x="318" y="330" width="14" height="40" fill="#42a5f5" rx="1" transform="rotate(180,325,350)"/>
  <rect x="358" y="340" width="14" height="30" fill="#42a5f5" rx="1" transform="rotate(180,365,355)"/>
  <rect x="398" y="370" width="14" height="20" fill="#ff5252" rx="1"/>
  <rect x="438" y="370" width="14" height="30" fill="#ff5252" rx="1"/>
  <rect x="478" y="370" width="14" height="15" fill="#ff5252" rx="1"/>
  <rect x="518" y="345" width="14" height="25" fill="#42a5f5" rx="1" transform="rotate(180,525,357)"/>
  <rect x="558" y="340" width="14" height="30" fill="#42a5f5" rx="1" transform="rotate(180,565,355)"/>
  <rect x="598" y="350" width="14" height="20" fill="#42a5f5" rx="1" transform="rotate(180,605,360)"/>
  <rect x="638" y="345" width="14" height="25" fill="#42a5f5" rx="1" transform="rotate(180,645,357)"/>
  <rect x="678" y="335" width="14" height="35" fill="#42a5f5" rx="1" transform="rotate(180,685,352)"/>

  <!-- Signal line -->
  <polyline points="85,360 125,362 165,355 205,348 245,342 285,338 325,335 365,342 405,375 445,385 485,380 525,358 565,350 605,355 645,350 685,342" fill="none" stroke="#ffa726" stroke-width="1.5"/>

  <!-- Legend -->
  <g transform="translate(120, 450)">
    <rect x="0" y="0" width="560" height="35" fill="rgba(255,255,255,0.03)" rx="6"/>
    <rect x="20" y="10" width="20" height="14" fill="#42a5f5" rx="2"/>
    <text x="45" y="22" fill="#aaa" font-family="Inter,sans-serif" font-size="10">EOD Momentum</text>
    <line x1="170" y1="17" x2="195" y2="17" stroke="#ffa726" stroke-width="2"/>
    <text x="200" y="22" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Signal</text>
    <rect x="270" y="10" width="16" height="14" fill="rgba(76,175,80,0.15)" rx="2"/>
    <text x="291" y="22" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bullish</text>
    <rect x="350" y="10" width="16" height="14" fill="rgba(255,82,82,0.15)" rx="2"/>
    <text x="371" y="22" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bearish</text>
  </g>
</svg>