    <rect x="376" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="411" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="446" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="481" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="516" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="551" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="586" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="621" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="656" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="691" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="726" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
