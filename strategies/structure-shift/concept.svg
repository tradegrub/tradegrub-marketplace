<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Market Structure Shift Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- UPTREND: Higher Highs and Higher Lows -->
  <!-- HL 1 -->
  <line x1="90" y1="310" x2="90" y2="350" stroke="#26a69a" stroke-width="1"/>
  <rect x="87" y="318" width="6" height="20" fill="#26a69a" rx="1"/>
  <line x1="110" y1="295" x2="110" y2="335" stroke="#26a69a" stroke-width="1"/>
  <rect x="107" y="305" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="130" y1="275" x2="130" y2="318" stroke="#26a69a" stroke-width="1"/>
  <rect x="127" y="285" width="6" height="20" fill="#26a69a" rx="1"/>
  <!-- HH 1 -->
  <line x1="155" y1="248" x2="155" y2="295" stroke="#26a69a" stroke-width="1"/>
  <rect x="152" y="258" width="6" height="22" fill="#26a69a" rx="1"/>
  <line x1="175" y1="235" x2="175" y2="280" stroke="#26a69a" stroke-width="1"/>
  <rect x="172" y="245" width="6" height="22" fill="#26a69a" rx="1"/>

  <!-- HH1 label -->
  <text x="175" y="228" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="500">HH</text>
  <!-- Swing high level line -->
  <line x1="175" y1="235" x2="400" y2="235" stroke="#26a69a" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- Pullback to HL -->
  <line x1="195" y1="252" x2="195" y2="295" stroke="#ef5350" stroke-width="1"/>
  <rect x="192" y="260" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="215" y1="268" x2="215" y2="310" stroke="#ef5350" stroke-width="1"/>
  <rect x="212" y="278" width="6" height="20" fill="#ef5350" rx="1"/>
  <line x1="235" y1="280" x2="235" y2="320" stroke="#26a69a" stroke-width="1"/>
  <rect x="232" y="295" width="6" height="15" fill="#26a69a" rx="1"/>

  <!-- HL label -->
  <text x="235" y="328" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="500">HL</text>
  <!-- Swing low level line -->
  <line x1="235" y1="320" x2="520" y2="320" stroke="#26a69a" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- Rally to HH 2 -->
  <line x1="255" y1="265" x2="255" y2="305" stroke="#26a69a" stroke-width="1"/>
  <rect x="252" y="275" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="275" y1="248" x2="275" y2="290" stroke="#26a69a" stroke-width="1"/>
  <rect x="272" y="258" width="6" height="20" fill="#26a69a" rx="1"/>
  <line x1="295" y1="230" x2="295" y2="272" stroke="#26a69a" stroke-width="1"/>
  <rect x="292" y="240" width="6" height="20" fill="#26a69a" rx="1"/>
  <!-- HH 2 (higher than HH 1) -->
  <line x1="320" y1="210" x2="320" y2="255" stroke="#26a69a" stroke-width="1"/>
  <rect x="317" y="218" width="6" height="22" fill="#26a69a" rx="1"/>
  <line x1="340" y1="195" x2="340" y2="242" stroke="#26a69a" stroke-width="1"/>
  <rect x="337" y="205" width="6" height="22" fill="#26a69a" rx="1"/>

  <!-- HH2 label -->
  <text x="340" y="188" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="500">HH</text>

  <!-- BOS annotation -->
  <rect x="250" y="168" width="115" height="22" rx="4" fill="#26a69a" fill-opacity="0.12" stroke="#26a69a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="307" y="183" text-anchor="middle" fill="#26a69a" font-size="10" font-weight="500">BOS (Continuation)</text>

  <!-- Pullback creating potential HL 2 -->
  <line x1="360" y1="215" x2="360" y2="258" stroke="#ef5350" stroke-width="1"/>
  <rect x="357" y="222" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="380" y1="235" x2="380" y2="278" stroke="#ef5350" stroke-width="1"/>
  <rect x="377" y="242" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="400" y1="255" x2="400" y2="298" stroke="#ef5350" stroke-width="1"/>
  <rect x="397" y="262" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="420" y1="270" x2="420" y2="312" stroke="#ef5350" stroke-width="1"/>
  <rect x="417" y="278" width="6" height="20" fill="#ef5350" rx="1"/>
  <line x1="440" y1="288" x2="440" y2="328" stroke="#ef5350" stroke-width="1"/>
  <rect x="437" y="295" width="6" height="20" fill="#ef5350" rx="1"/>

  <!-- LH label -->
  <text x="440" y="338" text-anchor="middle" fill="#888" font-size="9">LH</text>

  <!-- STRUCTURE BREAK - price breaks below HL -->
  <line x1="465" y1="305" x2="465" y2="348" stroke="#ef5350" stroke-width="1"/>
  <rect x="462" y="312" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="490" y1="318" x2="490" y2="362" stroke="#ef5350" stroke-width="1"/>
  <rect x="487" y="325" width="6" height="24" fill="#ef5350" rx="1"/>

  <!-- CHoCH candle - breaks below swing low -->
  <line x1="520" y1="330" x2="520" y2="382" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="515" y="338" width="10" height="32" fill="#ef5350" rx="1" filter="url(#glow)"/>

  <!-- CHoCH annotation -->
  <rect x="470" y="370" width="120" height="22" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="530" y="385" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">CHoCH (Reversal)</text>

  <!-- SELL arrow -->
  <g filter="url(#softGlow)">
    <polygon points="516,385 524,385 520,398" fill="#ef5350"/>
  </g>
  <rect x="535" y="388" width="55" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="562" y="402" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SELL</text>

  <!-- Continuation down -->
  <line x1="550" y1="348" x2="550" y2="390" stroke="#ef5350" stroke-width="1"/>
  <rect x="547" y="355" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="575" y1="358" x2="575" y2="398" stroke="#26a69a" stroke-width="1"/>
  <rect x="572" y="375" width="6" height="12" fill="#26a69a" rx="1"/>
  <line x1="600" y1="365" x2="600" y2="405" stroke="#ef5350" stroke-width="1"/>
  <rect x="597" y="372" width="6" height="20" fill="#ef5350" rx="1"/>

  <!-- Take Profit line -->
  <line x1="520" y1="405" x2="650" y2="405" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="655" y="409" fill="#00e676" font-size="9" font-weight="500">TP (2x ATR)</text>

  <!-- Entry line -->
  <line x1="520" y1="338" x2="650" y2="338" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="655" y="342" fill="#42a5f5" font-size="9" font-weight="500">Entry</text>

  <!-- Stop Loss line -->
  <line x1="520" y1="305" x2="650" y2="305" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="655" y="309" fill="#ef5350" font-size="9" font-weight="500">Stop (1.5x ATR)</text>

  <!-- Uptrend label -->
  <rect x="85" y="78" width="120" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="145" y="93" text-anchor="middle" fill="#26a69a" font-size="10">Uptrend (HH + HL)</text>

  <!-- Shift label -->
  <rect x="440" y="78" width="140" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="510" y="93" text-anchor="middle" fill="#ef5350" font-size="10">Structure Shift</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">BOS (Continuation)</text>
    <circle cx="155" cy="20" r="4" fill="#ef5350"/>
    <text x="165" y="24" fill="#999" font-size="9">CHoCH (Reversal)</text>
    <circle cx="290" cy="20" r="4" fill="#42a5f5"/>
    <text x="300" y="24" fill="#999" font-size="9">Entry Level</text>
    <circle cx="390" cy="20" r="4" fill="#00e676"/>
    <text x="400" y="24" fill="#999" font-size="9">Take Profit</text>
    <rect x="490" y="12" width="20" height="16" fill="#26a69a" opacity="0.4" rx="2"/>
    <text x="515" y="24" fill="#999" font-size="9">Swing Levels</text>
  </g>
</svg>