    <rect x="256" y="405" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="281" y="406" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="306" y="404" width="8" height="14" fill="#26a69a" rx="1"/>
