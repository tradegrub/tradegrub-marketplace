<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Supertrend Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Downtrend candles with red Supertrend line above -->
  <line x1="100" y1="135" x2="100" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="96" y="145" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="130" y1="150" x2="130" y2="200" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="160" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="160" y1="165" x2="160" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="185" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="190" y1="180" x2="190" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="190" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="220" y1="200" x2="220" y2="255" stroke="#ef5350" stroke-width="1"/>
  <rect x="216" y="210" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="250" y1="215" x2="250" y2="270" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="225" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="280" y1="235" x2="280" y2="290" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="260" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="310" y1="248" x2="310" y2="305" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="258" width="8" height="32" fill="#ef5350" rx="1"/>

  <!-- Supertrend line (bearish - above price, red) -->
  <polyline points="100,125 130,140 160,155 190,170 220,188 250,205 280,222 310,238" fill="none" stroke="#ef5350" stroke-width="2.5" opacity="0.9"/>
  <text x="95" y="118" fill="#ef5350" font-size="10" font-weight="500">Supertrend (resistance)</text>

  <!-- FLIP candle - big bullish breaking above ST line -->
  <line x1="350" y1="230" x2="350" y2="295" stroke="#00e676" stroke-width="1.5"/>
  <rect x="344" y="238" width="12" height="42" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- Buy signal arrow -->
  <g filter="url(#softGlow)">
    <polygon points="350,222 358,222 354,210" fill="#00e676"/>
  </g>
  <rect x="362" y="208" width="95" height="22" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="409" y="223" text-anchor="middle" fill="#00e676" font-size="11" font-weight="600">BUY (Flip)</text>

  <!-- Uptrend candles with green Supertrend below -->
  <line x1="390" y1="215" x2="390" y2="265" stroke="#26a69a" stroke-width="1"/>
  <rect x="386" y="225" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="420" y1="200" x2="420" y2="250" stroke="#26a69a" stroke-width="1"/>
  <rect x="416" y="210" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="450" y1="185" x2="450" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="446" y="192" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="480" y1="175" x2="480" y2="225" stroke="#26a69a" stroke-width="1"/>
  <rect x="476" y="185" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="510" y1="160" x2="510" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="506" y="170" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="540" y1="148" x2="540" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="536" y="155" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="570" y1="135" x2="570" y2="182" stroke="#26a69a" stroke-width="1"/>
  <rect x="566" y="142" width="8" height="28" fill="#26a69a" rx="1"/>

  <!-- Exit candle - bearish flip -->
  <line x1="605" y1="140" x2="605" y2="200" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="599" y="145" width="12" height="42" fill="#ef5350" rx="1"/>

  <!-- Supertrend line (bullish - below price, green) -->
  <polyline points="350,300 390,290 420,278 450,268 480,258 510,248 540,238 570,228 605,220" fill="none" stroke="#26a69a" stroke-width="2.5" opacity="0.9"/>
  <text x="470" y="315" fill="#26a69a" font-size="10" font-weight="500">Supertrend (support)</text>

  <!-- Exit flip -->
  <line x1="605" y1="220" x2="680" y2="220" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>

  <!-- Exit label -->
  <rect x="618" y="128" width="90" height="22" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="663" y="143" text-anchor="middle" fill="#ef5350" font-size="11" font-weight="600">EXIT (Flip)</text>

  <!-- Flip annotation -->
  <rect x="275" y="330" width="250" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="400" y="345" text-anchor="middle" fill="#bbb" font-size="11">Direction flips when price crosses ATR band</text>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="96" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="126" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="156" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="186" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="216" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="246" y="397" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="276" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="306" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
  </g>
  <rect x="344" y="378" width="12" height="37" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="386" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="416" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="446" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="476" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="506" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="536" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="566" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="599" y="395" width="12" height="20" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ef5350"/>
    <text x="30" y="24" fill="#999" font-size="9">Bearish ST (above)</text>
    <circle cx="160" cy="20" r="4" fill="#26a69a"/>
    <text x="170" y="24" fill="#999" font-size="9">Bullish ST (below)</text>
    <circle cx="305" cy="20" r="4" fill="#00e676"/>
    <text x="315" y="24" fill="#999" font-size="9">Direction Flip</text>
    <circle cx="430" cy="20" r="4" fill="#42a5f5"/>
    <text x="440" y="24" fill="#999" font-size="9">ATR Band</text>
    <rect x="555" y="12" width="20" height="16" fill="#00e676" opacity="0.5" rx="2"/>
    <text x="580" y="24" fill="#999" font-size="9">Volume Surge</text>
  </g>
</svg>