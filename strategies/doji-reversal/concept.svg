<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Doji Reversal Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Support level -->
  <line x1="120" y1="310" x2="450" y2="310" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="455" y="314" fill="#42a5f5" font-size="9">Support Level</text>

  <!-- Downtrend candles approaching support -->
  <line x1="140" y1="115" x2="140" y2="165" stroke="#ef5350" stroke-width="1"/>
  <rect x="134" y="120" width="12" height="35" fill="#ef5350" rx="1"/>
  <line x1="175" y1="140" x2="175" y2="192" stroke="#ef5350" stroke-width="1"/>
  <rect x="169" y="145" width="12" height="38" fill="#ef5350" rx="1"/>
  <line x1="210" y1="170" x2="210" y2="225" stroke="#ef5350" stroke-width="1"/>
  <rect x="204" y="178" width="12" height="35" fill="#ef5350" rx="1"/>
  <line x1="245" y1="202" x2="245" y2="258" stroke="#ef5350" stroke-width="1"/>
  <rect x="239" y="210" width="12" height="38" fill="#ef5350" rx="1"/>
  <line x1="280" y1="235" x2="280" y2="290" stroke="#ef5350" stroke-width="1"/>
  <rect x="274" y="242" width="12" height="38" fill="#ef5350" rx="1"/>

  <!-- DOJI candle at support - zoomed emphasis -->
  <!-- Doji highlight circle -->
  <circle cx="320" cy="295" r="30" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.4"/>

  <!-- Doji candle - long wicks, tiny body -->
  <line x1="320" y1="265" x2="320" y2="312" stroke="#ff9800" stroke-width="2"/>
  <rect x="314" y="288" width="12" height="4" fill="#ff9800" rx="1" filter="url(#glow)"/>

  <!-- Doji anatomy labels -->
  <path d="M 335,270 L 370,258" fill="none" stroke="#888" stroke-width="0.8"/>
  <text x="375" y="262" fill="#bbb" font-size="9">Long upper wick</text>
  <path d="M 335,290 L 370,285" fill="none" stroke="#888" stroke-width="0.8"/>
  <text x="375" y="289" fill="#ff9800" font-size="9" font-weight="500">Tiny body (indecision)</text>
  <path d="M 335,310 L 370,315" fill="none" stroke="#888" stroke-width="0.8"/>
  <text x="375" y="319" fill="#bbb" font-size="9">Long lower wick</text>

  <!-- Confirmation candle (bullish) -->
  <line x1="360" y1="260" x2="360" y2="305" stroke="#00e676" stroke-width="1.5"/>
  <rect x="354" y="268" width="12" height="30" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- Entry signal -->
  <g filter="url(#softGlow)">
    <polygon points="360,256 370,256 365,244" fill="#00e676"/>
  </g>
  <rect x="375" y="238" width="140" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="445" y="252" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY: Doji + Confirm Bar</text>

  <!-- Post-reversal uptrend -->
  <line x1="400" y1="242" x2="400" y2="282" stroke="#26a69a" stroke-width="1"/>
  <rect x="394" y="248" width="12" height="25" fill="#26a69a" rx="1"/>
  <line x1="435" y1="218" x2="435" y2="262" stroke="#26a69a" stroke-width="1"/>
  <rect x="429" y="225" width="12" height="28" fill="#26a69a" rx="1"/>
  <line x1="470" y1="195" x2="470" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="464" y="200" width="12" height="32" fill="#26a69a" rx="1"/>
  <line x1="505" y1="175" x2="505" y2="218" stroke="#ef5350" stroke-width="1"/>
  <rect x="499" y="180" width="12" height="20" fill="#ef5350" rx="1"/>
  <line x1="540" y1="158" x2="540" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="534" y="165" width="12" height="28" fill="#26a69a" rx="1"/>
  <line x1="575" y1="140" x2="575" y2="182" stroke="#26a69a" stroke-width="1"/>
  <rect x="569" y="148" width="12" height="25" fill="#26a69a" rx="1"/>

  <!-- Entry line -->
  <line x1="355" y1="268" x2="620" y2="268" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="625" y="272" fill="#42a5f5" font-size="9">Entry</text>

  <!-- Stop Loss -->
  <line x1="355" y1="318" x2="620" y2="318" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="625" y="322" fill="#ef5350" font-size="9">Stop (Below Doji Low)</text>

  <!-- Take Profit -->
  <line x1="355" y1="148" x2="620" y2="148" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="625" y="152" fill="#00e676" font-size="9">Take Profit (2x ATR)</text>

  <!-- Doji pattern zoom box -->
  <rect x="620" y="85" width="140" height="130" rx="6" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="690" y="102" text-anchor="middle" fill="#e0e0e0" font-size="10" font-weight="500">Doji Anatomy</text>
  <!-- Zoomed doji -->
  <line x1="690" y1="115" x2="690" y2="200" stroke="#ff9800" stroke-width="2.5"/>
  <rect x="681" y="155" width="18" height="5" fill="#ff9800" rx="1"/>
  <!-- Labels -->
  <text x="715" y="125" fill="#888" font-size="8">High</text>
  <text x="715" y="162" fill="#ff9800" font-size="8">Open = Close</text>
  <text x="715" y="198" fill="#888" font-size="8">Low</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="134" y="395" width="12" height="20" fill="#ef5350" rx="1"/>
    <rect x="169" y="393" width="12" height="22" fill="#ef5350" rx="1"/>
    <rect x="204" y="390" width="12" height="25" fill="#ef5350" rx="1"/>
    <rect x="239" y="388" width="12" height="27" fill="#ef5350" rx="1"/>
    <rect x="274" y="390" width="12" height="25" fill="#ef5350" rx="1"/>
    <rect x="314" y="403" width="12" height="12" fill="#ff9800" rx="1"/>
  </g>
  <rect x="354" y="385" width="12" height="30" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="394" y="393" width="12" height="22" fill="#26a69a" rx="1"/>
    <rect x="429" y="395" width="12" height="20" fill="#26a69a" rx="1"/>
    <rect x="464" y="390" width="12" height="25" fill="#26a69a" rx="1"/>
    <rect x="499" y="400" width="12" height="15" fill="#ef5350" rx="1"/>
    <rect x="534" y="395" width="12" height="20" fill="#26a69a" rx="1"/>
    <rect x="569" y="398" width="12" height="17" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">Doji Candle</text>
    <circle cx="125" cy="20" r="4" fill="#00e676"/>
    <text x="135" y="24" fill="#999" font-size="9">Confirmation + Entry</text>
    <circle cx="275" cy="20" r="4" fill="#42a5f5"/>
    <text x="285" y="24" fill="#999" font-size="9">Support Level</text>
    <circle cx="395" cy="20" r="4" fill="#ef5350"/>
    <text x="405" y="24" fill="#999" font-size="9">Stop Loss</text>
    <circle cx="490" cy="20" r="4" fill="#00e676"/>
    <text x="500" y="24" fill="#999" font-size="9">Take Profit</text>
  </g>
</svg>