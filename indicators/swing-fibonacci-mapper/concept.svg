<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="goldZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="440"/><line x1="160" y1="60" x2="160" y2="440"/>
    <line x1="240" y1="60" x2="240" y2="440"/><line x1="320" y1="60" x2="320" y2="440"/>
    <line x1="400" y1="60" x2="400" y2="440"/><line x1="480" y1="60" x2="480" y2="440"/>
    <line x1="560" y1="60" x2="560" y2="440"/><line x1="640" y1="60" x2="640" y2="440"/>
    <line x1="720" y1="60" x2="720" y2="440"/>
    <line x1="60" y1="100" x2="750" y2="100"/><line x1="60" y1="150" x2="750" y2="150"/>
    <line x1="60" y1="200" x2="750" y2="200"/><line x1="60" y1="250" x2="750" y2="250"/>
    <line x1="60" y1="300" x2="750" y2="300"/><line x1="60" y1="350" x2="750" y2="350"/>
    <line x1="60" y1="400" x2="750" y2="400"/>
  </g>

  <!-- Y-axis: price scale 150-350, mapped to y 400-80 (1.6 px per unit) -->
  <text x="45" y="84" fill="#888" font-size="10" text-anchor="end">350</text>
  <text x="45" y="164" fill="#888" font-size="10" text-anchor="end">300</text>
  <text x="45" y="244" fill="#888" font-size="10" text-anchor="end">250</text>
  <text x="45" y="324" fill="#888" font-size="10" text-anchor="end">200</text>
  <text x="45" y="404" fill="#888" font-size="10" text-anchor="end">150</text>

  <!-- Fibonacci levels: swing low=150 (y=400), swing high=350 (y=80) -->
  <!-- 23.6%: 350-(200*0.236)=302.8 -> y=155.5 -->
  <!-- 38.2%: 350-(200*0.382)=273.6 -> y=202.2 -->
  <!-- 50.0%: 250 -> y=240 -->
  <!-- 61.8%: 350-(200*0.618)=226.4 -> y=277.8 -->
  <!-- 78.6%: 350-(200*0.786)=192.8 -> y=331.5 -->

  <!-- Fib retracement lines -->
  <line x1="350" y1="155" x2="750" y2="155" stroke="#aaaaff" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="755" y="159" fill="#aaaaff" font-size="9">23.6% ($303)</text>

  <line x1="350" y1="202" x2="750" y2="202" stroke="#aaaaff" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="755" y="206" fill="#aaaaff" font-size="9">38.2% ($274)</text>

  <line x1="350" y1="240" x2="750" y2="240" stroke="#aaaaff" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="755" y="244" fill="#aaaaff" font-size="9">50.0% ($250)</text>

  <line x1="350" y1="278" x2="750" y2="278" stroke="#aaaaff" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="755" y="282" fill="#aaaaff" font-size="9">61.8% ($226)</text>

  <line x1="350" y1="332" x2="750" y2="332" stroke="#aaaaff" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="755" y="336" fill="#aaaaff" font-size="9">78.6% ($193)</text>

  <!-- Golden zone fill (50% to 61.8%) -->
  <rect x="350" y="240" width="400" height="38" fill="url(#goldZone)"/>
  <text x="540" y="263" fill="#ffd700" font-size="10" text-anchor="middle" opacity="0.8">Golden Zone</text>

  <!-- Swing high and low reference lines -->
  <line x1="350" y1="80" x2="750" y2="80" stroke="#ff6666" stroke-width="0.6" stroke-dasharray="2,4" opacity="0.4"/>
  <line x1="60" y1="400" x2="750" y2="400" stroke="#66ff66" stroke-width="0.6" stroke-dasharray="2,4" opacity="0.4"/>

  <!-- Price line: swing up from 150 to 350, then retrace to golden zone bounce -->
  <polyline fill="none" stroke="#ffffff" stroke-width="2" opacity="0.9"
    points="
      70,395 85,388 100,380 115,370 130,375 145,360 160,345 175,330
      190,310 205,290 220,265 235,240 250,210 265,185 280,155 295,125
      310,100 325,88 340,80 355,85 370,100 385,120 400,145 415,165
      430,190 445,210 460,230 475,245 490,255 505,265 520,260 535,250
      550,248 565,255 580,260 595,252 610,245 625,250 640,255 655,248
    "/>

  <!-- Connecting line from swing low to swing high -->
  <line x1="70" y1="395" x2="340" y2="80" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="3,5" opacity="0.3"/>

  <!-- Swing low marker (green diamond) -->
  <polygon points="70,385 80,395 70,405 60,395" fill="#00ff88" filter="url(#glow)" opacity="0.9"/>
  <text x="70" y="420" fill="#00ff88" font-size="10" text-anchor="middle">Swing Low</text>
  <text x="70" y="432" fill="#888" font-size="9" text-anchor="middle">$150</text>

  <!-- Swing high marker (red diamond) -->
  <polygon points="340,70 350,80 340,90 330,80" fill="#ff4466" filter="url(#glow)" opacity="0.9"/>
  <text x="340" y="65" fill="#ff4466" font-size="10" text-anchor="middle">Swing High</text>
  <text x="340" y="55" fill="#888" font-size="9" text-anchor="middle">$350</text>

  <!-- Bounce annotation near golden zone -->
  <circle cx="550" cy="248" r="4" fill="#ffd700" filter="url(#glow)"/>
  <text x="550" y="235" fill="#ffd700" font-size="10" text-anchor="middle" font-weight="bold" filter="url(#glow)">Bounce</text>

  <!-- Title -->
  <text x="20" y="28" fill="#ffffff" font-size="17" font-weight="bold">Swing Fibonacci Mapper</text>
  <text x="20" y="45" fill="#888888" font-size="11">tradegrub.finance</text>

  <!-- Legend bar -->
  <rect x="0" y="455" width="800" height="45" fill="#0d0d1a" opacity="0.6"/>
  <line x1="60" y1="475" x2="85" y2="475" stroke="#ffffff" stroke-width="2"/>
  <text x="90" y="479" fill="#cccccc" font-size="11">Price</text>
  <polygon points="155,471 161,475 155,479 149,475" fill="#00ff88"/>
  <text x="168" y="479" fill="#cccccc" font-size="11">Swing Low</text>
  <polygon points="255,471 261,475 255,479 249,475" fill="#ff4466"/>
  <text x="268" y="479" fill="#cccccc" font-size="11">Swing High</text>
  <line x1="360" y1="475" x2="385" y2="475" stroke="#aaaaff" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="390" y="479" fill="#cccccc" font-size="11">Fib Levels</text>
  <rect x="480" y="470" width="18" height="10" fill="#ffd700" opacity="0.2" stroke="#ffd700" stroke-width="0.5"/>
  <text x="503" y="479" fill="#cccccc" font-size="11">Golden Zone</text>
</svg>