<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="300" x2="760" y2="300"/><line x1="60" y1="370" x2="760" y2="370"/>
  </g>
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Enhanced Momentum Scanner</text>
  <text x="400" y="52" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- UPPER PANEL: Price polyline (y60-220), two successive highs -->
  <polyline points="80,185 105,178 130,170 155,162 180,155 205,148 230,142 255,138 280,130 305,118 330,108 355,100 380,95 405,100 430,112 455,120 480,115 505,108 530,100 555,92 580,88 605,85 630,92 655,105 680,120 705,140 730,160" fill="none" stroke="#00e5ff" stroke-width="2" filter="url(#glow)"/>

  <!-- Divergence lines on price: connecting two highs -->
  <line x1="380" y1="95" x2="605" y2="85" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.8"/>

  <!-- Divider line -->
  <line x1="60" y1="240" x2="760" y2="240" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="65" y="235" fill="#666" font-size="9">PRICE</text>
  <text x="65" y="255" fill="#666" font-size="9">MOMENTUM</text>

  <!-- LOWER PANEL: Momentum histogram (y260-400), zero line at y330 -->
  <line x1="80" y1="330" x2="740" y2="330" stroke="#888" stroke-width="0.5" opacity="0.3"/>
  <text x="745" y="334" fill="#888" font-size="8" opacity="0.4">0</text>

  <!-- Histogram bars -->
  <rect x="82" y="318" width="16" height="12" fill="#26a69a" opacity="0.4" rx="1"/>
  <rect x="107" y="312" width="16" height="18" fill="#26a69a" opacity="0.5" rx="1"/>
  <rect x="132" y="305" width="16" height="25" fill="#26a69a" opacity="0.6" rx="1"/>
  <rect x="157" y="298" width="16" height="32" fill="#26a69a" opacity="0.7" rx="1"/>
  <rect x="182" y="290" width="16" height="40" fill="#26a69a" opacity="0.8" rx="1"/>
  <rect x="207" y="282" width="16" height="48" fill="#26a69a" opacity="0.9" rx="1"/>
  <rect x="232" y="275" width="16" height="55" fill="#26a69a" opacity="1.0" rx="1"/>
  <rect x="257" y="270" width="16" height="60" fill="#26a69a" opacity="1.0" rx="1"/>
  <rect x="282" y="268" width="16" height="62" fill="#26a69a" opacity="1.0" rx="1"/>
  <rect x="307" y="272" width="16" height="58" fill="#26a69a" opacity="1.0" rx="1"/>
  <rect x="332" y="278" width="16" height="52" fill="#26a69a" opacity="0.95" rx="1"/>
  <rect x="357" y="285" width="16" height="45" fill="#26a69a" opacity="0.9" rx="1"/>
  <rect x="382" y="295" width="16" height="35" fill="#26a69a" opacity="0.5" rx="1"/>
  <rect x="407" y="310" width="16" height="20" fill="#26a69a" opacity="0.4" rx="1"/>
  <rect x="432" y="322" width="16" height="8" fill="#26a69a" opacity="0.3" rx="1"/>
  <rect x="457" y="330" width="16" height="10" fill="#ef5350" opacity="0.3" rx="1"/>
  <rect x="482" y="330" width="16" height="18" fill="#ef5350" opacity="0.4" rx="1"/>
  <rect x="507" y="325" width="16" height="5" fill="#26a69a" opacity="0.3" rx="1"/>
  <rect x="532" y="315" width="16" height="15" fill="#26a69a" opacity="0.4" rx="1"/>
  <rect x="557" y="305" width="16" height="25" fill="#26a69a" opacity="0.5" rx="1"/>
  <rect x="582" y="298" width="16" height="32" fill="#26a69a" opacity="0.55" rx="1"/>
  <rect x="607" y="295" width="16" height="35" fill="#26a69a" opacity="0.5" rx="1"/>
  <rect x="632" y="302" width="16" height="28" fill="#26a69a" opacity="0.45" rx="1"/>
  <rect x="657" y="312" width="16" height="18" fill="#26a69a" opacity="0.35" rx="1"/>
  <rect x="682" y="322" width="16" height="8" fill="#26a69a" opacity="0.3" rx="1"/>
  <rect x="707" y="330" width="16" height="14" fill="#ef5350" opacity="0.4" rx="1"/>

  <!-- Divergence line on momentum: connecting two peaks (second lower = bearish divergence) -->
  <line x1="282" y1="268" x2="607" y2="295" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.8"/>

  <!-- Bearish Divergence annotation -->
  <rect x="420" y="138" width="140" height="24" rx="4" fill="#ef5350" fill-opacity="0.12" stroke="#ef5350" stroke-opacity="0.35" stroke-width="1"/>
  <text x="490" y="155" text-anchor="middle" fill="#ef5350" font-size="11" font-weight="500">Bearish Divergence</text>

  <!-- Connecting lines from annotation to divergence -->
  <line x1="445" y1="162" x2="420" y2="92" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="530" y1="162" x2="550" y2="92" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.4"/>

  <!-- Price axis labels -->
  <text x="748" y="88" fill="#888" font-size="8" opacity="0.5">$245</text>
  <text x="748" y="125" fill="#888" font-size="8" opacity="0.5">$238</text>
  <text x="748" y="160" fill="#888" font-size="8" opacity="0.5">$230</text>
  <text x="748" y="195" fill="#888" font-size="8" opacity="0.5">$222</text>

  <!-- Momentum axis labels -->
  <text x="748" y="272" fill="#888" font-size="8" opacity="0.5">+60</text>
  <text x="748" y="302" fill="#888" font-size="8" opacity="0.5">+30</text>
  <text x="748" y="362" fill="#888" font-size="8" opacity="0.5">-30</text>
  <text x="748" y="392" fill="#888" font-size="8" opacity="0.5">-60</text>

  <!-- Time axis labels -->
  <text x="80" y="430" text-anchor="middle" fill="#888" font-size="8" opacity="0.4">Jan</text>
  <text x="200" y="430" text-anchor="middle" fill="#888" font-size="8" opacity="0.4">Feb</text>
  <text x="320" y="430" text-anchor="middle" fill="#888" font-size="8" opacity="0.4">Mar</text>
  <text x="440" y="430" text-anchor="middle" fill="#888" font-size="8" opacity="0.4">Apr</text>
  <text x="560" y="430" text-anchor="middle" fill="#888" font-size="8" opacity="0.4">May</text>
  <text x="680" y="430" text-anchor="middle" fill="#888" font-size="8" opacity="0.4">Jun</text>

  <!-- Signal quality indicator dots on price line -->
  <circle cx="282" cy="130" r="3" fill="#26a69a" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="380" cy="95" r="3" fill="#ffd740" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="605" cy="85" r="3" fill="#ef5350" opacity="0.8" filter="url(#softGlow)"/>

  <!-- Momentum signal line (smoothed, overlaid on histogram) -->
  <polyline points="82,324 107,318 132,310 157,302 182,294 207,286 232,278 257,273 282,270 307,275 332,282 357,290 382,300 407,315 432,326 457,334 482,340 507,328 532,318 557,308 582,300 607,297 632,305 657,316 682,326 707,336" fill="none" stroke="#ffd740" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>

  <!-- Quality labels -->
  <rect x="180" y="380" width="90" height="20" rx="4" fill="#26a69a" fill-opacity="0.12" stroke="#26a69a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="225" y="394" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="500">Quality: High</text>

  <rect x="560" y="380" width="88" height="20" rx="4" fill="#888" fill-opacity="0.12" stroke="#888" stroke-opacity="0.3" stroke-width="1"/>
  <text x="604" y="394" text-anchor="middle" fill="#888" font-size="9" font-weight="500">Quality: Low</text>

  <!-- Legend -->
  <g transform="translate(60, 455)">
    <rect width="680" height="30" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="15" cy="15" r="4" fill="#00e5ff"/>
    <text x="25" y="19" fill="#999" font-size="9">Price</text>
    <circle cx="80" cy="15" r="4" fill="#26a69a"/>
    <text x="90" y="19" fill="#999" font-size="9">Momentum (High Quality)</text>
    <circle cx="260" cy="15" r="4" fill="#26a69a" opacity="0.4"/>
    <text x="270" y="19" fill="#999" font-size="9">Momentum (Low Quality)</text>
    <circle cx="440" cy="15" r="4" fill="#ef5350"/>
    <text x="450" y="19" fill="#999" font-size="9">Divergence</text>
  </g>
</svg>