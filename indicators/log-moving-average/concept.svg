  <!-- Log MA line (cyan, smooth) -->
  <polyline points="80,355 100,365 120,345 140,325 160,305 180,290 200,298 220,310 240,295 260,270 280,248 300,232 320,245 340,260 360,275 380,265 400,245 420,225 440,208 460,192 480,180 500,188 520,170 540,152 560,158 580,140" fill="none" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

