    <rect x="406" y="396" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="431" y="398" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="456" y="400" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="481" y="402" width="8" height="16" fill="#26a69a" rx="1"/>
    <rect x="506" y="404" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="531" y="405" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="556" y="396" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="581" y="394" width="8" height="24" fill="#ef5350" rx="1"/>
    <rect x="606" y="398" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="631" y="400" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="656" y="402" width="8" height="16" fill="#ef5350" rx="1"/>
    <rect x="681" y="404" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="706" y="406" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="731" y="404" width="8" height="14" fill="#26a69a" rx="1"/>
  </g>

  <!-- Separator -->
  <line x1="60" y1="290" x2="760" y2="290" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="305" fill="#888" font-size="9">Vortex</text>

  <!-- Vortex panel: 1.0 reference at y=355, range 0.7-1.3 mapped to y=380-320 -->
  <!-- Reference line at 1.0 -->
  <line x1="80" y1="355" x2="740" y2="355" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="745" y="358" fill="#666" font-size="8">1.0</text>

  <!-- VI+ line (green) - low in downtrend, high in uptrend -->
  <path d="M85,372 L110,375 L135,378 L160,375 L185,372 L210,370 L235,365 L260,358 L285,362 L310,350 L335,340 L360,332 L385,325 L410,320 L435,318 L460,320 L485,322 L510,318 L535,320 L560,330 L585,340 L610,350 L635,358 L660,365 L685,370 L710,362 L735,355" fill="none" stroke="#26a69a" stroke-width="2"/>

  <!-- VI- line (red) - high in downtrend, low in uptrend -->
  <path d="M85,335 L110,332 L135,328 L160,330 L185,332 L210,335 L235,340 L260,348 L285,345 L310,355 L335,365 L360,372 L385,378 L410,380 L435,378 L460,375 L485,372 L510,378 L535,375 L560,365 L585,355 L610,348 L635,340 L660,335 L685,330 L710,338 L735,348" fill="none" stroke="#ef5350" stroke-width="2"/>

  <!-- BUY signal at crossover x=310 where VI+ crosses above VI- -->
  <circle cx="310" cy="352" r="8" fill="none" stroke="#00e676" stroke-width="2" filter="url(#glow)"/>
  <line x1="310" y1="280" x2="310" y2="345" stroke="#00e676" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <g filter="url(#softGlow)">
    <polygon points="308,198 318,198 313,185" fill="#00e676"/>
  </g>
  <rect x="263" y="180" width="50" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="288" y="193" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- EXIT signal at x=610 where VI- crosses above VI+ -->
  <circle cx="610" cy="349" r="8" fill="none" stroke="#ef5350" stroke-width="2" filter="url(#glow)"/>
  <line x1="610" y1="280" x2="610" y2="342" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <g filter="url(#softGlow)">
    <polygon points="608,145 618,145 613,158" fill="#ef5350"/>
  </g>
  <rect x="565" y="130" width="50" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="590" y="143" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">EXIT</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">VI+ (Positive)</text>
    <circle cx="140" cy="20" r="4" fill="#ef5350"/>
    <text x="150" y="24" fill="#999" font-size="9">VI- (Negative)</text>
    <line x1="260" y1="20" x2="290" y2="20" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
    <text x="298" y="24" fill="#999" font-size="9">Reference (1.0)</text>
    <circle cx="420" cy="20" r="4" fill="#00e676"/>
    <text x="430" y="24" fill="#999" font-size="9">Buy Signal</text>
    <circle cx="520" cy="20" r="4" fill="#ef5350"/>
    <text x="530" y="24" fill="#999" font-size="9">Exit Signal</text>
  </g>
