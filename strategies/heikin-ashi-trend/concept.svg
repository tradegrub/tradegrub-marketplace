    <polygon points="215,262 225,262 220,250" fill="#00e676"/>
  </g>
  <rect x="228" y="245" width="115" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="285" y="259" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY (Color Flip)</text>

  <!-- More green HA candles (uptrend, strong = no lower wicks) -->
