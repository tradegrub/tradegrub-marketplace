<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="200"/><line x1="200" y1="60" x2="200" y2="200"/>
    <line x1="320" y1="60" x2="320" y2="200"/><line x1="440" y1="60" x2="440" y2="200"/>
    <line x1="560" y1="60" x2="560" y2="200"/><line x1="680" y1="60" x2="680" y2="200"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="150" x2="760" y2="150"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Multi-Oscillator Consensus Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price panel (small, top 35%) -->
  <text x="65" y="72" fill="#888" font-size="9">Price</text>
  <line x1="95" y1="140" x2="95" y2="180" stroke="#ef5350" stroke-width="1"/>
  <rect x="91" y="148" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="120" y1="145" x2="120" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="116" y="155" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="150" y1="152" x2="150" y2="190" stroke="#26a69a" stroke-width="1"/>
  <rect x="146" y="162" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="180" y1="142" x2="180" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="176" y="150" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="210" y1="130" x2="210" y2="168" stroke="#26a69a" stroke-width="1"/>
  <rect x="206" y="138" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="245" y1="118" x2="245" y2="155" stroke="#26a69a" stroke-width="1"/>
  <rect x="241" y="125" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="280" y1="105" x2="280" y2="142" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="112" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="315" y1="95" x2="315" y2="132" stroke="#26a69a" stroke-width="1"/>
  <rect x="311" y="102" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="350" y1="88" x2="350" y2="125" stroke="#26a69a" stroke-width="1"/>
  <rect x="346" y="95" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="385" y1="85" x2="385" y2="122" stroke="#ef5350" stroke-width="1"/>
  <rect x="381" y="90" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="420" y1="92" x2="420" y2="130" stroke="#ef5350" stroke-width="1"/>
  <rect x="416" y="98" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="455" y1="105" x2="455" y2="142" stroke="#ef5350" stroke-width="1"/>
  <rect x="451" y="112" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="490" y1="118" x2="490" y2="158" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="125" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="525" y1="135" x2="525" y2="175" stroke="#ef5350" stroke-width="1"/>
  <rect x="521" y="142" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="560" y1="148" x2="560" y2="188" stroke="#26a69a" stroke-width="1"/>
  <rect x="556" y="158" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="595" y1="138" x2="595" y2="175" stroke="#26a69a" stroke-width="1"/>
  <rect x="591" y="145" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="630" y1="125" x2="630" y2="162" stroke="#26a69a" stroke-width="1"/>
  <rect x="626" y="132" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="665" y1="112" x2="665" y2="150" stroke="#26a69a" stroke-width="1"/>
  <rect x="661" y="120" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="700" y1="100" x2="700" y2="138" stroke="#26a69a" stroke-width="1"/>
  <rect x="696" y="108" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="730" y1="92" x2="730" y2="128" stroke="#26a69a" stroke-width="1"/>
  <rect x="726" y="98" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- BUY signal on price -->
  <g filter="url(#softGlow)">
    <polygon points="208,125 218,125 213,112" fill="#00e676"/>
  </g>
  <rect x="220" y="110" width="40" height="16" rx="3" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="240" y="122" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">BUY</text>

  <!-- EXIT signal -->
  <g filter="url(#softGlow)">
    <polygon points="453,148 463,148 458,161" fill="#ef5350"/>
  </g>
  <rect x="465" y="145" width="40" height="16" rx="3" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="485" y="157" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">EXIT</text>

  <!-- Second BUY -->
  <g filter="url(#softGlow)">
    <polygon points="558,148 568,148 563,135" fill="#00e676"/>
  </g>
  <rect x="570" y="132" width="40" height="16" rx="3" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="590" y="144" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">BUY</text>

  <!-- Oscillator panel separator -->
  <line x1="60" y1="210" x2="760" y2="210" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Three oscillator sub-panels -->
  <!-- RSI -->
  <text x="65" y="228" fill="#42a5f5" font-size="9" font-weight="500">RSI</text>
  <line x1="80" y1="255" x2="740" y2="255" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <text x="745" y="258" fill="#666" font-size="7">50</text>
  <path d="M95,265 Q130,268 160,262 Q190,250 220,238 Q250,228 280,225 Q310,222 340,220 Q370,225 400,235 Q430,248 460,262 Q490,270 520,272 Q540,268 560,258 Q580,245 600,235 Q620,228 640,225 Q660,222 680,220 Q700,222 720,225" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.8"/>

  <!-- CCI -->
  <line x1="60" y1="285" x2="760" y2="285" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="65" y="298" fill="#ff9800" font-size="9" font-weight="500">CCI</text>
  <line x1="80" y1="325" x2="740" y2="325" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <text x="745" y="328" fill="#666" font-size="7">0</text>
  <path d="M95,335 Q130,340 160,332 Q190,318 220,305 Q250,295 280,290 Q310,288 340,285 Q370,292 400,308 Q430,322 460,335 Q490,342 520,345 Q540,340 560,328 Q580,315 600,305 Q620,295 640,290 Q660,288 680,285 Q700,288 720,292" fill="none" stroke="#ff9800" stroke-width="1.5" opacity="0.8"/>

  <!-- Stochastic -->
  <line x1="60" y1="355" x2="760" y2="355" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="65" y="368" fill="#ab47bc" font-size="9" font-weight="500">Stoch %K</text>
  <line x1="80" y1="395" x2="740" y2="395" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <text x="745" y="398" fill="#666" font-size="7">50</text>
  <path d="M95,405 Q130,408 160,400 Q190,385 220,372 Q250,365 280,360 Q310,358 340,355 Q370,362 400,378 Q430,392 460,405 Q490,410 520,412 Q540,405 560,392 Q580,378 600,368 Q620,360 640,358 Q660,355 680,352 Q700,355 720,360" fill="none" stroke="#ab47bc" stroke-width="1.5" opacity="0.8"/>

  <!-- Consensus highlight regions -->
  <!-- All 3 above midline = BUY -->
  <rect x="195" y="218" width="170" height="200" rx="3" fill="#00e676" fill-opacity="0.04" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.15"/>
  <text x="280" y="428" text-anchor="middle" fill="#00e676" font-size="9" font-weight="500">3/3 Bullish</text>

  <!-- All 3 below midline = SELL -->
  <rect x="440" y="218" width="100" height="200" rx="3" fill="#ef5350" fill-opacity="0.04" stroke="#ef5350" stroke-width="0.8" stroke-opacity="0.15"/>
  <text x="490" y="428" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="500">3/3 Bearish</text>

  <!-- Second consensus BUY -->
  <rect x="545" y="218" width="180" height="200" rx="3" fill="#00e676" fill-opacity="0.04" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.15"/>
  <text x="635" y="428" text-anchor="middle" fill="#00e676" font-size="9" font-weight="500">3/3 Bullish</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">RSI (14)</text>
    <circle cx="100" cy="20" r="4" fill="#ff9800"/>
    <text x="110" y="24" fill="#999" font-size="9">CCI (20)</text>
    <circle cx="180" cy="20" r="4" fill="#ab47bc"/>
    <text x="190" y="24" fill="#999" font-size="9">Stoch %K (14)</text>
    <circle cx="290" cy="20" r="4" fill="#00e676"/>
    <text x="300" y="24" fill="#999" font-size="9">Bullish Consensus</text>
    <circle cx="430" cy="20" r="4" fill="#ef5350"/>
    <text x="440" y="24" fill="#999" font-size="9">Bearish Consensus</text>
  </g>
</svg>