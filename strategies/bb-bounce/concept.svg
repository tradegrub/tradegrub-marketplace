<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bbFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9c27b0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#9c27b0" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Bollinger Band Bounce Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- BB fill -->
  <polygon points="80,120 160,115 240,125 320,110 400,118 480,108 560,115 640,120 720,112 720,330 640,340 560,335 480,345 400,338 320,348 240,340 160,335 80,328" fill="url(#bbFill)"/>

  <!-- Upper BB -->
  <polyline points="80,120 160,115 240,125 320,110 400,118 480,108 560,115 640,120 720,112" fill="none" stroke="#9c27b0" stroke-width="1.5" opacity="0.6"/>
  <text x="725" y="116" fill="#9c27b0" font-size="9">Upper BB</text>

  <!-- Basis (middle) -->
  <polyline points="80,225 160,222 240,230 320,220 400,225 480,218 560,222 640,228 720,220" fill="none" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="725" y="224" fill="#42a5f5" font-size="9">Basis</text>

  <!-- Lower BB -->
  <polyline points="80,328 160,335 240,340 320,348 400,338 480,345 560,335 640,340 720,330" fill="none" stroke="#9c27b0" stroke-width="1.5" opacity="0.6"/>
  <text x="725" y="334" fill="#9c27b0" font-size="9">Lower BB</text>

  <!-- Candles oscillating between bands -->
  <line x1="100" y1="200" x2="100" y2="245" stroke="#ef5350" stroke-width="1"/>
  <rect x="96" y="208" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="130" y1="215" x2="130" y2="260" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="222" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="160" y1="240" x2="160" y2="290" stroke="#ef5350" stroke-width="1"/>
  <rect x="156" y="248" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="190" y1="270" x2="190" y2="320" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="278" width="8" height="30" fill="#ef5350" rx="1"/>
  <!-- Touch lower band - BUY signal -->
  <line x1="220" y1="300" x2="220" y2="348" stroke="#00e676" stroke-width="1.5"/>
  <rect x="214" y="310" width="12" height="30" fill="#00e676" rx="1" filter="url(#glow)"/>

  <g filter="url(#softGlow)">
    <polygon points="220,298 230,298 225,286" fill="#00e676"/>
  </g>
  <rect x="232" y="282" width="120" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="292" y="296" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY: Lower Band Touch</text>

  <!-- Mean reversion candles -->
  <line x1="250" y1="285" x2="250" y2="325" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="290" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="280" y1="265" x2="280" y2="305" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="272" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="310" y1="240" x2="310" y2="278" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="248" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="340" y1="218" x2="340" y2="258" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="225" width="8" height="25" fill="#26a69a" rx="1"/>

  <!-- Exit at basis annotation -->
  <rect x="345" y="215" width="95" height="18" rx="4" fill="#42a5f5" fill-opacity="0.12" stroke="#42a5f5" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="392" y="228" text-anchor="middle" fill="#42a5f5" font-size="9" font-weight="500">EXIT at Basis Line</text>

  <!-- Continue to upper band -->
  <line x1="370" y1="195" x2="370" y2="238" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="200" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="400" y1="175" x2="400" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="180" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="430" y1="155" x2="430" y2="198" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="162" width="8" height="28" fill="#26a69a" rx="1"/>

  <!-- Touch upper band - potential SHORT/EXIT -->
  <line x1="460" y1="112" x2="460" y2="160" stroke="#ef5350" stroke-width="1"/>
  <rect x="454" y="118" width="12" height="35" fill="#ef5350" rx="1"/>
  <rect x="472" y="108" width="120" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="532" y="122" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SELL: Upper Band Touch</text>

  <!-- Reversion back down -->
  <line x1="490" y1="130" x2="490" y2="172" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="135" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="520" y1="155" x2="520" y2="195" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="162" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="550" y1="178" x2="550" y2="218" stroke="#ef5350" stroke-width="1"/>
  <rect x="546" y="185" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="580" y1="200" x2="580" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="210" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Mean reversion arrows -->
  <path d="M 230,340 C 260,370 300,370 330,340" fill="none" stroke="#888" stroke-width="1" opacity="0.4"/>
  <text x="280" y="380" text-anchor="middle" fill="#888" font-size="9">Mean Reversion</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="126" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="156" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="186" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
  </g>
  <rect x="214" y="388" width="12" height="27" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="246" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="276" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="306" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="336" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="366" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="396" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="426" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="454" y="395" width="12" height="20" fill="#ef5350" rx="1"/>
    <rect x="486" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="516" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="546" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="576" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#9c27b0"/>
    <text x="30" y="24" fill="#999" font-size="9">Bollinger Bands</text>
    <circle cx="145" cy="20" r="4" fill="#42a5f5"/>
    <text x="155" y="24" fill="#999" font-size="9">Basis (SMA)</text>
    <circle cx="250" cy="20" r="4" fill="#00e676"/>
    <text x="260" y="24" fill="#999" font-size="9">Buy Signal</text>
    <circle cx="350" cy="20" r="4" fill="#ef5350"/>
    <text x="360" y="24" fill="#999" font-size="9">Sell Signal</text>
    <rect x="445" y="12" width="20" height="16" fill="#9c27b0" opacity="0.3" rx="2"/>
    <text x="470" y="24" fill="#999" font-size="9">Band Range</text>
  </g>
</svg>