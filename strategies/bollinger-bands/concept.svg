<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bbFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9c27b0" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#9c27b0" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Bollinger Bands Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- BB fill -->
  <polygon points="80,110 160,105 240,115 320,100 400,108 480,98 560,105 640,110 720,102 720,320 640,330 560,325 480,335 400,328 320,338 240,330 160,325 80,318" fill="url(#bbFill)"/>

  <!-- Upper BB -->
  <polyline points="80,110 160,105 240,115 320,100 400,108 480,98 560,105 640,110 720,102" fill="none" stroke="#9c27b0" stroke-width="1.5" opacity="0.7"/>
  <text x="725" y="106" fill="#9c27b0" font-size="9">Upper Band (+2 SD)</text>

  <!-- Basis -->
  <polyline points="80,215 160,212 240,220 320,210 400,215 480,210 560,215 640,218 720,212" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.6"/>
  <text x="725" y="216" fill="#42a5f5" font-size="9">Basis (SMA 20)</text>

  <!-- Lower BB -->
  <polyline points="80,318 160,325 240,330 320,338 400,328 480,335 560,325 640,330 720,320" fill="none" stroke="#9c27b0" stroke-width="1.5" opacity="0.7"/>
  <text x="725" y="324" fill="#9c27b0" font-size="9">Lower Band (-2 SD)</text>

  <!-- Price candles - full cycle: drop to lower, buy, rise to upper, sell -->
  <line x1="100" y1="190" x2="100" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="96" y="198" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="130" y1="210" x2="130" y2="260" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="218" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="160" y1="245" x2="160" y2="295" stroke="#ef5350" stroke-width="1"/>
  <rect x="156" y="252" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="190" y1="278" x2="190" y2="325" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="285" width="8" height="30" fill="#ef5350" rx="1"/>

  <!-- BUY at lower band -->
  <line x1="220" y1="298" x2="220" y2="340" stroke="#00e676" stroke-width="1.5"/>
  <rect x="214" y="305" width="12" height="28" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="220,295 230,295 225,283" fill="#00e676"/>
  </g>
  <rect x="132" y="345" width="130" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="197" y="359" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY: Cross Below Lower</text>

  <!-- Rise back up -->
  <line x1="250" y1="280" x2="250" y2="318" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="285" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="280" y1="255" x2="280" y2="295" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="262" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="310" y1="230" x2="310" y2="270" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="238" width="8" height="24" fill="#26a69a" rx="1"/>
  <line x1="340" y1="205" x2="340" y2="245" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="212" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="370" y1="178" x2="370" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="185" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="400" y1="152" x2="400" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="158" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="430" y1="128" x2="430" y2="170" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="135" width="8" height="28" fill="#26a69a" rx="1"/>

  <!-- SELL at upper band -->
  <line x1="460" y1="95" x2="460" y2="145" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="454" y="100" width="12" height="38" fill="#ef5350" rx="1"/>
  <rect x="472" y="88" width="140" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="542" y="102" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SELL: Cross Above Upper</text>

  <!-- Post-sell candles -->
  <line x1="490" y1="110" x2="490" y2="155" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="115" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="520" y1="135" x2="520" y2="178" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="142" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="550" y1="160" x2="550" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="168" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="580" y1="175" x2="580" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="576" y="180" width="8" height="25" fill="#ef5350" rx="1"/>

  <!-- Profit zone arrow -->
  <line x1="230" y1="310" x2="230" y2="105" stroke="#888" stroke-width="1" stroke-dasharray="2,2" opacity="0.3"/>
  <line x1="227" y1="310" x2="233" y2="310" stroke="#888" stroke-width="1" opacity="0.3"/>
  <line x1="227" y1="105" x2="233" y2="105" stroke="#888" stroke-width="1" opacity="0.3"/>
  <text x="240" y="210" fill="#888" font-size="9" transform="rotate(-90,240,210)">Band-to-Band Profit</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="126" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="156" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="186" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
  </g>
  <rect x="214" y="385" width="12" height="30" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="246" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="276" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="306" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="336" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="366" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="396" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="426" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="454" y="390" width="12" height="25" fill="#ef5350" rx="1"/>
    <rect x="486" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="516" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="546" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="576" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#9c27b0"/>
    <text x="30" y="24" fill="#999" font-size="9">Upper/Lower Bands</text>
    <circle cx="160" cy="20" r="4" fill="#42a5f5"/>
    <text x="170" y="24" fill="#999" font-size="9">SMA Basis</text>
    <circle cx="265" cy="20" r="4" fill="#00e676"/>
    <text x="275" y="24" fill="#999" font-size="9">Buy at Lower</text>
    <circle cx="375" cy="20" r="4" fill="#ef5350"/>
    <text x="385" y="24" fill="#999" font-size="9">Sell at Upper</text>
    <rect x="485" y="12" width="20" height="16" fill="#9c27b0" opacity="0.3" rx="2"/>
    <text x="510" y="24" fill="#999" font-size="9">Band Range</text>
  </g>
</svg>