<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="baseFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Flat Base Breakout Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Prior uptrend candles -->
  <line x1="90" y1="310" x2="90" y2="350" stroke="#26a69a" stroke-width="1"/>
  <rect x="86" y="318" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="115" y1="290" x2="115" y2="330" stroke="#26a69a" stroke-width="1"/>
  <rect x="111" y="295" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="140" y1="265" x2="140" y2="305" stroke="#26a69a" stroke-width="1"/>
  <rect x="136" y="270" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="165" y1="240" x2="165" y2="280" stroke="#26a69a" stroke-width="1"/>
  <rect x="161" y="245" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="190" y1="218" x2="190" y2="260" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="225" width="8" height="28" fill="#26a69a" rx="1"/>

  <!-- Flat base zone -->
  <rect x="210" y="205" width="280" height="55" fill="url(#baseFill)" rx="4"/>

  <!-- Resistance line -->
  <line x1="210" y1="205" x2="490" y2="205" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="495" y="200" fill="#42a5f5" font-size="9">Resistance (Base Top)</text>

  <!-- Support line -->
  <line x1="210" y1="255" x2="490" y2="255" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="495" y="260" fill="#42a5f5" font-size="9">Support (Base Bottom)</text>

  <!-- Flat base candles - tight range -->
  <line x1="225" y1="212" x2="225" y2="250" stroke="#ef5350" stroke-width="1"/>
  <rect x="221" y="218" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="250" y1="215" x2="250" y2="248" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="225" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="275" y1="218" x2="275" y2="250" stroke="#ef5350" stroke-width="1"/>
  <rect x="271" y="222" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="300" y1="215" x2="300" y2="245" stroke="#26a69a" stroke-width="1"/>
  <rect x="296" y="222" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="325" y1="210" x2="325" y2="248" stroke="#ef5350" stroke-width="1"/>
  <rect x="321" y="215" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="350" y1="212" x2="350" y2="245" stroke="#26a69a" stroke-width="1"/>
  <rect x="346" y="218" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="375" y1="215" x2="375" y2="248" stroke="#ef5350" stroke-width="1"/>
  <rect x="371" y="220" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="400" y1="212" x2="400" y2="245" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="220" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="425" y1="210" x2="425" y2="248" stroke="#26a69a" stroke-width="1"/>
  <rect x="421" y="215" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="450" y1="208" x2="450" y2="245" stroke="#26a69a" stroke-width="1"/>
  <rect x="446" y="215" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="475" y1="210" x2="475" y2="242" stroke="#26a69a" stroke-width="1"/>
  <rect x="471" y="215" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- BREAKOUT candle -->
  <line x1="505" y1="165" x2="505" y2="218" stroke="#00e676" stroke-width="1.5"/>
  <rect x="499" y="170" width="12" height="40" fill="#00e676" rx="1" filter="url(#glow)"/>

  <g filter="url(#softGlow)">
    <polygon points="505,162 515,162 510,150" fill="#00e676"/>
  </g>
  <rect x="518" y="148" width="80" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="558" y="162" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BREAKOUT</text>

  <!-- Post-breakout candles -->
  <line x1="535" y1="148" x2="535" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="531" y="152" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="560" y1="138" x2="560" y2="175" stroke="#26a69a" stroke-width="1"/>
  <rect x="556" y="142" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="585" y1="128" x2="585" y2="165" stroke="#ef5350" stroke-width="1"/>
  <rect x="581" y="132" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="610" y1="120" x2="610" y2="158" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="125" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="635" y1="110" x2="635" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="631" y="115" width="8" height="25" fill="#26a69a" rx="1"/>

  <!-- Entry line -->
  <line x1="500" y1="205" x2="680" y2="205" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="685" y="209" fill="#42a5f5" font-size="10">Entry</text>

  <!-- Stop Loss -->
  <line x1="500" y1="255" x2="680" y2="255" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="685" y="259" fill="#ef5350" font-size="10">Stop Loss</text>

  <!-- Take Profit -->
  <line x1="500" y1="110" x2="680" y2="110" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="685" y="114" fill="#00e676" font-size="10">Take Profit (2x ATR)</text>

  <!-- Base annotation -->
  <rect x="290" y="268" width="115" height="18" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="347" y="280" text-anchor="middle" fill="#bbb" font-size="10">Flat Base (Tight Range)</text>

  <!-- Volume bars - declining in base, surging on breakout -->
  <g opacity="0.4">
    <rect x="86" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="111" y="388" width="8" height="27" fill="#26a69a" rx="1"/>
    <rect x="136" y="385" width="8" height="30" fill="#26a69a" rx="1"/>
    <rect x="161" y="388" width="8" height="27" fill="#26a69a" rx="1"/>
    <rect x="186" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <!-- Declining volume in base -->
    <rect x="221" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="246" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="271" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="296" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="321" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="346" y="406" width="8" height="9" fill="#26a69a" rx="1"/>
    <rect x="371" y="405" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="396" y="407" width="8" height="8" fill="#26a69a" rx="1"/>
    <rect x="421" y="406" width="8" height="9" fill="#26a69a" rx="1"/>
    <rect x="446" y="407" width="8" height="8" fill="#26a69a" rx="1"/>
    <rect x="471" y="408" width="8" height="7" fill="#26a69a" rx="1"/>
  </g>
  <!-- Volume surge on breakout -->
  <rect x="499" y="372" width="12" height="43" fill="#00e676" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="531" y="388" width="8" height="27" fill="#26a69a" rx="1"/>
    <rect x="556" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="581" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="606" y="392" width="8" height="23" fill="#26a69a" rx="1"/>
    <rect x="631" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
  </g>

  <!-- Volume surge label -->
  <text x="475" y="368" fill="#00e676" font-size="9" font-weight="500">Volume Surge</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">Base Boundaries</text>
    <circle cx="145" cy="20" r="4" fill="#00e676"/>
    <text x="155" y="24" fill="#999" font-size="9">Breakout Signal</text>
    <circle cx="270" cy="20" r="4" fill="#ef5350"/>
    <text x="280" y="24" fill="#999" font-size="9">Stop Loss</text>
    <rect x="370" y="12" width="20" height="16" fill="#00e676" opacity="0.5" rx="2"/>
    <text x="395" y="24" fill="#999" font-size="9">Volume Surge</text>
    <rect x="495" y="12" width="20" height="16" fill="#42a5f5" opacity="0.3" rx="2"/>
    <text x="520" y="24" fill="#999" font-size="9">Consolidation Zone</text>
  </g>
</svg>