<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e0e0e0">Candlestick Pattern Score</text>
  <text x="400" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8899aa">Composite score weighted by historical success rate</text>

  <!-- Zero line -->
  <line x1="60" y1="280" x2="740" y2="280" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="50" y="284" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#888">0</text>

  <!-- +50 line -->
  <line x1="60" y1="190" x2="740" y2="190" stroke="#2e7d3266" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="50" y="194" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#4caf50">+50</text>

  <!-- -50 line -->
  <line x1="60" y1="370" x2="740" y2="370" stroke="#c6282866" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="50" y="374" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#ef5350">-50</text>

  <!-- Score line (sample waveform) -->
  <polyline fill="none" stroke="#00e5ff" stroke-width="2.5"
    points="60,280 90,270 120,250 150,210 180,185 210,200 240,240 270,280 300,300 330,340 360,375 390,360 420,320 450,280 480,260 510,230 540,195 570,180 600,210 630,250 660,280 690,290 720,275 740,280"/>

  <!-- Bullish zone highlight -->
  <rect x="140" y="140" width="80" height="50" fill="#4caf50" opacity="0.1" rx="4"/>
  <text x="180" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4caf50">Bullish Zone</text>

  <!-- Bearish zone highlight -->
  <rect x="330" y="370" width="80" height="50" fill="#ef5350" opacity="0.1" rx="4"/>
  <text x="370" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ef5350">Bearish Zone</text>

  <!-- Pattern labels -->
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#667788">Hammer | Engulfing | Doji | Morning Star | Evening Star | Harami</text>
</svg>
