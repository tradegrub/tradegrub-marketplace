  <!-- SMA reference (faint) -->
  <polyline points="100,340 140,315 180,285 220,250 260,220 300,200 340,200 380,210 420,200 460,185 500,165 540,165 580,175 620,195 660,210 700,200" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4,3"/>

