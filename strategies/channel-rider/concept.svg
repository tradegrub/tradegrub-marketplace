<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="chFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Channel Boundary Rider</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Ascending regression channel fill -->
  <polygon points="80,280 720,120 720,240 80,380" fill="url(#chFill)"/>

  <!-- Upper channel (linreg + dev) -->
  <line x1="80" y1="280" x2="720" y2="120" stroke="#26a69a" stroke-width="2" stroke-dasharray="8,4" opacity="0.7"/>
  <text x="725" y="118" fill="#26a69a" font-size="9">Upper Channel</text>

  <!-- Regression line (center) -->
  <line x1="80" y1="330" x2="720" y2="180" stroke="#42a5f5" stroke-width="1.5" opacity="0.5"/>
  <text x="725" y="178" fill="#42a5f5" font-size="9">LinReg Center</text>

  <!-- Lower channel (linreg - dev) -->
  <line x1="80" y1="380" x2="720" y2="240" stroke="#ef5350" stroke-width="2" stroke-dasharray="8,4" opacity="0.7"/>
  <text x="725" y="238" fill="#ef5350" font-size="9">Lower Channel</text>

  <!-- Candles bouncing within channel -->
  <line x1="100" y1="310" x2="100" y2="360" stroke="#ef5350" stroke-width="1"/>
  <rect x="96" y="318" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="130" y1="320" x2="130" y2="365" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="328" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- BUY at lower channel -->
  <line x1="160" y1="325" x2="160" y2="375" stroke="#00e676" stroke-width="1.5"/>
  <rect x="154" y="335" width="12" height="32" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="160,322 170,322 165,310" fill="#00e676"/>
  </g>
  <rect x="172" y="305" width="112" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="228" y="318" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">BUY: Lower Touch</text>

  <!-- Rise to upper -->
  <line x1="190" y1="305" x2="190" y2="345" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="312" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="220" y1="290" x2="220" y2="330" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="298" width="8" height="24" fill="#26a69a" rx="1"/>
  <line x1="250" y1="272" x2="250" y2="312" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="280" width="8" height="24" fill="#26a69a" rx="1"/>
  <line x1="280" y1="255" x2="280" y2="295" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="262" width="8" height="25" fill="#26a69a" rx="1"/>

  <!-- SELL at upper channel -->
  <line x1="310" y1="228" x2="310" y2="275" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="304" y="232" width="12" height="35" fill="#ef5350" rx="1"/>
  <rect x="320" y="222" width="115" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="377" y="235" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">SELL: Upper Touch</text>

  <!-- Drop back down -->
  <line x1="340" y1="240" x2="340" y2="285" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="248" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="370" y1="252" x2="370" y2="295" stroke="#ef5350" stroke-width="1"/>
  <rect x="366" y="260" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="400" y1="262" x2="400" y2="308" stroke="#ef5350" stroke-width="1"/>
  <rect x="396" y="270" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- Another BUY at lower -->
  <line x1="430" y1="268" x2="430" y2="318" stroke="#00e676" stroke-width="1.5"/>
  <rect x="424" y="278" width="12" height="32" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="430,265 440,265 435,253" fill="#00e676"/>
  </g>

  <!-- Rise again -->
  <line x1="460" y1="248" x2="460" y2="292" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="255" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="490" y1="232" x2="490" y2="275" stroke="#26a69a" stroke-width="1"/>
  <rect x="486" y="240" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="520" y1="215" x2="520" y2="258" stroke="#26a69a" stroke-width="1"/>
  <rect x="516" y="222" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="550" y1="198" x2="550" y2="242" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="205" width="8" height="28" fill="#26a69a" rx="1"/>

  <!-- Another SELL at upper -->
  <line x1="580" y1="170" x2="580" y2="218" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="574" y="175" width="12" height="35" fill="#ef5350" rx="1"/>

  <!-- Trend filter annotation -->
  <rect x="500" y="142" width="130" height="18" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="565" y="155" text-anchor="middle" fill="#bbb" font-size="9">Trend Filter: Ascending OK</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="126" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
  </g>
  <rect x="154" y="390" width="12" height="25" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="186" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="216" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="246" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="276" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="304" y="395" width="12" height="20" fill="#ef5350" rx="1"/>
    <rect x="336" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="366" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="396" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
  </g>
  <rect x="424" y="390" width="12" height="25" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="456" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="486" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="516" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="546" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="574" y="395" width="12" height="20" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Upper Channel</text>
    <circle cx="140" cy="20" r="4" fill="#ef5350"/>
    <text x="150" y="24" fill="#999" font-size="9">Lower Channel</text>
    <circle cx="260" cy="20" r="4" fill="#42a5f5"/>
    <text x="270" y="24" fill="#999" font-size="9">LinReg Center</text>
    <circle cx="385" cy="20" r="4" fill="#00e676"/>
    <text x="395" y="24" fill="#999" font-size="9">Buy at Lower</text>
    <circle cx="495" cy="20" r="4" fill="#ef5350"/>
    <text x="505" y="24" fill="#999" font-size="9">Sell at Upper</text>
  </g>
</svg>