<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="80" y1="55" x2="80" y2="430"/><line x1="160" y1="55" x2="160" y2="430"/>
    <line x1="240" y1="55" x2="240" y2="430"/><line x1="320" y1="55" x2="320" y2="430"/>
    <line x1="400" y1="55" x2="400" y2="430"/><line x1="480" y1="55" x2="480" y2="430"/>
    <line x1="560" y1="55" x2="560" y2="430"/><line x1="640" y1="55" x2="640" y2="430"/>
    <line x1="720" y1="55" x2="720" y2="430"/>
    <line x1="50" y1="90" x2="760" y2="90"/><line x1="50" y1="130" x2="760" y2="130"/>
    <line x1="50" y1="170" x2="760" y2="170"/><line x1="50" y1="250" x2="760" y2="250"/>
    <line x1="50" y1="310" x2="760" y2="310"/><line x1="50" y1="370" x2="760" y2="370"/>
  </g>

  <!-- Title -->
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="17" fill="#ffffff" font-weight="bold">Volume Surge Mapper</text>
  <text x="30" y="46" font-family="Arial, sans-serif" font-size="11" fill="#888888">tradegrub.finance</text>

  <!-- Price line (upper portion, y: 70-200) -->
  <polyline fill="none" stroke="#7b8fff" stroke-width="1.5" opacity="0.7"
    points="60,160 80,155 100,150 120,158 140,145 160,140 180,148 200,135 220,130 240,138
            260,125 280,120 300,128 320,115 340,105 360,110 380,100 400,95 420,105
            440,115 460,108 480,100 500,92 520,88 540,95 560,105 580,110 600,118
            620,112 640,108 660,115 680,120 700,125 720,118 740,122"/>
  <text x="745" y="118" font-family="Arial, sans-serif" font-size="9" fill="#7b8fff">Price</text>

  <!-- Separator -->
  <line x1="50" y1="210" x2="760" y2="210" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- Z-score axis (right side) -->
  <text x="768" y="228" font-family="Arial, sans-serif" font-size="8" fill="#555">z=0</text>
  <text x="768" y="290" font-family="Arial, sans-serif" font-size="8" fill="#555">z=1</text>
  <text x="768" y="345" font-family="Arial, sans-serif" font-size="8" fill="#4488ff">z=2</text>
  <text x="768" y="400" font-family="Arial, sans-serif" font-size="8" fill="#00ddff">z=3</text>
  <text x="768" y="430" font-family="Arial, sans-serif" font-size="8" fill="#ffcc00">z=4</text>
  <!-- Z-score label -->
  <text x="762" y="265" font-family="Arial, sans-serif" font-size="9" fill="#555" transform="rotate(90,762,265)">Z-Score</text>

  <!-- Volume bars (bottom half, y base at 225, growing down) -->
  <!-- Normal bars: gray, z<1 -->
  <rect x="58" y="225" width="14" height="30" fill="#666666" opacity="0.5"/>
  <rect x="78" y="225" width="14" height="25" fill="#666666" opacity="0.5"/>
  <rect x="98" y="225" width="14" height="35" fill="#666666" opacity="0.5"/>
  <rect x="118" y="225" width="14" height="20" fill="#666666" opacity="0.5"/>
  <rect x="138" y="225" width="14" height="40" fill="#666666" opacity="0.5"/>
  <!-- Elevated: blue, 1<z<2 -->
  <rect x="158" y="225" width="14" height="70" fill="#4488ff" opacity="0.7"/>
  <rect x="178" y="225" width="14" height="60" fill="#4488ff" opacity="0.7"/>
  <!-- Normal -->
  <rect x="198" y="225" width="14" height="28" fill="#666666" opacity="0.5"/>
  <rect x="218" y="225" width="14" height="32" fill="#666666" opacity="0.5"/>
  <!-- Elevated -->
  <rect x="238" y="225" width="14" height="65" fill="#4488ff" opacity="0.7"/>
  <!-- Normal -->
  <rect x="258" y="225" width="14" height="22" fill="#666666" opacity="0.5"/>
  <rect x="278" y="225" width="14" height="35" fill="#666666" opacity="0.5"/>
  <rect x="298" y="225" width="14" height="30" fill="#666666" opacity="0.5"/>
  <!-- SURGE: cyan, z>2 -->
  <rect x="318" y="225" width="14" height="120" fill="#00ddff" filter="url(#glow)"/>
  <!-- Normal -->
  <rect x="338" y="225" width="14" height="28" fill="#666666" opacity="0.5"/>
  <rect x="358" y="225" width="14" height="38" fill="#666666" opacity="0.5"/>
  <!-- Elevated -->
  <rect x="378" y="225" width="14" height="72" fill="#4488ff" opacity="0.7"/>
  <!-- Normal -->
  <rect x="398" y="225" width="14" height="25" fill="#666666" opacity="0.5"/>
  <rect x="418" y="225" width="14" height="30" fill="#666666" opacity="0.5"/>
  <!-- EXTREME SURGE: gold, z>3 -->
  <rect x="438" y="225" width="14" height="180" fill="#ffcc00" filter="url(#glowStrong)"/>
  <!-- Normal -->
  <rect x="458" y="225" width="14" height="35" fill="#666666" opacity="0.5"/>
  <rect x="478" y="225" width="14" height="22" fill="#666666" opacity="0.5"/>
  <!-- Elevated -->
  <rect x="498" y="225" width="14" height="68" fill="#4488ff" opacity="0.7"/>
  <!-- Surge -->
  <rect x="518" y="225" width="14" height="110" fill="#00ddff" filter="url(#glow)"/>
  <!-- Normal -->
  <rect x="538" y="225" width="14" height="30" fill="#666666" opacity="0.5"/>
  <rect x="558" y="225" width="14" height="38" fill="#666666" opacity="0.5"/>
  <!-- Elevated -->
  <rect x="578" y="225" width="14" height="65" fill="#4488ff" opacity="0.7"/>
  <!-- EXTREME SURGE: gold -->
  <rect x="598" y="225" width="14" height="195" fill="#ffcc00" filter="url(#glowStrong)"/>
  <!-- Normal -->
  <rect x="618" y="225" width="14" height="28" fill="#666666" opacity="0.5"/>
  <rect x="638" y="225" width="14" height="32" fill="#666666" opacity="0.5"/>
  <!-- Surge -->
  <rect x="658" y="225" width="14" height="105" fill="#00ddff" filter="url(#glow)"/>
  <!-- Normal -->
  <rect x="678" y="225" width="14" height="25" fill="#666666" opacity="0.5"/>
  <rect x="698" y="225" width="14" height="35" fill="#666666" opacity="0.5"/>
  <!-- Elevated -->
  <rect x="718" y="225" width="14" height="58" fill="#4488ff" opacity="0.7"/>
  <rect x="738" y="225" width="14" height="30" fill="#666666" opacity="0.5"/>

  <!-- Star markers above extreme surges -->
  <text x="440" y="215" font-family="Arial, sans-serif" font-size="16" fill="#ffcc00" text-anchor="middle" filter="url(#glowStrong)">&#9733;</text>
  <text x="600" y="215" font-family="Arial, sans-serif" font-size="16" fill="#ffcc00" text-anchor="middle" filter="url(#glowStrong)">&#9733;</text>

  <!-- Lightning bolt markers above surges -->
  <text x="325" y="218" font-family="Arial, sans-serif" font-size="12" fill="#00ddff" text-anchor="middle" filter="url(#glow)">&#9889;</text>
  <text x="525" y="218" font-family="Arial, sans-serif" font-size="12" fill="#00ddff" text-anchor="middle" filter="url(#glow)">&#9889;</text>
  <text x="665" y="218" font-family="Arial, sans-serif" font-size="12" fill="#00ddff" text-anchor="middle" filter="url(#glow)">&#9889;</text>

  <!-- Directional bias arrows -->
  <!-- Bullish surge at bar 318 (price was falling then surging up) -->
  <polygon points="325,195 320,205 330,205" fill="#00cc66" filter="url(#glow)"/>
  <text x="325" y="192" font-family="Arial, sans-serif" font-size="8" fill="#00cc66" text-anchor="middle">BULL</text>

  <!-- Bearish extreme surge at bar 438 -->
  <polygon points="445,195 440,185 450,185" fill="#ff4444" filter="url(#glow)"/>
  <text x="445" y="180" font-family="Arial, sans-serif" font-size="8" fill="#ff4444" text-anchor="middle">BEAR</text>

  <!-- Bullish extreme surge at bar 598 -->
  <polygon points="605,195 600,205 610,205" fill="#00cc66" filter="url(#glow)"/>
  <text x="605" y="192" font-family="Arial, sans-serif" font-size="8" fill="#00cc66" text-anchor="middle">BULL</text>

  <!-- Bearish surge at bar 658 -->
  <polygon points="665,195 660,185 670,185" fill="#ff4444" filter="url(#glow)"/>
  <text x="665" y="180" font-family="Arial, sans-serif" font-size="8" fill="#ff4444" text-anchor="middle">BEAR</text>

  <!-- Legend bar -->
  <rect x="50" y="450" width="710" height="40" rx="4" fill="#0d0d1a" opacity="0.6"/>
  <rect x="70" y="463" width="14" height="14" fill="#666666" opacity="0.5" rx="2"/>
  <text x="90" y="475" font-family="Arial, sans-serif" font-size="10" fill="#777">Normal (z&lt;1)</text>
  <rect x="200" y="463" width="14" height="14" fill="#4488ff" opacity="0.7" rx="2"/>
  <text x="220" y="475" font-family="Arial, sans-serif" font-size="10" fill="#8899dd">Elevated (1&lt;z&lt;2)</text>
  <rect x="360" y="463" width="14" height="14" fill="#00ddff" rx="2" filter="url(#glow)"/>
  <text x="380" y="475" font-family="Arial, sans-serif" font-size="10" fill="#00ddff">Surge (z&gt;2)</text>
  <rect x="490" y="463" width="14" height="14" fill="#ffcc00" rx="2" filter="url(#glow)"/>
  <text x="510" y="475" font-family="Arial, sans-serif" font-size="10" fill="#ffcc00" font-weight="bold">Extreme (z&gt;3)</text>
  <polygon points="645,464 640,476 650,476" fill="#00cc66"/>
  <text x="656" y="475" font-family="Arial, sans-serif" font-size="10" fill="#00cc66">Bullish</text>
  <polygon points="715,476 710,464 720,464" fill="#ff4444"/>
  <text x="726" y="475" font-family="Arial, sans-serif" font-size="10" fill="#ff4444">Bearish</text>
</svg>