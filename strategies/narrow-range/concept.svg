<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="nrHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9800" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff9800" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">NR7 Narrow Range Breakout Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Pre-NR candles showing varying ranges -->
  <!-- Candle 1 - wide range -->
  <line x1="110" y1="140" x2="110" y2="240" stroke="#ef5350" stroke-width="1"/>
  <rect x="104" y="155" width="12" height="65" fill="#ef5350" rx="1"/>

  <!-- Candle 2 - medium range -->
  <line x1="150" y1="155" x2="150" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="144" y="180" width="12" height="35" fill="#26a69a" rx="1"/>

  <!-- Candle 3 - large range -->
  <line x1="190" y1="130" x2="190" y2="250" stroke="#ef5350" stroke-width="1"/>
  <rect x="184" y="145" width="12" height="80" fill="#ef5350" rx="1"/>

  <!-- Candle 4 - medium range -->
  <line x1="230" y1="168" x2="230" y2="248" stroke="#26a69a" stroke-width="1"/>
  <rect x="224" y="195" width="12" height="35" fill="#26a69a" rx="1"/>

  <!-- Candle 5 - shrinking -->
  <line x1="270" y1="178" x2="270" y2="238" stroke="#ef5350" stroke-width="1"/>
  <rect x="264" y="190" width="12" height="30" fill="#ef5350" rx="1"/>

  <!-- Candle 6 - smaller -->
  <line x1="310" y1="188" x2="310" y2="232" stroke="#26a69a" stroke-width="1"/>
  <rect x="304" y="198" width="12" height="22" fill="#26a69a" rx="1"/>

  <!-- NR7 Bar - Narrowest range (highlighted) -->
  <rect x="340" y="192" width="30" height="30" rx="3" fill="url(#nrHighlight)" stroke="#ff9800" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="355" y1="198" x2="355" y2="218" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="349" y="202" width="12" height="10" fill="#ef5350" rx="1"/>

  <!-- NR label -->
  <rect x="335" y="162" width="40" height="22" rx="4" fill="#ff9800" fill-opacity="0.15" stroke="#ff9800" stroke-width="1" stroke-opacity="0.4"/>
  <text x="355" y="177" text-anchor="middle" fill="#ff9800" font-size="10" font-weight="600">NR7</text>
  <line x1="355" y1="184" x2="355" y2="192" stroke="#ff9800" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>

  <!-- NR High/Low reference lines -->
  <line x1="340" y1="198" x2="520" y2="198" stroke="#ff9800" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="525" y="201" fill="#ff9800" font-size="8" opacity="0.6">NR High</text>
  <line x1="340" y1="218" x2="520" y2="218" stroke="#ff9800" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="525" y="221" fill="#ff9800" font-size="8" opacity="0.6">NR Low</text>

  <!-- Breakout candle - big bullish bar breaking above NR high -->
  <line x1="400" y1="145" x2="400" y2="210" stroke="#00e676" stroke-width="1.5"/>
  <rect x="393" y="150" width="14" height="48" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- Breakout arrow -->
  <g filter="url(#softGlow)">
    <polygon points="398,140 408,140 403,127" fill="#00e676"/>
  </g>
  <rect x="415" y="118" width="100" height="22" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="465" y="133" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BREAKOUT</text>

  <!-- Post-breakout candles -->
  <line x1="440" y1="128" x2="440" y2="172" stroke="#26a69a" stroke-width="1"/>
  <rect x="434" y="135" width="12" height="25" fill="#26a69a" rx="1"/>
  <line x1="475" y1="115" x2="475" y2="158" stroke="#26a69a" stroke-width="1"/>
  <rect x="469" y="122" width="12" height="25" fill="#26a69a" rx="1"/>
  <line x1="510" y1="108" x2="510" y2="148" stroke="#ef5350" stroke-width="1"/>
  <rect x="504" y="115" width="12" height="22" fill="#ef5350" rx="1"/>
  <line x1="545" y1="100" x2="545" y2="140" stroke="#26a69a" stroke-width="1"/>
  <rect x="539" y="108" width="12" height="22" fill="#26a69a" rx="1"/>
  <line x1="580" y1="92" x2="580" y2="130" stroke="#26a69a" stroke-width="1"/>
  <rect x="574" y="98" width="12" height="22" fill="#26a69a" rx="1"/>

  <!-- Take Profit line -->
  <line x1="393" y1="85" x2="620" y2="85" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="625" y="89" fill="#00e676" font-size="10" font-weight="500">TP (2.5x ATR)</text>

  <!-- Entry line -->
  <line x1="393" y1="150" x2="620" y2="150" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="625" y="154" fill="#42a5f5" font-size="10" font-weight="500">Entry</text>

  <!-- Stop Loss line -->
  <line x1="393" y1="210" x2="620" y2="210" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="625" y="214" fill="#ef5350" font-size="10" font-weight="500">SL (1.0x ATR)</text>

  <!-- Range compression visual - bar heights annotation -->
  <g opacity="0.5">
    <line x1="110" y1="250" x2="110" y2="260" stroke="#888" stroke-width="1"/>
    <line x1="105" y1="260" x2="115" y2="260" stroke="#888" stroke-width="1"/>
    <text x="110" y="272" text-anchor="middle" fill="#888" font-size="7">100</text>

    <line x1="190" y1="258" x2="190" y2="268" stroke="#888" stroke-width="1"/>
    <line x1="185" y1="268" x2="195" y2="268" stroke="#888" stroke-width="1"/>
    <text x="190" y="280" text-anchor="middle" fill="#888" font-size="7">120</text>

    <line x1="270" y1="246" x2="270" y2="256" stroke="#888" stroke-width="1"/>
    <line x1="265" y1="256" x2="275" y2="256" stroke="#888" stroke-width="1"/>
    <text x="270" y="268" text-anchor="middle" fill="#888" font-size="7">60</text>

    <line x1="310" y1="240" x2="310" y2="250" stroke="#888" stroke-width="1"/>
    <line x1="305" y1="250" x2="315" y2="250" stroke="#888" stroke-width="1"/>
    <text x="310" y="262" text-anchor="middle" fill="#888" font-size="7">44</text>

    <line x1="355" y1="226" x2="355" y2="236" stroke="#ff9800" stroke-width="1"/>
    <line x1="350" y1="236" x2="360" y2="236" stroke="#ff9800" stroke-width="1"/>
    <text x="355" y="248" text-anchor="middle" fill="#ff9800" font-size="7" font-weight="600">20</text>
  </g>

  <!-- Compression annotation -->
  <path d="M115,275 Q220,300 345,245" fill="none" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <rect x="135" y="290" width="140" height="18" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="205" y="303" text-anchor="middle" fill="#bbb" font-size="9">Range Compression</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="104" y="393" width="12" height="22" fill="#ef5350" rx="1"/>
    <rect x="144" y="398" width="12" height="17" fill="#26a69a" rx="1"/>
    <rect x="184" y="388" width="12" height="27" fill="#ef5350" rx="1"/>
    <rect x="224" y="398" width="12" height="17" fill="#26a69a" rx="1"/>
    <rect x="264" y="400" width="12" height="15" fill="#ef5350" rx="1"/>
    <rect x="304" y="405" width="12" height="10" fill="#26a69a" rx="1"/>
    <rect x="349" y="407" width="12" height="8" fill="#ef5350" rx="1"/>
  </g>
  <!-- Big volume on breakout -->
  <rect x="393" y="372" width="14" height="43" fill="#00e676" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="434" y="388" width="12" height="27" fill="#26a69a" rx="1"/>
    <rect x="469" y="393" width="12" height="22" fill="#26a69a" rx="1"/>
    <rect x="504" y="398" width="12" height="17" fill="#ef5350" rx="1"/>
    <rect x="539" y="395" width="12" height="20" fill="#26a69a" rx="1"/>
    <rect x="574" y="397" width="12" height="18" fill="#26a69a" rx="1"/>
  </g>

  <!-- Volume surge label -->
  <path d="M400,368 C400,355 385,350 375,352" fill="none" stroke="#00e676" stroke-width="1" opacity="0.5"/>
  <text x="340" y="356" fill="#00e676" font-size="9" font-weight="500">Volume Surge</text>

  <!-- Average volume line -->
  <line x1="100" y1="400" x2="600" y2="400" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="605" y="403" fill="#666" font-size="8">Avg Vol</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">NR7 Bar</text>
    <circle cx="105" cy="20" r="4" fill="#00e676"/>
    <text x="115" y="24" fill="#999" font-size="9">Breakout Signal</text>
    <circle cx="225" cy="20" r="4" fill="#42a5f5"/>
    <text x="235" y="24" fill="#999" font-size="9">Entry Level</text>
    <circle cx="320" cy="20" r="4" fill="#ef5350"/>
    <text x="330" y="24" fill="#999" font-size="9">Stop Loss</text>
    <circle cx="405" cy="20" r="4" fill="#00e676"/>
    <text x="415" y="24" fill="#999" font-size="9">Take Profit</text>
    <rect x="500" y="12" width="20" height="16" fill="#00e676" opacity="0.5" rx="2"/>
    <text x="525" y="24" fill="#999" font-size="9">Volume Surge</text>
  </g>
</svg>