<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="150" x2="760" y2="150"/>
    <line x1="60" y1="200" x2="760" y2="200"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Momentum Composite</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price panel top 45% -->
  <!-- Candlesticks - volatile with trend -->
  <line x1="100" y1="165" x2="100" y2="210" stroke="#26a69a" stroke-width="1"/><rect x="96" y="172" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="130" y1="155" x2="130" y2="200" stroke="#26a69a" stroke-width="1"/><rect x="126" y="162" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="160" y1="148" x2="160" y2="195" stroke="#ef5350" stroke-width="1"/><rect x="156" y="152" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="190" y1="140" x2="190" y2="185" stroke="#26a69a" stroke-width="1"/><rect x="186" y="148" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="220" y1="130" x2="220" y2="175" stroke="#26a69a" stroke-width="1"/><rect x="216" y="138" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="250" y1="122" x2="250" y2="165" stroke="#26a69a" stroke-width="1"/><rect x="246" y="130" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="280" y1="115" x2="280" y2="155" stroke="#ef5350" stroke-width="1"/><rect x="276" y="118" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="310" y1="108" x2="310" y2="148" stroke="#26a69a" stroke-width="1"/><rect x="306" y="115" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="340" y1="100" x2="340" y2="140" stroke="#26a69a" stroke-width="1"/><rect x="336" y="108" width="8" height="18" fill="#26a69a" rx="1"/>
  <!-- Peak and reversal -->
  <line x1="370" y1="95" x2="370" y2="132" stroke="#26a69a" stroke-width="1"/><rect x="366" y="100" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="400" y1="92" x2="400" y2="128" stroke="#ef5350" stroke-width="1"/><rect x="396" y="95" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="430" y1="98" x2="430" y2="138" stroke="#ef5350" stroke-width="1"/><rect x="426" y="102" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="460" y1="110" x2="460" y2="155" stroke="#ef5350" stroke-width="1"/><rect x="456" y="115" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="490" y1="128" x2="490" y2="172" stroke="#26a69a" stroke-width="1"/><rect x="486" y="145" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="520" y1="140" x2="520" y2="185" stroke="#ef5350" stroke-width="1"/><rect x="516" y="145" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="550" y1="155" x2="550" y2="198" stroke="#ef5350" stroke-width="1"/><rect x="546" y="160" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="580" y1="165" x2="580" y2="205" stroke="#26a69a" stroke-width="1"/><rect x="576" y="178" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="610" y1="170" x2="610" y2="208" stroke="#ef5350" stroke-width="1"/><rect x="606" y="175" width="8" height="20" fill="#ef5350" rx="1"/>
  <!-- Bottom reversal -->
  <line x1="640" y1="175" x2="640" y2="212" stroke="#26a69a" stroke-width="1"/><rect x="636" y="188" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="670" y1="165" x2="670" y2="202" stroke="#26a69a" stroke-width="1"/><rect x="666" y="172" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="700" y1="155" x2="700" y2="195" stroke="#26a69a" stroke-width="1"/><rect x="696" y="162" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="730" y1="142" x2="730" y2="185" stroke="#26a69a" stroke-width="1"/><rect x="726" y="150" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Separator -->
  <line x1="60" y1="230" x2="760" y2="230" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Oscillator panel: 3 component lines + composite -->
  <!-- Overbought/Oversold zones -->
  <rect x="80" y="240" width="680" height="20" fill="#ef5350" fill-opacity="0.06"/>
  <rect x="80" y="370" width="680" height="20" fill="#26a69a" fill-opacity="0.06"/>
  <line x1="80" y1="260" x2="760" y2="260" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="765" y="263" fill="#ef5350" font-size="7" opacity="0.5">80</text>
  <line x1="80" y1="370" x2="760" y2="370" stroke="#26a69a" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="765" y="373" fill="#26a69a" font-size="7" opacity="0.5">20</text>
  <line x1="80" y1="315" x2="760" y2="315" stroke="#888" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.2"/>
  <text x="765" y="318" fill="#888" font-size="7" opacity="0.4">50</text>

  <!-- RSI component (thin, faded) -->
  <polyline points="100,340 130,328 160,335 190,318 220,305 250,295 280,300 310,288 340,275 370,265 400,270 430,285 460,300 490,310 520,325 550,340 580,350 610,355 640,348 670,335 700,322 730,308" fill="none" stroke="#42a5f5" stroke-width="1.2" opacity="0.4"/>

  <!-- CCI component (thin, faded) -->
  <polyline points="100,345 130,332 160,340 190,322 220,308 250,292 280,298 310,285 340,270 370,258 400,265 430,282 460,305 490,318 520,332 550,348 580,355 610,362 640,352 670,338 700,325 730,310" fill="none" stroke="#ff9800" stroke-width="1.2" opacity="0.4"/>

  <!-- Stochastic component (thin, faded) -->
  <polyline points="100,338 130,325 160,332 190,315 220,302 250,290 280,295 310,282 340,268 370,260 400,268 430,288 460,298 490,305 520,320 550,335 580,345 610,358 640,345 670,332 700,318 730,305" fill="none" stroke="#e040fb" stroke-width="1.2" opacity="0.4"/>

  <!-- COMPOSITE (bold, prominent) -->
  <polyline points="100,341 130,328 160,336 190,318 220,305 250,292 280,298 310,285 340,271 370,261 400,268 430,285 460,301 490,311 520,326 550,341 580,350 610,358 640,348 670,335 700,322 730,308" fill="none" stroke="#00e676" stroke-width="2.5" opacity="0.9"/>

  <!-- Overbought annotation -->
  <rect x="310" y="240" width="100" height="18" rx="4" fill="#ef5350" fill-opacity="0.12" stroke="#ef5350" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="360" y="253" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="500">Overbought</text>

  <!-- Oversold annotation -->
  <rect x="530" y="355" width="90" height="18" rx="4" fill="#26a69a" fill-opacity="0.12" stroke="#26a69a" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="575" y="368" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="500">Oversold</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="126" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="156" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="186" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="216" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="246" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="276" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="306" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="336" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="366" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="396" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="426" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="456" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="486" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="516" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="546" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="576" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="606" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="636" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="666" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="696" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="726" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#00e676"/>
    <text x="30" y="24" fill="#999" font-size="9">Composite Score</text>
    <circle cx="150" cy="20" r="4" fill="#42a5f5"/>
    <text x="160" y="24" fill="#999" font-size="9">RSI</text>
    <circle cx="210" cy="20" r="4" fill="#ff9800"/>
    <text x="220" y="24" fill="#999" font-size="9">CCI</text>
    <circle cx="270" cy="20" r="4" fill="#e040fb"/>
    <text x="280" y="24" fill="#999" font-size="9">Stochastic</text>
    <rect x="370" y="12" width="16" height="8" rx="2" fill="#ef5350" opacity="0.4"/>
    <text x="392" y="24" fill="#999" font-size="9">Overbought</text>
    <rect x="480" y="12" width="16" height="8" rx="2" fill="#26a69a" opacity="0.4"/>
    <text x="502" y="24" fill="#999" font-size="9">Oversold</text>
  </g>
</svg>