<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">ATR Trailing Stop Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Long-term MA line -->
  <polyline points="80,280 120,270 160,258 200,245 240,235 280,225 320,210 360,195 400,180 440,168 480,158 520,150 560,145 600,148 640,155 680,165 720,178" fill="none" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="725" y="182" fill="#42a5f5" font-size="9">200 MA</text>

  <!-- Price candles - uptrend -->
  <line x1="100" y1="240" x2="100" y2="275" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="248" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="130" y1="230" x2="130" y2="265" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="235" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="160" y1="218" x2="160" y2="255" stroke="#ef5350" stroke-width="1"/>
  <rect x="156" y="222" width="8" height="20" fill="#ef5350" rx="1"/>

  <!-- Entry signal -->
  <line x1="190" y1="205" x2="190" y2="245" stroke="#00e676" stroke-width="1.5"/>
  <rect x="184" y="210" width="12" height="28" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="190,202 200,202 195,190" fill="#00e676"/>
  </g>
  <rect x="202" y="185" width="100" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="252" y="198" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">ENTRY: Above MA</text>

  <!-- Continuation candles -->
  <line x1="220" y1="195" x2="220" y2="232" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="200" width="8" height="24" fill="#26a69a" rx="1"/>
  <line x1="250" y1="182" x2="250" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="188" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="280" y1="170" x2="280" y2="208" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="175" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="310" y1="158" x2="310" y2="195" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="162" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="340" y1="148" x2="340" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="152" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="370" y1="135" x2="370" y2="172" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="140" width="8" height="24" fill="#26a69a" rx="1"/>
  <line x1="400" y1="125" x2="400" y2="162" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="130" width="8" height="24" fill="#26a69a" rx="1"/>
  <line x1="430" y1="118" x2="430" y2="155" stroke="#ef5350" stroke-width="1"/>
  <rect x="426" y="122" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="460" y1="112" x2="460" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="115" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="490" y1="105" x2="490" y2="142" stroke="#26a69a" stroke-width="1"/>
  <rect x="486" y="110" width="8" height="24" fill="#26a69a" rx="1"/>
  <!-- Reversal -->
  <line x1="520" y1="110" x2="520" y2="148" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="115" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="550" y1="118" x2="550" y2="158" stroke="#ef5350" stroke-width="1"/>
  <rect x="546" y="125" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="580" y1="130" x2="580" y2="172" stroke="#ef5350" stroke-width="1"/>
  <rect x="576" y="138" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- Trailing stop line (staircase pattern) -->
  <polyline points="190,250 220,250 220,238 250,238 250,222 280,222 280,208 310,208 310,200 340,200 340,185 370,185 370,172 400,172 400,162 430,162 430,155 460,155 460,148 490,148 490,142 520,142 520,142 550,142 580,142" fill="none" stroke="#ff9800" stroke-width="2" opacity="0.8"/>
  <text x="588" y="138" fill="#ff9800" font-size="9" font-weight="500">ATR Trailing Stop</text>

  <!-- Stop hit X marker -->
  <line x1="575" y1="137" x2="585" y2="147" stroke="#ef5350" stroke-width="2.5"/>
  <line x1="585" y1="137" x2="575" y2="147" stroke="#ef5350" stroke-width="2.5"/>
  <rect x="590" y="150" width="95" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="637" y="163" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">STOPPED OUT</text>

  <!-- ATR distance annotation -->
  <line x1="350" y1="152" x2="350" y2="185" stroke="#ff9800" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
  <line x1="347" y1="152" x2="353" y2="152" stroke="#ff9800" stroke-width="1" opacity="0.5"/>
  <line x1="347" y1="185" x2="353" y2="185" stroke="#ff9800" stroke-width="1" opacity="0.5"/>
  <text x="358" y="172" fill="#ff9800" font-size="8">ATR x mult</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="126" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="156" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
  </g>
  <rect x="184" y="392" width="12" height="23" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="216" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="246" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="276" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="306" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="336" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="366" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="396" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="426" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="456" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="486" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="516" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="546" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="576" y="390" width="8" height="25" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">200 MA Filter</text>
    <circle cx="140" cy="20" r="4" fill="#ff9800"/>
    <text x="150" y="24" fill="#999" font-size="9">ATR Trailing Stop</text>
    <circle cx="280" cy="20" r="4" fill="#00e676"/>
    <text x="290" y="24" fill="#999" font-size="9">Entry Signal</text>
    <circle cx="390" cy="20" r="4" fill="#ef5350"/>
    <text x="400" y="24" fill="#999" font-size="9">Stop Hit</text>
    <circle cx="490" cy="20" r="4" fill="#26a69a"/>
    <text x="500" y="24" fill="#999" font-size="9">Bullish</text>
    <circle cx="570" cy="20" r="4" fill="#ef5350"/>
    <text x="580" y="24" fill="#999" font-size="9">Bearish</text>
  </g>
</svg>