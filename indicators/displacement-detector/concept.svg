<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Displacement Detector</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="70" x2="80" y2="400"/><line x1="200" y1="70" x2="200" y2="400"/>
    <line x1="320" y1="70" x2="320" y2="400"/><line x1="440" y1="70" x2="440" y2="400"/>
    <line x1="560" y1="70" x2="560" y2="400"/><line x1="680" y1="70" x2="680" y2="400"/>
  </g>

  <!-- Normal ranging candles -->
  <line x1="100" y1="240" x2="100" y2="280" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="250" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="130" y1="245" x2="130" y2="285" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="255" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="160" y1="238" x2="160" y2="278" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="248" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="190" y1="242" x2="190" y2="280" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="252" width="8" height="16" fill="#ef5350" rx="1"/>
  <line x1="220" y1="240" x2="220" y2="275" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="248" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- BULLISH DISPLACEMENT - consecutive large green candles -->
  <rect x="245" y="130" width="80" height="160" fill="#00e676" fill-opacity="0.08" rx="4"/>
  <line x1="260" y1="210" x2="260" y2="280" stroke="#00e676" stroke-width="1.5"/>
  <rect x="254" y="218" width="12" height="50" fill="#00e676" rx="1"/>
  <line x1="295" y1="145" x2="295" y2="225" stroke="#00e676" stroke-width="1.5"/>
  <rect x="289" y="155" width="12" height="55" fill="#00e676" rx="1"/>
  <polygon points="254,290 266,290 260,300" fill="#00e676"/>
  <rect x="315" y="148" width="55" height="18" rx="3" fill="rgba(0,230,118,0.15)" stroke="#00e676" stroke-width="0.5"/>
  <text x="342" y="160" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="9" font-weight="600">Disp</text>

  <!-- Post-displacement candles -->
  <line x1="340" y1="135" x2="340" y2="175" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="142" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="370" y1="130" x2="370" y2="168" stroke="#ef5350" stroke-width="1"/>
  <rect x="366" y="138" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="400" y1="125" x2="400" y2="160" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="132" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="430" y1="120" x2="430" y2="155" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="128" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="460" y1="128" x2="460" y2="160" stroke="#ef5350" stroke-width="1"/>
  <rect x="456" y="135" width="8" height="15" fill="#ef5350" rx="1"/>

  <!-- BEARISH DISPLACEMENT - consecutive large red candles -->
  <rect x="485" y="130" width="80" height="175" fill="#ff1744" fill-opacity="0.08" rx="4"/>
  <line x1="500" y1="135" x2="500" y2="225" stroke="#ff1744" stroke-width="1.5"/>
  <rect x="494" y="145" width="12" height="65" fill="#ef5350" rx="1"/>
  <line x1="535" y1="210" x2="535" y2="300" stroke="#ff1744" stroke-width="1.5"/>
  <rect x="529" y="220" width="12" height="65" fill="#ef5350" rx="1"/>
  <polygon points="529,130 541,130 535,120" fill="#ff1744"/>
  <rect x="555" y="215" width="55" height="18" rx="3" fill="rgba(255,23,68,0.15)" stroke="#ff1744" stroke-width="0.5"/>
  <text x="582" y="227" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="9" font-weight="600">Disp</text>

  <!-- Post-bearish-displacement -->
  <line x1="580" y1="285" x2="580" y2="325" stroke="#ef5350" stroke-width="1"/>
  <rect x="576" y="292" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="610" y1="295" x2="610" y2="335" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="302" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="640" y1="300" x2="640" y2="340" stroke="#ef5350" stroke-width="1"/>
  <rect x="636" y="308" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="670" y1="310" x2="670" y2="345" stroke="#26a69a" stroke-width="1"/>
  <rect x="666" y="318" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="700" y1="305" x2="700" y2="340" stroke="#26a69a" stroke-width="1"/>
  <rect x="696" y="312" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- Legend -->
  <g transform="translate(80, 440)">
    <rect width="640" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <rect x="15" y="12" width="20" height="16" fill="#00e676" fill-opacity="0.3" rx="2"/>
    <text x="40" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Bullish Displacement</text>
    <rect x="195" y="12" width="20" height="16" fill="#ff1744" fill-opacity="0.3" rx="2"/>
    <text x="220" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Bearish Displacement</text>
    <rect x="390" y="14" width="8" height="12" fill="#26a69a" rx="1"/>
    <text x="403" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Normal Candles</text>
    <polygon points="505,24 513,24 509,16" fill="#00e676"/>
    <text x="518" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Signal</text>
  </g>
</svg>
