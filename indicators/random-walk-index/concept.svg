<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Random Walk Index</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <rect x="60" y="70" width="700" height="170" fill="rgba(255,255,255,0.02)" rx="4"/>
  <line x1="100" y1="180" x2="100" y2="120" stroke="#666" stroke-width="1"/><rect x="96" y="130" width="8" height="35" fill="#4CAF50" rx="1"/>
  <line x1="160" y1="170" x2="160" y2="110" stroke="#666" stroke-width="1"/><rect x="156" y="120" width="8" height="35" fill="#4CAF50" rx="1"/>
  <line x1="220" y1="160" x2="220" y2="100" stroke="#666" stroke-width="1"/><rect x="216" y="110" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="280" y1="155" x2="280" y2="105" stroke="#666" stroke-width="1"/><rect x="276" y="115" width="8" height="25" fill="#4CAF50" rx="1"/>
  <line x1="340" y1="140" x2="340" y2="170" stroke="#666" stroke-width="1"/><rect x="336" y="145" width="8" height="20" fill="#ff5252" rx="1"/>
  <line x1="400" y1="145" x2="400" y2="175" stroke="#666" stroke-width="1"/><rect x="396" y="150" width="8" height="18" fill="#666" rx="1"/>
  <line x1="460" y1="150" x2="460" y2="170" stroke="#666" stroke-width="1"/><rect x="456" y="152" width="8" height="14" fill="#666" rx="1"/>
  <line x1="520" y1="148" x2="520" y2="172" stroke="#666" stroke-width="1"/><rect x="516" y="152" width="8" height="15" fill="#ff5252" rx="1"/>
  <line x1="580" y1="160" x2="580" y2="195" stroke="#666" stroke-width="1"/><rect x="576" y="165" width="8" height="25" fill="#ff5252" rx="1"/>
  <line x1="640" y1="170" x2="640" y2="210" stroke="#666" stroke-width="1"/><rect x="636" y="175" width="8" height="30" fill="#ff5252" rx="1"/>
  <line x1="700" y1="180" x2="700" y2="220" stroke="#666" stroke-width="1"/><rect x="696" y="185" width="8" height="28" fill="#ff5252" rx="1"/>

  <!-- Annotations -->
  <text x="190" y="95" fill="#4CAF50" font-family="Inter,sans-serif" font-size="10" opacity="0.8">Strong Uptrend</text>
  <text x="580" y="95" fill="#ff5252" font-family="Inter,sans-serif" font-size="10" opacity="0.8">Strong Downtrend</text>
  <text x="380" y="95" fill="#888" font-family="Inter,sans-serif" font-size="10" opacity="0.8">Random Walk</text>

  <!-- RWI subplot -->
  <rect x="60" y="260" width="700" height="190" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="280" fill="#888" font-family="Inter,sans-serif" font-size="10">3.0</text>
  <text x="70" y="330" fill="#888" font-family="Inter,sans-serif" font-size="10">2.0</text>
  <text x="70" y="380" fill="#888" font-family="Inter,sans-serif" font-size="10">1.0</text>
  <text x="70" y="430" fill="#888" font-family="Inter,sans-serif" font-size="10">0.0</text>

  <!-- Threshold line -->
  <line x1="95" y1="380" x2="755" y2="380" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- RWI High (green) -->
  <polyline points="100,350 160,320 220,290 280,300 340,400 400,410 460,420 520,415 580,370 640,330 700,300"
            fill="none" stroke="#4CAF50" stroke-width="2"/>
  <!-- RWI Low (red) -->
  <polyline points="100,420 160,425 220,430 280,425 340,410 400,405 460,400 520,390 580,340 640,310 700,290"
            fill="none" stroke="#ff5252" stroke-width="2"/>

  <!-- Legend -->
  <rect x="200" y="465" width="400" height="25" fill="rgba(255,255,255,0.03)" rx="4"/>
  <rect x="220" y="474" width="12" height="3" fill="#4CAF50"/>
  <text x="238" y="480" fill="#aaa" font-family="Inter,sans-serif" font-size="10">RWI High</text>
  <rect x="320" y="474" width="12" height="3" fill="#ff5252"/>
  <text x="338" y="480" fill="#aaa" font-family="Inter,sans-serif" font-size="10">RWI Low</text>
  <line x1="420" y1="476" x2="432" y2="476" stroke="#FFF" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="438" y="480" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Threshold</text>
</svg>
