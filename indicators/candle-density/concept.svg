    <circle cx="0" cy="-3" r="5" fill="#0d1137"/>
    <text x="10" y="0">Low</text>
    <circle cx="70" cy="-3" r="5" fill="#3d2680"/>
    <text x="80" y="0">Medium</text>
    <circle cx="165" cy="-3" r="5" fill="#c4621a"/>
    <text x="175" y="0">High</text>
    <circle cx="235" cy="-3" r="5" fill="#f0c030"/>
    <text x="245" y="0">Very High</text>
    <circle cx="350" cy="-3" r="5" fill="white" opacity="0.9"/>
