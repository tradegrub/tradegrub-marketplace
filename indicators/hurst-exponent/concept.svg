<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Hurst Exponent</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <rect x="60" y="70" width="700" height="150" fill="rgba(255,255,255,0.02)" rx="4"/>
  <!-- Trending section -->
  <rect x="80" y="70" width="200" height="150" fill="rgba(76,175,80,0.04)"/>
  <!-- Mean reverting section -->
  <rect x="450" y="70" width="200" height="150" fill="rgba(244,67,54,0.04)"/>
  <!-- Price -->
  <polyline points="100,190 140,175 180,155 220,130 260,115 300,120 340,125 380,130 420,125 460,130 500,125 540,130 580,128 620,132 660,126 700,130" fill="none" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="180" y="90" text-anchor="middle" fill="#66BB6A" font-family="Inter,sans-serif" font-size="9">Trending Phase</text>
  <text x="550" y="90" text-anchor="middle" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">Mean-Reverting Phase</text>

  <!-- Hurst subplot -->
  <rect x="60" y="250" width="700" height="180" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="270" fill="#888" font-family="Inter,sans-serif" font-size="10">Hurst Exponent (0-1)</text>

  <!-- Trending bg -->
  <rect x="80" y="250" width="200" height="180" fill="rgba(76,175,80,0.06)"/>
  <!-- Mean rev bg -->
  <rect x="450" y="250" width="200" height="180" fill="rgba(244,67,54,0.06)"/>

  <!-- H=0.5 (random walk) at y=340 -->
  <line x1="60" y1="340" x2="760" y2="340" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="5,5" opacity="0.4"/>
  <text x="762" y="344" fill="#fff" font-family="Inter,sans-serif" font-size="9">0.5</text>
  <!-- H=0.6 at y=310 -->
  <line x1="60" y1="310" x2="760" y2="310" stroke="#66BB6A" stroke-width="1" stroke-dasharray="5,5" opacity="0.4"/>
  <text x="762" y="314" fill="#66BB6A" font-family="Inter,sans-serif" font-size="9">0.6</text>
  <!-- H=0.4 at y=370 -->
  <line x1="60" y1="370" x2="760" y2="370" stroke="#EF5350" stroke-width="1" stroke-dasharray="5,5" opacity="0.4"/>
  <text x="762" y="374" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">0.4</text>

  <!-- Hurst line -->
  <polyline points="100,290 160,295 220,300 280,320 340,340 400,345 460,365 520,380 580,375 640,360 700,350" fill="none" stroke="#42A5F5" stroke-width="2"/>
  <!-- Smoothed -->
  <polyline points="100,295 160,298 220,305 280,325 340,338 400,342 460,360 520,375 580,372 640,362 700,352" fill="none" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <rect x="60" y="460" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="475" x2="100" y2="475" stroke="#42A5F5" stroke-width="2"/>
  <text x="105" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Hurst</text>
  <line x1="180" y1="475" x2="200" y2="475" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="205" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Smoothed</text>
  <rect x="310" y="470" width="10" height="10" fill="rgba(76,175,80,0.3)"/>
  <text x="325" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Trending</text>
  <rect x="430" y="470" width="10" height="10" fill="rgba(244,67,54,0.3)"/>
  <text x="445" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Mean-Reverting</text>
</svg>
