  <!-- Candlesticks overlaid -->
  <line x1="100" y1="268" x2="100" y2="298" stroke="#26a69a" stroke-width="1"/><rect x="96" y="275" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="140" y1="248" x2="140" y2="278" stroke="#26a69a" stroke-width="1"/><rect x="136" y="255" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="180" y1="225" x2="180" y2="258" stroke="#26a69a" stroke-width="1"/><rect x="176" y="232" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="220" y1="198" x2="220" y2="232" stroke="#26a69a" stroke-width="1"/><rect x="216" y="205" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="260" y1="172" x2="260" y2="208" stroke="#ef5350" stroke-width="1"/><rect x="256" y="178" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="300" y1="155" x2="300" y2="192" stroke="#26a69a" stroke-width="1"/><rect x="296" y="162" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="340" y1="145" x2="340" y2="180" stroke="#26a69a" stroke-width="1"/><rect x="336" y="150" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="380" y1="142" x2="380" y2="178" stroke="#ef5350" stroke-width="1"/><rect x="376" y="148" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="420" y1="155" x2="420" y2="190" stroke="#ef5350" stroke-width="1"/><rect x="416" y="160" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="460" y1="175" x2="460" y2="210" stroke="#ef5350" stroke-width="1"/><rect x="456" y="180" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="500" y1="200" x2="500" y2="235" stroke="#ef5350" stroke-width="1"/><rect x="496" y="205" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="540" y1="225" x2="540" y2="258" stroke="#26a69a" stroke-width="1"/><rect x="536" y="235" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="580" y1="235" x2="580" y2="265" stroke="#ef5350" stroke-width="1"/><rect x="576" y="240" width="8" height="15" fill="#ef5350" rx="1"/>
  <line x1="620" y1="225" x2="620" y2="255" stroke="#26a69a" stroke-width="1"/><rect x="616" y="230" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="660" y1="210" x2="660" y2="245" stroke="#26a69a" stroke-width="1"/><rect x="656" y="218" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="700" y1="192" x2="700" y2="228" stroke="#26a69a" stroke-width="1"/><rect x="696" y="198" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="740" y1="178" x2="740" y2="215" stroke="#26a69a" stroke-width="1"/><rect x="736" y="185" width="8" height="20" fill="#26a69a" rx="1"/>

  <!-- Annotations -->
  <!-- Fan-out annotation (expansion) -->
  <rect x="130" y="85" width="130" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="195" y="100" text-anchor="middle" fill="#bbb" font-size="10">Ribbon Expanding</text>
  <text x="195" y="115" text-anchor="middle" fill="#26a69a" font-size="9">Strong Uptrend</text>
  <path d="M 195,120 L 195,155" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Compression annotation -->
  <rect x="390" y="85" width="130" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="455" y="100" text-anchor="middle" fill="#bbb" font-size="10">Ribbon Compressing</text>
  <text x="455" y="115" text-anchor="middle" fill="#ff9800" font-size="9">Trend Weakening</text>
  <path d="M 455,120 L 455,155" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Inversion annotation -->
  <rect x="560" y="85" width="120" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="620" y="100" text-anchor="middle" fill="#bbb" font-size="10">Ribbon Inverted</text>
  <text x="620" y="115" text-anchor="middle" fill="#ef5350" font-size="9">Bearish Signal</text>
  <path d="M 620,120 L 620,230" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="136" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="176" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="216" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="256" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="296" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="336" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="376" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="416" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="456" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="496" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="536" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="576" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="616" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="656" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="696" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="736" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
