  <rect x="314" y="210" width="12" height="55" fill="#ff3333" filter="url(#glowStrong)"/>
  <!-- c11: red, med vol -->
  <line x1="348" y1="230" x2="348" y2="290" stroke="#ee4444" stroke-width="1" opacity="0.6"/>
  <rect x="343" y="245" width="10" height="30" fill="#ee4444" opacity="0.6"/>
  <!-- c12: green, low vol -->
  <line x1="376" y1="235" x2="376" y2="275" stroke="#00cc66" stroke-width="1" opacity="0.25"/>
  <rect x="371" y="242" width="10" height="20" fill="#00cc66" opacity="0.25"/>
  <!-- c13: green, med vol -->
