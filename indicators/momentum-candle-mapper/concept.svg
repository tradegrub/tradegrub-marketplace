<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glowGreen"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowRed"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowText"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="legendBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#16213e" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="60" x2="60" y2="430"/><line x1="160" y1="60" x2="160" y2="430"/>
    <line x1="260" y1="60" x2="260" y2="430"/><line x1="360" y1="60" x2="360" y2="430"/>
    <line x1="460" y1="60" x2="460" y2="430"/><line x1="560" y1="60" x2="560" y2="430"/>
    <line x1="660" y1="60" x2="660" y2="430"/><line x1="760" y1="60" x2="760" y2="430"/>
    <line x1="40" y1="100" x2="770" y2="100"/><line x1="40" y1="160" x2="770" y2="160"/>
    <line x1="40" y1="220" x2="770" y2="220"/><line x1="40" y1="280" x2="770" y2="280"/>
    <line x1="40" y1="340" x2="770" y2="340"/><line x1="40" y1="400" x2="770" y2="400"/>
  </g>

  <!-- Zero line -->
  <line x1="40" y1="245" x2="770" y2="245" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.2"/>
  <text x="30" y="249" fill="#666" font-size="9" text-anchor="end">0</text>

  <!-- Y-axis labels -->
  <text x="30" y="104" fill="#555" font-size="8" text-anchor="end">+80</text>
  <text x="30" y="164" fill="#555" font-size="8" text-anchor="end">+40</text>
  <text x="30" y="344" fill="#555" font-size="8" text-anchor="end">-40</text>
  <text x="30" y="404" fill="#555" font-size="8" text-anchor="end">-80</text>

  <!-- Title -->
  <text x="40" y="35" fill="#e0e0e0" font-size="17" font-weight="600">Momentum Candle Mapper</text>
  <text x="760" y="35" fill="#888" font-size="10" text-anchor="end">tradegrub.finance</text>

  <!-- Momentum candles centered on zero line (y=245). Each candle: wick line + body rect -->
  <!-- Positive = green above zero, Negative = red below zero -->
  <!-- Candle spacing: ~24px, starting x=60 -->

  <!-- C1: small positive --><line x1="68" y1="225" x2="68" y2="240" stroke="#26a69a" stroke-width="1"/><rect x="63" y="228" width="10" height="12" fill="#26a69a" rx="1"/>
  <!-- C2: medium positive --><line x1="92" y1="210" x2="92" y2="242" stroke="#26a69a" stroke-width="1"/><rect x="87" y="215" width="10" height="25" fill="#26a69a" rx="1"/>
  <!-- C3: strong positive --><line x1="116" y1="175" x2="116" y2="243" stroke="#26a69a" stroke-width="1"/><rect x="111" y="185" width="10" height="50" fill="#26a69a" rx="1" filter="url(#glowGreen)"/>
  <!-- C4: very strong positive --><line x1="140" y1="130" x2="140" y2="244" stroke="#26a69a" stroke-width="1"/><rect x="135" y="145" width="10" height="90" fill="#26a69a" rx="1" filter="url(#glowGreen)"/>
  <!-- C5: strong positive --><line x1="164" y1="155" x2="164" y2="243" stroke="#26a69a" stroke-width="1"/><rect x="159" y="165" width="10" height="65" fill="#26a69a" rx="1" filter="url(#glowGreen)"/>
  <!-- C6: medium positive --><line x1="188" y1="185" x2="188" y2="242" stroke="#26a69a" stroke-width="1"/><rect x="183" y="195" width="10" height="40" fill="#26a69a" rx="1"/>
  <!-- C7: small positive (fading) --><line x1="212" y1="215" x2="212" y2="241" stroke="#26a69a" stroke-width="1"/><rect x="207" y="220" width="10" height="18" fill="#26a69a" rx="1"/>
  <!-- C8: tiny positive --><line x1="236" y1="230" x2="236" y2="243" stroke="#26a69a" stroke-width="1"/><rect x="231" y="233" width="10" height="8" fill="#26a69a" rx="1"/>

  <!-- Reversal zone -->
  <!-- C9: tiny negative --><line x1="260" y1="247" x2="260" y2="262" stroke="#ef5350" stroke-width="1"/><rect x="255" y="248" width="10" height="10" fill="#ef5350" rx="1"/>
  <!-- C10: small negative --><line x1="284" y1="248" x2="284" y2="280" stroke="#ef5350" stroke-width="1"/><rect x="279" y="250" width="10" height="22" fill="#ef5350" rx="1"/>
  <!-- C11: medium negative --><line x1="308" y1="248" x2="308" y2="305" stroke="#ef5350" stroke-width="1"/><rect x="303" y="252" width="10" height="40" fill="#ef5350" rx="1"/>
  <!-- C12: strong negative --><line x1="332" y1="247" x2="332" y2="345" stroke="#ef5350" stroke-width="1"/><rect x="327" y="255" width="10" height="75" fill="#ef5350" rx="1" filter="url(#glowRed)"/>
  <!-- C13: very strong negative --><line x1="356" y1="248" x2="356" y2="380" stroke="#ef5350" stroke-width="1"/><rect x="351" y="258" width="10" height="105" fill="#ef5350" rx="1" filter="url(#glowRed)"/>
  <!-- C14: strong negative --><line x1="380" y1="248" x2="380" y2="360" stroke="#ef5350" stroke-width="1"/><rect x="375" y="255" width="10" height="85" fill="#ef5350" rx="1" filter="url(#glowRed)"/>
  <!-- C15: medium negative --><line x1="404" y1="248" x2="404" y2="320" stroke="#ef5350" stroke-width="1"/><rect x="399" y="252" width="10" height="50" fill="#ef5350" rx="1"/>
  <!-- C16: small negative (fading) --><line x1="428" y1="247" x2="428" y2="290" stroke="#ef5350" stroke-width="1"/><rect x="423" y="250" width="10" height="28" fill="#ef5350" rx="1"/>
  <!-- C17: tiny negative --><line x1="452" y1="247" x2="452" y2="268" stroke="#ef5350" stroke-width="1"/><rect x="447" y="249" width="10" height="12" fill="#ef5350" rx="1"/>

  <!-- Second bullish wave -->
  <!-- C18: tiny positive --><line x1="476" y1="232" x2="476" y2="243" stroke="#26a69a" stroke-width="1"/><rect x="471" y="235" width="10" height="7" fill="#26a69a" rx="1"/>
  <!-- C19: small positive --><line x1="500" y1="218" x2="500" y2="242" stroke="#26a69a" stroke-width="1"/><rect x="495" y="222" width="10" height="18" fill="#26a69a" rx="1"/>
  <!-- C20: medium positive --><line x1="524" y1="195" x2="524" y2="243" stroke="#26a69a" stroke-width="1"/><rect x="519" y="202" width="10" height="35" fill="#26a69a" rx="1"/>
  <!-- C21: strong positive --><line x1="548" y1="160" x2="548" y2="244" stroke="#26a69a" stroke-width="1"/><rect x="543" y="172" width="10" height="62" fill="#26a69a" rx="1" filter="url(#glowGreen)"/>
  <!-- C22: medium positive --><line x1="572" y1="180" x2="572" y2="243" stroke="#26a69a" stroke-width="1"/><rect x="567" y="190" width="10" height="42" fill="#26a69a" rx="1"/>
  <!-- C23: small positive --><line x1="596" y1="205" x2="596" y2="242" stroke="#26a69a" stroke-width="1"/><rect x="591" y="212" width="10" height="25" fill="#26a69a" rx="1"/>
  <!-- C24: fading --><line x1="620" y1="222" x2="620" y2="241" stroke="#26a69a" stroke-width="1"/><rect x="615" y="226" width="10" height="12" fill="#26a69a" rx="1"/>

  <!-- Third bearish dip -->
  <!-- C25: tiny neg --><line x1="644" y1="247" x2="644" y2="265" stroke="#ef5350" stroke-width="1"/><rect x="639" y="249" width="10" height="10" fill="#ef5350" rx="1"/>
  <!-- C26: small neg --><line x1="668" y1="248" x2="668" y2="285" stroke="#ef5350" stroke-width="1"/><rect x="663" y="251" width="10" height="24" fill="#ef5350" rx="1"/>
  <!-- C27: medium neg --><line x1="692" y1="248" x2="692" y2="310" stroke="#ef5350" stroke-width="1"/><rect x="687" y="253" width="10" height="42" fill="#ef5350" rx="1"/>
  <!-- C28: small neg fading --><line x1="716" y1="248" x2="716" y2="288" stroke="#ef5350" stroke-width="1"/><rect x="711" y="251" width="10" height="25" fill="#ef5350" rx="1"/>
  <!-- C29: tiny neg --><line x1="740" y1="247" x2="740" y2="264" stroke="#ef5350" stroke-width="1"/><rect x="735" y="249" width="10" height="9" fill="#ef5350" rx="1"/>

  <!-- Callouts -->
  <!-- Strong Momentum at C4 -->
  <line x1="140" y1="125" x2="140" y2="108" stroke="#26a69a" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.6"/>
  <rect x="95" y="88" width="110" height="18" rx="4" fill="#26a69a" fill-opacity="0.12" stroke="#26a69a" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="150" y="101" fill="#26a69a" font-size="10" text-anchor="middle" font-weight="500">Strong Momentum</text>

  <!-- Momentum Reversal at C9 -->
  <line x1="260" y1="265" x2="290" y2="290" stroke="#ffab40" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.6"/>
  <rect x="248" y="292" width="130" height="18" rx="4" fill="#ffab40" fill-opacity="0.12" stroke="#ffab40" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="313" y="305" fill="#ffab40" font-size="10" text-anchor="middle" font-weight="500">Momentum Reversal</text>

  <!-- Fading at C7/C8 -->
  <line x1="224" y1="220" x2="224" y2="205" stroke="#888" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.5"/>
  <rect x="195" y="188" width="58" height="16" rx="3" fill="#888" fill-opacity="0.1" stroke="#888" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="224" y="200" fill="#999" font-size="9" text-anchor="middle" font-weight="500">Fading</text>

  <!-- Legend bar -->
  <rect x="40" y="450" width="720" height="40" rx="6" fill="url(#legendBg)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <rect x="60" y="466" width="12" height="12" rx="2" fill="#26a69a" fill-opacity="0.5" stroke="#26a69a" stroke-width="1"/>
  <text x="78" y="476" fill="#aaa" font-size="10">Bullish Momentum</text>
  <rect x="200" y="466" width="12" height="12" rx="2" fill="#ef5350" fill-opacity="0.5" stroke="#ef5350" stroke-width="1"/>
  <text x="218" y="476" fill="#aaa" font-size="10">Bearish Momentum</text>
  <line x1="350" y1="472" x2="390" y2="472" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.2"/>
  <text x="398" y="476" fill="#aaa" font-size="10">Zero Line</text>
</svg>