<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="gapZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ef5350" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Gap Recovery Setup</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Prior day candles (stable/rising) -->
  <line x1="90" y1="148" x2="90" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="86" y="155" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="120" y1="142" x2="120" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="116" y="148" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="150" y1="135" x2="150" y2="172" stroke="#ef5350" stroke-width="1"/>
  <rect x="146" y="140" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="180" y1="128" x2="180" y2="162" stroke="#26a69a" stroke-width="1"/>
  <rect x="176" y="132" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="210" y1="122" x2="210" y2="158" stroke="#26a69a" stroke-width="1"/>
  <rect x="206" y="128" width="8" height="20" fill="#26a69a" rx="1"/>

  <!-- Moving average support -->
  <path d="M 80,165 Q 160,160 240,155 Q 320,152 400,155 Q 480,162 560,172 Q 640,180 720,185" fill="none" stroke="#ff9800" stroke-width="2" opacity="0.6"/>
  <text x="725" y="182" fill="#ff9800" font-size="9">MA Support</text>

  <!-- Prior close line -->
  <line x1="210" y1="135" x2="550" y2="135" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="555" y="139" fill="#42a5f5" font-size="9">Prior Close</text>

  <!-- Session divider -->
  <line x1="240" y1="70" x2="240" y2="380" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="2,4"/>
  <text x="230" y="388" fill="#666" font-size="7">Close</text>
  <text x="255" y="388" fill="#666" font-size="7">Open</text>

  <!-- Large gap-down zone -->
  <rect x="240" y="135" width="60" height="140" fill="url(#gapZone)" rx="3"/>
  <text x="270" y="210" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="500" transform="rotate(-90,270,210)">LARGE GAP DOWN</text>

  <!-- Gap-down open candle (big bearish) -->
  <line x1="280" y1="255" x2="280" y2="310" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="274" y="265" width="12" height="35" fill="#ef5350" rx="1"/>

  <!-- Sellers exhausted - doji / small candle near MA -->
  <line x1="320" y1="268" x2="320" y2="305" stroke="#ef5350" stroke-width="1"/>
  <rect x="316" y="278" width="8" height="8" fill="#ef5350" rx="1"/>

  <!-- RECOVERY candle (strong bullish near MA support) -->
  <line x1="370" y1="230" x2="370" y2="300" stroke="#00e676" stroke-width="2"/>
  <rect x="362" y="238" width="16" height="48" fill="#00e676" rx="2" filter="url(#glow)"/>

  <!-- Recovery arrow -->
  <g filter="url(#softGlow)">
    <polygon points="370,225 380,225 375,212" fill="#00e676"/>
  </g>
  <rect x="385" y="205" width="120" height="22" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="445" y="220" text-anchor="middle" fill="#00e676" font-size="11" font-weight="600">BUY (Recovery)</text>

  <!-- MA support bounce annotation -->
  <path d="M 365,290 C 355,295 345,292 340,285" fill="none" stroke="#ff9800" stroke-width="1" opacity="0.6"/>
  <rect x="310" y="298" width="90" height="16" rx="4" fill="#ff9800" fill-opacity="0.1" stroke="#ff9800" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="355" y="310" text-anchor="middle" fill="#ff9800" font-size="8" font-weight="500">Bounce off MA</text>

  <!-- Post recovery candles -->
  <line x1="420" y1="218" x2="420" y2="255" stroke="#26a69a" stroke-width="1"/>
  <rect x="416" y="225" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="460" y1="205" x2="460" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="210" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="500" y1="195" x2="500" y2="228" stroke="#ef5350" stroke-width="1"/>
  <rect x="496" y="200" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="540" y1="182" x2="540" y2="215" stroke="#26a69a" stroke-width="1"/>
  <rect x="536" y="188" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="580" y1="170" x2="580" y2="202" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="175" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="620" y1="158" x2="620" y2="190" stroke="#26a69a" stroke-width="1"/>
  <rect x="616" y="162" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="660" y1="148" x2="660" y2="180" stroke="#ef5350" stroke-width="1"/>
  <rect x="656" y="152" width="8" height="18" fill="#ef5350" rx="1"/>

  <!-- Entry line -->
  <line x1="370" y1="240" x2="700" y2="240" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="705" y="244" fill="#42a5f5" font-size="9">Entry</text>

  <!-- Stop loss -->
  <line x1="370" y1="310" x2="700" y2="310" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="705" y="314" fill="#ef5350" font-size="9">Stop Loss</text>

  <!-- Take profit -->
  <line x1="370" y1="135" x2="700" y2="135" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="705" y="139" fill="#00e676" font-size="9">Take Profit</text>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="86" y="400" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="116" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="146" y="400" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="176" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="206" y="400" width="8" height="12" fill="#26a69a" rx="1"/>
  </g>
  <!-- Gap down volume spike -->
  <rect x="274" y="375" width="12" height="37" fill="#ef5350" rx="1" opacity="0.6"/>
  <rect x="316" y="400" width="8" height="12" fill="#ef5350" rx="1" opacity="0.5"/>
  <!-- Recovery volume -->
  <rect x="362" y="378" width="16" height="34" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <text x="345" y="375" fill="#00e676" font-size="8">Vol Surge</text>
  <g opacity="0.4">
    <rect x="416" y="393" width="8" height="19" fill="#26a69a" rx="1"/>
    <rect x="456" y="395" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="496" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="536" y="400" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="576" y="402" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="616" y="400" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="656" y="402" width="8" height="10" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ef5350"/>
    <text x="30" y="24" fill="#999" font-size="9">Gap Down</text>
    <circle cx="120" cy="20" r="4" fill="#00e676"/>
    <text x="130" y="24" fill="#999" font-size="9">Recovery Signal</text>
    <circle cx="250" cy="20" r="4" fill="#ff9800"/>
    <text x="260" y="24" fill="#999" font-size="9">MA Support</text>
    <circle cx="360" cy="20" r="4" fill="#42a5f5"/>
    <text x="370" y="24" fill="#999" font-size="9">Entry / Prior Close</text>
    <rect x="510" y="14" width="20" height="12" fill="#00e676" opacity="0.4" rx="2"/>
    <text x="535" y="24" fill="#999" font-size="9">Recovery Volume</text>
  </g>
</svg>