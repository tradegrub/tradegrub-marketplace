<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Market Structure Shift Detector</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Bullish structure background -->
  <rect x="70" y="65" width="320" height="340" fill="#00e676" fill-opacity="0.03" rx="2"/>
  <text x="230" y="82" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="9" fill-opacity="0.5">Bullish Structure</text>

  <!-- Bearish structure background -->
  <rect x="450" y="65" width="300" height="340" fill="#ff1744" fill-opacity="0.03" rx="2"/>
  <text x="600" y="82" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="9" fill-opacity="0.5">Bearish Structure</text>

  <!-- Bullish uptrend: HH, HL pattern -->
  <line x1="100" y1="340" x2="100" y2="370" stroke="#26a69a" stroke-width="1"/>
  <rect x="97" y="345" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="130" y1="310" x2="130" y2="345" stroke="#26a69a" stroke-width="1"/>
  <rect x="127" y="316" width="6" height="20" fill="#26a69a" rx="1"/>
  <line x1="160" y1="280" x2="160" y2="315" stroke="#26a69a" stroke-width="1"/>
  <rect x="157" y="286" width="6" height="20" fill="#26a69a" rx="1"/>

  <!-- HL marker -->
  <circle cx="160" cy="320" r="3" fill="none" stroke="#00e676" stroke-width="1"/>
  <text x="160" y="335" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="7">HL</text>

  <line x1="190" y1="250" x2="190" y2="290" stroke="#26a69a" stroke-width="1"/>
  <rect x="187" y="256" width="6" height="22" fill="#26a69a" rx="1"/>

  <!-- HH marker -->
  <circle cx="190" cy="245" r="3" fill="none" stroke="#00e676" stroke-width="1"/>
  <text x="190" y="240" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="7">HH</text>

  <line x1="220" y1="270" x2="220" y2="300" stroke="#ef5350" stroke-width="1"/>
  <rect x="217" y="275" width="6" height="18" fill="#ef5350" rx="1"/>

  <!-- HL marker -->
  <circle cx="220" cy="305" r="3" fill="none" stroke="#00e676" stroke-width="1"/>
  <text x="220" y="320" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="7">HL</text>

  <line x1="250" y1="220" x2="250" y2="275" stroke="#26a69a" stroke-width="1"/>
  <rect x="247" y="228" width="6" height="30" fill="#26a69a" rx="1"/>

  <!-- HH marker -->
  <circle cx="250" cy="215" r="3" fill="none" stroke="#00e676" stroke-width="1"/>
  <text x="250" y="210" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="7">HH</text>

  <line x1="280" y1="230" x2="280" y2="265" stroke="#ef5350" stroke-width="1"/>
  <rect x="277" y="235" width="6" height="20" fill="#ef5350" rx="1"/>
  <line x1="310" y1="180" x2="310" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="307" y="188" width="6" height="32" fill="#26a69a" rx="1"/>
  <line x1="340" y1="150" x2="340" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="337" y="158" width="6" height="25" fill="#26a69a" rx="1"/>

  <!-- Peak -->
  <circle cx="340" cy="145" r="3" fill="none" stroke="#ff1744" stroke-width="1"/>
  <text x="340" y="138" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="7">HH</text>

  <!-- MSS POINT - break of structure -->
  <line x1="370" y1="155" x2="370" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="367" y="162" width="6" height="35" fill="#ef5350" rx="1"/>
  <line x1="400" y1="190" x2="400" y2="260" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="396" y="200" width="8" height="45" fill="#ef5350" rx="1"/>

  <!-- MSS break level line -->
  <line x1="280" y1="265" x2="450" y2="265" stroke="#ff1744" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- MSS label -->
  <rect x="405" y="220" width="70" height="22" rx="4" fill="rgba(255,23,68,0.2)" stroke="#ff1744" stroke-width="1" stroke-opacity="0.5"/>
  <text x="440" y="235" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="10" font-weight="600">MSS Bear</text>
  <polygon points="396,257 404,257 400,248" fill="#ff1744"/>

  <!-- Bearish continuation -->
  <line x1="430" y1="250" x2="430" y2="300" stroke="#ef5350" stroke-width="1"/>
  <rect x="427" y="258" width="6" height="28" fill="#ef5350" rx="1"/>

  <circle cx="430" cy="305" r="3" fill="none" stroke="#ff1744" stroke-width="1"/>
  <text x="430" y="318" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="7">LL</text>

  <line x1="460" y1="270" x2="460" y2="310" stroke="#26a69a" stroke-width="1"/>
  <rect x="457" y="278" width="6" height="20" fill="#26a69a" rx="1"/>

  <circle cx="460" cy="265" r="3" fill="none" stroke="#ff1744" stroke-width="1"/>
  <text x="460" y="258" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="7">LH</text>

  <line x1="490" y1="290" x2="490" y2="340" stroke="#ef5350" stroke-width="1"/>
  <rect x="487" y="298" width="6" height="28" fill="#ef5350" rx="1"/>

  <circle cx="490" cy="345" r="3" fill="none" stroke="#ff1744" stroke-width="1"/>
  <text x="490" y="358" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="7">LL</text>

  <line x1="520" y1="315" x2="520" y2="350" stroke="#26a69a" stroke-width="1"/>
  <rect x="517" y="322" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="550" y1="330" x2="550" y2="370" stroke="#ef5350" stroke-width="1"/>
  <rect x="547" y="338" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="580" y1="345" x2="580" y2="385" stroke="#ef5350" stroke-width="1"/>
  <rect x="577" y="352" width="6" height="22" fill="#ef5350" rx="1"/>

  <!-- Legend -->
  <g transform="translate(80, 440)">
    <rect width="640" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <rect x="15" y="12" width="16" height="16" fill="#00e676" fill-opacity="0.15" rx="2"/>
    <text x="36" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Bullish Structure</text>
    <rect x="155" y="12" width="16" height="16" fill="#ff1744" fill-opacity="0.15" rx="2"/>
    <text x="176" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Bearish Structure</text>
    <line x1="310" y1="20" x2="330" y2="20" stroke="#ff1744" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="335" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Break Level</text>
    <circle cx="430" cy="20" r="3" fill="none" stroke="#00e676" stroke-width="1.5"/>
    <text x="438" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">HH/HL</text>
    <circle cx="500" cy="20" r="3" fill="none" stroke="#ff1744" stroke-width="1.5"/>
    <text x="508" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">LH/LL</text>
  </g>
</svg>
