<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="channelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Price Channel Breakout Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Entry channel (20-bar) - stepped line following highs/lows -->
  <path d="M 80,160 L 200,160 L 200,150 L 350,150 L 350,140 L 500,140 L 500,125 L 580,125" fill="none" stroke="#26a69a" stroke-width="1.5" opacity="0.8"/>
  <text x="585" y="122" fill="#26a69a" font-size="9" font-weight="500">Entry High (20)</text>

  <path d="M 80,320 L 180,320 L 180,310 L 300,310 L 300,300 L 450,300 L 450,290 L 580,290" fill="none" stroke="#ef5350" stroke-width="1.5" opacity="0.8"/>
  <text x="585" y="293" fill="#ef5350" font-size="9" font-weight="500">Entry Low (20)</text>

  <!-- Channel fill -->
  <rect x="80" y="160" width="500" height="150" fill="url(#channelFill)" rx="2"/>

  <!-- Exit channel (10-bar) - tighter -->
  <path d="M 200,290 L 300,285 L 400,278 L 500,270 L 580,265" fill="none" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="585" y="268" fill="#ff9800" font-size="9">Exit Low (10)</text>

  <!-- Midline -->
  <line x1="80" y1="240" x2="580" y2="207" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="585" y="210" fill="#666" font-size="8">Midline</text>

  <!-- Uptrending candles -->
  <line x1="100" y1="240" x2="100" y2="300" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="260" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="130" y1="230" x2="130" y2="290" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="240" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="160" y1="220" x2="160" y2="285" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="245" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="190" y1="210" x2="190" y2="278" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="230" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="220" y1="200" x2="220" y2="268" stroke="#ef5350" stroke-width="1"/>
  <rect x="216" y="210" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="250" y1="195" x2="250" y2="260" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="220" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="280" y1="185" x2="280" y2="250" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="205" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="310" y1="178" x2="310" y2="245" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="195" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="340" y1="170" x2="340" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="180" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="370" y1="162" x2="370" y2="225" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="185" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="400" y1="155" x2="400" y2="215" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="170" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="430" y1="148" x2="430" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="160" width="8" height="28" fill="#26a69a" rx="1"/>

  <!-- Breakout candle above entry channel -->
  <line x1="470" y1="108" x2="470" y2="158" stroke="#00e676" stroke-width="1.5"/>
  <rect x="464" y="112" width="12" height="35" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- BUY arrow -->
  <g filter="url(#softGlow)">
    <polygon points="475,102 485,102 480,89" fill="#00e676"/>
  </g>
  <rect x="490" y="85" width="50" height="22" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="515" y="100" text-anchor="middle" fill="#00e676" font-size="11" font-weight="600">BUY</text>

  <!-- Continuation then pullback to exit -->
  <line x1="505" y1="100" x2="505" y2="145" stroke="#26a69a" stroke-width="1"/>
  <rect x="501" y="105" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="535" y1="95" x2="535" y2="135" stroke="#26a69a" stroke-width="1"/>
  <rect x="531" y="100" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="565" y1="105" x2="565" y2="145" stroke="#ef5350" stroke-width="1"/>
  <rect x="561" y="110" width="8" height="20" fill="#ef5350" rx="1"/>

  <!-- Dual channel annotation -->
  <rect x="100" y="85" width="180" height="35" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="190" y="100" text-anchor="middle" fill="#bbb" font-size="10">Entry Channel: 20-bar</text>
  <text x="190" y="113" text-anchor="middle" fill="#bbb" font-size="10">Exit Channel: 10-bar (tighter)</text>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="96" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="126" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="156" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="186" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="216" y="404" width="8" height="11" fill="#ef5350" rx="1"/>
    <rect x="246" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="276" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="306" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="336" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="366" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="396" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="426" y="396" width="8" height="19" fill="#26a69a" rx="1"/>
  </g>
  <rect x="464" y="378" width="12" height="37" fill="#00e676" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="501" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="531" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="561" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Entry Channel High</text>
    <circle cx="150" cy="20" r="4" fill="#ef5350"/>
    <text x="160" y="24" fill="#999" font-size="9">Entry Channel Low</text>
    <circle cx="280" cy="20" r="4" fill="#ff9800"/>
    <text x="290" y="24" fill="#999" font-size="9">Exit Channel</text>
    <circle cx="390" cy="20" r="4" fill="#00e676"/>
    <text x="400" y="24" fill="#999" font-size="9">Breakout Signal</text>
    <rect x="510" y="12" width="20" height="16" fill="#42a5f5" opacity="0.3" rx="2"/>
    <text x="535" y="24" fill="#999" font-size="9">Channel Zone</text>
  </g>
</svg>