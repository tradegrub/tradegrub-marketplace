<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="cyanglow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4fc3f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="80" x2="60" y2="420"/><line x1="160" y1="80" x2="160" y2="420"/>
    <line x1="260" y1="80" x2="260" y2="420"/><line x1="360" y1="80" x2="360" y2="420"/>
    <line x1="460" y1="80" x2="460" y2="420"/><line x1="560" y1="80" x2="560" y2="420"/>
    <line x1="60" y1="120" x2="590" y2="120"/><line x1="60" y1="180" x2="590" y2="180"/>
    <line x1="60" y1="240" x2="590" y2="240"/><line x1="60" y1="300" x2="590" y2="300"/>
    <line x1="60" y1="360" x2="590" y2="360"/>
  </g>

  <!-- Y-axis labels -->
  <g fill="#556688" font-size="9" text-anchor="end">
    <text x="55" y="123">185</text><text x="55" y="183">175</text>
    <text x="55" y="243">165</text><text x="55" y="303">155</text>
    <text x="55" y="363">145</text><text x="55" y="423">135</text>
  </g>

  <!-- Title -->
  <text x="330" y="32" text-anchor="middle" fill="#e8e8f0" font-size="17" font-weight="600">Logarithmic Moving Average</text>
  <text x="330" y="48" text-anchor="middle" fill="#667799" font-size="11">tradegrub.finance</text>

  <!-- Price candles -->
  <g>
    <!-- Wicks -->
    <line x1="80" y1="310" x2="80" y2="370" stroke="#555" stroke-width="1"/>
    <line x1="100" y1="340" x2="100" y2="390" stroke="#555" stroke-width="1"/>
    <line x1="120" y1="300" x2="120" y2="365" stroke="#555" stroke-width="1"/>
    <line x1="140" y1="280" x2="140" y2="350" stroke="#555" stroke-width="1"/>
    <line x1="160" y1="260" x2="160" y2="330" stroke="#555" stroke-width="1"/>
    <line x1="180" y1="250" x2="180" y2="315" stroke="#555" stroke-width="1"/>
