<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Trailing Stop Optimizer</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Candlesticks trending up then reversing -->
  <g stroke-width="1.5">
    <line x1="90" y1="320" x2="90" y2="370" stroke="#666"/><rect x="84" y="330" width="12" height="25" fill="#4CAF50" rx="1"/>
    <line x1="120" y1="300" x2="120" y2="350" stroke="#666"/><rect x="114" y="310" width="12" height="25" fill="#4CAF50" rx="1"/>
    <line x1="150" y1="280" x2="150" y2="330" stroke="#666"/><rect x="144" y="290" width="12" height="25" fill="#4CAF50" rx="1"/>
    <line x1="180" y1="260" x2="180" y2="310" stroke="#666"/><rect x="174" y="270" width="12" height="25" fill="#4CAF50" rx="1"/>
    <line x1="210" y1="240" x2="210" y2="290" stroke="#666"/><rect x="204" y="250" width="12" height="25" fill="#4CAF50" rx="1"/>
    <line x1="240" y1="220" x2="240" y2="270" stroke="#666"/><rect x="234" y="230" width="12" height="25" fill="#4CAF50" rx="1"/>
    <line x1="270" y1="200" x2="270" y2="250" stroke="#666"/><rect x="264" y="210" width="12" height="25" fill="#4CAF50" rx="1"/>
    <line x1="300" y1="180" x2="300" y2="230" stroke="#666"/><rect x="294" y="190" width="12" height="25" fill="#4CAF50" rx="1"/>
    <line x1="330" y1="165" x2="330" y2="215" stroke="#666"/><rect x="324" y="175" width="12" height="25" fill="#4CAF50" rx="1"/>
    <line x1="360" y1="155" x2="360" y2="200" stroke="#666"/><rect x="354" y="160" width="12" height="25" fill="#4CAF50" rx="1"/>
    <line x1="390" y1="145" x2="390" y2="195" stroke="#666"/><rect x="384" y="155" width="12" height="25" fill="#ff5252" rx="1"/>
    <line x1="420" y1="150" x2="420" y2="200" stroke="#666"/><rect x="414" y="160" width="12" height="25" fill="#ff5252" rx="1"/>
    <line x1="450" y1="160" x2="450" y2="210" stroke="#666"/><rect x="444" y="170" width="12" height="30" fill="#ff5252" rx="1"/>
    <line x1="480" y1="175" x2="480" y2="230" stroke="#666"/><rect x="474" y="190" width="12" height="30" fill="#ff5252" rx="1"/>
    <line x1="510" y1="190" x2="510" y2="250" stroke="#666"/><rect x="504" y="205" width="12" height="30" fill="#ff5252" rx="1"/>
    <line x1="540" y1="210" x2="540" y2="270" stroke="#666"/><rect x="534" y="220" width="12" height="35" fill="#ff5252" rx="1"/>
    <line x1="570" y1="230" x2="570" y2="290" stroke="#666"/><rect x="564" y="240" width="12" height="35" fill="#4CAF50" rx="1"/>
    <line x1="600" y1="220" x2="600" y2="280" stroke="#666"/><rect x="594" y="230" width="12" height="30" fill="#4CAF50" rx="1"/>
    <line x1="630" y1="210" x2="630" y2="270" stroke="#666"/><rect x="624" y="220" width="12" height="30" fill="#4CAF50" rx="1"/>
    <line x1="660" y1="200" x2="660" y2="260" stroke="#666"/><rect x="654" y="210" width="12" height="30" fill="#4CAF50" rx="1"/>
    <line x1="690" y1="190" x2="690" y2="250" stroke="#666"/><rect x="684" y="200" width="12" height="30" fill="#4CAF50" rx="1"/>
  </g>

  <!-- ATR Trail (blue) -->
  <polyline points="150,340 180,320 210,300 240,280 270,260 300,240 330,225 360,215 390,210 420,210 450,210 480,210 510,210 540,210 570,280 600,275 630,265 660,255 690,245" fill="none" stroke="#42a5f5" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Percent Trail (orange) -->
  <polyline points="150,330 180,310 210,290 240,270 270,250 300,230 330,215 360,200 390,195 420,195 450,195 480,195 510,195 540,195 570,270 600,265 630,255 660,245 690,240" fill="none" stroke="#ffa726" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Chandelier (purple) -->
  <polyline points="150,350 180,330 210,310 240,290 270,270 300,250 330,235 360,220 390,215 420,215 450,215 480,215 510,215 540,215 570,290 600,280 630,270 660,260 690,250" fill="none" stroke="#ab47bc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Best Stop (green solid) -->
  <polyline points="150,330 180,310 210,290 240,270 270,250 300,230 330,215 360,200 390,195 420,195 450,195 480,195 510,195 540,195 570,270 600,265 630,255 660,245 690,240" fill="none" stroke="#00e676" stroke-width="2.5"/>

  <!-- Stop hit markers -->
  <polygon points="480,170 474,160 486,160" fill="#ff5252"/>
  <polygon points="510,185 504,175 516,175" fill="#ff5252"/>

  <!-- Legend -->
  <g transform="translate(70, 440)">
    <rect x="0" y="0" width="660" height="40" fill="rgba(255,255,255,0.03)" rx="6"/>
    <line x1="20" y1="20" x2="45" y2="20" stroke="#42a5f5" stroke-width="1"/>
    <text x="50" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">ATR Trail</text>
    <line x1="130" y1="20" x2="155" y2="20" stroke="#ffa726" stroke-width="1"/>
    <text x="160" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Percent Trail</text>
    <line x1="260" y1="20" x2="285" y2="20" stroke="#ab47bc" stroke-width="1"/>
    <text x="290" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Chandelier</text>
    <line x1="380" y1="20" x2="405" y2="20" stroke="#00e676" stroke-width="2.5"/>
    <text x="410" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Best Stop</text>
    <polygon points="510,20 504,12 516,12" fill="#ff5252"/>
    <text x="522" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Stop Hit</text>
  </g>
</svg>