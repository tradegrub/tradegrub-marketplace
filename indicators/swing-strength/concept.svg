<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Swing Strength Index</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price chart in top 60% -->
  <!-- Upswing to swing high 1 (strong) -->
  <line x1="100" y1="260" x2="100" y2="310" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="270" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="130" y1="225" x2="130" y2="280" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="235" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="160" y1="185" x2="160" y2="245" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="195" width="8" height="35" fill="#26a69a" rx="1"/>
  <!-- Swing High 1 - STRONG score -->
  <line x1="190" y1="120" x2="190" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="130" width="8" height="48" fill="#26a69a" rx="1"/>

  <!-- Strong swing high marker -->
  <g filter="url(#glow)">
    <polygon points="186,115 194,115 190,105" fill="#00e676"/>
  </g>
  <rect x="200" y="96" width="72" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="236" y="110" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">Score: 1.4</text>

  <!-- Pullback -->
  <line x1="220" y1="150" x2="220" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="216" y="158" width="8" height="40" fill="#ef5350" rx="1"/>
  <line x1="250" y1="180" x2="250" y2="250" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="190" width="8" height="42" fill="#ef5350" rx="1"/>

  <!-- Swing Low 1 -->
  <line x1="280" y1="225" x2="280" y2="305" stroke="#ef5350" stroke-width="1"/>
  <rect x="276" y="238" width="8" height="48" fill="#ef5350" rx="1"/>

  <g filter="url(#glow)">
    <polygon points="276,310 284,310 280,320" fill="#42a5f5"/>
  </g>
  <rect x="290" y="305" width="72" height="20" rx="4" fill="#42a5f5" fill-opacity="0.15" stroke="#42a5f5" stroke-width="1" stroke-opacity="0.4"/>
  <text x="326" y="319" text-anchor="middle" fill="#42a5f5" font-size="10" font-weight="600">Score: 1.2</text>

  <!-- Up again -->
  <line x1="310" y1="210" x2="310" y2="275" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="222" width="8" height="35" fill="#26a69a" rx="1"/>
  <line x1="340" y1="185" x2="340" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="195" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="370" y1="165" x2="370" y2="215" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="172" width="8" height="28" fill="#26a69a" rx="1"/>

  <!-- Swing High 2 - WEAK score (smaller move, less volume) -->
  <line x1="400" y1="148" x2="400" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="155" width="8" height="25" fill="#26a69a" rx="1"/>

  <!-- Weak marker (dimmer) -->
  <polygon points="396,143 404,143 400,135" fill="#888" opacity="0.5"/>
  <text x="420" y="142" fill="#888" font-size="9">Score: 0.4</text>

  <!-- Pullback -->
  <line x1="430" y1="165" x2="430" y2="220" stroke="#ef5350" stroke-width="1"/>
  <rect x="426" y="172" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="460" y1="190" x2="460" y2="250" stroke="#ef5350" stroke-width="1"/>
  <rect x="456" y="200" width="8" height="35" fill="#ef5350" rx="1"/>

  <!-- Swing Low 2 -->
  <line x1="490" y1="215" x2="490" y2="280" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="225" width="8" height="38" fill="#ef5350" rx="1"/>
  <polygon points="486,285 494,285 490,295" fill="#42a5f5" opacity="0.5"/>
  <text x="505" y="293" fill="#888" font-size="9">Score: 0.8</text>

  <!-- Final rally -->
  <line x1="520" y1="195" x2="520" y2="250" stroke="#26a69a" stroke-width="1"/>
  <rect x="516" y="205" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="550" y1="170" x2="550" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="178" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="580" y1="140" x2="580" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="148" width="8" height="32" fill="#26a69a" rx="1"/>

  <!-- Swing High 3 - STRONG with background highlight -->
  <line x1="610" y1="92" x2="610" y2="160" stroke="#26a69a" stroke-width="1.5"/>
  <rect x="604" y="98" width="12" height="48" fill="#26a69a" rx="1" filter="url(#softGlow)"/>

  <!-- Strong highlight background -->
  <rect x="598" y="85" width="30" height="80" fill="#00e676" fill-opacity="0.06" rx="4"/>

  <g filter="url(#glow)">
    <polygon points="606,85 614,85 610,75" fill="#00e676"/>
  </g>
  <rect x="622" y="70" width="72" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="658" y="84" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">Score: 1.8</text>

  <!-- Trailing candles -->
  <line x1="645" y1="105" x2="645" y2="150" stroke="#ef5350" stroke-width="1"/>
  <rect x="641" y="112" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="675" y1="115" x2="675" y2="155" stroke="#26a69a" stroke-width="1"/>
  <rect x="671" y="125" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="705" y1="108" x2="705" y2="145" stroke="#26a69a" stroke-width="1"/>
  <rect x="701" y="115" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- Scoring formula annotation -->
  <rect x="80" y="360" width="280" height="50" rx="6" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>
  <text x="95" y="378" fill="#bbb" font-size="9" font-weight="500">Strength = (PriceDisp x 0.4)</text>
  <text x="95" y="393" fill="#bbb" font-size="9">+ (VolIntensity x 0.4) + (TimeFactor x 0.2)</text>

  <!-- Threshold line annotation -->
  <line x1="400" y1="380" x2="740" y2="380" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="745" y="384" fill="#ff9800" font-size="8">Threshold: 0.6</text>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="96" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="126" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="156" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
  </g>
  <rect x="184" y="385" width="12" height="30" fill="#26a69a" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="216" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="246" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="276" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="306" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="336" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="366" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="396" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="426" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="456" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="486" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="516" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="546" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="576" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
  </g>
  <rect x="604" y="382" width="12" height="33" fill="#26a69a" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="641" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="671" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="701" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#00e676"/>
    <text x="30" y="24" fill="#999" font-size="9">Strong Swing High</text>
    <circle cx="150" cy="20" r="4" fill="#42a5f5"/>
    <text x="160" y="24" fill="#999" font-size="9">Swing Low</text>
    <circle cx="250" cy="20" r="4" fill="#888"/>
    <text x="260" y="24" fill="#999" font-size="9">Weak Swing</text>
    <circle cx="355" cy="20" r="4" fill="#ff9800"/>
    <text x="365" y="24" fill="#999" font-size="9">Threshold</text>
    <rect x="450" y="12" width="20" height="16" fill="#00e676" opacity="0.3" rx="2"/>
    <text x="475" y="24" fill="#999" font-size="9">Highlight Zone</text>
  </g>
</svg>