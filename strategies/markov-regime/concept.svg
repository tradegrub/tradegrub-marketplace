<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bullZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,230,118,0.12)"/>
      <stop offset="100%" stop-color="rgba(0,230,118,0.03)"/>
    </linearGradient>
    <linearGradient id="bearZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,23,68,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,23,68,0.03)"/>
    </linearGradient>
    <linearGradient id="neutralZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(66,165,245,0.10)"/>
      <stop offset="100%" stop-color="rgba(66,165,245,0.02)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="0.5">
    <line x1="80" y1="60" x2="80" y2="340"/>
    <line x1="200" y1="60" x2="200" y2="340"/>
    <line x1="320" y1="60" x2="320" y2="340"/>
    <line x1="440" y1="60" x2="440" y2="340"/>
    <line x1="560" y1="60" x2="560" y2="340"/>
    <line x1="680" y1="60" x2="680" y2="340"/>
    <line x1="60" y1="100" x2="700" y2="100"/>
    <line x1="60" y1="160" x2="700" y2="160"/>
    <line x1="60" y1="220" x2="700" y2="220"/>
    <line x1="60" y1="280" x2="700" y2="280"/>
    <line x1="60" y1="340" x2="700" y2="340"/>
  </g>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#e0e0e0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">SciPy Markov Regime</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="11">tradegrub.finance -- Markov Chain Regime Trading</text>

  <!-- Regime background zones -->
  <!-- Neutral zone -->
  <rect x="60" y="60" width="120" height="280" fill="url(#neutralZone)" rx="2"/>
  <!-- Bull zone -->
  <rect x="180" y="60" width="180" height="280" fill="url(#bullZone)" rx="2"/>
  <!-- Bear zone -->
  <rect x="360" y="60" width="140" height="280" fill="url(#bearZone)" rx="2"/>
  <!-- Neutral zone -->
  <rect x="500" y="60" width="80" height="280" fill="url(#neutralZone)" rx="2"/>
  <!-- Bull zone -->
  <rect x="580" y="60" width="120" height="280" fill="url(#bullZone)" rx="2"/>

  <!-- Zone labels -->
  <text x="120" y="78" text-anchor="middle" fill="rgba(66,165,245,0.5)" font-family="Arial, sans-serif" font-size="9">NEUTRAL</text>
  <text x="270" y="78" text-anchor="middle" fill="rgba(0,230,118,0.5)" font-family="Arial, sans-serif" font-size="9">BULL REGIME</text>
  <text x="430" y="78" text-anchor="middle" fill="rgba(255,23,68,0.5)" font-family="Arial, sans-serif" font-size="9">BEAR REGIME</text>
  <text x="540" y="78" text-anchor="middle" fill="rgba(66,165,245,0.5)" font-family="Arial, sans-serif" font-size="9">NEUTRAL</text>
  <text x="640" y="78" text-anchor="middle" fill="rgba(0,230,118,0.5)" font-family="Arial, sans-serif" font-size="9">BULL</text>

  <!-- Candlesticks -->
  <g>
    <!-- Neutral phase - sideways -->
    <line x1="80" y1="195" x2="80" y2="225" stroke="#888" stroke-width="1"/>
    <rect x="76" y="200" width="8" height="15" fill="#ef5350" rx="1"/>
    <line x1="100" y1="190" x2="100" y2="220" stroke="#888" stroke-width="1"/>
    <rect x="96" y="195" width="8" height="18" fill="#00e676" rx="1"/>
    <line x1="120" y1="198" x2="120" y2="228" stroke="#888" stroke-width="1"/>
    <rect x="116" y="202" width="8" height="16" fill="#ef5350" rx="1"/>
    <line x1="140" y1="192" x2="140" y2="222" stroke="#888" stroke-width="1"/>
    <rect x="136" y="196" width="8" height="18" fill="#00e676" rx="1"/>
    <line x1="160" y1="188" x2="160" y2="218" stroke="#888" stroke-width="1"/>
    <rect x="156" y="192" width="8" height="16" fill="#00e676" rx="1"/>

    <!-- Bull phase - trending up -->
    <line x1="190" y1="180" x2="190" y2="210" stroke="#888" stroke-width="1"/>
    <rect x="186" y="182" width="8" height="20" fill="#00e676" rx="1"/>
    <line x1="210" y1="168" x2="210" y2="198" stroke="#888" stroke-width="1"/>
    <rect x="206" y="170" width="8" height="18" fill="#00e676" rx="1"/>
    <line x1="230" y1="158" x2="230" y2="188" stroke="#888" stroke-width="1"/>
    <rect x="226" y="160" width="8" height="20" fill="#00e676" rx="1"/>
    <line x1="250" y1="150" x2="250" y2="178" stroke="#888" stroke-width="1"/>
    <rect x="246" y="152" width="8" height="16" fill="#00e676" rx="1"/>
    <line x1="270" y1="138" x2="270" y2="168" stroke="#888" stroke-width="1"/>
    <rect x="266" y="140" width="8" height="18" fill="#00e676" rx="1"/>
    <line x1="290" y1="125" x2="290" y2="155" stroke="#888" stroke-width="1"/>
    <rect x="286" y="128" width="8" height="18" fill="#00e676" rx="1"/>
    <line x1="310" y1="115" x2="310" y2="145" stroke="#888" stroke-width="1"/>
    <rect x="306" y="118" width="8" height="17" fill="#00e676" rx="1"/>
    <line x1="330" y1="108" x2="330" y2="138" stroke="#888" stroke-width="1"/>
    <rect x="326" y="110" width="8" height="18" fill="#00e676" rx="1"/>
    <line x1="350" y1="105" x2="350" y2="130" stroke="#888" stroke-width="1"/>
    <rect x="346" y="108" width="8" height="14" fill="#ef5350" rx="1"/>

    <!-- Bear phase - trending down -->
    <line x1="370" y1="112" x2="370" y2="140" stroke="#888" stroke-width="1"/>
    <rect x="366" y="118" width="8" height="18" fill="#ef5350" rx="1"/>
    <line x1="390" y1="128" x2="390" y2="158" stroke="#888" stroke-width="1"/>
    <rect x="386" y="132" width="8" height="20" fill="#ef5350" rx="1"/>
    <line x1="410" y1="145" x2="410" y2="175" stroke="#888" stroke-width="1"/>
    <rect x="406" y="148" width="8" height="18" fill="#ef5350" rx="1"/>
    <line x1="430" y1="160" x2="430" y2="190" stroke="#888" stroke-width="1"/>
    <rect x="426" y="164" width="8" height="20" fill="#ef5350" rx="1"/>
    <line x1="450" y1="178" x2="450" y2="208" stroke="#888" stroke-width="1"/>
    <rect x="446" y="182" width="8" height="18" fill="#ef5350" rx="1"/>
    <line x1="470" y1="195" x2="470" y2="225" stroke="#888" stroke-width="1"/>
    <rect x="466" y="198" width="8" height="20" fill="#ef5350" rx="1"/>
    <line x1="490" y1="210" x2="490" y2="240" stroke="#888" stroke-width="1"/>
    <rect x="486" y="215" width="8" height="18" fill="#ef5350" rx="1"/>

    <!-- Neutral -->
    <line x1="510" y1="218" x2="510" y2="248" stroke="#888" stroke-width="1"/>
    <rect x="506" y="222" width="8" height="16" fill="#00e676" rx="1"/>
    <line x1="530" y1="215" x2="530" y2="245" stroke="#888" stroke-width="1"/>
    <rect x="526" y="220" width="8" height="18" fill="#ef5350" rx="1"/>
    <line x1="550" y1="212" x2="550" y2="242" stroke="#888" stroke-width="1"/>
    <rect x="546" y="216" width="8" height="16" fill="#00e676" rx="1"/>
    <line x1="570" y1="208" x2="570" y2="238" stroke="#888" stroke-width="1"/>
    <rect x="566" y="212" width="8" height="18" fill="#00e676" rx="1"/>

    <!-- Bull recovery -->
    <line x1="590" y1="198" x2="590" y2="228" stroke="#888" stroke-width="1"/>
    <rect x="586" y="200" width="8" height="18" fill="#00e676" rx="1"/>
    <line x1="610" y1="185" x2="610" y2="215" stroke="#888" stroke-width="1"/>
    <rect x="606" y="188" width="8" height="18" fill="#00e676" rx="1"/>
    <line x1="630" y1="172" x2="630" y2="200" stroke="#888" stroke-width="1"/>
    <rect x="626" y="175" width="8" height="18" fill="#00e676" rx="1"/>
    <line x1="650" y1="160" x2="650" y2="188" stroke="#888" stroke-width="1"/>
    <rect x="646" y="162" width="8" height="18" fill="#00e676" rx="1"/>
    <line x1="670" y1="148" x2="670" y2="178" stroke="#888" stroke-width="1"/>
    <rect x="666" y="150" width="8" height="18" fill="#00e676" rx="1"/>
    <line x1="690" y1="138" x2="690" y2="165" stroke="#888" stroke-width="1"/>
    <rect x="686" y="140" width="8" height="16" fill="#00e676" rx="1"/>
  </g>

  <!-- Entry/exit markers -->
  <!-- Long entry at bull regime start -->
  <polygon points="190,218 196,228 184,228" fill="#00e676"/>
  <text x="190" y="240" text-anchor="middle" fill="#00e676" font-family="Arial, sans-serif" font-size="8">LONG</text>

  <!-- Long exit / short entry at bear start -->
  <polygon points="370,105 376,95 364,95" fill="#ff1744"/>
  <text x="370" y="92" text-anchor="middle" fill="#ff1744" font-family="Arial, sans-serif" font-size="8">SHORT</text>

  <!-- Short exit at neutral -->
  <polygon points="510,252 516,262 504,262" fill="#00e676"/>
  <text x="510" y="274" text-anchor="middle" fill="#aaa" font-family="Arial, sans-serif" font-size="7">EXIT</text>

  <!-- Long entry at bull recovery -->
  <polygon points="590,236 596,246 584,246" fill="#00e676"/>
  <text x="590" y="258" text-anchor="middle" fill="#00e676" font-family="Arial, sans-serif" font-size="8">LONG</text>

  <!-- Entry/stop/TP levels for long entry -->
  <line x1="190" y1="190" x2="250" y2="190" stroke="#42a5f5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="252" y="193" fill="#42a5f5" font-family="Arial, sans-serif" font-size="7">Entry</text>
  <line x1="190" y1="220" x2="250" y2="220" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="252" y="223" fill="#ef5350" font-family="Arial, sans-serif" font-size="7">Stop</text>
  <line x1="190" y1="150" x2="250" y2="150" stroke="#00e676" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="252" y="153" fill="#00e676" font-family="Arial, sans-serif" font-size="7">TP</text>

  <!-- State transition arrows -->
  <g fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" marker-end="url(#arrow)">
    <defs>
      <marker id="arrow" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
        <path d="M0,0 L6,2 L0,4" fill="rgba(255,255,255,0.3)"/>
      </marker>
    </defs>
    <path d="M172,200 C178,185 182,185 188,190" stroke="rgba(0,230,118,0.6)"/>
    <path d="M355,115 C360,108 365,108 368,112" stroke="rgba(255,23,68,0.6)"/>
    <path d="M575,218 C580,210 585,210 588,212" stroke="rgba(0,230,118,0.6)"/>
  </g>

  <!-- Transition Matrix visualization -->
  <g transform="translate(715, 65)">
    <text x="35" y="0" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Transition Matrix</text>
    <rect x="0" y="8" width="70" height="70" fill="rgba(255,255,255,0.05)" rx="3" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <!-- Headers -->
    <text x="5" y="20" fill="#888" font-family="monospace" font-size="7">B  N  Bu</text>
    <!-- Row 1: Bear -->
    <text x="-8" y="33" fill="#ef5350" font-family="monospace" font-size="7">B</text>
    <text x="5" y="33" fill="#ccc" font-family="monospace" font-size="8">.60 .25 .15</text>
    <!-- Row 2: Neutral -->
    <text x="-8" y="48" fill="#42a5f5" font-family="monospace" font-size="7">N</text>
    <text x="5" y="48" fill="#ccc" font-family="monospace" font-size="8">.20 .50 .30</text>
    <!-- Row 3: Bull -->
    <text x="-8" y="63" fill="#00e676" font-family="monospace" font-size="7">Bu</text>
    <text x="5" y="63" fill="#ccc" font-family="monospace" font-size="8">.10 .25 .65</text>
  </g>

  <!-- Sub-pane: Regime probability lines -->
  <rect x="60" y="355" width="640" height="100" fill="rgba(255,255,255,0.02)" rx="3"/>
  <text x="65" y="370" fill="#888" font-family="Arial, sans-serif" font-size="9">Regime Probabilities</text>
  <line x1="60" y1="355" x2="700" y2="355" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <!-- 50% threshold line -->
  <line x1="60" y1="405" x2="700" y2="405" stroke="rgba(255,255,255,0.1)" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="703" y="408" fill="#666" font-family="Arial, sans-serif" font-size="7">50%</text>
  <!-- Entry threshold line -->
  <line x1="60" y1="390" x2="700" y2="390" stroke="rgba(255,193,7,0.3)" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="703" y="393" fill="#ffc107" font-family="Arial, sans-serif" font-size="7">60%</text>

  <!-- Bull probability line (green) -->
  <polyline points="80,420 100,418 120,415 140,412 160,410 180,400 200,385 220,378 240,375 260,372 280,370 300,368 320,370 340,378 360,395 380,415 400,425 420,430 430,432 450,430 470,425 490,420 510,412 530,415 550,410 570,402 590,388 610,380 630,375 650,372 670,370 690,368" fill="none" stroke="#00e676" stroke-width="1.5" opacity="0.8"/>

  <!-- Bear probability line (red) -->
  <polyline points="80,435 100,432 120,430 140,432 160,433 180,438 200,442 220,444 240,445 260,445 280,446 300,446 320,444 340,438 360,425 380,408 400,395 420,388 430,385 450,390 470,398 490,405 510,418 530,425 550,428 570,432 590,440 610,442 630,445 650,445 670,446 690,446" fill="none" stroke="#ff1744" stroke-width="1.5" opacity="0.8"/>

  <!-- Neutral probability line (blue) -->
  <polyline points="80,425 100,428 120,430 140,430 160,430 180,432 200,438 220,440 240,440 260,442 280,442 300,442 320,442 340,440 360,435 380,430 400,428 420,430 430,432 450,432 470,430 490,428 510,425 530,420 550,422 570,425 590,430 610,435 630,438 650,440 670,440 690,442" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.6"/>

  <!-- Legend -->
  <g transform="translate(60, 480)">
    <rect x="0" y="0" width="8" height="8" fill="#00e676" rx="1"/>
    <text x="12" y="8" fill="#aaa" font-family="Arial, sans-serif" font-size="9">Bull State</text>
    <rect x="90" y="0" width="8" height="8" fill="#ff1744" rx="1"/>
    <text x="102" y="8" fill="#aaa" font-family="Arial, sans-serif" font-size="9">Bear State</text>
    <rect x="175" y="0" width="8" height="8" fill="#42a5f5" rx="1"/>
    <text x="187" y="8" fill="#aaa" font-family="Arial, sans-serif" font-size="9">Neutral</text>
    <polygon points="268,8 274,0 262,0" fill="#00e676"/>
    <text x="278" y="8" fill="#aaa" font-family="Arial, sans-serif" font-size="9">Long Entry</text>
    <polygon points="348,0 354,8 342,8" fill="#ff1744"/>
    <text x="358" y="8" fill="#aaa" font-family="Arial, sans-serif" font-size="9">Short Entry</text>
    <line x1="435" y1="4" x2="450" y2="4" stroke="#ffc107" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="454" y="8" fill="#aaa" font-family="Arial, sans-serif" font-size="9">Entry Threshold</text>
  </g>
</svg>
