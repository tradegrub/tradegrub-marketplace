<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Island Reversal Detector</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>
  <line x1="60" y1="70" x2="60" y2="420" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="420" x2="760" y2="420" stroke="#333" stroke-width="1"/>
  <!-- Uptrend before island top -->
  <rect x="100" y="300" width="8" height="30" fill="#4CAF50" rx="1"/><line x1="104" y1="295" x2="104" y2="335" stroke="#4CAF50" stroke-width="1"/>
  <rect x="130" y="275" width="8" height="30" fill="#4CAF50" rx="1"/><line x1="134" y1="270" x2="134" y2="310" stroke="#4CAF50" stroke-width="1"/>
  <rect x="160" y="250" width="8" height="30" fill="#4CAF50" rx="1"/><line x1="164" y1="245" x2="164" y2="285" stroke="#4CAF50" stroke-width="1"/>
  <rect x="190" y="220" width="8" height="35" fill="#4CAF50" rx="1"/><line x1="194" y1="215" x2="194" y2="260" stroke="#4CAF50" stroke-width="1"/>
  <rect x="220" y="195" width="8" height="30" fill="#4CAF50" rx="1"/><line x1="224" y1="190" x2="224" y2="230" stroke="#4CAF50" stroke-width="1"/>
  <!-- Gap up -->
  <rect x="245" y="155" width="50" height="15" fill="rgba(76,175,80,0.15)" stroke="rgba(76,175,80,0.4)" stroke-dasharray="3,3" rx="2"/>
  <text x="270" y="165" text-anchor="middle" fill="#4CAF50" font-family="Inter,sans-serif" font-size="8">GAP UP</text>
  <!-- Island bars (bearish) -->
  <rect x="290" y="125" width="60" height="30" fill="rgba(239,83,80,0.08)" stroke="rgba(239,83,80,0.5)" stroke-width="1" stroke-dasharray="4,4" rx="3"/>
  <rect x="295" y="130" width="8" height="20" fill="#ef5350" rx="1"/>
  <rect x="310" y="128" width="8" height="22" fill="#4CAF50" rx="1"/>
  <rect x="325" y="132" width="8" height="18" fill="#ef5350" rx="1"/>
  <rect x="340" y="127" width="8" height="23" fill="#ef5350" rx="1"/>
  <!-- Gap down -->
  <rect x="345" y="155" width="50" height="15" fill="rgba(239,83,80,0.15)" stroke="rgba(239,83,80,0.4)" stroke-dasharray="3,3" rx="2"/>
  <text x="370" y="165" text-anchor="middle" fill="#ef5350" font-family="Inter,sans-serif" font-size="8">GAP DN</text>
  <!-- Downtrend after -->
  <rect x="390" y="195" width="8" height="30" fill="#ef5350" rx="1"/>
  <rect x="420" y="220" width="8" height="35" fill="#ef5350" rx="1"/>
  <rect x="450" y="250" width="8" height="30" fill="#ef5350" rx="1"/>
  <!-- Bear Island label -->
  <text x="320" y="115" text-anchor="middle" fill="#ef5350" font-family="Inter,sans-serif" font-size="11" font-weight="600">Bear Island</text>
  <!-- Bull island example on right -->
  <rect x="500" y="290" width="8" height="30" fill="#ef5350" rx="1"/>
  <rect x="530" y="310" width="8" height="30" fill="#ef5350" rx="1"/>
  <!-- Gap down into island -->
  <rect x="555" y="345" width="50" height="12" fill="rgba(239,83,80,0.15)" stroke="rgba(239,83,80,0.4)" stroke-dasharray="3,3" rx="2"/>
  <text x="580" y="354" text-anchor="middle" fill="#ef5350" font-family="Inter,sans-serif" font-size="8">GAP DN</text>
  <!-- Bull island bars -->
  <rect x="600" y="360" width="60" height="30" fill="rgba(76,175,80,0.08)" stroke="rgba(76,175,80,0.5)" stroke-width="1" stroke-dasharray="4,4" rx="3"/>
  <rect x="605" y="365" width="8" height="20" fill="#ef5350" rx="1"/>
  <rect x="620" y="368" width="8" height="18" fill="#4CAF50" rx="1"/>
  <rect x="635" y="362" width="8" height="22" fill="#4CAF50" rx="1"/>
  <!-- Gap up out -->
  <rect x="655" y="345" width="50" height="12" fill="rgba(76,175,80,0.15)" stroke="rgba(76,175,80,0.4)" stroke-dasharray="3,3" rx="2"/>
  <text x="680" y="354" text-anchor="middle" fill="#4CAF50" font-family="Inter,sans-serif" font-size="8">GAP UP</text>
  <rect x="700" y="310" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="730" y="285" width="8" height="30" fill="#4CAF50" rx="1"/>
  <text x="630" y="405" text-anchor="middle" fill="#4CAF50" font-family="Inter,sans-serif" font-size="11" font-weight="600">Bull Island</text>
  <!-- Legend -->
  <rect x="150" y="450" width="500" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
  <rect x="180" y="458" width="10" height="10" fill="rgba(239,83,80,0.15)" stroke="rgba(239,83,80,0.5)" stroke-width="1" rx="1"/>
  <text x="196" y="466" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bearish Island</text>
  <rect x="310" y="458" width="10" height="10" fill="rgba(76,175,80,0.15)" stroke="rgba(76,175,80,0.5)" stroke-width="1" rx="1"/>
  <text x="326" y="466" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bullish Island</text>
  <rect x="440" y="458" width="14" height="8" fill="rgba(76,175,80,0.15)" stroke="rgba(76,175,80,0.4)" stroke-width="1" stroke-dasharray="2,2" rx="1"/>
  <text x="460" y="466" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Gap Zone</text>
</svg>