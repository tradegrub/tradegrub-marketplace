<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" in="SourceGraphic" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" rx="8" fill="url(#bg)"/>
  <text x="30" y="35" font-family="Arial,sans-serif" font-size="17" fill="white" font-weight="bold">Psychological Price Levels</text>
  <text x="30" y="52" font-family="Arial,sans-serif" font-size="11" fill="#888">tradegrub.finance</text>
  <!-- Grid lines -->
  <line x1="60" y1="80" x2="740" y2="80" stroke="#fff" stroke-opacity="0.04"/>
  <line x1="60" y1="130" x2="740" y2="130" stroke="#fff" stroke-opacity="0.04"/>
  <line x1="60" y1="180" x2="740" y2="180" stroke="#fff" stroke-opacity="0.04"/>
  <line x1="60" y1="230" x2="740" y2="230" stroke="#fff" stroke-opacity="0.04"/>
  <line x1="60" y1="280" x2="740" y2="280" stroke="#fff" stroke-opacity="0.04"/>
  <line x1="60" y1="330" x2="740" y2="330" stroke="#fff" stroke-opacity="0.04"/>
  <line x1="60" y1="380" x2="740" y2="380" stroke="#fff" stroke-opacity="0.04"/>
  <line x1="160" y1="70" x2="160" y2="420" stroke="#fff" stroke-opacity="0.04"/>
  <line x1="280" y1="70" x2="280" y2="420" stroke="#fff" stroke-opacity="0.04"/>
  <line x1="400" y1="70" x2="400" y2="420" stroke="#fff" stroke-opacity="0.04"/>
  <line x1="520" y1="70" x2="520" y2="420" stroke="#fff" stroke-opacity="0.04"/>
  <line x1="640" y1="70" x2="640" y2="420" stroke="#fff" stroke-opacity="0.04"/>
  <!-- Psychological levels: $250 (minor, top) -->
  <line x1="60" y1="100" x2="740" y2="100" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
  <text x="745" y="104" font-family="Arial,sans-serif" font-size="11" fill="#ffd700" opacity="0.7">$250</text>
  <!-- $200 (major) -->
  <line x1="60" y1="200" x2="740" y2="200" stroke="#ffd700" stroke-width="3" filter="url(#glow)"/>
  <text x="745" y="204" font-family="Arial,sans-serif" font-size="11" fill="#ffd700" font-weight="bold">$200</text>
  <!-- $150 (minor, thin) -->
  <line x1="60" y1="300" x2="740" y2="300" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
  <text x="745" y="304" font-family="Arial,sans-serif" font-size="11" fill="#ffd700" opacity="0.5">$150</text>
  <!-- $100 (medium) -->
  <line x1="60" y1="390" x2="740" y2="390" stroke="#ffd700" stroke-width="2" opacity="0.6"/>
  <text x="745" y="394" font-family="Arial,sans-serif" font-size="11" fill="#ffd700" opacity="0.7">$100</text>
  <!-- Price line (white polyline bouncing off levels) -->
  <polyline points="80,370 130,350 180,320 230,290 270,305 320,280 370,240 410,210 440,200 470,195 490,200 520,220 560,250 590,210 620,200 640,195 660,200 690,230 720,260" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  <!-- Signal marker at bounce off $200 -->
  <polygon points="440,188 448,175 432,175" fill="#00ff88" filter="url(#glow)"/>
  <text x="452" y="178" font-family="Arial,sans-serif" font-size="11" fill="#00ff88" font-weight="bold" filter="url(#glow)">Signal</text>
  <!-- Second bounce signal -->
  <polygon points="620,188 628,175 612,175" fill="#00ff88" filter="url(#glow)"/>
  <!-- Legend bar -->
  <rect x="0" y="460" width="800" height="40" fill="#111" opacity="0.5"/>
  <line x1="130" y1="480" x2="160" y2="480" stroke="white" stroke-width="2"/>
  <text x="166" y="484" font-family="Arial,sans-serif" font-size="11" fill="#aaa">Price</text>
  <line x1="240" y1="480" x2="270" y2="480" stroke="#ffd700" stroke-width="3"/>
  <text x="276" y="484" font-family="Arial,sans-serif" font-size="11" fill="#aaa">Major Level</text>
  <line x1="390" y1="480" x2="420" y2="480" stroke="#ffd700" stroke-width="1" opacity="0.5"/>
  <text x="426" y="484" font-family="Arial,sans-serif" font-size="11" fill="#aaa">Minor Level</text>
  <polygon points="540,474 548,486 532,486" fill="#00ff88"/>
  <text x="554" y="484" font-family="Arial,sans-serif" font-size="11" fill="#aaa">Signal</text>
</svg>
