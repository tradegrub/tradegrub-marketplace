  <!-- Percentile zones -->
  <rect x="80" y="250" width="680" height="20" fill="#ef5350" fill-opacity="0.06"/>
  <rect x="80" y="375" width="680" height="20" fill="#26a69a" fill-opacity="0.06"/>
  <line x1="80" y1="270" x2="760" y2="270" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="765" y="273" fill="#ef5350" font-size="7" opacity="0.5">90th</text>
  <line x1="80" y1="375" x2="760" y2="375" stroke="#26a69a" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
