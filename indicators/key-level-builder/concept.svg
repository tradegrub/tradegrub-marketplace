<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowLevel">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="clusterZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="60" x2="720" y2="60"/>
    <line x1="60" y1="120" x2="720" y2="120"/>
    <line x1="60" y1="180" x2="720" y2="180"/>
    <line x1="60" y1="240" x2="720" y2="240"/>
    <line x1="60" y1="300" x2="720" y2="300"/>
    <line x1="60" y1="360" x2="720" y2="360"/>
    <line x1="60" y1="420" x2="720" y2="420"/>
    <line x1="160" y1="50" x2="160" y2="435"/>
    <line x1="260" y1="50" x2="260" y2="435"/>
    <line x1="360" y1="50" x2="360" y2="435"/>
    <line x1="460" y1="50" x2="460" y2="435"/>
    <line x1="560" y1="50" x2="560" y2="435"/>
    <line x1="660" y1="50" x2="660" y2="435"/>
  </g>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" fill="#e2e8f0" font-family="Arial,sans-serif" font-size="18" font-weight="bold">Key Level Builder</text>
  <text x="390" y="46" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Y-axis labels -->
  <text x="52" y="64" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">210</text>
  <text x="52" y="124" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">200</text>
  <text x="52" y="184" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">190</text>
  <text x="52" y="244" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">180</text>
  <text x="52" y="304" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">170</text>
  <text x="52" y="364" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">160</text>
  <text x="52" y="424" text-anchor="end" fill="#64748b" font-family="Arial,sans-serif" font-size="9">150</text>

  <!-- Cluster Zone highlight -->
  <rect x="60" y="155" width="660" height="65" fill="url(#clusterZone)" rx="2"/>

  <!-- Support/Resistance levels (horizontal lines, varying thickness) -->
  <!-- Strong resistance at ~205 (y=90) -->
  <line x1="60" y1="90" x2="720" y2="90" stroke="#ef4444" stroke-width="2.5" opacity="0.7" filter="url(#glowLevel)"/>
  <!-- Strong resistance cluster at ~193 (y=162) -->
  <line x1="60" y1="162" x2="720" y2="162" stroke="#ef4444" stroke-width="2.2" opacity="0.65" filter="url(#glowLevel)"/>
  <!-- Medium resistance at ~190 (y=180) -->
  <line x1="60" y1="180" x2="720" y2="180" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
  <!-- Medium level at ~188 (y=195) -->
  <line x1="60" y1="195" x2="720" y2="195" stroke="#ef4444" stroke-width="1.8" opacity="0.55"/>
  <!-- Weak resistance at ~186 (y=210) -->
  <line x1="60" y1="210" x2="720" y2="210" stroke="#ef4444" stroke-width="0.8" opacity="0.35" stroke-dasharray="6,4"/>

  <!-- Strong support at ~165 (y=330) -->
  <line x1="60" y1="330" x2="720" y2="330" stroke="#22c55e" stroke-width="2.5" opacity="0.7" filter="url(#glowLevel)"/>
  <!-- Medium support at ~158 (y=375) -->
  <line x1="60" y1="375" x2="720" y2="375" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <!-- Weak support at ~153 (y=405) -->
  <line x1="60" y1="405" x2="720" y2="405" stroke="#22c55e" stroke-width="0.8" opacity="0.35" stroke-dasharray="6,4"/>

  <!-- Price line -->
  <polyline fill="none" stroke="#e2e8f0" stroke-width="1.8" filter="url(#glow)" points="
    60,380 72,375 84,368 96,360 108,350 120,338 132,330 144,335 156,328 168,320
    180,310 192,295 204,280 216,265 228,250 240,238 252,225 264,215 276,200
    288,195 300,190 312,185 324,180 336,175 348,170 360,168 372,172 384,178
    396,185 408,192 420,198 432,195 444,188 456,180 468,172 480,165 492,168
    504,175 516,185 528,195 540,200 552,195 564,188 576,182 588,178 600,175
    612,172 624,168 636,165 648,162 660,158 672,165 684,172 696,180 708,188 720,195
  "/>

  <!-- Density histogram on right margin (vertical bars showing level strength) -->
  <g opacity="0.6">
    <!-- Strong level at y=90 -->
    <rect x="728" y="86" width="28" height="8" rx="1" fill="#ef4444" opacity="0.8"/>
    <!-- Strong cluster y=162 -->
    <rect x="728" y="158" width="32" height="8" rx="1" fill="#ef4444" opacity="0.85"/>
    <!-- Medium y=180 -->
    <rect x="728" y="176" width="18" height="8" rx="1" fill="#ef4444" opacity="0.6"/>
    <!-- Medium y=195 -->
    <rect x="728" y="191" width="22" height="8" rx="1" fill="#ef4444" opacity="0.65"/>
    <!-- Weak y=210 -->
    <rect x="728" y="206" width="8" height="8" rx="1" fill="#ef4444" opacity="0.4"/>
    <!-- Strong support y=330 -->
    <rect x="728" y="326" width="30" height="8" rx="1" fill="#22c55e" opacity="0.8"/>
    <!-- Medium support y=375 -->
    <rect x="728" y="371" width="16" height="8" rx="1" fill="#22c55e" opacity="0.6"/>
    <!-- Weak support y=405 -->
    <rect x="728" y="401" width="7" height="8" rx="1" fill="#22c55e" opacity="0.4"/>
  </g>

  <!-- Histogram label -->
  <text x="744" y="55" text-anchor="middle" fill="#64748b" font-family="Arial,sans-serif" font-size="8" transform="rotate(0)">Strength</text>

  <!-- Callout labels -->
  <text x="100" y="84" fill="#ef4444" font-family="Arial,sans-serif" font-size="9" font-weight="bold">Strong Resistance</text>
  <text x="100" y="345" fill="#22c55e" font-family="Arial,sans-serif" font-size="9" font-weight="bold">Strong Support</text>
  <text x="100" y="400" fill="#22c55e" font-family="Arial,sans-serif" font-size="9" opacity="0.7">Weak Support</text>
  <text x="450" y="153" fill="#a78bfa" font-family="Arial,sans-serif" font-size="9" font-weight="bold">Cluster Zone</text>

  <!-- Legend bar -->
  <rect x="60" y="455" width="680" height="36" rx="4" fill="#0f172a" fill-opacity="0.7"/>
  <line x1="90" y1="473" x2="115" y2="473" stroke="#ef4444" stroke-width="2.5" opacity="0.7"/>
  <text x="122" y="477" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Strong Level</text>
  <line x1="230" y1="473" x2="255" y2="473" stroke="#22c55e" stroke-width="1" opacity="0.5" stroke-dasharray="6,4"/>
  <text x="262" y="477" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Weak Level</text>
  <line x1="370" y1="473" x2="395" y2="473" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="402" y="477" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Price</text>
  <rect x="470" y="468" width="14" height="10" rx="2" fill="#a78bfa" opacity="0.3"/>
  <text x="490" y="477" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Density</text>
</svg>