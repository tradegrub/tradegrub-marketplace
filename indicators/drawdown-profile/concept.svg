<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="240"/>
    <line x1="200" y1="60" x2="200" y2="240"/>
    <line x1="320" y1="60" x2="320" y2="240"/>
    <line x1="440" y1="60" x2="440" y2="240"/>
    <line x1="560" y1="60" x2="560" y2="240"/>
    <line x1="680" y1="60" x2="680" y2="240"/>
    <line x1="60" y1="120" x2="760" y2="120"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Drawdown Profile Analysis</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance — Rolling Drawdown, Duration, Recovery</text>

  <!-- Price chart with peak line -->
  <!-- Candlesticks rising then falling then recovering -->
  <line x1="100" y1="170" x2="100" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="175" width="8" height="12" fill="#26a69a" rx="1"/>
  <line x1="130" y1="155" x2="130" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="160" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="160" y1="140" x2="160" y2="172" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="145" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="190" y1="125" x2="190" y2="158" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="130" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="220" y1="110" x2="220" y2="145" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="115" width="8" height="20" fill="#26a69a" rx="1"/>
  <!-- Peak -->
  <line x1="250" y1="95" x2="250" y2="130" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="100" width="8" height="20" fill="#26a69a" rx="1"/>
  <!-- Decline -->
  <line x1="280" y1="110" x2="280" y2="150" stroke="#ef5350" stroke-width="1"/>
  <rect x="276" y="115" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="310" y1="130" x2="310" y2="170" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="138" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="340" y1="150" x2="340" y2="195" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="158" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="370" y1="170" x2="370" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="366" y="178" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="400" y1="185" x2="400" y2="230" stroke="#ef5350" stroke-width="1"/>
  <rect x="396" y="195" width="8" height="25" fill="#ef5350" rx="1"/>
  <!-- Trough -->
  <line x1="430" y1="195" x2="430" y2="240" stroke="#ef5350" stroke-width="1"/>
  <rect x="426" y="205" width="8" height="25" fill="#ef5350" rx="1"/>
  <!-- Recovery -->
  <line x1="460" y1="180" x2="460" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="185" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="490" y1="160" x2="490" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="486" y="168" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="520" y1="140" x2="520" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="516" y="148" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="550" y1="120" x2="550" y2="158" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="128" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="580" y1="105" x2="580" y2="140" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="110" width="8" height="20" fill="#26a69a" rx="1"/>
  <!-- New peak -->
  <line x1="610" y1="90" x2="610" y2="128" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="95" width="8" height="22" fill="#26a69a" rx="1"/>
  <!-- Second decline -->
  <line x1="640" y1="105" x2="640" y2="145" stroke="#ef5350" stroke-width="1"/>
  <rect x="636" y="112" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="670" y1="115" x2="670" y2="155" stroke="#ef5350" stroke-width="1"/>
  <rect x="666" y="122" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="700" y1="108" x2="700" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="696" y="115" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="730" y1="95" x2="730" y2="135" stroke="#26a69a" stroke-width="1"/>
  <rect x="726" y="100" width="8" height="24" fill="#26a69a" rx="1"/>

  <!-- Peak line -->
  <line x1="246" y1="100" x2="610" y2="100" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="420" y="93" text-anchor="middle" fill="#ff9800" font-size="9" opacity="0.7">Running Peak</text>

  <!-- Drawdown shading zones -->
  <rect x="276" y="100" width="185" height="140" fill="#ef5350" fill-opacity="0.06" rx="2"/>
  <rect x="636" y="95" width="65" height="60" fill="#ff9800" fill-opacity="0.05" rx="2"/>

  <!-- Recovery arrow -->
  <text x="580" y="85" text-anchor="middle" fill="#4CAF50" font-size="9" font-weight="500">Recovery</text>

  <!-- Max DD annotation -->
  <line x1="430" y1="230" x2="430" y2="245" stroke="#ef5350" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="430" y="258" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="500">Max DD</text>

  <!-- Sub-pane separator -->
  <line x1="60" y1="270" x2="760" y2="270" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="65" y="285" fill="#888" font-size="9">Drawdown %</text>

  <!-- Drawdown curve in sub-pane -->
  <polyline points="100,290 130,290 160,290 190,290 220,290 250,290 280,300 310,315 340,335 370,355 400,365 430,375 460,350 490,330 520,310 550,298 580,292 610,290 640,305 670,312 700,298 730,290" fill="none" stroke="#ef5350" stroke-width="2" filter="url(#glow)"/>

  <!-- Zero line in sub-pane -->
  <line x1="80" y1="290" x2="760" y2="290" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="770" y="293" fill="#888" font-size="8">0%</text>

  <!-- -5% line -->
  <line x1="80" y1="330" x2="760" y2="330" stroke="rgba(255,152,0,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="770" y="333" fill="#ff9800" font-size="8">-5%</text>

  <!-- -10% line -->
  <line x1="80" y1="370" x2="760" y2="370" stroke="rgba(239,83,80,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="770" y="373" fill="#ef5350" font-size="8">-10%</text>

  <!-- Rolling max DD line -->
  <polyline points="100,290 130,290 160,290 190,290 220,290 250,290 280,300 310,315 340,335 370,355 400,370 430,378 460,378 490,378 520,378 550,378 580,378 610,378 640,378 670,378 700,378 730,378" fill="none" stroke="#FF7043" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>

  <!-- Duration bars -->
  <text x="65" y="405" fill="#888" font-size="9">Duration</text>
  <g opacity="0.5">
    <rect x="276" y="415" width="8" height="5" fill="#AB47BC" rx="1"/>
    <rect x="306" y="415" width="8" height="10" fill="#AB47BC" rx="1"/>
    <rect x="336" y="415" width="8" height="15" fill="#AB47BC" rx="1"/>
    <rect x="366" y="415" width="8" height="20" fill="#AB47BC" rx="1"/>
    <rect x="396" y="415" width="8" height="25" fill="#AB47BC" rx="1"/>
    <rect x="426" y="415" width="8" height="30" fill="#AB47BC" rx="1"/>
    <rect x="636" y="415" width="8" height="5" fill="#AB47BC" rx="1"/>
    <rect x="666" y="415" width="8" height="10" fill="#AB47BC" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 455)">
    <rect width="680" height="35" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="18" r="4" fill="#ef5350"/>
    <text x="30" y="22" fill="#999" font-size="9">Drawdown %</text>
    <circle cx="140" cy="18" r="4" fill="#FF7043"/>
    <text x="150" y="22" fill="#999" font-size="9">Rolling Max DD</text>
    <circle cx="280" cy="18" r="4" fill="#AB47BC"/>
    <text x="290" y="22" fill="#999" font-size="9">Duration</text>
    <circle cx="370" cy="18" r="4" fill="#4CAF50"/>
    <text x="380" y="22" fill="#999" font-size="9">Recovery Zone</text>
    <line x1="480" y1="18" x2="510" y2="18" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="515" y="22" fill="#999" font-size="9">Running Peak</text>
  </g>
</svg>
