<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="zscoreHigh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef5350" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="zscoreLow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#26a69a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#26a69a" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="300"/>
    <line x1="200" y1="60" x2="200" y2="300"/>
    <line x1="320" y1="60" x2="320" y2="300"/>
    <line x1="440" y1="60" x2="440" y2="300"/>
    <line x1="560" y1="60" x2="560" y2="300"/>
    <line x1="680" y1="60" x2="680" y2="300"/>
    <line x1="60" y1="120" x2="760" y2="120"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="240" x2="760" y2="240"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Price Distribution Analysis</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance — Z-Score, Percentile Rank, Density</text>

  <!-- +2σ and -2σ bands -->
  <rect x="80" y="85" width="680" height="30" fill="url(#zscoreHigh)"/>
  <rect x="80" y="245" width="680" height="30" fill="url(#zscoreLow)"/>
  <line x1="80" y1="100" x2="760" y2="100" stroke="#ef5350" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="65" y="104" fill="#ef5350" font-size="8" text-anchor="end">+2σ</text>
  <line x1="80" y1="260" x2="760" y2="260" stroke="#26a69a" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="65" y="264" fill="#26a69a" font-size="8" text-anchor="end">-2σ</text>
  <line x1="80" y1="180" x2="760" y2="180" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="65" y="184" fill="#888" font-size="8" text-anchor="end">Mean</text>

  <!-- Price line with candles -->
  <line x1="100" y1="165" x2="100" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="175" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="130" y1="160" x2="130" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="168" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="160" y1="145" x2="160" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="152" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="190" y1="125" x2="190" y2="165" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="130" width="8" height="25" fill="#26a69a" rx="1"/>
  <!-- Extreme high - z > 2 -->
  <line x1="220" y1="88" x2="220" y2="135" stroke="#26a69a" stroke-width="1"/>
  <rect x="214" y="92" width="12" height="30" fill="#26a69a" rx="1" filter="url(#glow)"/>
  <line x1="250" y1="95" x2="250" y2="140" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="100" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="280" y1="110" x2="280" y2="155" stroke="#ef5350" stroke-width="1"/>
  <rect x="276" y="118" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="310" y1="135" x2="310" y2="175" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="142" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="340" y1="155" x2="340" y2="195" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="162" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="370" y1="175" x2="370" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="366" y="182" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="400" y1="195" x2="400" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="396" y="202" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="430" y1="215" x2="430" y2="255" stroke="#ef5350" stroke-width="1"/>
  <rect x="426" y="222" width="8" height="22" fill="#ef5350" rx="1"/>
  <!-- Extreme low - z < -2 -->
  <line x1="460" y1="240" x2="460" y2="280" stroke="#ef5350" stroke-width="1"/>
  <rect x="454" y="248" width="12" height="25" fill="#ef5350" rx="1" filter="url(#glow)"/>
  <line x1="490" y1="245" x2="490" y2="275" stroke="#26a69a" stroke-width="1"/>
  <rect x="486" y="252" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="520" y1="230" x2="520" y2="265" stroke="#26a69a" stroke-width="1"/>
  <rect x="516" y="238" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="550" y1="210" x2="550" y2="250" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="218" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="580" y1="195" x2="580" y2="230" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="200" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="610" y1="180" x2="610" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="606" y="185" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="640" y1="170" x2="640" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="636" y="175" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="670" y1="162" x2="670" y2="198" stroke="#26a69a" stroke-width="1"/>
  <rect x="666" y="168" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="700" y1="155" x2="700" y2="192" stroke="#26a69a" stroke-width="1"/>
  <rect x="696" y="160" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="730" y1="148" x2="730" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="726" y="155" width="8" height="18" fill="#ef5350" rx="1"/>

  <!-- Extreme annotations -->
  <g filter="url(#softGlow)">
    <polygon points="220,82 230,82 225,72" fill="#ef5350"/>
  </g>
  <rect x="228" y="72" width="80" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="268" y="85" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">Z = +2.4 (97%)</text>

  <g filter="url(#softGlow)">
    <polygon points="460,286 470,286 465,296" fill="#26a69a"/>
  </g>
  <rect x="468" y="278" width="80" height="18" rx="4" fill="#26a69a" fill-opacity="0.15" stroke="#26a69a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="508" y="291" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">Z = -2.1 (3%)</text>

  <!-- Z-Score sub-pane -->
  <line x1="60" y1="320" x2="760" y2="320" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="65" y="335" fill="#888" font-size="9">Z-Score</text>
  <line x1="80" y1="370" x2="760" y2="370" stroke="#888" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="65" y="374" fill="#888" font-size="7">0</text>

  <!-- Z-Score line -->
  <polyline points="100,375 130,368 160,355 190,342 220,328 250,332 280,345 310,358 340,365 370,375 400,382 430,390 460,400 490,395 520,385 550,378 580,372 610,375 640,370 670,365 700,358 730,362"
    fill="none" stroke="#ab47bc" stroke-width="1.5" opacity="0.8"/>

  <!-- Z-Score extreme zones -->
  <line x1="80" y1="340" x2="760" y2="340" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>
  <text x="762" y="344" fill="#ef5350" font-size="7">+2</text>
  <line x1="80" y1="400" x2="760" y2="400" stroke="#26a69a" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>
  <text x="762" y="404" fill="#26a69a" font-size="7">-2</text>

  <!-- Percentile heatmap bar -->
  <line x1="60" y1="420" x2="760" y2="420" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="65" y="440" fill="#888" font-size="9">Percentile</text>
  <g opacity="0.7">
    <rect x="96" y="432" width="30" height="8" fill="#42a5f5" rx="2"/>
    <rect x="126" y="432" width="30" height="8" fill="#64b5f6" rx="2"/>
    <rect x="156" y="432" width="30" height="8" fill="#90caf9" rx="2"/>
    <rect x="186" y="432" width="30" height="8" fill="#ef9a9a" rx="2"/>
    <rect x="216" y="432" width="30" height="8" fill="#ef5350" rx="2"/>
    <rect x="246" y="432" width="30" height="8" fill="#e57373" rx="2"/>
    <rect x="276" y="432" width="30" height="8" fill="#ef9a9a" rx="2"/>
    <rect x="306" y="432" width="30" height="8" fill="#90caf9" rx="2"/>
    <rect x="336" y="432" width="30" height="8" fill="#64b5f6" rx="2"/>
    <rect x="366" y="432" width="30" height="8" fill="#42a5f5" rx="2"/>
    <rect x="396" y="432" width="30" height="8" fill="#1e88e5" rx="2"/>
    <rect x="426" y="432" width="30" height="8" fill="#1565c0" rx="2"/>
    <rect x="456" y="432" width="30" height="8" fill="#26a69a" rx="2"/>
    <rect x="486" y="432" width="30" height="8" fill="#1565c0" rx="2"/>
    <rect x="516" y="432" width="30" height="8" fill="#1e88e5" rx="2"/>
    <rect x="546" y="432" width="30" height="8" fill="#42a5f5" rx="2"/>
    <rect x="576" y="432" width="30" height="8" fill="#64b5f6" rx="2"/>
    <rect x="606" y="432" width="30" height="8" fill="#42a5f5" rx="2"/>
    <rect x="636" y="432" width="30" height="8" fill="#64b5f6" rx="2"/>
    <rect x="666" y="432" width="30" height="8" fill="#90caf9" rx="2"/>
    <rect x="696" y="432" width="30" height="8" fill="#e57373" rx="2"/>
    <rect x="726" y="432" width="30" height="8" fill="#ef9a9a" rx="2"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 455)">
    <rect width="680" height="35" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="18" r="4" fill="#ef5350"/>
    <text x="30" y="22" fill="#999" font-size="9">Overbought (Z &gt; +2)</text>
    <circle cx="170" cy="18" r="4" fill="#26a69a"/>
    <text x="180" y="22" fill="#999" font-size="9">Oversold (Z &lt; -2)</text>
    <circle cx="310" cy="18" r="4" fill="#ab47bc"/>
    <text x="320" y="22" fill="#999" font-size="9">Z-Score</text>
    <rect x="400" y="10" width="20" height="16" rx="2">
      <animate attributeName="fill" values="#1565c0;#ef5350;#1565c0" dur="3s" repeatCount="0"/>
    </rect>
    <rect x="400" y="10" width="20" height="16" fill="#42a5f5" rx="2"/>
    <text x="425" y="22" fill="#999" font-size="9">Percentile Rank</text>
  </g>
</svg>
