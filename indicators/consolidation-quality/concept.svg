<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Consolidation Quality Score</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price candles top 55% - wide choppy then tight consolidation then breakout -->
  <!-- Wide range phase -->
  <line x1="100" y1="120" x2="100" y2="200" stroke="#26a69a" stroke-width="1"/><rect x="96" y="135" width="8" height="45" fill="#26a69a" rx="1"/>
  <line x1="130" y1="140" x2="130" y2="220" stroke="#ef5350" stroke-width="1"/><rect x="126" y="148" width="8" height="50" fill="#ef5350" rx="1"/>
  <line x1="160" y1="110" x2="160" y2="195" stroke="#26a69a" stroke-width="1"/><rect x="156" y="125" width="8" height="48" fill="#26a69a" rx="1"/>
  <line x1="190" y1="130" x2="190" y2="210" stroke="#ef5350" stroke-width="1"/><rect x="186" y="140" width="8" height="50" fill="#ef5350" rx="1"/>
  <line x1="220" y1="125" x2="220" y2="200" stroke="#26a69a" stroke-width="1"/><rect x="216" y="138" width="8" height="42" fill="#26a69a" rx="1"/>

  <!-- Narrowing range (consolidation zone) -->
  <rect x="245" y="130" width="280" height="90" fill="#00e676" fill-opacity="0.04" rx="4"/>
  <line x1="260" y1="145" x2="260" y2="200" stroke="#ef5350" stroke-width="1"/><rect x="256" y="152" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="290" y1="150" x2="290" y2="195" stroke="#26a69a" stroke-width="1"/><rect x="286" y="158" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="320" y1="155" x2="320" y2="192" stroke="#ef5350" stroke-width="1"/><rect x="316" y="160" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="350" y1="158" x2="350" y2="188" stroke="#26a69a" stroke-width="1"/><rect x="346" y="162" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="380" y1="160" x2="380" y2="185" stroke="#ef5350" stroke-width="1"/><rect x="376" y="163" width="8" height="13" fill="#ef5350" rx="1"/>
  <line x1="410" y1="162" x2="410" y2="182" stroke="#26a69a" stroke-width="1"/><rect x="406" y="165" width="8" height="10" fill="#26a69a" rx="1"/>
  <line x1="440" y1="163" x2="440" y2="180" stroke="#26a69a" stroke-width="1"/><rect x="436" y="166" width="8" height="8" fill="#26a69a" rx="1"/>
  <line x1="470" y1="162" x2="470" y2="178" stroke="#ef5350" stroke-width="1"/><rect x="466" y="164" width="8" height="8" fill="#ef5350" rx="1"/>
  <line x1="500" y1="161" x2="500" y2="176" stroke="#26a69a" stroke-width="1"/><rect x="496" y="163" width="8" height="8" fill="#26a69a" rx="1"/>

  <!-- Breakout -->
  <line x1="535" y1="115" x2="535" y2="170" stroke="#00e676" stroke-width="1.5"/><rect x="529" y="120" width="12" height="40" fill="#00e676" rx="1" filter="url(#glow)"/>
  <line x1="565" y1="100" x2="565" y2="140" stroke="#26a69a" stroke-width="1"/><rect x="561" y="105" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="595" y1="90" x2="595" y2="130" stroke="#26a69a" stroke-width="1"/><rect x="591" y="95" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="625" y1="105" x2="625" y2="135" stroke="#ef5350" stroke-width="1"/><rect x="621" y="108" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="655" y1="85" x2="655" y2="120" stroke="#26a69a" stroke-width="1"/><rect x="651" y="88" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Consolidation zone label -->
  <text x="385" y="142" text-anchor="middle" fill="#00e676" font-size="10" font-weight="500">High Quality Consolidation</text>

  <!-- Range contraction arrows -->
  <line x1="250" y1="125" x2="520" y2="155" stroke="#888" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="250" y1="215" x2="520" y2="185" stroke="#888" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="530" y="175" fill="#888" font-size="8">Range contracting</text>

  <!-- Separator -->
  <line x1="60" y1="260" x2="760" y2="260" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="275" fill="#666" font-size="9">Quality Score</text>

  <!-- Quality score oscillator (y=275 to y=420) -->
  <!-- Score 0 at y=420, Score 100 at y=275 -->
  <!-- Threshold line at 70 = y=275 + (100-70)/100 * 145 = y=318.5 -->
  <line x1="80" y1="318" x2="740" y2="318" stroke="#00e676" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="745" y="322" fill="#00e676" font-size="8">70</text>

  <!-- Quality score line -->
  <polyline fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.9"
    points="100,395 130,400 160,390 190,398 220,385 260,360 290,340 320,320 350,305 380,295 410,288 440,282 470,280 500,278 535,310 565,350 595,370 625,380 655,390"/>

  <!-- High quality zone fill -->
  <rect x="335" y="270" width="185" height="48" fill="#00e676" fill-opacity="0.06" rx="3"/>

  <!-- Sub-score annotations -->
  <rect x="90" y="380" width="95" height="32" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="137" y="394" text-anchor="middle" fill="#bbb" font-size="8">Range: 25</text>
  <text x="137" y="406" text-anchor="middle" fill="#bbb" font-size="8">Vol: 30 | MA: 20</text>

  <rect x="400" y="275" width="95" height="32" rx="4" fill="#00e676" fill-opacity="0.1"/>
  <text x="447" y="289" text-anchor="middle" fill="#00e676" font-size="8">Range: 92</text>
  <text x="447" y="301" text-anchor="middle" fill="#00e676" font-size="8">Vol: 85 | MA: 78</text>

  <!-- Y-axis labels -->
  <text x="72" y="280" text-anchor="end" fill="#666" font-size="8">100</text>
  <text x="72" y="350" text-anchor="end" fill="#666" font-size="8">50</text>
  <text x="72" y="420" text-anchor="end" fill="#666" font-size="8">0</text>

  <!-- Volume bars (declining during consolidation) -->
  <g opacity="0.5">
    <rect x="96" y="425" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="126" y="422" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="156" y="420" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="186" y="423" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="216" y="425" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="256" y="428" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="286" y="430" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="316" y="432" width="8" height="8" fill="#ef5350" rx="1"/>
    <rect x="346" y="434" width="8" height="6" fill="#26a69a" rx="1"/>
    <rect x="376" y="435" width="8" height="5" fill="#ef5350" rx="1"/>
    <rect x="406" y="436" width="8" height="4" fill="#26a69a" rx="1"/>
    <rect x="436" y="436" width="8" height="4" fill="#26a69a" rx="1"/>
    <rect x="466" y="437" width="8" height="3" fill="#ef5350" rx="1"/>
    <rect x="496" y="437" width="8" height="3" fill="#26a69a" rx="1"/>
  </g>
  <rect x="529" y="415" width="12" height="25" fill="#00e676" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="561" y="422" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="591" y="425" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="621" y="428" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="651" y="425" width="8" height="15" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">Quality Score</text>
    <circle cx="140" cy="20" r="4" fill="#00e676"/>
    <text x="150" y="24" fill="#999" font-size="9">High Quality Zone (>70)</text>
    <rect x="290" y="12" width="20" height="16" fill="#00e676" opacity="0.3" rx="2"/>
    <text x="315" y="24" fill="#999" font-size="9">Consolidation Zone</text>
    <circle cx="450" cy="20" r="4" fill="#ef5350"/>
    <text x="460" y="24" fill="#999" font-size="9">Bearish Candle</text>
    <circle cx="560" cy="20" r="4" fill="#26a69a"/>
    <text x="570" y="24" fill="#999" font-size="9">Bullish Candle</text>
  </g>
</svg>