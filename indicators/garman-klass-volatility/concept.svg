<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Garman-Klass Volatility</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart with candlesticks -->
  <line x1="60" y1="70" x2="60" y2="200" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="200" x2="750" y2="200" stroke="#333" stroke-width="1"/>
  <text x="55" y="80" text-anchor="end" fill="#666" font-size="9">Price</text>

  <!-- Mixed candles showing range variation -->
  <line x1="100" y1="110" x2="100" y2="170" stroke="#555" stroke-width="1"/>
  <rect x="95" y="125" width="10" height="25" fill="#4CAF50" rx="1"/>
  <line x1="160" y1="100" x2="160" y2="185" stroke="#555" stroke-width="1"/>
  <rect x="155" y="110" width="10" height="55" fill="#4CAF50" rx="1"/>
  <line x1="220" y1="85" x2="220" y2="195" stroke="#555" stroke-width="1"/>
  <rect x="215" y="100" width="10" height="70" fill="#ff1744" rx="1"/>
  <line x1="280" y1="105" x2="280" y2="175" stroke="#555" stroke-width="1"/>
  <rect x="275" y="120" width="10" height="30" fill="#4CAF50" rx="1"/>
  <line x1="340" y1="110" x2="340" y2="165" stroke="#555" stroke-width="1"/>
  <rect x="335" y="125" width="10" height="20" fill="#4CAF50" rx="1"/>
  <line x1="400" y1="115" x2="400" y2="160" stroke="#555" stroke-width="1"/>
  <rect x="395" y="125" width="10" height="18" fill="#ff1744" rx="1"/>
  <line x1="460" y1="120" x2="460" y2="155" stroke="#555" stroke-width="1"/>
  <rect x="455" y="128" width="10" height="15" fill="#4CAF50" rx="1"/>
  <line x1="520" y1="105" x2="520" y2="180" stroke="#555" stroke-width="1"/>
  <rect x="515" y="115" width="10" height="45" fill="#ff1744" rx="1"/>
  <line x1="580" y1="100" x2="580" y2="190" stroke="#555" stroke-width="1"/>
  <rect x="575" y="110" width="10" height="60" fill="#4CAF50" rx="1"/>
  <line x1="640" y1="110" x2="640" y2="165" stroke="#555" stroke-width="1"/>
  <rect x="635" y="120" width="10" height="25" fill="#4CAF50" rx="1"/>
  <line x1="700" y1="105" x2="700" y2="160" stroke="#555" stroke-width="1"/>
  <rect x="695" y="118" width="10" height="22" fill="#4CAF50" rx="1"/>

  <!-- Volatility subplot -->
  <line x1="60" y1="230" x2="750" y2="230" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="230" x2="60" y2="430" stroke="#333" stroke-width="1"/>
  <text x="30" y="330" text-anchor="middle" fill="#666" font-size="9" transform="rotate(-90,30,330)">Vol %</text>

  <!-- Close-to-close vol (gray) -->
  <polyline points="100,360 160,340 220,310 280,340 340,360 400,370 460,375 520,330 580,310 640,345 700,355" stroke="#888888" stroke-width="1" fill="none" stroke-dasharray="4,3"/>

  <!-- GK raw -->
  <polyline points="100,355 160,320 220,280 280,330 340,355 400,365 460,372 520,305 580,275 640,335 700,350" stroke="#42A5F5" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- GK smooth -->
  <polyline points="100,358 160,335 220,300 280,330 340,350 400,360 460,368 520,325 580,295 640,335 700,348" stroke="#FFA726" stroke-width="2" fill="none"/>

  <!-- Annotation showing GK captures more -->
  <line x1="220" y1="280" x2="220" y2="310" stroke="#42A5F5" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="235" y="295" fill="#42A5F5" font-size="8">GK captures</text>
  <text x="235" y="305" fill="#42A5F5" font-size="8">intrabar range</text>

  <!-- Legend -->
  <rect x="140" y="455" width="12" height="12" fill="#42A5F5" rx="2"/>
  <text x="158" y="466" fill="#aaa" font-size="10">GK Raw</text>
  <rect x="250" y="455" width="12" height="12" fill="#FFA726" rx="2"/>
  <text x="268" y="466" fill="#aaa" font-size="10">GK Smooth</text>
  <rect x="380" y="455" width="12" height="12" fill="#888888" rx="2"/>
  <text x="398" y="466" fill="#aaa" font-size="10">Close-to-Close</text>
</svg>
