<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Supertrend Sensitivity Matrix</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Left side: Heatmap grid -->
  <text x="180" y="78" text-anchor="middle" fill="#bbb" font-size="11" font-weight="500">Score Heatmap</text>

  <!-- Grid labels -->
  <text x="68" y="140" text-anchor="end" fill="#888" font-size="8">ATR 5</text>
  <text x="68" y="170" text-anchor="end" fill="#888" font-size="8">ATR 10</text>
  <text x="68" y="200" text-anchor="end" fill="#888" font-size="8">ATR 15</text>
  <text x="68" y="230" text-anchor="end" fill="#888" font-size="8">ATR 20</text>
  <text x="68" y="260" text-anchor="end" fill="#888" font-size="8">ATR 25</text>

  <text x="90" y="118" text-anchor="middle" fill="#888" font-size="7">1.0</text>
  <text x="120" y="118" text-anchor="middle" fill="#888" font-size="7">1.5</text>
  <text x="150" y="118" text-anchor="middle" fill="#888" font-size="7">2.0</text>
  <text x="180" y="118" text-anchor="middle" fill="#888" font-size="7">2.5</text>
  <text x="210" y="118" text-anchor="middle" fill="#888" font-size="7">3.0</text>
  <text x="240" y="118" text-anchor="middle" fill="#888" font-size="7">3.5</text>
  <text x="270" y="118" text-anchor="middle" fill="#888" font-size="7">4.0</text>

  <text x="180" y="105" text-anchor="middle" fill="#888" font-size="8">Multiplier</text>

  <!-- Heatmap cells - varying colors from red (low) to green (high) -->
  <!-- Row 1: ATR 5 -->
  <rect x="76" y="125" width="28" height="25" fill="#ef5350" fill-opacity="0.3" rx="2"/>
  <rect x="106" y="125" width="28" height="25" fill="#ef5350" fill-opacity="0.2" rx="2"/>
  <rect x="136" y="125" width="28" height="25" fill="#ff9800" fill-opacity="0.25" rx="2"/>
  <rect x="166" y="125" width="28" height="25" fill="#26a69a" fill-opacity="0.2" rx="2"/>
  <rect x="196" y="125" width="28" height="25" fill="#26a69a" fill-opacity="0.15" rx="2"/>
  <rect x="226" y="125" width="28" height="25" fill="#ef5350" fill-opacity="0.15" rx="2"/>
  <rect x="256" y="125" width="28" height="25" fill="#ef5350" fill-opacity="0.1" rx="2"/>
  <!-- Row 2: ATR 10 -->
  <rect x="76" y="155" width="28" height="25" fill="#ef5350" fill-opacity="0.2" rx="2"/>
  <rect x="106" y="155" width="28" height="25" fill="#ff9800" fill-opacity="0.2" rx="2"/>
  <rect x="136" y="155" width="28" height="25" fill="#26a69a" fill-opacity="0.3" rx="2"/>
  <rect x="166" y="155" width="28" height="25" fill="#26a69a" fill-opacity="0.4" rx="2"/>
  <rect x="196" y="155" width="28" height="25" fill="#26a69a" fill-opacity="0.3" rx="2"/>
  <rect x="226" y="155" width="28" height="25" fill="#26a69a" fill-opacity="0.2" rx="2"/>
  <rect x="256" y="155" width="28" height="25" fill="#ef5350" fill-opacity="0.15" rx="2"/>
  <!-- Row 3: ATR 15 -->
  <rect x="76" y="185" width="28" height="25" fill="#ff9800" fill-opacity="0.2" rx="2"/>
  <rect x="106" y="185" width="28" height="25" fill="#26a69a" fill-opacity="0.3" rx="2"/>
  <rect x="136" y="185" width="28" height="25" fill="#26a69a" fill-opacity="0.4" rx="2"/>
  <rect x="166" y="185" width="28" height="25" fill="#00e676" fill-opacity="0.5" rx="2" stroke="#00e676" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="196" y="185" width="28" height="25" fill="#26a69a" fill-opacity="0.35" rx="2"/>
  <rect x="226" y="185" width="28" height="25" fill="#26a69a" fill-opacity="0.25" rx="2"/>
  <rect x="256" y="185" width="28" height="25" fill="#ff9800" fill-opacity="0.15" rx="2"/>
  <!-- Row 4: ATR 20 -->
  <rect x="76" y="215" width="28" height="25" fill="#ff9800" fill-opacity="0.15" rx="2"/>
  <rect x="106" y="215" width="28" height="25" fill="#26a69a" fill-opacity="0.2" rx="2"/>
  <rect x="136" y="215" width="28" height="25" fill="#26a69a" fill-opacity="0.35" rx="2"/>
  <rect x="166" y="215" width="28" height="25" fill="#26a69a" fill-opacity="0.3" rx="2"/>
  <rect x="196" y="215" width="28" height="25" fill="#26a69a" fill-opacity="0.25" rx="2"/>
  <rect x="226" y="215" width="28" height="25" fill="#ff9800" fill-opacity="0.2" rx="2"/>
  <rect x="256" y="215" width="28" height="25" fill="#ef5350" fill-opacity="0.15" rx="2"/>
  <!-- Row 5: ATR 25 -->
  <rect x="76" y="245" width="28" height="25" fill="#ef5350" fill-opacity="0.15" rx="2"/>
  <rect x="106" y="245" width="28" height="25" fill="#ff9800" fill-opacity="0.15" rx="2"/>
  <rect x="136" y="245" width="28" height="25" fill="#26a69a" fill-opacity="0.2" rx="2"/>
  <rect x="166" y="245" width="28" height="25" fill="#26a69a" fill-opacity="0.25" rx="2"/>
  <rect x="196" y="245" width="28" height="25" fill="#ff9800" fill-opacity="0.2" rx="2"/>
  <rect x="226" y="245" width="28" height="25" fill="#ef5350" fill-opacity="0.15" rx="2"/>
  <rect x="256" y="245" width="28" height="25" fill="#ef5350" fill-opacity="0.2" rx="2"/>

  <!-- Optimal label -->
  <text x="180" y="202" text-anchor="middle" fill="#00e676" font-size="8" font-weight="600">OPTIMAL</text>

  <!-- Arrow from optimal to price chart -->
  <line x1="295" y1="197" x2="340" y2="197" stroke="#00e676" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <polygon points="340,193 340,201 350,197" fill="#00e676" opacity="0.6"/>

  <!-- Right side: Price with optimal supertrend line -->
  <text x="550" y="78" text-anchor="middle" fill="#bbb" font-size="11" font-weight="500">Optimal Supertrend (ATR 15, Mult 2.5)</text>

  <!-- Candlesticks -->
  <line x1="360" y1="180" x2="360" y2="230" stroke="#26a69a" stroke-width="1"/>
  <rect x="356" y="190" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="390" y1="170" x2="390" y2="215" stroke="#26a69a" stroke-width="1"/>
  <rect x="386" y="178" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="420" y1="160" x2="420" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="416" y="165" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="450" y1="155" x2="450" y2="190" stroke="#ef5350" stroke-width="1"/>
  <rect x="446" y="160" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="480" y1="150" x2="480" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="476" y="155" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="510" y1="145" x2="510" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="506" y="150" width="8" height="16" fill="#26a69a" rx="1"/>
  <!-- Trend flip -->
  <line x1="540" y1="140" x2="540" y2="175" stroke="#ef5350" stroke-width="1"/>
  <rect x="536" y="145" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="570" y1="155" x2="570" y2="195" stroke="#ef5350" stroke-width="1"/>
  <rect x="566" y="160" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="600" y1="170" x2="600" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="596" y="175" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="630" y1="185" x2="630" y2="225" stroke="#26a69a" stroke-width="1"/>
  <rect x="626" y="198" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="660" y1="180" x2="660" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="656" y="188" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="690" y1="172" x2="690" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="686" y="178" width="8" height="20" fill="#26a69a" rx="1"/>

  <!-- Supertrend line - bullish then bearish -->
  <polyline points="360,235 390,228 420,222 450,218 480,215 510,212 540,210" stroke="#26a69a" stroke-width="2" fill="none"/>
  <!-- Flip point -->
  <circle cx="540" cy="210" r="4" fill="#ef5350" filter="url(#softGlow)"/>
  <polyline points="540,135 570,138 600,142 630,148" stroke="#ef5350" stroke-width="2" fill="none"/>
  <!-- Flip back -->
  <circle cx="630" cy="148" r="4" fill="#26a69a" filter="url(#softGlow)"/>
  <polyline points="630,228 660,225 690,222" stroke="#26a69a" stroke-width="2" fill="none"/>

  <!-- Consensus meter at bottom -->
  <text x="180" y="305" text-anchor="middle" fill="#bbb" font-size="10" font-weight="500">Consensus Strength</text>
  <rect x="80" y="312" width="200" height="16" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <rect x="80" y="312" width="170" height="16" rx="4" fill="#26a69a" fill-opacity="0.4"/>
  <text x="180" y="324" text-anchor="middle" fill="#e0e0e0" font-size="9" font-weight="600">85% Bullish</text>

  <!-- Divergence score -->
  <text x="180" y="350" text-anchor="middle" fill="#bbb" font-size="10" font-weight="500">Parameter Divergence</text>
  <rect x="80" y="357" width="200" height="16" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <rect x="80" y="357" width="60" height="16" rx="4" fill="#42a5f5" fill-opacity="0.4"/>
  <text x="180" y="369" text-anchor="middle" fill="#e0e0e0" font-size="9" font-weight="600">30% (Low)</text>

  <!-- Rolling score line in bottom panel -->
  <text x="550" y="290" text-anchor="middle" fill="#bbb" font-size="10" font-weight="500">Rolling Optimal Score</text>
  <polyline points="360,380 390,370 420,355 450,340 480,335 510,330 540,345 570,360 600,365 630,350 660,335 690,325" stroke="#ff9800" stroke-width="1.5" fill="none"/>
  <line x1="355" y1="350" x2="700" y2="350" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="710" y="354" fill="#666" font-size="8">Avg</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="356" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="386" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="416" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="446" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="476" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="506" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="536" y="390" width="8" height="25" fill="#ef5350" rx="1"/>
    <rect x="566" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="596" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="626" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="656" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="686" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Bullish Supertrend</text>
    <circle cx="155" cy="20" r="4" fill="#ef5350"/>
    <text x="165" y="24" fill="#999" font-size="9">Bearish Supertrend</text>
    <circle cx="290" cy="20" r="4" fill="#00e676"/>
    <text x="300" y="24" fill="#999" font-size="9">Optimal Cell</text>
    <circle cx="400" cy="20" r="4" fill="#ff9800"/>
    <text x="410" y="24" fill="#999" font-size="9">Rolling Score</text>
    <circle cx="520" cy="20" r="4" fill="#42a5f5"/>
    <text x="530" y="24" fill="#999" font-size="9">Divergence</text>
  </g>
</svg>