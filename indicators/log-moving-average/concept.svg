  <text x="204" y="340" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="bold">SELL</text>

  <polygon points="496,200 504,210 512,200 508,200 508,190 500,190 500,200" fill="#ef5350" filter="url(#glowStrong)"/>
  <text x="504" y="222" text-anchor="middle" fill="#ef5350" font-size="8" font-weight="bold">SELL</text>

  <!-- Inset: Log weighting curve (top-right) -->
  <rect x="610" y="60" width="175" height="130" fill="#0d1525" fill-opacity="0.85" stroke="#334466" stroke-width="1" rx="6"/>
  <text x="697" y="80" text-anchor="middle" fill="#99aabb" font-size="10" font-weight="600">Log Weight Decay</text>
  <text x="625" y="96" fill="#556677" font-size="7">w(i) = ln(N - i + 1)</text>

  <!-- Inset axes -->
  <line x1="635" y1="100" x2="635" y2="175" stroke="#445566" stroke-width="0.8"/>
  <line x1="635" y1="175" x2="770" y2="175" stroke="#445566" stroke-width="0.8"/>
  <text x="632" y="108" text-anchor="end" fill="#445566" font-size="7">W</text>
  <text x="770" y="184" text-anchor="end" fill="#445566" font-size="7">Period (i)</text>

  <!-- Log curve (weight decay) -->
  <polyline points="640,108 650,118 660,126 672,134 686,142 702,150 720,157 740,163 758,168 770,172" fill="none" stroke="#4fc3f7" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)"/>

