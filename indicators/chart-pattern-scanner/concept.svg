<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Chart Pattern Scanner</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Head and Shoulders pattern -->
  <!-- Left shoulder -->
  <line x1="100" y1="280" x2="100" y2="320" stroke="#26a69a" stroke-width="1"/><rect x="96" y="285" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="130" y1="220" x2="130" y2="270" stroke="#26a69a" stroke-width="1"/><rect x="126" y="228" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="160" y1="180" x2="160" y2="240" stroke="#26a69a" stroke-width="1"/><rect x="156" y="188" width="8" height="35" fill="#26a69a" rx="1"/>
  <line x1="190" y1="210" x2="190" y2="260" stroke="#ef5350" stroke-width="1"/><rect x="186" y="218" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="220" y1="250" x2="220" y2="300" stroke="#ef5350" stroke-width="1"/><rect x="216" y="258" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- Head -->
  <line x1="250" y1="200" x2="250" y2="260" stroke="#26a69a" stroke-width="1"/><rect x="246" y="208" width="8" height="35" fill="#26a69a" rx="1"/>
  <line x1="280" y1="150" x2="280" y2="210" stroke="#26a69a" stroke-width="1"/><rect x="276" y="158" width="8" height="38" fill="#26a69a" rx="1"/>
  <line x1="310" y1="110" x2="310" y2="175" stroke="#26a69a" stroke-width="1"/><rect x="306" y="118" width="8" height="40" fill="#26a69a" rx="1"/>
  <line x1="340" y1="155" x2="340" y2="215" stroke="#ef5350" stroke-width="1"/><rect x="336" y="162" width="8" height="38" fill="#ef5350" rx="1"/>
  <line x1="370" y1="210" x2="370" y2="270" stroke="#ef5350" stroke-width="1"/><rect x="366" y="218" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="400" y1="248" x2="400" y2="300" stroke="#ef5350" stroke-width="1"/><rect x="396" y="255" width="8" height="30" fill="#ef5350" rx="1"/>

  <!-- Right shoulder -->
  <line x1="430" y1="210" x2="430" y2="265" stroke="#26a69a" stroke-width="1"/><rect x="426" y="218" width="8" height="32" fill="#26a69a" rx="1"/>
  <line x1="460" y1="178" x2="460" y2="238" stroke="#26a69a" stroke-width="1"/><rect x="456" y="185" width="8" height="35" fill="#26a69a" rx="1"/>
  <line x1="490" y1="215" x2="490" y2="265" stroke="#ef5350" stroke-width="1"/><rect x="486" y="222" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="520" y1="260" x2="520" y2="310" stroke="#ef5350" stroke-width="1"/><rect x="516" y="268" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- Neckline break candles -->
  <line x1="550" y1="290" x2="550" y2="340" stroke="#ef5350" stroke-width="1"/><rect x="546" y="295" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="580" y1="310" x2="580" y2="365" stroke="#ef5350" stroke-width="1.5"/><rect x="574" y="318" width="12" height="38" fill="#ef5350" rx="1" filter="url(#glow)"/>
  <line x1="610" y1="340" x2="610" y2="385" stroke="#ef5350" stroke-width="1"/><rect x="606" y="348" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="640" y1="350" x2="640" y2="390" stroke="#26a69a" stroke-width="1"/><rect x="636" y="360" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="670" y1="360" x2="670" y2="400" stroke="#ef5350" stroke-width="1"/><rect x="666" y="368" width="8" height="22" fill="#ef5350" rx="1"/>

  <!-- Swing point markers -->
  <circle cx="160" cy="175" r="5" fill="none" stroke="#ff9800" stroke-width="1.5" opacity="0.8"/>
  <text x="160" y="168" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="600">S1</text>
  <circle cx="220" cy="305" r="5" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.8"/>
  <circle cx="310" cy="105" r="5" fill="none" stroke="#ff9800" stroke-width="1.5" opacity="0.8"/>
  <text x="310" y="98" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="600">H</text>
  <circle cx="400" cy="305" r="5" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.8"/>
  <circle cx="460" cy="173" r="5" fill="none" stroke="#ff9800" stroke-width="1.5" opacity="0.8"/>
  <text x="460" y="166" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="600">S2</text>

  <!-- Neckline -->
  <line x1="200" y1="300" x2="600" y2="300" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="610" y="298" fill="#42a5f5" font-size="10" font-weight="500">Neckline</text>

  <!-- Trendline connecting highs (resistance polyfit) -->
  <line x1="140" y1="185" x2="480" y2="185" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Pattern annotation -->
  <rect x="130" y="80" width="180" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="220" y="95" text-anchor="middle" fill="#bbb" font-size="11">Head and Shoulders Pattern</text>

  <!-- Breakdown signal -->
  <g filter="url(#softGlow)">
    <polygon points="575,340 585,340 580,352" fill="#ef5350"/>
  </g>
  <rect x="588" y="335" width="100" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="638" y="349" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">BREAKDOWN</text>

  <!-- Pattern score annotation -->
  <rect x="620" y="80" width="120" height="38" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="680" y="98" text-anchor="middle" fill="#bbb" font-size="10">Pattern Score</text>
  <text x="680" y="113" text-anchor="middle" fill="#ef5350" font-size="13" font-weight="600">-85 (Bearish)</text>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="96" y="408" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="126" y="405" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="156" y="400" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="186" y="405" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="216" y="408" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="246" y="403" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="276" y="398" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="306" y="393" width="8" height="27" fill="#26a69a" rx="1"/>
    <rect x="336" y="400" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="366" y="405" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="396" y="408" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="426" y="405" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="456" y="403" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="486" y="405" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="516" y="403" width="8" height="17" fill="#ef5350" rx="1"/>
  </g>
  <rect x="544" y="388" width="12" height="32" fill="#ef5350" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="606" y="398" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="636" y="405" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="666" y="400" width="8" height="20" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">Swing Highs</text>
    <circle cx="130" cy="20" r="4" fill="#42a5f5"/>
    <text x="140" y="24" fill="#999" font-size="9">Swing Lows / Neckline</text>
    <circle cx="280" cy="20" r="4" fill="#ef5350"/>
    <text x="290" y="24" fill="#999" font-size="9">Bearish Pattern</text>
    <circle cx="400" cy="20" r="4" fill="#26a69a"/>
    <text x="410" y="24" fill="#999" font-size="9">Bullish Pattern</text>
    <rect x="520" y="12" width="20" height="16" fill="#ef5350" opacity="0.5" rx="2"/>
    <text x="545" y="24" fill="#999" font-size="9">Volume Surge</text>
  </g>
</svg>