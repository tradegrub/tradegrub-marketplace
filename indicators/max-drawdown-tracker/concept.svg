<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Max Drawdown Tracker</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <rect x="60" y="70" width="700" height="150" fill="rgba(255,255,255,0.02)" rx="4"/>
  <!-- Price line -->
  <polyline points="100,170 160,150 220,130 280,120 340,110 400,145 460,170 520,165 580,140 640,125 700,115" fill="none" stroke="#66BB6A" stroke-width="2" opacity="0.7"/>
  <!-- Running high -->
  <polyline points="100,170 160,150 220,130 280,120 340,110 400,110 460,110 520,110 580,110 640,110 700,110" fill="none" stroke="#FFEB3B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Drawdown shading -->
  <polygon points="400,145 460,170 520,165 580,140 640,125 700,115 700,110 640,110 580,110 520,110 460,110 400,110" fill="rgba(244,67,54,0.1)"/>

  <!-- DD subplot -->
  <rect x="60" y="250" width="700" height="180" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="270" fill="#888" font-family="Inter,sans-serif" font-size="10">Drawdown %</text>

  <!-- Zero line -->
  <line x1="60" y1="290" x2="760" y2="290" stroke="#888" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <text x="762" y="294" fill="#888" font-family="Inter,sans-serif" font-size="9">0%</text>
  <!-- -5% line -->
  <line x1="60" y1="350" x2="760" y2="350" stroke="#FFEB3B" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="762" y="354" fill="#FFEB3B" font-family="Inter,sans-serif" font-size="9">-5%</text>
  <!-- -10% line -->
  <line x1="60" y1="410" x2="760" y2="410" stroke="#EF5350" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="762" y="414" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">-10%</text>

  <!-- Deep DD bg -->
  <rect x="420" y="250" width="160" height="180" fill="rgba(244,67,54,0.06)"/>

  <!-- Current DD (orange) -->
  <polyline points="100,290 160,290 220,290 280,290 340,290 400,330 460,370 520,360 580,320 640,300 700,295" fill="none" stroke="#FF9800" stroke-width="1"/>
  <!-- Max DD (red) -->
  <polyline points="100,310 160,310 220,310 280,310 340,310 400,330 460,370 520,370 580,370 640,370 700,370" fill="none" stroke="#EF5350" stroke-width="2"/>

  <!-- Legend -->
  <rect x="60" y="460" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="475" x2="100" y2="475" stroke="#EF5350" stroke-width="2"/>
  <text x="105" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Max Drawdown</text>
  <line x1="250" y1="475" x2="270" y2="475" stroke="#FF9800" stroke-width="1"/>
  <text x="275" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Current DD</text>
  <rect x="410" y="470" width="10" height="10" fill="rgba(244,67,54,0.3)"/>
  <text x="425" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Deep DD Zone</text>
</svg>
