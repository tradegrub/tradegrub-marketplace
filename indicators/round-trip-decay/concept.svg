<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" in="SourceGraphic" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" rx="8" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#fff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
  </g>
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" fill="white" font-weight="bold">Decennial Cycle Projection</text>
  <text x="400" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#888">tradegrub.finance</text>
  <!-- Y-axis: -5% to +15%, chart area y=90 to y=390, so 300px for 20% range, 15px per % -->
  <!-- 0% line at y=315 (15*15=225 from top=90 => 90+225=315) -->
  <!-- +15% at y=90, +10% at y=165, +5% at y=240, 0% at y=315, -5% at y=390 -->
  <!-- Y-axis labels -->
  <text x="55" y="94" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">+15%</text>
  <text x="55" y="169" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">+10%</text>
  <text x="55" y="244" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">+5%</text>
  <text x="55" y="319" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">0%</text>
  <text x="55" y="394" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="end">-5%</text>
  <!-- Zero line -->
  <line x1="65" y1="315" x2="740" y2="315" stroke="#555" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- Bars: 10 bars, x from 90 to 720, each bar width=50, gap=15, total=10*65=650, start=90 -->
  <!-- Y1=+12% => h=180, top=315-180=135 -->
  <rect x="90" y="135" width="50" height="180" rx="3" fill="#4caf50" opacity="0.7"/>
  <text x="115" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4caf50">+12%</text>
  <text x="115" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">Yr 1</text>
  <!-- Y2=+8% => h=120, top=195 -->
  <rect x="155" y="195" width="50" height="120" rx="3" fill="#4caf50" opacity="0.7"/>
  <text x="180" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4caf50">+8%</text>
  <text x="180" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">Yr 2</text>
  <!-- Y3=+3% => h=45, top=270 -->
  <rect x="220" y="270" width="50" height="45" rx="3" fill="#4caf50" opacity="0.7"/>
  <text x="245" y="263" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4caf50">+3%</text>
  <text x="245" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">Yr 3</text>
  <!-- Y4=-2% => h=30, top=315 (extends down) -->
  <rect x="285" y="315" width="50" height="30" rx="3" fill="#ef5350" opacity="0.7"/>
  <text x="310" y="358" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ef5350">-2%</text>
  <text x="310" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">Yr 4</text>
  <!-- Y5=+6% => h=90, top=225 -->
  <rect x="350" y="225" width="50" height="90" rx="3" fill="#4caf50" opacity="0.7"/>
  <text x="375" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4caf50">+6%</text>
  <text x="375" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">Yr 5</text>
  <!-- Y6=+10% => h=150, top=165 -->
  <rect x="415" y="165" width="50" height="150" rx="3" fill="#4caf50" opacity="0.7"/>
  <text x="440" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4caf50">+10%</text>
  <text x="440" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">Yr 6</text>
  <!-- Y7=+14% => h=210, top=105 — highlighted -->
  <rect x="480" y="105" width="50" height="210" rx="3" fill="#4caf50" opacity="0.7" stroke="#ffd740" stroke-width="2" filter="url(#glow)"/>
  <text x="505" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ffd740" font-weight="bold">+14%</text>
  <text x="505" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#ffd740" font-weight="bold">Yr 7</text>
  <!-- Arrow pointing to Year 7 -->
  <line x1="505" y1="72" x2="505" y2="88" stroke="#ffd740" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="505" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#ffd740">Current Position: Year 7</text>
  <!-- Y8=+5% => h=75, top=240 -->
  <rect x="545" y="240" width="50" height="75" rx="3" fill="#4caf50" opacity="0.35"/>
  <text x="570" y="233" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#aaa">+5%</text>
  <text x="570" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">Yr 8</text>
  <!-- Y9=-1% => h=15, top=315 -->
  <rect x="610" y="315" width="50" height="15" rx="3" fill="#ef5350" opacity="0.35"/>
  <text x="635" y="343" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#aaa">-1%</text>
  <text x="635" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">Yr 9</text>
  <!-- Y10=+7% => h=105, top=210 -->
  <rect x="675" y="210" width="50" height="105" rx="3" fill="#4caf50" opacity="0.35"/>
  <text x="700" y="203" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#aaa">+7%</text>
  <text x="700" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888">Yr 10</text>
  <!-- Forward projection dashed line from Y7 to Y10 tops -->
  <polyline points="505,105 570,240 635,315 700,210" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <!-- Legend bar -->
  <rect x="0" y="440" width="800" height="60" fill="#0d0d1a" opacity="0.7"/>
  <rect x="180" y="461" width="14" height="14" rx="2" fill="#4caf50" opacity="0.7"/>
  <text x="200" y="472" font-family="Arial,sans-serif" font-size="11" fill="#ccc">Historical Avg</text>
  <rect x="320" y="461" width="14" height="14" rx="2" fill="#4caf50" opacity="0.7" stroke="#ffd740" stroke-width="2"/>
  <text x="340" y="472" font-family="Arial,sans-serif" font-size="11" fill="#ccc">Current Year</text>
  <line x1="470" y1="468" x2="500" y2="468" stroke="white" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="506" y="472" font-family="Arial,sans-serif" font-size="11" fill="#ccc">Forward Projection</text>
</svg>