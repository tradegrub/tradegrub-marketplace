    <line x1="265" y1="295" x2="265" y2="312" stroke="#ef5350" stroke-width="1"/><rect x="262" y="298" width="6" height="8" fill="#ef5350" rx="1"/>
    <line x1="290" y1="308" x2="290" y2="322" stroke="#ef5350" stroke-width="1"/><rect x="287" y="310" width="6" height="6" fill="#ef5350" rx="1"/>
    <line x1="315" y1="312" x2="315" y2="322" stroke="#26a69a" stroke-width="1"/><rect x="312" y="313" width="6" height="5" fill="#26a69a" rx="1"/>
    <line x1="340" y1="308" x2="340" y2="320" stroke="#26a69a" stroke-width="1"/><rect x="337" y="310" width="6" height="6" fill="#26a69a" rx="1"/>
    <line x1="365" y1="298" x2="365" y2="312" stroke="#26a69a" stroke-width="1"/><rect x="362" y="300" width="6" height="8" fill="#26a69a" rx="1"/>
    <line x1="390" y1="284" x2="390" y2="298" stroke="#26a69a" stroke-width="1"/><rect x="387" y="286" width="6" height="8" fill="#26a69a" rx="1"/>
    <line x1="415" y1="266" x2="415" y2="280" stroke="#26a69a" stroke-width="1"/><rect x="412" y="268" width="6" height="8" fill="#26a69a" rx="1"/>
    <line x1="440" y1="248" x2="440" y2="262" stroke="#26a69a" stroke-width="1"/><rect x="437" y="250" width="6" height="8" fill="#26a69a" rx="1"/>
    <line x1="465" y1="232" x2="465" y2="245" stroke="#26a69a" stroke-width="1"/><rect x="462" y="234" width="6" height="7" fill="#26a69a" rx="1"/>
    <line x1="490" y1="215" x2="490" y2="228" stroke="#26a69a" stroke-width="1"/><rect x="487" y="217" width="6" height="7" fill="#26a69a" rx="1"/>
    <line x1="515" y1="198" x2="515" y2="212" stroke="#26a69a" stroke-width="1"/><rect x="512" y="200" width="6" height="8" fill="#26a69a" rx="1"/>
    <line x1="540" y1="185" x2="540" y2="200" stroke="#26a69a" stroke-width="1"/><rect x="537" y="188" width="6" height="8" fill="#26a69a" rx="1"/>
    <line x1="565" y1="172" x2="565" y2="185" stroke="#26a69a" stroke-width="1"/><rect x="562" y="174" width="6" height="7" fill="#26a69a" rx="1"/>
    <line x1="590" y1="158" x2="590" y2="172" stroke="#26a69a" stroke-width="1"/><rect x="587" y="160" width="6" height="8" fill="#26a69a" rx="1"/>
    <line x1="615" y1="148" x2="615" y2="162" stroke="#26a69a" stroke-width="1"/><rect x="612" y="150" width="6" height="8" fill="#26a69a" rx="1"/>
    <line x1="640" y1="142" x2="640" y2="155" stroke="#26a69a" stroke-width="1"/><rect x="637" y="144" width="6" height="7" fill="#26a69a" rx="1"/>
    <line x1="665" y1="135" x2="665" y2="148" stroke="#26a69a" stroke-width="1"/><rect x="662" y="137" width="6" height="7" fill="#26a69a" rx="1"/>
    <line x1="690" y1="130" x2="690" y2="142" stroke="#ef5350" stroke-width="1"/><rect x="687" y="132" width="6" height="6" fill="#ef5350" rx="1"/>
    <line x1="715" y1="128" x2="715" y2="140" stroke="#26a69a" stroke-width="1"/><rect x="712" y="130" width="6" height="6" fill="#26a69a" rx="1"/>
  </g>

