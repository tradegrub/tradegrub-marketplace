  <rect x="462" y="215" width="95" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="509" y="229" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">Bull Reversal</text>

