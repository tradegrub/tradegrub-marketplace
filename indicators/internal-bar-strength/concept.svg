    <!-- Candle data: realistic uptrend then pullback then recovery -->
    <line x1="75" y1="195" x2="75" y2="220" stroke="#94a3b8"/><rect x="72" y="200" width="6" height="14" fill="#22c55e"/>
    <line x1="90" y1="190" x2="90" y2="215" stroke="#94a3b8"/><rect x="87" y="195" width="6" height="12" fill="#22c55e"/>
    <line x1="105" y1="180" x2="105" y2="205" stroke="#94a3b8"/><rect x="102" y="185" width="6" height="15" fill="#22c55e"/>
    <line x1="120" y1="175" x2="120" y2="198" stroke="#94a3b8"/><rect x="117" y="178" width="6" height="14" fill="#22c55e"/>
    <line x1="135" y1="165" x2="135" y2="190" stroke="#94a3b8"/><rect x="132" y="170" width="6" height="13" fill="#22c55e"/>
    <line x1="150" y1="155" x2="150" y2="180" stroke="#94a3b8"/><rect x="147" y="160" width="6" height="14" fill="#22c55e"/>
    <line x1="165" y1="148" x2="165" y2="172" stroke="#94a3b8"/><rect x="162" y="150" width="6" height="16" fill="#22c55e"/>
    <line x1="180" y1="140" x2="180" y2="165" stroke="#94a3b8"/><rect x="177" y="145" width="6" height="12" fill="#22c55e"/>
    <line x1="195" y1="132" x2="195" y2="158" stroke="#94a3b8"/><rect x="192" y="135" width="6" height="16" fill="#22c55e"/>
    <line x1="210" y1="125" x2="210" y2="150" stroke="#94a3b8"/><rect x="207" y="128" width="6" height="15" fill="#22c55e"/>
    <line x1="225" y1="118" x2="225" y2="142" stroke="#94a3b8"/><rect x="222" y="120" width="6" height="14" fill="#22c55e"/>
    <line x1="240" y1="105" x2="240" y2="130" stroke="#94a3b8"/><rect x="237" y="108" width="6" height="16" fill="#22c55e"/>
    <!-- Peak and reversal -->
    <line x1="255" y1="95" x2="255" y2="125" stroke="#94a3b8"/><rect x="252" y="98" width="6" height="18" fill="#22c55e"/>
    <line x1="270" y1="92" x2="270" y2="118" stroke="#94a3b8"/><rect x="267" y="95" width="6" height="12" fill="#ef4444"/>
    <line x1="285" y1="88" x2="285" y2="115" stroke="#94a3b8"/><rect x="282" y="90" width="6" height="18" fill="#ef4444"/>
    <line x1="300" y1="95" x2="300" y2="120" stroke="#94a3b8"/><rect x="297" y="100" width="6" height="14" fill="#ef4444"/>
    <line x1="315" y1="105" x2="315" y2="132" stroke="#94a3b8"/><rect x="312" y="110" width="6" height="16" fill="#ef4444"/>
    <line x1="330" y1="115" x2="330" y2="142" stroke="#94a3b8"/><rect x="327" y="120" width="6" height="15" fill="#ef4444"/>
    <line x1="345" y1="125" x2="345" y2="155" stroke="#94a3b8"/><rect x="342" y="132" width="6" height="16" fill="#ef4444"/>
    <line x1="360" y1="140" x2="360" y2="170" stroke="#94a3b8"/><rect x="357" y="145" width="6" height="18" fill="#ef4444"/>
    <line x1="375" y1="150" x2="375" y2="180" stroke="#94a3b8"/><rect x="372" y="155" width="6" height="18" fill="#ef4444"/>
    <line x1="390" y1="162" x2="390" y2="192" stroke="#94a3b8"/><rect x="387" y="168" width="6" height="17" fill="#ef4444"/>
    <line x1="405" y1="170" x2="405" y2="200" stroke="#94a3b8"/><rect x="402" y="175" width="6" height="18" fill="#ef4444"/>
    <!-- Oversold bounce -->
    <line x1="420" y1="178" x2="420" y2="210" stroke="#94a3b8"/><rect x="417" y="182" width="6" height="20" fill="#ef4444"/>
    <line x1="435" y1="185" x2="435" y2="218" stroke="#94a3b8"/><rect x="432" y="190" width="6" height="18" fill="#ef4444"/>
    <line x1="450" y1="188" x2="450" y2="220" stroke="#94a3b8"/><rect x="447" y="192" width="6" height="16" fill="#22c55e"/>
    <line x1="465" y1="180" x2="465" y2="210" stroke="#94a3b8"/><rect x="462" y="184" width="6" height="18" fill="#22c55e"/>
    <line x1="480" y1="170" x2="480" y2="198" stroke="#94a3b8"/><rect x="477" y="174" width="6" height="16" fill="#22c55e"/>
    <line x1="495" y1="162" x2="495" y2="188" stroke="#94a3b8"/><rect x="492" y="165" width="6" height="15" fill="#22c55e"/>
    <line x1="510" y1="152" x2="510" y2="178" stroke="#94a3b8"/><rect x="507" y="155" width="6" height="16" fill="#22c55e"/>
    <line x1="525" y1="142" x2="525" y2="168" stroke="#94a3b8"/><rect x="522" y="145" width="6" height="14" fill="#22c55e"/>
    <line x1="540" y1="130" x2="540" y2="158" stroke="#94a3b8"/><rect x="537" y="133" width="6" height="16" fill="#22c55e"/>
    <line x1="555" y1="120" x2="555" y2="148" stroke="#94a3b8"/><rect x="552" y="124" width="6" height="14" fill="#22c55e"/>
    <line x1="570" y1="112" x2="570" y2="138" stroke="#94a3b8"/><rect x="567" y="115" width="6" height="16" fill="#22c55e"/>
    <line x1="585" y1="105" x2="585" y2="132" stroke="#94a3b8"/><rect x="582" y="108" width="6" height="16" fill="#22c55e"/>
    <line x1="600" y1="98" x2="600" y2="125" stroke="#94a3b8"/><rect x="597" y="100" width="6" height="18" fill="#22c55e"/>
    <line x1="615" y1="92" x2="615" y2="118" stroke="#94a3b8"/><rect x="612" y="95" width="6" height="14" fill="#22c55e"/>
    <!-- Topping again -->
    <line x1="630" y1="85" x2="630" y2="112" stroke="#94a3b8"/><rect x="627" y="88" width="6" height="16" fill="#22c55e"/>
    <line x1="645" y1="80" x2="645" y2="108" stroke="#94a3b8"/><rect x="642" y="84" width="6" height="14" fill="#ef4444"/>
    <line x1="660" y1="82" x2="660" y2="112" stroke="#94a3b8"/><rect x="657" y="88" width="6" height="16" fill="#ef4444"/>
    <line x1="675" y1="90" x2="675" y2="118" stroke="#94a3b8"/><rect x="672" y="95" width="6" height="15" fill="#ef4444"/>
    <line x1="690" y1="100" x2="690" y2="130" stroke="#94a3b8"/><rect x="687" y="105" width="6" height="18" fill="#ef4444"/>
    <line x1="705" y1="110" x2="705" y2="138" stroke="#94a3b8"/><rect x="702" y="115" width="6" height="16" fill="#ef4444"/>
    <line x1="720" y1="120" x2="720" y2="150" stroke="#94a3b8"/><rect x="717" y="125" width="6" height="18" fill="#ef4444"/>
    <line x1="735" y1="128" x2="735" y2="158" stroke="#94a3b8"/><rect x="732" y="133" width="6" height="16" fill="#ef4444"/>
    <line x1="750" y1="135" x2="750" y2="165" stroke="#94a3b8"/><rect x="747" y="140" width="6" height="16" fill="#22c55e"/>
  </g>

  <!-- IBS Panel: y 280 (=1.0) to y 435 (=0.0), range 155px -->
  <!-- Overbought zone: 0.8-1.0 = y 280 to y 311 -->
  <rect x="60" y="280" width="700" height="31" fill="url(#obZone)"/>
  <line x1="60" y1="311" x2="760" y2="311" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Oversold zone: 0.0-0.2 = y 404 to y 435 -->
  <rect x="60" y="404" width="700" height="31" fill="url(#osZone)"/>
  <line x1="60" y1="404" x2="760" y2="404" stroke="#22c55e" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- IBS line (smoothed) -->
  <polyline fill="none" stroke="#38bdf8" stroke-width="1.6" filter="url(#glow)" points="
    75,370 90,355 105,340 120,330 135,310 150,295 165,288 180,285 195,290 210,285
    225,282 240,288 255,295 270,308 285,320 300,340 315,355 330,370 345,388
    360,400 375,410 390,418 405,425 420,428 435,430 450,422 465,408 480,395
    495,378 510,360 525,345 540,328 555,312 570,298 585,290 600,285 615,282
    630,284 645,290 660,305 675,320 690,338 705,355 720,375 735,395 750,408
  "/>

  <!-- Signal line (slower) -->
  <polyline fill="none" stroke="#f472b6" stroke-width="1.2" stroke-dasharray="4,2" points="
    75,365 90,358 105,348 120,340 135,325 150,310 165,300 180,295 195,292 210,290
    225,288 240,290 255,295 270,305 285,318 300,335 315,350 330,365 345,380
    360,392 375,402 390,412 405,420 420,424 435,425 450,420 465,410 480,398
    495,382 510,365 525,348 540,335 555,320 570,308 585,298 600,290 615,286
    630,288 645,295 660,308 675,322 690,340 705,355 720,370 735,388 750,400
  "/>

  <!-- Callouts at OB/OS extremes -->
  <text x="190" y="278" fill="#ef4444" font-family="Arial,sans-serif" font-size="9" font-weight="bold">OB</text>
  <text x="600" y="278" fill="#ef4444" font-family="Arial,sans-serif" font-size="9" font-weight="bold">OB</text>
  <text x="425" y="442" fill="#22c55e" font-family="Arial,sans-serif" font-size="9" font-weight="bold">OS</text>

  <!-- Legend bar -->
  <rect x="60" y="455" width="680" height="36" rx="4" fill="#0f172a" fill-opacity="0.7"/>
  <line x1="90" y1="473" x2="115" y2="473" stroke="#38bdf8" stroke-width="2"/>
  <text x="122" y="477" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">IBS Line</text>
  <line x1="210" y1="473" x2="235" y2="473" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="242" y="477" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">Signal Line</text>
  <rect x="350" y="468" width="14" height="10" rx="2" fill="#ef4444" opacity="0.25"/>
  <rect x="370" y="468" width="14" height="10" rx="2" fill="#22c55e" opacity="0.25"/>
  <text x="390" y="477" fill="#94a3b8" font-family="Arial,sans-serif" font-size="10">OB/OS Zones</text>
</svg>