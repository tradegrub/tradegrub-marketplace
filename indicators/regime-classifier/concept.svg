<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Regime Classifier</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="150" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="88" fill="#888" font-family="Inter,sans-serif" font-size="10">Price</text>
  <!-- Bull phase -->
  <rect x="60" y="70" width="220" height="150" fill="rgba(76,175,80,0.05)"/>
  <text x="170" y="88" text-anchor="middle" fill="#4CAF50" font-family="Inter,sans-serif" font-size="10">BULL</text>
  <!-- Range phase -->
  <rect x="280" y="70" width="200" height="150" fill="rgba(255,193,7,0.05)"/>
  <text x="380" y="88" text-anchor="middle" fill="#ffc107" font-family="Inter,sans-serif" font-size="10">RANGE</text>
  <!-- Bull again -->
  <rect x="480" y="70" width="280" height="150" fill="rgba(76,175,80,0.05)"/>
  <text x="620" y="88" text-anchor="middle" fill="#4CAF50" font-family="Inter,sans-serif" font-size="10">BULL</text>

  <line x1="100" y1="170" x2="100" y2="195" stroke="#555" stroke-width="1"/><rect x="96" y="173" width="8" height="15" fill="#4CAF50" rx="1"/>
  <line x1="150" y1="158" x2="150" y2="185" stroke="#555" stroke-width="1"/><rect x="146" y="161" width="8" height="16" fill="#4CAF50" rx="1"/>
  <line x1="200" y1="145" x2="200" y2="175" stroke="#555" stroke-width="1"/><rect x="196" y="148" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="250" y1="135" x2="250" y2="165" stroke="#555" stroke-width="1"/><rect x="246" y="138" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="300" y1="138" x2="300" y2="165" stroke="#555" stroke-width="1"/><rect x="296" y="145" width="8" height="15" fill="#f44336" rx="1"/>
  <line x1="350" y1="135" x2="350" y2="162" stroke="#555" stroke-width="1"/><rect x="346" y="138" width="8" height="15" fill="#4CAF50" rx="1"/>
  <line x1="400" y1="140" x2="400" y2="168" stroke="#555" stroke-width="1"/><rect x="396" y="148" width="8" height="15" fill="#f44336" rx="1"/>
  <line x1="450" y1="138" x2="450" y2="165" stroke="#555" stroke-width="1"/><rect x="446" y="141" width="8" height="15" fill="#4CAF50" rx="1"/>
  <line x1="500" y1="132" x2="500" y2="160" stroke="#555" stroke-width="1"/><rect x="496" y="135" width="8" height="16" fill="#4CAF50" rx="1"/>
  <line x1="550" y1="122" x2="550" y2="152" stroke="#555" stroke-width="1"/><rect x="546" y="125" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="600" y1="112" x2="600" y2="145" stroke="#555" stroke-width="1"/><rect x="596" y="115" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="650" y1="105" x2="650" y2="138" stroke="#555" stroke-width="1"/><rect x="646" y="108" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="700" y1="98" x2="700" y2="132" stroke="#555" stroke-width="1"/><rect x="696" y="101" width="8" height="20" fill="#4CAF50" rx="1"/>

  <!-- Regime subplot -->
  <rect x="60" y="240" width="700" height="190" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="258" fill="#888" font-family="Inter,sans-serif" font-size="10">Regime Score</text>

  <line x1="60" y1="290" x2="760" y2="290" stroke="#4CAF50" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="765" y="294" fill="#4CAF50" font-family="Inter,sans-serif" font-size="9">+25</text>
  <line x1="60" y1="335" x2="760" y2="335" stroke="#888" stroke-width="1" stroke-dasharray="5,4" opacity="0.3"/>
  <line x1="60" y1="380" x2="760" y2="380" stroke="#f44336" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="765" y="384" fill="#f44336" font-family="Inter,sans-serif" font-size="9">-25</text>

  <polyline points="100,280 150,270 200,265 250,272 300,310 350,330 400,340 450,325 500,295 550,275 600,265 650,260 700,255"
    fill="none" stroke="#ab47bc" stroke-width="2.5"/>

  <rect x="60" y="455" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="470" x2="100" y2="470" stroke="#ab47bc" stroke-width="2.5"/>
  <text x="105" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Regime Score</text>
  <rect x="230" y="464" width="12" height="12" fill="rgba(76,175,80,0.3)" rx="2"/>
  <text x="247" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Bull</text>
  <rect x="300" y="464" width="12" height="12" fill="rgba(244,67,54,0.3)" rx="2"/>
  <text x="317" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Bear</text>
  <rect x="370" y="464" width="12" height="12" fill="rgba(255,193,7,0.3)" rx="2"/>
  <text x="387" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Range</text>
</svg>
