<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Engulfing Candle Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- LEFT SIDE: Bullish Engulfing -->
  <text x="200" y="75" text-anchor="middle" fill="#26a69a" font-size="13" font-weight="600">Bullish Engulfing</text>

  <!-- Downtrend candles leading in -->
  <line x1="90" y1="115" x2="90" y2="160" stroke="#ef5350" stroke-width="1"/>
  <rect x="86" y="120" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="120" y1="140" x2="120" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="116" y="148" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="150" y1="165" x2="150" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="146" y="172" width="8" height="32" fill="#ef5350" rx="1"/>

  <!-- Prior bearish candle (small) -->
  <line x1="195" y1="195" x2="195" y2="260" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="188" y="210" width="14" height="30" fill="#ef5350" rx="1" opacity="0.7"/>
  <text x="195" y="275" text-anchor="middle" fill="#888" font-size="8">Prior Bar</text>

  <!-- Engulfing bullish candle (big, wraps prior) -->
  <line x1="230" y1="185" x2="230" y2="275" stroke="#00e676" stroke-width="2"/>
  <rect x="220" y="195" width="20" height="60" fill="#00e676" rx="2" filter="url(#glow)"/>

  <!-- Bracket showing engulfment -->
  <line x1="245" y1="200" x2="255" y2="200" stroke="#00e676" stroke-width="1" opacity="0.6"/>
  <line x1="255" y1="200" x2="255" y2="255" stroke="#00e676" stroke-width="1" opacity="0.6"/>
  <line x1="245" y1="255" x2="255" y2="255" stroke="#00e676" stroke-width="1" opacity="0.6"/>
  <text x="262" y="230" fill="#00e676" font-size="9">Body engulfs</text>
  <text x="262" y="242" fill="#00e676" font-size="9">prior body</text>

  <!-- Entry + Stop + TP -->
  <line x1="230" y1="195" x2="370" y2="195" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="372" y="199" fill="#42a5f5" font-size="9">Entry</text>
  <line x1="230" y1="275" x2="370" y2="275" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="372" y="279" fill="#ef5350" font-size="9">Stop (ATR)</text>
  <line x1="230" y1="135" x2="370" y2="135" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="372" y="139" fill="#00e676" font-size="9">Take Profit</text>

  <!-- Buy arrow -->
  <g filter="url(#softGlow)">
    <polygon points="225,185 235,185 230,172" fill="#00e676"/>
  </g>
  <rect x="240" y="165" width="60" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="270" y="178" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- Post-breakout candles -->
  <line x1="265" y1="178" x2="265" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="261" y="182" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="295" y1="165" x2="295" y2="198" stroke="#26a69a" stroke-width="1"/>
  <rect x="291" y="170" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="325" y1="155" x2="325" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="321" y="160" width="8" height="16" fill="#ef5350" rx="1"/>
  <line x1="355" y1="142" x2="355" y2="172" stroke="#26a69a" stroke-width="1"/>
  <rect x="351" y="148" width="8" height="16" fill="#26a69a" rx="1"/>

  <!-- DIVIDER -->
  <line x1="400" y1="70" x2="400" y2="420" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- RIGHT SIDE: Bearish Engulfing -->
  <text x="600" y="75" text-anchor="middle" fill="#ef5350" font-size="13" font-weight="600">Bearish Engulfing</text>

  <!-- Uptrend candles -->
  <line x1="470" y1="310" x2="470" y2="360" stroke="#26a69a" stroke-width="1"/>
  <rect x="466" y="320" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="500" y1="280" x2="500" y2="330" stroke="#26a69a" stroke-width="1"/>
  <rect x="496" y="290" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="530" y1="248" x2="530" y2="298" stroke="#26a69a" stroke-width="1"/>
  <rect x="526" y="258" width="8" height="28" fill="#26a69a" rx="1"/>

  <!-- Prior bullish candle (small) -->
  <line x1="575" y1="210" x2="575" y2="268" stroke="#26a69a" stroke-width="1.5"/>
  <rect x="568" y="225" width="14" height="28" fill="#26a69a" rx="1" opacity="0.7"/>
  <text x="575" y="280" text-anchor="middle" fill="#888" font-size="8">Prior Bar</text>

  <!-- Engulfing bearish candle -->
  <line x1="610" y1="198" x2="610" y2="288" stroke="#ef5350" stroke-width="2"/>
  <rect x="600" y="212" width="20" height="60" fill="#ef5350" rx="2" filter="url(#glow)"/>

  <!-- Bracket -->
  <line x1="625" y1="218" x2="635" y2="218" stroke="#ef5350" stroke-width="1" opacity="0.6"/>
  <line x1="635" y1="218" x2="635" y2="268" stroke="#ef5350" stroke-width="1" opacity="0.6"/>
  <line x1="625" y1="268" x2="635" y2="268" stroke="#ef5350" stroke-width="1" opacity="0.6"/>
  <text x="642" y="245" fill="#ef5350" font-size="9">Body engulfs</text>
  <text x="642" y="257" fill="#ef5350" font-size="9">prior body</text>

  <!-- Sell arrow -->
  <g filter="url(#softGlow)">
    <polygon points="605,292 615,292 610,305" fill="#ef5350"/>
  </g>
  <rect x="615" y="292" width="65" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="647" y="305" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SHORT</text>

  <!-- Post engulfing down -->
  <line x1="645" y1="268" x2="645" y2="302" stroke="#ef5350" stroke-width="1"/>
  <rect x="641" y="275" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="675" y1="288" x2="675" y2="322" stroke="#ef5350" stroke-width="1"/>
  <rect x="671" y="295" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="705" y1="302" x2="705" y2="340" stroke="#26a69a" stroke-width="1"/>
  <rect x="701" y="308" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="86" y="400" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="116" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="146" y="395" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="188" y="400" width="14" height="12" fill="#ef5350" rx="1"/>
  </g>
  <rect x="220" y="378" width="20" height="34" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="261" y="395" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="291" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="321" y="400" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="351" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
  </g>
  <g opacity="0.5">
    <rect x="466" y="400" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="496" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="526" y="395" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="568" y="400" width="14" height="12" fill="#26a69a" rx="1"/>
  </g>
  <rect x="600" y="378" width="20" height="34" fill="#ef5350" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="641" y="395" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="671" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="701" y="400" width="8" height="12" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Bullish Engulfing</text>
    <circle cx="160" cy="20" r="4" fill="#ef5350"/>
    <text x="170" y="24" fill="#999" font-size="9">Bearish Engulfing</text>
    <circle cx="310" cy="20" r="4" fill="#00e676"/>
    <text x="320" y="24" fill="#999" font-size="9">Buy Signal</text>
    <circle cx="410" cy="20" r="4" fill="#42a5f5"/>
    <text x="420" y="24" fill="#999" font-size="9">Entry Level</text>
    <rect x="510" y="14" width="20" height="12" fill="#ef5350" opacity="0.4" rx="2"/>
    <text x="535" y="24" fill="#999" font-size="9">ATR Stop</text>
  </g>
</svg>