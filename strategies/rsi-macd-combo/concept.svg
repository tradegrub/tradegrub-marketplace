<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">RSI + MACD Combo Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- MACD PANEL (top portion, y=70 to y=190) -->
  <text x="70" y="78" fill="#888" font-size="9">MACD</text>

  <!-- Zero line -->
  <line x1="80" y1="140" x2="720" y2="140" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- MACD line -->
  <path d="M 100,160 Q 150,155 200,145 Q 250,130 300,118 Q 340,125 370,138 Q 400,155 430,162 Q 460,155 490,140 Q 530,120 560,112 Q 590,118 620,135 Q 650,148 680,155" fill="none" stroke="#42a5f5" stroke-width="1.8" opacity="0.9"/>
  <text x="690" y="158" fill="#42a5f5" font-size="8">MACD</text>

  <!-- Signal line -->
  <path d="M 100,158 Q 150,157 200,150 Q 250,140 300,130 Q 340,128 370,132 Q 400,140 430,155 Q 460,158 490,148 Q 530,132 560,122 Q 590,122 620,130 Q 650,142 680,152" fill="none" stroke="#ff9800" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>
  <text x="690" y="148" fill="#ff9800" font-size="8">Signal</text>

  <!-- MACD bullish crossover points -->
  <circle cx="200" cy="147" r="5" fill="none" stroke="#00e676" stroke-width="1.5" filter="url(#softGlow)"/>
  <circle cx="490" cy="140" r="5" fill="none" stroke="#00e676" stroke-width="1.5" filter="url(#softGlow)"/>

  <!-- Crossover labels -->
  <text x="200" y="105" text-anchor="middle" fill="#00e676" font-size="8">Cross</text>
  <line x1="200" y1="108" x2="200" y2="140" stroke="#00e676" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4"/>
  <text x="490" y="105" text-anchor="middle" fill="#00e676" font-size="8">Cross</text>
  <line x1="490" y1="108" x2="490" y2="133" stroke="#00e676" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.4"/>

  <!-- Separator -->
  <line x1="60" y1="195" x2="760" y2="195" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- RSI PANEL (middle portion, y=200 to y=290) -->
  <text x="70" y="212" fill="#888" font-size="9">RSI</text>

  <!-- Overbought -->
  <line x1="80" y1="215" x2="720" y2="215" stroke="#ef5350" stroke-width="1" stroke-dasharray="5,3" opacity="0.35"/>
  <text x="725" y="219" fill="#ef5350" font-size="8">70</text>

  <!-- RSI midline -->
  <line x1="80" y1="245" x2="720" y2="245" stroke="#888" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.2"/>

  <!-- Oversold -->
  <line x1="80" y1="275" x2="720" y2="275" stroke="#00e676" stroke-width="1" stroke-dasharray="5,3" opacity="0.35"/>
  <text x="725" y="279" fill="#00e676" font-size="8">30</text>

  <!-- RSI line -->
  <path d="M 100,255 Q 130,248 160,240 Q 190,235 200,238 Q 230,245 260,250 Q 290,255 320,252 Q 350,245 380,240 Q 410,250 440,258 Q 470,248 490,242 Q 510,238 530,235 Q 560,240 590,248 Q 620,255 660,260" fill="none" stroke="#ab47bc" stroke-width="1.5" opacity="0.9"/>

  <!-- RSI OK zones highlighted at crossover points -->
  <rect x="185" y="220" width="30" height="50" rx="3" fill="#00e676" fill-opacity="0.08"/>
  <rect x="475" y="220" width="30" height="50" rx="3" fill="#00e676" fill-opacity="0.08"/>

  <!-- RSI OK labels -->
  <text x="200" y="290" text-anchor="middle" fill="#00e676" font-size="7" opacity="0.7">RSI OK</text>
  <text x="490" y="290" text-anchor="middle" fill="#00e676" font-size="7" opacity="0.7">RSI OK</text>

  <!-- Separator -->
  <line x1="60" y1="300" x2="760" y2="300" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- PRICE PANEL (bottom, y=305 to y=420) -->
  <text x="70" y="315" fill="#888" font-size="9">Price</text>

  <!-- Price candles -->
  <line x1="100" y1="365" x2="100" y2="395" stroke="#ef5350" stroke-width="1"/>
  <rect x="97" y="370" width="6" height="15" fill="#ef5350" rx="1"/>
  <line x1="120" y1="360" x2="120" y2="390" stroke="#26a69a" stroke-width="1"/>
  <rect x="117" y="370" width="6" height="12" fill="#26a69a" rx="1"/>
  <line x1="140" y1="355" x2="140" y2="385" stroke="#26a69a" stroke-width="1"/>
  <rect x="137" y="362" width="6" height="14" fill="#26a69a" rx="1"/>
  <line x1="160" y1="348" x2="160" y2="378" stroke="#26a69a" stroke-width="1"/>
  <rect x="157" y="355" width="6" height="14" fill="#26a69a" rx="1"/>
  <line x1="180" y1="342" x2="180" y2="372" stroke="#26a69a" stroke-width="1"/>
  <rect x="177" y="348" width="6" height="15" fill="#26a69a" rx="1"/>

  <!-- BUY signal 1 -->
  <line x1="200" y1="335" x2="200" y2="368" stroke="#00e676" stroke-width="1.2"/>
  <rect x="196" y="340" width="8" height="18" fill="#00e676" rx="1" filter="url(#softGlow)"/>
  <g filter="url(#softGlow)">
    <polygon points="196,332 204,332 200,323" fill="#00e676"/>
  </g>
  <text x="200" y="318" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">BUY</text>

  <line x1="220" y1="330" x2="220" y2="360" stroke="#26a69a" stroke-width="1"/>
  <rect x="217" y="335" width="6" height="15" fill="#26a69a" rx="1"/>
  <line x1="240" y1="325" x2="240" y2="355" stroke="#26a69a" stroke-width="1"/>
  <rect x="237" y="330" width="6" height="15" fill="#26a69a" rx="1"/>
  <line x1="260" y1="328" x2="260" y2="358" stroke="#ef5350" stroke-width="1"/>
  <rect x="257" y="332" width="6" height="16" fill="#ef5350" rx="1"/>
  <line x1="280" y1="335" x2="280" y2="365" stroke="#ef5350" stroke-width="1"/>
  <rect x="277" y="340" width="6" height="15" fill="#ef5350" rx="1"/>
  <line x1="300" y1="340" x2="300" y2="370" stroke="#ef5350" stroke-width="1"/>
  <rect x="297" y="345" width="6" height="15" fill="#ef5350" rx="1"/>
  <line x1="320" y1="345" x2="320" y2="378" stroke="#ef5350" stroke-width="1"/>
  <rect x="317" y="350" width="6" height="16" fill="#ef5350" rx="1"/>
  <line x1="340" y1="350" x2="340" y2="382" stroke="#26a69a" stroke-width="1"/>
  <rect x="337" y="360" width="6" height="12" fill="#26a69a" rx="1"/>
  <line x1="360" y1="355" x2="360" y2="385" stroke="#26a69a" stroke-width="1"/>
  <rect x="357" y="362" width="6" height="14" fill="#26a69a" rx="1"/>
  <line x1="380" y1="348" x2="380" y2="380" stroke="#26a69a" stroke-width="1"/>
  <rect x="377" y="355" width="6" height="15" fill="#26a69a" rx="1"/>
  <line x1="400" y1="352" x2="400" y2="382" stroke="#ef5350" stroke-width="1"/>
  <rect x="397" y="358" width="6" height="14" fill="#ef5350" rx="1"/>
  <line x1="420" y1="355" x2="420" y2="388" stroke="#ef5350" stroke-width="1"/>
  <rect x="417" y="362" width="6" height="15" fill="#ef5350" rx="1"/>
  <line x1="440" y1="358" x2="440" y2="390" stroke="#26a69a" stroke-width="1"/>
  <rect x="437" y="368" width="6" height="12" fill="#26a69a" rx="1"/>
  <line x1="460" y1="352" x2="460" y2="382" stroke="#26a69a" stroke-width="1"/>
  <rect x="457" y="358" width="6" height="14" fill="#26a69a" rx="1"/>

  <!-- BUY signal 2 -->
  <line x1="490" y1="340" x2="490" y2="375" stroke="#00e676" stroke-width="1.2"/>
  <rect x="486" y="345" width="8" height="18" fill="#00e676" rx="1" filter="url(#softGlow)"/>
  <g filter="url(#softGlow)">
    <polygon points="486,338 494,338 490,329" fill="#00e676"/>
  </g>
  <text x="490" y="324" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">BUY</text>

  <line x1="510" y1="335" x2="510" y2="365" stroke="#26a69a" stroke-width="1"/>
  <rect x="507" y="340" width="6" height="15" fill="#26a69a" rx="1"/>
  <line x1="530" y1="328" x2="530" y2="358" stroke="#26a69a" stroke-width="1"/>
  <rect x="527" y="332" width="6" height="16" fill="#26a69a" rx="1"/>
  <line x1="550" y1="322" x2="550" y2="352" stroke="#26a69a" stroke-width="1"/>
  <rect x="547" y="328" width="6" height="14" fill="#26a69a" rx="1"/>

  <!-- Dual confirmation annotation -->
  <rect x="560" y="310" width="155" height="35" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="637" y="325" text-anchor="middle" fill="#bbb" font-size="9">Dual Confirmation:</text>
  <text x="637" y="338" text-anchor="middle" fill="#bbb" font-size="9">MACD Cross + RSI Neutral</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">MACD Line</text>
    <circle cx="120" cy="20" r="4" fill="#ff9800"/>
    <text x="130" y="24" fill="#999" font-size="9">Signal Line</text>
    <circle cx="220" cy="20" r="4" fill="#ab47bc"/>
    <text x="230" y="24" fill="#999" font-size="9">RSI</text>
    <circle cx="290" cy="20" r="4" fill="#00e676"/>
    <text x="300" y="24" fill="#999" font-size="9">Buy Signal</text>
    <circle cx="390" cy="20" r="4" fill="#ef5350"/>
    <text x="400" y="24" fill="#999" font-size="9">Overbought</text>
    <circle cx="500" cy="20" r="4" fill="#26a69a"/>
    <text x="510" y="24" fill="#999" font-size="9">Bullish Candle</text>
  </g>
</svg>