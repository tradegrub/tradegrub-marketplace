  <circle cx="324" cy="440" r="2" fill="#aa66ff" opacity="0.25"/>
  <circle cx="346" cy="440" r="2" fill="#aa66ff" opacity="0.3"/>
  <circle cx="368" cy="440" r="2" fill="#aa66ff" opacity="0.2"/>
  <circle cx="390" cy="440" r="2" fill="#aa66ff" opacity="0.3"/>
  <circle cx="412" cy="440" r="2" fill="#aa66ff" opacity="0.25"/>
  <circle cx="434" cy="440" r="2" fill="#aa66ff" opacity="0.3"/>
  <circle cx="456" cy="440" r="2" fill="#aa66ff" opacity="0.2"/>
  <circle cx="478" cy="440" r="2" fill="#aa66ff" opacity="0.3"/>
  <circle cx="500" cy="440" r="2" fill="#aa66ff" opacity="0.25"/>
  <!-- Trending bright again -->
  <circle cx="522" cy="440" r="3" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.8"/>
  <circle cx="544" cy="440" r="3" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.85"/>
  <circle cx="566" cy="440" r="3.5" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.9"/>
  <circle cx="588" cy="440" r="3.5" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.95"/>
  <circle cx="610" cy="440" r="3.5" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.9"/>
  <circle cx="632" cy="440" r="3" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.85"/>
  <circle cx="654" cy="440" r="3.5" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.9"/>
  <circle cx="676" cy="440" r="3" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.85"/>
  <circle cx="698" cy="440" r="3.5" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.9"/>
  <circle cx="720" cy="440" r="3" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.8"/>

  <!-- Title -->
  <text x="20" y="28" fill="#ffffff" font-size="17" font-weight="bold">Trend Volatility Pulse</text>
  <text x="20" y="45" fill="#888888" font-size="11">tradegrub.finance</text>

  <!-- Legend bar -->
  <rect x="0" y="455" width="800" height="45" fill="#0d0d1a" opacity="0.6"/>
  <rect x="60" y="470" width="10" height="10" fill="#00c853" rx="1"/>
  <text x="75" y="479" fill="#cccccc" font-size="11">Bullish</text>
  <rect x="130" y="470" width="10" height="10" fill="#ff1744" rx="1"/>
  <text x="145" y="479" fill="#cccccc" font-size="11">Bearish</text>
  <rect x="200" y="470" width="18" height="10" fill="rgba(0,255,0,0.15)" stroke="#44ff88" stroke-width="0.5"/>
  <text x="223" y="479" fill="#cccccc" font-size="11">Trending</text>
  <rect x="295" y="470" width="18" height="10" fill="rgba(128,0,255,0.15)" stroke="#aa66ff" stroke-width="0.5"/>
  <text x="318" y="479" fill="#cccccc" font-size="11">Mean-Reverting</text>
  <circle cx="430" cy="475" r="3" fill="#00ff88" filter="url(#pulseGlow)"/>
  <text x="438" y="479" fill="#cccccc" font-size="11">Pulse (bright=trending)</text>
</svg>