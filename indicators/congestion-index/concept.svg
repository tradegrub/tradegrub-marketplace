<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="600">Congestion Index</text>
  <text x="400" y="52" text-anchor="middle" fill="#666688" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="60" y1="80" x2="740" y2="80"/>
    <line x1="60" y1="120" x2="740" y2="120"/>
    <line x1="60" y1="160" x2="740" y2="160"/>
    <line x1="60" y1="200" x2="740" y2="200"/>
    <line x1="60" y1="240" x2="740" y2="240"/>
    <line x1="60" y1="280" x2="740" y2="280"/>
    <line x1="60" y1="320" x2="740" y2="320"/>
    <line x1="150" y1="65" x2="150" y2="330"/>
    <line x1="250" y1="65" x2="250" y2="330"/>
    <line x1="350" y1="65" x2="350" y2="330"/>
    <line x1="450" y1="65" x2="450" y2="330"/>
    <line x1="550" y1="65" x2="550" y2="330"/>
    <line x1="650" y1="65" x2="650" y2="330"/>
  </g>

  <!-- Background zones: Congestion (blue/purple) -->
  <rect x="80" y="65" width="200" height="265" fill="#3f51b5" opacity="0.15" rx="3"/>
  <rect x="420" y="65" width="160" height="265" fill="#3f51b5" opacity="0.15" rx="3"/>

  <!-- Background zones: Breakout (green) -->
  <rect x="280" y="65" width="140" height="265" fill="#4caf50" opacity="0.15" rx="3"/>
  <rect x="580" y="65" width="160" height="265" fill="#4caf50" opacity="0.15" rx="3"/>

  <!-- Price line chart (upper area) -->
  <polyline
    points="80,220 110,215 140,225 170,218 200,222 230,210 260,195 290,160 320,140 350,155 380,170 410,180 440,175 470,182 500,178 530,185 560,170 590,140 620,110 650,95 680,105 710,90 740,80"
    fill="none" stroke="#4fc3f7" stroke-width="2" filter="url(#glow)"/>

  <!-- Separator -->
  <line x1="60" y1="340" x2="740" y2="340" stroke="#333355" stroke-width="0.5"/>

  <!-- CI bar chart (lower panel) -->
  <g fill="#7986cb">
    <rect x="85" y="395" width="18" height="35" opacity="0.8" rx="1"/>
    <rect x="110" y="390" width="18" height="40" opacity="0.8" rx="1"/>
    <rect x="135" y="400" width="18" height="30" opacity="0.8" rx="1"/>
    <rect x="160" y="392" width="18" height="38" opacity="0.8" rx="1"/>
    <rect x="185" y="398" width="18" height="32" opacity="0.8" rx="1"/>
    <rect x="210" y="388" width="18" height="42" opacity="0.8" rx="1"/>
    <rect x="235" y="385" width="18" height="45" opacity="0.8" rx="1"/>
  </g>
  <g fill="#66bb6a">
    <rect x="268" y="370" width="18" height="60" opacity="0.8" rx="1"/>
    <rect x="293" y="360" width="18" height="70" opacity="0.8" rx="1"/>
    <rect x="318" y="365" width="18" height="65" opacity="0.8" rx="1"/>
    <rect x="343" y="375" width="18" height="55" opacity="0.8" rx="1"/>
    <rect x="368" y="380" width="18" height="50" opacity="0.8" rx="1"/>
  </g>
  <g fill="#7986cb">
    <rect x="398" y="395" width="18" height="35" opacity="0.8" rx="1"/>
    <rect x="423" y="400" width="18" height="30" opacity="0.8" rx="1"/>
    <rect x="448" y="392" width="18" height="38" opacity="0.8" rx="1"/>
    <rect x="473" y="398" width="18" height="32" opacity="0.8" rx="1"/>
    <rect x="498" y="395" width="18" height="35" opacity="0.8" rx="1"/>
    <rect x="523" y="390" width="18" height="40" opacity="0.8" rx="1"/>
    <rect x="548" y="393" width="18" height="37" opacity="0.8" rx="1"/>
  </g>
  <g fill="#66bb6a">
    <rect x="578" y="368" width="18" height="62" opacity="0.8" rx="1"/>
    <rect x="603" y="355" width="18" height="75" opacity="0.8" rx="1"/>
    <rect x="628" y="350" width="18" height="80" opacity="0.8" rx="1"/>
    <rect x="653" y="358" width="18" height="72" opacity="0.8" rx="1"/>
    <rect x="678" y="362" width="18" height="68" opacity="0.8" rx="1"/>
    <rect x="703" y="356" width="18" height="74" opacity="0.8" rx="1"/>
    <rect x="728" y="352" width="18" height="78" opacity="0.8" rx="1"/>
  </g>

  <!-- CI threshold line -->
  <line x1="60" y1="385" x2="740" y2="385" stroke="#ff9800" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="745" y="388" fill="#ff9800" font-size="8" opacity="0.6">threshold</text>

  <!-- Callouts -->
  <g>
    <rect x="120" y="130" width="110" height="22" fill="#3f51b5" opacity="0.3" rx="4"/>
    <text x="175" y="145" text-anchor="middle" fill="#7986cb" font-size="10" font-weight="500">Congestion Zone</text>
    <line x1="175" y1="152" x2="175" y2="175" stroke="#7986cb" stroke-width="0.8" opacity="0.4"/>
  </g>
  <g>
    <rect x="300" y="100" width="70" height="22" fill="#4caf50" opacity="0.25" rx="4"/>
    <text x="335" y="115" text-anchor="middle" fill="#66bb6a" font-size="10" font-weight="500">Breakout</text>
    <line x1="335" y1="122" x2="335" y2="145" stroke="#66bb6a" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Axis labels -->
  <text x="55" y="72" fill="#555577" font-size="8" text-anchor="end">Price</text>
  <text x="55" y="348" fill="#555577" font-size="8" text-anchor="end">CI</text>

  <!-- Legend bar -->
  <g transform="translate(0, 455)">
    <rect x="200" y="0" width="400" height="28" fill="#111122" opacity="0.5" rx="4"/>
    <rect x="230" y="8" width="10" height="10" fill="#3f51b5" opacity="0.6" rx="2"/>
    <text x="245" y="17" fill="#8888aa" font-size="10">Congestion (Low CI)</text>
    <rect x="380" y="8" width="10" height="10" fill="#4caf50" opacity="0.6" rx="2"/>
    <text x="395" y="17" fill="#8888aa" font-size="10">Breakout (High CI)</text>
    <rect x="510" y="8" width="10" height="10" fill="#4fc3f7" opacity="0.6" rx="2"/>
    <text x="525" y="17" fill="#8888aa" font-size="10">Price</text>
  </g>
</svg>
