    <circle cx="140" cy="18" r="4" fill="#ff9800"/>
    <text x="150" y="22" fill="#999" font-size="9">Cycle Peak</text>
    <circle cx="250" cy="18" r="4" fill="#ab47bc"/>
    <text x="260" y="22" fill="#999" font-size="9">Cycle Trough</text>
