  <!-- More red -->
  <line x1="565" y1="195" x2="565" y2="225" stroke="#ef5350" stroke-width="1"/>
  <rect x="561" y="200" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="590" y1="205" x2="590" y2="238" stroke="#ef5350" stroke-width="1"/>
  <rect x="586" y="210" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="615" y1="218" x2="615" y2="252" stroke="#ef5350" stroke-width="1"/>
  <rect x="611" y="222" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="640" y1="230" x2="640" y2="265" stroke="#ef5350" stroke-width="1"/>
  <rect x="636" y="235" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="665" y1="242" x2="665" y2="275" stroke="#ef5350" stroke-width="1"/>
  <rect x="661" y="248" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="690" y1="252" x2="690" y2="282" stroke="#ef5350" stroke-width="1"/>
  <rect x="686" y="258" width="8" height="16" fill="#ef5350" rx="1"/>

  <!-- Noise vs smooth comparison annotation -->
  <rect x="350" y="75" width="200" height="32" rx="6" fill="#ffffff" fill-opacity="0.05"/>
  <text x="450" y="90" text-anchor="middle" fill="#bbb" font-size="10">HA candles smooth noise</text>
  <text x="450" y="102" text-anchor="middle" fill="#888" font-size="8">Strong trends show no counter-wicks</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="86" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="111" y="395" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="136" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="161" y="400" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="186" y="403" width="8" height="9" fill="#ef5350" rx="1"/>
  </g>
  <rect x="209" y="385" width="12" height="27" fill="#00e676" rx="1" opacity="0.5" filter="url(#softGlow)"/>
  <g opacity="0.35">
    <rect x="236" y="395" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="261" y="393" width="8" height="19" fill="#26a69a" rx="1"/>
    <rect x="286" y="395" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="311" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="336" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="361" y="400" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="386" y="400" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="411" y="402" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="436" y="403" width="8" height="9" fill="#26a69a" rx="1"/>
    <rect x="461" y="403" width="8" height="9" fill="#26a69a" rx="1"/>
    <rect x="486" y="405" width="8" height="7" fill="#26a69a" rx="1"/>
    <rect x="511" y="405" width="8" height="7" fill="#26a69a" rx="1"/>
  </g>
  <rect x="534" y="388" width="12" height="24" fill="#ef5350" rx="1" opacity="0.5" filter="url(#softGlow)"/>
  <g opacity="0.35">
    <rect x="561" y="395" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="586" y="393" width="8" height="19" fill="#ef5350" rx="1"/>
    <rect x="611" y="395" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="636" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="661" y="400" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="686" y="402" width="8" height="10" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">HA Bullish (Green)</text>
    <circle cx="160" cy="20" r="4" fill="#ef5350"/>
    <text x="170" y="24" fill="#999" font-size="9">HA Bearish (Red)</text>
    <circle cx="300" cy="20" r="4" fill="#00e676"/>
    <text x="310" y="24" fill="#999" font-size="9">Color Flip Signal</text>
    <circle cx="440" cy="20" r="4" fill="#42a5f5"/>
    <text x="450" y="24" fill="#999" font-size="9">HA EMA Fast</text>
    <rect x="555" y="14" width="20" height="12" fill="#ef5350" opacity="0.4" rx="2"/>
    <text x="580" y="24" fill="#999" font-size="9">HA EMA Slow</text>
  </g>
</svg>