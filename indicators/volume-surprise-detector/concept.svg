<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-family="Arial,sans-serif" font-size="17" font-weight="bold">Volume Surprise Detector</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-family="Arial,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <line x1="80" y1="80" x2="760" y2="80"/>
    <line x1="80" y1="130" x2="760" y2="130"/>
    <line x1="80" y1="180" x2="760" y2="180"/>
    <line x1="80" y1="230" x2="760" y2="230"/>
    <line x1="80" y1="280" x2="760" y2="280"/>
    <line x1="80" y1="330" x2="760" y2="330"/>
    <line x1="80" y1="380" x2="760" y2="380"/>
    <line x1="160" y1="70" x2="160" y2="390"/>
    <line x1="240" y1="70" x2="240" y2="390"/>
    <line x1="320" y1="70" x2="320" y2="390"/>
    <line x1="400" y1="70" x2="400" y2="390"/>
    <line x1="480" y1="70" x2="480" y2="390"/>
    <line x1="560" y1="70" x2="560" y2="390"/>
    <line x1="640" y1="70" x2="640" y2="390"/>
    <line x1="720" y1="70" x2="720" y2="390"/>
  </g>

  <!-- Axes -->
  <line x1="80" y1="390" x2="760" y2="390" stroke="#444" stroke-width="1"/>
  <line x1="80" y1="70" x2="80" y2="390" stroke="#444" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="72" y="394" text-anchor="end" fill="#666" font-family="Arial,sans-serif" font-size="9">0</text>
  <text x="72" y="314" text-anchor="end" fill="#666" font-family="Arial,sans-serif" font-size="9">2M</text>
  <text x="72" y="234" text-anchor="end" fill="#666" font-family="Arial,sans-serif" font-size="9">4M</text>
  <text x="72" y="154" text-anchor="end" fill="#666" font-family="Arial,sans-serif" font-size="9">6M</text>
  <text x="72" y="84" text-anchor="end" fill="#666" font-family="Arial,sans-serif" font-size="9">8M</text>

  <!-- +2 sigma threshold -->
  <line x1="80" y1="155" x2="760" y2="155" stroke="#00e676" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="764" y="152" fill="#00e676" font-family="Arial,sans-serif" font-size="9" opacity="0.8">+2&#x3C3;</text>

  <!-- -2 sigma threshold -->
  <line x1="80" y1="355" x2="760" y2="355" stroke="#ff5252" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="764" y="352" fill="#ff5252" font-family="Arial,sans-serif" font-size="9" opacity="0.8">-2&#x3C3;</text>

  <!-- Mean line -->
  <line x1="80" y1="280" x2="760" y2="280" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="764" y="277" fill="#aaa" font-family="Arial,sans-serif" font-size="8" opacity="0.5">&#x3BC;</text>

  <!-- Volume bars -->
  <rect x="100" y="290" width="28" height="100" fill="#555" rx="2" opacity="0.6"/>
  <rect x="134" y="270" width="28" height="120" fill="#555" rx="2" opacity="0.6"/>
  <rect x="168" y="300" width="28" height="90" fill="#555" rx="2" opacity="0.6"/>
  <rect x="202" y="260" width="28" height="130" fill="#555" rx="2" opacity="0.6"/>
  <rect x="236" y="95" width="28" height="295" fill="#00e676" rx="2" opacity="0.9" filter="url(#glow)"/>
  <rect x="270" y="275" width="28" height="115" fill="#555" rx="2" opacity="0.6"/>
  <rect x="304" y="310" width="28" height="80" fill="#555" rx="2" opacity="0.6"/>
  <rect x="338" y="370" width="28" height="20" fill="#ff5252" rx="2" opacity="0.4"/>
  <rect x="372" y="285" width="28" height="105" fill="#555" rx="2" opacity="0.6"/>
  <rect x="406" y="295" width="28" height="95" fill="#555" rx="2" opacity="0.6"/>
  <rect x="440" y="265" width="28" height="125" fill="#555" rx="2" opacity="0.6"/>
  <rect x="474" y="80" width="28" height="310" fill="#00e676" rx="2" opacity="0.9" filter="url(#glow)"/>
  <rect x="508" y="280" width="28" height="110" fill="#555" rx="2" opacity="0.6"/>
  <rect x="542" y="375" width="28" height="15" fill="#ff5252" rx="2" opacity="0.4"/>
  <rect x="576" y="305" width="28" height="85" fill="#555" rx="2" opacity="0.6"/>
  <rect x="610" y="270" width="28" height="120" fill="#555" rx="2" opacity="0.6"/>
  <rect x="644" y="105" width="28" height="285" fill="#39ff14" rx="2" opacity="0.9" filter="url(#glow)"/>
  <rect x="678" y="290" width="28" height="100" fill="#555" rx="2" opacity="0.6"/>
  <rect x="712" y="275" width="28" height="115" fill="#555" rx="2" opacity="0.6"/>

  <!-- Star markers on surprise bars -->
  <text x="250" y="82" text-anchor="middle" fill="#ffeb3b" font-size="18" filter="url(#starGlow)">&#9733;</text>
  <text x="488" y="67" text-anchor="middle" fill="#ffeb3b" font-size="20" filter="url(#starGlow)">&#9733;</text>
  <text x="658" y="92" text-anchor="middle" fill="#ffeb3b" font-size="16" filter="url(#starGlow)">&#10022;</text>

  <!-- Surprise labels -->
  <text x="250" y="72" text-anchor="middle" fill="#00e676" font-family="Arial,sans-serif" font-size="10" font-weight="bold" filter="url(#glow)">Surprise!</text>
  <text x="488" y="57" text-anchor="middle" fill="#00e676" font-family="Arial,sans-serif" font-size="10" font-weight="bold" filter="url(#glow)">Surprise!</text>
  <text x="658" y="82" text-anchor="middle" fill="#39ff14" font-family="Arial,sans-serif" font-size="10" font-weight="bold" filter="url(#glow)">Surprise!</text>

  <!-- Quiet labels -->
  <text x="352" y="364" text-anchor="middle" fill="#ff5252" font-family="Arial,sans-serif" font-size="9" opacity="0.7">Quiet</text>
  <text x="556" y="369" text-anchor="middle" fill="#ff5252" font-family="Arial,sans-serif" font-size="9" opacity="0.7">Quiet</text>

  <!-- Z-score line overlay -->
  <polyline points="114,275 148,265 182,285 216,255 250,100 284,270 318,295 352,365 386,278 420,282 454,260 488,85 522,273 556,372 590,290 624,265 658,110 692,280 726,268" fill="none" stroke="#40c4ff" stroke-width="2" opacity="0.7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Z-score dots on key points -->
  <circle cx="250" cy="100" r="4" fill="#40c4ff" filter="url(#glow)"/>
  <circle cx="488" cy="85" r="4" fill="#40c4ff" filter="url(#glow)"/>
  <circle cx="658" cy="110" r="4" fill="#40c4ff" filter="url(#glow)"/>
  <circle cx="352" cy="365" r="3" fill="#ff5252" opacity="0.7"/>
  <circle cx="556" cy="372" r="3" fill="#ff5252" opacity="0.7"/>

  <!-- Legend bar -->
  <rect x="120" y="430" width="560" height="40" rx="6" fill="#111" opacity="0.5"/>
  <rect x="140" y="443" width="14" height="14" fill="#555" rx="2" opacity="0.6"/>
  <text x="160" y="454" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Normal Volume</text>
  <rect x="265" y="443" width="14" height="14" fill="#00e676" rx="2"/>
  <text x="285" y="454" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Surprise (+2&#x3C3;)</text>
  <rect x="395" y="443" width="14" height="14" fill="#ff5252" rx="2" opacity="0.5"/>
  <text x="415" y="454" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Quiet (-2&#x3C3;)</text>
  <line x1="520" y1="450" x2="545" y2="450" stroke="#40c4ff" stroke-width="2"/>
  <text x="551" y="454" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Z-Score</text>
</svg>