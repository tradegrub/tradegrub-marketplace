<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="priceLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7ec8f0"/>
    </linearGradient>
    <linearGradient id="oscFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="50" y="35" fill="#e0e0e0" font-family="Arial, sans-serif" font-size="17" font-weight="bold">Unreached Highs/Lows</text>
  <text x="50" y="52" fill="#8888aa" font-family="Arial, sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Grid lines (main chart area y=70 to y=330) -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="50" y1="120" x2="750" y2="120"/>
    <line x1="50" y1="170" x2="750" y2="170"/>
    <line x1="50" y1="220" x2="750" y2="220"/>
    <line x1="50" y1="270" x2="750" y2="270"/>
    <line x1="50" y1="320" x2="750" y2="320"/>
    <line x1="150" y1="70" x2="150" y2="330"/>
    <line x1="275" y1="70" x2="275" y2="330"/>
    <line x1="400" y1="70" x2="400" y2="330"/>
    <line x1="525" y1="70" x2="525" y2="330"/>
    <line x1="650" y1="70" x2="650" y2="330"/>
  </g>

  <!-- Y-axis labels -->
  <g fill="#555570" font-family="Arial, sans-serif" font-size="9">
    <text x="755" y="123">180</text>
    <text x="755" y="173">160</text>
    <text x="755" y="223">140</text>
    <text x="755" y="273">120</text>
    <text x="755" y="323">100</text>
  </g>

  <!-- Price line (uptrend with swings) -->
  <polyline
    points="60,300 90,290 120,305 150,280 180,295 210,270 240,285 270,260 300,250 330,240 360,255 390,230 420,220 450,240 480,210 510,195 540,180 570,200 600,170 630,155 660,140 690,130 720,115 740,105"
    fill="none" stroke="url(#priceLine)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Area fill under price -->
  <polygon
    points="60,300 90,290 120,305 150,280 180,295 210,270 240,285 270,260 300,250 330,240 360,255 390,230 420,220 450,240 480,210 510,195 540,180 570,200 600,170 630,155 660,140 690,130 720,115 740,105 740,330 60,330"
    fill="url(#priceLine)" opacity="0.04"/>

  <!-- Unreached High ticks (green) -->
  <g stroke="#00e676" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)">
    <line x1="200" y1="268" x2="230" y2="268"/>
    <line x1="290" y1="248" x2="320" y2="248"/>
    <line x1="380" y1="228" x2="410" y2="228"/>
    <line x1="470" y1="208" x2="500" y2="208"/>
    <line x1="590" y1="168" x2="620" y2="168"/>
    <line x1="650" y1="138" x2="680" y2="138"/>
  </g>

  <!-- High pivot dots -->
  <g fill="#00e676" opacity="0.7">
    <circle cx="210" cy="270" r="2.5"/>
    <circle cx="300" cy="250" r="2.5"/>
    <circle cx="390" cy="230" r="2.5"/>
    <circle cx="480" cy="210" r="2.5"/>
    <circle cx="600" cy="170" r="2.5"/>
    <circle cx="660" cy="140" r="2.5"/>
  </g>

  <!-- Unreached Low ticks (red) -->
  <g stroke="#ff5252" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)">
    <line x1="110" y1="307" x2="140" y2="307"/>
    <line x1="170" y1="297" x2="200" y2="297"/>
    <line x1="350" y1="257" x2="380" y2="257"/>
    <line x1="440" y1="242" x2="470" y2="242"/>
    <line x1="560" y1="202" x2="590" y2="202"/>
  </g>

  <!-- Low pivot dots -->
  <g fill="#ff5252" opacity="0.7">
    <circle cx="120" cy="305" r="2.5"/>
    <circle cx="180" cy="295" r="2.5"/>
    <circle cx="360" cy="255" r="2.5"/>
    <circle cx="450" cy="240" r="2.5"/>
    <circle cx="570" cy="200" r="2.5"/>
  </g>

  <!-- Dashed projection lines from unreached levels -->
  <g stroke="#00e676" stroke-width="0.7" stroke-dasharray="4,4" opacity="0.25">
    <line x1="500" y1="208" x2="740" y2="208"/>
    <line x1="620" y1="168" x2="740" y2="168"/>
    <line x1="680" y1="138" x2="740" y2="138"/>
  </g>
  <g stroke="#ff5252" stroke-width="0.7" stroke-dasharray="4,4" opacity="0.25">
    <line x1="470" y1="242" x2="740" y2="242"/>
    <line x1="590" y1="202" x2="740" y2="202"/>
  </g>

  <!-- Separator -->
  <line x1="50" y1="345" x2="750" y2="345" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Oscillator panel label -->
  <text x="50" y="365" fill="#8888aa" font-family="Arial, sans-serif" font-size="10">Unreached %</text>

  <!-- Oscillator grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="50" y1="380" x2="750" y2="380"/>
    <line x1="50" y1="410" x2="750" y2="410"/>
    <line x1="50" y1="440" x2="750" y2="440"/>
  </g>

  <!-- 50% reference line -->
  <line x1="50" y1="410" x2="750" y2="410" stroke="#ffffff" stroke-opacity="0.08" stroke-dasharray="3,5"/>
  <text x="755" y="413" fill="#555570" font-family="Arial, sans-serif" font-size="8">50%</text>

  <!-- Oscillator area fill -->
  <polygon
    points="60,440 90,435 120,430 150,425 180,420 210,415 240,410 270,405 300,400 330,395 360,398 390,392 420,388 450,395 480,385 510,382 540,378 570,384 600,376 630,374 660,372 690,370 720,368 740,366 740,440 60,440"
    fill="url(#oscFill)"/>

  <!-- Oscillator line -->
  <polyline
    points="60,440 90,435 120,430 150,425 180,420 210,415 240,410 270,405 300,400 330,395 360,398 390,392 420,388 450,395 480,385 510,382 540,378 570,384 600,376 630,374 660,372 690,370 720,368 740,366"
    fill="none" stroke="#4ecdc4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Current oscillator value badge -->
  <rect x="668" y="352" width="76" height="18" rx="3" fill="#4ecdc4" opacity="0.15"/>
  <text x="706" y="365" fill="#4ecdc4" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">78% Unreached</text>

  <!-- Legend bar -->
  <rect x="50" y="465" width="700" height="28" rx="4" fill="#ffffff" fill-opacity="0.03"/>
  <g font-family="Arial, sans-serif" font-size="10">
    <line x1="70" y1="479" x2="90" y2="479" stroke="#00e676" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="80" cy="479" r="2.5" fill="#00e676"/>
    <text x="96" y="483" fill="#aaaacc">Unreached High</text>

    <line x1="220" y1="479" x2="240" y2="479" stroke="#ff5252" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="230" cy="479" r="2.5" fill="#ff5252"/>
    <text x="246" y="483" fill="#aaaacc">Unreached Low</text>

    <line x1="370" y1="479" x2="400" y2="479" stroke="url(#priceLine)" stroke-width="2" stroke-linecap="round"/>
    <text x="406" y="483" fill="#aaaacc">Price</text>

    <line x1="460" y1="479" x2="490" y2="479" stroke="#4ecdc4" stroke-width="1.8" stroke-linecap="round"/>
    <text x="496" y="483" fill="#aaaacc">Unreached %</text>
  </g>
</svg>
