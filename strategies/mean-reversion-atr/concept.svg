<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bandFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9800" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ff9800" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">ATR Mean Reversion Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Band fill area -->
  <rect x="80" y="100" width="660" height="270" fill="url(#bandFill)" rx="2"/>

  <!-- Upper ATR Band -->
  <path d="M80,108 Q200,102 320,110 Q440,98 560,105 Q640,100 740,106" fill="none" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="65" y="105" fill="#ef5350" font-size="9" text-anchor="end">+2.5 ATR</text>

  <!-- SMA Center -->
  <path d="M80,225 Q200,220 320,228 Q440,218 560,222 Q640,215 740,220" fill="none" stroke="#ffb74d" stroke-width="2.5" opacity="0.8"/>
  <text x="745" y="223" fill="#ffb74d" font-size="10" font-weight="500">SMA (50)</text>

  <!-- Lower ATR Band -->
  <path d="M80,342 Q200,348 320,340 Q440,350 560,345 Q640,352 740,348" fill="none" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="65" y="345" fill="#00e676" font-size="9" text-anchor="end">-2.5 ATR</text>

  <!-- Candlesticks - oscillating between bands -->
  <!-- Down move to lower band -->
  <line x1="100" y1="210" x2="100" y2="255" stroke="#ef5350" stroke-width="1"/>
  <rect x="96" y="218" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="125" y1="240" x2="125" y2="290" stroke="#ef5350" stroke-width="1"/>
  <rect x="121" y="250" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="150" y1="275" x2="150" y2="325" stroke="#ef5350" stroke-width="1"/>
  <rect x="146" y="285" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="175" y1="305" x2="175" y2="355" stroke="#ef5350" stroke-width="1"/>
  <rect x="171" y="315" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- Price crosses back above lower band - BUY LONG -->
  <line x1="205" y1="310" x2="205" y2="355" stroke="#00e676" stroke-width="1.5"/>
  <rect x="199" y="315" width="12" height="28" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="203,305 213,305 208,292" fill="#00e676"/>
  </g>
  <rect x="218" y="288" width="75" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="255" y="302" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY LONG</text>

  <!-- Reversion to SMA -->
  <line x1="235" y1="285" x2="235" y2="330" stroke="#26a69a" stroke-width="1"/>
  <rect x="231" y="292" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="265" y1="258" x2="265" y2="300" stroke="#26a69a" stroke-width="1"/>
  <rect x="261" y="265" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="295" y1="232" x2="295" y2="272" stroke="#26a69a" stroke-width="1"/>
  <rect x="291" y="240" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Exit at SMA -->
  <line x1="325" y1="215" x2="325" y2="250" stroke="#26a69a" stroke-width="1"/>
  <rect x="321" y="222" width="8" height="18" fill="#26a69a" rx="1"/>
  <rect x="338" y="218" width="80" height="18" rx="4" fill="#ffb74d" fill-opacity="0.15" stroke="#ffb74d" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="378" y="231" text-anchor="middle" fill="#ffb74d" font-size="9" font-weight="500">Exit @ SMA</text>

  <!-- Up move to upper band -->
  <line x1="360" y1="195" x2="360" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="356" y="202" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="390" y1="168" x2="390" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="386" y="175" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="420" y1="140" x2="420" y2="180" stroke="#26a69a" stroke-width="1"/>
  <rect x="416" y="148" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="450" y1="110" x2="450" y2="155" stroke="#26a69a" stroke-width="1"/>
  <rect x="446" y="118" width="8" height="25" fill="#26a69a" rx="1"/>

  <!-- Price crosses back below upper band - SELL SHORT -->
  <line x1="480" y1="105" x2="480" y2="150" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="474" y="110" width="12" height="30" fill="#ef5350" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="478,158 488,158 483,171" fill="#ef5350"/>
  </g>
  <rect x="495" y="162" width="85" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="537" y="176" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SELL SHORT</text>

  <!-- Reversion to SMA -->
  <line x1="510" y1="128" x2="510" y2="168" stroke="#ef5350" stroke-width="1"/>
  <rect x="506" y="135" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="540" y1="155" x2="540" y2="195" stroke="#ef5350" stroke-width="1"/>
  <rect x="536" y="162" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="570" y1="180" x2="570" y2="220" stroke="#ef5350" stroke-width="1"/>
  <rect x="566" y="188" width="8" height="22" fill="#ef5350" rx="1"/>

  <!-- Exit at SMA -->
  <line x1="600" y1="205" x2="600" y2="240" stroke="#ef5350" stroke-width="1"/>
  <rect x="596" y="212" width="8" height="18" fill="#ef5350" rx="1"/>
  <rect x="612" y="215" width="80" height="18" rx="4" fill="#ffb74d" fill-opacity="0.15" stroke="#ffb74d" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="652" y="228" text-anchor="middle" fill="#ffb74d" font-size="9" font-weight="500">Exit @ SMA</text>

  <!-- More candles -->
  <line x1="635" y1="215" x2="635" y2="250" stroke="#26a69a" stroke-width="1"/>
  <rect x="631" y="222" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="665" y1="230" x2="665" y2="275" stroke="#ef5350" stroke-width="1"/>
  <rect x="661" y="240" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="695" y1="252" x2="695" y2="300" stroke="#ef5350" stroke-width="1"/>
  <rect x="691" y="262" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="725" y1="275" x2="725" y2="325" stroke="#ef5350" stroke-width="1"/>
  <rect x="721" y="285" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- Mean reversion arrows -->
  <path d="M208,345 C230,370 270,360 320,228" fill="none" stroke="#00e676" stroke-width="1" stroke-dasharray="3,2" opacity="0.3"/>
  <path d="M483,110 C500,85 530,90 595,220" fill="none" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,2" opacity="0.3"/>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="121" y="397" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="146" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="171" y="390" width="8" height="25" fill="#ef5350" rx="1"/>
  </g>
  <rect x="199" y="383" width="12" height="32" fill="#00e676" rx="1" opacity="0.6"/>
  <g opacity="0.4">
    <rect x="231" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="261" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="291" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="321" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="356" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="386" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="416" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="446" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
  </g>
  <rect x="474" y="385" width="12" height="30" fill="#ef5350" rx="1" opacity="0.6"/>
  <g opacity="0.4">
    <rect x="506" y="397" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="536" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="566" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="596" y="405" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="631" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="661" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="691" y="397" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="721" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ffb74d"/>
    <text x="30" y="24" fill="#999" font-size="9">SMA (50)</text>
    <circle cx="110" cy="20" r="4" fill="#ef5350"/>
    <text x="120" y="24" fill="#999" font-size="9">Upper ATR Band</text>
    <circle cx="235" cy="20" r="4" fill="#00e676"/>
    <text x="245" y="24" fill="#999" font-size="9">Lower ATR Band / Long</text>
    <circle cx="395" cy="20" r="4" fill="#ef5350"/>
    <text x="405" y="24" fill="#999" font-size="9">Short Entry</text>
    <rect x="500" y="12" width="20" height="16" fill="#ffb74d" opacity="0.4" rx="2"/>
    <text x="525" y="24" fill="#999" font-size="9">ATR Zone</text>
  </g>
</svg>