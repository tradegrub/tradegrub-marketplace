    fill="none" stroke="#42a5f5" stroke-width="2.5" opacity="0.8" filter="url(#softGlow)"/>

  <!-- Cycle peak/trough markers -->
  <g filter="url(#glow)">
    <circle cx="170" cy="110" r="5" fill="none" stroke="#ff9800" stroke-width="1.5"/>
    <circle cx="390" cy="100" r="5" fill="none" stroke="#ff9800" stroke-width="1.5"/>
    <circle cx="610" cy="98" r="5" fill="none" stroke="#ff9800" stroke-width="1.5"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="270" cy="200" r="5" fill="none" stroke="#ab47bc" stroke-width="1.5"/>
    <circle cx="490" cy="195" r="5" fill="none" stroke="#ab47bc" stroke-width="1.5"/>
    <circle cx="710" cy="190" r="5" fill="none" stroke="#ab47bc" stroke-width="1.5"/>
  </g>

  <!-- Cycle period annotation -->
  <line x1="170" y1="85" x2="390" y2="85" stroke="#ff9800" stroke-width="1" opacity="0.6"/>
  <line x1="170" y1="80" x2="170" y2="90" stroke="#ff9800" stroke-width="1" opacity="0.6"/>
  <line x1="390" y1="80" x2="390" y2="90" stroke="#ff9800" stroke-width="1" opacity="0.6"/>
  <rect x="240" y="74" width="70" height="16" rx="4" fill="#ff9800" fill-opacity="0.15" stroke="#ff9800" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="275" y="86" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="500">~22 bars</text>

  <line x1="390" y1="85" x2="610" y2="85" stroke="#ff9800" stroke-width="1" opacity="0.4"/>
  <line x1="610" y1="80" x2="610" y2="90" stroke="#ff9800" stroke-width="1" opacity="0.6"/>

  <!-- Cycle Strength sub-pane -->
  <line x1="60" y1="300" x2="760" y2="300" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="65" y="318" fill="#888" font-size="9">Cycle Strength</text>

  <!-- Cycle strength bars (frequency domain visualization) -->
  <g opacity="0.7">
    <rect x="120" y="330" width="18" height="45" fill="#42a5f5" rx="2" filter="url(#softGlow)"/>
    <text x="129" y="385" text-anchor="middle" fill="#888" font-size="7">22</text>
    <rect x="170" y="345" width="18" height="30" fill="#42a5f5" rx="2" opacity="0.7"/>
    <text x="179" y="385" text-anchor="middle" fill="#888" font-size="7">44</text>
    <rect x="220" y="355" width="18" height="20" fill="#42a5f5" rx="2" opacity="0.5"/>
    <text x="229" y="385" text-anchor="middle" fill="#888" font-size="7">11</text>
    <rect x="270" y="362" width="18" height="13" fill="#42a5f5" rx="2" opacity="0.4"/>
    <text x="279" y="385" text-anchor="middle" fill="#888" font-size="7">7</text>
    <rect x="320" y="367" width="18" height="8" fill="#42a5f5" rx="2" opacity="0.3"/>
    <text x="329" y="385" text-anchor="middle" fill="#888" font-size="7">5</text>
  </g>
  <text x="380" y="360" fill="#888" font-size="8">Period (bars) →</text>

  <!-- Dominant cycle highlight -->
  <rect x="115" y="322" width="28" height="60" rx="3" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="129" y="318" text-anchor="middle" fill="#ff9800" font-size="8" font-weight="500">Dominant</text>

  <!-- Filtered Price sub-pane -->
  <line x1="60" y1="400" x2="760" y2="400" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="65" y="418" fill="#888" font-size="9">Filtered</text>

  <!-- Smooth filtered sine wave in sub-pane -->
  <path d="M 90,430 Q 130,415 170,410 Q 210,420 250,435 Q 290,445 330,440 Q 370,420 390,410 Q 430,415 470,435 Q 510,445 550,440 Q 590,420 610,408 Q 650,415 690,435 Q 720,445 740,440"
    fill="none" stroke="#26a69a" stroke-width="1.5" opacity="0.7"/>
  <line x1="80" y1="430" x2="760" y2="430" stroke="#888" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- Legend -->
