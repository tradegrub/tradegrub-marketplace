<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#fff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="380"/>
    <line x1="200" y1="60" x2="200" y2="380"/>
    <line x1="320" y1="60" x2="320" y2="380"/>
    <line x1="440" y1="60" x2="440" y2="380"/>
    <line x1="560" y1="60" x2="560" y2="380"/>
    <line x1="680" y1="60" x2="680" y2="380"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="170" x2="760" y2="170"/>
    <line x1="60" y1="240" x2="760" y2="240"/>
    <line x1="60" y1="310" x2="760" y2="310"/>
    <line x1="60" y1="380" x2="760" y2="380"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-family="sans-serif" font-size="17" font-weight="600">Causal Adaptive Smoother</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price line (faded) -->
  <polyline fill="none" stroke="#fff" stroke-opacity="0.3" stroke-width="1.2"
    points="80,260 105,255 130,248 155,240 180,235 205,230 230,225 255,222 280,218 305,215
            330,210 355,205 380,200 405,195 420,188 435,175 445,160 455,150 465,165
            475,185 485,170 495,145 505,160 515,180 525,155 535,135 545,155 555,175
            565,160 575,148 590,155 610,165 635,172 660,178 685,185 710,190 735,195 760,200"/>

  <!-- Standard smoother (orange dashed, with visible lag) -->
  <polyline fill="none" stroke="#ff8c42" stroke-width="2" stroke-dasharray="6,4" filter="url(#glow)"
    points="80,262 105,260 130,257 155,253 180,248 205,243 230,238 255,234 280,230 305,227
            330,223 355,218 380,213 405,208 420,204 435,198 445,190 455,178 465,168
            475,172 485,178 495,170 505,158 515,162 525,172 535,164 545,150 555,158
            565,168 575,162 590,156 610,158 635,162 660,168 685,176 710,182 735,188 760,194"/>

  <!-- Adaptive smoother (cyan solid, tracks closely in calm, smooths in volatile) -->
  <polyline fill="none" stroke="#00d4ff" stroke-width="2.2" filter="url(#glow)"
    points="80,260 105,254 130,247 155,239 180,234 205,229 230,224 255,221 280,217 305,214
            330,209 355,204 380,199 405,194 420,190 435,180 445,168 455,162 465,166
            475,172 485,168 495,158 505,162 515,170 525,160 535,148 545,158 555,168
            565,162 575,152 590,158 610,164 635,172 660,178 685,185 710,190 735,195 760,200"/>

  <!-- Volatility bars (bottom ~15% of chart height) -->
  <g fill="#7b2ff7" fill-opacity="0.5">
    <rect x="80" y="430" width="12" height="5"/>
    <rect x="105" y="428" width="12" height="7"/>
    <rect x="130" y="427" width="12" height="8"/>
    <rect x="155" y="426" width="12" height="9"/>
    <rect x="180" y="428" width="12" height="7"/>
    <rect x="205" y="429" width="12" height="6"/>
    <rect x="230" y="430" width="12" height="5"/>
    <rect x="255" y="431" width="12" height="4"/>
    <rect x="280" y="431" width="12" height="4"/>
    <rect x="305" y="430" width="12" height="5"/>
    <rect x="330" y="429" width="12" height="6"/>
    <rect x="355" y="428" width="12" height="7"/>
    <rect x="380" y="427" width="12" height="8"/>
    <rect x="405" y="425" width="12" height="10"/>
    <rect x="420" y="420" width="12" height="15"/>
    <rect x="435" y="412" width="12" height="23"/>
    <rect x="445" y="405" width="12" height="30"/>
    <rect x="455" y="400" width="12" height="35"/>
    <rect x="465" y="402" width="12" height="33"/>
    <rect x="475" y="408" width="12" height="27"/>
    <rect x="485" y="404" width="12" height="31"/>
    <rect x="495" y="398" width="12" height="37"/>
    <rect x="505" y="401" width="12" height="34"/>
    <rect x="515" y="406" width="12" height="29"/>
    <rect x="525" y="403" width="12" height="32"/>
    <rect x="535" y="397" width="12" height="38"/>
    <rect x="545" y="402" width="12" height="33"/>
    <rect x="555" y="407" width="12" height="28"/>
    <rect x="565" y="410" width="12" height="25"/>
    <rect x="575" y="415" width="12" height="20"/>
    <rect x="590" y="420" width="12" height="15"/>
    <rect x="610" y="424" width="12" height="11"/>
    <rect x="635" y="427" width="12" height="8"/>
    <rect x="660" y="429" width="12" height="6"/>
    <rect x="685" y="430" width="12" height="5"/>
    <rect x="710" y="431" width="12" height="4"/>
    <rect x="735" y="431" width="12" height="4"/>
  </g>

  <!-- Annotation: Low Volatility -->
  <line x1="220" y1="200" x2="255" y2="215" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="130" y="196" fill="#ccc" font-family="sans-serif" font-size="10" font-style="italic">Low Volatility: Less Lag</text>

  <!-- Annotation: High Volatility -->
  <line x1="535" y1="115" x2="515" y2="140" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="468" y="112" fill="#ccc" font-family="sans-serif" font-size="10" font-style="italic">High Volatility: More Stable</text>

  <!-- Legend bar -->
  <g transform="translate(0,455)" font-family="sans-serif" font-size="11">
    <circle cx="160" cy="4" r="4" fill="#fff" fill-opacity="0.3"/>
    <text x="170" y="8" fill="#999">Price</text>
    <circle cx="280" cy="4" r="4" fill="#ff8c42"/>
    <text x="290" y="8" fill="#999">Standard (lagged)</text>
    <circle cx="440" cy="4" r="4" fill="#00d4ff"/>
    <text x="450" y="8" fill="#999">Adaptive (causal)</text>
    <circle cx="600" cy="4" r="4" fill="#7b2ff7" fill-opacity="0.5"/>
    <text x="610" y="8" fill="#999">Volatility</text>
  </g>
</svg>
