  <rect x="504" y="234" width="12" height="156" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="517" y="256" width="12" height="134" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="530" y="276" width="12" height="114" fill="url(#barExtremeRight)" opacity="0.85"/>
  <rect x="543" y="296" width="12" height="94" fill="url(#barExtremeRight)" opacity="0.85"/>
