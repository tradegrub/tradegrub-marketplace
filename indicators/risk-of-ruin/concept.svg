<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Risk of Ruin Calculator</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Y axis -->
  <text x="50" y="85" text-anchor="end" fill="#555" font-family="Inter,sans-serif" font-size="9">100%</text>
  <text x="50" y="210" text-anchor="end" fill="#555" font-family="Inter,sans-serif" font-size="9">50%</text>
  <text x="50" y="300" text-anchor="end" fill="#ff5252" font-family="Inter,sans-serif" font-size="9">25%</text>
  <text x="50" y="400" text-anchor="end" fill="#555" font-family="Inter,sans-serif" font-size="9">0%</text>

  <!-- Grid -->
  <line x1="60" y1="210" x2="740" y2="210" stroke="#555555" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="60" y1="300" x2="740" y2="300" stroke="#ff5252" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Danger bg -->
  <rect x="300" y="70" width="180" height="330" fill="rgba(255,82,82,0.05)" rx="2"/>

  <!-- Risk of Ruin line (red) -->
  <polyline points="80,380 120,370 160,360 200,340 240,320 280,310 320,280 360,260 400,250 440,290 480,330 520,360 560,370 600,380 640,375 680,370 720,365" fill="none" stroke="#ff5252" stroke-width="2"/>

  <!-- Survival line (green) - inverse -->
  <polyline points="80,110 120,120 160,130 200,150 240,170 280,180 320,210 360,230 400,240 440,200 480,160 520,130 560,120 600,110 640,115 680,120 720,125" fill="none" stroke="#00e676" stroke-width="1"/>

  <!-- Win rate (blue) -->
  <polyline points="80,200 120,195 160,190 200,195 240,200 280,210 320,220 360,230 400,235 440,220 480,200 520,190 560,185 600,180 640,185 680,190 720,195" fill="none" stroke="#42a5f5" stroke-width="1"/>

  <!-- Legend -->
  <g transform="translate(100, 440)">
    <rect x="0" y="0" width="600" height="40" fill="rgba(255,255,255,0.03)" rx="6"/>
    <line x1="20" y1="20" x2="45" y2="20" stroke="#ff5252" stroke-width="2"/>
    <text x="50" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Risk of Ruin</text>
    <line x1="170" y1="20" x2="195" y2="20" stroke="#00e676" stroke-width="1.5"/>
    <text x="200" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Survival</text>
    <line x1="280" y1="20" x2="305" y2="20" stroke="#42a5f5" stroke-width="1"/>
    <text x="310" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Win Rate</text>
    <rect x="390" y="12" width="16" height="16" fill="rgba(255,82,82,0.15)" rx="2"/>
    <text x="411" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Danger Zone (>25%)</text>
  </g>
</svg>