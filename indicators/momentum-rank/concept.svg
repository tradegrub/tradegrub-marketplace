  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <rect x="12" y="12" width="16" height="16" rx="2" fill="#00e676" opacity="0.6"/>
    <text x="34" y="24" fill="#999" font-size="9">High Percentile (>75)</text>
    <rect x="160" y="12" width="16" height="16" rx="2" fill="#26a69a" opacity="0.5"/>
