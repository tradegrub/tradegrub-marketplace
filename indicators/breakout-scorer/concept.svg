<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="70%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="alertZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid lines - price pane -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="60" y1="60" x2="760" y2="60"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="140" x2="760" y2="140"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <!-- Vertical grid -->
    <line x1="160" y1="45" x2="160" y2="480"/>
    <line x1="260" y1="45" x2="260" y2="480"/>
    <line x1="360" y1="45" x2="360" y2="480"/>
    <line x1="460" y1="45" x2="460" y2="480"/>
    <line x1="560" y1="45" x2="560" y2="480"/>
    <line x1="660" y1="45" x2="660" y2="480"/>
  </g>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="16" font-weight="bold">XGBoost Breakout Scorer</text>
  <text x="400" y="44" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">tradegrub.finance -- ML Breakout Probability Scoring</text>

  <!-- Pane separator -->
  <line x1="60" y1="290" x2="760" y2="290" stroke="#334155" stroke-width="1"/>
  <text x="65" y="304" fill="#64748b" font-family="Arial, sans-serif" font-size="9">BREAKOUT SCORE</text>

  <!-- Resistance line -->
  <line x1="60" y1="130" x2="580" y2="130" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,3" stroke-opacity="0.7"/>
  <text x="585" y="127" fill="#ef4444" font-family="Arial, sans-serif" font-size="9" fill-opacity="0.8">Resistance</text>

  <!-- Consolidation candlesticks (tight range around 160-180) -->
  <!-- Bar 1 -->
  <line x1="100" y1="155" x2="100" y2="185" stroke="#94a3b8" stroke-width="1"/>
  <rect x="97" y="165" width="6" height="10" fill="#ef4444" rx="0.5"/>
  <!-- Bar 2 -->
  <line x1="120" y1="150" x2="120" y2="180" stroke="#94a3b8" stroke-width="1"/>
  <rect x="117" y="155" width="6" height="15" fill="#22c55e" rx="0.5"/>
  <!-- Bar 3 -->
  <line x1="140" y1="152" x2="140" y2="178" stroke="#94a3b8" stroke-width="1"/>
  <rect x="137" y="160" width="6" height="10" fill="#ef4444" rx="0.5"/>
  <!-- Bar 4 -->
  <line x1="160" y1="148" x2="160" y2="175" stroke="#94a3b8" stroke-width="1"/>
  <rect x="157" y="155" width="6" height="12" fill="#22c55e" rx="0.5"/>
  <!-- Bar 5 -->
  <line x1="180" y1="150" x2="180" y2="172" stroke="#94a3b8" stroke-width="1"/>
  <rect x="177" y="155" width="6" height="10" fill="#ef4444" rx="0.5"/>
  <!-- Bar 6 -->
  <line x1="200" y1="148" x2="200" y2="170" stroke="#94a3b8" stroke-width="1"/>
  <rect x="197" y="152" width="6" height="12" fill="#22c55e" rx="0.5"/>
  <!-- Bar 7 -->
  <line x1="220" y1="146" x2="220" y2="168" stroke="#94a3b8" stroke-width="1"/>
  <rect x="217" y="150" width="6" height="11" fill="#ef4444" rx="0.5"/>
  <!-- Bar 8 - tighter -->
  <line x1="240" y1="147" x2="240" y2="163" stroke="#94a3b8" stroke-width="1"/>
  <rect x="237" y="150" width="6" height="8" fill="#22c55e" rx="0.5"/>
  <!-- Bar 9 - tighter -->
  <line x1="260" y1="145" x2="260" y2="160" stroke="#94a3b8" stroke-width="1"/>
  <rect x="257" y="148" width="6" height="7" fill="#22c55e" rx="0.5"/>
  <!-- Bar 10 - very tight -->
  <line x1="280" y1="144" x2="280" y2="157" stroke="#94a3b8" stroke-width="1"/>
  <rect x="277" y="147" width="6" height="6" fill="#ef4444" rx="0.5"/>
  <!-- Bar 11 - very tight -->
  <line x1="300" y1="143" x2="300" y2="155" stroke="#94a3b8" stroke-width="1"/>
  <rect x="297" y="146" width="6" height="5" fill="#22c55e" rx="0.5"/>
  <!-- Bar 12 - squeeze -->
  <line x1="320" y1="141" x2="320" y2="152" stroke="#94a3b8" stroke-width="1"/>
  <rect x="317" y="144" width="6" height="5" fill="#22c55e" rx="0.5"/>
  <!-- Bar 13 - squeeze -->
  <line x1="340" y1="139" x2="340" y2="150" stroke="#94a3b8" stroke-width="1"/>
  <rect x="337" y="142" width="6" height="5" fill="#ef4444" rx="0.5"/>
  <!-- Bar 14 - squeeze -->
  <line x1="360" y1="137" x2="360" y2="148" stroke="#94a3b8" stroke-width="1"/>
  <rect x="357" y="140" width="6" height="5" fill="#22c55e" rx="0.5"/>

  <!-- Consolidation bracket annotation -->
  <text x="230" y="205" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9" font-style="italic">Consolidation Zone</text>
  <line x1="95" y1="195" x2="370" y2="195" stroke="#64748b" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Breakout candles (big green, breaking above resistance) -->
  <!-- Bar 15 - breakout start -->
  <line x1="390" y1="120" x2="390" y2="148" stroke="#94a3b8" stroke-width="1"/>
  <rect x="387" y="125" width="6" height="18" fill="#22c55e" rx="0.5"/>
  <!-- Bar 16 -->
  <line x1="420" y1="100" x2="420" y2="135" stroke="#94a3b8" stroke-width="1"/>
  <rect x="417" y="105" width="6" height="22" fill="#22c55e" rx="0.5"/>
  <!-- Bar 17 -->
  <line x1="450" y1="88" x2="450" y2="118" stroke="#94a3b8" stroke-width="1"/>
  <rect x="447" y="92" width="6" height="18" fill="#22c55e" rx="0.5"/>
  <!-- Bar 18 -->
  <line x1="480" y1="82" x2="480" y2="105" stroke="#94a3b8" stroke-width="1"/>
  <rect x="477" y="85" width="6" height="14" fill="#22c55e" rx="0.5"/>
  <!-- Bar 19 - pullback -->
  <line x1="510" y1="80" x2="510" y2="100" stroke="#94a3b8" stroke-width="1"/>
  <rect x="507" y="88" width="6" height="8" fill="#ef4444" rx="0.5"/>
  <!-- Bar 20 -->
  <line x1="540" y1="75" x2="540" y2="95" stroke="#94a3b8" stroke-width="1"/>
  <rect x="537" y="78" width="6" height="12" fill="#22c55e" rx="0.5"/>
  <!-- Bar 21 -->
  <line x1="570" y1="68" x2="570" y2="88" stroke="#94a3b8" stroke-width="1"/>
  <rect x="567" y="72" width="6" height="10" fill="#22c55e" rx="0.5"/>

  <!-- Volume bars (sub area near bottom of price pane) -->
  <g fill-opacity="0.5">
    <!-- Low volumes during consolidation -->
    <rect x="97" y="272" width="6" height="8" fill="#64748b"/>
    <rect x="117" y="274" width="6" height="6" fill="#64748b"/>
    <rect x="137" y="273" width="6" height="7" fill="#64748b"/>
    <rect x="157" y="275" width="6" height="5" fill="#64748b"/>
    <rect x="177" y="274" width="6" height="6" fill="#64748b"/>
    <rect x="197" y="273" width="6" height="7" fill="#64748b"/>
    <rect x="217" y="274" width="6" height="6" fill="#64748b"/>
    <!-- Rising volumes -->
    <rect x="237" y="270" width="6" height="10" fill="#0ea5e9"/>
    <rect x="257" y="267" width="6" height="13" fill="#0ea5e9"/>
    <rect x="277" y="264" width="6" height="16" fill="#0ea5e9"/>
    <rect x="297" y="260" width="6" height="20" fill="#22d3ee"/>
    <rect x="317" y="256" width="6" height="24" fill="#22d3ee"/>
    <rect x="337" y="252" width="6" height="28" fill="#22d3ee"/>
    <rect x="357" y="248" width="6" height="32" fill="#4ade80"/>
    <!-- Breakout volumes -->
    <rect x="387" y="240" width="6" height="40" fill="#22c55e"/>
    <rect x="417" y="235" width="6" height="45" fill="#22c55e"/>
    <rect x="447" y="242" width="6" height="38" fill="#22c55e"/>
    <rect x="477" y="250" width="6" height="30" fill="#22c55e"/>
    <rect x="507" y="258" width="6" height="22" fill="#ef4444" fill-opacity="0.4"/>
    <rect x="537" y="252" width="6" height="28" fill="#22c55e"/>
    <rect x="567" y="255" width="6" height="25" fill="#22c55e"/>
  </g>
  <text x="65" y="280" fill="#64748b" font-family="Arial, sans-serif" font-size="8">VOL</text>

  <!-- Sub-pane: Breakout Score -->
  <!-- Grid lines for sub-pane -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="60" y1="330" x2="760" y2="330"/>
    <line x1="60" y1="370" x2="760" y2="370"/>
    <line x1="60" y1="410" x2="760" y2="410"/>
    <line x1="60" y1="450" x2="760" y2="450"/>
  </g>

  <!-- Score axis labels -->
  <text x="55" y="314" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="8">1.0</text>
  <text x="55" y="374" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="8">0.5</text>
  <text x="55" y="454" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="8">0.0</text>

  <!-- Threshold line -->
  <line x1="60" y1="347" x2="760" y2="347" stroke="#f97316" stroke-width="1" stroke-dasharray="5,3" stroke-opacity="0.8"/>
  <text x="762" y="350" fill="#f97316" font-family="Arial, sans-serif" font-size="8">0.7</text>

  <!-- Alert zone background (where score > threshold) -->
  <rect x="310" y="310" width="110" height="37" fill="url(#alertZone)" rx="2"/>

  <!-- Breakout score line -->
  <polyline
    points="100,440 120,438 140,435 160,432 180,428 200,420 220,410 240,398 260,385 280,370 300,355 320,340 340,330 360,322 390,335 420,350 450,365 480,380 510,395 540,400 570,405"
    fill="none" stroke="url(#scoreGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Score peak dots -->
  <circle cx="340" cy="330" r="3" fill="#4ade80" stroke="#1a1a2e" stroke-width="1"/>
  <circle cx="360" cy="322" r="3.5" fill="#4ade80" stroke="#1a1a2e" stroke-width="1"/>

  <!-- Alert annotation -->
  <line x1="360" y1="322" x2="360" y2="120" stroke="#4ade80" stroke-width="0.5" stroke-dasharray="2,2" stroke-opacity="0.4"/>
  <rect x="620" y="315" width="120" height="28" rx="4" fill="#1e293b" stroke="#4ade80" stroke-width="1" stroke-opacity="0.6"/>
  <text x="680" y="328" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Breakout Alert</text>
  <text x="680" y="339" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="8">Score: 0.85 | Bullish</text>
  <line x1="620" y1="330" x2="365" y2="322" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Triangle alert markers -->
  <polygon points="340,460 344,452 336,452" fill="#4ade80" fill-opacity="0.8"/>
  <polygon points="360,460 364,452 356,452" fill="#4ade80" fill-opacity="0.8"/>

  <!-- Legend -->
  <rect x="60" y="470" width="700" height="22" rx="3" fill="#0f172a" fill-opacity="0.7"/>
  <line x1="75" y1="481" x2="95" y2="481" stroke="#22d3ee" stroke-width="2"/>
  <text x="100" y="484" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Breakout Score</text>
  <line x1="195" y1="481" x2="215" y2="481" stroke="#f97316" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="220" y="484" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Threshold</text>
  <rect x="290" y="476" width="12" height="10" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-width="0.5"/>
  <text x="307" y="484" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Alert Zone</text>
  <rect x="380" y="476" width="12" height="10" fill="#64748b" fill-opacity="0.3" stroke="#64748b" stroke-width="0.5"/>
  <text x="397" y="484" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Consolidation</text>
  <line x1="480" y1="481" x2="500" y2="481" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="505" y="484" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Resistance</text>
  <rect x="575" y="476" width="6" height="10" fill="#0ea5e9" fill-opacity="0.5"/>
  <text x="586" y="484" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Volume Buildup</text>
</svg>
