<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Multi-Factor Trend Strength</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price candles in top 55% (y 70-250) -->
  <line x1="100" y1="200" x2="100" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="210" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="130" y1="195" x2="130" y2="232" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="202" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="160" y1="185" x2="160" y2="222" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="192" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="190" y1="170" x2="190" y2="208" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="178" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="220" y1="155" x2="220" y2="192" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="162" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="250" y1="140" x2="250" y2="175" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="148" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="280" y1="128" x2="280" y2="162" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="135" width="8" height="16" fill="#26a69a" rx="1"/>
  <!-- Peak and reversal -->
  <line x1="310" y1="118" x2="310" y2="150" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="125" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="340" y1="115" x2="340" y2="145" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="118" width="8" height="15" fill="#ef5350" rx="1"/>
  <line x1="370" y1="120" x2="370" y2="155" stroke="#ef5350" stroke-width="1"/>
  <rect x="366" y="125" width="8" height="18" fill="#ef5350" rx="1"/>
  <!-- Choppy / ranging -->
  <line x1="400" y1="130" x2="400" y2="162" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="138" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="430" y1="128" x2="430" y2="158" stroke="#ef5350" stroke-width="1"/>
  <rect x="426" y="132" width="8" height="15" fill="#ef5350" rx="1"/>
  <line x1="460" y1="132" x2="460" y2="165" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="140" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="490" y1="130" x2="490" y2="160" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="135" width="8" height="14" fill="#ef5350" rx="1"/>
  <!-- Down trend -->
  <line x1="520" y1="140" x2="520" y2="175" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="145" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="550" y1="155" x2="550" y2="195" stroke="#ef5350" stroke-width="1"/>
  <rect x="546" y="162" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="580" y1="172" x2="580" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="576" y="180" width="8" height="24" fill="#ef5350" rx="1"/>
  <line x1="610" y1="190" x2="610" y2="230" stroke="#ef5350" stroke-width="1"/>
  <rect x="606" y="198" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="640" y1="205" x2="640" y2="242" stroke="#ef5350" stroke-width="1"/>
  <rect x="636" y="212" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="670" y1="218" x2="670" y2="252" stroke="#ef5350" stroke-width="1"/>
  <rect x="666" y="225" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="700" y1="230" x2="700" y2="260" stroke="#26a69a" stroke-width="1"/>
  <rect x="696" y="238" width="8" height="14" fill="#26a69a" rx="1"/>

  <!-- Background shading for strong trend zones -->
  <!-- Strong uptrend zone -->
  <rect x="155" y="65" width="200" height="200" fill="#26a69a" fill-opacity="0.04" rx="4"/>
  <!-- Weak trend zone (choppy) -->
  <rect x="385" y="65" width="130" height="200" fill="#ef5350" fill-opacity="0.04" rx="4"/>
  <!-- Strong downtrend zone -->
  <rect x="535" y="65" width="180" height="200" fill="#26a69a" fill-opacity="0.04" rx="4"/>

  <!-- Oscillator panel (bottom 35%, y 280-420) -->
  <!-- Score axis labels -->
  <text x="72" y="288" text-anchor="end" fill="#888" font-size="8">100</text>
  <text x="72" y="330" text-anchor="end" fill="#888" font-size="8">70</text>
  <text x="72" y="365" text-anchor="end" fill="#888" font-size="8">50</text>
  <text x="72" y="395" text-anchor="end" fill="#888" font-size="8">30</text>
  <text x="72" y="418" text-anchor="end" fill="#888" font-size="8">0</text>

  <!-- Strong trend threshold line -->
  <line x1="80" y1="327" x2="740" y2="327" stroke="#26a69a" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="745" y="331" fill="#26a69a" font-size="8">Strong (70)</text>

  <!-- Weak trend threshold line -->
  <line x1="80" y1="393" x2="740" y2="393" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="745" y="397" fill="#ef5350" font-size="8">Weak (30)</text>

  <!-- Neutral line -->
  <line x1="80" y1="362" x2="740" y2="362" stroke="#888" stroke-width="0.5" stroke-dasharray="2,4" opacity="0.3"/>

  <!-- Composite score line (main) -->
  <polyline points="100,395 130,380 160,355 190,330 220,310 250,300 280,295 310,298 340,310 370,330 400,375 430,390 460,385 490,392 520,355 550,325 580,305 610,298 640,302 670,310 700,340" stroke="#ff9800" stroke-width="2" fill="none"/>

  <!-- Signal line (SMA of score) -->
  <polyline points="100,398 130,388 160,370 190,348 220,328 250,312 280,302 310,300 340,308 370,325 400,360 430,385 460,390 490,390 520,375 550,345 580,318 610,305 640,302 670,305 700,325" stroke="#42a5f5" stroke-width="1.2" stroke-dasharray="4,3" fill="none" opacity="0.7"/>

  <!-- Strong trend zone fill -->
  <rect x="175" y="280" width="170" height="50" fill="#26a69a" fill-opacity="0.06" rx="3"/>
  <rect x="530" y="280" width="130" height="50" fill="#26a69a" fill-opacity="0.06" rx="3"/>

  <!-- Weak trend zone fill -->
  <rect x="390" y="370" width="110" height="50" fill="#ef5350" fill-opacity="0.06" rx="3"/>

  <!-- Component labels -->
  <rect x="160" y="280" width="130" height="16" rx="3" fill="#ffffff" fill-opacity="0.05"/>
  <text x="225" y="291" text-anchor="middle" fill="#bbb" font-size="8">ADX + Aroon + Vortex</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">Trend Score</text>
    <circle cx="130" cy="20" r="4" fill="#42a5f5"/>
    <text x="140" y="24" fill="#999" font-size="9">Signal Line</text>
    <rect x="235" y="12" width="16" height="16" fill="#26a69a" opacity="0.2" rx="2"/>
    <text x="256" y="24" fill="#999" font-size="9">Strong Trend</text>
    <rect x="345" y="12" width="16" height="16" fill="#ef5350" opacity="0.2" rx="2"/>
    <text x="366" y="24" fill="#999" font-size="9">Weak Trend</text>
    <text x="470" y="24" fill="#888" font-size="9">Components: ADX + Aroon + Vortex</text>
  </g>
</svg>