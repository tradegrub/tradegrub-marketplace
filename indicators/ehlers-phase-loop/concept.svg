<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e0e0e0">Phase Loop Oscillator</text>
  <text x="400" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8888aa">Price-Volume Quadrant Analysis</text>

  <!-- Quadrant grid -->
  <line x1="400" y1="140" x2="400" y2="420" stroke="#444466" stroke-width="1"/>
  <line x1="120" y1="280" x2="680" y2="280" stroke="#444466" stroke-width="1"/>

  <!-- Q1 top-right -->
  <rect x="405" y="145" width="270" height="130" fill="rgba(0,200,100,0.12)" rx="4"/>
  <text x="540" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#00c864">Q1: Accumulation</text>
  <text x="540" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#88aa88">Price up, Volume up</text>
  <text x="540" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#667766">Strong buying pressure</text>

  <!-- Q2 top-left -->
  <rect x="125" y="145" width="270" height="130" fill="rgba(255,200,0,0.12)" rx="4"/>
  <text x="260" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffc800">Q2: Dist Warning</text>
  <text x="260" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#aaaa66">Price up, Volume down</text>
  <text x="260" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#887744">Rally losing steam</text>

  <!-- Q3 bottom-left -->
  <rect x="125" y="285" width="270" height="130" fill="rgba(255,50,50,0.12)" rx="4"/>
  <text x="260" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff3232">Q3: Distribution</text>
  <text x="260" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#aa6666">Price down, Volume down</text>
  <text x="260" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#774444">Sellers in control</text>

  <!-- Q4 bottom-right -->
  <rect x="405" y="285" width="270" height="130" fill="rgba(100,100,255,0.12)" rx="4"/>
  <text x="540" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#6464ff">Q4: Panic</text>
  <text x="540" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8888cc">Price down, Volume up</text>
  <text x="540" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666699">Accumulation start</text>

  <!-- Axis labels -->
  <text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#8888aa">Volume Momentum</text>
  <text x="80" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#8888aa" transform="rotate(-90,80,285)">Price Momentum</text>

  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555577">Normalized ROC of price and volume mapped to quadrant phases</text>
</svg>
