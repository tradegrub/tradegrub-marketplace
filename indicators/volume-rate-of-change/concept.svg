<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Volume Rate of Change</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <line x1="60" y1="70" x2="60" y2="200" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="200" x2="750" y2="200" stroke="#333" stroke-width="1"/>
  <polyline points="100,170 160,160 220,155 280,160 340,150 400,135 460,140 520,130 580,120 640,115 700,110" stroke="#e0e0e0" stroke-width="1.5" fill="none"/>

  <!-- VROC subplot -->
  <line x1="60" y1="230" x2="750" y2="230" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="230" x2="60" y2="440" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="335" x2="750" y2="335" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="55" y="340" text-anchor="end" fill="#666" font-size="8">0%</text>

  <!-- Threshold lines -->
  <line x1="60" y1="280" x2="750" y2="280" stroke="#00e676" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="755" y="284" fill="#00e676" font-size="8">+50%</text>
  <line x1="60" y1="390" x2="750" y2="390" stroke="#ff1744" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="755" y="394" fill="#ff1744" font-size="8">-50%</text>

  <!-- Raw VROC -->
  <polyline points="100,335 160,320 220,310 280,340 340,350 400,260 460,330 520,300 580,315 640,325 700,310" stroke="#42A5F5" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Smooth VROC -->
  <polyline points="100,335 160,325 220,318 280,330 340,340 400,295 460,315 520,310 580,315 640,320 700,315" stroke="#FFA726" stroke-width="2" fill="none"/>

  <!-- Spike marker -->
  <polygon points="400,250 395,260 405,260" fill="#00e676"/>
  <text x="400" y="248" text-anchor="middle" fill="#00e676" font-size="8">Spike</text>

  <!-- Legend -->
  <rect x="180" y="462" width="12" height="12" fill="#42A5F5" rx="2"/>
  <text x="198" y="473" fill="#aaa" font-size="10">VROC Raw</text>
  <rect x="290" y="462" width="12" height="12" fill="#FFA726" rx="2"/>
  <text x="308" y="473" fill="#aaa" font-size="10">VROC Smooth</text>
  <rect x="420" y="462" width="12" height="12" fill="#00e676" rx="2"/>
  <text x="438" y="473" fill="#aaa" font-size="10">Spike Signal</text>
</svg>
