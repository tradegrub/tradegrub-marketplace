<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="cloudBull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26a69a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#26a69a" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="cloudBear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ef5350" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Cloud Trend Breakdown (Ichimoku)</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Ichimoku Cloud - bullish then bearish -->
  <!-- Senkou A -->
  <polyline points="80,190 130,185 180,178 230,172 280,170 330,175 380,185 430,198 480,215 530,232 580,248 630,262 680,275" fill="none" stroke="#26a69a" stroke-width="1.5" opacity="0.6"/>
  <!-- Senkou B -->
  <polyline points="80,210 130,208 180,205 230,200 280,198 330,195 380,192 430,195 480,200 530,208 580,218 630,228 680,240" fill="none" stroke="#ef5350" stroke-width="1.5" opacity="0.6"/>

  <!-- Cloud fill - bullish part (A > B) -->
  <polygon points="80,190 130,185 180,178 230,172 280,170 330,175 330,195 280,198 230,200 180,205 130,208 80,210" fill="url(#cloudBull)"/>
  <!-- Cloud fill - bearish part (B > A) -->
  <polygon points="330,175 380,185 430,198 480,215 530,232 580,248 630,262 680,275 680,240 630,228 580,218 530,208 480,200 430,195 380,192 330,195" fill="url(#cloudBear)"/>

  <!-- Tenkan-sen (fast) -->
  <polyline points="80,145 130,140 180,135 230,130 280,132 330,140 380,155 430,172 480,190 530,210 580,228 630,248 680,265" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.8"/>
  <text x="685" y="269" fill="#42a5f5" font-size="9">Tenkan</text>

  <!-- Kijun-sen (slow) -->
  <polyline points="80,155 130,150 180,145 230,140 280,138 330,138 380,145 430,158 480,175 530,195 580,215 630,235 680,252" fill="none" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.7"/>
  <text x="685" y="256" fill="#ef5350" font-size="9">Kijun</text>

  <!-- Price candles - above cloud then breaking down -->
  <line x1="100" y1="110" x2="100" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="115" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="130" y1="105" x2="130" y2="142" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="110" width="8" height="24" fill="#26a69a" rx="1"/>
  <line x1="160" y1="100" x2="160" y2="138" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="105" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="190" y1="98" x2="190" y2="135" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="102" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="220" y1="102" x2="220" y2="140" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="108" width="8" height="24" fill="#26a69a" rx="1"/>
  <!-- Tenkan crosses below Kijun -->
  <line x1="260" y1="112" x2="260" y2="150" stroke="#ef5350" stroke-width="1"/>
  <rect x="256" y="118" width="8" height="24" fill="#ef5350" rx="1"/>
  <line x1="290" y1="125" x2="290" y2="165" stroke="#ef5350" stroke-width="1"/>
  <rect x="286" y="130" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- TK cross annotation -->
  <rect x="300" y="118" width="130" height="18" rx="4" fill="#ff9800" fill-opacity="0.12" stroke="#ff9800" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="365" y="131" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="500">Tenkan/Kijun Bear Cross</text>

  <!-- Dropping into cloud -->
  <line x1="320" y1="142" x2="320" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="316" y="148" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="350" y1="158" x2="350" y2="200" stroke="#ef5350" stroke-width="1"/>
  <rect x="346" y="165" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="380" y1="172" x2="380" y2="212" stroke="#ef5350" stroke-width="1"/>
  <rect x="376" y="178" width="8" height="25" fill="#ef5350" rx="1"/>

  <!-- BREAKDOWN candle - breaks below cloud -->
  <line x1="420" y1="188" x2="420" y2="240" stroke="#00e676" stroke-width="1.5"/>
  <rect x="414" y="195" width="12" height="40" fill="#ef5350" rx="1" filter="url(#glow)"/>

  <!-- Breakdown signal arrow (pointing down for short) -->
  <g filter="url(#softGlow)">
    <polygon points="420,245 430,245 425,258" fill="#00e676"/>
  </g>
  <rect x="435" y="248" width="140" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="505" y="262" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">SHORT: Cloud Breakdown</text>

  <!-- Post-breakdown candles -->
  <line x1="460" y1="218" x2="460" y2="268" stroke="#ef5350" stroke-width="1"/>
  <rect x="456" y="225" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="490" y1="238" x2="490" y2="290" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="248" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="520" y1="258" x2="520" y2="310" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="265" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="550" y1="275" x2="550" y2="325" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="295" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="580" y1="290" x2="580" y2="340" stroke="#ef5350" stroke-width="1"/>
  <rect x="576" y="298" width="8" height="32" fill="#ef5350" rx="1"/>

  <!-- Entry / Stop / TP lines -->
  <line x1="415" y1="198" x2="650" y2="198" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="655" y="202" fill="#42a5f5" font-size="9">Entry (Cloud Bottom)</text>

  <line x1="415" y1="170" x2="650" y2="170" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="655" y="174" fill="#ef5350" font-size="9">Stop Loss</text>

  <line x1="415" y1="310" x2="650" y2="310" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="655" y="314" fill="#00e676" font-size="9">Take Profit</text>

  <!-- Cloud labels -->
  <text x="200" y="202" text-anchor="middle" fill="#26a69a" font-size="9" opacity="0.5">Bullish Cloud</text>
  <text x="530" y="230" text-anchor="middle" fill="#ef5350" font-size="9" opacity="0.5">Bearish Cloud</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="126" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="156" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="186" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="216" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="256" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="286" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="316" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="346" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="376" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
  </g>
  <rect x="414" y="378" width="12" height="37" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="456" y="390" width="8" height="25" fill="#ef5350" rx="1"/>
    <rect x="486" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="516" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="546" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="576" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">Tenkan-sen</text>
    <circle cx="120" cy="20" r="4" fill="#ef5350"/>
    <text x="130" y="24" fill="#999" font-size="9">Kijun-sen</text>
    <rect x="210" y="12" width="20" height="16" fill="#26a69a" opacity="0.3" rx="2"/>
    <text x="235" y="24" fill="#999" font-size="9">Bull Cloud</text>
    <rect x="310" y="12" width="20" height="16" fill="#ef5350" opacity="0.3" rx="2"/>
    <text x="335" y="24" fill="#999" font-size="9">Bear Cloud</text>
    <circle cx="420" cy="20" r="4" fill="#00e676"/>
    <text x="430" y="24" fill="#999" font-size="9">Breakdown Signal</text>
    <circle cx="555" cy="20" r="4" fill="#ff9800"/>
    <text x="565" y="24" fill="#999" font-size="9">TK Cross</text>
  </g>
</svg>