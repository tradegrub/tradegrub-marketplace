<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Cup and Handle Detector</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>
  <!-- Price axis -->
  <line x1="60" y1="70" x2="60" y2="420" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="420" x2="760" y2="420" stroke="#333" stroke-width="1"/>
  <!-- Cup shape - rounded bottom -->
  <path d="M100,120 L140,130 L160,150 L180,180 L200,220 L240,280 L280,320 L320,340 L360,350 L400,340 L440,310 L480,270 L520,220 L540,180 L560,150 L580,130 L600,120" fill="none" stroke="#42A5F5" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Candlesticks along cup -->
  <rect x="96" y="115" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="136" y="125" width="8" height="35" fill="#4CAF50" rx="1"/>
  <rect x="176" y="170" width="8" height="40" fill="#ef5350" rx="1"/>
  <rect x="236" y="270" width="8" height="35" fill="#ef5350" rx="1"/>
  <rect x="316" y="330" width="8" height="30" fill="#ef5350" rx="1"/>
  <rect x="356" y="340" width="8" height="25" fill="#4CAF50" rx="1"/>
  <rect x="396" y="330" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="476" y="260" width="8" height="35" fill="#4CAF50" rx="1"/>
  <rect x="536" y="170" width="8" height="35" fill="#4CAF50" rx="1"/>
  <rect x="596" y="115" width="8" height="30" fill="#4CAF50" rx="1"/>
  <!-- Handle -->
  <path d="M600,120 L620,135 L640,145 L660,140 L680,130 L700,115" fill="none" stroke="#FFA726" stroke-width="2"/>
  <rect x="616" y="130" width="8" height="25" fill="#ef5350" rx="1"/>
  <rect x="636" y="138" width="8" height="22" fill="#ef5350" rx="1"/>
  <rect x="656" y="132" width="8" height="25" fill="#4CAF50" rx="1"/>
  <rect x="676" y="125" width="8" height="20" fill="#4CAF50" rx="1"/>
  <rect x="696" y="108" width="8" height="25" fill="#4CAF50" rx="1"/>
  <!-- Cup box -->
  <rect x="95" y="110" width="510" height="250" fill="rgba(66,165,245,0.06)" stroke="rgba(66,165,245,0.4)" stroke-width="1" stroke-dasharray="4,4" rx="3"/>
  <!-- Rim lines -->
  <line x1="95" y1="120" x2="610" y2="120" stroke="rgba(66,165,245,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Breakout arrow -->
  <polygon points="710,100 720,90 730,100" fill="#00e676"/>
  <text x="720" y="85" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="11" font-weight="600">C&amp;H</text>
  <!-- Annotations -->
  <text x="350" y="385" text-anchor="middle" fill="#42A5F5" font-family="Inter,sans-serif" font-size="11">Cup (Rounded Bottom)</text>
  <text x="650" y="168" text-anchor="middle" fill="#FFA726" font-family="Inter,sans-serif" font-size="11">Handle</text>
  <text x="130" y="108" fill="#888" font-family="Inter,sans-serif" font-size="10">Left Rim</text>
  <text x="570" y="108" fill="#888" font-family="Inter,sans-serif" font-size="10">Right Rim</text>
  <!-- Legend -->
  <rect x="150" y="450" width="500" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
  <rect x="180" y="461" width="14" height="3" fill="#42A5F5" rx="1"/>
  <text x="200" y="466" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Cup Fit</text>
  <rect x="290" y="461" width="14" height="3" fill="#FFA726" rx="1"/>
  <text x="310" y="466" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Handle</text>
  <rect x="390" y="458" width="10" height="10" fill="rgba(66,165,245,0.15)" stroke="rgba(66,165,245,0.4)" stroke-width="1" rx="1"/>
  <text x="406" y="466" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Pattern Zone</text>
  <polygon points="520,460 525,455 530,460" fill="#00e676"/>
  <text x="538" y="466" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Breakout</text>
</svg>