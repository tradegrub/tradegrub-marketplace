<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Liquidity Sweep Detector</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Swing high resistance level -->
  <line x1="80" y1="130" x2="460" y2="130" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="75" y="128" text-anchor="end" fill="#ef5350" font-size="9">Swing High</text>

  <!-- Stops cluster zone above resistance -->
  <rect x="320" y="100" width="80" height="30" fill="#ef5350" fill-opacity="0.08" stroke="#ef5350" stroke-width="0.8" stroke-opacity="0.3" rx="4"/>
  <text x="360" y="118" text-anchor="middle" fill="#ef5350" font-size="8" opacity="0.8">Stop Clusters</text>

  <!-- Swing low support level -->
  <line x1="80" y1="310" x2="460" y2="310" stroke="#00e676" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="75" y="308" text-anchor="end" fill="#00e676" font-size="9">Swing Low</text>

  <!-- Stops cluster zone below support -->
  <rect x="100" y="310" width="80" height="30" rx="4" fill="#00e676" fill-opacity="0.08" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="140" y="328" text-anchor="middle" fill="#00e676" font-size="8" opacity="0.8">Stop Clusters</text>

  <!-- Price candles - ranging then sweep above then reversal -->
  <line x1="100" y1="210" x2="100" y2="250" stroke="#26a69a" stroke-width="1"/><rect x="96" y="215" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="125" y1="195" x2="125" y2="235" stroke="#26a69a" stroke-width="1"/><rect x="121" y="200" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="150" y1="220" x2="150" y2="255" stroke="#ef5350" stroke-width="1"/><rect x="146" y="225" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="175" y1="200" x2="175" y2="240" stroke="#26a69a" stroke-width="1"/><rect x="171" y="208" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="200" y1="180" x2="200" y2="220" stroke="#26a69a" stroke-width="1"/><rect x="196" y="185" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="225" y1="165" x2="225" y2="205" stroke="#26a69a" stroke-width="1"/><rect x="221" y="170" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="250" y1="152" x2="250" y2="192" stroke="#26a69a" stroke-width="1"/><rect x="246" y="158" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="275" y1="142" x2="275" y2="178" stroke="#26a69a" stroke-width="1"/><rect x="271" y="148" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="300" y1="135" x2="300" y2="168" stroke="#26a69a" stroke-width="1"/><rect x="296" y="138" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="325" y1="128" x2="325" y2="162" stroke="#26a69a" stroke-width="1"/><rect x="321" y="132" width="8" height="20" fill="#26a69a" rx="1"/>

  <!-- SWEEP CANDLE above resistance (wick pierces, body closes below) -->
  <line x1="355" y1="95" x2="355" y2="165" stroke="#ef5350" stroke-width="2"/><rect x="349" y="135" width="12" height="28" fill="#ef5350" rx="1" filter="url(#glow)"/>

  <!-- Sweep wick annotation -->
  <path d="M 355,95 C 340,85 320,82 310,85" fill="none" stroke="#ff9800" stroke-width="1"/>
  <polygon points="308,83 308,89 302,86" fill="#ff9800"/>
  <rect x="220" y="75" width="90" height="18" rx="4" fill="#ff9800" fill-opacity="0.12" stroke="#ff9800" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="265" y="88" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="500">Wick Sweeps Stops</text>

  <!-- Bearish sweep signal -->
  <g filter="url(#softGlow)">
    <polygon points="353,90 363,90 358,80" fill="#ef5350" transform="rotate(180, 358, 85)"/>
  </g>
  <rect x="368" y="78" width="105" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="420" y="92" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">BEARISH SWEEP</text>

  <!-- Reversal candles after sweep -->
  <line x1="380" y1="145" x2="380" y2="195" stroke="#ef5350" stroke-width="1"/><rect x="376" y="150" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="405" y1="175" x2="405" y2="225" stroke="#ef5350" stroke-width="1"/><rect x="401" y="180" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="430" y1="210" x2="430" y2="260" stroke="#ef5350" stroke-width="1"/><rect x="426" y="215" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="455" y1="245" x2="455" y2="295" stroke="#ef5350" stroke-width="1"/><rect x="451" y="252" width="8" height="30" fill="#ef5350" rx="1"/>

  <!-- Divider for second example -->
  <line x1="485" y1="65" x2="485" y2="420" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- BULLISH SWEEP example (right side) -->
  <!-- Support level for right side -->
  <line x1="490" y1="310" x2="740" y2="310" stroke="#00e676" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.6"/>

  <!-- Stops below -->
  <rect x="560" y="310" width="80" height="30" rx="4" fill="#00e676" fill-opacity="0.08" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="600" y="328" text-anchor="middle" fill="#00e676" font-size="8" opacity="0.8">Stop Clusters</text>

  <!-- Price candles descending toward support -->
  <line x1="510" y1="200" x2="510" y2="238" stroke="#ef5350" stroke-width="1"/><rect x="506" y="205" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="535" y1="225" x2="535" y2="262" stroke="#ef5350" stroke-width="1"/><rect x="531" y="230" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="560" y1="252" x2="560" y2="290" stroke="#ef5350" stroke-width="1"/><rect x="556" y="258" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="585" y1="278" x2="585" y2="312" stroke="#ef5350" stroke-width="1"/><rect x="581" y="282" width="8" height="22" fill="#ef5350" rx="1"/>

  <!-- SWEEP CANDLE below support (wick pierces, body closes above) -->
  <line x1="615" y1="278" x2="615" y2="350" stroke="#26a69a" stroke-width="2"/><rect x="609" y="282" width="12" height="25" fill="#26a69a" rx="1" filter="url(#glow)"/>

  <!-- Bullish sweep signal -->
  <g filter="url(#softGlow)">
    <polygon points="613,355 623,355 618,365" fill="#00e676" transform="rotate(180, 618, 360)"/>
  </g>
  <rect x="528" y="360" width="105" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="580" y="374" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BULLISH SWEEP</text>

  <!-- Reversal up after sweep -->
  <line x1="640" y1="255" x2="640" y2="295" stroke="#26a69a" stroke-width="1"/><rect x="636" y="260" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="665" y1="228" x2="665" y2="268" stroke="#26a69a" stroke-width="1"/><rect x="661" y="235" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="690" y1="200" x2="690" y2="242" stroke="#26a69a" stroke-width="1"/><rect x="686" y="208" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="715" y1="178" x2="715" y2="218" stroke="#26a69a" stroke-width="1"/><rect x="711" y="182" width="8" height="25" fill="#26a69a" rx="1"/>

  <!-- Wick ratio annotation -->
  <rect x="630" y="340" width="110" height="16" rx="3" fill="#ffffff" fill-opacity="0.06"/>
  <text x="685" y="352" text-anchor="middle" fill="#bbb" font-size="8">Wick ratio > 50% = valid</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="121" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="146" y="405" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="171" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="196" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="221" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="246" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="271" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="296" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="321" y="403" width="8" height="12" fill="#26a69a" rx="1"/>
  </g>
  <rect x="349" y="385" width="12" height="30" fill="#ef5350" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="376" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="401" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="426" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="451" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="506" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="531" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="556" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="581" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
  </g>
  <rect x="609" y="385" width="12" height="30" fill="#00e676" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="636" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="661" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="686" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="711" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#00e676"/>
    <text x="30" y="24" fill="#999" font-size="9">Bullish Sweep</text>
    <circle cx="130" cy="20" r="4" fill="#ef5350"/>
    <text x="140" y="24" fill="#999" font-size="9">Bearish Sweep</text>
    <line x1="240" y1="12" x2="270" y2="28" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="275" y="24" fill="#999" font-size="9">Swing Low</text>
    <line x1="350" y1="12" x2="380" y2="28" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="385" y="24" fill="#999" font-size="9">Swing High</text>
    <rect x="460" y="12" width="20" height="16" fill="#ff9800" opacity="0.3" rx="2"/>
    <text x="485" y="24" fill="#999" font-size="9">Stop Clusters</text>
    <rect x="580" y="12" width="20" height="16" fill="#00e676" opacity="0.5" rx="2"/>
    <text x="605" y="24" fill="#999" font-size="9">Volume Surge</text>
  </g>
</svg>