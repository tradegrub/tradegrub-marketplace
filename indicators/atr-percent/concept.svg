<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">ATR Percent</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price candles top 55% (y=65 to y=250) -->
  <!-- Uptrend then volatile expansion -->
  <line x1="100" y1="200" x2="100" y2="230" stroke="#26a69a" stroke-width="1"/><rect x="96" y="205" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="130" y1="190" x2="130" y2="225" stroke="#26a69a" stroke-width="1"/><rect x="126" y="195" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="160" y1="185" x2="160" y2="218" stroke="#ef5350" stroke-width="1"/><rect x="156" y="190" width="8" height="15" fill="#ef5350" rx="1"/>
  <line x1="190" y1="180" x2="190" y2="210" stroke="#26a69a" stroke-width="1"/><rect x="186" y="185" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="220" y1="175" x2="220" y2="205" stroke="#26a69a" stroke-width="1"/><rect x="216" y="178" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="250" y1="170" x2="250" y2="198" stroke="#ef5350" stroke-width="1"/><rect x="246" y="175" width="8" height="12" fill="#ef5350" rx="1"/>
  <line x1="280" y1="168" x2="280" y2="195" stroke="#26a69a" stroke-width="1"/><rect x="276" y="172" width="8" height="14" fill="#26a69a" rx="1"/>
  <!-- Low vol squeeze zone -->
  <line x1="310" y1="165" x2="310" y2="178" stroke="#26a69a" stroke-width="1"/><rect x="306" y="167" width="8" height="7" fill="#26a69a" rx="1"/>
  <line x1="340" y1="163" x2="340" y2="175" stroke="#ef5350" stroke-width="1"/><rect x="336" y="165" width="8" height="6" fill="#ef5350" rx="1"/>
  <line x1="370" y1="162" x2="370" y2="173" stroke="#26a69a" stroke-width="1"/><rect x="366" y="164" width="8" height="5" fill="#26a69a" rx="1"/>
  <line x1="400" y1="161" x2="400" y2="171" stroke="#ef5350" stroke-width="1"/><rect x="396" y="163" width="8" height="4" fill="#ef5350" rx="1"/>
  <!-- Breakout expansion -->
  <line x1="430" y1="120" x2="430" y2="170" stroke="#26a69a" stroke-width="1"/><rect x="426" y="128" width="8" height="35" fill="#26a69a" rx="1"/>
  <line x1="460" y1="100" x2="460" y2="155" stroke="#26a69a" stroke-width="1"/><rect x="456" y="108" width="8" height="38" fill="#26a69a" rx="1"/>
  <line x1="490" y1="90" x2="490" y2="140" stroke="#26a69a" stroke-width="1"/><rect x="486" y="95" width="8" height="35" fill="#26a69a" rx="1"/>
  <line x1="520" y1="105" x2="520" y2="150" stroke="#ef5350" stroke-width="1"/><rect x="516" y="110" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="550" y1="85" x2="550" y2="135" stroke="#26a69a" stroke-width="1"/><rect x="546" y="90" width="8" height="32" fill="#26a69a" rx="1"/>
  <line x1="580" y1="95" x2="580" y2="140" stroke="#ef5350" stroke-width="1"/><rect x="576" y="100" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="610" y1="88" x2="610" y2="130" stroke="#26a69a" stroke-width="1"/><rect x="606" y="92" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="640" y1="95" x2="640" y2="128" stroke="#ef5350" stroke-width="1"/><rect x="636" y="100" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="670" y1="90" x2="670" y2="120" stroke="#26a69a" stroke-width="1"/><rect x="666" y="93" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="700" y1="88" x2="700" y2="115" stroke="#26a69a" stroke-width="1"/><rect x="696" y="90" width="8" height="16" fill="#26a69a" rx="1"/>

  <!-- Separator line -->
  <line x1="60" y1="270" x2="760" y2="270" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="285" fill="#666" font-size="9">ATR %</text>

  <!-- ATR% oscillator bottom 35% (y=280 to y=420) -->
  <!-- ATR% line (raw) -->
  <polyline fill="none" stroke="#42a5f5" stroke-width="1.8" opacity="0.9"
    points="100,380 130,375 160,378 190,370 220,372 250,376 280,378 310,395 340,398 370,402 400,405 430,355 460,325 490,310 520,320 550,300 580,315 610,308 640,330 670,345 700,350"/>

  <!-- ATR% smoothed line -->
  <polyline fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"
    points="100,382 130,378 160,377 190,374 220,373 250,375 280,377 310,385 340,392 370,398 400,400 430,375 460,348 490,328 520,318 550,312 580,310 610,312 640,320 670,335 700,342"/>

  <!-- Low vol zone highlight -->
  <rect x="300" y="275" width="120" height="145" fill="#42a5f5" fill-opacity="0.04" rx="4"/>
  <text x="360" y="290" text-anchor="middle" fill="#42a5f5" font-size="9" font-weight="500">Low Volatility Squeeze</text>

  <!-- Expansion zone highlight -->
  <rect x="420" y="275" width="200" height="145" fill="#00e676" fill-opacity="0.04" rx="4"/>
  <text x="520" y="290" text-anchor="middle" fill="#00e676" font-size="9" font-weight="500">Volatility Expansion</text>

  <!-- Breakout annotation -->
  <g filter="url(#softGlow)">
    <polygon points="432,348 442,348 437,338" fill="#00e676"/>
  </g>
  <rect x="445" y="332" width="95" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="492" y="346" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BREAKOUT</text>

  <!-- Y-axis labels for ATR% -->
  <text x="72" y="310" text-anchor="end" fill="#666" font-size="8">4%</text>
  <text x="72" y="345" text-anchor="end" fill="#666" font-size="8">3%</text>
  <text x="72" y="380" text-anchor="end" fill="#666" font-size="8">2%</text>
  <text x="72" y="410" text-anchor="end" fill="#666" font-size="8">1%</text>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="96" y="430" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="126" y="428" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="156" y="432" width="8" height="8" fill="#ef5350" rx="1"/>
    <rect x="186" y="430" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="216" y="429" width="8" height="11" fill="#26a69a" rx="1"/>
    <rect x="246" y="432" width="8" height="8" fill="#ef5350" rx="1"/>
    <rect x="276" y="431" width="8" height="9" fill="#26a69a" rx="1"/>
    <rect x="306" y="435" width="8" height="5" fill="#26a69a" rx="1"/>
    <rect x="336" y="436" width="8" height="4" fill="#ef5350" rx="1"/>
    <rect x="366" y="436" width="8" height="4" fill="#26a69a" rx="1"/>
    <rect x="396" y="437" width="8" height="3" fill="#ef5350" rx="1"/>
    <rect x="426" y="420" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="456" y="415" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="486" y="418" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="516" y="425" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="546" y="420" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="576" y="423" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="606" y="425" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="636" y="428" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="666" y="427" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="696" y="429" width="8" height="11" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">ATR %</text>
    <circle cx="110" cy="20" r="4" fill="#ff9800"/>
    <text x="120" y="24" fill="#999" font-size="9">Smoothed ATR %</text>
    <circle cx="240" cy="20" r="4" fill="#00e676"/>
    <text x="250" y="24" fill="#999" font-size="9">Expansion Signal</text>
    <rect x="370" y="12" width="20" height="16" fill="#42a5f5" opacity="0.3" rx="2"/>
    <text x="395" y="24" fill="#999" font-size="9">Low Vol Zone</text>
    <rect x="490" y="12" width="20" height="16" fill="#00e676" opacity="0.3" rx="2"/>
    <text x="515" y="24" fill="#999" font-size="9">High Vol Zone</text>
  </g>
</svg>