<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Value at Risk Estimator</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <rect x="60" y="70" width="700" height="150" fill="rgba(255,255,255,0.02)" rx="4"/>
  <polyline points="100,170 160,155 220,145 280,150 340,130 400,125 460,160 520,180 580,165 640,140 700,135" fill="none" stroke="#66BB6A" stroke-width="2" opacity="0.7"/>
  <!-- Breach markers -->
  <polygon points="460,195 455,205 465,205" fill="#EF5350"/>
  <polygon points="520,195 515,205 525,205" fill="#EF5350"/>
  <!-- Breach bg -->
  <rect x="440" y="70" width="110" height="150" fill="rgba(244,67,54,0.1)"/>

  <!-- VaR subplot -->
  <rect x="60" y="250" width="700" height="180" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="270" fill="#888" font-family="Inter,sans-serif" font-size="10">VaR %</text>

  <!-- Zero line -->
  <line x1="60" y1="310" x2="760" y2="310" stroke="#888" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <text x="762" y="314" fill="#888" font-family="Inter,sans-serif" font-size="9">0%</text>

  <!-- VaR line (negative values below zero) -->
  <polyline points="100,345 160,350 220,348 280,355 340,352 400,360 460,380 520,390 580,370 640,355 700,350" fill="none" stroke="#EF5350" stroke-width="2"/>

  <!-- Labels -->
  <text x="400" y="400" text-anchor="middle" fill="#EF5350" font-family="Inter,sans-serif" font-size="10" opacity="0.8">Maximum Expected Loss at 95% Confidence</text>
  <text x="490" y="245" text-anchor="middle" fill="#EF5350" font-family="Inter,sans-serif" font-size="10">VaR Breach</text>

  <!-- Legend -->
  <rect x="60" y="460" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="475" x2="100" y2="475" stroke="#EF5350" stroke-width="2"/>
  <text x="105" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">VaR %</text>
  <polygon points="230,470 225,480 235,480" fill="#EF5350"/>
  <text x="245" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Breach Signal</text>
  <rect x="380" y="470" width="10" height="10" fill="rgba(244,67,54,0.3)"/>
  <text x="395" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Breach Zone</text>
</svg>
