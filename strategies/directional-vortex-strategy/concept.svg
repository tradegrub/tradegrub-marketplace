  <line x1="110" y1="130" x2="110" y2="168" stroke="#ef5350" stroke-width="1"/>
  <rect x="106" y="138" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="135" y1="142" x2="135" y2="180" stroke="#ef5350" stroke-width="1"/>
  <rect x="131" y="150" width="8" height="20" fill="#ef5350" rx="1"/>
