<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bbFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">MA + RSI + Bollinger Bands Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- BB fill area -->
  <path d="M80,110 Q200,100 300,115 Q400,90 500,105 Q600,95 720,108 L720,320 Q600,335 500,325 Q400,340 300,330 Q200,342 80,330 Z" fill="url(#bbFill)"/>

  <!-- BB Upper -->
  <path d="M80,110 Q200,100 300,115 Q400,90 500,105 Q600,95 720,108" fill="none" stroke="#42a5f5" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="725" y="112" fill="#42a5f5" font-size="9" opacity="0.7">BB Upper</text>

  <!-- BB Lower -->
  <path d="M80,330 Q200,342 300,330 Q400,340 500,325 Q600,335 720,320" fill="none" stroke="#42a5f5" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="725" y="324" fill="#42a5f5" font-size="9" opacity="0.7">BB Lower</text>

  <!-- 50 SMA trend line -->
  <path d="M80,240 Q160,235 240,225 Q320,215 400,205 Q480,195 560,188 Q640,182 720,180" fill="none" stroke="#ff9800" stroke-width="2.5" opacity="0.8"/>
  <text x="725" y="183" fill="#ff9800" font-size="10" font-weight="500">SMA (50)</text>

  <!-- Candlesticks - uptrend with pullbacks to lower BB -->
  <line x1="100" y1="215" x2="100" y2="260" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="222" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="130" y1="200" x2="130" y2="248" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="208" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="160" y1="185" x2="160" y2="230" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="192" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="190" y1="195" x2="190" y2="242" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="205" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="220" y1="215" x2="220" y2="270" stroke="#ef5350" stroke-width="1"/>
  <rect x="216" y="228" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="250" y1="250" x2="250" y2="310" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="262" width="8" height="35" fill="#ef5350" rx="1"/>

  <!-- Pullback hits lower BB - BUY signal 1 -->
  <line x1="280" y1="275" x2="280" y2="340" stroke="#00e676" stroke-width="1.5"/>
  <rect x="274" y="282" width="12" height="42" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="278,272 288,272 283,259" fill="#00e676"/>
  </g>
  <rect x="292" y="255" width="100" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="342" y="269" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">BUY (BB + MA + RSI)</text>

  <!-- Recovery candles -->
  <line x1="310" y1="245" x2="310" y2="295" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="255" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="340" y1="218" x2="340" y2="265" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="228" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="370" y1="190" x2="370" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="198" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="400" y1="165" x2="400" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="172" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="430" y1="148" x2="430" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="155" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="460" y1="160" x2="460" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="456" y="170" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="490" y1="185" x2="490" y2="240" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="198" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="520" y1="225" x2="520" y2="285" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="240" width="8" height="32" fill="#ef5350" rx="1"/>

  <!-- Second pullback hits lower BB - BUY signal 2 -->
  <line x1="550" y1="258" x2="550" y2="330" stroke="#00e676" stroke-width="1.5"/>
  <rect x="544" y="265" width="12" height="48" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="548,255 558,255 553,242" fill="#00e676"/>
  </g>
  <rect x="562" y="238" width="100" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="612" y="252" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">BUY (BB + MA + RSI)</text>

  <!-- Recovery -->
  <line x1="580" y1="235" x2="580" y2="280" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="245" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="610" y1="210" x2="610" y2="255" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="218" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="640" y1="185" x2="640" y2="230" stroke="#26a69a" stroke-width="1"/>
  <rect x="636" y="192" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="670" y1="168" x2="670" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="666" y="175" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="700" y1="155" x2="700" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="696" y="162" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- RSI filter annotations -->
  <rect x="230" y="345" width="75" height="18" rx="4" fill="#ab47bc" fill-opacity="0.12" stroke="#ab47bc" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="267" y="358" text-anchor="middle" fill="#ab47bc" font-size="9" font-weight="500">RSI &lt; 70 OK</text>
  <line x1="267" y1="340" x2="280" y2="345" stroke="#ab47bc" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>

  <rect x="500" y="338" width="75" height="18" rx="4" fill="#ab47bc" fill-opacity="0.12" stroke="#ab47bc" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="537" y="351" text-anchor="middle" fill="#ab47bc" font-size="9" font-weight="500">RSI &lt; 70 OK</text>

  <!-- Price above MA annotation -->
  <rect x="150" y="82" width="120" height="18" rx="4" fill="#ff9800" fill-opacity="0.1" stroke="#ff9800" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="210" y="95" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="500">Price above MA = Uptrend</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="126" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="156" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="186" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="216" y="397" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="246" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
  </g>
  <rect x="274" y="383" width="12" height="32" fill="#00e676" rx="1" opacity="0.6"/>
  <g opacity="0.4">
    <rect x="306" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="336" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="366" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="396" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="426" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="456" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="486" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="516" y="390" width="8" height="25" fill="#ef5350" rx="1"/>
  </g>
  <rect x="544" y="385" width="12" height="30" fill="#00e676" rx="1" opacity="0.6"/>
  <g opacity="0.4">
    <rect x="576" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="606" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="636" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="666" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="696" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">SMA (50)</text>
    <circle cx="110" cy="20" r="4" fill="#42a5f5"/>
    <text x="120" y="24" fill="#999" font-size="9">Bollinger Bands</text>
    <circle cx="230" cy="20" r="4" fill="#ab47bc"/>
    <text x="240" y="24" fill="#999" font-size="9">RSI Filter</text>
    <circle cx="320" cy="20" r="4" fill="#00e676"/>
    <text x="330" y="24" fill="#999" font-size="9">Buy Signal</text>
    <rect x="420" y="12" width="20" height="16" fill="#42a5f5" opacity="0.3" rx="2"/>
    <text x="445" y="24" fill="#999" font-size="9">BB Zone</text>
  </g>
</svg>