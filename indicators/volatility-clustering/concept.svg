<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="340"/>
    <line x1="200" y1="60" x2="200" y2="340"/>
    <line x1="320" y1="60" x2="320" y2="340"/>
    <line x1="440" y1="60" x2="440" y2="340"/>
    <line x1="560" y1="60" x2="560" y2="340"/>
    <line x1="680" y1="60" x2="680" y2="340"/>
    <line x1="60" y1="120" x2="760" y2="120"/>
    <line x1="60" y1="200" x2="760" y2="200"/>
    <line x1="60" y1="280" x2="760" y2="280"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Volatility Clustering (DBSCAN)</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance — Density-Based Volatility Regime Detection</text>

  <!-- Cluster zones -->
  <rect x="80" y="60" width="200" height="280" fill="#26a69a" fill-opacity="0.05" rx="2"/>
  <rect x="280" y="60" width="180" height="280" fill="#ef5350" fill-opacity="0.06" rx="2"/>
  <rect x="460" y="60" width="140" height="280" fill="#42a5f5" fill-opacity="0.05" rx="2"/>
  <rect x="600" y="60" width="160" height="280" fill="#FF9800" fill-opacity="0.05" rx="2"/>

  <!-- Cluster labels -->
  <text x="180" y="78" text-anchor="middle" fill="#26a69a" font-size="10" font-weight="500" opacity="0.8">Calm Cluster</text>
  <text x="370" y="78" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="500" opacity="0.8">Volatile Cluster</text>
  <text x="530" y="78" text-anchor="middle" fill="#42a5f5" font-size="10" font-weight="500" opacity="0.8">Moderate</text>
  <text x="680" y="78" text-anchor="middle" fill="#FF9800" font-size="10" font-weight="500" opacity="0.8">Active</text>

  <!-- Candlesticks - Calm (tight range) -->
  <line x1="100" y1="180" x2="100" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="188" width="8" height="12" fill="#26a69a" rx="1"/>
  <line x1="130" y1="182" x2="130" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="188" width="8" height="16" fill="#ef5350" rx="1"/>
  <line x1="160" y1="178" x2="160" y2="208" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="184" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="190" y1="175" x2="190" y2="206" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="182" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="220" y1="177" x2="220" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="216" y="182" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="250" y1="180" x2="250" y2="212" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="186" width="8" height="16" fill="#26a69a" rx="1"/>

  <!-- Candlesticks - Volatile (big swings) -->
  <line x1="290" y1="130" x2="290" y2="240" stroke="#ef5350" stroke-width="1"/>
  <rect x="286" y="148" width="8" height="60" fill="#ef5350" rx="1"/>
  <line x1="320" y1="150" x2="320" y2="260" stroke="#26a69a" stroke-width="1"/>
  <rect x="316" y="195" width="8" height="45" fill="#26a69a" rx="1"/>
  <line x1="350" y1="125" x2="350" y2="248" stroke="#ef5350" stroke-width="1"/>
  <rect x="346" y="140" width="8" height="72" fill="#ef5350" rx="1"/>
  <line x1="380" y1="160" x2="380" y2="270" stroke="#26a69a" stroke-width="1"/>
  <rect x="376" y="210" width="8" height="40" fill="#26a69a" rx="1"/>
  <line x1="410" y1="145" x2="410" y2="255" stroke="#ef5350" stroke-width="1"/>
  <rect x="406" y="160" width="8" height="60" fill="#ef5350" rx="1"/>
  <line x1="440" y1="170" x2="440" y2="258" stroke="#26a69a" stroke-width="1"/>
  <rect x="436" y="205" width="8" height="35" fill="#26a69a" rx="1"/>

  <!-- Candlesticks - Moderate -->
  <line x1="475" y1="175" x2="475" y2="215" stroke="#26a69a" stroke-width="1"/>
  <rect x="471" y="182" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="505" y1="170" x2="505" y2="212" stroke="#ef5350" stroke-width="1"/>
  <rect x="501" y="176" width="8" height="24" fill="#ef5350" rx="1"/>
  <line x1="535" y1="168" x2="535" y2="208" stroke="#26a69a" stroke-width="1"/>
  <rect x="531" y="175" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="565" y1="165" x2="565" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="561" y="172" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Candlesticks - Active -->
  <line x1="615" y1="150" x2="615" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="611" y="158" width="8" height="38" fill="#26a69a" rx="1"/>
  <line x1="645" y1="145" x2="645" y2="220" stroke="#ef5350" stroke-width="1"/>
  <rect x="641" y="155" width="8" height="42" fill="#ef5350" rx="1"/>
  <line x1="675" y1="138" x2="675" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="671" y="148" width="8" height="40" fill="#26a69a" rx="1"/>
  <line x1="705" y1="142" x2="705" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="701" y="150" width="8" height="40" fill="#ef5350" rx="1"/>
  <line x1="735" y1="135" x2="735" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="731" y="145" width="8" height="38" fill="#26a69a" rx="1"/>

  <!-- Noise point markers (X marks) -->
  <g stroke="#888" stroke-width="1.5" opacity="0.5">
    <line x1="267" y1="195" x2="273" y2="201"/>
    <line x1="273" y1="195" x2="267" y2="201"/>
    <line x1="457" y1="220" x2="463" y2="226"/>
    <line x1="463" y1="220" x2="457" y2="226"/>
  </g>
  <text x="270" y="215" text-anchor="middle" fill="#888" font-size="8">noise</text>

  <!-- DBSCAN cluster circles -->
  <g filter="url(#softGlow)">
    <circle cx="175" cy="195" r="45" fill="none" stroke="#26a69a" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="365" cy="200" r="55" fill="none" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="520" cy="190" r="35" fill="none" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="675" cy="180" r="42" fill="none" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  </g>

  <!-- Transition arrows -->
  <line x1="262" y1="310" x2="282" y2="310" stroke="#ff9800" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="272" y="328" text-anchor="middle" fill="#ff9800" font-size="8">Transition</text>

  <!-- Sub-pane -->
  <line x1="60" y1="355" x2="760" y2="355" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="65" y="370" fill="#888" font-size="9">Cluster</text>

  <!-- Cluster assignment bars -->
  <g opacity="0.7">
    <rect x="96" y="378" width="160" height="12" fill="#26a69a" rx="3" opacity="0.5"/>
    <rect x="286" y="378" width="165" height="12" fill="#ef5350" rx="3" opacity="0.5"/>
    <rect x="471" y="378" width="100" height="12" fill="#42a5f5" rx="3" opacity="0.5"/>
    <rect x="611" y="378" width="130" height="12" fill="#FF9800" rx="3" opacity="0.5"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 450)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Calm</text>
    <circle cx="90" cy="20" r="4" fill="#42a5f5"/>
    <text x="100" y="24" fill="#999" font-size="9">Moderate</text>
    <circle cx="180" cy="20" r="4" fill="#FF9800"/>
    <text x="190" y="24" fill="#999" font-size="9">Active</text>
    <circle cx="250" cy="20" r="4" fill="#ef5350"/>
    <text x="260" y="24" fill="#999" font-size="9">Volatile</text>
    <g transform="translate(340,14)">
      <line x1="0" y1="0" x2="6" y2="6" stroke="#888" stroke-width="1.5"/>
      <line x1="6" y1="0" x2="0" y2="6" stroke="#888" stroke-width="1.5"/>
    </g>
    <text x="355" y="24" fill="#999" font-size="9">Noise</text>
    <rect x="420" y="12" width="30" height="16" fill="#ffffff" fill-opacity="0.06" rx="10" stroke="#888" stroke-width="0.5" stroke-dasharray="3,2"/>
    <text x="455" y="24" fill="#999" font-size="9">DBSCAN Cluster</text>
  </g>
</svg>
