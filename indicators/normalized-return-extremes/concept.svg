<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="barNormal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#2a9d8f"/>
    </linearGradient>
    <linearGradient id="barExtremeLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="barExtremeRight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e17055"/>
      <stop offset="100%" stop-color="#d63031"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="80" x2="80" y2="390"/>
    <line x1="180" y1="80" x2="180" y2="390"/>
    <line x1="280" y1="80" x2="280" y2="390"/>
    <line x1="400" y1="80" x2="400" y2="390"/>
    <line x1="520" y1="80" x2="520" y2="390"/>
    <line x1="620" y1="80" x2="620" y2="390"/>
    <line x1="720" y1="80" x2="720" y2="390"/>
    <line x1="80" y1="120" x2="720" y2="120"/>
    <line x1="80" y1="180" x2="720" y2="180"/>
    <line x1="80" y1="240" x2="720" y2="240"/>
    <line x1="80" y1="300" x2="720" y2="300"/>
    <line x1="80" y1="360" x2="720" y2="360"/>
  </g>

  <!-- Axes -->
  <line x1="80" y1="390" x2="720" y2="390" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5"/>
  <line x1="80" y1="80" x2="80" y2="390" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- X-axis labels -->
  <text x="400" y="425" fill="#8892b0" font-family="Arial,sans-serif" font-size="12" text-anchor="middle">Normalized Return (σ)</text>
  <text x="130" y="408" fill="#8892b0" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">-4σ</text>
  <text x="197" y="408" fill="#8892b0" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">-3σ</text>
  <text x="265" y="408" fill="#8892b0" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">-2σ</text>
  <text x="332" y="408" fill="#8892b0" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">-1σ</text>
  <text x="400" y="408" fill="#8892b0" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">0</text>
  <text x="468" y="408" fill="#8892b0" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">+1σ</text>
  <text x="535" y="408" fill="#8892b0" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">+2σ</text>
  <text x="603" y="408" fill="#8892b0" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">+3σ</text>
  <text x="670" y="408" fill="#8892b0" font-family="Arial,sans-serif" font-size="9" text-anchor="middle">+4σ</text>

