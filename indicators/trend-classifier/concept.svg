  <!-- Separator line -->
  <line x1="60" y1="285" x2="780" y2="285" stroke="#ffffff20" stroke-width="1"/>
  <text x="65" y="300" fill="#888" font-size="9">PROBABILITY</text>

  <!-- 0.5 reference line -->
