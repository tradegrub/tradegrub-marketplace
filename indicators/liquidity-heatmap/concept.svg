<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Liquidity Heatmap</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="70" x2="80" y2="400"/><line x1="200" y1="70" x2="200" y2="400"/>
    <line x1="320" y1="70" x2="320" y2="400"/><line x1="440" y1="70" x2="440" y2="400"/>
    <line x1="560" y1="70" x2="560" y2="400"/><line x1="680" y1="70" x2="680" y2="400"/>
  </g>

  <!-- Resistance zone (step line) -->
  <line x1="80" y1="120" x2="350" y2="120" stroke="#ff1744" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="350" y1="110" x2="550" y2="110" stroke="#ff1744" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="550" y1="125" x2="740" y2="125" stroke="#ff1744" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Support zone (step line) -->
  <line x1="80" y1="340" x2="300" y2="340" stroke="#00e676" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="300" y1="350" x2="500" y2="350" stroke="#00e676" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="500" y1="335" x2="740" y2="335" stroke="#00e676" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Liquidity cluster zones (heatmap rectangles) -->
  <rect x="140" y="105" width="80" height="30" fill="#ff1744" fill-opacity="0.12" rx="3"/>
  <rect x="250" y="105" width="60" height="30" fill="#ff1744" fill-opacity="0.08" rx="3"/>
  <rect x="400" y="95" width="90" height="30" fill="#ff1744" fill-opacity="0.15" rx="3"/>
  <rect x="600" y="110" width="70" height="30" fill="#ff1744" fill-opacity="0.10" rx="3"/>

  <rect x="120" y="325" width="70" height="30" fill="#00e676" fill-opacity="0.10" rx="3"/>
  <rect x="320" y="335" width="80" height="30" fill="#00e676" fill-opacity="0.14" rx="3"/>
  <rect x="520" y="320" width="60" height="30" fill="#00e676" fill-opacity="0.08" rx="3"/>
  <rect x="650" y="320" width="70" height="30" fill="#00e676" fill-opacity="0.12" rx="3"/>

  <!-- Candlesticks -->
  <line x1="110" y1="180" x2="110" y2="280" stroke="#26a69a" stroke-width="1"/>
  <rect x="106" y="200" width="8" height="50" fill="#26a69a" rx="1"/>
  <line x1="160" y1="170" x2="160" y2="260" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="185" width="8" height="45" fill="#26a69a" rx="1"/>
  <line x1="210" y1="150" x2="210" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="206" y="165" width="8" height="45" fill="#26a69a" rx="1"/>
  <line x1="260" y1="140" x2="260" y2="220" stroke="#ef5350" stroke-width="1"/>
  <rect x="256" y="155" width="8" height="40" fill="#ef5350" rx="1"/>
  <line x1="310" y1="135" x2="310" y2="200" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="145" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="360" y1="160" x2="360" y2="250" stroke="#ef5350" stroke-width="1"/>
  <rect x="356" y="175" width="8" height="50" fill="#ef5350" rx="1"/>
  <line x1="410" y1="200" x2="410" y2="300" stroke="#ef5350" stroke-width="1"/>
  <rect x="406" y="220" width="8" height="55" fill="#ef5350" rx="1"/>
  <line x1="460" y1="250" x2="460" y2="340" stroke="#ef5350" stroke-width="1"/>
  <rect x="456" y="265" width="8" height="50" fill="#ef5350" rx="1"/>
  <line x1="510" y1="280" x2="510" y2="350" stroke="#26a69a" stroke-width="1"/>
  <rect x="506" y="290" width="8" height="40" fill="#26a69a" rx="1"/>
  <line x1="560" y1="250" x2="560" y2="320" stroke="#26a69a" stroke-width="1"/>
  <rect x="556" y="260" width="8" height="40" fill="#26a69a" rx="1"/>
  <line x1="610" y1="220" x2="610" y2="290" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="230" width="8" height="40" fill="#26a69a" rx="1"/>
  <line x1="660" y1="200" x2="660" y2="270" stroke="#ef5350" stroke-width="1"/>
  <rect x="656" y="210" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="710" y1="190" x2="710" y2="255" stroke="#26a69a" stroke-width="1"/>
  <rect x="706" y="200" width="8" height="35" fill="#26a69a" rx="1"/>

  <!-- Liq labels -->
  <rect x="160" y="96" width="30" height="14" rx="3" fill="rgba(255,23,68,0.4)"/>
  <text x="175" y="106" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="8" font-weight="600">Liq</text>
  <rect x="430" y="86" width="30" height="14" rx="3" fill="rgba(255,23,68,0.4)"/>
  <text x="445" y="96" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="8" font-weight="600">Liq</text>
  <rect x="345" y="355" width="30" height="14" rx="3" fill="rgba(0,230,118,0.4)"/>
  <text x="360" y="365" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="8" font-weight="600">Liq</text>
  <rect x="665" y="340" width="30" height="14" rx="3" fill="rgba(0,230,118,0.4)"/>
  <text x="680" y="350" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="8" font-weight="600">Liq</text>

  <!-- Annotation -->
  <rect x="520" y="135" width="140" height="22" rx="4" fill="rgba(255,23,68,0.15)" stroke="#ff1744" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="590" y="150" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="10">Stop Cluster Zone</text>

  <!-- Legend -->
  <g transform="translate(80, 440)">
    <rect width="640" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <rect x="15" y="14" width="12" height="12" fill="#ff1744" fill-opacity="0.4" rx="2"/>
    <text x="32" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Resistance Clusters</text>
    <rect x="175" y="14" width="12" height="12" fill="#00e676" fill-opacity="0.4" rx="2"/>
    <text x="192" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Support Clusters</text>
    <line x1="330" y1="20" x2="350" y2="20" stroke="#ff1744" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="355" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Swing High</text>
    <line x1="440" y1="20" x2="460" y2="20" stroke="#00e676" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="465" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Swing Low</text>
  </g>
</svg>
