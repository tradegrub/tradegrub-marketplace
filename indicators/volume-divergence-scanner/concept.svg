<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Volume Divergence Scanner</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price line making lower lows -->
  <polyline points="80,120 140,140 200,110 260,155 320,130 380,170 440,145 500,190 560,160 620,210 680,180"
    fill="none" stroke="#2196F3" stroke-width="2.5"/>
  <text x="55" y="120" fill="#e2e8f0" font-size="10">Price</text>

  <!-- Price low markers -->
  <circle cx="260" cy="155" r="5" fill="none" stroke="#ef5350" stroke-width="1.5"/>
  <circle cx="500" cy="190" r="5" fill="none" stroke="#ef5350" stroke-width="1.5"/>
  <circle cx="680" cy="180" r="5" fill="none" stroke="#ef5350" stroke-width="1.5"/>

  <!-- Lower lows arrow on price -->
  <line x1="265" y1="165" x2="495" y2="200" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="350" y="175" fill="#ef5350" font-size="10" font-weight="500">Lower Lows</text>

  <!-- Volume bars baseline at y=400 -->
  <line x1="60" y1="400" x2="720" y2="400" stroke="#787b86" stroke-width="0.5" opacity="0.3"/>
  <text x="55" y="310" fill="#e2e8f0" font-size="10">Vol</text>

  <!-- Volume bars -->
  <rect x="74" y="365" width="12" height="35" fill="#787b86" opacity="0.4" rx="1"/>
  <rect x="134" y="370" width="12" height="30" fill="#787b86" opacity="0.4" rx="1"/>
  <rect x="194" y="360" width="12" height="40" fill="#787b86" opacity="0.4" rx="1"/>
  <rect x="254" y="375" width="12" height="25" fill="#26a69a" opacity="0.6" rx="1"/>
  <rect x="314" y="368" width="12" height="32" fill="#787b86" opacity="0.4" rx="1"/>
  <rect x="374" y="372" width="12" height="28" fill="#787b86" opacity="0.4" rx="1"/>
  <rect x="434" y="365" width="12" height="35" fill="#787b86" opacity="0.4" rx="1"/>
  <rect x="494" y="355" width="12" height="45" fill="#26a69a" opacity="0.6" rx="1"/>
  <rect x="554" y="362" width="12" height="38" fill="#787b86" opacity="0.4" rx="1"/>
  <rect x="614" y="358" width="12" height="42" fill="#787b86" opacity="0.4" rx="1"/>
  <rect x="674" y="340" width="12" height="60" fill="#26a69a" opacity="0.7" rx="1"/>

  <!-- Volume low markers (higher lows) -->
  <circle cx="260" cy="375" r="5" fill="none" stroke="#26a69a" stroke-width="1.5"/>
  <circle cx="500" cy="355" r="5" fill="none" stroke="#26a69a" stroke-width="1.5"/>
  <circle cx="680" cy="340" r="5" fill="none" stroke="#26a69a" stroke-width="1.5"/>

  <!-- Higher lows arrow on volume -->
  <line x1="265" y1="375" x2="495" y2="355" stroke="#26a69a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="340" y="350" fill="#26a69a" font-size="10" font-weight="500">Higher Lows</text>

  <!-- Divergence connection arrows -->
  <g filter="url(#glow)">
    <line x1="260" y1="160" x2="260" y2="370" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
    <line x1="500" y1="195" x2="500" y2="350" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
    <line x1="680" y1="185" x2="680" y2="335" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
  </g>

  <!-- Divergence label -->
  <rect x="540" y="265" width="120" height="22" rx="4" fill="#FF9800" fill-opacity="0.15" stroke="#FF9800" stroke-width="1" stroke-opacity="0.4"/>
  <text x="600" y="280" text-anchor="middle" fill="#FF9800" font-size="11" font-weight="600">DIVERGENCE</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#2196F3"/>
    <text x="30" y="24" fill="#999" font-size="9">Price (Lower Lows)</text>
    <circle cx="175" cy="20" r="4" fill="#26a69a"/>
    <text x="185" y="24" fill="#999" font-size="9">Volume (Higher Lows)</text>
    <circle cx="340" cy="20" r="4" fill="#FF9800"/>
    <text x="350" y="24" fill="#999" font-size="9">Bullish Divergence Signal</text>
  </g>
</svg>