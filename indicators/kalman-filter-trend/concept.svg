  <text x="165" y="326" text-anchor="middle" fill="#bbb" font-size="9">Predict: x = F*x + noise</text>
  <text x="165" y="340" text-anchor="middle" fill="#bbb" font-size="9">Update: K = P / (P + R)</text>

