<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="goldenZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a017" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b8860b" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="440"/><line x1="180" y1="60" x2="180" y2="440"/>
    <line x1="280" y1="60" x2="280" y2="440"/><line x1="380" y1="60" x2="380" y2="440"/>
    <line x1="480" y1="60" x2="480" y2="440"/><line x1="580" y1="60" x2="580" y2="440"/>
    <line x1="680" y1="60" x2="680" y2="440"/><line x1="780" y1="60" x2="780" y2="440"/>
    <line x1="80" y1="110" x2="780" y2="110"/><line x1="80" y1="170" x2="780" y2="170"/>
    <line x1="80" y1="230" x2="780" y2="230"/><line x1="80" y1="290" x2="780" y2="290"/>
    <line x1="80" y1="350" x2="780" y2="350"/><line x1="80" y1="410" x2="780" y2="410"/>
  </g>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-family="Arial,sans-serif" font-size="17" font-weight="bold">Supertrend Fibonacci Levels</text>
  <text x="400" y="50" text-anchor="middle" fill="#888" font-family="Arial,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Fibonacci levels: swing high=100, swing low=380. Range=280 -->
  <!-- 0%=100, 23.6%=166, 38.2%=207, 50%=240, 61.8%=273, 78.6%=320, 100%=380 -->

  <!-- Golden Zone highlight (38.2% to 61.8%) -->
  <rect x="350" y="207" width="430" height="66" fill="url(#goldenZone)"/>

  <!-- Fib levels as dashed lines -->
  <g stroke-dasharray="6,4" stroke-width="1">
    <line x1="350" y1="166" x2="780" y2="166" stroke="#d4a017" stroke-opacity="0.5"/>
    <line x1="350" y1="207" x2="780" y2="207" stroke="#d4a017" stroke-opacity="0.6"/>
    <line x1="350" y1="240" x2="780" y2="240" stroke="#d4a017" stroke-opacity="0.5"/>
    <line x1="350" y1="273" x2="780" y2="273" stroke="#d4a017" stroke-opacity="0.6"/>
    <line x1="350" y1="320" x2="780" y2="320" stroke="#d4a017" stroke-opacity="0.5"/>
  </g>

  <!-- Fib level labels -->
  <g fill="#d4a017" font-family="Arial,sans-serif" font-size="10" text-anchor="end">
    <text x="780" y="162">23.6%</text>
    <text x="780" y="203">38.2%</text>
    <text x="780" y="236">50.0%</text>
    <text x="780" y="269">61.8%</text>
    <text x="780" y="316">78.6%</text>
  </g>

  <!-- Swing high/low markers -->
  <line x1="350" y1="100" x2="350" y2="380" stroke="#d4a017" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="354" y="96" fill="#d4a017" font-family="Arial,sans-serif" font-size="9" opacity="0.7">Swing High</text>
  <text x="354" y="392" fill="#d4a017" font-family="Arial,sans-serif" font-size="9" opacity="0.7">Swing Low</text>

  <!-- Golden Zone label -->
  <text x="786" y="243" text-anchor="end" fill="#b8860b" font-family="Arial,sans-serif" font-size="9" font-style="italic" opacity="0.8">Golden Zone</text>

  <!-- Price candles -->
  <g>
    <!-- Uptrend candles (green) -->
    <line x1="110" y1="370" x2="110" y2="340" stroke="#4caf50" stroke-width="1"/>
    <rect x="106" y="350" width="8" height="18" fill="#4caf50" rx="1"/>

    <line x1="130" y1="355" x2="130" y2="315" stroke="#4caf50" stroke-width="1"/>
    <rect x="126" y="325" width="8" height="22" fill="#4caf50" rx="1"/>

    <line x1="150" y1="330" x2="150" y2="285" stroke="#4caf50" stroke-width="1"/>
    <rect x="146" y="295" width="8" height="28" fill="#4caf50" rx="1"/>

    <line x1="170" y1="300" x2="170" y2="255" stroke="#4caf50" stroke-width="1"/>
    <rect x="166" y="265" width="8" height="25" fill="#4caf50" rx="1"/>

    <line x1="190" y1="270" x2="190" y2="220" stroke="#4caf50" stroke-width="1"/>
    <rect x="186" y="230" width="8" height="30" fill="#4caf50" rx="1"/>

    <line x1="210" y1="240" x2="210" y2="185" stroke="#4caf50" stroke-width="1"/>
    <rect x="206" y="195" width="8" height="35" fill="#4caf50" rx="1"/>

    <line x1="230" y1="200" x2="230" y2="150" stroke="#4caf50" stroke-width="1"/>
    <rect x="226" y="160" width="8" height="30" fill="#4caf50" rx="1"/>

    <line x1="250" y1="165" x2="250" y2="120" stroke="#4caf50" stroke-width="1"/>
    <rect x="246" y="130" width="8" height="25" fill="#4caf50" rx="1"/>

    <line x1="270" y1="140" x2="270" y2="105" stroke="#4caf50" stroke-width="1"/>
    <rect x="266" y="112" width="8" height="20" fill="#4caf50" rx="1"/>

    <!-- Swing high area -->
    <line x1="290" y1="120" x2="290" y2="95" stroke="#4caf50" stroke-width="1"/>
    <rect x="286" y="100" width="8" height="15" fill="#4caf50" rx="1"/>

    <line x1="310" y1="115" x2="310" y2="92" stroke="#4caf50" stroke-width="1"/>
    <rect x="306" y="97" width="8" height="12" fill="#4caf50" rx="1"/>

    <line x1="330" y1="108" x2="330" y2="90" stroke="#4caf50" stroke-width="1"/>
    <rect x="326" y="95" width="8" height="8" fill="#4caf50" rx="1"/>

    <!-- Peak / swing high candle -->
    <line x1="350" y1="105" x2="350" y2="88" stroke="#ef5350" stroke-width="1"/>
    <rect x="346" y="92" width="8" height="10" fill="#ef5350" rx="1"/>

    <!-- Pullback candles (red) -->
    <line x1="370" y1="95" x2="370" y2="118" stroke="#ef5350" stroke-width="1"/>
    <rect x="366" y="98" width="8" height="16" fill="#ef5350" rx="1"/>

    <line x1="390" y1="105" x2="390" y2="140" stroke="#ef5350" stroke-width="1"/>
    <rect x="386" y="110" width="8" height="22" fill="#ef5350" rx="1"/>

    <line x1="410" y1="125" x2="410" y2="170" stroke="#ef5350" stroke-width="1"/>
    <rect x="406" y="132" width="8" height="30" fill="#ef5350" rx="1"/>

    <!-- Bounce at 23.6% -->
    <line x1="430" y1="140" x2="430" y2="175" stroke="#ef5350" stroke-width="1"/>
    <rect x="426" y="150" width="8" height="18" fill="#ef5350" rx="1"/>

    <line x1="450" y1="155" x2="450" y2="180" stroke="#4caf50" stroke-width="1"/>
    <rect x="446" y="158" width="8" height="14" fill="#4caf50" rx="1"/>

    <line x1="470" y1="148" x2="470" y2="165" stroke="#4caf50" stroke-width="1"/>
    <rect x="466" y="150" width="8" height="10" fill="#4caf50" rx="1"/>

    <!-- Drops into Golden Zone -->
    <line x1="490" y1="145" x2="490" y2="195" stroke="#ef5350" stroke-width="1"/>
    <rect x="486" y="155" width="8" height="32" fill="#ef5350" rx="1"/>

    <line x1="510" y1="180" x2="510" y2="220" stroke="#ef5350" stroke-width="1"/>
    <rect x="506" y="190" width="8" height="22" fill="#ef5350" rx="1"/>

    <!-- Strong bounce at 50% -->
    <line x1="530" y1="205" x2="530" y2="248" stroke="#ef5350" stroke-width="1"/>
    <rect x="526" y="215" width="8" height="26" fill="#ef5350" rx="1"/>

    <line x1="550" y1="220" x2="550" y2="255" stroke="#ef5350" stroke-width="1"/>
    <rect x="546" y="230" width="8" height="18" fill="#ef5350" rx="1"/>

    <!-- Bounce candles (green) -->
    <line x1="570" y1="245" x2="570" y2="215" stroke="#4caf50" stroke-width="1"/>
    <rect x="566" y="220" width="8" height="20" fill="#4caf50" rx="1"/>

    <line x1="590" y1="230" x2="590" y2="190" stroke="#4caf50" stroke-width="1"/>
    <rect x="586" y="198" width="8" height="25" fill="#4caf50" rx="1"/>

    <line x1="610" y1="205" x2="610" y2="165" stroke="#4caf50" stroke-width="1"/>
    <rect x="606" y="172" width="8" height="28" fill="#4caf50" rx="1"/>

    <line x1="630" y1="180" x2="630" y2="145" stroke="#4caf50" stroke-width="1"/>
    <rect x="626" y="152" width="8" height="22" fill="#4caf50" rx="1"/>

    <line x1="650" y1="158" x2="650" y2="125" stroke="#4caf50" stroke-width="1"/>
    <rect x="646" y="132" width="8" height="20" fill="#4caf50" rx="1"/>

    <line x1="670" y1="138" x2="670" y2="110" stroke="#4caf50" stroke-width="1"/>
    <rect x="666" y="115" width="8" height="18" fill="#4caf50" rx="1"/>

    <line x1="690" y1="120" x2="690" y2="95" stroke="#4caf50" stroke-width="1"/>
    <rect x="686" y="100" width="8" height="15" fill="#4caf50" rx="1"/>
  </g>

  <!-- Supertrend line -->
  <polyline fill="none" stroke="#4caf50" stroke-width="2.5" filter="url(#glow)" opacity="0.9"
    points="110,375 130,352 150,328 170,298 190,268 210,243 230,205 250,168 270,145 290,125 310,118 330,110"/>
  <polyline fill="none" stroke="#ef5350" stroke-width="2.5" filter="url(#glow)" opacity="0.9"
    points="330,110 350,108 370,120 390,142 410,172 430,178 450,182 470,178 490,192 510,218 530,248 550,255"/>
  <polyline fill="none" stroke="#4caf50" stroke-width="2.5" filter="url(#glow)" opacity="0.9"
    points="550,255 570,248 590,235 610,205 630,185 650,162 670,142 690,125"/>

  <!-- Bounce arrow annotation -->
  <g fill="none" stroke="#d4a017" stroke-width="1.5" opacity="0.7">
    <path d="M 555,252 C 560,265 565,268 570,255"/>
    <polygon points="570,255 573,262 567,260" fill="#d4a017" stroke="none"/>
  </g>
  <text x="578" y="272" fill="#d4a017" font-family="Arial,sans-serif" font-size="9" opacity="0.8">Bounce</text>

  <!-- Legend bar -->
  <g transform="translate(0,460)">
    <rect x="80" y="0" width="700" height="30" rx="4" fill="#ffffff" fill-opacity="0.04"/>
    <circle cx="110" cy="15" r="5" fill="#4caf50"/>
    <text x="120" y="19" fill="#a0a0a0" font-family="Arial,sans-serif" font-size="10">Supertrend Up</text>
    <circle cx="230" cy="15" r="5" fill="#ef5350"/>
    <text x="240" y="19" fill="#a0a0a0" font-family="Arial,sans-serif" font-size="10">Supertrend Down</text>
    <line x1="350" y1="15" x2="375" y2="15" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="380" y="19" fill="#a0a0a0" font-family="Arial,sans-serif" font-size="10">Fib Levels</text>
    <rect x="470" y="8" width="30" height="14" rx="2" fill="#d4a017" fill-opacity="0.15" stroke="#d4a017" stroke-opacity="0.3" stroke-width="0.5"/>
    <text x="505" y="19" fill="#a0a0a0" font-family="Arial,sans-serif" font-size="10">Golden Zone (38.2%-61.8%)</text>
  </g>
</svg>
