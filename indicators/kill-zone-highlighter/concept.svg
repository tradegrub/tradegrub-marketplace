    <line x1="430" y1="160" x2="430" y2="230" stroke="#666"/><rect x="424" y="170" width="12" height="40" fill="#ff5252" rx="1"/>
    <line x1="460" y1="175" x2="460" y2="240" stroke="#666"/><rect x="454" y="185" width="12" height="35" fill="#4CAF50" rx="1"/>
    <line x1="490" y1="180" x2="490" y2="250" stroke="#666"/><rect x="484" y="190" width="12" height="40" fill="#ff5252" rx="1"/>
    <line x1="560" y1="200" x2="560" y2="270" stroke="#666"/><rect x="554" y="210" width="12" height="40" fill="#ff5252" rx="1"/>
