<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gaugeGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="40%" stop-color="#ffeb3b"/>
      <stop offset="100%" stop-color="#ff5252"/>
    </linearGradient>
    <clipPath id="gaugeClip">
      <rect x="738" y="80" width="18" height="340" rx="9"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="80" x2="80" y2="420"/><line x1="180" y1="80" x2="180" y2="420"/>
    <line x1="280" y1="80" x2="280" y2="420"/><line x1="380" y1="80" x2="380" y2="420"/>
    <line x1="480" y1="80" x2="480" y2="420"/><line x1="580" y1="80" x2="580" y2="420"/>
    <line x1="680" y1="80" x2="680" y2="420"/>
    <line x1="80" y1="120" x2="700" y2="120"/><line x1="80" y1="180" x2="700" y2="180"/>
    <line x1="80" y1="240" x2="700" y2="240"/><line x1="80" y1="300" x2="700" y2="300"/>
    <line x1="80" y1="360" x2="700" y2="360"/><line x1="80" y1="420" x2="700" y2="420"/>
  </g>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-family="Arial,sans-serif" font-size="17" font-weight="bold">ADF Stationarity Test</text>
  <text x="400" y="50" text-anchor="middle" fill="#8888aa" font-family="Arial,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Axis labels -->
  <text x="75" y="125" text-anchor="end" fill="#666" font-family="Arial,sans-serif" font-size="9">160</text>
  <text x="75" y="185" text-anchor="end" fill="#666" font-family="Arial,sans-serif" font-size="9">140</text>
  <text x="75" y="245" text-anchor="end" fill="#666" font-family="Arial,sans-serif" font-size="9">120</text>
  <text x="75" y="305" text-anchor="end" fill="#666" font-family="Arial,sans-serif" font-size="9">100</text>
  <text x="75" y="365" text-anchor="end" fill="#666" font-family="Arial,sans-serif" font-size="9">80</text>

  <!-- Stationary highlight zone 1 -->
  <rect x="100" y="80" width="200" height="340" fill="#00e676" opacity="0.04" rx="4"/>
  <text x="200" y="96" text-anchor="middle" fill="#00e676" opacity="0.5" font-family="Arial,sans-serif" font-size="8">STATIONARY</text>

  <!-- Non-stationary zone -->
  <rect x="300" y="80" width="180" height="340" fill="#ff5252" opacity="0.04" rx="4"/>
  <text x="390" y="96" text-anchor="middle" fill="#ff5252" opacity="0.5" font-family="Arial,sans-serif" font-size="8">NON-STATIONARY</text>

  <!-- Stationary highlight zone 2 -->
  <rect x="480" y="80" width="220" height="340" fill="#00e676" opacity="0.04" rx="4"/>
  <text x="590" y="96" text-anchor="middle" fill="#00e676" opacity="0.5" font-family="Arial,sans-serif" font-size="8">STATIONARY</text>

  <!-- Mean line for stationary zone 1 -->
  <line x1="100" y1="250" x2="300" y2="250" stroke="#ffeb3b" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- Mean line for stationary zone 2 -->
  <line x1="480" y1="280" x2="700" y2="280" stroke="#ffeb3b" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.7"/>

  <!-- Price line - stationary zone 1 (oscillates around mean ~250) -->
  <polyline fill="none" stroke="#00e676" stroke-width="2" filter="url(#glow)" opacity="0.9"
    points="100,260 115,235 130,255 145,240 160,265 175,238 190,258 205,242 220,262 235,236 250,256 265,244 280,258 295,248"/>

  <!-- Price line - trending zone (strong uptrend, non-stationary) -->
  <polyline fill="none" stroke="#ff5252" stroke-width="2" filter="url(#glow)" opacity="0.9"
    points="295,248 310,240 325,225 340,218 355,200 370,188 385,172 400,158 415,145 430,132 445,120 460,112 475,108"/>

  <!-- Price line - stationary zone 2 (oscillates around mean ~280) -->
  <polyline fill="none" stroke="#00e676" stroke-width="2" filter="url(#glow)" opacity="0.9"
    points="475,108 485,115 492,105 500,118 510,100 518,112 528,104 536,116 545,108 555,120 562,106 572,118 580,108 590,122 598,110 608,124 616,112 625,126 634,114 642,128 650,116 660,130 668,118 678,132 688,120 698,128"/>

  <!-- Mean reversion arrows -->
  <g stroke="#00e676" stroke-width="0.8" opacity="0.4" fill="none">
    <path d="M160,265 Q162,257 160,250"/>
    <path d="M235,236 Q237,243 235,250"/>
    <path d="M545,108 Q547,96 545,100"/>
    <path d="M625,126 Q627,120 625,118"/>
  </g>

  <!-- P-value gauge background -->
  <rect x="738" y="80" width="18" height="340" rx="9" fill="#222240" stroke="#444" stroke-width="0.5"/>

  <!-- Gauge fill -->
  <rect x="738" y="80" width="18" height="340" rx="9" fill="url(#gaugeGrad)" opacity="0.3" clip-path="url(#gaugeClip)"/>

  <!-- Gauge current value indicator -->
  <rect x="735" y="370" width="24" height="4" rx="2" fill="#00e676" filter="url(#glow)"/>

  <!-- Gauge labels -->
  <text x="730" y="90" text-anchor="end" fill="#ff5252" font-family="Arial,sans-serif" font-size="8" font-weight="bold">p=1.0</text>
  <text x="730" y="260" text-anchor="end" fill="#ffeb3b" font-family="Arial,sans-serif" font-size="8">p=0.05</text>
  <line x1="736" y1="256" x2="758" y2="256" stroke="#ffeb3b" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="730" y="425" text-anchor="end" fill="#00e676" font-family="Arial,sans-serif" font-size="8" font-weight="bold">p=0.0</text>

  <!-- Gauge title and value -->
  <text x="747" y="72" text-anchor="middle" fill="#aaa" font-family="Arial,sans-serif" font-size="8" font-weight="bold">ADF</text>
  <text x="747" y="440" text-anchor="middle" fill="#00e676" font-family="Arial,sans-serif" font-size="7">p=0.02</text>
  <text x="730" y="270" text-anchor="end" fill="#888" font-family="Arial,sans-serif" font-size="7">Critical</text>

  <!-- Gauge side labels -->
  <text x="770" y="170" text-anchor="middle" fill="#ff5252" font-family="Arial,sans-serif" font-size="7" opacity="0.7" transform="rotate(90,770,170)">Non-Stationary</text>
  <text x="770" y="350" text-anchor="middle" fill="#00e676" font-family="Arial,sans-serif" font-size="7" opacity="0.7" transform="rotate(90,770,350)">Stationary</text>

  <!-- Legend bar -->
  <g transform="translate(0,455)">
    <circle cx="120" cy="0" r="4" fill="#00e676"/>
    <text x="130" y="4" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Mean-Reverting (Stationary)</text>
    <circle cx="330" cy="0" r="4" fill="#ff5252"/>
    <text x="340" y="4" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Trending (Non-Stationary)</text>
    <circle cx="540" cy="0" r="4" fill="#ffeb3b"/>
    <text x="550" y="4" fill="#aaa" font-family="Arial,sans-serif" font-size="10">Mean Level</text>
    <circle cx="660" cy="0" r="4" fill="#42a5f5"/>
    <text x="670" y="4" fill="#aaa" font-family="Arial,sans-serif" font-size="10">P-value Gauge</text>
  </g>
</svg>
