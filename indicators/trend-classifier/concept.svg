<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#ffffff10" stroke-width="0.5">
    <line x1="80" y1="60" x2="80" y2="470"/>
    <line x1="220" y1="60" x2="220" y2="470"/>
    <line x1="360" y1="60" x2="360" y2="470"/>
    <line x1="500" y1="60" x2="500" y2="470"/>
    <line x1="640" y1="60" x2="640" y2="470"/>
    <line x1="780" y1="60" x2="780" y2="470"/>
    <line x1="60" y1="100" x2="780" y2="100"/>
    <line x1="60" y1="150" x2="780" y2="150"/>
    <line x1="60" y1="200" x2="780" y2="200"/>
    <line x1="60" y1="250" x2="780" y2="250"/>
    <line x1="60" y1="310" x2="780" y2="310"/>
    <line x1="60" y1="360" x2="780" y2="360"/>
    <line x1="60" y1="410" x2="780" y2="410"/>
  </g>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600" filter="url(#glow)">LightGBM Trend Classifier</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="10">tradegrub.finance -- Gradient Boosted Trend Classification</text>

  <!-- Bullish background zone -->
  <rect x="100" y="60" width="200" height="220" fill="#26a69a" opacity="0.06" rx="2"/>
  <rect x="520" y="60" width="160" height="220" fill="#26a69a" opacity="0.06" rx="2"/>

  <!-- Bearish background zone -->
  <rect x="340" y="60" width="140" height="220" fill="#ef5350" opacity="0.06" rx="2"/>

  <!-- Candlesticks -->
  <g stroke-width="1.5">
    <!-- Uptrend candles -->
    <line x1="110" y1="195" x2="110" y2="155" stroke="#26a69a"/><rect x="106" y="165" width="8" height="20" fill="#26a69a" rx="1"/>
    <line x1="130" y1="185" x2="130" y2="140" stroke="#26a69a"/><rect x="126" y="150" width="8" height="22" fill="#26a69a" rx="1"/>
    <line x1="150" y1="175" x2="150" y2="125" stroke="#26a69a"/><rect x="146" y="135" width="8" height="25" fill="#26a69a" rx="1"/>
    <line x1="170" y1="165" x2="170" y2="110" stroke="#26a69a"/><rect x="166" y="120" width="8" height="28" fill="#26a69a" rx="1"/>
    <line x1="190" y1="155" x2="190" y2="100" stroke="#26a69a"/><rect x="186" y="108" width="8" height="30" fill="#26a69a" rx="1"/>
    <line x1="210" y1="145" x2="210" y2="92" stroke="#26a69a"/><rect x="206" y="100" width="8" height="26" fill="#26a69a" rx="1"/>
    <line x1="230" y1="140" x2="230" y2="88" stroke="#26a69a"/><rect x="226" y="95" width="8" height="28" fill="#26a69a" rx="1"/>
    <line x1="250" y1="135" x2="250" y2="90" stroke="#ef5350"/><rect x="246" y="95" width="8" height="22" fill="#ef5350" rx="1"/>
