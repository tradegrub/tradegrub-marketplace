<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="oversoldZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="overboughtZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ef5350" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">RSI Mean Reversion Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- PRICE PANEL (top 50%) -->
  <text x="70" y="78" fill="#888" font-size="9">Price</text>

  <!-- Price candles showing decline, bounce, rally, exit pattern -->
  <line x1="100" y1="100" x2="100" y2="140" stroke="#ef5350" stroke-width="1"/>
  <rect x="97" y="108" width="6" height="20" fill="#ef5350" rx="1"/>
  <line x1="120" y1="115" x2="120" y2="155" stroke="#ef5350" stroke-width="1"/>
  <rect x="117" y="120" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="140" y1="128" x2="140" y2="170" stroke="#ef5350" stroke-width="1"/>
  <rect x="137" y="135" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="160" y1="145" x2="160" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="157" y="150" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="180" y1="160" x2="180" y2="200" stroke="#ef5350" stroke-width="1"/>
  <rect x="177" y="165" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="200" y1="172" x2="200" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="197" y="178" width="6" height="25" fill="#ef5350" rx="1"/>

  <!-- BUY entry candle -->
  <line x1="225" y1="185" x2="225" y2="228" stroke="#00e676" stroke-width="1.5"/>
  <rect x="220" y="190" width="10" height="25" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="221,183 229,183 225,173" fill="#00e676"/>
  </g>
  <text x="225" y="168" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- Recovery candles -->
  <line x1="250" y1="175" x2="250" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="247" y="182" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="270" y1="165" x2="270" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="267" y="172" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="290" y1="155" x2="290" y2="188" stroke="#26a69a" stroke-width="1"/>
  <rect x="287" y="160" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="310" y1="142" x2="310" y2="175" stroke="#26a69a" stroke-width="1"/>
  <rect x="307" y="148" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="330" y1="130" x2="330" y2="162" stroke="#26a69a" stroke-width="1"/>
  <rect x="327" y="135" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="350" y1="118" x2="350" y2="150" stroke="#26a69a" stroke-width="1"/>
  <rect x="347" y="122" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="370" y1="108" x2="370" y2="140" stroke="#26a69a" stroke-width="1"/>
  <rect x="367" y="112" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="390" y1="98" x2="390" y2="130" stroke="#26a69a" stroke-width="1"/>
  <rect x="387" y="102" width="6" height="18" fill="#26a69a" rx="1"/>

  <!-- EXIT candle -->
  <line x1="415" y1="92" x2="415" y2="125" stroke="#ef5350" stroke-width="1.2"/>
  <rect x="411" y="95" width="8" height="20" fill="#ef5350" rx="1"/>
  <rect x="428" y="88" width="50" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="453" y="102" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">EXIT</text>

  <!-- Separator -->
  <line x1="60" y1="245" x2="760" y2="245" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- RSI PANEL (bottom, large) -->
  <text x="70" y="265" fill="#888" font-size="9">RSI</text>

  <!-- Overbought zone -->
  <rect x="80" y="275" width="640" height="25" fill="url(#overboughtZone)" rx="0"/>
  <line x1="80" y1="290" x2="720" y2="290" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="725" y="294" fill="#ef5350" font-size="9" font-weight="500">70</text>

  <!-- Midline -->
  <line x1="80" y1="330" x2="720" y2="330" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="725" y="334" fill="#666" font-size="8">50</text>

  <!-- Oversold zone -->
  <rect x="80" y="370" width="640" height="30" fill="url(#oversoldZone)" rx="0"/>
  <line x1="80" y1="370" x2="720" y2="370" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="725" y="374" fill="#00e676" font-size="9" font-weight="500">30</text>

  <!-- RSI line - drops into oversold, crosses above 30 (BUY), rises to overbought, crosses below 70 (EXIT) -->
  <path d="M 100,310 Q 120,325 140,340 Q 160,355 180,370 Q 200,385 210,390 Q 220,382 225,370 Q 240,350 260,335 Q 280,320 300,310 Q 320,300 340,295 Q 360,290 380,285 Q 400,282 415,288 Q 430,295 450,310" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.9"/>

  <!-- RSI crossover above 30 marker -->
  <circle cx="225" cy="370" r="6" fill="none" stroke="#00e676" stroke-width="2" filter="url(#softGlow)"/>
  <text x="225" y="410" text-anchor="middle" fill="#00e676" font-size="9" font-weight="500">RSI > 30</text>
  <text x="225" y="422" text-anchor="middle" fill="#00e676" font-size="8">Crossover</text>

  <!-- RSI crossunder below 70 marker -->
  <circle cx="415" cy="288" r="6" fill="none" stroke="#ef5350" stroke-width="2" filter="url(#softGlow)"/>
  <text x="415" y="272" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="500">RSI &lt; 70</text>
  <text x="415" y="262" text-anchor="middle" fill="#ef5350" font-size="8">Crossunder</text>

  <!-- Long-only annotation -->
  <rect x="520" y="340" width="120" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="580" y="355" text-anchor="middle" fill="#bbb" font-size="10">Long-Only Strategy</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">RSI Line</text>
    <circle cx="110" cy="20" r="4" fill="#00e676"/>
    <text x="120" y="24" fill="#999" font-size="9">Buy (RSI crosses 30)</text>
    <circle cx="270" cy="20" r="4" fill="#ef5350"/>
    <text x="280" y="24" fill="#999" font-size="9">Exit (RSI crosses 70)</text>
    <rect x="430" y="12" width="20" height="16" fill="#00e676" opacity="0.3" rx="2"/>
    <text x="455" y="24" fill="#999" font-size="9">Oversold Zone</text>
    <rect x="555" y="12" width="20" height="16" fill="#ef5350" opacity="0.3" rx="2"/>
    <text x="580" y="24" fill="#999" font-size="9">Overbought Zone</text>
  </g>
</svg>