<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="380"/><line x1="200" y1="60" x2="200" y2="380"/>
    <line x1="320" y1="60" x2="320" y2="380"/><line x1="440" y1="60" x2="440" y2="380"/>
    <line x1="560" y1="60" x2="560" y2="380"/><line x1="680" y1="60" x2="680" y2="380"/>
    <line x1="60" y1="120" x2="760" y2="120"/><line x1="60" y1="190" x2="760" y2="190"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="330" x2="760" y2="330"/>
  </g>
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Dynamic Zone Reversion</text>
  <text x="400" y="52" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Dynamic upper zone boundary (red dashed) -->
  <polyline points="80,95 105,97 130,100 155,96 180,93 205,98 230,105 255,110 280,108 305,102 330,100 355,105 380,112 405,118 430,115 455,108 480,104 505,100 530,96 555,93 580,98 605,105 630,110 655,107 680,102 705,98 730,95" fill="none" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>

  <!-- Shaded area between upper zone and price -->
  <polygon points="80,95 105,97 130,100 155,96 180,93 205,98 230,105 255,110 280,108 305,102 330,100 355,105 380,112 405,118 430,115 455,108 480,104 505,100 530,96 555,93 580,98 605,105 630,110 655,107 680,102 705,98 730,95 730,120 705,135 680,155 655,175 630,200 605,218 580,230 555,195 530,160 505,140 480,155 455,180 430,210 405,235 380,250 355,260 330,245 305,220 280,195 255,170 230,150 205,140 180,135 155,130 130,125 105,118 80,110" fill="#ef5350" fill-opacity="0.06"/>

  <!-- Price polyline (cyan) -->
  <polyline points="80,110 105,118 130,125 155,130 180,135 205,140 230,150 255,170 280,195 305,220 330,245 355,260 380,250 405,235 430,210 455,180 480,155 505,140 530,160 555,195 580,230 605,218 630,200 655,175 680,155 705,135 730,120" fill="none" stroke="#00e5ff" stroke-width="2" filter="url(#glow)"/>

  <!-- VWAP line (yellow) -->
  <polyline points="80,190 105,192 130,194 155,195 180,197 205,198 230,200 255,202 280,205 305,208 330,210 355,212 380,210 405,207 430,205 455,202 480,200 505,198 530,200 555,203 580,206 605,204 630,202 655,200 680,198 705,196 730,194" fill="none" stroke="#ffd740" stroke-width="2" filter="url(#softGlow)"/>

  <!-- Dynamic lower zone boundary (green dashed) -->
  <polyline points="80,305 105,308 130,310 155,307 180,303 205,308 230,315 255,320 280,318 305,312 330,310 355,315 380,322 405,328 430,325 455,318 480,314 505,310 530,306 555,303 580,308 605,315 630,320 655,317 680,312 705,308 730,305" fill="none" stroke="#26a69a" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>

  <!-- Shaded area between price and lower zone -->
  <polygon points="80,305 105,308 130,310 155,307 180,303 205,308 230,315 255,320 280,318 305,312 330,310 355,315 380,322 405,328 430,325 455,318 480,314 505,310 530,306 555,303 580,308 605,315 630,320 655,317 680,312 705,308 730,305 730,120 705,135 680,155 655,175 630,200 605,218 580,230 555,195 530,160 505,140 480,155 455,180 430,210 405,235 380,250 355,260 330,245 305,220 280,195 255,170 230,150 205,140 180,135 155,130 130,125 105,118 80,110" fill="#26a69a" fill-opacity="0.04"/>

  <!-- Reversion arrows (price reverting toward VWAP) -->
  <!-- Arrow 1: from overbought area near x=355 down toward VWAP -->
  <path d="M 355,255 Q 365,240 370,220" fill="none" stroke="#ffd740" stroke-width="1.5" opacity="0.7"/>
  <polygon points="370,220 367,228 373,226" fill="#ffd740" opacity="0.7"/>
  <!-- Arrow 2: from oversold area near x=130 up toward VWAP -->
  <path d="M 130,130 Q 140,150 148,175" fill="none" stroke="#ffd740" stroke-width="1.5" opacity="0.7"/>
  <polygon points="148,175 145,167 151,169" fill="#ffd740" opacity="0.7"/>
  <!-- Arrow 3: from overbought near x=580 down toward VWAP -->
  <path d="M 580,225 Q 588,215 592,210" fill="none" stroke="#ffd740" stroke-width="1.5" opacity="0.7"/>
  <polygon points="592,210 589,218 595,216" fill="#ffd740" opacity="0.7"/>

  <!-- Annotations -->
  <rect x="570" y="82" width="110" height="22" rx="4" fill="#ef5350" fill-opacity="0.12" stroke="#ef5350" stroke-opacity="0.3" stroke-width="1"/>
  <text x="625" y="97" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="500">Overbought Zone</text>

  <rect x="620" y="192" width="80" height="22" rx="4" fill="#ffd740" fill-opacity="0.12" stroke="#ffd740" stroke-opacity="0.3" stroke-width="1"/>
  <text x="660" y="207" text-anchor="middle" fill="#ffd740" font-size="10" font-weight="500">VWAP Mean</text>

  <rect x="570" y="295" width="105" height="22" rx="4" fill="#26a69a" fill-opacity="0.12" stroke="#26a69a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="622" y="310" text-anchor="middle" fill="#26a69a" font-size="10" font-weight="500">Oversold Zone</text>

  <!-- Price axis labels (right side) -->
  <text x="748" y="98" fill="#888" font-size="8" opacity="0.5">$185</text>
  <text x="748" y="140" fill="#888" font-size="8" opacity="0.5">$178</text>
  <text x="748" y="200" fill="#888" font-size="8" opacity="0.5">$168</text>
  <text x="748" y="260" fill="#888" font-size="8" opacity="0.5">$158</text>
  <text x="748" y="310" fill="#888" font-size="8" opacity="0.5">$148</text>

  <!-- Time axis labels (bottom of chart area) -->
  <text x="80" y="388" text-anchor="middle" fill="#888" font-size="8" opacity="0.4">9:30</text>
  <text x="200" y="388" text-anchor="middle" fill="#888" font-size="8" opacity="0.4">10:00</text>
  <text x="320" y="388" text-anchor="middle" fill="#888" font-size="8" opacity="0.4">10:30</text>
  <text x="440" y="388" text-anchor="middle" fill="#888" font-size="8" opacity="0.4">11:00</text>
  <text x="560" y="388" text-anchor="middle" fill="#888" font-size="8" opacity="0.4">11:30</text>
  <text x="680" y="388" text-anchor="middle" fill="#888" font-size="8" opacity="0.4">12:00</text>

  <!-- Volume micro-bars at bottom of chart area -->
  <g opacity="0.15">
    <rect x="78" y="365" width="12" height="12" fill="#26a69a" rx="1"/>
    <rect x="103" y="360" width="12" height="17" fill="#26a69a" rx="1"/>
    <rect x="128" y="358" width="12" height="19" fill="#26a69a" rx="1"/>
    <rect x="153" y="362" width="12" height="15" fill="#ef5350" rx="1"/>
    <rect x="178" y="364" width="12" height="13" fill="#ef5350" rx="1"/>
    <rect x="203" y="360" width="12" height="17" fill="#26a69a" rx="1"/>
    <rect x="228" y="355" width="12" height="22" fill="#26a69a" rx="1"/>
    <rect x="253" y="352" width="12" height="25" fill="#ef5350" rx="1"/>
    <rect x="278" y="356" width="12" height="21" fill="#ef5350" rx="1"/>
    <rect x="303" y="360" width="12" height="17" fill="#26a69a" rx="1"/>
    <rect x="328" y="358" width="12" height="19" fill="#26a69a" rx="1"/>
    <rect x="353" y="354" width="12" height="23" fill="#ef5350" rx="1"/>
    <rect x="378" y="357" width="12" height="20" fill="#26a69a" rx="1"/>
    <rect x="403" y="361" width="12" height="16" fill="#26a69a" rx="1"/>
    <rect x="428" y="363" width="12" height="14" fill="#ef5350" rx="1"/>
    <rect x="453" y="359" width="12" height="18" fill="#26a69a" rx="1"/>
    <rect x="478" y="355" width="12" height="22" fill="#26a69a" rx="1"/>
    <rect x="503" y="358" width="12" height="19" fill="#26a69a" rx="1"/>
    <rect x="528" y="362" width="12" height="15" fill="#ef5350" rx="1"/>
    <rect x="553" y="360" width="12" height="17" fill="#ef5350" rx="1"/>
    <rect x="578" y="356" width="12" height="21" fill="#26a69a" rx="1"/>
    <rect x="603" y="353" width="12" height="24" fill="#26a69a" rx="1"/>
    <rect x="628" y="358" width="12" height="19" fill="#ef5350" rx="1"/>
    <rect x="653" y="361" width="12" height="16" fill="#26a69a" rx="1"/>
    <rect x="678" y="364" width="12" height="13" fill="#26a69a" rx="1"/>
    <rect x="703" y="366" width="12" height="11" fill="#ef5350" rx="1"/>
  </g>

  <!-- Zone strength indicator dots along price -->
  <circle cx="130" cy="125" r="2.5" fill="#ef5350" opacity="0.6"/>
  <circle cx="255" cy="170" r="2.5" fill="#26a69a" opacity="0.5"/>
  <circle cx="355" cy="260" r="2.5" fill="#26a69a" opacity="0.8"/>
  <circle cx="480" cy="155" r="2.5" fill="#ef5350" opacity="0.5"/>
  <circle cx="580" cy="230" r="2.5" fill="#26a69a" opacity="0.6"/>
  <circle cx="680" cy="155" r="2.5" fill="#ef5350" opacity="0.5"/>

  <!-- Confluence score gradient bar (y400-430) -->
  <text x="400" y="395" text-anchor="middle" fill="#999" font-size="10">Confluence Score</text>
  <defs>
    <linearGradient id="confluenceGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="50%" stop-color="#ffd740"/>
      <stop offset="100%" stop-color="#26a69a"/>
    </linearGradient>
  </defs>
  <rect x="120" y="402" width="560" height="14" rx="4" fill="url(#confluenceGrad)" opacity="0.6"/>
  <rect x="120" y="402" width="560" height="14" rx="4" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="180" y="430" text-anchor="middle" fill="#ef5350" font-size="10">2</text>
  <text x="400" y="430" text-anchor="middle" fill="#ffd740" font-size="10">5</text>
  <text x="620" y="430" text-anchor="middle" fill="#26a69a" font-size="10">8</text>

  <!-- Legend -->
  <g transform="translate(60, 455)">
    <rect width="680" height="30" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="15" cy="15" r="4" fill="#00e5ff"/>
    <text x="25" y="19" fill="#999" font-size="9">Price</text>
    <circle cx="80" cy="15" r="4" fill="#ef5350" opacity="0.7"/>
    <text x="90" y="19" fill="#999" font-size="9">Dynamic Zones</text>
    <circle cx="190" cy="15" r="4" fill="#ffd740"/>
    <text x="200" y="19" fill="#999" font-size="9">VWAP</text>
    <circle cx="260" cy="15" r="4" fill="url(#confluenceGrad)"/>
    <text x="270" y="19" fill="#999" font-size="9">Confluence Score</text>
    <circle cx="395" cy="15" r="4" fill="#ffd740" opacity="0.7"/>
    <text x="405" y="19" fill="#999" font-size="9">Reversion Signal</text>
  </g>
</svg>