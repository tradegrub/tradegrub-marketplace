<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" in="SourceGraphic" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" rx="8" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#fff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="60" x2="100" y2="430"/>
    <line x1="200" y1="60" x2="200" y2="430"/>
    <line x1="300" y1="60" x2="300" y2="430"/>
    <line x1="400" y1="60" x2="400" y2="430"/>
    <line x1="500" y1="60" x2="500" y2="430"/>
    <line x1="600" y1="60" x2="600" y2="430"/>
    <line x1="700" y1="60" x2="700" y2="430"/>
  </g>
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" fill="white" font-weight="bold">Quasimodo Reversal</text>
  <text x="400" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#888">tradegrub.finance</text>
  <!-- QML Level dashed line -->
  <line x1="60" y1="290" x2="740" y2="290" stroke="#aaa" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="748" y="294" font-family="Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="start">QML Level</text>
  <!-- Entry Zone -->
  <rect x="490" y="278" width="110" height="25" rx="3" fill="#00ff88" opacity="0.15" stroke="#00ff88" stroke-width="1" stroke-opacity="0.4"/>
  <text x="545" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#00ff88" opacity="0.7">Entry Zone</text>
  <!-- Price polyline: start -> HH -> HL -> LH -> LL -> reversal -->
  <polyline points="80,280 140,230 200,180 250,120 320,200 370,300 430,240 480,150 540,290 580,330 610,350 660,280 710,220 740,180" fill="none" stroke="white" stroke-width="2.5" filter="url(#glow)" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- HH label -->
  <circle cx="250" cy="120" r="4" fill="#00e5ff" opacity="0.8"/>
  <text x="250" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#00e5ff" font-weight="bold">HH</text>
  <!-- HL label -->
  <circle cx="370" cy="300" r="3" fill="#ccc" opacity="0.6"/>
  <text x="370" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#ccc">HL</text>
  <!-- LH label -->
  <circle cx="480" cy="150" r="4" fill="#ffd740" opacity="0.8"/>
  <text x="480" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#ffd740" font-weight="bold">LH</text>
  <!-- LL label + Structure Break -->
  <circle cx="610" cy="350" r="4" fill="#ff4444" opacity="0.8"/>
  <text x="610" y="372" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#ff4444" font-weight="bold">LL</text>
  <rect x="568" y="378" width="84" height="20" rx="3" fill="none" stroke="#ff4444" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="610" y="392" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#ff4444">Structure Break</text>
  <!-- Legend bar -->
  <rect x="0" y="440" width="800" height="60" fill="#0d0d1a" opacity="0.7"/>
  <line x1="200" y1="468" x2="230" y2="468" stroke="white" stroke-width="2.5" filter="url(#glow)"/>
  <text x="236" y="472" font-family="Arial,sans-serif" font-size="11" fill="#ccc">Price</text>
  <rect x="320" y="461" width="14" height="14" rx="2" fill="none" stroke="#ff4444" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="340" y="472" font-family="Arial,sans-serif" font-size="11" fill="#ccc">Structure Break</text>
  <rect x="470" y="461" width="14" height="14" rx="2" fill="#00ff88" opacity="0.2" stroke="#00ff88" stroke-width="1"/>
  <text x="490" y="472" font-family="Arial,sans-serif" font-size="11" fill="#ccc">Entry Zone</text>
</svg>