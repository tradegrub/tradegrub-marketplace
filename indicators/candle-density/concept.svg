    <rect x="172" y="224" width="56" height="28" fill="#5c3d99"/>
    <rect x="228" y="224" width="56" height="28" fill="#c4621a"/>
    <rect x="284" y="224" width="70" height="28" fill="#e8a020"/>
    <rect x="354" y="224" width="56" height="28" fill="#f0c030"/>
    <rect x="410" y="224" width="56" height="28" fill="#e8a020"/>
    <rect x="466" y="224" width="56" height="28" fill="#f0c030"/>
    <rect x="522" y="224" width="70" height="28" fill="#e8a020"/>
