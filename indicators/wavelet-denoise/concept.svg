<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">SciPy Wavelet Denoise</text>
  <text x="400" y="50" text-anchor="middle" fill="#8892b0" font-size="11">tradegrub.finance — Butterworth Filter Trend Extraction</text>

  <!-- Grid lines - top pane -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="60" y1="70" x2="760" y2="70"/>
    <line x1="60" y1="115" x2="760" y2="115"/>
    <line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="205" x2="760" y2="205"/>
    <line x1="60" y1="250" x2="760" y2="250"/>
    <!-- vertical -->
    <line x1="160" y1="65" x2="160" y2="255"/>
    <line x1="260" y1="65" x2="260" y2="255"/>
    <line x1="360" y1="65" x2="360" y2="255"/>
    <line x1="460" y1="65" x2="460" y2="255"/>
    <line x1="560" y1="65" x2="560" y2="255"/>
    <line x1="660" y1="65" x2="660" y2="255"/>
  </g>

  <!-- SNR background shading in top pane -->
  <rect x="60" y="65" width="180" height="195" fill="#66bb6a" opacity="0.06" rx="2"/>
  <rect x="240" y="65" width="120" height="195" fill="#ef5350" opacity="0.06" rx="2"/>
  <rect x="360" y="65" width="200" height="195" fill="#66bb6a" opacity="0.06" rx="2"/>
  <rect x="560" y="65" width="80" height="195" fill="#ef5350" opacity="0.06" rx="2"/>
  <rect x="640" y="65" width="120" height="195" fill="#66bb6a" opacity="0.06" rx="2"/>

  <!-- Y-axis labels top pane -->
  <text x="55" y="74" text-anchor="end" fill="#5a6a8a" font-size="8">180</text>
  <text x="55" y="119" text-anchor="end" fill="#5a6a8a" font-size="8">160</text>
  <text x="55" y="164" text-anchor="end" fill="#5a6a8a" font-size="8">140</text>
  <text x="55" y="209" text-anchor="end" fill="#5a6a8a" font-size="8">120</text>
  <text x="55" y="254" text-anchor="end" fill="#5a6a8a" font-size="8">100</text>

  <!-- Original price (noisy, faint gray) -->
  <polyline fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"
    points="60,210 75,205 85,215 95,200 110,208 120,195 130,203 140,190 155,198 165,185 175,192 185,178 195,185 210,172 220,180 230,168 245,160 255,170 265,155 275,165 285,148 295,158 305,142 315,155 325,138 335,150 345,135 355,145 365,130 375,142 385,128 400,138 410,125 420,135 430,120 440,132 450,118 460,128 470,115 480,125 490,112 500,120 510,108 520,118 530,105 540,115 550,102 560,112 570,100 580,108 590,115 600,105 610,118 620,108 630,120 640,112 650,125 660,115 670,128 680,120 690,132 700,122 710,135 720,125 730,138 740,128 750,140 760,132"/>

  <!-- Denoised trend (smooth blue) -->
  <polyline fill="none" stroke="#42A5F5" stroke-width="2.5" filter="url(#glowStrong)" stroke-linecap="round" stroke-linejoin="round"
    points="60,208 80,202 100,195 120,188 140,180 160,172 180,165 200,158 220,152 240,148 260,145 280,143 300,142 320,143 340,145 360,140 380,135 400,130 420,126 440,124 460,122 480,120 500,118 520,115 540,112 560,108 580,106 600,110 620,114 630,118 650,120 670,122 690,125 710,128 730,131 750,134 760,136"/>

  <!-- Trend annotations -->
  <g filter="url(#glow)">
    <text x="200" y="143" fill="#66bb6a" font-size="9" font-weight="600" text-anchor="middle">Trend Up</text>
    <line x1="200" y1="146" x2="200" y2="154" stroke="#66bb6a" stroke-width="1" stroke-opacity="0.6"/>
    <polygon points="197,154 200,160 203,154" fill="#66bb6a" opacity="0.6"/>
  </g>

  <g filter="url(#glow)">
    <text x="560" y="96" fill="#ef5350" font-size="9" font-weight="600" text-anchor="middle">Trend Down</text>
    <line x1="560" y1="99" x2="560" y2="105" stroke="#ef5350" stroke-width="1" stroke-opacity="0.6"/>
    <polygon points="557,105 560,111 563,105" fill="#ef5350" opacity="0.6"/>
  </g>

  <g filter="url(#glow)">
    <text x="700" y="116" fill="#66bb6a" font-size="9" font-weight="600" text-anchor="middle">Trend Up</text>
    <line x1="700" y1="119" x2="700" y2="123" stroke="#66bb6a" stroke-width="1" stroke-opacity="0.6"/>
    <polygon points="697,123 700,129 703,123" fill="#66bb6a" opacity="0.6"/>
  </g>

  <!-- Separator -->
  <line x1="60" y1="270" x2="760" y2="270" stroke="#ffffff" stroke-opacity="0.1" stroke-width="0.5"/>

  <!-- Sub-pane 1: Noise component -->
  <text x="65" y="284" fill="#8892b0" font-size="9" font-weight="600">Noise Component</text>

  <!-- Grid lines noise pane -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="60" y1="300" x2="760" y2="300"/>
    <line x1="60" y1="320" x2="760" y2="320"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <!-- Zero line -->
  <line x1="60" y1="320" x2="760" y2="320" stroke="#ffffff" stroke-opacity="0.12" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Noise oscillation (orange) -->
  <polyline fill="none" stroke="#FF7043" stroke-width="1.5" filter="url(#glow)" stroke-linecap="round"
    points="60,318 70,325 80,312 90,328 100,310 110,326 120,308 130,325 140,314 150,323 160,316 170,324 180,311 190,327 200,308 210,326 220,311 230,328 240,318 250,326 260,312 270,329 280,306 290,331 300,304 310,333 320,308 330,329 340,311 350,327 360,315 370,325 380,314 390,327 400,308 410,329 420,306 430,331 440,310 450,327 460,313 470,325 480,315 490,326 500,310 510,328 520,308 530,330 540,306 550,333 560,304 570,331 580,313 590,323 600,318 610,325 620,313 630,327 640,311 650,323 660,317 670,325 680,315 690,323 700,317 710,325 720,313 730,327 740,315 750,323 760,318"/>

  <!-- Separator -->
  <line x1="60" y1="355" x2="760" y2="355" stroke="#ffffff" stroke-opacity="0.1" stroke-width="0.5"/>

  <!-- Sub-pane 2: SNR indication -->
  <text x="65" y="370" fill="#8892b0" font-size="9" font-weight="600">Signal-to-Noise Ratio</text>

  <!-- SNR bars -->
  <rect x="60" y="378" width="180" height="16" fill="#66bb6a" opacity="0.25" rx="2"/>
  <rect x="240" y="378" width="120" height="16" fill="#ef5350" opacity="0.25" rx="2"/>
  <rect x="360" y="378" width="200" height="16" fill="#66bb6a" opacity="0.25" rx="2"/>
  <rect x="560" y="378" width="80" height="16" fill="#ef5350" opacity="0.25" rx="2"/>
  <rect x="640" y="378" width="120" height="16" fill="#66bb6a" opacity="0.25" rx="2"/>
  <text x="150" y="390" text-anchor="middle" fill="#66bb6a" font-size="8" opacity="0.8">High SNR</text>
  <text x="300" y="390" text-anchor="middle" fill="#ef5350" font-size="8" opacity="0.8">Low SNR</text>
  <text x="460" y="390" text-anchor="middle" fill="#66bb6a" font-size="8" opacity="0.8">High SNR</text>
  <text x="600" y="390" text-anchor="middle" fill="#ef5350" font-size="8" opacity="0.8">Low</text>
  <text x="700" y="390" text-anchor="middle" fill="#66bb6a" font-size="8" opacity="0.8">High SNR</text>

  <!-- Stats box -->
  <rect x="420" y="405" width="340" height="28" rx="6" fill="#0d1b2a" stroke="#42A5F5" stroke-opacity="0.3" stroke-width="1"/>
  <text x="590" y="423" text-anchor="middle" fill="#ccd6f6" font-size="11" font-weight="600">SNR: 12.3 dB  |  Noise: 0.45%  |  Cutoff: 20 bars</text>

  <!-- Legend -->
  <g transform="translate(60, 450)">
    <rect width="700" height="30" rx="4" fill="#ffffff" fill-opacity="0.03"/>

    <!-- Original Price -->
    <line x1="15" y1="15" x2="35" y2="15" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="40" y="19" fill="#8892b0" font-size="10">Original Price</text>

    <!-- Denoised Trend -->
    <line x1="155" y1="15" x2="175" y2="15" stroke="#42A5F5" stroke-width="2.5"/>
    <text x="180" y="19" fill="#8892b0" font-size="10">Denoised Trend</text>

    <!-- Noise Level -->
    <line x1="310" y1="15" x2="330" y2="15" stroke="#FF7043" stroke-width="1.5"/>
    <text x="335" y="19" fill="#8892b0" font-size="10">Noise Level</text>

    <!-- High SNR -->
    <rect x="435" y="9" width="14" height="12" rx="2" fill="#66bb6a" opacity="0.3"/>
    <text x="454" y="19" fill="#8892b0" font-size="10">High SNR</text>

    <!-- Low SNR -->
    <rect x="535" y="9" width="14" height="12" rx="2" fill="#ef5350" opacity="0.3"/>
    <text x="554" y="19" fill="#8892b0" font-size="10">Low SNR</text>
  </g>
</svg>