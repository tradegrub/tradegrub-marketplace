<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Rolling Correlation Matrix</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price panel (top 40%) -->
  <line x1="100" y1="150" x2="100" y2="190" stroke="#26a69a" stroke-width="1"/><rect x="96" y="158" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="135" y1="142" x2="135" y2="182" stroke="#26a69a" stroke-width="1"/><rect x="131" y="150" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="170" y1="135" x2="170" y2="178" stroke="#ef5350" stroke-width="1"/><rect x="166" y="140" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="205" y1="128" x2="205" y2="172" stroke="#26a69a" stroke-width="1"/><rect x="201" y="135" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="240" y1="120" x2="240" y2="165" stroke="#26a69a" stroke-width="1"/><rect x="236" y="128" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="275" y1="115" x2="275" y2="158" stroke="#26a69a" stroke-width="1"/><rect x="271" y="122" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="310" y1="108" x2="310" y2="152" stroke="#ef5350" stroke-width="1"/><rect x="306" y="115" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="345" y1="105" x2="345" y2="148" stroke="#26a69a" stroke-width="1"/><rect x="341" y="112" width="8" height="22" fill="#26a69a" rx="1"/>
  <!-- Regime change area -->
  <line x1="380" y1="102" x2="380" y2="142" stroke="#ef5350" stroke-width="1"/><rect x="376" y="108" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="415" y1="108" x2="415" y2="150" stroke="#ef5350" stroke-width="1"/><rect x="411" y="115" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="450" y1="118" x2="450" y2="162" stroke="#ef5350" stroke-width="1"/><rect x="446" y="125" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="485" y1="130" x2="485" y2="172" stroke="#26a69a" stroke-width="1"/><rect x="481" y="142" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="520" y1="138" x2="520" y2="178" stroke="#ef5350" stroke-width="1"/><rect x="516" y="142" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="555" y1="148" x2="555" y2="188" stroke="#ef5350" stroke-width="1"/><rect x="551" y="155" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="590" y1="155" x2="590" y2="195" stroke="#26a69a" stroke-width="1"/><rect x="586" y="165" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="625" y1="148" x2="625" y2="188" stroke="#26a69a" stroke-width="1"/><rect x="621" y="155" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="660" y1="140" x2="660" y2="182" stroke="#26a69a" stroke-width="1"/><rect x="656" y="148" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="695" y1="132" x2="695" y2="175" stroke="#26a69a" stroke-width="1"/><rect x="691" y="140" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="730" y1="125" x2="730" y2="168" stroke="#26a69a" stroke-width="1"/><rect x="726" y="132" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Separator -->
  <line x1="60" y1="210" x2="760" y2="210" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="225" fill="#888" font-size="9">Correlation Coefficients</text>

  <!-- Correlation zone boundaries -->
  <line x1="80" y1="238" x2="760" y2="238" stroke="#00e676" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="765" y="241" fill="#00e676" font-size="7" opacity="0.5">+1.0</text>
  <line x1="80" y1="310" x2="760" y2="310" stroke="#888" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.2"/>
  <text x="765" y="313" fill="#888" font-size="7" opacity="0.4">0</text>
  <line x1="80" y1="382" x2="760" y2="382" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="765" y="385" fill="#ef5350" font-size="7" opacity="0.5">-1.0</text>

  <!-- Price-Volume correlation line -->
  <polyline points="100,280 135,278 170,282 205,275 240,270 275,265 310,268 345,272 380,290 415,310 450,325 485,318 520,308 555,300 590,292 625,285 660,278 695,275 730,272" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.8"/>

  <!-- Price-Range correlation line -->
  <polyline points="100,295 135,292 170,298 205,288 240,282 275,278 310,275 345,280 380,270 415,258 450,252 485,260 520,272 555,280 590,288 625,295 660,298 695,295 730,290" fill="none" stroke="#ff9800" stroke-width="2" opacity="0.8"/>

  <!-- Volume-Range correlation line -->
  <polyline points="100,305 135,308 170,302 205,310 240,308 275,305 310,302 345,298 380,275 415,265 450,260 485,268 520,278 555,285 590,292 625,298 660,302 695,305 730,308" fill="none" stroke="#e040fb" stroke-width="2" opacity="0.8"/>

  <!-- Divergence spike annotation -->
  <rect x="365" y="192" width="110" height="18" rx="4" fill="#ff9800" fill-opacity="0.15" stroke="#ff9800" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="420" y="205" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="500">Regime Change</text>

  <!-- Divergence highlight zone -->
  <rect x="370" y="230" width="100" height="160" fill="#ff9800" fill-opacity="0.04" rx="2"/>

  <!-- Statistical divergence markers -->
  <g filter="url(#glow)">
    <circle cx="415" cy="310" r="5" fill="#ff9800" opacity="0.8"/>
    <circle cx="450" cy="325" r="5" fill="#ff9800" opacity="0.8"/>
  </g>
  <text x="465" y="340" fill="#ff9800" font-size="8" opacity="0.7">Divergence Spike</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="131" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="166" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="201" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="236" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="271" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="306" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="341" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="376" y="388" width="8" height="27" fill="#ef5350" rx="1"/>
    <rect x="411" y="385" width="8" height="30" fill="#ef5350" rx="1"/>
    <rect x="446" y="390" width="8" height="25" fill="#ef5350" rx="1"/>
    <rect x="481" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="516" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="551" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="586" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="621" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="656" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="691" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="726" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">Price-Volume Corr</text>
    <circle cx="170" cy="20" r="4" fill="#ff9800"/>
    <text x="180" y="24" fill="#999" font-size="9">Price-Range Corr</text>
    <circle cx="320" cy="20" r="4" fill="#e040fb"/>
    <text x="330" y="24" fill="#999" font-size="9">Volume-Range Corr</text>
    <circle cx="480" cy="20" r="4" fill="#ff9800"/>
    <text x="490" y="24" fill="#999" font-size="9">Divergence Spike</text>
  </g>
</svg>