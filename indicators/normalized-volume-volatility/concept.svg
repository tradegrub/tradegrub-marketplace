<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="600">Normalized Volume &amp; Volatility</text>

  <!-- Chart area -->
  <!-- Y axis -->
  <line x1="80" y1="60" x2="80" y2="420" stroke="#787b86" stroke-width="1" opacity="0.4"/>
  <!-- X axis -->
  <line x1="80" y1="420" x2="720" y2="420" stroke="#787b86" stroke-width="1" opacity="0.4"/>

  <!-- Normal reference line at 100 (y=250) -->
  <line x1="80" y1="250" x2="720" y2="250" stroke="#787b86" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="45" y="254" text-anchor="middle" fill="#787b86" font-size="12" font-weight="500">100</text>
  <text x="740" y="254" fill="#787b86" font-size="11">Normal</text>

  <!-- Y axis scale marks -->
  <text x="45" y="110" text-anchor="middle" fill="#787b86" font-size="10">200</text>
  <line x1="75" y1="107" x2="85" y2="107" stroke="#787b86" stroke-width="1" opacity="0.3"/>
  <text x="45" y="180" text-anchor="middle" fill="#787b86" font-size="10">150</text>
  <line x1="75" y1="177" x2="85" y2="177" stroke="#787b86" stroke-width="1" opacity="0.3"/>
  <text x="45" y="324" text-anchor="middle" fill="#787b86" font-size="10">50</text>
  <line x1="75" y1="321" x2="85" y2="321" stroke="#787b86" stroke-width="1" opacity="0.3"/>
  <text x="45" y="396" text-anchor="middle" fill="#787b86" font-size="10">0</text>

  <!-- Volume histogram bars - green above 100 line, red below -->
  <!-- Above normal (green) -->
  <rect x="95"  y="190" width="18" height="60" fill="#26a69a" opacity="0.7"/>
  <rect x="120" y="160" width="18" height="90" fill="#26a69a" opacity="0.7"/>
  <rect x="145" y="210" width="18" height="40" fill="#26a69a" opacity="0.7"/>
  <rect x="170" y="120" width="18" height="130" fill="#26a69a" opacity="0.7"/>
  <rect x="195" y="175" width="18" height="75" fill="#26a69a" opacity="0.7"/>
  <!-- Below normal (red) -->
  <rect x="220" y="250" width="18" height="50" fill="#ef5350" opacity="0.7"/>
  <rect x="245" y="250" width="18" height="80" fill="#ef5350" opacity="0.7"/>
  <rect x="270" y="250" width="18" height="60" fill="#ef5350" opacity="0.7"/>
  <!-- Above again -->
  <rect x="295" y="200" width="18" height="50" fill="#26a69a" opacity="0.7"/>
  <rect x="320" y="140" width="18" height="110" fill="#26a69a" opacity="0.7"/>
  <rect x="345" y="100" width="18" height="150" fill="#26a69a" opacity="0.7"/>
  <!-- Below -->
  <rect x="370" y="250" width="18" height="40" fill="#ef5350" opacity="0.7"/>
  <rect x="395" y="250" width="18" height="70" fill="#ef5350" opacity="0.7"/>
  <rect x="420" y="250" width="18" height="90" fill="#ef5350" opacity="0.7"/>
  <rect x="445" y="250" width="18" height="55" fill="#ef5350" opacity="0.7"/>
  <!-- Above -->
  <rect x="470" y="220" width="18" height="30" fill="#26a69a" opacity="0.7"/>
  <rect x="495" y="180" width="18" height="70" fill="#26a69a" opacity="0.7"/>
  <rect x="520" y="150" width="18" height="100" fill="#26a69a" opacity="0.7"/>
  <rect x="545" y="170" width="18" height="80" fill="#26a69a" opacity="0.7"/>
  <!-- Below -->
  <rect x="570" y="250" width="18" height="45" fill="#ef5350" opacity="0.7"/>
  <rect x="595" y="250" width="18" height="65" fill="#ef5350" opacity="0.7"/>
  <!-- Above -->
  <rect x="620" y="195" width="18" height="55" fill="#26a69a" opacity="0.7"/>
  <rect x="645" y="165" width="18" height="85" fill="#26a69a" opacity="0.7"/>
  <rect x="670" y="185" width="18" height="65" fill="#26a69a" opacity="0.7"/>
  <rect x="695" y="210" width="18" height="40" fill="#26a69a" opacity="0.7"/>

  <!-- ATR line (orange) -->
  <polyline points="104,230 129,215 154,225 179,195 204,210 229,240 254,260 279,255 304,235 329,200 354,175 379,210 404,245 429,270 454,258 479,240 504,220 529,200 554,210 579,235 604,250 629,230 654,215 679,220 704,230"
    fill="none" stroke="#FF9800" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Regression trend line (blue dashed) -->
  <line x1="104" y1="235" x2="704" y2="220" stroke="#2196F3" stroke-width="2" stroke-dasharray="8,4" opacity="0.8"/>

  <!-- Legend -->
  <rect x="100" y="448" width="12" height="12" fill="#26a69a" opacity="0.7"/>
  <text x="118" y="459" fill="#e2e8f0" font-size="11">Vol &gt; Normal</text>

  <rect x="210" y="448" width="12" height="12" fill="#ef5350" opacity="0.7"/>
  <text x="228" y="459" fill="#e2e8f0" font-size="11">Vol &lt; Normal</text>

  <line x1="330" y1="454" x2="360" y2="454" stroke="#FF9800" stroke-width="2"/>
  <text x="368" y="459" fill="#FF9800" font-size="11">ATR</text>

  <line x1="420" y1="454" x2="450" y2="454" stroke="#2196F3" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="458" y="459" fill="#2196F3" font-size="11">Regression</text>

  <!-- Axis label -->
  <text x="400" y="485" text-anchor="middle" fill="#787b86" font-size="12">Time</text>
</svg>
