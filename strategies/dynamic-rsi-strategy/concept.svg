  <path d="M80,348 Q160,352 240,355 Q320,358 400,362 Q440,358 480,355 Q520,352 560,358 Q600,362 640,355 Q680,348 730,345" fill="none" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="735" y="348" fill="#42a5f5" font-size="8">OS</text>

  <!-- RSI line (purple) -->
  <path d="M80,320 Q100,325 120,332 Q140,340 160,350 Q180,358 200,362 Q220,358 240,348 Q260,335 280,318 Q300,302 320,288 Q340,275 360,268 Q380,270 400,278 Q420,290 440,305 Q460,320 480,335 Q500,348 520,358 Q540,362 560,355 Q580,340 600,322 Q620,305 640,290 Q660,280 680,272 Q700,278 720,288" fill="none" stroke="#ab47bc" stroke-width="2.5" opacity="0.9"/>
  <text x="725" y="291" fill="#ab47bc" font-size="9">RSI(14)</text>

  <!-- BUY signal - RSI crosses below oversold at x=200 -->
  <circle cx="200" cy="362" r="8" fill="none" stroke="#00e676" stroke-width="2" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="198,380 208,380 203,393" fill="#00e676"/>
  </g>
  <rect x="212" y="376" width="65" height="22" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="244" y="391" text-anchor="middle" fill="#00e676" font-size="11" font-weight="600">BUY</text>
  <text x="203" y="356" text-anchor="middle" fill="#00e676" font-size="8">Oversold</text>

  <!-- EXIT signal - RSI crosses above overbought at x=360 -->
  <circle cx="360" cy="268" r="8" fill="none" stroke="#ef5350" stroke-width="2" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="358,255 368,255 363,242" fill="#ef5350"/>
