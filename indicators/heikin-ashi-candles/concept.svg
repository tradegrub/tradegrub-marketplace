<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Heikin-Ashi Candles</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Section labels -->
  <text x="200" y="72" text-anchor="middle" fill="#888" font-size="10">Regular Candles</text>
  <text x="580" y="72" text-anchor="middle" fill="#888" font-size="10">Heikin-Ashi Candles</text>

  <!-- Divider -->
  <line x1="390" y1="65" x2="390" y2="420" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT SIDE: Regular candles (noisy) - downtrend then reversal then uptrend -->
  <!-- Downtrend with noise -->
  <line x1="90" y1="100" x2="90" y2="150" stroke="#ef5350" stroke-width="1"/><rect x="86" y="108" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="110" y1="125" x2="110" y2="162" stroke="#26a69a" stroke-width="1"/><rect x="106" y="138" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="130" y1="118" x2="130" y2="175" stroke="#ef5350" stroke-width="1"/><rect x="126" y="125" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="150" y1="150" x2="150" y2="195" stroke="#26a69a" stroke-width="1"/><rect x="146" y="165" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="170" y1="155" x2="170" y2="210" stroke="#ef5350" stroke-width="1"/><rect x="166" y="162" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="190" y1="185" x2="190" y2="235" stroke="#ef5350" stroke-width="1"/><rect x="186" y="192" width="8" height="28" fill="#ef5350" rx="1"/>
  <!-- Reversal area (noisy dojis) -->
  <line x1="210" y1="200" x2="210" y2="260" stroke="#26a69a" stroke-width="1"/><rect x="206" y="225" width="8" height="10" fill="#26a69a" rx="1"/>
  <line x1="230" y1="215" x2="230" y2="265" stroke="#ef5350" stroke-width="1"/><rect x="226" y="230" width="8" height="12" fill="#ef5350" rx="1"/>
  <line x1="250" y1="210" x2="250" y2="262" stroke="#26a69a" stroke-width="1"/><rect x="246" y="240" width="8" height="12" fill="#26a69a" rx="1"/>
  <!-- Uptrend with noise -->
  <line x1="270" y1="195" x2="270" y2="250" stroke="#26a69a" stroke-width="1"/><rect x="266" y="210" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="290" y1="210" x2="290" y2="248" stroke="#ef5350" stroke-width="1"/><rect x="286" y="215" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="310" y1="180" x2="310" y2="225" stroke="#26a69a" stroke-width="1"/><rect x="306" y="188" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="330" y1="170" x2="330" y2="210" stroke="#26a69a" stroke-width="1"/><rect x="326" y="178" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="350" y1="188" x2="350" y2="218" stroke="#ef5350" stroke-width="1"/><rect x="346" y="192" width="8" height="15" fill="#ef5350" rx="1"/>
  <line x1="370" y1="155" x2="370" y2="198" stroke="#26a69a" stroke-width="1"/><rect x="366" y="162" width="8" height="25" fill="#26a69a" rx="1"/>

  <!-- RIGHT SIDE: Heikin-Ashi candles (smooth, consistent color runs) -->
  <!-- Clear downtrend - all red, no lower wicks -->
  <line x1="420" y1="100" x2="420" y2="130" stroke="#ef5350" stroke-width="1.2"/><rect x="415" y="100" width="10" height="25" fill="#ef5350" rx="1"/>
  <line x1="445" y1="115" x2="445" y2="155" stroke="#ef5350" stroke-width="1.2"/><rect x="440" y="115" width="10" height="32" fill="#ef5350" rx="1"/>
  <line x1="470" y1="140" x2="470" y2="185" stroke="#ef5350" stroke-width="1.2"/><rect x="465" y="140" width="10" height="35" fill="#ef5350" rx="1"/>
  <line x1="495" y1="168" x2="495" y2="215" stroke="#ef5350" stroke-width="1.2"/><rect x="490" y="168" width="10" height="35" fill="#ef5350" rx="1"/>
  <line x1="520" y1="195" x2="520" y2="238" stroke="#ef5350" stroke-width="1.2"/><rect x="515" y="195" width="10" height="30" fill="#ef5350" rx="1"/>

  <!-- Reversal doji (small body, long wicks) -->
  <line x1="545" y1="208" x2="545" y2="268" stroke="#ff9800" stroke-width="1.5"/><rect x="539" y="232" width="12" height="8" fill="#ff9800" rx="1" filter="url(#softGlow)"/>

  <!-- Reversal annotation -->
  <rect x="558" y="225" width="75" height="20" rx="4" fill="#ff9800" fill-opacity="0.15" stroke="#ff9800" stroke-width="1" stroke-opacity="0.4"/>
  <text x="595" y="239" text-anchor="middle" fill="#ff9800" font-size="10" font-weight="600">Reversal</text>

  <!-- Clear uptrend - all green, no upper wicks -->
  <line x1="570" y1="195" x2="570" y2="242" stroke="#26a69a" stroke-width="1.2"/><rect x="565" y="210" width="10" height="32" fill="#26a69a" rx="1"/>
  <line x1="595" y1="172" x2="595" y2="218" stroke="#26a69a" stroke-width="1.2"/><rect x="590" y="185" width="10" height="33" fill="#26a69a" rx="1"/>
  <line x1="620" y1="148" x2="620" y2="195" stroke="#26a69a" stroke-width="1.2"/><rect x="615" y="160" width="10" height="35" fill="#26a69a" rx="1"/>
  <line x1="645" y1="125" x2="645" y2="170" stroke="#26a69a" stroke-width="1.2"/><rect x="640" y="135" width="10" height="35" fill="#26a69a" rx="1"/>
  <line x1="670" y1="105" x2="670" y2="148" stroke="#26a69a" stroke-width="1.2"/><rect x="665" y="112" width="10" height="36" fill="#26a69a" rx="1"/>
  <line x1="695" y1="88" x2="695" y2="128" stroke="#26a69a" stroke-width="1.2"/><rect x="690" y="92" width="10" height="36" fill="#26a69a" rx="1"/>
  <line x1="720" y1="75" x2="720" y2="112" stroke="#26a69a" stroke-width="1.2"/><rect x="715" y="78" width="10" height="34" fill="#26a69a" rx="1"/>

  <!-- Anatomy callouts for HA candles -->
  <!-- No lower wick on bearish = strong down -->
  <path d="M 445,158 C 460,165 468,168 472,165" fill="none" stroke="#888" stroke-width="0.8"/>
  <rect x="418" y="160" width="85" height="16" rx="3" fill="#ffffff" fill-opacity="0.06"/>
  <text x="460" y="172" text-anchor="middle" fill="#bbb" font-size="8">No lower wick = strong</text>

  <!-- No upper wick on bullish = strong up -->
  <path d="M 695,88 C 705,78 712,75 718,78" fill="none" stroke="#888" stroke-width="0.8"/>
  <rect x="655" y="65" width="85" height="16" rx="3" fill="#ffffff" fill-opacity="0.06"/>
  <text x="697" y="77" text-anchor="middle" fill="#bbb" font-size="8">No upper wick = strong</text>

  <!-- Comparison annotation -->
  <rect x="100" y="280" width="180" height="40" rx="4" fill="#ffffff" fill-opacity="0.05"/>
  <text x="190" y="298" text-anchor="middle" fill="#bbb" font-size="10">Mixed colors = noise</text>
  <text x="190" y="312" text-anchor="middle" fill="#bbb" font-size="9">Hard to read trend direction</text>

  <rect x="490" y="280" width="200" height="40" rx="4" fill="#00e676" fill-opacity="0.05"/>
  <text x="590" y="298" text-anchor="middle" fill="#00e676" font-size="10">Consistent colors = clarity</text>
  <text x="590" y="312" text-anchor="middle" fill="#00e676" font-size="9">Trend direction is obvious</text>

  <!-- Arrow from regular to HA -->
  <line x1="345" y1="300" x2="485" y2="300" stroke="#888" stroke-width="1.5" opacity="0.4"/>
  <polygon points="485,296 485,304 495,300" fill="#888" opacity="0.4"/>
  <text x="415" y="295" text-anchor="middle" fill="#888" font-size="8">Averaged</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="86" y="400" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="106" y="405" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="126" y="398" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="146" y="405" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="166" y="400" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="186" y="402" width="8" height="16" fill="#ef5350" rx="1"/>
    <rect x="206" y="408" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="226" y="410" width="8" height="8" fill="#ef5350" rx="1"/>
    <rect x="246" y="408" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="266" y="403" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="286" y="408" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="306" y="402" width="8" height="16" fill="#26a69a" rx="1"/>
    <rect x="326" y="405" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="346" y="408" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="366" y="402" width="8" height="16" fill="#26a69a" rx="1"/>
  </g>
  <g opacity="0.4">
    <rect x="415" y="400" width="10" height="18" fill="#ef5350" rx="1"/>
    <rect x="440" y="398" width="10" height="20" fill="#ef5350" rx="1"/>
    <rect x="465" y="395" width="10" height="23" fill="#ef5350" rx="1"/>
    <rect x="490" y="398" width="10" height="20" fill="#ef5350" rx="1"/>
    <rect x="515" y="402" width="10" height="16" fill="#ef5350" rx="1"/>
    <rect x="539" y="408" width="10" height="10" fill="#ff9800" rx="1"/>
    <rect x="565" y="403" width="10" height="15" fill="#26a69a" rx="1"/>
    <rect x="590" y="400" width="10" height="18" fill="#26a69a" rx="1"/>
    <rect x="615" y="397" width="10" height="21" fill="#26a69a" rx="1"/>
    <rect x="640" y="398" width="10" height="20" fill="#26a69a" rx="1"/>
    <rect x="665" y="400" width="10" height="18" fill="#26a69a" rx="1"/>
    <rect x="690" y="402" width="10" height="16" fill="#26a69a" rx="1"/>
    <rect x="715" y="403" width="10" height="15" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Bullish (HA Close > HA Open)</text>
    <circle cx="200" cy="20" r="4" fill="#ef5350"/>
    <text x="210" y="24" fill="#999" font-size="9">Bearish (HA Close &lt; HA Open)</text>
    <circle cx="390" cy="20" r="4" fill="#ff9800"/>
    <text x="400" y="24" fill="#999" font-size="9">Indecision / Reversal</text>
    <rect x="540" y="12" width="30" height="16" fill="#ffffff" opacity="0.06" rx="2"/>
    <text x="575" y="24" fill="#999" font-size="9">HA Smoothed</text>
  </g>
</svg>