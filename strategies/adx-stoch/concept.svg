<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="220" x2="760" y2="220"/><line x1="60" y1="280" x2="760" y2="280"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">ADX Trend + Stochastic Entry</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price panel (top 55%) -->
  <!-- Uptrend candles -->
  <line x1="100" y1="195" x2="100" y2="230" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="200" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="130" y1="185" x2="130" y2="225" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="190" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="160" y1="175" x2="160" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="156" y="180" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="190" y1="170" x2="190" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="175" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="220" y1="155" x2="220" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="160" width="8" height="28" fill="#26a69a" rx="1"/>
  <!-- Pullback -->
  <line x1="250" y1="160" x2="250" y2="200" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="165" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="280" y1="170" x2="280" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="276" y="175" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="310" y1="178" x2="310" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="183" width="8" height="20" fill="#ef5350" rx="1"/>
  <!-- Signal candle -->
  <line x1="340" y1="168" x2="340" y2="210" stroke="#00e676" stroke-width="1.5"/>
  <rect x="334" y="175" width="12" height="28" fill="#00e676" rx="1" filter="url(#glow)"/>
  <!-- Continuation -->
  <line x1="370" y1="155" x2="370" y2="190" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="160" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="400" y1="140" x2="400" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="145" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="430" y1="130" x2="430" y2="170" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="135" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="460" y1="125" x2="460" y2="160" stroke="#ef5350" stroke-width="1"/>
  <rect x="456" y="128" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="490" y1="120" x2="490" y2="155" stroke="#26a69a" stroke-width="1"/>
  <rect x="486" y="125" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Entry arrow -->
  <g filter="url(#softGlow)">
    <polygon points="340,165 350,165 345,152" fill="#00e676"/>
  </g>
  <rect x="350" y="148" width="110" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="405" y="162" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY: Stoch Cross Up</text>

  <!-- Pullback annotation -->
  <rect x="255" y="138" width="75" height="18" rx="4" fill="#ff9800" fill-opacity="0.12" stroke="#ff9800" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="292" y="150" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="500">Pullback Zone</text>

  <!-- Separator line -->
  <line x1="60" y1="250" x2="760" y2="250" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="265" fill="#888" font-size="9">ADX Panel</text>

  <!-- ADX oscillator panel (bottom) -->
  <!-- ADX threshold line -->
  <line x1="80" y1="310" x2="520" y2="310" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="525" y="314" fill="#ff9800" font-size="9" opacity="0.7">ADX = 20</text>

  <!-- ADX line - rises above threshold -->
  <polyline points="100,350 130,340 160,325 190,305 220,290 250,285 280,290 310,295 340,288 370,280 400,275 430,278 460,285 490,282" fill="none" stroke="#e0e0e0" stroke-width="2" opacity="0.9"/>
  <text x="500" y="286" fill="#e0e0e0" font-size="9">ADX</text>

  <!-- +DI line -->
  <polyline points="100,340 130,330 160,335 190,310 220,295 250,305 280,315 310,320 340,300 370,290 400,285 430,290 460,298 490,292" fill="none" stroke="#26a69a" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.7"/>
  <text x="500" y="296" fill="#26a69a" font-size="9">+DI</text>

  <!-- -DI line -->
  <polyline points="100,325 130,335 160,330 190,340 220,345 250,338 280,330 310,325 340,335 370,340 400,345 430,342 460,338 490,340" fill="none" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.7"/>
  <text x="500" y="344" fill="#ef5350" font-size="9">-DI</text>

  <!-- ADX > threshold zone highlight -->
  <rect x="175" y="260" width="330" height="60" fill="#26a69a" fill-opacity="0.04" rx="3"/>
  <text x="340" y="272" text-anchor="middle" fill="#26a69a" font-size="8" opacity="0.6">ADX &gt; Threshold (Trending)</text>

  <!-- Stochastic mini annotation at signal -->
  <rect x="310" y="358" width="100" height="18" rx="4" fill="#42a5f5" fill-opacity="0.12" stroke="#42a5f5" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="360" y="370" text-anchor="middle" fill="#42a5f5" font-size="9" font-weight="500">%K crosses above %D</text>
  <line x1="340" y1="355" x2="340" y2="358" stroke="#42a5f5" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="126" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="156" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="186" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="216" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="246" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="276" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="306" y="405" width="8" height="10" fill="#ef5350" rx="1"/>
  </g>
  <rect x="334" y="388" width="12" height="27" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="366" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="396" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="426" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="456" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="486" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#e0e0e0"/>
    <text x="30" y="24" fill="#999" font-size="9">ADX Line</text>
    <circle cx="110" cy="20" r="4" fill="#26a69a"/>
    <text x="120" y="24" fill="#999" font-size="9">+DI (Bullish)</text>
    <circle cx="220" cy="20" r="4" fill="#ef5350"/>
    <text x="230" y="24" fill="#999" font-size="9">-DI (Bearish)</text>
    <circle cx="330" cy="20" r="4" fill="#ff9800"/>
    <text x="340" y="24" fill="#999" font-size="9">ADX Threshold</text>
    <circle cx="460" cy="20" r="4" fill="#42a5f5"/>
    <text x="470" y="24" fill="#999" font-size="9">Stochastic Signal</text>
    <circle cx="590" cy="20" r="4" fill="#00e676"/>
    <text x="600" y="24" fill="#999" font-size="9">Entry</text>
  </g>
</svg>