<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="triangleFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Triangle Consolidation Breakout</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Symmetrical triangle fill -->
  <polygon points="100,140 100,310 430,225" fill="url(#triangleFill)"/>

  <!-- Upper trendline (descending highs) -->
  <line x1="100" y1="140" x2="430" y2="225" stroke="#ef5350" stroke-width="2" stroke-dasharray="8,4" opacity="0.7"/>
  <text x="105" y="132" fill="#ef5350" font-size="10" font-weight="500">Resistance (pivot highs)</text>

  <!-- Lower trendline (ascending lows) -->
  <line x1="100" y1="310" x2="430" y2="225" stroke="#26a69a" stroke-width="2" stroke-dasharray="8,4" opacity="0.7"/>
  <text x="105" y="325" fill="#26a69a" font-size="10" font-weight="500">Support (pivot lows)</text>

  <!-- Candles inside triangle - bouncing between lines -->
  <line x1="115" y1="148" x2="115" y2="198" stroke="#ef5350" stroke-width="1"/>
  <rect x="111" y="158" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="145" y1="195" x2="145" y2="275" stroke="#26a69a" stroke-width="1"/>
  <rect x="141" y="248" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="175" y1="165" x2="175" y2="225" stroke="#26a69a" stroke-width="1"/>
  <rect x="171" y="188" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="205" y1="175" x2="205" y2="260" stroke="#ef5350" stroke-width="1"/>
  <rect x="201" y="185" width="8" height="50" fill="#ef5350" rx="1"/>
  <line x1="235" y1="210" x2="235" y2="265" stroke="#26a69a" stroke-width="1"/>
  <rect x="231" y="240" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="265" y1="188" x2="265" y2="248" stroke="#26a69a" stroke-width="1"/>
  <rect x="261" y="215" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="295" y1="195" x2="295" y2="252" stroke="#ef5350" stroke-width="1"/>
  <rect x="291" y="205" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="325" y1="210" x2="325" y2="248" stroke="#26a69a" stroke-width="1"/>
  <rect x="321" y="228" width="8" height="12" fill="#26a69a" rx="1"/>
  <line x1="355" y1="205" x2="355" y2="242" stroke="#ef5350" stroke-width="1"/>
  <rect x="351" y="212" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="385" y1="212" x2="385" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="381" y="222" width="8" height="10" fill="#26a69a" rx="1"/>
  <!-- Apex area - tight range -->
  <line x1="415" y1="215" x2="415" y2="238" stroke="#26a69a" stroke-width="1"/>
  <rect x="411" y="220" width="8" height="10" fill="#26a69a" rx="1"/>

  <!-- BREAKOUT candle -->
  <line x1="450" y1="185" x2="450" y2="230" stroke="#00e676" stroke-width="1.5"/>
  <rect x="444" y="190" width="12" height="30" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- Breakout arrow -->
  <g filter="url(#softGlow)">
    <polygon points="450,180 458,180 454,168" fill="#00e676"/>
  </g>
  <rect x="465" y="165" width="90" height="22" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="510" y="180" text-anchor="middle" fill="#00e676" font-size="11" font-weight="600">BREAKOUT</text>

  <!-- Post-breakout candles -->
  <line x1="485" y1="168" x2="485" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="481" y="175" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="515" y1="155" x2="515" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="511" y="162" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="545" y1="142" x2="545" y2="182" stroke="#ef5350" stroke-width="1"/>
  <rect x="541" y="148" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="575" y1="132" x2="575" y2="172" stroke="#26a69a" stroke-width="1"/>
  <rect x="571" y="138" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="605" y1="118" x2="605" y2="158" stroke="#26a69a" stroke-width="1"/>
  <rect x="601" y="125" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Entry line -->
  <line x1="450" y1="220" x2="640" y2="220" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="645" y="224" fill="#42a5f5" font-size="10" font-weight="500">Entry</text>

  <!-- Stop loss -->
  <line x1="450" y1="270" x2="640" y2="270" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="645" y="274" fill="#ef5350" font-size="10" font-weight="500">Stop (ATR)</text>

  <!-- Convergence annotation -->
  <path d="M 350,150 C 340,140 330,135 320,138" fill="none" stroke="#888" stroke-width="1"/>
  <rect x="340" y="138" width="110" height="18" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="395" y="151" text-anchor="middle" fill="#bbb" font-size="9">Converging ranges</text>

  <!-- RSI annotation -->
  <rect x="450" y="240" width="80" height="16" rx="4" fill="#ab47bc" fill-opacity="0.12" stroke="#ab47bc" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="490" y="251" text-anchor="middle" fill="#ab47bc" font-size="8" font-weight="500">RSI > 50 (bull)</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="111" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="141" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="171" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="201" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="231" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="261" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="291" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="321" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="351" y="407" width="8" height="8" fill="#ef5350" rx="1"/>
    <rect x="381" y="408" width="8" height="7" fill="#26a69a" rx="1"/>
    <rect x="411" y="409" width="8" height="6" fill="#26a69a" rx="1"/>
  </g>
  <!-- Volume surge on breakout -->
  <rect x="444" y="375" width="12" height="40" fill="#00e676" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="481" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="511" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="541" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="571" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="601" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ef5350"/>
    <text x="30" y="24" fill="#999" font-size="9">Resistance Line</text>
    <circle cx="140" cy="20" r="4" fill="#26a69a"/>
    <text x="150" y="24" fill="#999" font-size="9">Support Line</text>
    <circle cx="250" cy="20" r="4" fill="#00e676"/>
    <text x="260" y="24" fill="#999" font-size="9">Breakout Signal</text>
    <circle cx="375" cy="20" r="4" fill="#ab47bc"/>
    <text x="385" y="24" fill="#999" font-size="9">RSI Filter</text>
    <rect x="460" y="12" width="20" height="16" fill="#42a5f5" opacity="0.3" rx="2"/>
    <text x="485" y="24" fill="#999" font-size="9">Triangle Zone</text>
    <rect x="570" y="12" width="20" height="16" fill="#00e676" opacity="0.5" rx="2"/>
    <text x="595" y="24" fill="#999" font-size="9">Volume</text>
  </g>
</svg>