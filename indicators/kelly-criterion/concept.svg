<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Kelly Criterion Sizer</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Y-axis labels -->
  <text x="50" y="100" text-anchor="end" fill="#555" font-family="Inter,sans-serif" font-size="9">60%</text>
  <text x="50" y="175" text-anchor="end" fill="#555" font-family="Inter,sans-serif" font-size="9">40%</text>
  <text x="50" y="250" text-anchor="end" fill="#555" font-family="Inter,sans-serif" font-size="9">25%</text>
  <text x="50" y="340" text-anchor="end" fill="#555" font-family="Inter,sans-serif" font-size="9">10%</text>
  <text x="50" y="400" text-anchor="end" fill="#555" font-family="Inter,sans-serif" font-size="9">0%</text>

  <!-- Grid lines -->
  <line x1="60" y1="250" x2="740" y2="250" stroke="#333333" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="60" y1="400" x2="740" y2="400" stroke="#555555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Over-bet zone -->
  <rect x="350" y="70" width="120" height="330" fill="rgba(255,82,82,0.06)" rx="2"/>

  <!-- Full Kelly line -->
  <polyline points="80,340 120,320 160,300 200,280 240,250 280,220 320,180 360,140 400,120 440,150 480,200 520,250 560,280 600,260 640,240 680,220 720,240" fill="none" stroke="#42a5f5" stroke-width="2"/>

  <!-- Fractional Kelly line -->
  <polyline points="80,370 120,360 160,350 200,340 240,325 280,310 320,290 360,270 400,260 440,275 480,300 520,325 560,340 600,330 640,320 680,310 720,320" fill="none" stroke="#00e676" stroke-width="2"/>

  <!-- Win rate line -->
  <polyline points="80,250 120,240 160,235 200,230 240,220 280,210 320,200 360,190 400,185 440,195 480,210 520,230 560,240 600,225 640,215 680,210 720,220" fill="none" stroke="#ffa726" stroke-width="1"/>

  <!-- 25% reference -->
  <text x="745" y="254" fill="#444" font-family="Inter,sans-serif" font-size="8">25%</text>

  <!-- Legend -->
  <g transform="translate(100, 440)">
    <rect x="0" y="0" width="600" height="40" fill="rgba(255,255,255,0.03)" rx="6"/>
    <line x1="20" y1="20" x2="45" y2="20" stroke="#42a5f5" stroke-width="2"/>
    <text x="50" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Full Kelly</text>
    <line x1="140" y1="20" x2="165" y2="20" stroke="#00e676" stroke-width="2"/>
    <text x="170" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Half Kelly</text>
    <line x1="260" y1="20" x2="285" y2="20" stroke="#ffa726" stroke-width="1"/>
    <text x="290" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Win Rate</text>
    <rect x="370" y="12" width="16" height="16" fill="rgba(255,82,82,0.15)" rx="2"/>
    <text x="391" y="24" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Over-bet Warning</text>
  </g>
</svg>