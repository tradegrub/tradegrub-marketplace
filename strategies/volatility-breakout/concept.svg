<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="squeezeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff9800" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ff9800" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Volatility Breakout Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Bollinger Bands - wide, then narrow (squeeze), then wide again -->
  <!-- Upper band -->
  <polyline points="80,120 120,125 160,130 200,148 240,168 280,182 320,190 360,195 400,192 440,188 480,150 520,118 560,100 600,95 640,98 680,105 720,110" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.5"/>
  <!-- Basis (middle) -->
  <polyline points="80,190 120,192 160,195 200,198 240,205 280,210 320,215 360,218 400,218 440,215 480,210 520,195 560,180 600,172 640,168 680,170 720,175" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Lower band -->
  <polyline points="80,260 120,260 160,262 200,248 240,242 280,238 320,240 360,242 400,245 440,242 480,270 520,272 560,260 600,250 640,238 680,235 720,240" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.5"/>

  <text x="725" y="108" fill="#42a5f5" font-size="8">Upper BB</text>
  <text x="725" y="178" fill="#888" font-size="8">Basis</text>
  <text x="725" y="243" fill="#42a5f5" font-size="8">Lower BB</text>

  <!-- Squeeze zone highlight -->
  <rect x="280" y="65" width="170" height="280" fill="url(#squeezeFill)" rx="4"/>
  <text x="365" y="80" text-anchor="middle" fill="#ff9800" font-size="10" font-weight="500">SQUEEZE</text>
  <text x="365" y="93" text-anchor="middle" fill="#ff9800" font-size="8" opacity="0.7">BBW &lt; 20th percentile</text>

  <!-- Candles inside squeeze - tight range -->
  <line x1="100" y1="178" x2="100" y2="222" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="192" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="130" y1="182" x2="130" y2="228" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="190" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="160" y1="185" x2="160" y2="230" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="205" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="190" y1="188" x2="190" y2="232" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="195" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="220" y1="198" x2="220" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="215" width="8" height="12" fill="#26a69a" rx="1"/>
  <line x1="250" y1="202" x2="250" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="208" width="8" height="18" fill="#ef5350" rx="1"/>
  <!-- Tighter and tighter -->
  <line x1="290" y1="205" x2="290" y2="232" stroke="#26a69a" stroke-width="1"/>
  <rect x="286" y="215" width="8" height="10" fill="#26a69a" rx="1"/>
  <line x1="320" y1="208" x2="320" y2="230" stroke="#ef5350" stroke-width="1"/>
  <rect x="316" y="212" width="8" height="12" fill="#ef5350" rx="1"/>
  <line x1="350" y1="210" x2="350" y2="228" stroke="#26a69a" stroke-width="1"/>
  <rect x="346" y="215" width="8" height="8" fill="#26a69a" rx="1"/>
  <line x1="380" y1="212" x2="380" y2="228" stroke="#26a69a" stroke-width="1"/>
  <rect x="376" y="216" width="8" height="7" fill="#26a69a" rx="1"/>
  <line x1="410" y1="208" x2="410" y2="226" stroke="#ef5350" stroke-width="1"/>
  <rect x="406" y="212" width="8" height="8" fill="#ef5350" rx="1"/>
  <line x1="440" y1="205" x2="440" y2="222" stroke="#26a69a" stroke-width="1"/>
  <rect x="436" y="210" width="8" height="7" fill="#26a69a" rx="1"/>

  <!-- BREAKOUT candle - big bullish breaking upper band -->
  <line x1="475" y1="148" x2="475" y2="215" stroke="#00e676" stroke-width="1.5"/>
  <rect x="469" y="155" width="12" height="45" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- Breakout arrow -->
  <g filter="url(#softGlow)">
    <polygon points="475,142 483,142 479,130" fill="#00e676"/>
  </g>
  <rect x="490" y="128" width="90" height="22" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="535" y="143" text-anchor="middle" fill="#00e676" font-size="11" font-weight="600">BREAKOUT</text>

  <!-- Post-breakout candles -->
  <line x1="510" y1="130" x2="510" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="506" y="138" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="540" y1="115" x2="540" y2="162" stroke="#26a69a" stroke-width="1"/>
  <rect x="536" y="122" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="570" y1="105" x2="570" y2="150" stroke="#ef5350" stroke-width="1"/>
  <rect x="566" y="112" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="600" y1="98" x2="600" y2="142" stroke="#26a69a" stroke-width="1"/>
  <rect x="596" y="105" width="8" height="25" fill="#26a69a" rx="1"/>

  <!-- Exit at basis line annotation -->
  <path d="M 600,175 C 605,182 608,188 610,195" fill="none" stroke="#888" stroke-width="1"/>
  <text x="615" y="198" fill="#888" font-size="9">Exit at basis</text>

  <!-- BBW sub-panel (y=340 to y=415) -->
  <line x1="80" y1="345" x2="740" y2="345" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  <text x="75" y="358" fill="#888" font-size="8" text-anchor="end">BBW</text>

  <!-- BBW percentile threshold -->
  <line x1="80" y1="395" x2="740" y2="395" stroke="#ff9800" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="745" y="398" fill="#ff9800" font-size="7">20th pctl</text>

  <!-- BBW line - high, then dropping into squeeze, then expanding -->
  <polyline points="100,365 140,368 180,372 220,378 260,385 300,395 340,400 380,402 420,398 460,390 500,375 540,362 580,355 620,358 660,365 700,368" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.7"/>

  <!-- Squeeze zone in BBW panel -->
  <rect x="280" y="393" width="170" height="15" fill="#ff9800" fill-opacity="0.1" rx="2"/>

  <!-- Volume bars -->
  <g opacity="0.35">
    <rect x="96" y="418" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="126" y="420" width="8" height="8" fill="#ef5350" rx="1"/>
    <rect x="156" y="418" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="186" y="420" width="8" height="8" fill="#ef5350" rx="1"/>
    <rect x="216" y="421" width="8" height="7" fill="#26a69a" rx="1"/>
    <rect x="246" y="422" width="8" height="6" fill="#ef5350" rx="1"/>
    <rect x="286" y="423" width="8" height="5" fill="#26a69a" rx="1"/>
    <rect x="316" y="423" width="8" height="5" fill="#ef5350" rx="1"/>
    <rect x="346" y="424" width="8" height="4" fill="#26a69a" rx="1"/>
    <rect x="376" y="424" width="8" height="4" fill="#26a69a" rx="1"/>
    <rect x="406" y="424" width="8" height="4" fill="#ef5350" rx="1"/>
    <rect x="436" y="424" width="8" height="4" fill="#26a69a" rx="1"/>
  </g>
  <rect x="469" y="410" width="12" height="18" fill="#00e676" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.35">
    <rect x="506" y="416" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="536" y="418" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="566" y="420" width="8" height="8" fill="#ef5350" rx="1"/>
    <rect x="596" y="418" width="8" height="10" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">Bollinger Bands</text>
    <circle cx="145" cy="20" r="4" fill="#ff9800"/>
    <text x="155" y="24" fill="#999" font-size="9">Squeeze Zone</text>
    <circle cx="260" cy="20" r="4" fill="#00e676"/>
    <text x="270" y="24" fill="#999" font-size="9">Breakout Signal</text>
    <circle cx="385" cy="20" r="4" fill="#888"/>
    <text x="395" y="24" fill="#999" font-size="9">Basis Exit</text>
    <rect x="480" y="12" width="20" height="16" fill="#42a5f5" opacity="0.3" rx="2"/>
    <text x="505" y="24" fill="#999" font-size="9">BBW Percentile</text>
  </g>
</svg>