<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="envFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">MA Envelope Breakout Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Envelope fill -->
  <path d="M80,128 Q200,120 320,130 Q440,118 560,125 Q640,120 740,124 L740,308 Q640,318 560,312 Q440,320 320,310 Q200,320 80,312 Z" fill="url(#envFill)"/>

  <!-- Upper Envelope (+2.5%) -->
  <path d="M80,128 Q200,120 320,130 Q440,118 560,125 Q640,120 740,124" fill="none" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="745" y="127" fill="#42a5f5" font-size="9" font-weight="500">+2.5%</text>

  <!-- MA Basis -->
  <path d="M80,218 Q200,210 320,220 Q440,208 560,215 Q640,208 740,212" fill="none" stroke="#ffb74d" stroke-width="2.5" opacity="0.8"/>
  <text x="745" y="215" fill="#ffb74d" font-size="10" font-weight="500">SMA (20)</text>

  <!-- Lower Envelope (-2.5%) -->
  <path d="M80,308 Q200,318 320,310 Q440,320 560,312 Q640,318 740,314" fill="none" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="745" y="317" fill="#42a5f5" font-size="9" font-weight="500">-2.5%</text>

  <!-- Candles - starting in range -->
  <line x1="100" y1="200" x2="100" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="208" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="125" y1="190" x2="125" y2="232" stroke="#26a69a" stroke-width="1"/>
  <rect x="121" y="198" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="150" y1="175" x2="150" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="146" y="182" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="175" y1="158" x2="175" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="171" y="165" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="200" y1="140" x2="200" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="196" y="148" width="8" height="20" fill="#26a69a" rx="1"/>

  <!-- Break above upper envelope - BUY LONG -->
  <line x1="230" y1="108" x2="230" y2="155" stroke="#00e676" stroke-width="1.5"/>
  <rect x="224" y="112" width="12" height="32" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="228,102 238,102 233,89" fill="#00e676"/>
  </g>
  <rect x="245" y="85" width="80" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="285" y="99" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY LONG</text>

  <!-- Continuation above -->
  <line x1="260" y1="98" x2="260" y2="138" stroke="#26a69a" stroke-width="1"/>
  <rect x="256" y="105" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="290" y1="92" x2="290" y2="130" stroke="#26a69a" stroke-width="1"/>
  <rect x="286" y="98" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="320" y1="105" x2="320" y2="148" stroke="#ef5350" stroke-width="1"/>
  <rect x="316" y="112" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="350" y1="135" x2="350" y2="178" stroke="#ef5350" stroke-width="1"/>
  <rect x="346" y="145" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="380" y1="162" x2="380" y2="205" stroke="#ef5350" stroke-width="1"/>
  <rect x="376" y="172" width="8" height="22" fill="#ef5350" rx="1"/>

  <!-- Exit at SMA -->
  <line x1="410" y1="195" x2="410" y2="232" stroke="#ef5350" stroke-width="1"/>
  <rect x="406" y="202" width="8" height="20" fill="#ef5350" rx="1"/>
  <rect x="420" y="205" width="75" height="18" rx="4" fill="#ffb74d" fill-opacity="0.15" stroke="#ffb74d" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="457" y="218" text-anchor="middle" fill="#ffb74d" font-size="9" font-weight="500">Exit @ SMA</text>

  <!-- Continued decline -->
  <line x1="440" y1="215" x2="440" y2="258" stroke="#ef5350" stroke-width="1"/>
  <rect x="436" y="225" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="470" y1="240" x2="470" y2="285" stroke="#ef5350" stroke-width="1"/>
  <rect x="466" y="250" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="500" y1="268" x2="500" y2="315" stroke="#ef5350" stroke-width="1"/>
  <rect x="496" y="278" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- Break below lower envelope - SELL SHORT -->
  <line x1="530" y1="290" x2="530" y2="345" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="524" y="298" width="12" height="35" fill="#ef5350" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="528,352 538,352 533,365" fill="#ef5350"/>
  </g>
  <rect x="545" y="348" width="90" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="590" y="362" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SELL SHORT</text>

  <!-- Continuation below -->
  <line x1="560" y1="305" x2="560" y2="350" stroke="#ef5350" stroke-width="1"/>
  <rect x="556" y="315" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="590" y1="295" x2="590" y2="338" stroke="#26a69a" stroke-width="1"/>
  <rect x="586" y="305" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="620" y1="272" x2="620" y2="312" stroke="#26a69a" stroke-width="1"/>
  <rect x="616" y="280" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="650" y1="248" x2="650" y2="288" stroke="#26a69a" stroke-width="1"/>
  <rect x="646" y="255" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Exit at SMA (short) -->
  <line x1="680" y1="200" x2="680" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="676" y="208" width="8" height="22" fill="#26a69a" rx="1"/>
  <rect x="692" y="205" width="55" height="18" rx="4" fill="#ffb74d" fill-opacity="0.15" stroke="#ffb74d" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="719" y="218" text-anchor="middle" fill="#ffb74d" font-size="9" font-weight="500">Exit</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="121" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="146" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="171" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="196" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
  </g>
  <rect x="224" y="382" width="12" height="33" fill="#00e676" rx="1" opacity="0.6"/>
  <g opacity="0.4">
    <rect x="256" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="286" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="316" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="346" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="376" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="406" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="436" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="466" y="397" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="496" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
  </g>
  <rect x="524" y="385" width="12" height="30" fill="#ef5350" rx="1" opacity="0.6"/>
  <g opacity="0.4">
    <rect x="556" y="397" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="586" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="616" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="646" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="676" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ffb74d"/>
    <text x="30" y="24" fill="#999" font-size="9">SMA Basis (20)</text>
    <circle cx="140" cy="20" r="4" fill="#42a5f5"/>
    <text x="150" y="24" fill="#999" font-size="9">Envelope (+/- 2.5%)</text>
    <circle cx="295" cy="20" r="4" fill="#00e676"/>
    <text x="305" y="24" fill="#999" font-size="9">Long Breakout</text>
    <circle cx="410" cy="20" r="4" fill="#ef5350"/>
    <text x="420" y="24" fill="#999" font-size="9">Short Breakdown</text>
    <rect x="530" y="12" width="20" height="16" fill="#ffb74d" opacity="0.4" rx="2"/>
    <text x="555" y="24" fill="#999" font-size="9">Exit at SMA</text>
  </g>
</svg>