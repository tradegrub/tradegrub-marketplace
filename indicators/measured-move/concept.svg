<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Measured Move Projector</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>
  <line x1="60" y1="70" x2="60" y2="420" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="420" x2="760" y2="420" stroke="#333" stroke-width="1"/>
  <!-- Bullish ABCD pattern -->
  <!-- Point A (low) -->
  <circle cx="150" cy="350" r="5" fill="#42A5F5"/>
  <text x="150" y="370" text-anchor="middle" fill="#42A5F5" font-family="Inter,sans-serif" font-size="12" font-weight="600">A</text>
  <!-- AB leg up -->
  <line x1="150" y1="350" x2="280" y2="160" stroke="#42A5F5" stroke-width="2"/>
  <!-- Point B (high) -->
  <circle cx="280" cy="160" r="5" fill="#42A5F5"/>
  <text x="280" y="150" text-anchor="middle" fill="#42A5F5" font-family="Inter,sans-serif" font-size="12" font-weight="600">B</text>
  <!-- BC retracement -->
  <line x1="280" y1="160" x2="380" y2="280" stroke="#42A5F5" stroke-width="1" stroke-dasharray="6,3"/>
  <!-- Point C (low) -->
  <circle cx="380" cy="280" r="5" fill="#42A5F5"/>
  <text x="380" y="300" text-anchor="middle" fill="#42A5F5" font-family="Inter,sans-serif" font-size="12" font-weight="600">C</text>
  <!-- CD leg up -->
  <line x1="380" y1="280" x2="510" y2="90" stroke="#42A5F5" stroke-width="2"/>
  <!-- Point D (high) -->
  <circle cx="510" cy="90" r="5" fill="#42A5F5"/>
  <text x="510" y="80" text-anchor="middle" fill="#42A5F5" font-family="Inter,sans-serif" font-size="12" font-weight="600">D</text>
  <!-- AB = CD annotation -->
  <text x="200" y="240" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="10" transform="rotate(-55,200,240)">AB</text>
  <text x="430" y="170" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="10" transform="rotate(-55,430,170)">CD = AB</text>
  <!-- Target line -->
  <line x1="510" y1="90" x2="600" y2="90" stroke="#00e676" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="610" y="94" fill="#00e676" font-family="Inter,sans-serif" font-size="10">Target</text>
  <!-- Some candlesticks along the path -->
  <rect x="146" y="340" width="8" height="25" fill="#ef5350" rx="1"/>
  <rect x="196" y="270" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="246" y="190" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="276" y="155" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="326" y="210" width="8" height="30" fill="#ef5350" rx="1"/>
  <rect x="376" y="270" width="8" height="30" fill="#ef5350" rx="1"/>
  <rect x="426" y="210" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="476" y="130" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="506" y="85" width="8" height="30" fill="#4CAF50" rx="1"/>
  <!-- Legend -->
  <rect x="150" y="450" width="500" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
  <line x1="180" y1="465" x2="200" y2="465" stroke="#42A5F5" stroke-width="2"/>
  <text x="206" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">AB/CD Legs</text>
  <line x1="310" y1="465" x2="330" y2="465" stroke="#42A5F5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="336" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Retracement</text>
  <line x1="450" y1="465" x2="470" y2="465" stroke="#00e676" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="476" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Target</text>
</svg>