<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-family="Arial,sans-serif" font-size="17" font-weight="bold">Candle Density</text>
  <text x="400" y="48" text-anchor="middle" fill="#667" font-family="Arial,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="white" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="70" x2="760" y2="70"/>
    <line x1="60" y1="140" x2="760" y2="140"/>
    <line x1="60" y1="210" x2="760" y2="210"/>
    <line x1="60" y1="280" x2="760" y2="280"/>
    <line x1="60" y1="350" x2="760" y2="350"/>
    <line x1="60" y1="420" x2="760" y2="420"/>
