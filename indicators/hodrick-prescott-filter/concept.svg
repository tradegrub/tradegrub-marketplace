<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Hodrick-Prescott Filter</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price area with cycle shading -->
  <rect x="60" y="70" width="700" height="350" fill="rgba(255,255,255,0.02)" rx="4"/>

  <!-- Green shading zones (price above trend) -->
  <rect x="90" y="100" width="160" height="120" fill="rgba(76,175,80,0.06)"/>
  <rect x="370" y="140" width="200" height="100" fill="rgba(76,175,80,0.06)"/>
  <rect x="630" y="110" width="120" height="100" fill="rgba(76,175,80,0.06)"/>

  <!-- Red shading zones (price below trend) -->
  <rect x="250" y="200" width="120" height="100" fill="rgba(239,83,80,0.06)"/>
  <rect x="570" y="220" width="60" height="60" fill="rgba(239,83,80,0.06)"/>

  <!-- Candlesticks -->
  <g stroke-width="1.5">
    <line x1="100" y1="140" x2="100" y2="200" stroke="#4CAF50"/><rect x="96" y="150" width="8" height="35" fill="#4CAF50" rx="1"/>
    <line x1="140" y1="120" x2="140" y2="185" stroke="#4CAF50"/><rect x="136" y="128" width="8" height="38" fill="#4CAF50" rx="1"/>
    <line x1="180" y1="105" x2="180" y2="170" stroke="#4CAF50"/><rect x="176" y="110" width="8" height="40" fill="#4CAF50" rx="1"/>
    <line x1="220" y1="115" x2="220" y2="180" stroke="#EF5350"/><rect x="216" y="125" width="8" height="38" fill="#EF5350" rx="1"/>
    <line x1="260" y1="155" x2="260" y2="230" stroke="#EF5350"/><rect x="256" y="170" width="8" height="42" fill="#EF5350" rx="1"/>
    <line x1="300" y1="190" x2="300" y2="270" stroke="#EF5350"/><rect x="296" y="205" width="8" height="45" fill="#EF5350" rx="1"/>
    <line x1="340" y1="220" x2="340" y2="290" stroke="#EF5350"/><rect x="336" y="235" width="8" height="38" fill="#EF5350" rx="1"/>
    <line x1="380" y1="200" x2="380" y2="265" stroke="#4CAF50"/><rect x="376" y="208" width="8" height="40" fill="#4CAF50" rx="1"/>
    <line x1="420" y1="170" x2="420" y2="240" stroke="#4CAF50"/><rect x="416" y="178" width="8" height="42" fill="#4CAF50" rx="1"/>
    <line x1="460" y1="145" x2="460" y2="215" stroke="#4CAF50"/><rect x="456" y="152" width="8" height="40" fill="#4CAF50" rx="1"/>
    <line x1="500" y1="155" x2="500" y2="225" stroke="#4CAF50"/><rect x="496" y="162" width="8" height="38" fill="#4CAF50" rx="1"/>
    <line x1="540" y1="175" x2="540" y2="245" stroke="#EF5350"/><rect x="536" y="185" width="8" height="40" fill="#EF5350" rx="1"/>
    <line x1="580" y1="210" x2="580" y2="275" stroke="#EF5350"/><rect x="576" y="220" width="8" height="38" fill="#EF5350" rx="1"/>
    <line x1="620" y1="185" x2="620" y2="250" stroke="#4CAF50"/><rect x="616" y="192" width="8" height="38" fill="#4CAF50" rx="1"/>
    <line x1="660" y1="150" x2="660" y2="220" stroke="#4CAF50"/><rect x="656" y="158" width="8" height="40" fill="#4CAF50" rx="1"/>
    <line x1="700" y1="130" x2="700" y2="200" stroke="#4CAF50"/><rect x="696" y="138" width="8" height="38" fill="#4CAF50" rx="1"/>
  </g>

  <!-- HP Trend line (smooth blue) -->
  <polyline points="100,175 140,165 180,158 220,160 260,175 300,210 340,245 380,250 420,235 460,210 500,200 540,205 580,220 620,215 660,195 700,175" fill="none" stroke="#42A5F5" stroke-width="2.5"/>

  <!-- Annotations -->
  <text x="170" y="100" fill="#4CAF50" font-family="Inter,sans-serif" font-size="10">Price > Trend</text>
  <text x="280" y="290" fill="#EF5350" font-family="Inter,sans-serif" font-size="10">Price &lt; Trend</text>

  <!-- Legend -->
  <rect x="150" y="445" width="500" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="180" y1="460" x2="215" y2="460" stroke="#42A5F5" stroke-width="2.5"/>
  <text x="220" y="464" fill="#aaa" font-family="Inter,sans-serif" font-size="11">HP Trend</text>
  <rect x="320" y="454" width="14" height="12" fill="rgba(76,175,80,0.15)" rx="2"/>
  <text x="340" y="464" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Above Trend</text>
  <rect x="460" y="454" width="14" height="12" fill="rgba(239,83,80,0.15)" rx="2"/>
  <text x="480" y="464" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Below Trend</text>
</svg>