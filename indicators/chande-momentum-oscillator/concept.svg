<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Chande Momentum Oscillator</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="160" fill="rgba(255,255,255,0.02)" rx="4"/>
  <line x1="100" y1="190" x2="100" y2="140" stroke="#666" stroke-width="1"/><rect x="96" y="150" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="170" y1="175" x2="170" y2="130" stroke="#666" stroke-width="1"/><rect x="166" y="138" width="8" height="28" fill="#4CAF50" rx="1"/>
  <line x1="240" y1="160" x2="240" y2="115" stroke="#666" stroke-width="1"/><rect x="236" y="122" width="8" height="28" fill="#4CAF50" rx="1"/>
  <line x1="310" y1="145" x2="310" y2="105" stroke="#666" stroke-width="1"/><rect x="306" y="112" width="8" height="24" fill="#4CAF50" rx="1"/>
  <line x1="380" y1="130" x2="380" y2="100" stroke="#666" stroke-width="1"/><rect x="376" y="108" width="8" height="18" fill="#ff5252" rx="1"/>
  <line x1="450" y1="140" x2="450" y2="108" stroke="#666" stroke-width="1"/><rect x="446" y="115" width="8" height="20" fill="#ff5252" rx="1"/>
  <line x1="520" y1="155" x2="520" y2="120" stroke="#666" stroke-width="1"/><rect x="516" y="128" width="8" height="22" fill="#ff5252" rx="1"/>
  <line x1="590" y1="165" x2="590" y2="130" stroke="#666" stroke-width="1"/><rect x="586" y="138" width="8" height="22" fill="#4CAF50" rx="1"/>
  <line x1="660" y1="150" x2="660" y2="110" stroke="#666" stroke-width="1"/><rect x="656" y="118" width="8" height="25" fill="#4CAF50" rx="1"/>

  <!-- CMO subplot -->
  <rect x="60" y="250" width="700" height="200" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="275" fill="#888" font-family="Inter,sans-serif" font-size="10">+100</text>
  <text x="70" y="310" fill="#888" font-family="Inter,sans-serif" font-size="10">+50</text>
  <text x="70" y="350" fill="#888" font-family="Inter,sans-serif" font-size="10">0</text>
  <text x="70" y="390" fill="#888" font-family="Inter,sans-serif" font-size="10">-50</text>
  <text x="70" y="430" fill="#888" font-family="Inter,sans-serif" font-size="10">-100</text>

  <!-- Overbought/oversold zones -->
  <rect x="95" y="265" width="660" height="40" fill="rgba(76,175,80,0.05)"/>
  <rect x="95" y="385" width="660" height="40" fill="rgba(255,82,82,0.05)"/>

  <line x1="95" y1="305" x2="755" y2="305" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="95" y1="350" x2="755" y2="350" stroke="#666" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="95" y1="395" x2="755" y2="395" stroke="#ff5252" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- CMO line -->
  <polyline points="100,370 170,330 240,295 310,285 380,320 450,360 520,390 590,370 660,310"
            fill="none" stroke="#42A5F5" stroke-width="2"/>
  <!-- Signal -->
  <polyline points="100,360 170,345 240,315 310,300 380,310 450,345 520,375 590,375 660,340"
            fill="none" stroke="#ff9800" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="200" y="465" width="400" height="25" fill="rgba(255,255,255,0.03)" rx="4"/>
  <rect x="220" y="474" width="12" height="3" fill="#42A5F5"/>
  <text x="238" y="480" fill="#aaa" font-family="Inter,sans-serif" font-size="10">CMO</text>
  <rect x="280" y="474" width="12" height="3" fill="#ff9800"/>
  <text x="298" y="480" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Signal</text>
</svg>
