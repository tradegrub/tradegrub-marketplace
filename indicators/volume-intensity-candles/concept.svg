  <rect x="707" y="190" width="10" height="28" fill="#00cc66" opacity="0.6"/>
  <!-- c25: green, low vol -->
  <line x1="740" y1="185" x2="740" y2="220" stroke="#00cc66" stroke-width="1" opacity="0.25"/>
