<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">RSI Divergence Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- PRICE PANEL (top 55%) -->
  <!-- Bearish divergence: price makes higher high, RSI makes lower high -->

  <!-- Uptrend candles to first peak -->
  <line x1="100" y1="210" x2="100" y2="250" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="220" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="130" y1="195" x2="130" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="205" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="160" y1="175" x2="160" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="185" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="190" y1="150" x2="190" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="160" width="8" height="25" fill="#26a69a" rx="1"/>
  <!-- First peak -->
  <line x1="220" y1="125" x2="220" y2="175" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="132" width="8" height="28" fill="#26a69a" rx="1"/>
  <text x="220" y="118" text-anchor="middle" fill="#bbb" font-size="9">High</text>

  <!-- Pullback -->
  <line x1="250" y1="145" x2="250" y2="195" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="150" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="280" y1="165" x2="280" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="276" y="170" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="310" y1="175" x2="310" y2="215" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="190" width="8" height="15" fill="#26a69a" rx="1"/>

  <!-- Rally to higher high -->
  <line x1="340" y1="155" x2="340" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="336" y="162" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="370" y1="135" x2="370" y2="180" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="142" width="8" height="25" fill="#26a69a" rx="1"/>
  <!-- Second peak - HIGHER high -->
  <line x1="400" y1="105" x2="400" y2="160" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="112" width="8" height="30" fill="#26a69a" rx="1"/>
  <text x="400" y="98" text-anchor="middle" fill="#bbb" font-size="9">Higher High</text>

  <!-- Price divergence line -->
  <line x1="220" y1="120" x2="400" y2="100" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>

  <!-- Reversal after divergence -->
  <line x1="430" y1="125" x2="430" y2="175" stroke="#ef5350" stroke-width="1"/>
  <rect x="426" y="130" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="460" y1="145" x2="460" y2="195" stroke="#ef5350" stroke-width="1"/>
  <rect x="456" y="150" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="490" y1="165" x2="490" y2="212" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="172" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="520" y1="180" x2="520" y2="225" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="188" width="8" height="22" fill="#ef5350" rx="1"/>

  <!-- SELL signal -->
  <g filter="url(#softGlow)">
    <polygon points="405,162 415,162 410,175" fill="#ef5350"/>
  </g>
  <rect x="418" y="155" width="55" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="445" y="169" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SELL</text>

  <!-- Bearish divergence label -->
  <rect x="265" y="82" width="120" height="18" rx="4" fill="#ff9800" fill-opacity="0.12" stroke="#ff9800" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="325" y="95" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="500">Bearish Divergence</text>

  <!-- Separator -->
  <line x1="60" y1="260" x2="760" y2="260" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- RSI PANEL (bottom 40%) -->
  <text x="70" y="278" fill="#888" font-size="9">RSI</text>

  <!-- Overbought line -->
  <line x1="80" y1="290" x2="720" y2="290" stroke="#ef5350" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
  <text x="725" y="294" fill="#ef5350" font-size="8">70</text>

  <!-- Midline -->
  <line x1="80" y1="340" x2="720" y2="340" stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="725" y="344" fill="#666" font-size="8">50</text>

  <!-- Oversold line -->
  <line x1="80" y1="390" x2="720" y2="390" stroke="#00e676" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
  <text x="725" y="394" fill="#00e676" font-size="8">30</text>

  <!-- RSI line - rises to first peak then makes LOWER high at second price peak -->
  <path d="M 100,365 Q 130,350 160,335 Q 190,310 220,285 Q 250,310 280,345 Q 310,355 340,330 Q 370,310 400,300 Q 430,320 460,345 Q 490,355 520,360" fill="none" stroke="#42a5f5" stroke-width="1.8" opacity="0.9"/>

  <!-- RSI first peak marker -->
  <circle cx="220" cy="285" r="4" fill="#42a5f5" opacity="0.8"/>
  <text x="220" y="278" text-anchor="middle" fill="#42a5f5" font-size="8">High</text>

  <!-- RSI second peak marker - LOWER -->
  <circle cx="400" cy="300" r="4" fill="#42a5f5" opacity="0.8"/>
  <text x="400" y="278" text-anchor="middle" fill="#42a5f5" font-size="8">Lower High</text>

  <!-- RSI divergence line -->
  <line x1="220" y1="285" x2="400" y2="300" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>

  <!-- Exit at midline annotation -->
  <rect x="480" y="330" width="80" height="18" rx="4" fill="#888" fill-opacity="0.15" stroke="#888" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="520" y="343" text-anchor="middle" fill="#aaa" font-size="9" font-weight="500">EXIT (RSI=50)</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">RSI Line</text>
    <circle cx="110" cy="20" r="4" fill="#ff9800"/>
    <text x="120" y="24" fill="#999" font-size="9">Divergence</text>
    <circle cx="220" cy="20" r="4" fill="#ef5350"/>
    <text x="230" y="24" fill="#999" font-size="9">Overbought (70)</text>
    <circle cx="350" cy="20" r="4" fill="#00e676"/>
    <text x="360" y="24" fill="#999" font-size="9">Oversold (30)</text>
    <circle cx="470" cy="20" r="4" fill="#888"/>
    <text x="480" y="24" fill="#999" font-size="9">Midline Exit (50)</text>
    <circle cx="600" cy="20" r="4" fill="#26a69a"/>
    <text x="610" y="24" fill="#999" font-size="9">Bullish</text>
  </g>
</svg>