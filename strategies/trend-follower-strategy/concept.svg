  <line x1="485" y1="122" x2="485" y2="158" stroke="#26a69a" stroke-width="1"/>
  <rect x="481" y="128" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="510" y1="112" x2="510" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="506" y="118" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="535" y1="102" x2="535" y2="138" stroke="#26a69a" stroke-width="1"/>
  <rect x="531" y="108" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="560" y1="95" x2="560" y2="130" stroke="#26a69a" stroke-width="1"/>
  <rect x="556" y="102" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="585" y1="90" x2="585" y2="125" stroke="#26a69a" stroke-width="1"/>
  <rect x="581" y="98" width="8" height="18" fill="#26a69a" rx="1"/>

