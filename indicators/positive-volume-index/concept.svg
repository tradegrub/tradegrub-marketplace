<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Positive Volume Index</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart area -->
  <line x1="60" y1="70" x2="60" y2="220" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="220" x2="750" y2="220" stroke="#333" stroke-width="1"/>
  <text x="55" y="80" text-anchor="end" fill="#666" font-size="9">Price</text>

  <!-- Candlesticks -->
  <line x1="100" y1="110" x2="100" y2="180" stroke="#555" stroke-width="1"/>
  <rect x="95" y="125" width="10" height="35" fill="#4CAF50" rx="1"/>
  <line x1="160" y1="100" x2="160" y2="175" stroke="#555" stroke-width="1"/>
  <rect x="155" y="115" width="10" height="30" fill="#4CAF50" rx="1"/>
  <line x1="220" y1="95" x2="220" y2="170" stroke="#555" stroke-width="1"/>
  <rect x="215" y="110" width="10" height="35" fill="#4CAF50" rx="1"/>
  <line x1="280" y1="100" x2="280" y2="165" stroke="#555" stroke-width="1"/>
  <rect x="275" y="120" width="10" height="25" fill="#ff1744" rx="1"/>
  <line x1="340" y1="105" x2="340" y2="175" stroke="#555" stroke-width="1"/>
  <rect x="335" y="125" width="10" height="30" fill="#ff1744" rx="1"/>
  <line x1="400" y1="115" x2="400" y2="185" stroke="#555" stroke-width="1"/>
  <rect x="395" y="130" width="10" height="35" fill="#ff1744" rx="1"/>
  <line x1="460" y1="120" x2="460" y2="190" stroke="#555" stroke-width="1"/>
  <rect x="455" y="135" width="10" height="30" fill="#4CAF50" rx="1"/>
  <line x1="520" y1="110" x2="520" y2="180" stroke="#555" stroke-width="1"/>
  <rect x="515" y="125" width="10" height="30" fill="#4CAF50" rx="1"/>
  <line x1="580" y1="100" x2="580" y2="170" stroke="#555" stroke-width="1"/>
  <rect x="575" y="115" width="10" height="30" fill="#4CAF50" rx="1"/>
  <line x1="640" y1="95" x2="640" y2="160" stroke="#555" stroke-width="1"/>
  <rect x="635" y="110" width="10" height="25" fill="#4CAF50" rx="1"/>
  <line x1="700" y1="90" x2="700" y2="155" stroke="#555" stroke-width="1"/>
  <rect x="695" y="105" width="10" height="25" fill="#4CAF50" rx="1"/>

  <!-- PVI subplot -->
  <line x1="60" y1="250" x2="750" y2="250" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="250" x2="60" y2="440" stroke="#333" stroke-width="1"/>
  <text x="55" y="260" text-anchor="end" fill="#666" font-size="9">PVI</text>

  <!-- Background zones -->
  <rect x="60" y="250" width="350" height="190" fill="rgba(66,165,245,0.06)"/>
  <rect x="410" y="250" width="140" height="190" fill="rgba(255,167,38,0.06)"/>
  <rect x="550" y="250" width="200" height="190" fill="rgba(66,165,245,0.06)"/>

  <!-- PVI line -->
  <polyline points="100,380 160,360 220,340 280,335 340,345 400,355 460,370 520,350 580,330 640,315 700,300" stroke="#42A5F5" stroke-width="2" fill="none"/>

  <!-- Signal line -->
  <polyline points="100,390 160,380 220,370 280,365 340,362 400,360 460,362 520,358 580,352 640,345 700,338" stroke="#FFA726" stroke-width="1.5" fill="none" stroke-dasharray="6,3"/>

  <!-- Cross annotations -->
  <text x="415" y="268" fill="#FFA726" font-size="9">PVI below signal</text>
  <text x="580" y="268" fill="#42A5F5" font-size="9">PVI above signal</text>

  <!-- Legend -->
  <rect x="200" y="462" width="12" height="12" fill="#42A5F5" rx="2"/>
  <text x="218" y="473" fill="#aaa" font-size="10">PVI</text>
  <rect x="280" y="462" width="12" height="12" fill="#FFA726" rx="2"/>
  <text x="298" y="473" fill="#aaa" font-size="10">Signal (EMA 255)</text>
  <rect x="440" y="462" width="12" height="12" fill="rgba(66,165,245,0.2)" rx="2"/>
  <text x="458" y="473" fill="#aaa" font-size="10">Bullish Zone</text>
</svg>
