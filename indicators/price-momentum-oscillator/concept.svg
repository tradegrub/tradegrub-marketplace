<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Price Momentum Oscillator</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <rect x="60" y="70" width="700" height="160" fill="rgba(255,255,255,0.02)" rx="4"/>
  <line x1="100" y1="190" x2="100" y2="140" stroke="#666" stroke-width="1"/><rect x="96" y="150" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="160" y1="180" x2="160" y2="125" stroke="#666" stroke-width="1"/><rect x="156" y="135" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="220" y1="170" x2="220" y2="115" stroke="#666" stroke-width="1"/><rect x="216" y="125" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="280" y1="160" x2="280" y2="110" stroke="#666" stroke-width="1"/><rect x="276" y="120" width="8" height="25" fill="#4CAF50" rx="1"/>
  <line x1="340" y1="135" x2="340" y2="100" stroke="#666" stroke-width="1"/><rect x="336" y="105" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="400" y1="120" x2="400" y2="90" stroke="#666" stroke-width="1"/><rect x="396" y="95" width="8" height="18" fill="#ff5252" rx="1"/>
  <line x1="460" y1="130" x2="460" y2="100" stroke="#666" stroke-width="1"/><rect x="456" y="108" width="8" height="18" fill="#ff5252" rx="1"/>
  <line x1="520" y1="135" x2="520" y2="108" stroke="#666" stroke-width="1"/><rect x="516" y="112" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="580" y1="125" x2="580" y2="95" stroke="#666" stroke-width="1"/><rect x="576" y="100" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="640" y1="115" x2="640" y2="85" stroke="#666" stroke-width="1"/><rect x="636" y="90" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="700" y1="110" x2="700" y2="80" stroke="#666" stroke-width="1"/><rect x="696" y="85" width="8" height="20" fill="#4CAF50" rx="1"/>

  <!-- PMO subplot -->
  <rect x="60" y="250" width="700" height="200" fill="rgba(255,255,255,0.02)" rx="4"/>

  <!-- Zero line -->
  <line x1="95" y1="350" x2="755" y2="350" stroke="#666" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Histogram bars -->
  <rect x="96" y="350" width="10" height="15" fill="rgba(126,87,194,0.6)"/>
  <rect x="156" y="340" width="10" height="10" fill="rgba(126,87,194,0.6)"/>
  <rect x="216" y="330" width="10" height="20" fill="rgba(126,87,194,0.6)"/>
  <rect x="276" y="320" width="10" height="30" fill="rgba(126,87,194,0.6)"/>
  <rect x="336" y="310" width="10" height="40" fill="rgba(126,87,194,0.6)"/>
  <rect x="396" y="335" width="10" height="15" fill="rgba(126,87,194,0.6)"/>
  <rect x="456" y="350" width="10" height="10" fill="rgba(126,87,194,0.3)"/>
  <rect x="516" y="355" width="10" height="10" fill="rgba(126,87,194,0.3)"/>
  <rect x="576" y="340" width="10" height="10" fill="rgba(126,87,194,0.6)"/>
  <rect x="636" y="325" width="10" height="25" fill="rgba(126,87,194,0.6)"/>
  <rect x="696" y="315" width="10" height="35" fill="rgba(126,87,194,0.6)"/>

  <!-- PMO line -->
  <polyline points="100,340 160,325 220,305 280,290 340,275 400,300 460,330 520,340 580,315 640,295 700,280"
            fill="none" stroke="#42A5F5" stroke-width="2"/>
  <!-- Signal line -->
  <polyline points="100,345 160,335 220,320 280,310 340,300 400,305 460,325 520,335 580,325 640,310 700,295"
            fill="none" stroke="#ff9800" stroke-width="1.5"/>

  <!-- Crossover marker -->
  <polygon points="460,445 465,435 455,435" fill="#00e676"/>
  <text x="470" y="442" fill="#00e676" font-family="Inter,sans-serif" font-size="9">Bull Cross</text>

  <!-- Legend -->
  <rect x="150" y="465" width="500" height="25" fill="rgba(255,255,255,0.03)" rx="4"/>
  <rect x="170" y="474" width="12" height="3" fill="#42A5F5"/>
  <text x="188" y="480" fill="#aaa" font-family="Inter,sans-serif" font-size="10">PMO</text>
  <rect x="230" y="474" width="12" height="3" fill="#ff9800"/>
  <text x="248" y="480" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Signal</text>
  <rect x="310" y="472" width="8" height="8" fill="rgba(126,87,194,0.6)"/>
  <text x="324" y="480" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Histogram</text>
</svg>
