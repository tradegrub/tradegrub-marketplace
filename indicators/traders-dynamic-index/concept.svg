<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Traders Dynamic Index</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart area -->
  <rect x="60" y="70" width="700" height="140" fill="none" stroke="#333" stroke-width="0.5" rx="4"/>
  <line x1="100" y1="120" x2="100" y2="170" stroke="#26a69a" stroke-width="1"/><rect x="96" y="125" width="8" height="35" fill="#26a69a" rx="1"/>
  <line x1="150" y1="110" x2="150" y2="165" stroke="#26a69a" stroke-width="1"/><rect x="146" y="115" width="8" height="38" fill="#26a69a" rx="1"/>
  <line x1="200" y1="100" x2="200" y2="155" stroke="#26a69a" stroke-width="1"/><rect x="196" y="105" width="8" height="35" fill="#26a69a" rx="1"/>
  <line x1="250" y1="95" x2="250" y2="150" stroke="#ef5350" stroke-width="1"/><rect x="246" y="100" width="8" height="40" fill="#ef5350" rx="1"/>
  <line x1="300" y1="105" x2="300" y2="165" stroke="#ef5350" stroke-width="1"/><rect x="296" y="115" width="8" height="38" fill="#ef5350" rx="1"/>
  <line x1="350" y1="120" x2="350" y2="180" stroke="#ef5350" stroke-width="1"/><rect x="346" y="130" width="8" height="40" fill="#ef5350" rx="1"/>
  <line x1="400" y1="135" x2="400" y2="195" stroke="#26a69a" stroke-width="1"/><rect x="396" y="145" width="8" height="35" fill="#26a69a" rx="1"/>
  <line x1="450" y1="125" x2="450" y2="185" stroke="#26a69a" stroke-width="1"/><rect x="446" y="130" width="8" height="40" fill="#26a69a" rx="1"/>
  <line x1="500" y1="110" x2="500" y2="170" stroke="#26a69a" stroke-width="1"/><rect x="496" y="115" width="8" height="40" fill="#26a69a" rx="1"/>
  <line x1="550" y1="100" x2="550" y2="155" stroke="#26a69a" stroke-width="1"/><rect x="546" y="105" width="8" height="35" fill="#26a69a" rx="1"/>
  <line x1="600" y1="95" x2="600" y2="150" stroke="#ef5350" stroke-width="1"/><rect x="596" y="100" width="8" height="38" fill="#ef5350" rx="1"/>
  <line x1="650" y1="105" x2="650" y2="160" stroke="#ef5350" stroke-width="1"/><rect x="646" y="110" width="8" height="38" fill="#ef5350" rx="1"/>
  <line x1="700" y1="110" x2="700" y2="165" stroke="#26a69a" stroke-width="1"/><rect x="696" y="115" width="8" height="35" fill="#26a69a" rx="1"/>

  <!-- TDI Panel -->
  <rect x="60" y="230" width="700" height="210" fill="none" stroke="#333" stroke-width="0.5" rx="4"/>
  <!-- OB/OS lines -->
  <line x1="60" y1="265" x2="760" y2="265" stroke="#ef5350" stroke-width="0.7" stroke-dasharray="6,4"/>
  <line x1="60" y1="335" x2="760" y2="335" stroke="#555" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="60" y1="405" x2="760" y2="405" stroke="#26a69a" stroke-width="0.7" stroke-dasharray="6,4"/>
  <text x="55" y="268" text-anchor="end" fill="#ef5350" font-size="9" font-family="Inter,sans-serif">68</text>
  <text x="55" y="338" text-anchor="end" fill="#555" font-size="9" font-family="Inter,sans-serif">50</text>
  <text x="55" y="408" text-anchor="end" fill="#26a69a" font-size="9" font-family="Inter,sans-serif">32</text>

  <!-- BB bands on RSI (light blue fill) -->
  <polygon points="100,350 150,330 200,290 250,270 300,290 350,320 400,370 450,390 500,370 550,330 600,280 650,270 700,295 700,370 650,360 600,350 550,380 500,410 450,420 400,410 350,390 300,370 250,350 200,345 150,360 100,380" fill="rgba(66,165,245,0.08)" stroke="none"/>
  <!-- Upper band -->
  <polyline points="100,350 150,330 200,290 250,270 300,290 350,320 400,370 450,390 500,370 550,330 600,280 650,270 700,295" fill="none" stroke="rgba(66,165,245,0.4)" stroke-width="1"/>
  <!-- Lower band -->
  <polyline points="100,380 150,360 200,345 250,350 300,370 350,390 400,410 450,420 500,410 550,380 600,350 650,360 700,370" fill="none" stroke="rgba(66,165,245,0.4)" stroke-width="1"/>
  <!-- Mid band (orange) -->
  <polyline points="100,365 150,345 200,318 250,310 300,330 350,355 400,390 450,405 500,390 550,355 600,315 650,315 700,332" fill="none" stroke="#FFB74D" stroke-width="1"/>
  <!-- Fast MA (green) -->
  <polyline points="100,370 150,340 200,300 250,275 300,300 350,340 400,385 450,410 500,395 550,345 600,290 650,275 700,305" fill="none" stroke="#00e676" stroke-width="2"/>
  <!-- Slow MA (red) -->
  <polyline points="100,368 150,350 200,320 250,295 300,310 350,345 400,380 450,400 500,400 550,370 600,320 650,295 700,310" fill="none" stroke="#ff1744" stroke-width="2"/>

  <!-- Buy signal -->
  <polygon points="450,425 445,435 455,435" fill="#00e676"/>
  <!-- Sell signal -->
  <polygon points="300,285 295,275 305,275" fill="#ff1744"/>

  <!-- Legend -->
  <rect x="60" y="460" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="475" x2="105" y2="475" stroke="#00e676" stroke-width="2"/>
  <text x="110" y="479" fill="#aaa" font-size="11" font-family="Inter,sans-serif">Fast MA</text>
  <line x1="180" y1="475" x2="205" y2="475" stroke="#ff1744" stroke-width="2"/>
  <text x="210" y="479" fill="#aaa" font-size="11" font-family="Inter,sans-serif">Slow MA</text>
  <line x1="280" y1="475" x2="305" y2="475" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="310" y="479" fill="#aaa" font-size="11" font-family="Inter,sans-serif">Mid Band</text>
  <line x1="395" y1="475" x2="420" y2="475" stroke="rgba(66,165,245,0.5)" stroke-width="1.5"/>
  <text x="425" y="479" fill="#aaa" font-size="11" font-family="Inter,sans-serif">BB Bands</text>
</svg>
