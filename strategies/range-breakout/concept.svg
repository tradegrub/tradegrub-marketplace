<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="rangeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9c27b0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#9c27b0" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="breakGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">N-Bar Range Breakout Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Range zone -->
  <rect x="80" y="195" width="430" height="100" fill="url(#rangeFill)" rx="2"/>

  <!-- Range High -->
  <line x1="80" y1="195" x2="510" y2="195" stroke="#9c27b0" stroke-width="1.5" opacity="0.8"/>
  <text x="85" y="190" fill="#9c27b0" font-size="10" font-weight="500">Range High (20-bar)</text>

  <!-- Range Low -->
  <line x1="80" y1="295" x2="510" y2="295" stroke="#9c27b0" stroke-width="1.5" opacity="0.8"/>
  <text x="85" y="312" fill="#9c27b0" font-size="10" font-weight="500">Range Low (20-bar)</text>

  <!-- Range Mid -->
  <line x1="80" y1="245" x2="650" y2="245" stroke="#ff9800" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="655" y="249" fill="#ff9800" font-size="9" opacity="0.6">Mid (exit)</text>

  <!-- Consolidation annotation -->
  <rect x="180" y="330" width="140" height="22" rx="4" fill="#ffffff" fill-opacity="0.06"/>
  <text x="250" y="345" text-anchor="middle" fill="#bbb" font-size="10">Consolidation Zone</text>

  <!-- Candles inside range (choppy consolidation) -->
  <line x1="105" y1="210" x2="105" y2="270" stroke="#26a69a" stroke-width="1"/>
  <rect x="101" y="230" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="135" y1="205" x2="135" y2="280" stroke="#ef5350" stroke-width="1"/>
  <rect x="131" y="215" width="8" height="38" fill="#ef5350" rx="1"/>
  <line x1="165" y1="215" x2="165" y2="285" stroke="#26a69a" stroke-width="1"/>
  <rect x="161" y="250" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="195" y1="200" x2="195" y2="275" stroke="#ef5350" stroke-width="1"/>
  <rect x="191" y="210" width="8" height="40" fill="#ef5350" rx="1"/>
  <line x1="225" y1="210" x2="225" y2="280" stroke="#26a69a" stroke-width="1"/>
  <rect x="221" y="240" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="255" y1="205" x2="255" y2="275" stroke="#ef5350" stroke-width="1"/>
  <rect x="251" y="215" width="8" height="35" fill="#ef5350" rx="1"/>
  <line x1="285" y1="210" x2="285" y2="278" stroke="#26a69a" stroke-width="1"/>
  <rect x="281" y="235" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="315" y1="208" x2="315" y2="270" stroke="#26a69a" stroke-width="1"/>
  <rect x="311" y="225" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="345" y1="205" x2="345" y2="268" stroke="#ef5350" stroke-width="1"/>
  <rect x="341" y="212" width="8" height="32" fill="#ef5350" rx="1"/>
  <line x1="375" y1="210" x2="375" y2="265" stroke="#26a69a" stroke-width="1"/>
  <rect x="371" y="225" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="405" y1="202" x2="405" y2="260" stroke="#26a69a" stroke-width="1"/>
  <rect x="401" y="215" width="8" height="28" fill="#26a69a" rx="1"/>
  <line x1="435" y1="200" x2="435" y2="252" stroke="#26a69a" stroke-width="1"/>
  <rect x="431" y="210" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="465" y1="198" x2="465" y2="245" stroke="#26a69a" stroke-width="1"/>
  <rect x="461" y="205" width="8" height="25" fill="#26a69a" rx="1"/>

  <!-- Breakout candle -->
  <line x1="505" y1="155" x2="505" y2="210" stroke="#00e676" stroke-width="1.5"/>
  <rect x="499" y="160" width="12" height="38" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- Breakout glow zone -->
  <rect x="495" y="145" width="220" height="55" fill="url(#breakGlow)" rx="4"/>

  <!-- BUY arrow -->
  <g filter="url(#softGlow)">
    <polygon points="510,148 520,148 515,135" fill="#00e676"/>
  </g>
  <rect x="525" y="130" width="50" height="22" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="550" y="145" text-anchor="middle" fill="#00e676" font-size="11" font-weight="600">BUY</text>

  <!-- Close filter annotation -->
  <rect x="530" y="198" width="120" height="18" rx="4" fill="#42a5f5" fill-opacity="0.12" stroke="#42a5f5" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="590" y="211" text-anchor="middle" fill="#42a5f5" font-size="9" font-weight="500">Close > Range High</text>

  <!-- Post-breakout candles -->
  <line x1="545" y1="140" x2="545" y2="180" stroke="#26a69a" stroke-width="1"/>
  <rect x="541" y="145" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="575" y1="130" x2="575" y2="168" stroke="#26a69a" stroke-width="1"/>
  <rect x="571" y="135" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="605" y1="122" x2="605" y2="158" stroke="#ef5350" stroke-width="1"/>
  <rect x="601" y="126" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="635" y1="115" x2="635" y2="152" stroke="#26a69a" stroke-width="1"/>
  <rect x="631" y="120" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="665" y1="108" x2="665" y2="145" stroke="#26a69a" stroke-width="1"/>
  <rect x="661" y="112" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- ATR trailing stop -->
  <path d="M 505,210 L 545,200 L 575,192 L 605,185 L 635,178 L 665,170" fill="none" stroke="#ef5350" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="670" y="175" fill="#ef5350" font-size="9">ATR Trail Stop</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="101" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="131" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="161" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="191" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="221" y="406" width="8" height="9" fill="#26a69a" rx="1"/>
    <rect x="251" y="404" width="8" height="11" fill="#ef5350" rx="1"/>
    <rect x="281" y="406" width="8" height="9" fill="#26a69a" rx="1"/>
    <rect x="311" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="341" y="404" width="8" height="11" fill="#ef5350" rx="1"/>
    <rect x="371" y="406" width="8" height="9" fill="#26a69a" rx="1"/>
    <rect x="401" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="431" y="406" width="8" height="9" fill="#26a69a" rx="1"/>
    <rect x="461" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
  </g>
  <rect x="499" y="380" width="12" height="35" fill="#00e676" rx="1" opacity="0.7" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="541" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="571" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="601" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="631" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="661" y="396" width="8" height="19" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#9c27b0"/>
    <text x="30" y="24" fill="#999" font-size="9">Range Boundary</text>
    <circle cx="140" cy="20" r="4" fill="#00e676"/>
    <text x="150" y="24" fill="#999" font-size="9">Breakout Signal</text>
    <circle cx="260" cy="20" r="4" fill="#ff9800"/>
    <text x="270" y="24" fill="#999" font-size="9">Midline Exit</text>
    <circle cx="370" cy="20" r="4" fill="#ef5350"/>
    <text x="380" y="24" fill="#999" font-size="9">ATR Trail Stop</text>
    <circle cx="490" cy="20" r="4" fill="#42a5f5"/>
    <text x="500" y="24" fill="#999" font-size="9">Close Filter</text>
    <rect x="590" y="12" width="20" height="16" fill="#9c27b0" opacity="0.3" rx="2"/>
    <text x="615" y="24" fill="#999" font-size="9">Range Zone</text>
  </g>
</svg>