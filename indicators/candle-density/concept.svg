    <rect x="196" y="140" width="56" height="28" fill="#5c3d99"/>
    <rect x="252" y="140" width="70" height="28" fill="#c4621a"/>
    <rect x="322" y="140" width="56" height="28" fill="#e8a020"/>
    <rect x="378" y="140" width="56" height="28" fill="#c4621a"/>
    <rect x="434" y="140" width="56" height="28" fill="#5c3d99"/>
