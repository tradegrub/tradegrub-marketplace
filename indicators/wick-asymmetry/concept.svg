<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="140" x2="800" y2="140"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="260" x2="800" y2="260"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="380" x2="800" y2="380"/>
    <line x1="130" y1="60" x2="130" y2="420"/>
    <line x1="270" y1="60" x2="270" y2="420"/>
    <line x1="400" y1="60" x2="400" y2="420"/>
    <line x1="530" y1="60" x2="530" y2="420"/>
    <line x1="670" y1="60" x2="670" y2="420"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-family="Arial, sans-serif" font-size="17" font-weight="bold" filter="url(#glow)">Wick Asymmetry Ratio</text>
  <text x="400" y="47" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="11">tradegrub.finance</text>

  <!-- ========== CANDLE 1: Buying Pressure ========== -->
  <text x="160" y="75" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Buying Pressure</text>

  <!-- Upper wick -->
  <line x1="160" y1="100" x2="160" y2="150" stroke="#4ade80" stroke-width="2"/>
  <!-- Body (small, near top) -->
  <rect x="145" y="150" width="30" height="35" fill="#4ade80" rx="2"/>
  <!-- Lower wick (long) -->
  <line x1="160" y1="185" x2="160" y2="350" stroke="#4ade80" stroke-width="2"/>

  <!-- Upper Wick bracket -->
  <line x1="120" y1="105" x2="120" y2="148" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="115" y1="105" x2="125" y2="105" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="115" y1="148" x2="125" y2="148" stroke="#7dd3fc" stroke-width="1"/>
  <text x="105" y="130" text-anchor="end" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="10">Upper Wick</text>
  <text x="105" y="141" text-anchor="end" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="9">(50px)</text>

  <!-- Body bracket -->
  <line x1="200" y1="152" x2="200" y2="183" stroke="#fbbf24" stroke-width="1"/>
  <line x1="195" y1="152" x2="205" y2="152" stroke="#fbbf24" stroke-width="1"/>
  <line x1="195" y1="183" x2="205" y2="183" stroke="#fbbf24" stroke-width="1"/>
  <text x="215" y="170" text-anchor="start" fill="#fbbf24" font-family="Arial, sans-serif" font-size="10">Body</text>

  <!-- Lower Wick bracket -->
  <line x1="120" y1="187" x2="120" y2="348" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="115" y1="187" x2="125" y2="187" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="115" y1="348" x2="125" y2="348" stroke="#7dd3fc" stroke-width="1"/>
  <text x="105" y="265" text-anchor="end" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="10">Lower Wick</text>
  <text x="105" y="276" text-anchor="end" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="9">(165px)</text>

  <!-- WAR value -->
  <text x="160" y="375" text-anchor="middle" fill="#4ade80" font-family="Arial, sans-serif" font-size="11" font-weight="bold">WAR = -0.53</text>
  <text x="160" y="390" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="9">(50-165)/(50+165)</text>

  <!-- ========== CANDLE 2: Selling Pressure ========== -->
  <text x="420" y="75" text-anchor="middle" fill="#f87171" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Selling Pressure</text>

  <!-- Upper wick (long) -->
  <line x1="420" y1="100" x2="420" y2="265" stroke="#f87171" stroke-width="2"/>
  <!-- Body (small, near bottom) -->
  <rect x="405" y="265" width="30" height="35" fill="#f87171" rx="2"/>
  <!-- Lower wick (short) -->
  <line x1="420" y1="300" x2="420" y2="350" stroke="#f87171" stroke-width="2"/>

  <!-- Upper Wick bracket -->
  <line x1="380" y1="105" x2="380" y2="263" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="375" y1="105" x2="385" y2="105" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="375" y1="263" x2="385" y2="263" stroke="#7dd3fc" stroke-width="1"/>
  <text x="365" y="180" text-anchor="end" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="10">Upper Wick</text>
  <text x="365" y="191" text-anchor="end" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="9">(165px)</text>

  <!-- Lower Wick bracket -->
  <line x1="460" y1="302" x2="460" y2="348" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="455" y1="302" x2="465" y2="302" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="455" y1="348" x2="465" y2="348" stroke="#7dd3fc" stroke-width="1"/>
  <text x="475" y="328" text-anchor="start" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="10">Lower Wick</text>
  <text x="475" y="339" text-anchor="start" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="9">(50px)</text>

  <!-- WAR value -->
  <text x="420" y="375" text-anchor="middle" fill="#f87171" font-family="Arial, sans-serif" font-size="11" font-weight="bold">WAR = +0.53</text>
  <text x="420" y="390" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="9">(165-50)/(165+50)</text>

  <!-- ========== CANDLE 3: Balanced ========== -->
  <text x="660" y="75" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Balanced</text>

  <!-- Upper wick -->
  <line x1="660" y1="120" x2="660" y2="190" stroke="#9ca3af" stroke-width="2"/>
  <!-- Body (medium) -->
  <rect x="645" y="190" width="30" height="55" fill="#6b7280" rx="2"/>
  <!-- Lower wick (equal) -->
  <line x1="660" y1="245" x2="660" y2="315" stroke="#9ca3af" stroke-width="2"/>

  <!-- Upper Wick bracket -->
  <line x1="620" y1="125" x2="620" y2="188" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="615" y1="125" x2="625" y2="125" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="615" y1="188" x2="625" y2="188" stroke="#7dd3fc" stroke-width="1"/>
  <text x="605" y="155" text-anchor="end" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="10">Upper</text>
  <text x="605" y="166" text-anchor="end" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="9">(70px)</text>

  <!-- Lower Wick bracket -->
  <line x1="700" y1="247" x2="700" y2="313" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="695" y1="247" x2="705" y2="247" stroke="#7dd3fc" stroke-width="1"/>
  <line x1="695" y1="313" x2="705" y2="313" stroke="#7dd3fc" stroke-width="1"/>
  <text x="715" y="278" text-anchor="start" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="10">Lower</text>
  <text x="715" y="289" text-anchor="start" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="9">(70px)</text>

  <!-- WAR value -->
  <text x="660" y="345" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="11" font-weight="bold">WAR = 0.00</text>
  <text x="660" y="360" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="9">(70-70)/(70+70)</text>

  <!-- ========== Formula Box ========== -->
  <rect x="220" y="405" width="360" height="40" fill="#0f172a" stroke="#334155" stroke-width="1" rx="6"/>
  <text x="400" y="422" text-anchor="middle" fill="#e2e8f0" font-family="'Courier New', monospace" font-size="13" font-weight="bold">WAR = (Upper - Lower) / (Upper + Lower)</text>
  <text x="400" y="438" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Range: -1.0 (bullish) to +1.0 (bearish)</text>

  <!-- ========== Legend Bar ========== -->
  <rect x="100" y="460" width="600" height="28" fill="#0f172a" stroke="#334155" stroke-width="0.5" rx="5"/>
  <circle cx="170" cy="474" r="5" fill="#4ade80"/>
  <text x="180" y="478" fill="#9ca3af" font-family="Arial, sans-serif" font-size="10">Buying Pressure (WAR &lt; 0)</text>
  <circle cx="370" cy="474" r="5" fill="#f87171"/>
  <text x="380" y="478" fill="#9ca3af" font-family="Arial, sans-serif" font-size="10">Selling Pressure (WAR &gt; 0)</text>
  <circle cx="560" cy="474" r="5" fill="#6b7280"/>
  <text x="570" y="478" fill="#9ca3af" font-family="Arial, sans-serif" font-size="10">Balanced (WAR = 0)</text>
</svg>