<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Choppiness Filter + EMA Trend</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Choppy zone highlight in price panel -->
  <rect x="80" y="65" width="210" height="185" fill="#ef5350" fill-opacity="0.03" rx="3"/>
  <text x="185" y="78" text-anchor="middle" fill="#ef5350" font-size="9" opacity="0.6">Choppy: No Trades</text>

  <!-- Trending zone highlight -->
  <rect x="310" y="65" width="250" height="185" fill="#26a69a" fill-opacity="0.03" rx="3"/>
  <text x="435" y="78" text-anchor="middle" fill="#26a69a" font-size="9" opacity="0.6">Trending: Trades Allowed</text>

  <!-- EMA fast line -->
  <polyline points="90,160 120,155 150,162 180,158 210,165 240,160 270,155 300,152 330,148 360,135 390,122 420,112 450,105 480,100 510,98 540,102 570,108 600,115 630,122" fill="none" stroke="#26a69a" stroke-width="1.5" opacity="0.8"/>
  <text x="640" y="126" fill="#26a69a" font-size="9">Fast EMA</text>

  <!-- EMA slow line -->
  <polyline points="90,162 120,160 150,158 180,162 210,160 240,162 270,160 300,158 330,155 360,148 390,138 420,128 450,120 480,115 510,112 540,110 570,112 600,118 630,125" fill="none" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.7"/>
  <text x="640" y="130" fill="#ef5350" font-size="9">Slow EMA</text>

  <!-- Choppy price candles -->
  <line x1="100" y1="140" x2="100" y2="178" stroke="#ef5350" stroke-width="1"/>
  <rect x="96" y="148" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="125" y1="135" x2="125" y2="175" stroke="#26a69a" stroke-width="1"/>
  <rect x="121" y="148" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="150" y1="142" x2="150" y2="180" stroke="#ef5350" stroke-width="1"/>
  <rect x="146" y="148" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="175" y1="138" x2="175" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="171" y="145" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="200" y1="142" x2="200" y2="180" stroke="#ef5350" stroke-width="1"/>
  <rect x="196" y="148" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="225" y1="138" x2="225" y2="175" stroke="#26a69a" stroke-width="1"/>
  <rect x="221" y="145" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="250" y1="140" x2="250" y2="178" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="146" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="275" y1="135" x2="275" y2="172" stroke="#26a69a" stroke-width="1"/>
  <rect x="271" y="142" width="8" height="20" fill="#26a69a" rx="1"/>

  <!-- EMA crossover signal -->
  <line x1="320" y1="128" x2="320" y2="168" stroke="#00e676" stroke-width="1.5"/>
  <rect x="314" y="135" width="12" height="25" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="320,125 330,125 325,113" fill="#00e676"/>
  </g>
  <rect x="332" y="108" width="135" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="399" y="121" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">BUY: EMA Cross + Low CHOP</text>

  <!-- Trending candles -->
  <line x1="345" y1="118" x2="345" y2="155" stroke="#26a69a" stroke-width="1"/>
  <rect x="341" y="125" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="370" y1="108" x2="370" y2="145" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="115" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="395" y1="98" x2="395" y2="135" stroke="#26a69a" stroke-width="1"/>
  <rect x="391" y="105" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="420" y1="90" x2="420" y2="128" stroke="#26a69a" stroke-width="1"/>
  <rect x="416" y="95" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="445" y1="82" x2="445" y2="120" stroke="#ef5350" stroke-width="1"/>
  <rect x="441" y="86" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="470" y1="78" x2="470" y2="115" stroke="#26a69a" stroke-width="1"/>
  <rect x="466" y="82" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="495" y1="75" x2="495" y2="112" stroke="#26a69a" stroke-width="1"/>
  <rect x="491" y="80" width="8" height="24" fill="#26a69a" rx="1"/>

  <!-- CHOP rises - close all positions -->
  <line x1="540" y1="80" x2="540" y2="118" stroke="#ef5350" stroke-width="1"/>
  <rect x="534" y="85" width="12" height="25" fill="#ef5350" rx="1"/>
  <rect x="552" y="78" width="130" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="617" y="91" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">EXIT: CHOP &gt; 61.8</text>

  <!-- Separator -->
  <line x1="60" y1="260" x2="760" y2="260" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="275" fill="#888" font-size="9">Choppiness Index</text>

  <!-- CHOP oscillator -->
  <!-- 100 scale line -->
  <line x1="80" y1="285" x2="680" y2="285" stroke="#888" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/>
  <text x="685" y="289" fill="#666" font-size="8">100</text>

  <!-- 61.8 threshold -->
  <line x1="80" y1="320" x2="680" y2="320" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="685" y="324" fill="#ff9800" font-size="8">61.8</text>

  <!-- 38.2 threshold -->
  <line x1="80" y1="365" x2="680" y2="365" stroke="#42a5f5" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="685" y="369" fill="#42a5f5" font-size="8">38.2</text>

  <!-- 0 scale line -->
  <line x1="80" y1="395" x2="680" y2="395" stroke="#888" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/>
  <text x="685" y="399" fill="#666" font-size="8">0</text>

  <!-- CHOP line - high (choppy) then low (trending) then rises again -->
  <polyline points="100,300 125,305 150,298 175,302 200,295 225,308 250,302 275,310 300,325 320,340 345,358 370,370 395,375 420,372 445,368 470,365 495,362 520,345 540,320 565,310 590,305 620,298" fill="none" stroke="#ff9800" stroke-width="2" opacity="0.8"/>

  <!-- Choppy zone in oscillator -->
  <rect x="80" y="280" width="220" height="45" fill="#ef5350" fill-opacity="0.04" rx="3"/>
  <!-- Trending zone in oscillator -->
  <rect x="310" y="350" width="220" height="48" fill="#26a69a" fill-opacity="0.04" rx="3"/>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="405" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="121" y="407" width="8" height="8" fill="#26a69a" rx="1"/>
    <rect x="146" y="406" width="8" height="9" fill="#ef5350" rx="1"/>
    <rect x="171" y="407" width="8" height="8" fill="#26a69a" rx="1"/>
    <rect x="196" y="406" width="8" height="9" fill="#ef5350" rx="1"/>
    <rect x="221" y="407" width="8" height="8" fill="#26a69a" rx="1"/>
    <rect x="246" y="406" width="8" height="9" fill="#ef5350" rx="1"/>
    <rect x="271" y="407" width="8" height="8" fill="#26a69a" rx="1"/>
  </g>
  <rect x="314" y="398" width="12" height="17" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="341" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="366" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="391" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="416" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="441" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="466" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="491" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="534" y="400" width="12" height="15" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Fast EMA</text>
    <circle cx="105" cy="20" r="4" fill="#ef5350"/>
    <text x="115" y="24" fill="#999" font-size="9">Slow EMA</text>
    <circle cx="195" cy="20" r="4" fill="#ff9800"/>
    <text x="205" y="24" fill="#999" font-size="9">CHOP Index</text>
    <circle cx="310" cy="20" r="4" fill="#00e676"/>
    <text x="320" y="24" fill="#999" font-size="9">Entry Signal</text>
    <circle cx="415" cy="20" r="4" fill="#42a5f5"/>
    <text x="425" y="24" fill="#999" font-size="9">38.2 (Trending)</text>
    <circle cx="535" cy="20" r="4" fill="#ff9800"/>
    <text x="545" y="24" fill="#999" font-size="9">61.8 (Choppy)</text>
  </g>
</svg>