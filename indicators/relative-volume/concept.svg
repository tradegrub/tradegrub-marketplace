<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Relative Volume Indicator</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="80" x2="80" y2="400"/><line x1="200" y1="80" x2="200" y2="400"/>
    <line x1="320" y1="80" x2="320" y2="400"/><line x1="440" y1="80" x2="440" y2="400"/>
    <line x1="560" y1="80" x2="560" y2="400"/><line x1="680" y1="80" x2="680" y2="400"/>
  </g>

  <!-- Average line (RVOL = 1.0) -->
  <line x1="70" y1="280" x2="740" y2="280" stroke="#888888" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="748" y="284" fill="#888" font-family="Inter,sans-serif" font-size="8">1.0x</text>

  <!-- Spike threshold (RVOL = 2.0) -->
  <line x1="70" y1="180" x2="740" y2="180" stroke="rgba(255,23,68,0.5)" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="748" y="184" fill="#ff1744" font-family="Inter,sans-serif" font-size="8">2.0x</text>

  <!-- Low volume threshold (RVOL = 0.5) -->
  <line x1="70" y1="330" x2="740" y2="330" stroke="rgba(255,171,0,0.5)" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="748" y="334" fill="#ffab00" font-family="Inter,sans-serif" font-size="8">0.5x</text>

  <!-- RVOL bars -->
  <rect x="92" y="300" width="16" height="80" fill="#42A5F5" fill-opacity="0.4" rx="1"/>
  <rect x="122" y="290" width="16" height="90" fill="#42A5F5" fill-opacity="0.4" rx="1"/>
  <rect x="152" y="270" width="16" height="110" fill="#42A5F5" fill-opacity="0.4" rx="1"/>
  <rect x="182" y="285" width="16" height="95" fill="#42A5F5" fill-opacity="0.4" rx="1"/>
  <rect x="212" y="310" width="16" height="70" fill="#42A5F5" fill-opacity="0.3" rx="1"/>
  <rect x="242" y="340" width="16" height="40" fill="#ffab00" fill-opacity="0.4" rx="1"/>
  <rect x="272" y="345" width="16" height="35" fill="#ffab00" fill-opacity="0.4" rx="1"/>
  <rect x="302" y="295" width="16" height="85" fill="#42A5F5" fill-opacity="0.4" rx="1"/>

  <!-- Volume spike bar (bullish) -->
  <rect x="332" y="130" width="16" height="250" fill="#00e676" fill-opacity="0.5" rx="1"/>
  <polygon points="332,122 348,122 340,112" fill="#00e676"/>
  <rect x="355" y="118" width="70" height="16" rx="3" fill="rgba(0,230,118,0.15)"/>
  <text x="390" y="130" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="9">Bull Spike</text>

  <rect x="362" y="275" width="16" height="105" fill="#42A5F5" fill-opacity="0.4" rx="1"/>
  <rect x="392" y="290" width="16" height="90" fill="#42A5F5" fill-opacity="0.4" rx="1"/>
  <rect x="422" y="300" width="16" height="80" fill="#42A5F5" fill-opacity="0.4" rx="1"/>
  <rect x="452" y="340" width="16" height="40" fill="#ffab00" fill-opacity="0.4" rx="1"/>
  <rect x="482" y="350" width="16" height="30" fill="#ffab00" fill-opacity="0.3" rx="1"/>

  <!-- Low volume zone -->
  <rect x="232" y="330" width="66" height="55" fill="#ffab00" fill-opacity="0.05" rx="2"/>
  <text x="265" y="398" text-anchor="middle" fill="#ffab00" font-family="Inter,sans-serif" font-size="8">Low Vol</text>

  <rect x="512" y="285" width="16" height="95" fill="#42A5F5" fill-opacity="0.4" rx="1"/>
  <rect x="542" y="270" width="16" height="110" fill="#42A5F5" fill-opacity="0.4" rx="1"/>

  <!-- Volume spike bar (bearish) -->
  <rect x="572" y="110" width="16" height="270" fill="#ff1744" fill-opacity="0.5" rx="1"/>
  <polygon points="572,102 588,102 580,92" fill="#ff1744"/>
  <rect x="595" y="98" width="70" height="16" rx="3" fill="rgba(255,23,68,0.15)"/>
  <text x="630" y="110" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="9">Bear Spike</text>

  <rect x="602" y="265" width="16" height="115" fill="#42A5F5" fill-opacity="0.4" rx="1"/>
  <rect x="632" y="285" width="16" height="95" fill="#42A5F5" fill-opacity="0.4" rx="1"/>
  <rect x="662" y="295" width="16" height="85" fill="#42A5F5" fill-opacity="0.4" rx="1"/>
  <rect x="692" y="300" width="16" height="80" fill="#42A5F5" fill-opacity="0.4" rx="1"/>

  <!-- RVOL line connecting tops -->
  <polyline points="100,300 130,290 160,270 190,285 220,310 250,340 280,345 310,295 340,130 370,275 400,290 430,300 460,340 490,350 520,285 550,270 580,110 610,265 640,285 670,295 700,300" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Legend -->
  <g transform="translate(80, 440)">
    <rect width="640" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <rect x="15" y="12" width="14" height="16" fill="#42A5F5" fill-opacity="0.4" rx="2"/>
    <text x="34" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">RVOL</text>
    <line x1="100" y1="20" x2="120" y2="20" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="125" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Average (1x)</text>
    <rect x="220" y="12" width="14" height="16" fill="#00e676" fill-opacity="0.5" rx="2"/>
    <text x="239" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Bull Spike</text>
    <rect x="320" y="12" width="14" height="16" fill="#ff1744" fill-opacity="0.5" rx="2"/>
    <text x="339" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Bear Spike</text>
    <rect x="420" y="12" width="14" height="16" fill="#ffab00" fill-opacity="0.4" rx="2"/>
    <text x="439" y="24" fill="#999" font-family="Inter,sans-serif" font-size="9">Low Volume</text>
  </g>
</svg>
