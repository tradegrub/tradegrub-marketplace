  <rect x="348" y="130" width="12" height="260" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="361" y="112" width="12" height="278" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="374" y="100" width="12" height="290" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="387" y="94" width="12" height="296" fill="url(#barNormal)" opacity="0.9"/>
  <rect x="400" y="92" width="12" height="298" fill="url(#barNormal)" opacity="0.9"/>
  <rect x="413" y="98" width="12" height="292" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="426" y="108" width="12" height="282" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="439" y="126" width="12" height="264" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="452" y="146" width="12" height="244" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="465" y="168" width="12" height="222" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="478" y="190" width="12" height="200" fill="url(#barNormal)" opacity="0.85"/>
