<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Order Block Scanner</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="370" fill="rgba(255,255,255,0.02)" rx="4"/>

  <!-- Bullish order block zone -->
  <rect x="140" y="310" width="120" height="40" fill="rgba(0,230,118,0.08)" stroke="rgba(0,230,118,0.4)" stroke-width="1" rx="2"/>
  <text x="200" y="365" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="10">Bull OB</text>

  <!-- Candles - downtrend into OB then reversal -->
  <line x1="100" y1="200" x2="100" y2="270" stroke="#666" stroke-width="1"/><rect x="96" y="220" width="8" height="35" fill="#ff5252" rx="1"/>
  <line x1="140" y1="240" x2="140" y2="310" stroke="#666" stroke-width="1"/><rect x="136" y="260" width="8" height="35" fill="#ff5252" rx="1"/>
  <!-- OB candle (bearish before impulse) -->
  <line x1="180" y1="290" x2="180" y2="350" stroke="#666" stroke-width="1"/><rect x="176" y="310" width="8" height="30" fill="#ff5252" rx="1" stroke="#00e676" stroke-width="1.5"/>
  <!-- Impulse up -->
  <line x1="220" y1="340" x2="220" y2="240" stroke="#666" stroke-width="1"/><rect x="216" y="250" width="8" height="70" fill="#4CAF50" rx="1"/>
  <line x1="260" y1="270" x2="260" y2="200" stroke="#666" stroke-width="1"/><rect x="256" y="210" width="8" height="40" fill="#4CAF50" rx="1"/>
  <line x1="300" y1="230" x2="300" y2="170" stroke="#666" stroke-width="1"/><rect x="296" y="180" width="8" height="35" fill="#4CAF50" rx="1"/>

  <!-- Bearish order block zone -->
  <rect x="440" y="130" width="120" height="40" fill="rgba(255,23,68,0.08)" stroke="rgba(255,23,68,0.4)" stroke-width="1" rx="2"/>
  <text x="500" y="120" text-anchor="middle" fill="#ff1744" font-family="Inter,sans-serif" font-size="10">Bear OB</text>

  <!-- Candles - uptrend into OB then reversal -->
  <line x1="400" y1="250" x2="400" y2="180" stroke="#666" stroke-width="1"/><rect x="396" y="190" width="8" height="40" fill="#4CAF50" rx="1"/>
  <line x1="440" y1="210" x2="440" y2="140" stroke="#666" stroke-width="1"/><rect x="436" y="155" width="8" height="35" fill="#4CAF50" rx="1"/>
  <!-- OB candle (bullish before impulse) -->
  <line x1="480" y1="160" x2="480" y2="120" stroke="#666" stroke-width="1"/><rect x="476" y="130" width="8" height="25" fill="#4CAF50" rx="1" stroke="#ff1744" stroke-width="1.5"/>
  <!-- Impulse down -->
  <line x1="520" y1="125" x2="520" y2="230" stroke="#666" stroke-width="1"/><rect x="516" y="140" width="8" height="70" fill="#ff5252" rx="1"/>
  <line x1="560" y1="200" x2="560" y2="290" stroke="#666" stroke-width="1"/><rect x="556" y="220" width="8" height="50" fill="#ff5252" rx="1"/>
  <line x1="600" y1="260" x2="600" y2="340" stroke="#666" stroke-width="1"/><rect x="596" y="280" width="8" height="45" fill="#ff5252" rx="1"/>
  <line x1="640" y1="310" x2="640" y2="370" stroke="#666" stroke-width="1"/><rect x="636" y="325" width="8" height="30" fill="#ff5252" rx="1"/>

  <!-- Arrows -->
  <path d="M220,235 L270,185" stroke="#00e676" stroke-width="1.5" fill="none" marker-end="url(#arrowG)"/>
  <path d="M520,235 L570,285" stroke="#ff1744" stroke-width="1.5" fill="none" marker-end="url(#arrowR)"/>

  <!-- Legend -->
  <rect x="200" y="455" width="400" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <rect x="220" y="466" width="16" height="10" fill="rgba(0,230,118,0.15)" stroke="rgba(0,230,118,0.5)" stroke-width="1" rx="1"/>
  <text x="242" y="475" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bull OB</text>
  <rect x="310" y="466" width="16" height="10" fill="rgba(255,23,68,0.15)" stroke="rgba(255,23,68,0.5)" stroke-width="1" rx="1"/>
  <text x="332" y="475" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bear OB</text>
  <rect x="410" y="468" width="8" height="6" fill="#4CAF50" stroke="#00e676" stroke-width="1" rx="1"/>
  <text x="424" y="475" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Impulse Candle</text>
</svg>
