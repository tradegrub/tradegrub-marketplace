<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Regression Deviation Reversion</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- PRICE PANEL (top 55%) -->
  <!-- Linear regression line (upward sloping) -->
  <line x1="80" y1="220" x2="720" y2="150" stroke="#42a5f5" stroke-width="2" opacity="0.8"/>
  <text x="725" y="148" fill="#42a5f5" font-size="9" font-weight="500">LinReg</text>

  <!-- Price candles oscillating around regression -->
  <line x1="100" y1="200" x2="100" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="210" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="130" y1="195" x2="130" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="200" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="160" y1="185" x2="160" y2="225" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="198" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="190" y1="170" x2="190" y2="215" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="180" width="8" height="22" fill="#26a69a" rx="1"/>
  <!-- Price drifts above regression (overbought) -->
  <line x1="220" y1="155" x2="220" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="163" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="250" y1="140" x2="250" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="148" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="280" y1="128" x2="280" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="135" width="8" height="25" fill="#26a69a" rx="1"/>
  <!-- Peak deviation - SELL signal -->
  <line x1="310" y1="118" x2="310" y2="168" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="125" width="8" height="25" fill="#ef5350" rx="1"/>

  <!-- SELL annotation -->
  <rect x="325" y="110" width="55" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="352" y="124" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SELL</text>

  <!-- Price reverts back down -->
  <line x1="340" y1="135" x2="340" y2="180" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="140" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="370" y1="148" x2="370" y2="190" stroke="#ef5350" stroke-width="1"/>
  <rect x="366" y="155" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="400" y1="158" x2="400" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="170" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="430" y1="165" x2="430" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="172" width="8" height="18" fill="#26a69a" rx="1"/>
  <!-- Price drifts below regression (oversold) -->
  <line x1="460" y1="180" x2="460" y2="225" stroke="#ef5350" stroke-width="1"/>
  <rect x="456" y="190" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="490" y1="190" x2="490" y2="240" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="200" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="520" y1="200" x2="520" y2="252" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="210" width="8" height="30" fill="#ef5350" rx="1"/>
  <!-- Trough - BUY signal -->
  <line x1="550" y1="208" x2="550" y2="260" stroke="#00e676" stroke-width="1.5"/>
  <rect x="544" y="215" width="12" height="32" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- BUY annotation -->
  <g filter="url(#softGlow)">
    <polygon points="555,205 565,205 560,192" fill="#00e676"/>
  </g>
  <rect x="568" y="190" width="50" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="593" y="204" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- Recovery candles -->
  <line x1="580" y1="195" x2="580" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="202" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="610" y1="185" x2="610" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="190" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="640" y1="175" x2="640" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="636" y="180" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- Separator line -->
  <line x1="60" y1="280" x2="760" y2="280" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- DEVIATION % PANEL (bottom) -->
  <text x="70" y="298" fill="#888" font-size="9">Dev %</text>

  <!-- Zero line -->
  <line x1="80" y1="350" x2="720" y2="350" stroke="#888" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="725" y="354" fill="#666" font-size="8">0%</text>

  <!-- +2% threshold -->
  <line x1="80" y1="310" x2="720" y2="310" stroke="#ef5350" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="725" y="314" fill="#ef5350" font-size="8">+2%</text>

  <!-- -2% threshold -->
  <line x1="80" y1="390" x2="720" y2="390" stroke="#00e676" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="725" y="394" fill="#00e676" font-size="8">-2%</text>

  <!-- Deviation curve -->
  <path d="M 100,348 Q 150,342 190,335 Q 230,320 280,305 Q 310,298 310,298 Q 340,310 370,330 Q 400,345 430,350 Q 460,360 490,375 Q 520,388 550,398 Q 570,390 590,370 Q 610,355 640,348" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.8"/>

  <!-- Sell zone highlight -->
  <rect x="275" y="295" width="50" height="18" rx="3" fill="#ef5350" fill-opacity="0.15"/>

  <!-- Buy zone highlight -->
  <rect x="525" y="388" width="50" height="18" rx="3" fill="#00e676" fill-opacity="0.15"/>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">Linear Regression</text>
    <circle cx="155" cy="20" r="4" fill="#00e676"/>
    <text x="165" y="24" fill="#999" font-size="9">Buy (dev &lt; -2%)</text>
    <circle cx="280" cy="20" r="4" fill="#ef5350"/>
    <text x="290" y="24" fill="#999" font-size="9">Sell (dev &gt; +2%)</text>
    <circle cx="415" cy="20" r="4" fill="#888"/>
    <text x="425" y="24" fill="#999" font-size="9">Zero Line</text>
    <rect x="510" y="12" width="20" height="16" fill="#42a5f5" opacity="0.3" rx="2"/>
    <text x="535" y="24" fill="#999" font-size="9">Deviation %</text>
  </g>
</svg>