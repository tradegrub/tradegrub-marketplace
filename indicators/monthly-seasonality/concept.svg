<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Monthly Seasonality Index</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>
  <line x1="80" y1="70" x2="80" y2="390" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="390" x2="740" y2="390" stroke="#333" stroke-width="1"/>
  <!-- Zero line -->
  <line x1="80" y1="230" x2="740" y2="230" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Monthly bars -->
  <rect x="95" y="170" width="40" height="60" fill="rgba(76,175,80,0.4)" rx="2"/>
  <rect x="150" y="190" width="40" height="40" fill="rgba(76,175,80,0.3)" rx="2"/>
  <rect x="205" y="230" width="40" height="40" fill="rgba(239,83,80,0.3)" rx="2"/>
  <rect x="260" y="200" width="40" height="30" fill="rgba(76,175,80,0.25)" rx="2"/>
  <rect x="315" y="230" width="40" height="50" fill="rgba(239,83,80,0.35)" rx="2"/>
  <rect x="370" y="230" width="40" height="30" fill="rgba(239,83,80,0.25)" rx="2"/>
  <rect x="425" y="210" width="40" height="20" fill="rgba(76,175,80,0.2)" rx="2"/>
  <rect x="480" y="230" width="40" height="60" fill="rgba(239,83,80,0.4)" rx="2"/>
  <rect x="535" y="230" width="40" height="20" fill="rgba(239,83,80,0.2)" rx="2"/>
  <rect x="590" y="160" width="40" height="70" fill="rgba(76,175,80,0.45)" rx="2"/>
  <rect x="645" y="180" width="40" height="50" fill="rgba(76,175,80,0.35)" rx="2"/>
  <rect x="700" y="195" width="40" height="35" fill="rgba(76,175,80,0.3)" rx="2"/>
  <!-- Month labels -->
  <text x="115" y="405" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="9">Jan</text>
  <text x="170" y="405" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="9">Feb</text>
  <text x="225" y="405" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="9">Mar</text>
  <text x="280" y="405" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="9">Apr</text>
  <text x="335" y="405" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="9">May</text>
  <text x="390" y="405" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="9">Jun</text>
  <text x="445" y="405" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="9">Jul</text>
  <text x="500" y="405" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="9">Aug</text>
  <text x="555" y="405" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="9">Sep</text>
  <text x="610" y="405" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="9">Oct</text>
  <text x="665" y="405" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="9">Nov</text>
  <text x="720" y="405" text-anchor="middle" fill="#888" font-family="Inter,sans-serif" font-size="9">Dec</text>
  <!-- Consistency dots -->
  <circle cx="115" cy="340" r="4" fill="#FFA726"/>
  <circle cx="170" cy="350" r="3" fill="#FFA726"/>
  <circle cx="225" cy="355" r="3" fill="#FFA726"/>
  <circle cx="280" cy="360" r="2" fill="#FFA726"/>
  <circle cx="335" cy="345" r="3" fill="#FFA726"/>
  <circle cx="390" cy="358" r="2" fill="#FFA726"/>
  <circle cx="445" cy="362" r="2" fill="#FFA726"/>
  <circle cx="500" cy="338" r="4" fill="#FFA726"/>
  <circle cx="555" cy="355" r="3" fill="#FFA726"/>
  <circle cx="610" cy="335" r="4" fill="#FFA726"/>
  <circle cx="665" cy="342" r="4" fill="#FFA726"/>
  <circle cx="720" cy="348" r="3" fill="#FFA726"/>
  <!-- Seasonal index line -->
  <polyline points="115,170 170,190 225,250 280,210 335,260 390,245 445,215 500,265 555,240 610,160 665,180 720,200" fill="none" stroke="#42A5F5" stroke-width="2"/>
  <!-- Legend -->
  <rect x="170" y="450" width="460" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
  <rect x="200" y="460" width="12" height="10" fill="rgba(76,175,80,0.4)" rx="1"/>
  <text x="218" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bullish</text>
  <rect x="280" y="460" width="12" height="10" fill="rgba(239,83,80,0.4)" rx="1"/>
  <text x="298" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Bearish</text>
  <line x1="370" y1="465" x2="390" y2="465" stroke="#42A5F5" stroke-width="2"/>
  <text x="396" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Index</text>
  <circle cx="460" cy="465" r="3" fill="#FFA726"/>
  <text x="470" y="469" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Consistency</text>
</svg>