<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="wfeLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#00ffc8"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f0a500"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" fill="#e0e0e0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">Walk-Forward Efficiency Analysis</text>

  <!-- === TOP SECTION: Walk-Forward Windows === -->
  <text x="50" y="62" fill="#8a8aa0" font-family="Arial, sans-serif" font-size="11">WALK-FORWARD WINDOWS</text>

  <!-- Time axis -->
  <line x1="50" y1="210" x2="750" y2="210" stroke="#3a3a5c" stroke-width="1"/>
  <text x="400" y="228" fill="#6a6a8a" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Time</text>

  <!-- Window 1: In-Sample -->
  <rect x="60" y="75" width="120" height="120" rx="4" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1.5" opacity="0.9"/>
  <text x="120" y="92" fill="#4a90d9" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">IN-SAMPLE 1</text>
  <!-- Fitted line inside -->
  <line x1="72" y1="175" x2="168" y2="105" stroke="#4a90d9" stroke-width="2" stroke-dasharray="4,2"/>
  <!-- Scatter dots -->
  <circle cx="80" cy="168" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="95" cy="155" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="108" cy="148" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="122" cy="132" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="138" cy="128" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="155" cy="112" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <text x="120" y="200" fill="#4a90d9" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">R² = 0.92</text>

  <!-- Arrow 1 -->
  <line x1="183" y1="135" x2="198" y2="135" stroke="#f0a500" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Window 1: Out-of-Sample -->
  <rect x="200" y="75" width="80" height="120" rx="4" fill="#1e4a3a" stroke="#50c878" stroke-width="1.5" opacity="0.9"/>
  <text x="240" y="92" fill="#50c878" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">OOS 1</text>
  <!-- Predicted line (extension from in-sample) -->
  <line x1="210" y1="130" x2="270" y2="100" stroke="#50c878" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Actual dots following prediction well -->
  <circle cx="215" cy="128" r="2.5" fill="#7ddf9e" opacity="0.7"/>
  <circle cx="232" cy="118" r="2.5" fill="#7ddf9e" opacity="0.7"/>
  <circle cx="248" cy="108" r="2.5" fill="#7ddf9e" opacity="0.7"/>
  <circle cx="265" cy="103" r="2.5" fill="#7ddf9e" opacity="0.7"/>
  <text x="240" y="200" fill="#50c878" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">R² = 0.85</text>

  <!-- Window 2: In-Sample -->
  <rect x="295" y="75" width="120" height="120" rx="4" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1.5" opacity="0.9"/>
  <text x="355" y="92" fill="#4a90d9" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">IN-SAMPLE 2</text>
  <line x1="307" y1="170" x2="403" y2="110" stroke="#4a90d9" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="315" cy="165" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="330" cy="158" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="348" cy="140" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="365" cy="130" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="380" cy="122" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="395" cy="115" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <text x="355" y="200" fill="#4a90d9" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">R² = 0.88</text>

  <!-- Arrow 2 -->
  <line x1="418" y1="135" x2="433" y2="135" stroke="#f0a500" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Window 2: Out-of-Sample -->
  <rect x="435" y="75" width="80" height="120" rx="4" fill="#1e4a3a" stroke="#50c878" stroke-width="1.5" opacity="0.9"/>
  <text x="475" y="92" fill="#50c878" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">OOS 2</text>
  <line x1="445" y1="140" x2="505" y2="115" stroke="#50c878" stroke-width="1.5" stroke-dasharray="6,3"/>
  <circle cx="450" cy="135" r="2.5" fill="#7ddf9e" opacity="0.7"/>
  <circle cx="468" cy="132" r="2.5" fill="#7ddf9e" opacity="0.7"/>
  <circle cx="485" cy="120" r="2.5" fill="#7ddf9e" opacity="0.7"/>
  <circle cx="500" cy="118" r="2.5" fill="#7ddf9e" opacity="0.7"/>
  <text x="475" y="200" fill="#50c878" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">R² = 0.41</text>

  <!-- Window 3: In-Sample -->
  <rect x="530" y="75" width="120" height="120" rx="4" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1.5" opacity="0.9"/>
  <text x="590" y="92" fill="#4a90d9" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">IN-SAMPLE 3</text>
  <line x1="542" y1="115" x2="638" y2="165" stroke="#4a90d9" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="550" cy="118" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="568" cy="130" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="585" cy="138" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="602" cy="150" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="618" cy="155" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <circle cx="632" cy="162" r="2.5" fill="#6ab0ff" opacity="0.7"/>
  <text x="590" y="200" fill="#4a90d9" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">R² = 0.90</text>

  <!-- Arrow 3 -->
  <line x1="653" y1="135" x2="668" y2="135" stroke="#f0a500" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Window 3: Out-of-Sample -->
  <rect x="670" y="75" width="80" height="120" rx="4" fill="#1e4a3a" stroke="#50c878" stroke-width="1.5" opacity="0.9"/>
  <text x="710" y="92" fill="#50c878" font-family="Arial, sans-serif" font-size="9" font-weight="bold" text-anchor="middle">OOS 3</text>
  <line x1="680" y1="140" x2="740" y2="170" stroke="#50c878" stroke-width="1.5" stroke-dasharray="6,3"/>
  <circle cx="688" cy="142" r="2.5" fill="#7ddf9e" opacity="0.7"/>
  <circle cx="702" cy="150" r="2.5" fill="#7ddf9e" opacity="0.7"/>
  <circle cx="718" cy="158" r="2.5" fill="#7ddf9e" opacity="0.7"/>
  <circle cx="735" cy="168" r="2.5" fill="#7ddf9e" opacity="0.7"/>
  <text x="710" y="200" fill="#50c878" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">R² = 0.82</text>

  <!-- Legend -->
  <rect x="55" y="235" width="12" height="8" rx="2" fill="#1e3a5f" stroke="#4a90d9" stroke-width="1"/>
  <text x="72" y="243" fill="#8a8aa0" font-family="Arial, sans-serif" font-size="9">In-Sample (fit)</text>
  <rect x="160" y="235" width="12" height="8" rx="2" fill="#1e4a3a" stroke="#50c878" stroke-width="1"/>
  <text x="177" y="243" fill="#8a8aa0" font-family="Arial, sans-serif" font-size="9">Out-of-Sample (test)</text>
  <line x1="290" y1="239" x2="305" y2="239" stroke="#f0a500" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="312" y="243" fill="#8a8aa0" font-family="Arial, sans-serif" font-size="9">Prediction</text>

  <!-- === BOTTOM SECTION: WFE Score Line === -->
  <text x="50" y="275" fill="#8a8aa0" font-family="Arial, sans-serif" font-size="11">WALK-FORWARD EFFICIENCY SCORE</text>

  <!-- Chart area -->
  <rect x="70" y="285" width="690" height="170" rx="4" fill="#12122a" stroke="#2a2a4c" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="60" y="295" fill="#6a6a8a" font-family="Arial, sans-serif" font-size="9" text-anchor="end">100</text>
  <text x="60" y="337" fill="#6a6a8a" font-family="Arial, sans-serif" font-size="9" text-anchor="end">75</text>
  <text x="60" y="380" fill="#6a6a8a" font-family="Arial, sans-serif" font-size="9" text-anchor="end">50</text>
  <text x="60" y="422" fill="#6a6a8a" font-family="Arial, sans-serif" font-size="9" text-anchor="end">25</text>
  <text x="60" y="455" fill="#6a6a8a" font-family="Arial, sans-serif" font-size="9" text-anchor="end">0</text>

  <!-- Reference lines -->
  <line x1="70" y1="333" x2="760" y2="333" stroke="#50c878" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="765" y="337" fill="#50c878" font-family="Arial, sans-serif" font-size="8" opacity="0.7">Strong (75)</text>
  <line x1="70" y1="375" x2="760" y2="375" stroke="#f0c040" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.5"/>
  <text x="765" y="379" fill="#f0c040" font-family="Arial, sans-serif" font-size="8" opacity="0.7">Moderate (50)</text>

  <!-- Green shading zone above 75 -->
  <rect x="200" y="285" width="180" height="48" fill="#50c878" opacity="0.06"/>
  <rect x="530" y="285" width="150" height="48" fill="#50c878" opacity="0.06"/>

  <!-- Red shading zone below 25 -->
  <rect x="420" y="418" width="100" height="37" fill="#e05050" opacity="0.08"/>

  <!-- WFE line chart -->
  <polyline
    points="85,370 110,360 135,345 160,330 185,320 210,310 235,305 260,315 285,310 310,325 335,340 360,355 385,365 410,390 435,420 460,430 485,415 510,380 535,345 560,320 585,310 610,305 635,315 660,310 685,320 710,330 735,325 745,320"
    fill="none" stroke="url(#wfeLine)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Highlight dots at key points -->
  <circle cx="235" cy="305" r="3.5" fill="#00ffc8" opacity="0.9"/>
  <text x="235" y="298" fill="#00ffc8" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">92</text>

  <circle cx="460" cy="430" r="3.5" fill="#e05050" opacity="0.9"/>
  <text x="460" y="445" fill="#e05050" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">18</text>

  <circle cx="610" cy="305" r="3.5" fill="#00ffc8" opacity="0.9"/>
  <text x="610" y="298" fill="#00ffc8" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">91</text>

  <!-- Formula annotation -->
  <rect x="420" y="285" width="200" height="22" rx="3" fill="#1a1a2e" stroke="#3a3a5c" stroke-width="0.5" opacity="0.9"/>
  <text x="520" y="300" fill="#c0c0d0" font-family="monospace" font-size="9" text-anchor="middle">WFE = (OOS R² / IS R²) x 100</text>

  <!-- Branding -->
  <text x="750" y="490" fill="#4a4a6a" font-family="Arial, sans-serif" font-size="10" text-anchor="end" font-weight="bold">tradegrub.finance</text>
</svg>
