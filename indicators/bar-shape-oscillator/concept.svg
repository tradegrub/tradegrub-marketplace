  <text x="608" y="235" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7" opacity="0.7">Hang Man</text>
  <text x="663" y="235" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="7" opacity="0.7">Gravestone</text>
