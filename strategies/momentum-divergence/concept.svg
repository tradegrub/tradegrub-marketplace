<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="255"/><line x1="200" y1="60" x2="200" y2="255"/>
    <line x1="320" y1="60" x2="320" y2="255"/><line x1="440" y1="60" x2="440" y2="255"/>
    <line x1="560" y1="60" x2="560" y2="255"/><line x1="680" y1="60" x2="680" y2="255"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Momentum Divergence Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- PRICE PANEL (top 55%) -->
  <text x="65" y="72" fill="#888" font-size="9">Price</text>

  <!-- Downtrend leading to first low -->
  <line x1="95" y1="95" x2="95" y2="135" stroke="#ef5350" stroke-width="1"/>
  <rect x="91" y="100" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="120" y1="110" x2="120" y2="155" stroke="#ef5350" stroke-width="1"/>
  <rect x="116" y="118" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="150" y1="130" x2="150" y2="175" stroke="#ef5350" stroke-width="1"/>
  <rect x="146" y="138" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="180" y1="155" x2="180" y2="200" stroke="#ef5350" stroke-width="1"/>
  <rect x="176" y="165" width="8" height="25" fill="#ef5350" rx="1"/>

  <!-- First price low -->
  <line x1="210" y1="180" x2="210" y2="230" stroke="#ef5350" stroke-width="1"/>
  <rect x="206" y="192" width="8" height="28" fill="#ef5350" rx="1"/>
  <text x="210" y="245" text-anchor="middle" fill="#888" font-size="8">Low 1</text>

  <!-- Bounce -->
  <line x1="240" y1="165" x2="240" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="236" y="175" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="270" y1="145" x2="270" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="266" y="155" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="300" y1="130" x2="300" y2="170" stroke="#26a69a" stroke-width="1"/>
  <rect x="296" y="140" width="8" height="20" fill="#26a69a" rx="1"/>

  <!-- Drop to second, lower low -->
  <line x1="330" y1="148" x2="330" y2="190" stroke="#ef5350" stroke-width="1"/>
  <rect x="326" y="158" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="360" y1="170" x2="360" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="356" y="180" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="390" y1="195" x2="390" y2="245" stroke="#ef5350" stroke-width="1"/>
  <rect x="386" y="208" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- Second price low (lower than first) -->
  <line x1="420" y1="205" x2="420" y2="252" stroke="#ef5350" stroke-width="1"/>
  <rect x="416" y="218" width="8" height="25" fill="#ef5350" rx="1"/>
  <text x="420" y="262" text-anchor="middle" fill="#888" font-size="8">Low 2 (lower)</text>

  <!-- Price declining trendline -->
  <line x1="210" y1="225" x2="420" y2="248" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- BUY signal -->
  <line x1="455" y1="195" x2="455" y2="240" stroke="#00e676" stroke-width="1.5"/>
  <rect x="449" y="200" width="12" height="28" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="453,192 463,192 458,179" fill="#00e676"/>
  </g>
  <rect x="468" y="175" width="95" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="515" y="189" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BULLISH DIV</text>

  <!-- Recovery -->
  <line x1="490" y1="178" x2="490" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="486" y="185" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="520" y1="160" x2="520" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="516" y="168" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="550" y1="145" x2="550" y2="182" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="152" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="580" y1="128" x2="580" y2="165" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="135" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="610" y1="112" x2="610" y2="150" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="120" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="640" y1="98" x2="640" y2="135" stroke="#26a69a" stroke-width="1"/>
  <rect x="636" y="105" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="670" y1="85" x2="670" y2="122" stroke="#26a69a" stroke-width="1"/>
  <rect x="666" y="92" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="700" y1="78" x2="700" y2="115" stroke="#ef5350" stroke-width="1"/>
  <rect x="696" y="85" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="730" y1="72" x2="730" y2="108" stroke="#26a69a" stroke-width="1"/>
  <rect x="726" y="78" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- RSI PANEL separator -->
  <line x1="60" y1="270" x2="760" y2="270" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="285" fill="#888" font-size="9">RSI (14)</text>

  <!-- Overbought / Oversold lines -->
  <line x1="80" y1="300" x2="740" y2="300" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="745" y="303" fill="#ef5350" font-size="8" opacity="0.6">70</text>
  <line x1="80" y1="385" x2="740" y2="385" stroke="#00e676" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="745" y="388" fill="#00e676" font-size="8" opacity="0.6">30</text>

  <!-- 50 line -->
  <line x1="80" y1="342" x2="740" y2="342" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="745" y="345" fill="#666" font-size="8">50</text>

  <!-- RSI line -->
  <path d="M95,330 Q120,338 150,350 Q180,365 210,380 Q240,370 270,352 Q300,338 330,348 Q360,362 390,375 Q420,372 450,358 Q480,340 510,325 Q540,312 570,305 Q600,300 630,298 Q660,302 690,308 Q710,312 730,315" fill="none" stroke="#ab47bc" stroke-width="2" opacity="0.9"/>

  <!-- RSI first low -->
  <circle cx="210" cy="380" r="4" fill="#ab47bc" opacity="0.8"/>
  <text x="210" y="400" text-anchor="middle" fill="#ab47bc" font-size="8">RSI Low 1</text>

  <!-- RSI second low (higher than first!) -->
  <circle cx="420" cy="372" r="4" fill="#ab47bc" opacity="0.8"/>
  <text x="420" y="400" text-anchor="middle" fill="#ab47bc" font-size="8">RSI Low 2 (higher)</text>

  <!-- RSI rising trendline (divergence!) -->
  <line x1="210" y1="380" x2="420" y2="372" stroke="#00e676" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>

  <!-- Divergence annotation -->
  <rect x="270" y="405" width="115" height="20" rx="4" fill="#00e676" fill-opacity="0.1" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="327" y="419" text-anchor="middle" fill="#00e676" font-size="9" font-weight="500">BULLISH DIVERGENCE</text>

  <!-- Divergence connector lines -->
  <line x1="210" y1="248" x2="210" y2="376" stroke="#888" stroke-width="0.8" stroke-dasharray="2,3" opacity="0.3"/>
  <line x1="420" y1="248" x2="420" y2="368" stroke="#888" stroke-width="0.8" stroke-dasharray="2,3" opacity="0.3"/>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ab47bc"/>
    <text x="30" y="24" fill="#999" font-size="9">RSI (14)</text>
    <circle cx="100" cy="20" r="4" fill="#ef5350"/>
    <text x="110" y="24" fill="#999" font-size="9">Price Declining</text>
    <circle cx="220" cy="20" r="4" fill="#00e676"/>
    <text x="230" y="24" fill="#999" font-size="9">RSI Rising (Divergence)</text>
    <circle cx="400" cy="20" r="4" fill="#00e676"/>
    <text x="410" y="24" fill="#999" font-size="9">Bullish Entry</text>
    <circle cx="510" cy="20" r="4" fill="#ef5350"/>
    <text x="520" y="24" fill="#999" font-size="9">OB/OS Zones</text>
  </g>
</svg>