<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Hilbert Transform Trendline</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart area -->
  <rect x="60" y="70" width="700" height="160" fill="rgba(255,255,255,0.02)" rx="4"/>
  <line x1="60" y1="150" x2="760" y2="150" stroke="#333" stroke-width="0.5"/>

  <!-- Candlesticks -->
  <g stroke-width="1.5">
    <line x1="100" y1="110" x2="100" y2="170" stroke="#4CAF50"/><rect x="96" y="120" width="8" height="35" fill="#4CAF50" rx="1"/>
    <line x1="140" y1="100" x2="140" y2="165" stroke="#4CAF50"/><rect x="136" y="108" width="8" height="40" fill="#4CAF50" rx="1"/>
    <line x1="180" y1="95" x2="180" y2="155" stroke="#4CAF50"/><rect x="176" y="100" width="8" height="38" fill="#4CAF50" rx="1"/>
    <line x1="220" y1="105" x2="220" y2="160" stroke="#EF5350"/><rect x="216" y="110" width="8" height="35" fill="#EF5350" rx="1"/>
    <line x1="260" y1="115" x2="260" y2="175" stroke="#EF5350"/><rect x="256" y="120" width="8" height="40" fill="#EF5350" rx="1"/>
    <line x1="300" y1="120" x2="300" y2="185" stroke="#EF5350"/><rect x="296" y="130" width="8" height="38" fill="#EF5350" rx="1"/>
    <line x1="340" y1="140" x2="340" y2="195" stroke="#EF5350"/><rect x="336" y="148" width="8" height="32" fill="#EF5350" rx="1"/>
    <line x1="380" y1="150" x2="380" y2="200" stroke="#4CAF50"/><rect x="376" y="158" width="8" height="30" fill="#4CAF50" rx="1"/>
    <line x1="420" y1="140" x2="420" y2="190" stroke="#4CAF50"/><rect x="416" y="145" width="8" height="32" fill="#4CAF50" rx="1"/>
    <line x1="460" y1="125" x2="460" y2="180" stroke="#4CAF50"/><rect x="456" y="130" width="8" height="35" fill="#4CAF50" rx="1"/>
    <line x1="500" y1="110" x2="500" y2="170" stroke="#4CAF50"/><rect x="496" y="115" width="8" height="38" fill="#4CAF50" rx="1"/>
    <line x1="540" y1="105" x2="540" y2="160" stroke="#EF5350"/><rect x="536" y="112" width="8" height="35" fill="#EF5350" rx="1"/>
    <line x1="580" y1="115" x2="580" y2="170" stroke="#EF5350"/><rect x="576" y="122" width="8" height="32" fill="#EF5350" rx="1"/>
    <line x1="620" y1="130" x2="620" y2="180" stroke="#4CAF50"/><rect x="616" y="135" width="8" height="30" fill="#4CAF50" rx="1"/>
    <line x1="660" y1="118" x2="660" y2="168" stroke="#4CAF50"/><rect x="656" y="122" width="8" height="32" fill="#4CAF50" rx="1"/>
    <line x1="700" y1="108" x2="700" y2="158" stroke="#4CAF50"/><rect x="696" y="112" width="8" height="30" fill="#4CAF50" rx="1"/>
  </g>

  <!-- Separator -->
  <line x1="60" y1="245" x2="760" y2="245" stroke="#444" stroke-width="1"/>

  <!-- Hilbert subplot -->
  <rect x="60" y="255" width="700" height="180" fill="rgba(255,255,255,0.02)" rx="4"/>

  <!-- Dominant period line (blue) -->
  <polyline points="100,340 140,355 180,370 220,380 260,390 300,395 340,380 380,360 420,340 460,320 500,310 540,320 580,340 620,355 660,345 700,330" fill="none" stroke="#42A5F5" stroke-width="2"/>

  <!-- Phase line (purple) -->
  <polyline points="100,300 140,320 180,350 220,380 260,410 300,300 340,320 380,350 420,380 460,410 500,300 540,320 580,350 620,380 660,300 700,320" fill="none" stroke="#AB47BC" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Reference lines -->
  <line x1="60" y1="330" x2="760" y2="330" stroke="#4CAF50" stroke-width="0.7" stroke-dasharray="6,4"/>
  <text x="765" y="334" fill="#4CAF50" font-family="Inter,sans-serif" font-size="9">20</text>
  <line x1="60" y1="370" x2="760" y2="370" stroke="#FFA726" stroke-width="0.7" stroke-dasharray="6,4"/>
  <text x="765" y="374" fill="#FFA726" font-family="Inter,sans-serif" font-size="9">50</text>

  <!-- Labels -->
  <text x="75" y="268" fill="#666" font-family="Inter,sans-serif" font-size="10">Hilbert Transform</text>

  <!-- Legend -->
  <rect x="150" y="460" width="500" height="25" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="180" y1="472" x2="210" y2="472" stroke="#42A5F5" stroke-width="2"/>
  <text x="215" y="476" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Dominant Period</text>
  <line x1="360" y1="472" x2="390" y2="472" stroke="#AB47BC" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="395" y="476" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Phase (0-100)</text>
  <circle cx="530" cy="472" r="3" fill="#4CAF50"/>
  <text x="538" y="476" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Cycle Refs</text>
</svg>