<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/>
    <line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Savitzky-Golay Peak Reversal</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Raw price candles (noisy) -->
  <line x1="90" y1="280" x2="90" y2="310" stroke="#26a69a" stroke-width="1"/>
  <rect x="87" y="288" width="6" height="14" fill="#26a69a" rx="1"/>
  <line x1="110" y1="268" x2="110" y2="302" stroke="#26a69a" stroke-width="1"/>
  <rect x="107" y="275" width="6" height="16" fill="#26a69a" rx="1"/>
  <line x1="130" y1="255" x2="130" y2="290" stroke="#ef5350" stroke-width="1"/>
  <rect x="127" y="260" width="6" height="18" fill="#ef5350" rx="1"/>
  <line x1="150" y1="240" x2="150" y2="278" stroke="#26a69a" stroke-width="1"/>
  <rect x="147" y="248" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="170" y1="225" x2="170" y2="262" stroke="#26a69a" stroke-width="1"/>
  <rect x="167" y="232" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="190" y1="210" x2="190" y2="248" stroke="#ef5350" stroke-width="1"/>
  <rect x="187" y="215" width="6" height="20" fill="#ef5350" rx="1"/>
  <line x1="210" y1="195" x2="210" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="207" y="202" width="6" height="20" fill="#26a69a" rx="1"/>
  <line x1="230" y1="178" x2="230" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="227" y="185" width="6" height="20" fill="#26a69a" rx="1"/>
  <line x1="250" y1="162" x2="250" y2="202" stroke="#26a69a" stroke-width="1"/>
  <rect x="247" y="168" width="6" height="20" fill="#26a69a" rx="1"/>
  <line x1="270" y1="148" x2="270" y2="188" stroke="#26a69a" stroke-width="1"/>
  <rect x="267" y="155" width="6" height="20" fill="#26a69a" rx="1"/>
  <line x1="290" y1="135" x2="290" y2="175" stroke="#ef5350" stroke-width="1"/>
  <rect x="287" y="140" width="6" height="20" fill="#ef5350" rx="1"/>
  <line x1="310" y1="125" x2="310" y2="165" stroke="#26a69a" stroke-width="1"/>
  <rect x="307" y="130" width="6" height="20" fill="#26a69a" rx="1"/>
  <!-- PEAK area -->
  <line x1="330" y1="110" x2="330" y2="150" stroke="#26a69a" stroke-width="1"/>
  <rect x="327" y="115" width="6" height="22" fill="#26a69a" rx="1"/>
  <line x1="350" y1="105" x2="350" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="347" y="110" width="6" height="22" fill="#26a69a" rx="1"/>
  <line x1="370" y1="108" x2="370" y2="150" stroke="#ef5350" stroke-width="1"/>
  <rect x="367" y="112" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="390" y1="115" x2="390" y2="155" stroke="#ef5350" stroke-width="1"/>
  <rect x="387" y="120" width="6" height="22" fill="#ef5350" rx="1"/>

  <!-- SELL signal at confirmed peak -->
  <line x1="410" y1="125" x2="410" y2="165" stroke="#ef5350" stroke-width="1"/>
  <rect x="406" y="130" width="8" height="22" fill="#ef5350" rx="1"/>
  <g filter="url(#softGlow)">
    <polygon points="406,168 414,168 410,180" fill="#ef5350"/>
  </g>
  <rect x="420" y="130" width="55" height="20" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="447" y="144" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SELL</text>

  <!-- Decline after peak -->
  <line x1="430" y1="140" x2="430" y2="178" stroke="#ef5350" stroke-width="1"/>
  <rect x="427" y="145" width="6" height="20" fill="#ef5350" rx="1"/>
  <line x1="450" y1="155" x2="450" y2="195" stroke="#ef5350" stroke-width="1"/>
  <rect x="447" y="160" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="470" y1="170" x2="470" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="467" y="175" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="490" y1="190" x2="490" y2="230" stroke="#26a69a" stroke-width="1"/>
  <rect x="487" y="205" width="6" height="15" fill="#26a69a" rx="1"/>
  <line x1="510" y1="210" x2="510" y2="252" stroke="#ef5350" stroke-width="1"/>
  <rect x="507" y="218" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="530" y1="230" x2="530" y2="270" stroke="#ef5350" stroke-width="1"/>
  <rect x="527" y="238" width="6" height="20" fill="#ef5350" rx="1"/>
  <!-- TROUGH area -->
  <line x1="550" y1="252" x2="550" y2="295" stroke="#ef5350" stroke-width="1"/>
  <rect x="547" y="260" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="570" y1="260" x2="570" y2="305" stroke="#ef5350" stroke-width="1"/>
  <rect x="567" y="268" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="590" y1="255" x2="590" y2="298" stroke="#26a69a" stroke-width="1"/>
  <rect x="587" y="268" width="6" height="18" fill="#26a69a" rx="1"/>

  <!-- BUY signal at confirmed trough -->
  <line x1="615" y1="248" x2="615" y2="290" stroke="#00e676" stroke-width="1.5"/>
  <rect x="610" y="255" width="10" height="22" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="611,248 619,248 615,236" fill="#00e676"/>
  </g>
  <rect x="628" y="240" width="50" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="653" y="254" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- Recovery -->
  <line x1="640" y1="240" x2="640" y2="278" stroke="#26a69a" stroke-width="1"/>
  <rect x="637" y="248" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="660" y1="228" x2="660" y2="265" stroke="#26a69a" stroke-width="1"/>
  <rect x="657" y="235" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="680" y1="218" x2="680" y2="255" stroke="#26a69a" stroke-width="1"/>
  <rect x="677" y="225" width="6" height="18" fill="#26a69a" rx="1"/>

  <!-- Savitzky-Golay smoothed curve -->
  <path d="M 90,295 Q 130,270 170,240 Q 210,210 250,178 Q 290,150 330,125 Q 360,110 380,108 Q 400,112 420,125 Q 450,148 480,178 Q 510,215 540,248 Q 570,270 590,272 Q 610,265 640,248 Q 660,232 680,220" fill="none" stroke="#ff9800" stroke-width="2.5" opacity="0.7"/>
  <text x="700" y="218" fill="#ff9800" font-size="9" font-weight="500">SavGol</text>

  <!-- Peak marker on smoothed curve -->
  <circle cx="380" cy="108" r="6" fill="none" stroke="#ef5350" stroke-width="2" filter="url(#softGlow)"/>
  <text x="380" y="95" text-anchor="middle" fill="#ef5350" font-size="8">Peak</text>

  <!-- Trough marker on smoothed curve -->
  <circle cx="585" cy="272" r="6" fill="none" stroke="#00e676" stroke-width="2" filter="url(#softGlow)"/>
  <text x="585" y="295" text-anchor="middle" fill="#00e676" font-size="8">Trough</text>

  <!-- Order annotation -->
  <path d="M 345,110 L 345,80 L 415,80 L 415,110" fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>
  <text x="380" y="75" text-anchor="middle" fill="#888" font-size="8">order=5 bars each side</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="87" y="405" width="6" height="10" fill="#26a69a" rx="1"/>
    <rect x="107" y="403" width="6" height="12" fill="#26a69a" rx="1"/>
    <rect x="127" y="405" width="6" height="10" fill="#ef5350" rx="1"/>
    <rect x="147" y="402" width="6" height="13" fill="#26a69a" rx="1"/>
    <rect x="167" y="403" width="6" height="12" fill="#26a69a" rx="1"/>
    <rect x="187" y="405" width="6" height="10" fill="#ef5350" rx="1"/>
    <rect x="207" y="402" width="6" height="13" fill="#26a69a" rx="1"/>
    <rect x="227" y="403" width="6" height="12" fill="#26a69a" rx="1"/>
    <rect x="247" y="400" width="6" height="15" fill="#26a69a" rx="1"/>
    <rect x="267" y="398" width="6" height="17" fill="#26a69a" rx="1"/>
    <rect x="287" y="402" width="6" height="13" fill="#ef5350" rx="1"/>
    <rect x="307" y="400" width="6" height="15" fill="#26a69a" rx="1"/>
    <rect x="327" y="398" width="6" height="17" fill="#26a69a" rx="1"/>
    <rect x="347" y="396" width="6" height="19" fill="#26a69a" rx="1"/>
    <rect x="367" y="400" width="6" height="15" fill="#ef5350" rx="1"/>
    <rect x="387" y="402" width="6" height="13" fill="#ef5350" rx="1"/>
    <rect x="407" y="395" width="6" height="20" fill="#ef5350" rx="1"/>
    <rect x="427" y="398" width="6" height="17" fill="#ef5350" rx="1"/>
    <rect x="447" y="400" width="6" height="15" fill="#ef5350" rx="1"/>
    <rect x="467" y="402" width="6" height="13" fill="#ef5350" rx="1"/>
    <rect x="487" y="405" width="6" height="10" fill="#26a69a" rx="1"/>
    <rect x="507" y="403" width="6" height="12" fill="#ef5350" rx="1"/>
    <rect x="527" y="400" width="6" height="15" fill="#ef5350" rx="1"/>
    <rect x="547" y="398" width="6" height="17" fill="#ef5350" rx="1"/>
    <rect x="567" y="396" width="6" height="19" fill="#ef5350" rx="1"/>
    <rect x="587" y="402" width="6" height="13" fill="#26a69a" rx="1"/>
    <rect x="610" y="395" width="6" height="20" fill="#00e676" rx="1" filter="url(#softGlow)"/>
    <rect x="637" y="400" width="6" height="15" fill="#26a69a" rx="1"/>
    <rect x="657" y="402" width="6" height="13" fill="#26a69a" rx="1"/>
    <rect x="677" y="403" width="6" height="12" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">SavGol Smoothed</text>
    <circle cx="150" cy="20" r="4" fill="#ef5350"/>
    <text x="160" y="24" fill="#999" font-size="9">Peak (Sell)</text>
    <circle cx="250" cy="20" r="4" fill="#00e676"/>
    <text x="260" y="24" fill="#999" font-size="9">Trough (Buy)</text>
    <circle cx="370" cy="20" r="4" fill="#26a69a"/>
    <text x="380" y="24" fill="#999" font-size="9">Bullish Candle</text>
    <rect x="480" y="12" width="20" height="16" fill="#ef5350" opacity="0.5" rx="2"/>
    <text x="505" y="24" fill="#999" font-size="9">Bearish Candle</text>
  </g>
</svg>