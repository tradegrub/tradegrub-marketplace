  <line x1="698" y1="340" x2="698" y2="305" stroke="#888" stroke-width="1"/>
  <rect x="693" y="312" width="10" height="22" fill="#ff1744" rx="1"/>
  <line x1="720" y1="360" x2="720" y2="328" stroke="#888" stroke-width="1"/>
  <rect x="715" y="335" width="10" height="18" fill="#ff1744" rx="1"/>

  <!-- Pulse dots along bottom (y=440) -->
  <!-- Trending bright -->
  <circle cx="82" cy="440" r="3" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.9"/>
  <circle cx="104" cy="440" r="3" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.85"/>
  <circle cx="126" cy="440" r="3" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.9"/>
  <circle cx="148" cy="440" r="3.5" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.95"/>
  <circle cx="170" cy="440" r="3.5" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.9"/>
  <circle cx="192" cy="440" r="3" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.85"/>
  <circle cx="214" cy="440" r="3.5" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.9"/>
  <circle cx="236" cy="440" r="3" fill="#00ff88" filter="url(#pulseGlow)" opacity="0.85"/>
