  <text x="22" y="235" fill="#8892b0" font-family="Arial,sans-serif" font-size="12" transform="rotate(-90,22,235)" text-anchor="middle">Frequency</text>

  <rect x="114" y="378" width="12" height="12" fill="url(#barExtremeLeft)" opacity="0.85"/>
  <rect x="127" y="374" width="12" height="16" fill="url(#barExtremeLeft)" opacity="0.85"/>
