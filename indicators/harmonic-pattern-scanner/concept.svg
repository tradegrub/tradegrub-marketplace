<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="przFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4caf50" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4caf50" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="150" y1="50" x2="150" y2="440"/>
    <line x1="300" y1="50" x2="300" y2="440"/>
    <line x1="450" y1="50" x2="450" y2="440"/>
    <line x1="600" y1="50" x2="600" y2="440"/>
  </g>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="600">Harmonic Pattern Scanner</text>
  <text x="400" y="48" text-anchor="middle" fill="#6a6a8a" font-size="11">tradegrub.finance</text>

  <!-- Subtle price line behind pattern -->
  <polyline points="80,340 120,335 160,350 200,320 230,330 260,310 300,280 330,290 360,260 400,270 430,240 460,250 490,220 520,230 550,200 580,210 610,195 640,260 670,280 700,270 730,265" fill="none" stroke="#4a4a6a" stroke-width="1" opacity="0.3"/>

  <!-- PRZ Zone at point D -->
  <rect x="580" y="240" width="80" height="40" fill="url(#przFill)" stroke="#4caf50" stroke-width="0.5" stroke-dasharray="4,3" rx="2"/>
  <text x="620" y="236" text-anchor="middle" fill="#4caf50" font-size="8" opacity="0.8">PRZ</text>

  <!-- XABCD Pattern lines with glow -->
  <g filter="url(#glow)">
    <!-- X to A -->
    <line x1="140" y1="340" x2="280" y2="160" stroke="#ffb300" stroke-width="2"/>
    <!-- A to B -->
    <line x1="280" y1="160" x2="400" y2="270" stroke="#ffb300" stroke-width="2"/>
    <!-- B to C -->
    <line x1="400" y1="270" x2="500" y2="175" stroke="#ffb300" stroke-width="2"/>
    <!-- C to D -->
    <line x1="500" y1="175" x2="620" y2="260" stroke="#ffb300" stroke-width="2"/>
  </g>

  <!-- Fibonacci ratio labels -->
  <text x="350" y="200" text-anchor="middle" fill="#ff8a65" font-size="10" font-weight="600">0.618</text>
  <text x="460" y="210" text-anchor="middle" fill="#ff8a65" font-size="10" font-weight="600">0.786</text>
  <text x="575" y="205" text-anchor="middle" fill="#ff8a65" font-size="10" font-weight="600">1.272</text>

  <!-- Point circles -->
  <circle cx="140" cy="340" r="5" fill="#ffb300" opacity="0.9"/>
  <circle cx="280" cy="160" r="5" fill="#ffb300" opacity="0.9"/>
  <circle cx="400" cy="270" r="5" fill="#ffb300" opacity="0.9"/>
  <circle cx="500" cy="175" r="5" fill="#ffb300" opacity="0.9"/>
  <circle cx="620" cy="260" r="5" fill="#ffb300" opacity="0.9"/>

  <!-- Point labels -->
  <text x="140" y="362" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="700">X</text>
  <text x="280" y="150" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="700">A</text>
  <text x="400" y="290" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="700">B</text>
  <text x="500" y="167" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="700">C</text>
  <text x="620" y="280" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="700">D</text>

  <!-- Bullish Gartley label -->
  <text x="380" y="380" text-anchor="middle" fill="#81c784" font-size="13" font-weight="600" opacity="0.9">Bullish Gartley</text>

  <!-- Legend bar -->
  <rect x="0" y="450" width="800" height="50" fill="#12122a" rx="0"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="#333355" stroke-width="0.5"/>

  <!-- Legend: Pattern Lines -->
  <line x1="180" y1="475" x2="210" y2="475" stroke="#ffb300" stroke-width="2"/>
  <text x="218" y="479" fill="#aaaacc" font-size="11">Pattern Lines</text>

  <!-- Legend: PRZ Zone -->
  <rect x="340" y="468" width="20" height="14" fill="url(#przFill)" stroke="#4caf50" stroke-width="0.5" rx="2"/>
  <text x="368" y="479" fill="#aaaacc" font-size="11">PRZ Zone</text>

  <!-- Legend: Fib Ratios -->
  <text x="490" y="479" fill="#ff8a65" font-size="11" font-weight="600">0.618</text>
  <text x="530" y="479" fill="#aaaacc" font-size="11">Fib Ratios</text>
</svg>
