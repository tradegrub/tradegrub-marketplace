    <text x="312" y="24" fill="#999" font-size="9">Low Percentile (&lt;25)</text>
    <rect x="440" y="12" width="16" height="16" rx="2" fill="#ef5350" opacity="0.6"/>
    <text x="462" y="24" fill="#999" font-size="9">Extreme (>90th)</text>
  </g>
</svg>