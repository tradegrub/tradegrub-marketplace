<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" in="SourceGraphic" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" rx="8" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#fff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/><line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" fill="white" font-weight="bold">Momentum Rank</text>
  <text x="400" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#aaa">Multi-TF Composite</text>
  <text x="400" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#888">tradegrub.finance</text>
  <!-- 50th percentile dashed line -->
  <line x1="390" y1="90" x2="390" y2="400" stroke="#fff" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="390" y="415" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#666">50th</text>
  <!-- XLK 95th -->
  <text x="145" y="125" text-anchor="end" font-family="Arial,sans-serif" font-size="14" fill="white" font-weight="bold">XLK</text>
  <rect x="160" y="110" width="437" height="26" rx="4" fill="#00ff88" opacity="0.85" filter="url(#glow)"/>
  <text x="605" y="128" font-family="Arial,sans-serif" font-size="12" fill="#00ff88">95th</text>
  <!-- XLY 72nd -->
  <text x="145" y="173" text-anchor="end" font-family="Arial,sans-serif" font-size="14" fill="white" font-weight="bold">XLY</text>
  <rect x="160" y="158" width="331" height="26" rx="4" fill="#44dd77" opacity="0.85"/>
  <text x="499" y="176" font-family="Arial,sans-serif" font-size="12" fill="#44dd77">72nd</text>
  <!-- XLF 58th -->
  <text x="145" y="221" text-anchor="end" font-family="Arial,sans-serif" font-size="14" fill="white" font-weight="bold">XLF</text>
  <rect x="160" y="206" width="267" height="26" rx="4" fill="#88cc44" opacity="0.85"/>
  <text x="435" y="224" font-family="Arial,sans-serif" font-size="12" fill="#88cc44">58th</text>
  <!-- XLE 45th -->
  <text x="145" y="269" text-anchor="end" font-family="Arial,sans-serif" font-size="14" fill="white" font-weight="bold">XLE</text>
  <rect x="160" y="254" width="207" height="26" rx="4" fill="#ffdd00" opacity="0.85"/>
  <text x="375" y="272" font-family="Arial,sans-serif" font-size="12" fill="#ffdd00">45th</text>
  <!-- XLV 28th -->
  <text x="145" y="317" text-anchor="end" font-family="Arial,sans-serif" font-size="14" fill="white" font-weight="bold">XLV</text>
  <rect x="160" y="302" width="129" height="26" rx="4" fill="#ff8844" opacity="0.85"/>
  <text x="297" y="320" font-family="Arial,sans-serif" font-size="12" fill="#ff8844">28th</text>
  <!-- XLU 12th -->
  <text x="145" y="365" text-anchor="end" font-family="Arial,sans-serif" font-size="14" fill="white" font-weight="bold">XLU</text>
  <rect x="160" y="350" width="55" height="26" rx="4" fill="#ff4444" opacity="0.85"/>
  <text x="223" y="368" font-family="Arial,sans-serif" font-size="12" fill="#ff4444">12th</text>
  <!-- Legend bar -->
  <rect x="0" y="445" width="800" height="55" rx="0" fill="#111827" opacity="0.6"/>
  <circle cx="250" cy="472" r="5" fill="#00ff88"/><text x="262" y="476" font-family="Arial,sans-serif" font-size="12" fill="#ccc">Strong</text>
  <circle cx="370" cy="472" r="5" fill="#ffdd00"/><text x="382" y="476" font-family="Arial,sans-serif" font-size="12" fill="#ccc">Neutral</text>
  <circle cx="490" cy="472" r="5" fill="#ff4444"/><text x="502" y="476" font-family="Arial,sans-serif" font-size="12" fill="#ccc">Weak</text>
</svg>