<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="volAccum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="volDist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="60" x2="60" y2="380"/><line x1="160" y1="60" x2="160" y2="380"/>
    <line x1="260" y1="60" x2="260" y2="380"/><line x1="360" y1="60" x2="360" y2="380"/>
    <line x1="460" y1="60" x2="460" y2="380"/><line x1="560" y1="60" x2="560" y2="380"/>
    <line x1="660" y1="60" x2="660" y2="380"/><line x1="760" y1="60" x2="760" y2="380"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="140" x2="760" y2="140"/>
    <line x1="60" y1="180" x2="760" y2="180"/><line x1="60" y1="220" x2="760" y2="220"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="300" x2="760" y2="300"/>
    <line x1="60" y1="340" x2="760" y2="340"/><line x1="60" y1="380" x2="760" y2="380"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-family="Arial,sans-serif" font-size="17" font-weight="bold">Wyckoff Phase Detector</text>
  <text x="400" y="48" text-anchor="middle" fill="#8888aa" font-family="Arial,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Phase divider lines -->
  <line x1="235" y1="60" x2="235" y2="380" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="380" y1="60" x2="380" y2="380" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="570" y1="60" x2="570" y2="380" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== ACCUMULATION PHASE (x: 70-235) ===== -->
  <!-- Support and resistance lines -->
  <line x1="70" y1="280" x2="230" y2="280" stroke="#00d2ff" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="70" y1="240" x2="230" y2="240" stroke="#00d2ff" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Accumulation price action (sideways with Spring dip) -->
  <polyline fill="none" stroke="#00d2ff" stroke-width="2" filter="url(#glow)" points="
    70,260 85,245 100,270 112,250 125,265 135,242 148,272 158,248
    170,300 178,310 185,295
    195,255 208,268 218,250 230,260
  "/>

  <!-- Spring annotation -->
  <line x1="178" y1="310" x2="178" y2="330" stroke="#ffdd57" stroke-width="1" stroke-opacity="0.7"/>
  <rect x="152" y="330" width="52" height="16" rx="3" fill="#ffdd57" fill-opacity="0.15" stroke="#ffdd57" stroke-opacity="0.4" stroke-width="0.5"/>
  <text x="178" y="342" text-anchor="middle" fill="#ffdd57" font-family="Arial,sans-serif" font-size="9" font-weight="bold">Spring</text>

  <!-- ===== MARKUP PHASE (x: 235-380) ===== -->
  <polyline fill="none" stroke="#4ade80" stroke-width="2" filter="url(#glow)" points="
    235,258 248,245 258,250 270,230 282,235 295,210 305,218
    318,195 328,200 340,175 352,182 365,155 375,148
  "/>
  <!-- Trend line -->
  <line x1="235" y1="265" x2="375" y2="155" stroke="#4ade80" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- ===== DISTRIBUTION PHASE (x: 380-570) ===== -->
  <!-- Support and resistance lines -->
  <line x1="385" y1="150" x2="565" y2="150" stroke="#ff6b6b" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="385" y1="115" x2="565" y2="115" stroke="#ff6b6b" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Distribution price action (sideways with UTAD spike) -->
  <polyline fill="none" stroke="#ff6b6b" stroke-width="2" filter="url(#glow)" points="
    380,148 392,135 405,145 418,128 430,140 442,120 452,132
    462,100 468,90 475,105
    485,128 498,138 510,125 522,142 535,130 548,145 560,135
  "/>

  <!-- UTAD annotation -->
  <line x1="468" y1="90" x2="468" y2="72" stroke="#ffdd57" stroke-width="1" stroke-opacity="0.7"/>
  <rect x="443" y="58" width="50" height="16" rx="3" fill="#ffdd57" fill-opacity="0.15" stroke="#ffdd57" stroke-opacity="0.4" stroke-width="0.5"/>
  <text x="468" y="70" text-anchor="middle" fill="#ffdd57" font-family="Arial,sans-serif" font-size="9" font-weight="bold">UTAD</text>

  <!-- ===== MARKDOWN PHASE (x: 570-750) ===== -->
  <polyline fill="none" stroke="#f87171" stroke-width="2" filter="url(#glow)" points="
    570,138 582,155 592,148 605,170 615,165 628,190 638,185
    650,210 662,205 672,230 685,240 695,260 708,270 720,290 735,300 745,310
  "/>
  <!-- Trend line -->
  <line x1="570" y1="135" x2="745" y2="315" stroke="#f87171" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- ===== PHASE LABELS ===== -->
  <rect x="105" y="360" width="90" height="18" rx="4" fill="#00d2ff" fill-opacity="0.15" stroke="#00d2ff" stroke-opacity="0.4" stroke-width="0.5"/>
  <text x="150" y="373" text-anchor="middle" fill="#00d2ff" font-family="Arial,sans-serif" font-size="10" font-weight="bold">Accumulation</text>

  <rect x="270" y="360" width="58" height="18" rx="4" fill="#4ade80" fill-opacity="0.15" stroke="#4ade80" stroke-opacity="0.4" stroke-width="0.5"/>
  <text x="299" y="373" text-anchor="middle" fill="#4ade80" font-family="Arial,sans-serif" font-size="10" font-weight="bold">Markup</text>

  <rect x="430" y="360" width="82" height="18" rx="4" fill="#ff6b6b" fill-opacity="0.15" stroke="#ff6b6b" stroke-opacity="0.4" stroke-width="0.5"/>
  <text x="471" y="373" text-anchor="middle" fill="#ff6b6b" font-family="Arial,sans-serif" font-size="10" font-weight="bold">Distribution</text>

  <rect x="620" y="360" width="72" height="18" rx="4" fill="#f87171" fill-opacity="0.15" stroke="#f87171" stroke-opacity="0.4" stroke-width="0.5"/>
  <text x="656" y="373" text-anchor="middle" fill="#f87171" font-family="Arial,sans-serif" font-size="10" font-weight="bold">Markdown</text>

  <!-- ===== TRANSITION ARROWS ===== -->
  <path d="M232,260 C240,260 240,250 248,248" fill="none" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.6"/>
  <polygon points="248,245 252,251 246,251" fill="#4ade80" fill-opacity="0.6"/>

  <path d="M373,150 C378,148 380,148 385,148" fill="none" stroke="#ff6b6b" stroke-width="1.2" stroke-opacity="0.6"/>
  <polygon points="385,145 389,148 385,151" fill="#ff6b6b" fill-opacity="0.6"/>

  <path d="M562,138 C568,140 570,142 575,148" fill="none" stroke="#f87171" stroke-width="1.2" stroke-opacity="0.6"/>
  <polygon points="572,148 578,148 575,153" fill="#f87171" fill-opacity="0.6"/>

  <!-- ===== VOLUME BARS ===== -->
  <!-- Accumulation volume (high) -->
  <rect x="75" y="400" width="8" height="28" rx="1" fill="url(#volAccum)"/>
  <rect x="90" y="406" width="8" height="22" rx="1" fill="url(#volAccum)"/>
  <rect x="105" y="398" width="8" height="30" rx="1" fill="url(#volAccum)"/>
  <rect x="120" y="404" width="8" height="24" rx="1" fill="url(#volAccum)"/>
  <rect x="135" y="396" width="8" height="32" rx="1" fill="url(#volAccum)"/>
  <rect x="150" y="402" width="8" height="26" rx="1" fill="url(#volAccum)"/>
  <rect x="165" y="392" width="8" height="36" rx="1" fill="url(#volAccum)"/>
  <rect x="180" y="388" width="8" height="40" rx="1" fill="url(#volAccum)"/>
  <rect x="195" y="394" width="8" height="34" rx="1" fill="url(#volAccum)"/>
  <rect x="210" y="400" width="8" height="28" rx="1" fill="url(#volAccum)"/>

  <!-- Markup volume (low) -->
  <rect x="245" y="416" width="8" height="12" rx="1" fill="#4ade80" fill-opacity="0.35"/>
  <rect x="260" y="418" width="8" height="10" rx="1" fill="#4ade80" fill-opacity="0.35"/>
  <rect x="275" y="414" width="8" height="14" rx="1" fill="#4ade80" fill-opacity="0.35"/>
  <rect x="290" y="420" width="8" height="8" rx="1" fill="#4ade80" fill-opacity="0.35"/>
  <rect x="305" y="416" width="8" height="12" rx="1" fill="#4ade80" fill-opacity="0.35"/>
  <rect x="320" y="418" width="8" height="10" rx="1" fill="#4ade80" fill-opacity="0.35"/>
  <rect x="335" y="420" width="8" height="8" rx="1" fill="#4ade80" fill-opacity="0.35"/>
  <rect x="350" y="416" width="8" height="12" rx="1" fill="#4ade80" fill-opacity="0.35"/>
  <rect x="365" y="418" width="8" height="10" rx="1" fill="#4ade80" fill-opacity="0.35"/>

  <!-- Distribution volume (high) -->
  <rect x="390" y="400" width="8" height="28" rx="1" fill="url(#volDist)"/>
  <rect x="405" y="394" width="8" height="34" rx="1" fill="url(#volDist)"/>
  <rect x="420" y="398" width="8" height="30" rx="1" fill="url(#volDist)"/>
  <rect x="435" y="404" width="8" height="24" rx="1" fill="url(#volDist)"/>
  <rect x="450" y="392" width="8" height="36" rx="1" fill="url(#volDist)"/>
  <rect x="465" y="386" width="8" height="42" rx="1" fill="url(#volDist)"/>
  <rect x="480" y="394" width="8" height="34" rx="1" fill="url(#volDist)"/>
  <rect x="495" y="398" width="8" height="30" rx="1" fill="url(#volDist)"/>
  <rect x="510" y="402" width="8" height="26" rx="1" fill="url(#volDist)"/>
  <rect x="525" y="396" width="8" height="32" rx="1" fill="url(#volDist)"/>
  <rect x="540" y="400" width="8" height="28" rx="1" fill="url(#volDist)"/>
  <rect x="555" y="404" width="8" height="24" rx="1" fill="url(#volDist)"/>

  <!-- Markdown volume (low) -->
  <rect x="580" y="416" width="8" height="12" rx="1" fill="#f87171" fill-opacity="0.35"/>
  <rect x="595" y="420" width="8" height="8" rx="1" fill="#f87171" fill-opacity="0.35"/>
  <rect x="610" y="414" width="8" height="14" rx="1" fill="#f87171" fill-opacity="0.35"/>
  <rect x="625" y="418" width="8" height="10" rx="1" fill="#f87171" fill-opacity="0.35"/>
  <rect x="640" y="416" width="8" height="12" rx="1" fill="#f87171" fill-opacity="0.35"/>
  <rect x="655" y="420" width="8" height="8" rx="1" fill="#f87171" fill-opacity="0.35"/>
  <rect x="670" y="418" width="8" height="10" rx="1" fill="#f87171" fill-opacity="0.35"/>
  <rect x="685" y="416" width="8" height="12" rx="1" fill="#f87171" fill-opacity="0.35"/>
  <rect x="700" y="414" width="8" height="14" rx="1" fill="#f87171" fill-opacity="0.35"/>
  <rect x="715" y="418" width="8" height="10" rx="1" fill="#f87171" fill-opacity="0.35"/>
  <rect x="730" y="420" width="8" height="8" rx="1" fill="#f87171" fill-opacity="0.35"/>

  <!-- Volume label -->
  <text x="60" y="418" text-anchor="end" fill="#888899" font-family="Arial,sans-serif" font-size="8">Vol</text>

  <!-- ===== LEGEND BAR ===== -->
  <rect x="60" y="455" width="680" height="30" rx="6" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5"/>

  <circle cx="100" cy="470" r="4" fill="#00d2ff"/>
  <text x="110" y="474" fill="#aaaacc" font-family="Arial,sans-serif" font-size="10">Accumulation</text>

  <circle cx="230" cy="470" r="4" fill="#4ade80"/>
  <text x="240" y="474" fill="#aaaacc" font-family="Arial,sans-serif" font-size="10">Markup</text>

  <circle cx="330" cy="470" r="4" fill="#ff6b6b"/>
  <text x="340" y="474" fill="#aaaacc" font-family="Arial,sans-serif" font-size="10">Distribution</text>

  <circle cx="470" cy="470" r="4" fill="#f87171"/>
  <text x="480" y="474" fill="#aaaacc" font-family="Arial,sans-serif" font-size="10">Markdown</text>

  <circle cx="590" cy="470" r="4" fill="#ffdd57"/>
  <text x="600" y="474" fill="#aaaacc" font-family="Arial,sans-serif" font-size="10">Key Events</text>

</svg>