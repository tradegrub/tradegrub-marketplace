<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Negative Volume Index</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <line x1="60" y1="70" x2="60" y2="220" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="220" x2="750" y2="220" stroke="#333" stroke-width="1"/>
  <text x="55" y="80" text-anchor="end" fill="#666" font-size="9">Price</text>

  <line x1="100" y1="140" x2="100" y2="195" stroke="#555" stroke-width="1"/>
  <rect x="95" y="155" width="10" height="25" fill="#4CAF50" rx="1"/>
  <line x1="160" y1="130" x2="160" y2="190" stroke="#555" stroke-width="1"/>
  <rect x="155" y="145" width="10" height="25" fill="#4CAF50" rx="1"/>
  <line x1="220" y1="125" x2="220" y2="185" stroke="#555" stroke-width="1"/>
  <rect x="215" y="140" width="10" height="25" fill="#4CAF50" rx="1"/>
  <line x1="280" y1="120" x2="280" y2="175" stroke="#555" stroke-width="1"/>
  <rect x="275" y="140" width="10" height="20" fill="#ff1744" rx="1"/>
  <line x1="340" y1="125" x2="340" y2="180" stroke="#555" stroke-width="1"/>
  <rect x="335" y="145" width="10" height="20" fill="#ff1744" rx="1"/>
  <line x1="400" y1="130" x2="400" y2="185" stroke="#555" stroke-width="1"/>
  <rect x="395" y="145" width="10" height="25" fill="#4CAF50" rx="1"/>
  <line x1="460" y1="120" x2="460" y2="175" stroke="#555" stroke-width="1"/>
  <rect x="455" y="135" width="10" height="20" fill="#4CAF50" rx="1"/>
  <line x1="520" y1="110" x2="520" y2="170" stroke="#555" stroke-width="1"/>
  <rect x="515" y="125" width="10" height="25" fill="#4CAF50" rx="1"/>
  <line x1="580" y1="105" x2="580" y2="160" stroke="#555" stroke-width="1"/>
  <rect x="575" y="120" width="10" height="20" fill="#4CAF50" rx="1"/>
  <line x1="640" y1="100" x2="640" y2="155" stroke="#555" stroke-width="1"/>
  <rect x="635" y="115" width="10" height="20" fill="#4CAF50" rx="1"/>
  <line x1="700" y1="95" x2="700" y2="145" stroke="#555" stroke-width="1"/>
  <rect x="695" y="110" width="10" height="18" fill="#4CAF50" rx="1"/>

  <!-- NVI subplot -->
  <line x1="60" y1="250" x2="750" y2="250" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="250" x2="60" y2="440" stroke="#333" stroke-width="1"/>
  <text x="55" y="260" text-anchor="end" fill="#666" font-size="9">NVI</text>

  <!-- Background zones -->
  <rect x="60" y="250" width="690" height="190" fill="rgba(171,71,188,0.06)"/>
  <rect x="260" y="250" width="180" height="190" fill="rgba(255,167,38,0.06)"/>

  <!-- NVI line -->
  <polyline points="100,400 160,385 220,370 280,375 340,380 400,365 460,350 520,335 580,320 640,310 700,300" stroke="#AB47BC" stroke-width="2" fill="none"/>

  <!-- Signal line -->
  <polyline points="100,405 160,398 220,390 280,385 340,383 400,378 460,372 520,365 580,355 640,345 700,338" stroke="#FFA726" stroke-width="1.5" fill="none" stroke-dasharray="6,3"/>

  <text x="320" y="268" fill="#FFA726" font-size="9">Below signal</text>
  <text x="550" y="268" fill="#AB47BC" font-size="9">Smart money bullish</text>

  <!-- Legend -->
  <rect x="200" y="462" width="12" height="12" fill="#AB47BC" rx="2"/>
  <text x="218" y="473" fill="#aaa" font-size="10">NVI</text>
  <rect x="280" y="462" width="12" height="12" fill="#FFA726" rx="2"/>
  <text x="298" y="473" fill="#aaa" font-size="10">Signal (EMA 255)</text>
  <rect x="440" y="462" width="12" height="12" fill="rgba(171,71,188,0.2)" rx="2"/>
  <text x="458" y="473" fill="#aaa" font-size="10">Accumulation Zone</text>
