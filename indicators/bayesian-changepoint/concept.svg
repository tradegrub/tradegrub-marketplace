<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Bayesian Change Point Detector</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <rect x="60" y="70" width="700" height="180" fill="rgba(255,255,255,0.02)" rx="4"/>
  <!-- Regime shading -->
  <rect x="60" y="70" width="200" height="180" fill="rgba(76,175,80,0.04)"/>
  <rect x="260" y="70" width="180" height="180" fill="rgba(239,83,80,0.04)"/>
  <rect x="440" y="70" width="200" height="180" fill="rgba(76,175,80,0.04)"/>
  <rect x="640" y="70" width="120" height="180" fill="rgba(66,165,245,0.04)"/>

  <text x="140" y="88" fill="#4CAF50" font-family="Inter,sans-serif" font-size="9" text-anchor="middle">Regime A</text>
  <text x="340" y="88" fill="#EF5350" font-family="Inter,sans-serif" font-size="9" text-anchor="middle">Regime B</text>
  <text x="530" y="88" fill="#4CAF50" font-family="Inter,sans-serif" font-size="9" text-anchor="middle">Regime C</text>

  <!-- Candlesticks -->
  <g stroke-width="1.5">
    <line x1="100" y1="140" x2="100" y2="190" stroke="#4CAF50"/><rect x="96" y="148" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="140" y1="130" x2="140" y2="180" stroke="#4CAF50"/><rect x="136" y="136" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="180" y1="120" x2="180" y2="170" stroke="#4CAF50"/><rect x="176" y="126" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="220" y1="115" x2="220" y2="165" stroke="#4CAF50"/><rect x="216" y="120" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="270" y1="130" x2="270" y2="195" stroke="#EF5350"/><rect x="266" y="145" width="8" height="38" fill="#EF5350" rx="1"/>
    <line x1="310" y1="155" x2="310" y2="215" stroke="#EF5350"/><rect x="306" y="168" width="8" height="35" fill="#EF5350" rx="1"/>
    <line x1="350" y1="175" x2="350" y2="230" stroke="#EF5350"/><rect x="346" y="185" width="8" height="32" fill="#EF5350" rx="1"/>
    <line x1="390" y1="190" x2="390" y2="240" stroke="#EF5350"/><rect x="386" y="200" width="8" height="28" fill="#EF5350" rx="1"/>
    <line x1="450" y1="180" x2="450" y2="225" stroke="#4CAF50"/><rect x="446" y="185" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="490" y1="165" x2="490" y2="210" stroke="#4CAF50"/><rect x="486" y="170" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="530" y1="150" x2="530" y2="195" stroke="#4CAF50"/><rect x="526" y="155" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="570" y1="140" x2="570" y2="185" stroke="#4CAF50"/><rect x="566" y="145" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="610" y1="135" x2="610" y2="180" stroke="#4CAF50"/><rect x="606" y="140" width="8" height="28" fill="#4CAF50" rx="1"/>
    <line x1="660" y1="140" x2="660" y2="190" stroke="#EF5350"/><rect x="656" y="150" width="8" height="28" fill="#EF5350" rx="1"/>
    <line x1="700" y1="148" x2="700" y2="195" stroke="#EF5350"/><rect x="696" y="155" width="8" height="28" fill="#EF5350" rx="1"/>
  </g>

  <!-- Changepoint vertical lines -->
  <line x1="260" y1="70" x2="260" y2="250" stroke="#EF5350" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="440" y1="70" x2="440" y2="250" stroke="#EF5350" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="640" y1="70" x2="640" y2="250" stroke="#EF5350" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Separator -->
  <line x1="60" y1="265" x2="760" y2="265" stroke="#444" stroke-width="1"/>

  <!-- Probability subplot -->
  <rect x="60" y="275" width="700" height="160" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="75" y="292" fill="#666" font-family="Inter,sans-serif" font-size="10">Change Point Probability</text>

  <!-- Threshold line -->
  <line x1="60" y1="340" x2="760" y2="340" stroke="#FFA726" stroke-width="0.7" stroke-dasharray="6,4"/>
  <text x="765" y="344" fill="#FFA726" font-family="Inter,sans-serif" font-size="9">50%</text>

  <!-- Probability line -->
  <polyline points="100,420 140,415 180,410 220,405 250,380 260,300 270,395 310,410 350,415 390,410 420,385 440,295 450,400 490,415 530,420 570,418 610,405 635,370 640,305 660,400 700,415 730,420" fill="none" stroke="#EF5350" stroke-width="2"/>

  <!-- Spike markers -->
  <polygon points="260,290 255,280 265,280" fill="#EF5350"/>
  <polygon points="440,285 435,275 445,275" fill="#EF5350"/>
  <polygon points="640,295 635,285 645,285" fill="#EF5350"/>

  <!-- Legend -->
  <rect x="150" y="455" width="500" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="180" y1="470" x2="210" y2="470" stroke="#EF5350" stroke-width="2"/>
  <text x="215" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="10">CP Probability</text>
  <line x1="350" y1="470" x2="380" y2="470" stroke="#FFA726" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="385" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Threshold</text>
  <polygon points="510,466 505,475 515,475" fill="#EF5350"/>
  <text x="520" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Detected</text>
</svg>