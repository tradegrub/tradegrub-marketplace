<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Random Forest Breakout</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart -->
  <rect x="60" y="70" width="700" height="220" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="88" fill="#888" font-family="Inter,sans-serif" font-size="10">Price</text>

  <!-- Consolidation then breakout pattern -->
  <line x1="100" y1="200" x2="100" y2="230" stroke="#555" stroke-width="1"/><rect x="96" y="205" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="140" y1="195" x2="140" y2="225" stroke="#555" stroke-width="1"/><rect x="136" y="200" width="8" height="18" fill="#f44336" rx="1"/>
  <line x1="180" y1="198" x2="180" y2="228" stroke="#555" stroke-width="1"/><rect x="176" y="202" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="220" y1="193" x2="220" y2="223" stroke="#555" stroke-width="1"/><rect x="216" y="198" width="8" height="18" fill="#f44336" rx="1"/>
  <line x1="260" y1="195" x2="260" y2="225" stroke="#555" stroke-width="1"/><rect x="256" y="200" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="300" y1="190" x2="300" y2="220" stroke="#555" stroke-width="1"/><rect x="296" y="195" width="8" height="18" fill="#4CAF50" rx="1"/>
  <!-- Resistance line -->
  <line x1="80" y1="192" x2="340" y2="192" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Breakout candles -->
  <line x1="340" y1="170" x2="340" y2="200" stroke="#555" stroke-width="1"/><rect x="336" y="173" width="8" height="20" fill="#00e676" rx="1"/>
  <line x1="380" y1="155" x2="380" y2="185" stroke="#555" stroke-width="1"/><rect x="376" y="158" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="420" y1="140" x2="420" y2="172" stroke="#555" stroke-width="1"/><rect x="416" y="143" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="460" y1="130" x2="460" y2="162" stroke="#555" stroke-width="1"/><rect x="456" y="133" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="500" y1="125" x2="500" y2="155" stroke="#555" stroke-width="1"/><rect x="496" y="128" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="540" y1="120" x2="540" y2="150" stroke="#555" stroke-width="1"/><rect x="536" y="130" width="8" height="15" fill="#f44336" rx="1"/>
  <line x1="580" y1="125" x2="580" y2="155" stroke="#555" stroke-width="1"/><rect x="576" y="128" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="620" y1="118" x2="620" y2="148" stroke="#555" stroke-width="1"/><rect x="616" y="121" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="660" y1="112" x2="660" y2="142" stroke="#555" stroke-width="1"/><rect x="656" y="115" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="700" y1="105" x2="700" y2="138" stroke="#555" stroke-width="1"/><rect x="696" y="108" width="8" height="20" fill="#4CAF50" rx="1"/>

  <!-- Entry signal triangle -->
  <polygon points="340,210 334,222 346,222" fill="#00e676"/>
  <text x="340" y="235" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="9">ENTRY</text>

  <!-- Stop loss line -->
  <line x1="340" y1="230" x2="520" y2="230" stroke="#f44336" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <text x="525" y="234" fill="#f44336" font-family="Inter,sans-serif" font-size="9">Stop</text>

  <!-- Take profit line -->
  <line x1="340" y1="115" x2="520" y2="115" stroke="#4CAF50" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
  <text x="525" y="119" fill="#4CAF50" font-family="Inter,sans-serif" font-size="9">Target</text>

  <!-- Probability subplot -->
  <rect x="60" y="310" width="700" height="120" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="328" fill="#888" font-family="Inter,sans-serif" font-size="10">Breakout Probability</text>

  <!-- Threshold line -->
  <line x1="60" y1="345" x2="760" y2="345" stroke="#ffeb3b" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="765" y="349" fill="#ffeb3b" font-family="Inter,sans-serif" font-size="9">0.65</text>

  <!-- Probability line -->
  <polyline points="100,400 140,395 180,390 220,385 260,375 300,360 340,340 380,335 420,338 460,342 500,348 540,365 580,358 620,345 660,340 700,335"
    fill="none" stroke="#ff9800" stroke-width="2"/>

  <!-- Legend -->
  <rect x="60" y="455" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <polygon points="85,475 79,467 91,467" fill="#00e676"/>
  <text x="96" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Entry Signal</text>
  <line x1="210" y1="470" x2="230" y2="470" stroke="#ff9800" stroke-width="2"/>
  <text x="235" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Breakout Prob</text>
  <line x1="370" y1="470" x2="390" y2="470" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="395" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Target</text>
  <line x1="470" y1="470" x2="490" y2="470" stroke="#f44336" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="495" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Stop</text>
</svg>
