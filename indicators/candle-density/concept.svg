  <!-- Price line overlay -->
  <polyline fill="none" stroke="white" stroke-width="1.8" stroke-linejoin="round" filter="url(#glow)" opacity="0.9"
    points="
      70,300 84,295 98,290 112,280 126,260 140,250 154,240 168,235
      182,230 196,225 210,220 224,200 238,180 252,160 266,150 280,155
      294,148 308,152 322,158 336,155 350,150 364,160 378,170 392,180
      406,200 420,220 434,230 448,238 462,235 476,240 490,238 504,242
      518,240 532,245 546,260 560,280 574,300 588,310 602,320 616,330
      630,340 644,338 658,342 672,335 686,340 700,345 714,350 728,355
      742,350 756,348
    "/>

  <!-- Y-axis labels -->
