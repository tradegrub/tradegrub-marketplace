<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#445" stroke-width="0.5" opacity="0.04">
    <line x1="100" y1="80" x2="100" y2="430"/><line x1="200" y1="80" x2="200" y2="430"/>
    <line x1="300" y1="80" x2="300" y2="430"/><line x1="400" y1="80" x2="400" y2="430"/>
    <line x1="500" y1="80" x2="500" y2="430"/><line x1="600" y1="80" x2="600" y2="430"/>
    <line x1="700" y1="80" x2="700" y2="430"/>
    <line x1="60" y1="120" x2="740" y2="120"/><line x1="60" y1="180" x2="740" y2="180"/>
    <line x1="60" y1="240" x2="740" y2="240"/><line x1="60" y1="300" x2="740" y2="300"/>
    <line x1="60" y1="360" x2="740" y2="360"/><line x1="60" y1="420" x2="740" y2="420"/>
  </g>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="600">Gann Square Levels</text>
  <text x="400" y="48" text-anchor="middle" fill="#6a6a8a" font-size="11">tradegrub.finance</text>

  <!-- Concentric diamonds (rotated 45deg squares) centered at 400,255 -->
  <!-- 360 degree - outermost -->
  <g transform="translate(400,255) rotate(45)" fill="none" stroke="#b8560f" stroke-width="1.2" opacity="0.35">
    <rect x="-155" y="-155" width="310" height="310" rx="2"/>
  </g>
  <!-- 270 degree -->
  <g transform="translate(400,255) rotate(45)" fill="none" stroke="#c97a1a" stroke-width="1.2" opacity="0.4">
    <rect x="-120" y="-120" width="240" height="240" rx="2"/>
  </g>
  <!-- 180 degree -->
  <g transform="translate(400,255) rotate(45)" fill="none" stroke="#d4992a" stroke-width="1.3" opacity="0.5">
    <rect x="-88" y="-88" width="176" height="176" rx="2"/>
  </g>
  <!-- 90 degree -->
  <g transform="translate(400,255) rotate(45)" fill="none" stroke="#e6b422" stroke-width="1.4" opacity="0.6">
    <rect x="-58" y="-58" width="116" height="116" rx="2"/>
  </g>
  <!-- 45 degree - innermost -->
  <g transform="translate(400,255) rotate(45)" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.75">
    <rect x="-30" y="-30" width="60" height="60" rx="1"/>
  </g>

  <!-- Center point -->
  <circle cx="400" cy="255" r="3" fill="#ffd700" opacity="0.9" filter="url(#glow)"/>

  <!-- Angular labels at diamond corners -->
  <text x="400" y="72" text-anchor="middle" fill="#e6b422" font-size="9" opacity="0.7">360°</text>
  <text x="400" y="100" text-anchor="middle" fill="#d4992a" font-size="9" opacity="0.7">180°</text>
  <text x="400" y="135" text-anchor="middle" fill="#c97a1a" font-size="9" opacity="0.65">90°</text>
  <text x="400" y="195" text-anchor="middle" fill="#ffd700" font-size="9" opacity="0.7">45°</text>

  <!-- Horizontal Gann price levels -->
  <line x1="70" y1="100" x2="730" y2="100" stroke="#b8560f" stroke-width="0.7" stroke-dasharray="8,5" opacity="0.3"/>
  <line x1="70" y1="135" x2="730" y2="135" stroke="#c97a1a" stroke-width="0.7" stroke-dasharray="6,4" opacity="0.35"/>
  <line x1="70" y1="167" x2="730" y2="167" stroke="#d4992a" stroke-width="0.7" stroke-dasharray="5,4" opacity="0.4"/>
  <line x1="70" y1="197" x2="730" y2="197" stroke="#e6b422" stroke-width="0.7" stroke-dasharray="4,3" opacity="0.45"/>
  <line x1="70" y1="255" x2="730" y2="255" stroke="#ffd700" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="70" y1="313" x2="730" y2="313" stroke="#e6b422" stroke-width="0.7" stroke-dasharray="4,3" opacity="0.45"/>
  <line x1="70" y1="343" x2="730" y2="343" stroke="#d4992a" stroke-width="0.7" stroke-dasharray="5,4" opacity="0.4"/>
  <line x1="70" y1="375" x2="730" y2="375" stroke="#c97a1a" stroke-width="0.7" stroke-dasharray="6,4" opacity="0.35"/>
  <line x1="70" y1="410" x2="730" y2="410" stroke="#b8560f" stroke-width="0.7" stroke-dasharray="8,5" opacity="0.3"/>

  <!-- Price labels on right -->
  <text x="740" y="103" fill="#b8560f" font-size="8" opacity="0.6">$248</text>
  <text x="740" y="138" fill="#c97a1a" font-size="8" opacity="0.6">$236</text>
  <text x="740" y="170" fill="#d4992a" font-size="8" opacity="0.6">$225</text>
  <text x="740" y="200" fill="#e6b422" font-size="8" opacity="0.6">$216</text>
  <text x="740" y="258" fill="#ffd700" font-size="9" font-weight="600" opacity="0.8">$200</text>
  <text x="740" y="316" fill="#e6b422" font-size="8" opacity="0.6">$184</text>
  <text x="740" y="346" fill="#d4992a" font-size="8" opacity="0.6">$175</text>
  <text x="740" y="378" fill="#c97a1a" font-size="8" opacity="0.6">$164</text>
  <text x="740" y="413" fill="#b8560f" font-size="8" opacity="0.6">$152</text>

  <!-- Price action line bouncing off Gann levels -->
  <polyline points="80,380 120,370 150,345 180,348 210,313 240,320 270,315 300,280 330,260 360,255 390,250 410,197 430,200 450,210 470,255 490,260 510,313 530,300 550,260 570,255 590,240 610,197 630,195 650,168 680,172 710,167" fill="none" stroke="#4fc3f7" stroke-width="2" filter="url(#glow)" opacity="0.9"/>

  <!-- Bounce highlights where price touches Gann levels -->
  <circle cx="210" cy="313" r="4" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
  <circle cx="360" cy="255" r="5" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.8" filter="url(#glowStrong)"/>
  <circle cx="410" cy="197" r="4" fill="none" stroke="#e6b422" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
  <circle cx="510" cy="313" r="4" fill="none" stroke="#e6b422" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
  <circle cx="570" cy="255" r="4" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
  <circle cx="610" cy="197" r="4" fill="none" stroke="#e6b422" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
  <circle cx="650" cy="168" r="4" fill="none" stroke="#d4992a" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>

  <!-- Diagonal Gann angle lines from center -->
  <line x1="400" y1="255" x2="620" y2="95" stroke="#ffd700" stroke-width="0.6" opacity="0.2"/>
  <line x1="400" y1="255" x2="180" y2="95" stroke="#ffd700" stroke-width="0.6" opacity="0.2"/>
  <line x1="400" y1="255" x2="620" y2="415" stroke="#ffd700" stroke-width="0.6" opacity="0.2"/>
  <line x1="400" y1="255" x2="180" y2="415" stroke="#ffd700" stroke-width="0.6" opacity="0.2"/>

  <!-- Legend bar -->
  <rect x="60" y="455" width="680" height="30" fill="#111128" rx="4" opacity="0.6"/>
  <line x1="130" y1="470" x2="155" y2="470" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="160" y="474" fill="#aaa" font-size="10">Center (0°)</text>
  <line x1="240" y1="470" x2="265" y2="470" stroke="#e6b422" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="270" y="474" fill="#aaa" font-size="10">45°/90°</text>
  <line x1="340" y1="470" x2="365" y2="470" stroke="#d4992a" stroke-width="1.2" stroke-dasharray="5,4"/>
  <text x="370" y="474" fill="#aaa" font-size="10">180°</text>
  <line x1="420" y1="470" x2="445" y2="470" stroke="#b8560f" stroke-width="1.2" stroke-dasharray="8,5"/>
  <text x="450" y="474" fill="#aaa" font-size="10">270°/360°</text>
  <line x1="540" y1="470" x2="565" y2="470" stroke="#4fc3f7" stroke-width="2"/>
  <text x="570" y="474" fill="#aaa" font-size="10">Price</text>
  <circle cx="625" cy="470" r="3.5" fill="none" stroke="#4fc3f7" stroke-width="1.2"/>
  <text x="633" y="474" fill="#aaa" font-size="10">Bounce</text>
</svg>
