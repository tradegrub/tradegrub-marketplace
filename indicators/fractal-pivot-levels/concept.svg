<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Fractal Pivot Levels</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>
  <line x1="60" y1="70" x2="60" y2="420" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="420" x2="760" y2="420" stroke="#333" stroke-width="1"/>
  <!-- Candlesticks with fractal pattern -->
  <rect x="90" y="250" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="120" y="220" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="150" y="180" width="8" height="35" fill="#4CAF50" rx="1"/>
  <rect x="180" y="140" width="8" height="30" fill="#4CAF50" rx="1"/>
  <!-- Fractal high -->
  <rect x="210" y="110" width="8" height="35" fill="#4CAF50" rx="1"/>
  <polygon points="210,100 214,90 218,100" fill="#ef5350"/>
  <rect x="240" y="140" width="8" height="30" fill="#ef5350" rx="1"/>
  <rect x="270" y="170" width="8" height="30" fill="#ef5350" rx="1"/>
  <rect x="300" y="200" width="8" height="30" fill="#ef5350" rx="1"/>
  <rect x="330" y="250" width="8" height="35" fill="#ef5350" rx="1"/>
  <!-- Fractal low -->
  <rect x="360" y="300" width="8" height="30" fill="#ef5350" rx="1"/>
  <polygon points="360,340 364,350 368,340" fill="#4CAF50"/>
  <rect x="390" y="270" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="420" y="240" width="8" height="25" fill="#4CAF50" rx="1"/>
  <rect x="450" y="210" width="8" height="30" fill="#4CAF50" rx="1"/>
  <!-- Another fractal high -->
  <rect x="480" y="130" width="8" height="30" fill="#4CAF50" rx="1"/>
  <polygon points="480,120 484,110 488,120" fill="#ef5350"/>
  <rect x="510" y="150" width="8" height="30" fill="#ef5350" rx="1"/>
  <rect x="540" y="180" width="8" height="25" fill="#ef5350" rx="1"/>
  <rect x="570" y="220" width="8" height="30" fill="#ef5350" rx="1"/>
  <!-- Fractal low -->
  <rect x="600" y="280" width="8" height="30" fill="#ef5350" rx="1"/>
  <polygon points="600,320 604,330 608,320" fill="#4CAF50"/>
  <rect x="630" y="260" width="8" height="25" fill="#4CAF50" rx="1"/>
  <rect x="660" y="230" width="8" height="30" fill="#4CAF50" rx="1"/>
  <rect x="690" y="210" width="8" height="25" fill="#4CAF50" rx="1"/>
  <!-- Resistance levels -->
  <line x1="210" y1="110" x2="760" y2="110" stroke="rgba(239,83,80,0.5)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="480" y1="130" x2="760" y2="130" stroke="rgba(239,83,80,0.5)" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="762" y="113" fill="rgba(239,83,80,0.7)" font-family="Inter,sans-serif" font-size="9">R1</text>
  <text x="762" y="133" fill="rgba(239,83,80,0.7)" font-family="Inter,sans-serif" font-size="9">R2</text>
  <!-- Support levels -->
  <line x1="360" y1="330" x2="760" y2="330" stroke="rgba(76,175,80,0.5)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="600" y1="310" x2="760" y2="310" stroke="rgba(76,175,80,0.5)" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="762" y="333" fill="rgba(76,175,80,0.7)" font-family="Inter,sans-serif" font-size="9">S1</text>
  <text x="762" y="313" fill="rgba(76,175,80,0.7)" font-family="Inter,sans-serif" font-size="9">S2</text>
  <!-- Legend -->
  <rect x="150" y="450" width="500" height="30" rx="4" fill="rgba(255,255,255,0.03)"/>
  <polygon points="180,460 184,454 188,460" fill="#ef5350"/>
  <text x="194" y="464" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Fractal High</text>
  <polygon points="300,460 304,466 308,460" fill="#4CAF50"/>
  <text x="314" y="464" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Fractal Low</text>
  <line x1="420" y1="462" x2="440" y2="462" stroke="rgba(239,83,80,0.5)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="446" y="466" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Resistance</text>
  <line x1="530" y1="462" x2="550" y2="462" stroke="rgba(76,175,80,0.5)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="556" y="466" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Support</text>
</svg>