<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="8" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#e0e0e0" font-family="Arial, sans-serif" font-size="17" font-weight="bold">Combined Candle Merge</text>
  <text x="400" y="54" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Labels -->
  <text x="200" y="82" text-anchor="middle" fill="#aaa" font-family="Arial, sans-serif" font-size="13">Before</text>
  <text x="600" y="82" text-anchor="middle" fill="#aaa" font-family="Arial, sans-serif" font-size="13">After</text>

  <!-- ===== GREEN SECTION (top) ===== -->
  <!-- 4 small green candles -->
  <g filter="url(#glow)">
    <!-- Candle 1 -->
    <line x1="110" y1="110" x2="110" y2="210" stroke="#4caf50" stroke-width="1.5"/>
    <rect x="104" y="130" width="12" height="50" fill="#4caf50" rx="1"/>
    <!-- Candle 2 -->
    <line x1="150" y1="105" x2="150" y2="200" stroke="#4caf50" stroke-width="1.5"/>
    <rect x="144" y="120" width="12" height="55" fill="#4caf50" rx="1"/>
    <!-- Candle 3 -->
    <line x1="190" y1="100" x2="190" y2="195" stroke="#4caf50" stroke-width="1.5"/>
    <rect x="184" y="115" width="12" height="50" fill="#4caf50" rx="1"/>
    <!-- Candle 4 -->
    <line x1="230" y1="95" x2="230" y2="190" stroke="#4caf50" stroke-width="1.5"/>
    <rect x="224" y="108" width="12" height="55" fill="#4caf50" rx="1"/>
  </g>

  <!-- Arrow green -->
  <g fill="#4caf50" stroke="#4caf50" stroke-width="2">
    <line x1="280" y1="155" x2="440" y2="155"/>
    <polygon points="440,148 460,155 440,162" stroke="none"/>
  </g>

  <!-- Merged large green candle -->
  <g filter="url(#glow)">
    <line x1="580" y1="92" x2="580" y2="215" stroke="#4caf50" stroke-width="2"/>
    <rect x="560" y="108" width="40" height="82" fill="#4caf50" rx="2"/>
  </g>

  <!-- ===== RED SECTION (bottom) ===== -->
  <!-- 4 small red candles -->
  <g filter="url(#glow)">
    <!-- Candle 1 -->
    <line x1="110" y1="260" x2="110" y2="370" stroke="#f44336" stroke-width="1.5"/>
    <rect x="104" y="280" width="12" height="50" fill="#f44336" rx="1"/>
    <!-- Candle 2 -->
    <line x1="150" y1="265" x2="150" y2="375" stroke="#f44336" stroke-width="1.5"/>
    <rect x="144" y="290" width="12" height="55" fill="#f44336" rx="1"/>
    <!-- Candle 3 -->
    <line x1="190" y1="270" x2="190" y2="380" stroke="#f44336" stroke-width="1.5"/>
    <rect x="184" y="295" width="12" height="55" fill="#f44336" rx="1"/>
    <!-- Candle 4 -->
    <line x1="230" y1="275" x2="230" y2="390" stroke="#f44336" stroke-width="1.5"/>
    <rect x="224" y="302" width="12" height="55" fill="#f44336" rx="1"/>
  </g>

  <!-- Arrow red -->
  <g fill="#f44336" stroke="#f44336" stroke-width="2">
    <line x1="280" y1="330" x2="440" y2="330"/>
    <polygon points="440,323 460,330 440,337" stroke="none"/>
  </g>

  <!-- Merged large red candle -->
  <g filter="url(#glow)">
    <line x1="580" y1="255" x2="580" y2="395" stroke="#f44336" stroke-width="2"/>
    <rect x="560" y="280" width="40" height="90" fill="#f44336" rx="2"/>
  </g>

  <!-- Legend bar -->
  <rect x="0" y="460" width="800" height="40" fill="#0d0d1a"/>
  <rect x="180" y="474" width="12" height="12" fill="#4caf50" rx="2"/>
  <text x="198" y="485" fill="#aaa" font-family="Arial, sans-serif" font-size="11">Bullish candles merged</text>
  <rect x="480" y="474" width="12" height="12" fill="#f44336" rx="2"/>
  <text x="498" y="485" fill="#aaa" font-family="Arial, sans-serif" font-size="11">Bearish candles merged</text>
</svg>
