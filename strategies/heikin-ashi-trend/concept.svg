<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Heikin-Ashi Trend Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Label: HA candles -->
  <text x="75" y="75" fill="#bbb" font-size="10" font-weight="500">Heikin-Ashi Candles</text>

  <!-- HA EMA fast -->
  <path d="M 80,290 Q 140,295 180,298 Q 220,295 260,280 Q 300,260 340,240 Q 380,222 420,208 Q 460,198 500,192 Q 540,195 580,205 Q 620,220 660,238 Q 700,252 740,260" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.7"/>
  <text x="742" y="256" fill="#42a5f5" font-size="8">HA EMA Fast</text>

  <!-- HA EMA slow -->
  <path d="M 80,285 Q 140,290 200,292 Q 260,290 320,278 Q 380,260 420,245 Q 460,232 500,225 Q 540,222 580,225 Q 620,232 660,242 Q 700,250 740,255" fill="none" stroke="#ef5350" stroke-width="1.5" opacity="0.7"/>
  <text x="742" y="270" fill="#ef5350" font-size="8">HA EMA Slow</text>

  <!-- RED HA candles (bearish trend - no lower wicks) -->
  <line x1="90" y1="275" x2="90" y2="310" stroke="#ef5350" stroke-width="1"/>
  <rect x="86" y="278" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="115" y1="280" x2="115" y2="318" stroke="#ef5350" stroke-width="1"/>
  <rect x="111" y="285" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="140" y1="285" x2="140" y2="322" stroke="#ef5350" stroke-width="1"/>
  <rect x="136" y="290" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="165" y1="288" x2="165" y2="320" stroke="#ef5350" stroke-width="1"/>
  <rect x="161" y="292" width="8" height="18" fill="#ef5350" rx="1"/>
  <!-- Transition doji -->
  <line x1="190" y1="285" x2="190" y2="315" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="296" width="8" height="6" fill="#ef5350" rx="1"/>

  <!-- Color flip annotation -->
