    <line x1="290" y1="125" x2="290" y2="100" stroke="#ef5350"/><rect x="286" y="105" width="8" height="12" fill="#ef5350" rx="1"/>
    <line x1="310" y1="130" x2="310" y2="108" stroke="#26a69a"/><rect x="306" y="112" width="8" height="10" fill="#26a69a" rx="1"/>
    <line x1="330" y1="140" x2="330" y2="115" stroke="#ef5350"/><rect x="326" y="118" width="8" height="14" fill="#ef5350" rx="1"/>
    <!-- Downtrend -->
    <line x1="350" y1="150" x2="350" y2="120" stroke="#ef5350"/><rect x="346" y="125" width="8" height="18" fill="#ef5350" rx="1"/>
    <line x1="370" y1="165" x2="370" y2="130" stroke="#ef5350"/><rect x="366" y="135" width="8" height="22" fill="#ef5350" rx="1"/>
    <line x1="390" y1="180" x2="390" y2="145" stroke="#ef5350"/><rect x="386" y="150" width="8" height="22" fill="#ef5350" rx="1"/>
    <line x1="410" y1="200" x2="410" y2="158" stroke="#ef5350"/><rect x="406" y="165" width="8" height="26" fill="#ef5350" rx="1"/>
    <line x1="430" y1="210" x2="430" y2="170" stroke="#ef5350"/><rect x="426" y="178" width="8" height="22" fill="#ef5350" rx="1"/>
    <line x1="450" y1="215" x2="450" y2="180" stroke="#26a69a"/><rect x="446" y="185" width="8" height="18" fill="#26a69a" rx="1"/>
    <line x1="470" y1="210" x2="470" y2="178" stroke="#26a69a"/><rect x="466" y="182" width="8" height="16" fill="#26a69a" rx="1"/>
    <line x1="490" y1="205" x2="490" y2="170" stroke="#26a69a"/><rect x="486" y="175" width="8" height="20" fill="#26a69a" rx="1"/>
    <!-- Recovery uptrend -->
    <line x1="510" y1="195" x2="510" y2="155" stroke="#26a69a"/><rect x="506" y="160" width="8" height="24" fill="#26a69a" rx="1"/>
    <line x1="530" y1="180" x2="530" y2="138" stroke="#26a69a"/><rect x="526" y="145" width="8" height="24" fill="#26a69a" rx="1"/>
    <line x1="550" y1="168" x2="550" y2="122" stroke="#26a69a"/><rect x="546" y="130" width="8" height="26" fill="#26a69a" rx="1"/>
    <line x1="570" y1="155" x2="570" y2="108" stroke="#26a69a"/><rect x="566" y="115" width="8" height="28" fill="#26a69a" rx="1"/>
    <line x1="590" y1="148" x2="590" y2="100" stroke="#26a69a"/><rect x="586" y="108" width="8" height="26" fill="#26a69a" rx="1"/>
    <line x1="610" y1="140" x2="610" y2="95" stroke="#26a69a"/><rect x="606" y="102" width="8" height="24" fill="#26a69a" rx="1"/>
    <line x1="630" y1="135" x2="630" y2="90" stroke="#26a69a"/><rect x="626" y="96" width="8" height="26" fill="#26a69a" rx="1"/>
    <line x1="650" y1="130" x2="650" y2="88" stroke="#ef5350"/><rect x="646" y="92" width="8" height="22" fill="#ef5350" rx="1"/>
    <line x1="670" y1="138" x2="670" y2="95" stroke="#ef5350"/><rect x="666" y="100" width="8" height="24" fill="#ef5350" rx="1"/>
    <line x1="690" y1="145" x2="690" y2="105" stroke="#26a69a"/><rect x="686" y="110" width="8" height="20" fill="#26a69a" rx="1"/>
    <line x1="710" y1="140" x2="710" y2="102" stroke="#26a69a"/><rect x="706" y="108" width="8" height="18" fill="#26a69a" rx="1"/>
