  <line x1="370" y1="105" x2="370" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="110" width="8" height="26" fill="#26a69a" rx="1"/>
  <line x1="390" y1="98" x2="390" y2="140" stroke="#ef5350" stroke-width="1"/>
