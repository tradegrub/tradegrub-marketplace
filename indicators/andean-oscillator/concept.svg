<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="430"/>
    <line x1="180" y1="60" x2="180" y2="430"/>
    <line x1="280" y1="60" x2="280" y2="430"/>
    <line x1="380" y1="60" x2="380" y2="430"/>
    <line x1="480" y1="60" x2="480" y2="430"/>
    <line x1="580" y1="60" x2="580" y2="430"/>
    <line x1="680" y1="60" x2="680" y2="430"/>
    <line x1="780" y1="60" x2="780" y2="430"/>
    <line x1="80" y1="100" x2="780" y2="100"/>
    <line x1="80" y1="152" x2="780" y2="152"/>
    <line x1="80" y1="200" x2="780" y2="200"/>
    <line x1="80" y1="300" x2="780" y2="300"/>
    <line x1="80" y1="348" x2="780" y2="348"/>
    <line x1="80" y1="400" x2="780" y2="400"/>
  </g>

  <!-- Zero line (dashed) -->
  <line x1="80" y1="245" x2="780" y2="245" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Bull envelope fill (green, above zero) -->
  <path d="M80,245 L110,230 L140,210 L170,185 L200,160 L230,140 L260,125 L290,135 L320,155 L350,175 L380,195 L410,210 L440,225 L470,215 L500,190 L530,165 L560,145 L590,130 L620,120 L650,135 L680,160 L710,185 L740,210 L770,230 L770,245 L80,245 Z"
        fill="#00e676" fill-opacity="0.12" stroke="none"/>

  <!-- Bear envelope fill (red, below zero) -->
  <path d="M80,245 L110,258 L140,275 L170,295 L200,315 L230,330 L260,345 L290,355 L320,340 L350,320 L380,300 L410,280 L440,265 L470,275 L500,300 L530,325 L560,345 L590,358 L620,365 L650,350 L680,325 L710,300 L740,275 L770,258 L770,245 L80,245 Z"
        fill="#ff1744" fill-opacity="0.12" stroke="none"/>

  <!-- Bull envelope curve (green) -->
  <path d="M80,245 L110,230 L140,210 L170,185 L200,160 L230,140 L260,125 L290,135 L320,155 L350,175 L380,195 L410,210 L440,225 L470,215 L500,190 L530,165 L560,145 L590,130 L620,120 L650,135 L680,160 L710,185 L740,210 L770,230"
        fill="none" stroke="#00e676" stroke-width="2" stroke-opacity="0.8" filter="url(#glow)"/>

  <!-- Bear envelope curve (red) -->
  <path d="M80,245 L110,258 L140,275 L170,295 L200,315 L230,330 L260,345 L290,355 L320,340 L350,320 L380,300 L410,280 L440,265 L470,275 L500,300 L530,325 L560,345 L590,358 L620,365 L650,350 L680,325 L710,300 L740,275 L770,258"
        fill="none" stroke="#ff1744" stroke-width="2" stroke-opacity="0.8" filter="url(#glow)"/>

  <!-- Signal line (cyan, net oscillator) -->
  <path d="M80,245 L110,240 L140,232 L170,220 L200,210 L230,205 L260,200 L290,215 L320,230 L350,242 L380,248 L410,252 L440,246 L470,240 L500,228 L530,215 L560,205 L590,198 L620,195 L650,210 L680,228 L710,242 L740,250 L770,248"
        fill="none" stroke="#00e5ff" stroke-width="2.2" stroke-opacity="0.95" filter="url(#glow)" stroke-linejoin="round"/>

  <!-- Y-axis labels -->
  <g fill="#ffffff" fill-opacity="0.35" font-family="monospace" font-size="10" text-anchor="end">
    <text x="74" y="128">0.8</text>
    <text x="74" y="180">0.4</text>
    <text x="74" y="248">0.0</text>
    <text x="74" y="315">-0.4</text>
    <text x="74" y="370">-0.8</text>
  </g>

  <!-- Title -->
  <text x="430" y="32" fill="#ffffff" font-family="sans-serif" font-size="17" font-weight="600" text-anchor="middle">Andean Oscillator</text>
  <text x="430" y="48" fill="#ffffff" fill-opacity="0.4" font-family="sans-serif" font-size="11" text-anchor="middle">tradegrub.finance</text>

  <!-- Legend bar -->
  <g transform="translate(200,455)" font-family="sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.7">
    <circle cx="0" cy="-3" r="4" fill="#00e676"/>
    <text x="10" y="0">Bull Component</text>
    <circle cx="140" cy="-3" r="4" fill="#ff1744"/>
    <text x="150" y="0">Bear Component</text>
    <circle cx="280" cy="-3" r="4" fill="#00e5ff"/>
    <text x="290" y="0">Signal</text>
  </g>
</svg>
