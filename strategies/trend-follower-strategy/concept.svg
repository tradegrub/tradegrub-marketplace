  <!-- Supertrend line - BEARISH (red, above price) for candles 1-9 -->
  <path d="M85,118 L110,128 L135,140 L160,152 L185,165 L210,178 L235,190 L260,200 L285,208" fill="none" stroke="#ef5350" stroke-width="2.5"/>

  <!-- Supertrend line - BULLISH (green, below price) for candles 10-22 -->
  <path d="M310,260 L335,252 L360,238 L385,225 L410,210 L435,198 L460,185 L485,172 L510,160 L535,148 L560,138 L585,130 L610,125" fill="none" stroke="#26a69a" stroke-width="2.5"/>

  <!-- Supertrend line - BEARISH (red, above price) for candles 23-28 -->
  <path d="M610,78 L635,78 L660,78 L685,78 L710,78 L735,78" fill="none" stroke="#ef5350" stroke-width="2.5"/>

  <!-- BUY signal at flip point x=310 -->
  <circle cx="310" cy="260" r="8" fill="none" stroke="#00e676" stroke-width="2" filter="url(#glow)"/>
  <line x1="310" y1="260" x2="310" y2="275" stroke="#00e676" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <g filter="url(#softGlow)">
    <polygon points="308,272 318,272 313,259" fill="#00e676"/>
  </g>
  <rect x="263" y="270" width="50" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="288" y="283" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- EXIT signal at flip point x=610 -->
  <circle cx="610" cy="78" r="8" fill="none" stroke="#ef5350" stroke-width="2" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="608,68 618,68 613,81" fill="#ef5350"/>
  </g>
  <rect x="620" y="62" width="50" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="645" y="75" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">EXIT</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="81" y="398" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="106" y="396" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="131" y="394" width="8" height="24" fill="#ef5350" rx="1"/>
    <rect x="156" y="396" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="181" y="398" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="206" y="400" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="231" y="402" width="8" height="16" fill="#ef5350" rx="1"/>
    <rect x="256" y="405" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="281" y="406" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="306" y="390" width="8" height="28" fill="#26a69a" rx="1"/>
    <rect x="331" y="392" width="8" height="26" fill="#26a69a" rx="1"/>
    <rect x="356" y="394" width="8" height="24" fill="#26a69a" rx="1"/>
    <rect x="381" y="396" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="406" y="398" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="431" y="400" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="456" y="402" width="8" height="16" fill="#26a69a" rx="1"/>
    <rect x="481" y="404" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="506" y="405" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="531" y="406" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="556" y="404" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="581" y="405" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="606" y="392" width="8" height="26" fill="#ef5350" rx="1"/>
    <rect x="631" y="394" width="8" height="24" fill="#ef5350" rx="1"/>
    <rect x="656" y="396" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="681" y="398" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="706" y="400" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="731" y="402" width="8" height="16" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <line x1="10" y1="20" x2="40" y2="20" stroke="#26a69a" stroke-width="2.5"/>
    <text x="48" y="24" fill="#999" font-size="9">Supertrend (Bullish)</text>
    <line x1="190" y1="20" x2="220" y2="20" stroke="#ef5350" stroke-width="2.5"/>
    <text x="228" y="24" fill="#999" font-size="9">Supertrend (Bearish)</text>
    <circle cx="400" cy="20" r="4" fill="#00e676"/>
    <text x="410" y="24" fill="#999" font-size="9">Buy Signal</text>
    <circle cx="500" cy="20" r="4" fill="#ef5350"/>
    <text x="510" y="24" fill="#999" font-size="9">Exit Signal</text>
  </g>
</svg>