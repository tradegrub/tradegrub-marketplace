<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="55" x2="80" y2="310"/>
    <line x1="200" y1="55" x2="200" y2="310"/>
    <line x1="320" y1="55" x2="320" y2="310"/>
    <line x1="440" y1="55" x2="440" y2="310"/>
    <line x1="560" y1="55" x2="560" y2="310"/>
    <line x1="680" y1="55" x2="680" y2="310"/>
    <line x1="60" y1="100" x2="760" y2="100"/>
    <line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
    <line x1="60" y1="280" x2="760" y2="280"/>
    <!-- Sub-pane grid -->
    <line x1="80" y1="330" x2="80" y2="440"/>
    <line x1="200" y1="330" x2="200" y2="440"/>
    <line x1="320" y1="330" x2="320" y2="440"/>
    <line x1="440" y1="330" x2="440" y2="440"/>
    <line x1="560" y1="330" x2="560" y2="440"/>
    <line x1="680" y1="330" x2="680" y2="440"/>
  </g>

  <!-- Titles -->
  <text x="400" y="28" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">SK-Learn Mean Reversion</text>
  <text x="400" y="46" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance -- Z-Score Mean Reversion Strategy</text>

  <!-- Pane divider -->
  <line x1="60" y1="318" x2="760" y2="318" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="65" y="335" fill="#888" font-size="8">Z-SCORE</text>
  <text x="65" y="68" fill="#888" font-size="8">PRICE</text>

  <!-- ============ MAIN PANE: Candlesticks ============ -->
  <!-- Uptrend phase -->
  <line x1="90" y1="250" x2="90" y2="275" stroke="#26a69a" stroke-width="1"/>
  <rect x="87" y="255" width="6" height="14" fill="#26a69a" rx="1"/>
  <line x1="110" y1="240" x2="110" y2="268" stroke="#26a69a" stroke-width="1"/>
  <rect x="107" y="244" width="6" height="16" fill="#26a69a" rx="1"/>
  <line x1="130" y1="228" x2="130" y2="258" stroke="#26a69a" stroke-width="1"/>
  <rect x="127" y="232" width="6" height="16" fill="#26a69a" rx="1"/>
  <line x1="150" y1="215" x2="150" y2="248" stroke="#ef5350" stroke-width="1"/>
  <rect x="147" y="220" width="6" height="16" fill="#ef5350" rx="1"/>
  <line x1="170" y1="200" x2="170" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="167" y="205" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="190" y1="185" x2="190" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="187" y="190" width="6" height="16" fill="#26a69a" rx="1"/>
  <line x1="210" y1="170" x2="210" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="207" y="175" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="230" y1="155" x2="230" y2="190" stroke="#26a69a" stroke-width="1"/>
  <rect x="227" y="160" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="250" y1="138" x2="250" y2="175" stroke="#26a69a" stroke-width="1"/>
  <rect x="247" y="143" width="6" height="18" fill="#26a69a" rx="1"/>
  <!-- Price overshoots EMA - z-score going high -->
  <line x1="270" y1="120" x2="270" y2="158" stroke="#26a69a" stroke-width="1"/>
  <rect x="267" y="125" width="6" height="20" fill="#26a69a" rx="1"/>
  <line x1="290" y1="108" x2="290" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="287" y="112" width="6" height="22" fill="#26a69a" rx="1"/>
  <line x1="310" y1="100" x2="310" y2="140" stroke="#26a69a" stroke-width="1"/>
  <rect x="307" y="105" width="6" height="20" fill="#26a69a" rx="1"/>
  <!-- Peak - SHORT signal here -->
  <line x1="330" y1="95" x2="330" y2="138" stroke="#26a69a" stroke-width="1"/>
  <rect x="327" y="100" width="6" height="22" fill="#26a69a" rx="1"/>

  <!-- SHORT entry marker -->
  <g filter="url(#softGlow)">
    <polygon points="327,92 333,92 330,82" fill="#ff1744" transform="rotate(180,330,87)"/>
  </g>
  <rect x="340" y="82" width="55" height="18" rx="4" fill="#ff1744" fill-opacity="0.15" stroke="#ff1744" stroke-width="1" stroke-opacity="0.4"/>
  <text x="367" y="94" text-anchor="middle" fill="#ff1744" font-size="9" font-weight="600">SHORT</text>

  <!-- Decline toward mean -->
  <line x1="350" y1="105" x2="350" y2="145" stroke="#ef5350" stroke-width="1"/>
  <rect x="347" y="110" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="370" y1="118" x2="370" y2="155" stroke="#ef5350" stroke-width="1"/>
  <rect x="367" y="122" width="6" height="20" fill="#ef5350" rx="1"/>
  <line x1="390" y1="130" x2="390" y2="168" stroke="#ef5350" stroke-width="1"/>
  <rect x="387" y="135" width="6" height="20" fill="#ef5350" rx="1"/>
  <line x1="410" y1="145" x2="410" y2="182" stroke="#ef5350" stroke-width="1"/>
  <rect x="407" y="150" width="6" height="18" fill="#ef5350" rx="1"/>

  <!-- EXIT at mean -->
  <line x1="430" y1="155" x2="430" y2="192" stroke="#26a69a" stroke-width="1"/>
  <rect x="427" y="162" width="6" height="18" fill="#26a69a" rx="1"/>
  <rect x="440" y="155" width="45" height="18" rx="4" fill="#888888" fill-opacity="0.15" stroke="#888888" stroke-width="1" stroke-opacity="0.4"/>
  <text x="462" y="167" text-anchor="middle" fill="#888888" font-size="9" font-weight="600">EXIT</text>

  <!-- Continued decline below mean -->
  <line x1="450" y1="168" x2="450" y2="205" stroke="#ef5350" stroke-width="1"/>
  <rect x="447" y="172" width="6" height="20" fill="#ef5350" rx="1"/>
  <line x1="470" y1="180" x2="470" y2="218" stroke="#ef5350" stroke-width="1"/>
  <rect x="467" y="185" width="6" height="20" fill="#ef5350" rx="1"/>
  <line x1="490" y1="195" x2="490" y2="232" stroke="#ef5350" stroke-width="1"/>
  <rect x="487" y="200" width="6" height="20" fill="#ef5350" rx="1"/>
  <line x1="510" y1="210" x2="510" y2="248" stroke="#ef5350" stroke-width="1"/>
  <rect x="507" y="215" width="6" height="20" fill="#ef5350" rx="1"/>
  <!-- Oversold zone - price far below EMA -->
  <line x1="530" y1="225" x2="530" y2="262" stroke="#ef5350" stroke-width="1"/>
  <rect x="527" y="230" width="6" height="20" fill="#ef5350" rx="1"/>
  <line x1="550" y1="238" x2="550" y2="278" stroke="#ef5350" stroke-width="1"/>
  <rect x="547" y="245" width="6" height="22" fill="#ef5350" rx="1"/>
  <line x1="570" y1="248" x2="570" y2="288" stroke="#ef5350" stroke-width="1"/>
  <rect x="567" y="255" width="6" height="22" fill="#ef5350" rx="1"/>

  <!-- LONG entry marker -->
  <line x1="590" y1="252" x2="590" y2="292" stroke="#00e676" stroke-width="1.5"/>
  <rect x="586" y="260" width="8" height="20" fill="#00e676" rx="1" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="586,295 594,295 590,305" fill="#00e676" transform="rotate(180,590,300)"/>
  </g>
  <rect x="600" y="272" width="50" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="625" y="284" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">LONG</text>

  <!-- Recovery -->
  <line x1="610" y1="242" x2="610" y2="278" stroke="#26a69a" stroke-width="1"/>
  <rect x="607" y="248" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="630" y1="230" x2="630" y2="265" stroke="#26a69a" stroke-width="1"/>
  <rect x="627" y="235" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="650" y1="218" x2="650" y2="252" stroke="#26a69a" stroke-width="1"/>
  <rect x="647" y="222" width="6" height="18" fill="#26a69a" rx="1"/>
  <line x1="670" y1="205" x2="670" y2="240" stroke="#26a69a" stroke-width="1"/>
  <rect x="667" y="210" width="6" height="18" fill="#26a69a" rx="1"/>

  <!-- EXIT at mean (second) -->
  <line x1="690" y1="192" x2="690" y2="228" stroke="#26a69a" stroke-width="1"/>
  <rect x="687" y="198" width="6" height="18" fill="#26a69a" rx="1"/>
  <rect x="700" y="192" width="45" height="18" rx="4" fill="#888888" fill-opacity="0.15" stroke="#888888" stroke-width="1" stroke-opacity="0.4"/>
  <text x="722" y="204" text-anchor="middle" fill="#888888" font-size="9" font-weight="600">EXIT</text>

  <!-- EMA smoothed line -->
  <path d="M 90,262 Q 130,248 170,230 Q 210,210 250,190 Q 290,170 330,155 Q 370,148 410,150 Q 450,158 490,170 Q 530,185 570,198 Q 610,205 650,200 Q 670,195 690,192" fill="none" stroke="#ff9800" stroke-width="2.5" opacity="0.7"/>
  <text x="710" y="190" fill="#ff9800" font-size="9" font-weight="500">EMA</text>

  <!-- Overbought shaded zone (main pane, around bars 270-340) -->
  <rect x="260" y="55" width="90" height="260" fill="#ef5350" fill-opacity="0.04" rx="2"/>

  <!-- Oversold shaded zone (main pane, around bars 530-590) -->
  <rect x="520" y="55" width="80" height="260" fill="#00e676" fill-opacity="0.04" rx="2"/>

  <!-- ============ SUB-PANE: Z-Score ============ -->
  <!-- Z-score horizontal reference lines -->
  <line x1="60" y1="345" x2="760" y2="345" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="762" y="348" fill="#ef5350" font-size="8">+2</text>
  <line x1="60" y1="385" x2="760" y2="385" stroke="#888888" stroke-width="1" stroke-dasharray="2,3" opacity="0.3"/>
  <text x="762" y="388" fill="#888888" font-size="8">0</text>
  <line x1="60" y1="425" x2="760" y2="425" stroke="#00e676" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="762" y="428" fill="#00e676" font-size="8">-2</text>

  <!-- Overbought shaded zone in sub-pane -->
  <rect x="60" y="330" width="700" height="15" fill="#ef5350" fill-opacity="0.05" rx="1"/>
  <!-- Oversold shaded zone in sub-pane -->
  <rect x="60" y="425" width="700" height="15" fill="#00e676" fill-opacity="0.05" rx="1"/>

  <!-- Z-score line -->
  <path d="M 90,385 Q 110,382 130,378 Q 150,372 170,365 Q 190,358 210,352 Q 230,348 250,345 Q 270,340 290,336 Q 310,334 330,332 Q 350,338 370,348 Q 390,358 410,370 Q 430,382 440,385 Q 460,392 480,400 Q 500,408 520,418 Q 540,425 560,430 Q 570,432 580,430 Q 590,428 600,420 Q 610,410 620,398 Q 640,388 650,385 Q 670,382 690,384" fill="none" stroke="#ff9800" stroke-width="2" filter="url(#softGlow)"/>

  <!-- Z-score peak marker (SHORT trigger at +2) -->
  <circle cx="330" cy="332" r="5" fill="none" stroke="#ff1744" stroke-width="2" filter="url(#softGlow)"/>
  <polygon points="327,327 333,327 330,321" fill="#ff1744"/>

  <!-- Z-score trough marker (LONG trigger at -2) -->
  <circle cx="560" cy="430" r="5" fill="none" stroke="#00e676" stroke-width="2" filter="url(#softGlow)"/>
  <polygon points="557,435 563,435 560,441" fill="#00e676"/>

  <!-- Z-score zero cross markers (EXIT) -->
  <circle cx="440" cy="385" r="4" fill="#888888" fill-opacity="0.5"/>
  <circle cx="650" cy="385" r="4" fill="#888888" fill-opacity="0.5"/>

  <!-- Spread visualization (thin line in sub-pane, offset) -->
  <path d="M 90,385 Q 130,380 170,370 Q 210,358 250,348 Q 290,338 330,335 Q 370,345 410,365 Q 450,382 470,390 Q 510,405 550,425 Q 570,428 590,418 Q 620,400 650,387 Q 670,384 690,385" fill="none" stroke="#42a5f5" stroke-width="1" opacity="0.4" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <g transform="translate(60, 455)">
    <rect width="700" height="36" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <rect x="15" y="12" width="12" height="12" fill="#26a69a" rx="2"/>
    <text x="32" y="22" fill="#999" font-size="9">Price</text>
    <line x1="90" y1="18" x2="110" y2="18" stroke="#ff9800" stroke-width="2.5"/>
    <text x="115" y="22" fill="#999" font-size="9">Smoothed (EMA)</text>
    <line x1="210" y1="18" x2="230" y2="18" stroke="#ff9800" stroke-width="2"/>
    <text x="235" y="22" fill="#999" font-size="9">Z-Score</text>
    <line x1="300" y1="18" x2="320" y2="18" stroke="#42a5f5" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="325" y="22" fill="#999" font-size="9">Spread</text>
    <polygon points="390,22 396,22 393,14" fill="#00e676"/>
    <text x="402" y="22" fill="#999" font-size="9">Long Entry</text>
    <polygon points="478,14 484,14 481,22" fill="#ff1744"/>
    <text x="490" y="22" fill="#999" font-size="9">Short Entry</text>
    <circle cx="570" cy="18" r="4" fill="#888888" fill-opacity="0.5"/>
    <text x="580" y="22" fill="#999" font-size="9">Exit (Mean)</text>
    <rect x="645" y="12" width="12" height="12" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="0.5" rx="2"/>
    <text x="662" y="22" fill="#999" font-size="9">OB/OS</text>
  </g>
</svg>
