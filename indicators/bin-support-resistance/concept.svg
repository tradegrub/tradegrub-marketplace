<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="chartClip"><rect x="60" y="45" width="440" height="390"/></clipPath>
    <clipPath id="histClip"><rect x="520" y="45" width="240" height="390"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="white" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="105" x2="760" y2="105"/>
    <line x1="60" y1="165" x2="760" y2="165"/>
    <line x1="60" y1="225" x2="760" y2="225"/>
    <line x1="60" y1="285" x2="760" y2="285"/>
    <line x1="60" y1="345" x2="760" y2="345"/>
    <line x1="60" y1="405" x2="760" y2="405"/>
    <line x1="160" y1="45" x2="160" y2="435"/>
    <line x1="260" y1="45" x2="260" y2="435"/>
    <line x1="360" y1="45" x2="360" y2="435"/>
    <line x1="460" y1="45" x2="460" y2="435"/>
    <line x1="560" y1="45" x2="560" y2="435"/>
    <line x1="660" y1="45" x2="660" y2="435"/>
  </g>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="17" font-weight="bold">Bin Support &amp; Resistance</text>
  <text x="400" y="42" text-anchor="middle" fill="#8888aa" font-family="Arial, sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Chart border -->
  <rect x="60" y="45" width="440" height="390" fill="none" stroke="white" stroke-opacity="0.08" rx="2"/>
  <rect x="520" y="45" width="240" height="390" fill="none" stroke="white" stroke-opacity="0.08" rx="2"/>

  <!-- Section labels -->
  <text x="515" y="38" text-anchor="end" fill="#8888aa" font-family="Arial, sans-serif" font-size="9">PRICE</text>
  <text x="525" y="38" fill="#8888aa" font-family="Arial, sans-serif" font-size="9">FREQUENCY</text>

  <!-- S/R dashed levels across price chart -->
  <line x1="60" y1="120" x2="500" y2="120" stroke="#ffd700" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.7" filter="url(#glow)"/>
  <line x1="60" y1="195" x2="500" y2="195" stroke="#ffd700" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.5"/>
  <line x1="60" y1="330" x2="500" y2="330" stroke="#00e5ff" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.7" filter="url(#glow)"/>
  <line x1="60" y1="390" x2="500" y2="390" stroke="#00e5ff" stroke-width="1" stroke-dasharray="6,4" stroke-opacity="0.5"/>

  <!-- Price line (white) -->
  <polyline
    clip-path="url(#chartClip)"
    fill="none" stroke="white" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"
    filter="url(#glow)"
    points="
      70,350 85,340 100,320 115,330 130,310 145,295 160,280
      175,260 190,240 205,200 220,180 235,130 250,125 265,140
      280,160 295,190 310,200 325,210 340,195 355,180 370,195
      385,220 400,260 415,300 430,330 445,340 460,390 475,380
      490,370
    "
  />

  <!-- Histogram bars (horizontal, from right edge leftward) -->
  <g clip-path="url(#histClip)">
    <rect x="660" y="50"  width="100" height="26" fill="#7b2ff7" fill-opacity="0.35" rx="2"/>
    <rect x="710" y="78"  width="50"  height="26" fill="#7b2ff7" fill-opacity="0.25" rx="2"/>
    <rect x="570" y="106" width="190" height="26" fill="#7b2ff7" fill-opacity="0.55" rx="2"/>
    <rect x="620" y="134" width="140" height="26" fill="#7b2ff7" fill-opacity="0.4" rx="2"/>
    <rect x="680" y="162" width="80"  height="26" fill="#7b2ff7" fill-opacity="0.3" rx="2"/>
    <rect x="600" y="183" width="160" height="26" fill="#7b2ff7" fill-opacity="0.5" rx="2"/>
    <rect x="660" y="211" width="100" height="26" fill="#7b2ff7" fill-opacity="0.35" rx="2"/>
    <rect x="710" y="239" width="50"  height="26" fill="#7b2ff7" fill-opacity="0.2" rx="2"/>
    <rect x="700" y="267" width="60"  height="26" fill="#7b2ff7" fill-opacity="0.25" rx="2"/>
    <rect x="690" y="295" width="70"  height="26" fill="#7b2ff7" fill-opacity="0.28" rx="2"/>
    <rect x="580" y="318" width="180" height="26" fill="#7b2ff7" fill-opacity="0.55" rx="2"/>
    <rect x="640" y="346" width="120" height="26" fill="#7b2ff7" fill-opacity="0.4" rx="2"/>
    <rect x="560" y="374" width="200" height="26" fill="#7b2ff7" fill-opacity="0.6" rx="2"/>
    <rect x="650" y="402" width="110" height="26" fill="#7b2ff7" fill-opacity="0.35" rx="2"/>
  </g>

  <!-- Histogram S/R markers -->
  <line x1="520" y1="120" x2="760" y2="120" stroke="#ffd700" stroke-width="0.8" stroke-dasharray="3,3" stroke-opacity="0.4"/>
  <line x1="520" y1="195" x2="760" y2="195" stroke="#ffd700" stroke-width="0.8" stroke-dasharray="3,3" stroke-opacity="0.3"/>
  <line x1="520" y1="330" x2="760" y2="330" stroke="#00e5ff" stroke-width="0.8" stroke-dasharray="3,3" stroke-opacity="0.4"/>
  <line x1="520" y1="390" x2="760" y2="390" stroke="#00e5ff" stroke-width="0.8" stroke-dasharray="3,3" stroke-opacity="0.3"/>

  <!-- Y-axis price labels -->
  <text x="55" y="123" text-anchor="end" fill="#aaa" font-family="Arial, sans-serif" font-size="9">185</text>
  <text x="55" y="198" text-anchor="end" fill="#aaa" font-family="Arial, sans-serif" font-size="9">170</text>
  <text x="55" y="273" text-anchor="end" fill="#aaa" font-family="Arial, sans-serif" font-size="9">155</text>
  <text x="55" y="333" text-anchor="end" fill="#aaa" font-family="Arial, sans-serif" font-size="9">143</text>
  <text x="55" y="393" text-anchor="end" fill="#aaa" font-family="Arial, sans-serif" font-size="9">130</text>

  <!-- Legend bar -->
  <g transform="translate(0,455)">
    <circle cx="180" cy="0" r="5" fill="white"/>
    <text x="190" y="4" fill="#ccc" font-family="Arial, sans-serif" font-size="11">Price</text>
    <circle cx="280" cy="0" r="5" fill="#ffd700"/>
    <text x="290" y="4" fill="#ccc" font-family="Arial, sans-serif" font-size="11">Resistance</text>
    <circle cx="400" cy="0" r="5" fill="#00e5ff"/>
    <text x="410" y="4" fill="#ccc" font-family="Arial, sans-serif" font-size="11">Support</text>
    <circle cx="500" cy="0" r="5" fill="#7b2ff7" fill-opacity="0.6"/>
    <text x="510" y="4" fill="#ccc" font-family="Arial, sans-serif" font-size="11">Frequency Bins</text>
  </g>
</svg>
