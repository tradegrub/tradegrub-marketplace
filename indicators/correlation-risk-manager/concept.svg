<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Correlation Risk Manager</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart area -->
  <rect x="60" y="70" width="700" height="160" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="88" fill="#888" font-family="Inter,sans-serif" font-size="10">Price</text>
  <!-- Candlesticks -->
  <line x1="100" y1="120" x2="100" y2="180" stroke="#555" stroke-width="1"/>
  <rect x="96" y="130" width="8" height="35" fill="#4CAF50" rx="1"/>
  <line x1="150" y1="110" x2="150" y2="175" stroke="#555" stroke-width="1"/>
  <rect x="146" y="115" width="8" height="40" fill="#4CAF50" rx="1"/>
  <line x1="200" y1="100" x2="200" y2="165" stroke="#555" stroke-width="1"/>
  <rect x="196" y="105" width="8" height="38" fill="#4CAF50" rx="1"/>
  <line x1="250" y1="95" x2="250" y2="155" stroke="#555" stroke-width="1"/>
  <rect x="246" y="100" width="8" height="35" fill="#4CAF50" rx="1"/>
  <line x1="300" y1="100" x2="300" y2="160" stroke="#555" stroke-width="1"/>
  <rect x="296" y="110" width="8" height="35" fill="#f44336" rx="1"/>
  <line x1="350" y1="115" x2="350" y2="175" stroke="#555" stroke-width="1"/>
  <rect x="346" y="125" width="8" height="38" fill="#f44336" rx="1"/>
  <line x1="400" y1="130" x2="400" y2="185" stroke="#555" stroke-width="1"/>
  <rect x="396" y="135" width="8" height="35" fill="#f44336" rx="1"/>
  <line x1="450" y1="125" x2="450" y2="180" stroke="#555" stroke-width="1"/>
  <rect x="446" y="130" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="500" y1="115" x2="500" y2="170" stroke="#555" stroke-width="1"/>
  <rect x="496" y="120" width="8" height="32" fill="#4CAF50" rx="1"/>
  <line x1="550" y1="105" x2="550" y2="165" stroke="#555" stroke-width="1"/>
  <rect x="546" y="110" width="8" height="36" fill="#4CAF50" rx="1"/>
  <line x1="600" y1="100" x2="600" y2="155" stroke="#555" stroke-width="1"/>
  <rect x="596" y="105" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="650" y1="95" x2="650" y2="150" stroke="#555" stroke-width="1"/>
  <rect x="646" y="100" width="8" height="28" fill="#4CAF50" rx="1"/>
  <line x1="700" y1="90" x2="700" y2="145" stroke="#555" stroke-width="1"/>
  <rect x="696" y="95" width="8" height="30" fill="#4CAF50" rx="1"/>

  <!-- Risk score subplot -->
  <rect x="60" y="250" width="700" height="180" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="268" fill="#888" font-family="Inter,sans-serif" font-size="10">Risk Score</text>

  <!-- Danger zone background -->
  <rect x="280" y="260" width="180" height="30" fill="rgba(244,67,54,0.15)" rx="2"/>
  <!-- Warning zone background -->
  <rect x="220" y="290" width="300" height="20" fill="rgba(255,152,0,0.10)" rx="2"/>

  <!-- Warning threshold line -->
  <line x1="60" y1="310" x2="760" y2="310" stroke="#ffeb3b" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="765" y="314" fill="#ffeb3b" font-family="Inter,sans-serif" font-size="9" opacity="0.7">0.70</text>

  <!-- Danger threshold line -->
  <line x1="60" y1="280" x2="760" y2="280" stroke="#f44336" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="765" y="284" fill="#f44336" font-family="Inter,sans-serif" font-size="9" opacity="0.7">0.85</text>

  <!-- Risk score line (orange) -->
  <polyline points="100,400 150,385 200,360 250,330 300,290 350,270 400,275 450,310 500,340 550,370 600,380 650,390 700,395"
    fill="none" stroke="#ff9800" stroke-width="2.5"/>

  <!-- Price-volume correlation line (blue) -->
  <polyline points="100,410 150,390 200,370 250,345 300,300 350,285 400,295 450,325 500,355 550,385 600,395 650,405 700,410"
    fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.7"/>

  <!-- Annotations -->
  <text x="340" y="262" fill="#f44336" font-family="Inter,sans-serif" font-size="10" text-anchor="middle">DANGER ZONE</text>
  <text x="540" y="350" fill="#4CAF50" font-family="Inter,sans-serif" font-size="10">Safe</text>

  <!-- Legend -->
  <rect x="60" y="455" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="470" x2="100" y2="470" stroke="#ff9800" stroke-width="2.5"/>
  <text x="105" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Risk Score</text>
  <line x1="210" y1="470" x2="230" y2="470" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="235" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Price-Vol Corr</text>
  <line x1="370" y1="470" x2="390" y2="470" stroke="#ffeb3b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="395" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Warning</text>
  <line x1="480" y1="470" x2="500" y2="470" stroke="#f44336" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="505" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Danger</text>
</svg>
