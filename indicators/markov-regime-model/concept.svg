<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="trendZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="rangeZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a1e5f" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3a1e5f" stop-opacity="0.2"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4fc3f7" fill-opacity="0.7"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#b388ff" fill-opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="600">Markov Regime Oscillator</text>
  <text x="400" y="48" text-anchor="middle" fill="#6a6a8a" font-size="11">tradegrub.finance</text>

  <!-- ============ STATE DIAGRAM (top section) ============ -->

  <!-- Trending node -->
  <circle cx="240" cy="130" r="52" fill="none" stroke="#4fc3f7" stroke-width="2" filter="url(#glowStrong)"/>
  <circle cx="240" cy="130" r="52" fill="#1e3a5f" fill-opacity="0.4"/>
  <text x="240" y="125" text-anchor="middle" fill="#4fc3f7" font-size="14" font-weight="600">Trending</text>
  <text x="240" y="143" text-anchor="middle" fill="#4fc3f7" font-size="10" fill-opacity="0.7">State 1</text>

  <!-- Ranging node -->
  <circle cx="560" cy="130" r="52" fill="none" stroke="#b388ff" stroke-width="2" filter="url(#glowStrong)"/>
  <circle cx="560" cy="130" r="52" fill="#3a1e5f" fill-opacity="0.4"/>
  <text x="560" y="125" text-anchor="middle" fill="#b388ff" font-size="14" font-weight="600">Ranging</text>
  <text x="560" y="143" text-anchor="middle" fill="#b388ff" font-size="10" fill-opacity="0.7">State 2</text>

  <!-- Self-loop: Trending stays (top arc) -->
  <path d="M210,85 C180,30 300,30 270,85" fill="none" stroke="#4fc3f7" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrowBlue)"/>
  <text x="240" y="45" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="500">P = 0.85</text>

  <!-- Self-loop: Ranging stays (top arc) -->
  <path d="M530,85 C500,30 620,30 590,85" fill="none" stroke="#b388ff" stroke-width="1.5" stroke-opacity="0.6" marker-end="url(#arrowPurple)"/>
  <text x="560" y="45" text-anchor="middle" fill="#b388ff" font-size="11" font-weight="500">P = 0.85</text>

  <!-- Transition arrow: Trending to Ranging (top curve) -->
  <path d="M295,110 C370,70 430,70 505,110" fill="none" stroke="#8ecfff" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <text x="400" y="82" text-anchor="middle" fill="#aabbdd" font-size="10">P = 0.15</text>

  <!-- Transition arrow: Ranging to Trending (bottom curve) -->
  <path d="M505,150 C430,190 370,190 295,150" fill="none" stroke="#c9a0ff" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)"/>
  <text x="400" y="195" text-anchor="middle" fill="#aabbdd" font-size="10">P = 0.15</text>

  <!-- Divider -->
  <line x1="60" y1="220" x2="740" y2="220" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- ============ PRICE CHART WITH REGIME BACKGROUNDS ============ -->

  <!-- Regime background zones -->
  <!-- Trending zone 1 -->
  <rect x="60" y="230" width="140" height="130" fill="url(#trendZone)" opacity="0.6"/>
  <!-- Ranging zone -->
  <rect x="200" y="230" width="160" height="130" fill="url(#rangeZone)" opacity="0.6"/>
  <!-- Trending zone 2 -->
  <rect x="360" y="230" width="180" height="130" fill="url(#trendZone)" opacity="0.6"/>
  <!-- Ranging zone 2 -->
  <rect x="540" y="230" width="100" height="130" fill="url(#rangeZone)" opacity="0.6"/>
  <!-- Trending zone 3 -->
  <rect x="640" y="230" width="100" height="130" fill="url(#trendZone)" opacity="0.6"/>

  <!-- Zone labels -->
  <text x="130" y="245" text-anchor="middle" fill="#4fc3f7" font-size="8" fill-opacity="0.5">TREND</text>
  <text x="280" y="245" text-anchor="middle" fill="#b388ff" font-size="8" fill-opacity="0.5">RANGE</text>
  <text x="450" y="245" text-anchor="middle" fill="#4fc3f7" font-size="8" fill-opacity="0.5">TREND</text>
  <text x="590" y="245" text-anchor="middle" fill="#b388ff" font-size="8" fill-opacity="0.5">RANGE</text>
  <text x="690" y="245" text-anchor="middle" fill="#4fc3f7" font-size="8" fill-opacity="0.5">TREND</text>

  <!-- Price line -->
  <polyline points="60,340 90,335 110,320 130,300 160,280 190,270 210,275 240,280 270,285 290,278 320,282 350,276 380,260 410,245 440,255 470,250 500,240 530,248 550,255 570,260 590,258 620,262 650,250 680,235 710,242 740,230"
    fill="none" stroke="#e0e0e0" stroke-width="1.8" filter="url(#glow)"/>

  <!-- Y-axis labels for price -->
  <text x="52" y="260" text-anchor="end" fill="#666688" font-size="8">High</text>
  <text x="52" y="345" text-anchor="end" fill="#666688" font-size="8">Low</text>

  <!-- ============ TRANSITION PROBABILITY OSCILLATOR ============ -->

  <!-- Oscillator area -->
  <line x1="60" y1="375" x2="740" y2="375" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5"/>
  <!-- 0.5 midline -->
  <line x1="60" y1="410" x2="740" y2="410" stroke="#ffffff" stroke-opacity="0.04" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="60" y1="445" x2="740" y2="445" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5"/>

  <!-- Y-axis for oscillator -->
  <text x="52" y="380" text-anchor="end" fill="#666688" font-size="8">1.0</text>
  <text x="52" y="414" text-anchor="end" fill="#666688" font-size="8">0.5</text>
  <text x="52" y="449" text-anchor="end" fill="#666688" font-size="8">0.0</text>

  <!-- Label -->
  <text x="60" y="370" fill="#7a7a9a" font-size="9">Transition Probability</text>

  <!-- Probability oscillator line -->
  <polyline points="60,440 80,438 100,430 120,410 140,395 160,385 180,390 200,415 220,430 240,435 260,438 280,432 300,428 320,420 340,400 360,385 380,380 400,382 420,388 440,392 460,390 480,385 500,380 520,388 540,410 560,425 580,435 590,438 610,432 630,415 650,395 680,382 700,385 720,390 740,398"
    fill="none" stroke="#ffab40" stroke-width="1.5" filter="url(#glow)" stroke-opacity="0.9"/>

  <!-- Threshold line at 0.5 -->
  <text x="745" y="414" fill="#666688" font-size="7">thresh</text>

  <!-- ============ LEGEND BAR ============ -->
  <rect x="60" y="468" width="680" height="24" fill="#111128" fill-opacity="0.6" rx="4"/>

  <!-- Trending indicator -->
  <rect x="80" y="474" width="10" height="10" fill="#4fc3f7" rx="2" fill-opacity="0.8"/>
  <text x="96" y="483" fill="#aaaacc" font-size="10">Trending State</text>

  <!-- Ranging indicator -->
  <rect x="210" y="474" width="10" height="10" fill="#b388ff" rx="2" fill-opacity="0.8"/>
  <text x="226" y="483" fill="#aaaacc" font-size="10">Ranging State</text>

  <!-- Price -->
  <line x1="340" y1="479" x2="360" y2="479" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="366" y="483" fill="#aaaacc" font-size="10">Price</text>

  <!-- Transition prob -->
  <line x1="430" y1="479" x2="450" y2="479" stroke="#ffab40" stroke-width="1.5"/>
  <text x="456" y="483" fill="#aaaacc" font-size="10">Transition Prob</text>

  <!-- Self-loop prob -->
  <text x="590" y="483" fill="#6a6a8a" font-size="10">P(stay) = 0.85  P(switch) = 0.15</text>
</svg>