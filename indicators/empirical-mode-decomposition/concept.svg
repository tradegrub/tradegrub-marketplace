<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Empirical Mode Decomposition</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- IMF 1 - High frequency -->
  <rect x="60" y="70" width="700" height="110" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="75" y="88" fill="#42A5F5" font-family="Inter,sans-serif" font-size="10">IMF 1 (Fast)</text>
  <line x1="60" y1="125" x2="760" y2="125" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
  <polyline points="90,125 110,105 130,140 150,110 170,135 190,115 210,130 230,120 250,135 270,110 290,140 310,105 330,135 350,115 370,130 390,120 410,135 430,110 450,140 470,105 490,130 510,120 530,135 550,110 570,130 590,115 610,135 630,120 650,130 670,115 690,130 710,120 730,125" fill="none" stroke="#42A5F5" stroke-width="1.5"/>

  <!-- IMF 2 - Medium frequency -->
  <rect x="60" y="190" width="700" height="110" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="75" y="208" fill="#AB47BC" font-family="Inter,sans-serif" font-size="10">IMF 2 (Medium)</text>
  <line x1="60" y1="245" x2="760" y2="245" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
  <polyline points="90,245 130,225 170,210 210,220 250,240 290,260 330,270 370,255 410,235 450,220 490,215 530,225 570,245 610,260 650,265 690,250 730,240" fill="none" stroke="#AB47BC" stroke-width="1.5"/>

  <!-- IMF 3 - Low frequency -->
  <rect x="60" y="310" width="700" height="110" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="75" y="328" fill="#FFA726" font-family="Inter,sans-serif" font-size="10">IMF 3 (Slow)</text>
  <line x1="60" y1="365" x2="760" y2="365" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
  <polyline points="90,365 150,350 210,340 270,335 330,340 390,355 450,370 510,380 570,375 630,360 690,350 730,345" fill="none" stroke="#FFA726" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="150" y="445" width="500" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="180" y1="460" x2="210" y2="460" stroke="#42A5F5" stroke-width="2"/>
  <text x="215" y="464" fill="#aaa" font-family="Inter,sans-serif" font-size="10">IMF 1</text>
  <line x1="290" y1="460" x2="320" y2="460" stroke="#AB47BC" stroke-width="2"/>
  <text x="325" y="464" fill="#aaa" font-family="Inter,sans-serif" font-size="10">IMF 2</text>
  <line x1="400" y1="460" x2="430" y2="460" stroke="#FFA726" stroke-width="2"/>
  <text x="435" y="464" fill="#aaa" font-family="Inter,sans-serif" font-size="10">IMF 3</text>
  <text x="530" y="464" fill="#666" font-family="Inter,sans-serif" font-size="10">Adaptive Decomposition</text>
</svg>