<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bandFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">ATR Range Expansion Breakout</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- ATR band fill -->
  <polygon points="90,155 150,160 210,158 270,162 330,155 390,150 450,148 510,145 540,120 570,115 600,110 630,108 660,112 690,108 720,105 720,230 690,232 660,238 630,235 600,240 570,245 540,250 510,260 450,255 390,260 330,265 270,262 210,258 150,260 90,255" fill="url(#bandFill)"/>

  <!-- Moving average (basis) -->
  <polyline points="90,205 150,210 210,208 270,212 330,210 390,205 450,200 510,195 540,185 570,180 600,175 630,170 660,172 690,168 720,165" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.6"/>
  <text x="725" y="169" fill="#42a5f5" font-size="9">MA Basis</text>

  <!-- Upper ATR band -->
  <polyline points="90,155 150,160 210,158 270,162 330,155 390,150 450,148 510,145 540,120 570,115 600,110 630,108 660,112 690,108 720,105" fill="none" stroke="#26a69a" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="725" y="109" fill="#26a69a" font-size="9">MA + ATR</text>

  <!-- Lower ATR band -->
  <polyline points="90,255 150,260 210,258 270,262 330,265 390,260 450,255 510,260 540,250 570,245 600,240 630,235 660,238 690,232 720,230" fill="none" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="725" y="234" fill="#ef5350" font-size="9">MA - ATR</text>

  <!-- Candles inside band range -->
  <line x1="100" y1="190" x2="100" y2="230" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="200" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="130" y1="195" x2="130" y2="235" stroke="#ef5350" stroke-width="1"/>
  <rect x="126" y="200" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="160" y1="192" x2="160" y2="232" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="198" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="190" y1="200" x2="190" y2="238" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="205" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="220" y1="195" x2="220" y2="230" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="200" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="250" y1="198" x2="250" y2="238" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="205" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="280" y1="195" x2="280" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="276" y="202" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="310" y1="192" x2="310" y2="228" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="198" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="340" y1="188" x2="340" y2="225" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="192" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="370" y1="185" x2="370" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="190" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="400" y1="182" x2="400" y2="218" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="188" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="430" y1="178" x2="430" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="426" y="182" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="460" y1="175" x2="460" y2="210" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="180" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="490" y1="170" x2="490" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="486" y="175" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- BREAKOUT candle above upper band -->
  <line x1="525" y1="105" x2="525" y2="160" stroke="#00e676" stroke-width="1.5"/>
  <rect x="519" y="110" width="12" height="40" fill="#00e676" rx="1" filter="url(#glow)"/>

  <!-- Breakout arrow -->
  <g filter="url(#softGlow)">
    <polygon points="525,100 535,100 530,88" fill="#00e676"/>
  </g>
  <rect x="540" y="82" width="145" height="20" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="612" y="96" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BREAKOUT above ATR band</text>

  <!-- Post-breakout candles -->
  <line x1="555" y1="95" x2="555" y2="135" stroke="#26a69a" stroke-width="1"/>
  <rect x="551" y="100" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="585" y1="88" x2="585" y2="128" stroke="#26a69a" stroke-width="1"/>
  <rect x="581" y="93" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="615" y1="82" x2="615" y2="120" stroke="#ef5350" stroke-width="1"/>
  <rect x="611" y="86" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="645" y1="78" x2="645" y2="115" stroke="#26a69a" stroke-width="1"/>
  <rect x="641" y="82" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="675" y1="72" x2="675" y2="108" stroke="#26a69a" stroke-width="1"/>
  <rect x="671" y="76" width="8" height="25" fill="#26a69a" rx="1"/>

  <!-- Entry / Stop / TP lines -->
  <line x1="520" y1="110" x2="720" y2="110" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="725" y="114" fill="#42a5f5" font-size="10">Entry</text>

  <line x1="520" y1="160" x2="720" y2="160" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="725" y="164" fill="#ef5350" font-size="10">Stop Loss</text>

  <!-- ATR band width annotation -->
  <line x1="470" y1="148" x2="470" y2="195" stroke="#888" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
  <text x="478" y="175" fill="#888" font-size="9">ATR Width</text>
  <line x1="467" y1="148" x2="473" y2="148" stroke="#888" stroke-width="1" opacity="0.5"/>
  <line x1="467" y1="195" x2="473" y2="195" stroke="#888" stroke-width="1" opacity="0.5"/>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="126" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="156" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="186" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="216" y="405" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="246" y="403" width="8" height="12" fill="#ef5350" rx="1"/>
    <rect x="276" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="306" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="336" y="405" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="366" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="396" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="426" y="405" width="8" height="10" fill="#ef5350" rx="1"/>
    <rect x="456" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="486" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
  </g>
  <rect x="519" y="378" width="12" height="37" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="551" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="581" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="611" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="641" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="671" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">MA Basis</text>
    <circle cx="110" cy="20" r="4" fill="#26a69a"/>
    <text x="120" y="24" fill="#999" font-size="9">Upper ATR Band</text>
    <circle cx="240" cy="20" r="4" fill="#ef5350"/>
    <text x="250" y="24" fill="#999" font-size="9">Lower ATR Band</text>
    <circle cx="380" cy="20" r="4" fill="#00e676"/>
    <text x="390" y="24" fill="#999" font-size="9">Breakout Signal</text>
    <rect x="510" y="12" width="20" height="16" fill="#42a5f5" opacity="0.3" rx="2"/>
    <text x="535" y="24" fill="#999" font-size="9">ATR Channel Fill</text>
  </g>
</svg>