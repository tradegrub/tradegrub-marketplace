<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="600">Ease of Movement</text>
  <text x="400" y="48" text-anchor="middle" fill="#6a6a8a" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="60" y1="100" x2="740" y2="100"/>
    <line x1="60" y1="150" x2="740" y2="150"/>
    <line x1="60" y1="200" x2="740" y2="200"/>
    <line x1="60" y1="250" x2="740" y2="250"/>
    <line x1="60" y1="300" x2="740" y2="300"/>
    <line x1="60" y1="350" x2="740" y2="350"/>
    <line x1="60" y1="400" x2="740" y2="400"/>
    <line x1="150" y1="60" x2="150" y2="420"/>
    <line x1="260" y1="60" x2="260" y2="420"/>
    <line x1="370" y1="60" x2="370" y2="420"/>
    <line x1="480" y1="60" x2="480" y2="420"/>
    <line x1="590" y1="60" x2="590" y2="420"/>
    <line x1="700" y1="60" x2="700" y2="420"/>
  </g>

  <!-- Panel separator -->
  <line x1="60" y1="265" x2="740" y2="265" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>

  <!-- Upper panel: Candlesticks (y 60-250) -->
  <g>
    <!-- Green candles (bullish) -->
    <line x1="95" y1="110" x2="95" y2="195" stroke="#4caf50" stroke-width="1"/>
    <rect x="90" y="130" width="10" height="40" fill="#4caf50" rx="1"/>

    <line x1="130" y1="100" x2="130" y2="180" stroke="#4caf50" stroke-width="1"/>
    <rect x="125" y="115" width="10" height="35" fill="#4caf50" rx="1"/>

    <line x1="200" y1="95" x2="200" y2="175" stroke="#4caf50" stroke-width="1"/>
    <rect x="195" y="108" width="10" height="42" fill="#4caf50" rx="1"/>

    <line x1="235" y1="88" x2="235" y2="160" stroke="#4caf50" stroke-width="1"/>
    <rect x="230" y="98" width="10" height="38" fill="#4caf50" rx="1"/>

    <line x1="440" y1="120" x2="440" y2="210" stroke="#4caf50" stroke-width="1"/>
    <rect x="435" y="140" width="10" height="45" fill="#4caf50" rx="1"/>

    <line x1="475" y1="105" x2="475" y2="195" stroke="#4caf50" stroke-width="1"/>
    <rect x="470" y="120" width="10" height="48" fill="#4caf50" rx="1"/>

    <line x1="510" y1="95" x2="510" y2="180" stroke="#4caf50" stroke-width="1"/>
    <rect x="505" y="108" width="10" height="40" fill="#4caf50" rx="1"/>

    <line x1="650" y1="110" x2="650" y2="200" stroke="#4caf50" stroke-width="1"/>
    <rect x="645" y="128" width="10" height="42" fill="#4caf50" rx="1"/>

    <line x1="685" y1="100" x2="685" y2="188" stroke="#4caf50" stroke-width="1"/>
    <rect x="680" y="112" width="10" height="44" fill="#4caf50" rx="1"/>

    <line x1="720" y1="90" x2="720" y2="170" stroke="#4caf50" stroke-width="1"/>
    <rect x="715" y="102" width="10" height="38" fill="#4caf50" rx="1"/>

    <!-- Red candles (bearish) -->
    <line x1="165" y1="105" x2="165" y2="190" stroke="#f44336" stroke-width="1"/>
    <rect x="160" y="120" width="10" height="45" fill="#f44336" rx="1"/>

    <line x1="270" y1="92" x2="270" y2="170" stroke="#f44336" stroke-width="1"/>
    <rect x="265" y="100" width="10" height="42" fill="#f44336" rx="1"/>

    <line x1="305" y1="105" x2="305" y2="195" stroke="#f44336" stroke-width="1"/>
    <rect x="300" y="115" width="10" height="50" fill="#f44336" rx="1"/>

    <line x1="340" y1="120" x2="340" y2="215" stroke="#f44336" stroke-width="1"/>
    <rect x="335" y="135" width="10" height="52" fill="#f44336" rx="1"/>

    <line x1="370" y1="135" x2="370" y2="230" stroke="#f44336" stroke-width="1"/>
    <rect x="365" y="150" width="10" height="55" fill="#f44336" rx="1"/>

    <line x1="405" y1="140" x2="405" y2="235" stroke="#f44336" stroke-width="1"/>
    <rect x="400" y="155" width="10" height="50" fill="#f44336" rx="1"/>

    <line x1="545" y1="100" x2="545" y2="185" stroke="#f44336" stroke-width="1"/>
    <rect x="540" y="112" width="10" height="45" fill="#f44336" rx="1"/>

    <line x1="580" y1="108" x2="580" y2="200" stroke="#f44336" stroke-width="1"/>
    <rect x="575" y="125" width="10" height="48" fill="#f44336" rx="1"/>

    <line x1="615" y1="115" x2="615" y2="210" stroke="#f44336" stroke-width="1"/>
    <rect x="610" y="132" width="10" height="50" fill="#f44336" rx="1"/>
  </g>

  <!-- Lower panel: EMV histogram (y 280-420), zero line at y=350 -->
  <line x1="60" y1="350" x2="740" y2="350" stroke="#888888" stroke-width="0.5" opacity="0.3" stroke-dasharray="4,3"/>

  <g>
    <!-- Green bars above zero (easy upward movement) -->
    <rect x="88" y="325" width="8" height="25" fill="#4caf50" opacity="0.75"/>
    <rect x="123" y="318" width="8" height="32" fill="#4caf50" opacity="0.75"/>
    <rect x="193" y="310" width="14" height="40" fill="#4caf50" opacity="0.85"/>
    <rect x="228" y="300" width="14" height="50" fill="#4caf50" opacity="0.85"/>
    <rect x="433" y="322" width="8" height="28" fill="#4caf50" opacity="0.75"/>
    <rect x="468" y="305" width="14" height="45" fill="#4caf50" opacity="0.85"/>
    <rect x="503" y="295" width="14" height="55" fill="#4caf50" opacity="0.85"/>
    <rect x="643" y="320" width="8" height="30" fill="#4caf50" opacity="0.75"/>
    <rect x="678" y="308" width="12" height="42" fill="#4caf50" opacity="0.85"/>
    <rect x="713" y="298" width="14" height="52" fill="#4caf50" opacity="0.85"/>

    <!-- Red bars below zero (easy downward movement) -->
    <rect x="158" y="350" width="8" height="22" fill="#f44336" opacity="0.75"/>
    <rect x="263" y="350" width="8" height="30" fill="#f44336" opacity="0.75"/>
    <rect x="298" y="350" width="12" height="40" fill="#f44336" opacity="0.85"/>
    <rect x="333" y="350" width="14" height="52" fill="#f44336" opacity="0.85"/>
    <rect x="363" y="350" width="14" height="60" fill="#f44336" opacity="0.85"/>
    <rect x="398" y="350" width="12" height="48" fill="#f44336" opacity="0.85"/>
    <rect x="538" y="350" width="8" height="25" fill="#f44336" opacity="0.75"/>
    <rect x="573" y="350" width="10" height="35" fill="#f44336" opacity="0.85"/>
    <rect x="608" y="350" width="12" height="42" fill="#f44336" opacity="0.85"/>
  </g>

  <!-- Signal line (yellow) overlaid on histogram -->
  <polyline points="92,338 127,330 162,355 197,325 232,312 267,358 302,370 337,382 367,392 402,378 437,335 472,318 507,308 542,358 577,368 612,375 647,332 682,320 717,306" fill="none" stroke="#ffd54f" stroke-width="1.8" filter="url(#glow)"/>

  <!-- Legend bar -->
  <g transform="translate(0, 455)">
    <rect x="180" y="0" width="10" height="10" fill="#4caf50" rx="2"/>
    <text x="196" y="9" fill="#aaaacc" font-size="10">Bullish</text>
    <rect x="270" y="0" width="10" height="10" fill="#f44336" rx="2"/>
    <text x="286" y="9" fill="#aaaacc" font-size="10">Bearish</text>
    <line x1="370" y1="5" x2="390" y2="5" stroke="#ffd54f" stroke-width="1.8"/>
    <text x="396" y="9" fill="#aaaacc" font-size="10">Signal Line</text>
    <rect x="490" y="0" width="14" height="10" fill="#4caf50" opacity="0.4" rx="1"/>
    <text x="510" y="9" fill="#aaaacc" font-size="10">EMV Histogram</text>
  </g>
</svg>