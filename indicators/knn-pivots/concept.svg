<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="280"/>
    <line x1="200" y1="60" x2="200" y2="280"/>
    <line x1="320" y1="60" x2="320" y2="280"/>
    <line x1="440" y1="60" x2="440" y2="280"/>
    <line x1="560" y1="60" x2="560" y2="280"/>
    <line x1="680" y1="60" x2="680" y2="280"/>
    <line x1="60" y1="120" x2="760" y2="120"/>
    <line x1="60" y1="170" x2="760" y2="170"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">SK-Learn KNN Pivots</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance — KNN Classification for Direction Prediction</text>

  <!-- Candlesticks with trend -->
  <line x1="100" y1="200" x2="100" y2="230" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="208" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="130" y1="195" x2="130" y2="228" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="200" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="160" y1="185" x2="160" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="190" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="190" y1="178" x2="190" y2="215" stroke="#ef5350" stroke-width="1"/>
  <rect x="186" y="185" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="220" y1="170" x2="220" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="175" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="250" y1="158" x2="250" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="162" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="280" y1="150" x2="280" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="276" y="155" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="310" y1="155" x2="310" y2="190" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="162" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="340" y1="162" x2="340" y2="198" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="168" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="370" y1="170" x2="370" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="178" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="400" y1="165" x2="400" y2="198" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="170" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="430" y1="155" x2="430" y2="190" stroke="#26a69a" stroke-width="1"/>
  <rect x="426" y="160" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="460" y1="148" x2="460" y2="182" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="152" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="490" y1="142" x2="490" y2="178" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="148" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="520" y1="138" x2="520" y2="172" stroke="#26a69a" stroke-width="1"/>
  <rect x="516" y="142" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="550" y1="130" x2="550" y2="168" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="135" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="580" y1="125" x2="580" y2="160" stroke="#ef5350" stroke-width="1"/>
  <rect x="576" y="130" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="610" y1="130" x2="610" y2="165" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="135" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="640" y1="120" x2="640" y2="155" stroke="#26a69a" stroke-width="1"/>
  <rect x="636" y="125" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="670" y1="115" x2="670" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="666" y="118" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="700" y1="108" x2="700" y2="142" stroke="#ef5350" stroke-width="1"/>
  <rect x="696" y="112" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="730" y1="100" x2="730" y2="135" stroke="#26a69a" stroke-width="1"/>
  <rect x="726" y="105" width="8" height="20" fill="#26a69a" rx="1"/>

  <!-- Pivot arrows -->
  <g filter="url(#glow)">
    <polygon points="250,155 245,145 255,145" fill="#66bb6a" opacity="0.8"/>
    <text x="250" y="140" text-anchor="middle" fill="#66bb6a" font-size="8">Bullish</text>
  </g>
  <g filter="url(#glow)">
    <polygon points="340,200 335,210 345,210" fill="#ef5350" opacity="0.8"/>
    <text x="340" y="222" text-anchor="middle" fill="#ef5350" font-size="8">Bearish</text>
  </g>
  <g filter="url(#glow)">
    <polygon points="460,145 455,135 465,135" fill="#66bb6a" opacity="0.8"/>
    <text x="460" y="130" text-anchor="middle" fill="#66bb6a" font-size="8">Bullish</text>
  </g>

  <!-- Probability sub-pane -->
  <line x1="60" y1="300" x2="760" y2="300" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="65" y="315" fill="#888" font-size="9">Probability %</text>

  <!-- 50% line -->
  <line x1="80" y1="380" x2="740" y2="380" stroke="rgba(128,128,128,0.3)" stroke-width="1"/>
  <!-- Upper confidence -->
  <line x1="80" y1="345" x2="740" y2="345" stroke="rgba(102,187,106,0.5)" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Lower confidence -->
  <line x1="80" y1="415" x2="740" y2="415" stroke="rgba(239,83,80,0.5)" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="745" y="349" fill="#66bb6a" font-size="8" opacity="0.7">80%</text>
  <text x="745" y="384" fill="#888" font-size="8" opacity="0.7">50%</text>
  <text x="745" y="419" fill="#ef5350" font-size="8" opacity="0.7">20%</text>

  <!-- Bullish zones -->
  <rect x="220" y="310" width="80" height="35" fill="#66bb6a" fill-opacity="0.06" rx="2"/>
  <rect x="420" y="310" width="100" height="35" fill="#66bb6a" fill-opacity="0.06" rx="2"/>

  <!-- Bearish zone -->
  <rect x="300" y="415" width="80" height="35" fill="#ef5350" fill-opacity="0.06" rx="2"/>

  <!-- Probability line -->
  <polyline points="100,380 130,370 160,358 190,365 220,348 250,335 280,352 310,395 340,420 370,408 400,385 430,362 460,340 490,355 520,365 550,348 580,355 610,370 640,358 670,345 700,360 730,350" fill="none" stroke="#42A5F5" stroke-width="2" filter="url(#glow)"/>

  <!-- Confidence line -->
  <polyline points="100,390 130,385 160,375 190,382 220,368 250,355 280,372 310,405 340,425 370,400 400,388 430,370 460,355 490,372 520,378 550,365 580,372 610,382 640,370 670,360 700,375 730,365" fill="none" stroke="#FF9800" stroke-width="1.5" opacity="0.6"/>

  <!-- Accuracy box -->
  <rect x="610" y="310" width="120" height="30" rx="4" fill="#ffffff" fill-opacity="0.04" stroke="#42a5f5" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="620" y="325" fill="#90caf9" font-size="8">Accuracy: 55.2%</text>
  <text x="620" y="336" fill="#90caf9" font-size="8">K=5, Window=100</text>

  <!-- Legend -->
  <g transform="translate(60, 455)">
    <rect width="680" height="35" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="17" r="4" fill="#42A5F5"/>
    <text x="30" y="21" fill="#999" font-size="9">Bullish Probability</text>
    <line x1="160" y1="17" x2="180" y2="17" stroke="#FF9800" stroke-width="1.5"/>
    <text x="185" y="21" fill="#999" font-size="9">Confidence</text>
    <polygon points="280,17 275,12 285,12" fill="#66bb6a"/>
    <text x="290" y="21" fill="#999" font-size="9">Bullish Pivot</text>
    <polygon points="390,17 385,22 395,22" fill="#ef5350"/>
    <text x="400" y="21" fill="#999" font-size="9">Bearish Pivot</text>
    <rect x="490" y="10" width="12" height="12" fill="#66bb6a" fill-opacity="0.15" rx="2"/>
    <text x="508" y="21" fill="#999" font-size="9">High Confidence Zone</text>
  </g>
</svg>
