  <rect x="218" y="326" width="12" height="64" fill="url(#barExtremeLeft)" opacity="0.85"/>
  <rect x="231" y="312" width="12" height="78" fill="url(#barExtremeLeft)" opacity="0.85"/>
  <rect x="244" y="298" width="12" height="92" fill="url(#barExtremeLeft)" opacity="0.85"/>
  <rect x="257" y="278" width="12" height="112" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="270" y="258" width="12" height="132" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="283" y="236" width="12" height="154" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="296" y="214" width="12" height="176" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="309" y="192" width="12" height="198" fill="url(#barNormal)" opacity="0.85"/>
  <rect x="322" y="170" width="12" height="220" fill="url(#barNormal)" opacity="0.85"/>
