<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="600">Elliott Wave Counter</text>
  <text x="400" y="56" text-anchor="middle" fill="#6a6a8a" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="80" y1="100" x2="750" y2="100"/>
    <line x1="80" y1="150" x2="750" y2="150"/>
    <line x1="80" y1="200" x2="750" y2="200"/>
    <line x1="80" y1="250" x2="750" y2="250"/>
    <line x1="80" y1="300" x2="750" y2="300"/>
    <line x1="80" y1="350" x2="750" y2="350"/>
    <line x1="80" y1="400" x2="750" y2="400"/>
    <line x1="160" y1="80" x2="160" y2="420"/>
    <line x1="240" y1="80" x2="240" y2="420"/>
    <line x1="320" y1="80" x2="320" y2="420"/>
    <line x1="400" y1="80" x2="400" y2="420"/>
    <line x1="480" y1="80" x2="480" y2="420"/>
    <line x1="560" y1="80" x2="560" y2="420"/>
    <line x1="640" y1="80" x2="640" y2="420"/>
    <line x1="720" y1="80" x2="720" y2="420"/>
  </g>

  <!-- Fibonacci extension lines (dashed, light purple) -->
  <line x1="80" y1="138" x2="750" y2="138" stroke="#b39ddb" stroke-width="0.8" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="755" y="142" fill="#b39ddb" font-size="10" opacity="0.7">1.618</text>
  <line x1="80" y1="105" x2="750" y2="105" stroke="#b39ddb" stroke-width="0.8" stroke-dasharray="6,4" opacity="0.4"/>
  <text x="755" y="109" fill="#b39ddb" font-size="10" opacity="0.6">2.618</text>

  <!-- Price zigzag line: impulse 1-2-3-4-5 then correction A-B-C -->
  <polyline
    points="100,370 180,260 230,310 380,120 440,200 530,140 590,220 660,170 720,280"
    fill="none" stroke="#4fc3f7" stroke-width="2.5" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Correction segment in different color -->
  <polyline
    points="530,140 590,220 660,170 720,280"
    fill="none" stroke="#ef5350" stroke-width="2" stroke-linejoin="round" stroke-dasharray="8,4" opacity="0.8"/>

  <!-- Wave labels in circles - Impulse -->
  <!-- Wave 1 -->
  <circle cx="180" cy="248" r="13" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="180" y="253" text-anchor="middle" fill="#4fc3f7" font-size="13" font-weight="600">1</text>

  <!-- Wave 2 -->
  <circle cx="230" cy="322" r="13" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="230" y="327" text-anchor="middle" fill="#4fc3f7" font-size="13" font-weight="600">2</text>

  <!-- Wave 3 (longest) -->
  <circle cx="380" cy="108" r="13" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="380" y="113" text-anchor="middle" fill="#4fc3f7" font-size="13" font-weight="600">3</text>

  <!-- Wave 4 -->
  <circle cx="440" cy="212" r="13" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="440" y="217" text-anchor="middle" fill="#4fc3f7" font-size="13" font-weight="600">4</text>

  <!-- Wave 5 -->
  <circle cx="530" cy="128" r="13" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="530" y="133" text-anchor="middle" fill="#4fc3f7" font-size="13" font-weight="600">5</text>

  <!-- Correction waves A, B, C -->
  <!-- Wave A -->
  <circle cx="590" cy="232" r="13" fill="none" stroke="#ef5350" stroke-width="1.5"/>
  <text x="590" y="237" text-anchor="middle" fill="#ef5350" font-size="13" font-weight="600">A</text>

  <!-- Wave B -->
  <circle cx="660" cy="158" r="13" fill="none" stroke="#ef5350" stroke-width="1.5"/>
  <text x="660" y="163" text-anchor="middle" fill="#ef5350" font-size="13" font-weight="600">B</text>

  <!-- Wave C -->
  <circle cx="720" cy="292" r="13" fill="none" stroke="#ef5350" stroke-width="1.5"/>
  <text x="720" y="297" text-anchor="middle" fill="#ef5350" font-size="13" font-weight="600">C</text>

  <!-- Fib extension markers at wave 3 and wave 5 -->
  <line x1="380" y1="120" x2="380" y2="138" stroke="#b39ddb" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>
  <line x1="530" y1="140" x2="530" y2="105" stroke="#b39ddb" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- Legend bar at bottom -->
  <rect x="80" y="450" width="670" height="30" rx="4" fill="#0d0d1a" opacity="0.5"/>
  <rect x="110" y="460" width="12" height="10" rx="2" fill="#4fc3f7"/>
  <text x="128" y="469" fill="#aaaacc" font-size="11">Impulse (1-5)</text>
  <rect x="240" y="460" width="12" height="10" rx="2" fill="#ef5350"/>
  <text x="258" y="469" fill="#aaaacc" font-size="11">Correction (A-B-C)</text>
  <rect x="400" y="460" width="12" height="10" rx="2" fill="#b39ddb"/>
  <text x="418" y="469" fill="#aaaacc" font-size="11">Fibonacci Extensions</text>
  <text x="600" y="469" fill="#555577" font-size="10">Price Action</text>
</svg>
