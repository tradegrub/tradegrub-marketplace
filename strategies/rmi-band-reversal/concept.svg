<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bandFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2196F3" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#2196F3" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#2196F3" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">RMI Band Reversal Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Oscillator area -->
  <text x="60" y="75" fill="#e2e8f0" font-size="10">RMI Oscillator</text>

  <!-- Bollinger Band fill -->
  <polygon points="80,120 140,115 200,130 260,140 320,150 380,125 440,110 500,130 560,145 620,120 680,115 720,125 720,330 680,340 620,350 560,325 500,310 440,340 380,355 320,330 260,310 200,320 140,345 80,330"
    fill="url(#bandFill)"/>

  <!-- Upper Bollinger Band -->
  <polyline points="80,120 140,115 200,130 260,140 320,150 380,125 440,110 500,130 560,145 620,120 680,115 720,125"
    fill="none" stroke="#787b86" stroke-width="1.5" opacity="0.5"/>
  <text x="725" y="128" fill="#787b86" font-size="8">Upper BB</text>

  <!-- Lower Bollinger Band -->
  <polyline points="80,330 140,345 200,320 260,310 320,330 380,355 440,340 500,310 560,325 620,350 680,340 720,330"
    fill="none" stroke="#787b86" stroke-width="1.5" opacity="0.5"/>
  <text x="725" y="333" fill="#787b86" font-size="8">Lower BB</text>

  <!-- Middle line -->
  <polyline points="80,225 140,230 200,225 260,225 320,240 380,240 440,225 500,220 560,235 620,235 680,228 720,228"
    fill="none" stroke="#787b86" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- RMI line oscillating and touching bands -->
  <polyline points="80,220 110,200 140,170 170,140 200,125 230,150 260,200 290,240 320,280 350,320 380,350 410,320 440,270 470,220 500,180 530,150 560,135 590,160 620,200 650,250 680,300 710,335"
    fill="none" stroke="#2196F3" stroke-width="2.5"/>

  <!-- Buy signals at lower band crosses -->
  <g filter="url(#glow)">
    <polygon points="200,115 195,105 205,105" fill="#26a69a"/>
    <text x="200" y="100" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">BUY</text>
  </g>
  <g filter="url(#glow)">
    <polygon points="560,125 555,115 565,115" fill="#26a69a"/>
    <text x="560" y="110" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">BUY</text>
  </g>

  <!-- Sell signals at upper band crosses -->
  <g filter="url(#glow)">
    <polygon points="380,365 375,355 385,355" fill="#ef5350" transform="rotate(180,380,360)"/>
    <text x="380" y="380" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">SELL</text>
  </g>
  <g filter="url(#glow)">
    <polygon points="710,345 705,335 715,335" fill="#ef5350" transform="rotate(180,710,340)"/>
    <text x="710" y="360" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">SELL</text>
  </g>

  <!-- Cross markers at band touches -->
  <circle cx="200" cy="125" r="4" fill="none" stroke="#26a69a" stroke-width="1.5"/>
  <circle cx="380" cy="350" r="4" fill="none" stroke="#ef5350" stroke-width="1.5"/>
  <circle cx="560" cy="135" r="4" fill="none" stroke="#26a69a" stroke-width="1.5"/>
  <circle cx="710" cy="335" r="4" fill="none" stroke="#ef5350" stroke-width="1.5"/>

  <!-- Overbought / Oversold labels -->
  <rect x="320" y="365" width="120" height="16" rx="3" fill="#ef5350" fill-opacity="0.1"/>
  <text x="380" y="377" text-anchor="middle" fill="#ef5350" font-size="8">Overbought (Band Touch)</text>
  <rect x="140" y="95" width="120" height="16" rx="3" fill="#26a69a" fill-opacity="0.1"/>
  <text x="200" y="107" text-anchor="middle" fill="#26a69a" font-size="8">Oversold (Band Touch)</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#2196F3"/>
    <text x="30" y="24" fill="#999" font-size="9">RMI Line</text>
    <line x1="110" y1="20" x2="130" y2="20" stroke="#787b86" stroke-width="1.5"/>
    <text x="135" y="24" fill="#999" font-size="9">Bollinger Bands</text>
    <polygon points="275,24 270,14 280,14" fill="#26a69a"/>
    <text x="285" y="24" fill="#999" font-size="9">Buy (Lower Band Cross)</text>
    <polygon points="450,14 445,24 455,24" fill="#ef5350"/>
    <text x="460" y="24" fill="#999" font-size="9">Sell (Upper Band Cross)</text>
  </g>
</svg>