<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="url(#gridFade)" stroke-width="0.5">
    <line x1="80" y1="80" x2="750" y2="80"/>
    <line x1="80" y1="150" x2="750" y2="150"/>
    <line x1="80" y1="220" x2="750" y2="220"/>
    <line x1="80" y1="290" x2="750" y2="290"/>
    <line x1="80" y1="360" x2="750" y2="360"/>
    <line x1="80" y1="430" x2="750" y2="430"/>
  </g>

  <!-- Price axis labels -->
  <g fill="#556688" font-family="monospace" font-size="11" text-anchor="end">
    <text x="72" y="84">180</text>
    <text x="72" y="154">160</text>
    <text x="72" y="224">140</text>
    <text x="72" y="294">120</text>
    <text x="72" y="364">100</text>
    <text x="72" y="434">80</text>
  </g>

  <!-- Title -->
  <text x="400" y="38" fill="#e0e0e0" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">Kagi Chart Overlay</text>
  <text x="400" y="58" fill="#8899aa" font-family="sans-serif" font-size="12" text-anchor="middle">Yang (thick/bullish) and Yin (thin/bearish) trend lines</text>

  <!-- Kagi Line Path -->
  <!-- Segment 1: Yang up from 100 to 150 -->
  <line x1="110" y1="360" x2="110" y2="185" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <!-- Horizontal connector -->
  <line x1="110" y1="185" x2="160" y2="185" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <!-- Segment 2: Yang down from 150 to 125 (still yang, didn't break waist) -->
  <line x1="160" y1="185" x2="160" y2="272" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <!-- Horizontal connector -->
  <line x1="160" y1="272" x2="210" y2="272" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <!-- Segment 3: Yang up from 125 to 170 (broke above shoulder) -->
  <line x1="210" y1="272" x2="210" y2="115" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <!-- Horizontal connector -->
  <line x1="210" y1="115" x2="270" y2="115" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <!-- Segment 4: Down from 170 to 120, breaks waist at 125 -> yin transition -->
  <line x1="270" y1="115" x2="270" y2="272" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <!-- Yin portion below waist -->
  <line x1="270" y1="272" x2="270" y2="290" stroke="#ef5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Horizontal connector -->
  <line x1="270" y1="290" x2="330" y2="290" stroke="#ef5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Segment 5: Yin up from 120 to 140 -->
  <line x1="330" y1="290" x2="330" y2="220" stroke="#ef5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Horizontal connector -->
  <line x1="330" y1="220" x2="380" y2="220" stroke="#ef5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Segment 6: Yin down from 140 to 90 -->
  <line x1="380" y1="220" x2="380" y2="395" stroke="#ef5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Horizontal connector -->
  <line x1="380" y1="395" x2="440" y2="395" stroke="#ef5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Segment 7: Yin up from 90 to 130 -->
  <line x1="440" y1="395" x2="440" y2="255" stroke="#ef5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Horizontal connector -->
  <line x1="440" y1="255" x2="490" y2="255" stroke="#ef5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Segment 8: Down from 130 to 85 -->
  <line x1="490" y1="255" x2="490" y2="413" stroke="#ef5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Horizontal connector -->
  <line x1="490" y1="413" x2="540" y2="413" stroke="#ef5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Segment 9: Up from 85 to 145, breaks shoulder at 140 -> yang transition -->
  <line x1="540" y1="413" x2="540" y2="220" stroke="#ef5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Yang portion above shoulder -->
  <line x1="540" y1="220" x2="540" y2="202" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <!-- Horizontal connector -->
  <line x1="540" y1="202" x2="600" y2="202" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <!-- Segment 10: Yang down from 145 to 130 -->
  <line x1="600" y1="202" x2="600" y2="255" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <!-- Horizontal connector -->
  <line x1="600" y1="255" x2="650" y2="255" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <!-- Segment 11: Yang up from 130 to 175 -->
  <line x1="650" y1="255" x2="650" y2="97" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <!-- Horizontal connector -->
  <line x1="650" y1="97" x2="720" y2="97" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
  <!-- Segment 12: Yang slight pullback to 165 -->
  <line x1="720" y1="97" x2="720" y2="132" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>

  <!-- Shoulder labels -->
  <line x1="200" y1="185" x2="300" y2="185" stroke="#66bb6a" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="305" y="182" fill="#66bb6a" font-family="sans-serif" font-size="10" opacity="0.8">Shoulder</text>

  <line x1="200" y1="115" x2="285" y2="115" stroke="#66bb6a" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="286" y="108" fill="#66bb6a" font-family="sans-serif" font-size="10" opacity="0.8">Shoulder</text>

  <!-- Waist labels -->
  <line x1="150" y1="272" x2="135" y2="272" stroke="#ff8a65" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="100" y="268" fill="#ff8a65" font-family="sans-serif" font-size="10" opacity="0.8">Waist</text>

  <line x1="370" y1="395" x2="355" y2="395" stroke="#ff8a65" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="340" y="410" fill="#ff8a65" font-family="sans-serif" font-size="10" text-anchor="end" opacity="0.8">Waist</text>

  <!-- Transition annotations -->
  <!-- Yin transition arrow -->
  <g transform="translate(270,310)">
    <polygon points="0,-8 5,0 -5,0" fill="#ef5350" opacity="0.9"/>
    <text x="0" y="16" fill="#ef5350" font-family="sans-serif" font-size="9" text-anchor="middle" opacity="0.9">Yin</text>
  </g>

  <!-- Yang transition arrow -->
  <g transform="translate(540,186)">
    <polygon points="0,8 5,0 -5,0" fill="#4caf50" opacity="0.9"/>
    <text x="0" y="-6" fill="#4caf50" font-family="sans-serif" font-size="9" text-anchor="middle" opacity="0.9">Yang</text>
  </g>

  <!-- Legend -->
  <g transform="translate(100,462)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#4caf50" stroke-width="4" stroke-linecap="round"/>
    <text x="36" y="4" fill="#aabbcc" font-family="sans-serif" font-size="11">Yang (bullish)</text>
    <line x1="160" y1="0" x2="190" y2="0" stroke="#ef5350" stroke-width="1.5" stroke-linecap="round"/>
    <text x="196" y="4" fill="#aabbcc" font-family="sans-serif" font-size="11">Yin (bearish)</text>
    <line x1="310" y1="0" x2="340" y2="0" stroke="#66bb6a" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>
    <text x="346" y="4" fill="#aabbcc" font-family="sans-serif" font-size="11">Shoulder / Waist levels</text>
  </g>

  <!-- Branding -->
  <text x="750" y="490" fill="#445566" font-family="sans-serif" font-size="11" text-anchor="end" opacity="0.7">tradegrub.finance</text>
</svg>
