<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="redZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff1744" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff1744" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="greenZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowRed" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowGreen" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowLine" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e8e8f0" font-size="17" font-weight="700">Volatility Extreme Detector</text>
  <text x="400" y="56" text-anchor="middle" fill="#6a6a8a" font-size="11">tradegrub.finance</text>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="80" y1="100" x2="80" y2="420"/>
    <line x1="200" y1="100" x2="200" y2="420"/>
    <line x1="320" y1="100" x2="320" y2="420"/>
    <line x1="440" y1="100" x2="440" y2="420"/>
    <line x1="560" y1="100" x2="560" y2="420"/>
    <line x1="680" y1="100" x2="680" y2="420"/>
    <line x1="80" y1="140" x2="740" y2="140"/>
    <line x1="80" y1="200" x2="740" y2="200"/>
    <line x1="80" y1="260" x2="740" y2="260"/>
    <line x1="80" y1="320" x2="740" y2="320"/>
    <line x1="80" y1="380" x2="740" y2="380"/>
  </g>

  <!-- Upper extreme zone (red, blow-off top) -->
  <rect x="80" y="80" width="660" height="80" fill="url(#redZone)" filter="url(#glowRed)"/>
  <line x1="80" y1="160" x2="740" y2="160" stroke="#ff1744" stroke-width="1" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="745" y="125" fill="#ff1744" font-size="9" opacity="0.8">EXTREME</text>

  <!-- Lower extreme zone (green, capitulation) -->
  <rect x="80" y="340" width="660" height="80" fill="url(#greenZone)" filter="url(#glowGreen)"/>
  <line x1="80" y1="340" x2="740" y2="340" stroke="#00e676" stroke-width="1" stroke-dasharray="6,3" opacity="0.6"/>
  <text x="745" y="390" fill="#00e676" font-size="9" opacity="0.8">EXTREME</text>

  <!-- Normal range band (subtle gray) -->
  <rect x="80" y="200" width="660" height="100" fill="#ffffff" opacity="0.02"/>
  <text x="745" y="255" fill="#666688" font-size="8" opacity="0.7">NORMAL</text>

  <!-- Volatility line with spikes -->
  <polyline
    points="80,270 100,265 120,260 140,268 160,255 180,250 200,240 220,230 240,200 260,170 280,120 290,100 300,115 320,175 340,220 360,250 380,260 400,255 420,248 440,260 460,275 480,290 500,310 520,340 530,370 540,395 545,405 550,390 560,350 580,310 600,280 620,260 640,250 650,245 660,240 670,220 680,185 690,150 700,120 710,105 720,130 730,180 740,230"
    fill="none" stroke="#ffab40" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"
    filter="url(#glowLine)"
  />

  <!-- Spike 1 highlight (blow-off top around x=290) -->
  <circle cx="290" cy="100" r="4" fill="#ff1744" filter="url(#glowRed)" opacity="0.9"/>

  <!-- Spike 2 highlight (capitulation around x=545) -->
  <circle cx="545" cy="405" r="4" fill="#00e676" filter="url(#glowGreen)" opacity="0.9"/>

  <!-- Spike 3 highlight (blow-off top around x=710) -->
  <circle cx="710" cy="105" r="4" fill="#ff1744" filter="url(#glowRed)" opacity="0.9"/>

  <!-- Arrow annotation: Blow-off Top (spike 1) -->
  <line x1="250" y1="85" x2="282" y2="98" stroke="#ff1744" stroke-width="1.2" opacity="0.8"/>
  <polygon points="282,98 276,92 280,100" fill="#ff1744" opacity="0.8"/>
  <text x="200" y="80" fill="#ff1744" font-size="10" font-weight="600" opacity="0.9">Blow-off Top</text>

  <!-- Arrow annotation: Capitulation Bottom (spike 2) -->
  <line x1="500" y1="430" x2="537" y2="410" stroke="#00e676" stroke-width="1.2" opacity="0.8"/>
  <polygon points="537,410 530,408 534,416" fill="#00e676" opacity="0.8"/>
  <text x="440" y="440" fill="#00e676" font-size="10" font-weight="600" opacity="0.9">Capitulation Bottom</text>

  <!-- Arrow annotation: Blow-off Top (spike 3) -->
  <line x1="730" y1="85" x2="716" y2="102" stroke="#ff1744" stroke-width="1.2" opacity="0.8"/>
  <polygon points="716,102 714,94 722,100" fill="#ff1744" opacity="0.8"/>
  <text x="722" y="80" fill="#ff1744" font-size="10" font-weight="600" opacity="0.9">Blow-off Top</text>

  <!-- Legend bar at bottom -->
  <rect x="80" y="460" width="660" height="30" rx="4" fill="#0d0d1a" opacity="0.6"/>
  <rect x="110" y="471" width="14" height="8" rx="2" fill="#ffab40"/>
  <text x="130" y="480" fill="#9999bb" font-size="10">Volatility</text>
  <rect x="220" y="471" width="14" height="8" rx="2" fill="#ff1744" opacity="0.7"/>
  <text x="240" y="480" fill="#9999bb" font-size="10">Upper Extreme</text>
  <rect x="360" y="471" width="14" height="8" rx="2" fill="#00e676" opacity="0.7"/>
  <text x="380" y="480" fill="#9999bb" font-size="10">Lower Extreme</text>
  <rect x="510" y="471" width="14" height="8" rx="2" fill="#ffffff" opacity="0.1"/>
  <text x="530" y="480" fill="#9999bb" font-size="10">Normal Range</text>
</svg>
