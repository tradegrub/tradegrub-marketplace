<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Parkinson Volatility</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart area -->
  <rect x="60" y="70" width="700" height="160" fill="rgba(255,255,255,0.02)" rx="4"/>
  <!-- Candlesticks -->
  <line x1="100" y1="110" x2="100" y2="180" stroke="#666" stroke-width="1"/>
  <rect x="96" y="120" width="8" height="40" fill="#4CAF50"/>
  <line x1="160" y1="100" x2="160" y2="190" stroke="#666" stroke-width="1"/>
  <rect x="156" y="110" width="8" height="50" fill="#4CAF50"/>
  <line x1="220" y1="95" x2="220" y2="200" stroke="#666" stroke-width="1"/>
  <rect x="216" y="105" width="8" height="70" fill="#EF5350"/>
  <line x1="280" y1="90" x2="280" y2="210" stroke="#666" stroke-width="1"/>
  <rect x="276" y="100" width="8" height="80" fill="#EF5350"/>
  <line x1="340" y1="105" x2="340" y2="195" stroke="#666" stroke-width="1"/>
  <rect x="336" y="115" width="8" height="55" fill="#4CAF50"/>
  <line x1="400" y1="120" x2="400" y2="175" stroke="#666" stroke-width="1"/>
  <rect x="396" y="130" width="8" height="30" fill="#4CAF50"/>
  <line x1="460" y1="125" x2="460" y2="170" stroke="#666" stroke-width="1"/>
  <rect x="456" y="132" width="8" height="25" fill="#4CAF50"/>
  <line x1="520" y1="130" x2="520" y2="165" stroke="#666" stroke-width="1"/>
  <rect x="516" y="135" width="8" height="20" fill="#EF5350"/>
  <line x1="580" y1="128" x2="580" y2="168" stroke="#666" stroke-width="1"/>
  <rect x="576" y="133" width="8" height="22" fill="#4CAF50"/>
  <line x1="640" y1="125" x2="640" y2="170" stroke="#666" stroke-width="1"/>
  <rect x="636" y="130" width="8" height="28" fill="#4CAF50"/>
  <line x1="700" y1="120" x2="700" y2="175" stroke="#666" stroke-width="1"/>
  <rect x="696" y="128" width="8" height="30" fill="#EF5350"/>

  <!-- High vol background -->
  <rect x="180" y="70" width="180" height="160" fill="rgba(244,67,54,0.08)"/>
  <!-- Low vol background -->
  <rect x="420" y="70" width="180" height="160" fill="rgba(76,175,80,0.08)"/>

  <!-- Volatility subplot -->
  <rect x="60" y="260" width="700" height="170" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="280" fill="#888" font-family="Inter,sans-serif" font-size="10">Parkinson Vol %</text>

  <!-- Vol line (blue) - high in middle, low on sides -->
  <polyline points="100,380 160,340 220,300 280,285 340,320 400,370 460,390 520,395 580,385 640,380 700,375" fill="none" stroke="#42A5F5" stroke-width="2"/>
  <!-- Smoothed line (orange) -->
  <polyline points="100,375 160,355 220,320 280,305 340,330 400,360 460,385 520,392 580,390 640,383 700,378" fill="none" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- High vol threshold -->
  <line x1="60" y1="310" x2="760" y2="310" stroke="#EF5350" stroke-width="1" stroke-dasharray="5,5" opacity="0.6"/>
  <text x="762" y="314" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">High</text>
  <!-- Low vol threshold -->
  <line x1="60" y1="385" x2="760" y2="385" stroke="#66BB6A" stroke-width="1" stroke-dasharray="5,5" opacity="0.6"/>
  <text x="762" y="389" fill="#66BB6A" font-family="Inter,sans-serif" font-size="9">Low</text>

  <!-- Annotations -->
  <text x="260" y="255" text-anchor="middle" fill="#EF5350" font-family="Inter,sans-serif" font-size="10">High Vol Regime</text>
  <text x="510" y="255" text-anchor="middle" fill="#66BB6A" font-family="Inter,sans-serif" font-size="10">Low Vol Regime</text>

  <!-- Legend -->
  <rect x="60" y="460" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="475" x2="100" y2="475" stroke="#42A5F5" stroke-width="2"/>
  <text x="105" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Parkinson Vol</text>
  <line x1="220" y1="475" x2="240" y2="475" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="245" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Smoothed</text>
  <rect x="360" y="470" width="10" height="10" fill="rgba(244,67,54,0.3)"/>
  <text x="375" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">High Vol Zone</text>
  <rect x="500" y="470" width="10" height="10" fill="rgba(76,175,80,0.3)"/>
  <text x="515" y="479" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Low Vol Zone</text>
</svg>
