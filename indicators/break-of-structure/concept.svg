<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Break of Structure Detector</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="370" fill="rgba(255,255,255,0.02)" rx="4"/>

  <!-- Uptrend candles -->
  <line x1="100" y1="350" x2="100" y2="300" stroke="#666" stroke-width="1"/><rect x="96" y="310" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="150" y1="320" x2="150" y2="270" stroke="#666" stroke-width="1"/><rect x="146" y="280" width="8" height="28" fill="#4CAF50" rx="1"/>
  <line x1="200" y1="340" x2="200" y2="290" stroke="#666" stroke-width="1"/><rect x="196" y="300" width="8" height="30" fill="#ff5252" rx="1"/>
  <line x1="250" y1="290" x2="250" y2="240" stroke="#666" stroke-width="1"/><rect x="246" y="250" width="8" height="28" fill="#4CAF50" rx="1"/>
  <line x1="300" y1="270" x2="300" y2="220" stroke="#666" stroke-width="1"/><rect x="296" y="230" width="8" height="28" fill="#4CAF50" rx="1"/>
  <line x1="350" y1="260" x2="350" y2="200" stroke="#666" stroke-width="1"/><rect x="346" y="210" width="8" height="35" fill="#4CAF50" rx="1"/>
  <!-- Peak -->
  <line x1="400" y1="230" x2="400" y2="180" stroke="#666" stroke-width="1"/><rect x="396" y="190" width="8" height="28" fill="#ff5252" rx="1"/>
  <line x1="450" y1="250" x2="450" y2="210" stroke="#666" stroke-width="1"/><rect x="446" y="220" width="8" height="24" fill="#ff5252" rx="1"/>
  <!-- CHoCH break -->
  <line x1="500" y1="280" x2="500" y2="230" stroke="#666" stroke-width="1"/><rect x="496" y="240" width="8" height="30" fill="#ff5252" rx="1"/>
  <line x1="550" y1="310" x2="550" y2="260" stroke="#666" stroke-width="1"/><rect x="546" y="270" width="8" height="30" fill="#ff5252" rx="1"/>
  <line x1="600" y1="330" x2="600" y2="280" stroke="#666" stroke-width="1"/><rect x="596" y="290" width="8" height="30" fill="#ff5252" rx="1"/>
  <!-- BOS continuation -->
  <line x1="650" y1="350" x2="650" y2="300" stroke="#666" stroke-width="1"/><rect x="646" y="310" width="8" height="28" fill="#ff5252" rx="1"/>
  <line x1="700" y1="370" x2="700" y2="320" stroke="#666" stroke-width="1"/><rect x="696" y="330" width="8" height="28" fill="#ff5252" rx="1"/>

  <!-- Swing high structure line -->
  <polyline points="150,270 250,270 250,240 400,240 400,180 700,180"
            fill="none" stroke="rgba(255,23,68,0.5)" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Swing low structure line -->
  <polyline points="100,350 200,350 200,340 450,340 450,310 500,310"
            fill="none" stroke="rgba(0,230,118,0.5)" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- BOS label -->
  <polygon points="300,215 305,208 295,208" fill="#00e676"/>
  <text x="310" y="215" fill="#00e676" font-family="Inter,sans-serif" font-size="11" font-weight="600">BOS</text>

  <!-- CHoCH label -->
  <rect x="475" y="305" width="50" height="18" fill="rgba(255,152,0,0.2)" rx="3"/>
  <text x="500" y="318" text-anchor="middle" fill="#ff9800" font-family="Inter,sans-serif" font-size="11" font-weight="600">CHoCH</text>

  <!-- BOS bear -->
  <polygon points="650,305 655,298 645,298" fill="#ff1744" transform="rotate(180,650,302)"/>
  <text x="660" y="305" fill="#ff1744" font-family="Inter,sans-serif" font-size="11" font-weight="600">BOS</text>

  <!-- Legend -->
  <rect x="150" y="455" width="500" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <polygon points="180,468 185,462 175,462" fill="#00e676"/>
  <text x="192" y="472" fill="#aaa" font-family="Inter,sans-serif" font-size="10">BOS Bull</text>
  <polygon points="275,468 280,474 270,474" fill="#ff1744"/>
  <text x="287" y="472" fill="#aaa" font-family="Inter,sans-serif" font-size="10">BOS Bear</text>
  <polygon points="365,468 370,462 360,462" fill="#42A5F5"/>
  <text x="377" y="472" fill="#aaa" font-family="Inter,sans-serif" font-size="10">CHoCH Bull</text>
  <polygon points="470,468 475,474 465,474" fill="#ff9800"/>
  <text x="482" y="472" fill="#aaa" font-family="Inter,sans-serif" font-size="10">CHoCH Bear</text>
</svg>
