<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Hammer Reversal Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- LEFT: Hammer (bullish reversal at bottom) -->
  <text x="200" y="75" text-anchor="middle" fill="#26a69a" font-size="13" font-weight="600">Hammer (Bullish Reversal)</text>

  <!-- Downtrend -->
  <line x1="90" y1="115" x2="90" y2="155" stroke="#ef5350" stroke-width="1"/>
  <rect x="86" y="120" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="120" y1="138" x2="120" y2="180" stroke="#ef5350" stroke-width="1"/>
  <rect x="116" y="142" width="8" height="28" fill="#ef5350" rx="1"/>
  <line x1="150" y1="162" x2="150" y2="208" stroke="#ef5350" stroke-width="1"/>
  <rect x="146" y="168" width="8" height="30" fill="#ef5350" rx="1"/>
  <line x1="180" y1="190" x2="180" y2="238" stroke="#ef5350" stroke-width="1"/>
  <rect x="176" y="198" width="8" height="28" fill="#ef5350" rx="1"/>

  <!-- HAMMER candle (zoomed/emphasized) -->
  <!-- Long lower wick -->
  <line x1="225" y1="215" x2="225" y2="330" stroke="#00e676" stroke-width="2.5"/>
  <!-- Small body at top -->
  <rect x="215" y="218" width="20" height="18" fill="#00e676" rx="2" filter="url(#glow)"/>
  <!-- Short upper wick -->
  <line x1="225" y1="210" x2="225" y2="218" stroke="#00e676" stroke-width="2.5"/>

  <!-- Anatomy labels -->
  <line x1="240" y1="214" x2="270" y2="214" stroke="#888" stroke-width="0.8" opacity="0.5"/>
  <text x="275" y="218" fill="#bbb" font-size="9">Short upper wick</text>
  <line x1="240" y1="228" x2="270" y2="235" stroke="#888" stroke-width="0.8" opacity="0.5"/>
  <text x="275" y="239" fill="#bbb" font-size="9">Small body (top)</text>
  <line x1="240" y1="280" x2="270" y2="280" stroke="#888" stroke-width="0.8" opacity="0.5"/>
  <text x="275" y="284" fill="#bbb" font-size="9">Long lower wick (2x+ body)</text>

  <!-- Buy signal -->
  <g filter="url(#softGlow)">
    <polygon points="220,205 230,205 225,192" fill="#00e676"/>
  </g>
  <rect x="235" y="185" width="55" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="262" y="198" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- Entry / Stop / TP -->
  <line x1="225" y1="218" x2="380" y2="218" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="382" y="222" fill="#42a5f5" font-size="9">Entry</text>
  <line x1="225" y1="335" x2="380" y2="335" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="382" y="339" fill="#ef5350" font-size="9">Stop (ATR)</text>
  <line x1="225" y1="138" x2="380" y2="138" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="382" y="142" fill="#00e676" font-size="9">Take Profit</text>

  <!-- Post-hammer recovery -->
  <line x1="265" y1="198" x2="265" y2="232" stroke="#26a69a" stroke-width="1"/>
  <rect x="261" y="205" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="295" y1="182" x2="295" y2="215" stroke="#26a69a" stroke-width="1"/>
  <rect x="291" y="188" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="325" y1="168" x2="325" y2="198" stroke="#ef5350" stroke-width="1"/>
  <rect x="321" y="172" width="8" height="16" fill="#ef5350" rx="1"/>
  <line x1="355" y1="152" x2="355" y2="185" stroke="#26a69a" stroke-width="1"/>
  <rect x="351" y="158" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- DIVIDER -->
  <line x1="400" y1="70" x2="400" y2="420" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- RIGHT: Shooting Star (bearish reversal at top) -->
  <text x="600" y="75" text-anchor="middle" fill="#ef5350" font-size="13" font-weight="600">Shooting Star (Bearish)</text>

  <!-- Uptrend -->
  <line x1="460" y1="310" x2="460" y2="350" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="318" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="490" y1="278" x2="490" y2="320" stroke="#26a69a" stroke-width="1"/>
  <rect x="486" y="285" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="520" y1="245" x2="520" y2="288" stroke="#26a69a" stroke-width="1"/>
  <rect x="516" y="252" width="8" height="25" fill="#26a69a" rx="1"/>
  <line x1="550" y1="215" x2="550" y2="258" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="222" width="8" height="25" fill="#26a69a" rx="1"/>

  <!-- SHOOTING STAR candle -->
  <!-- Long upper wick -->
  <line x1="600" y1="110" x2="600" y2="225" stroke="#ef5350" stroke-width="2.5"/>
  <!-- Small body at bottom -->
  <rect x="590" y="205" width="20" height="18" fill="#ef5350" rx="2" filter="url(#glow)"/>

  <!-- Anatomy labels -->
  <line x1="615" y1="155" x2="645" y2="155" stroke="#888" stroke-width="0.8" opacity="0.5"/>
  <text x="650" y="159" fill="#bbb" font-size="9">Long upper wick (2x+ body)</text>
  <line x1="615" y1="210" x2="645" y2="210" stroke="#888" stroke-width="0.8" opacity="0.5"/>
  <text x="650" y="214" fill="#bbb" font-size="9">Small body (bottom)</text>
  <line x1="615" y1="223" x2="645" y2="223" stroke="#888" stroke-width="0.8" opacity="0.5"/>
  <text x="650" y="227" fill="#bbb" font-size="9">Short/no lower wick</text>

  <!-- Sell signal -->
  <g filter="url(#softGlow)">
    <polygon points="595,230 605,230 600,242" fill="#ef5350"/>
  </g>
  <rect x="608" y="232" width="65" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="640" y="245" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">SHORT</text>

  <!-- Post shooting star decline -->
  <line x1="640" y1="222" x2="640" y2="262" stroke="#ef5350" stroke-width="1"/>
  <rect x="636" y="230" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="670" y1="245" x2="670" y2="285" stroke="#ef5350" stroke-width="1"/>
  <rect x="666" y="252" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="700" y1="262" x2="700" y2="302" stroke="#26a69a" stroke-width="1"/>
  <rect x="696" y="268" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="730" y1="278" x2="730" y2="318" stroke="#ef5350" stroke-width="1"/>
  <rect x="726" y="285" width="8" height="22" fill="#ef5350" rx="1"/>

  <!-- Volume bars -->
  <g opacity="0.5">
    <rect x="86" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="116" y="395" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="146" y="392" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="176" y="390" width="8" height="22" fill="#ef5350" rx="1"/>
  </g>
  <rect x="215" y="380" width="20" height="32" fill="#00e676" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="261" y="393" width="8" height="19" fill="#26a69a" rx="1"/>
    <rect x="291" y="395" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="321" y="398" width="8" height="14" fill="#ef5350" rx="1"/>
    <rect x="351" y="395" width="8" height="17" fill="#26a69a" rx="1"/>
  </g>
  <g opacity="0.5">
    <rect x="456" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="486" y="395" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="516" y="392" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="546" y="390" width="8" height="22" fill="#26a69a" rx="1"/>
  </g>
  <rect x="590" y="380" width="20" height="32" fill="#ef5350" rx="1" opacity="0.6" filter="url(#softGlow)"/>
  <g opacity="0.4">
    <rect x="636" y="393" width="8" height="19" fill="#ef5350" rx="1"/>
    <rect x="666" y="395" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="696" y="398" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="726" y="395" width="8" height="17" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Hammer (Bullish)</text>
    <circle cx="160" cy="20" r="4" fill="#ef5350"/>
    <text x="170" y="24" fill="#999" font-size="9">Shooting Star (Bearish)</text>
    <circle cx="340" cy="20" r="4" fill="#42a5f5"/>
    <text x="350" y="24" fill="#999" font-size="9">Entry Level</text>
    <circle cx="440" cy="20" r="4" fill="#00e676"/>
    <text x="450" y="24" fill="#999" font-size="9">Take Profit</text>
    <rect x="545" y="14" width="20" height="12" fill="#ef5350" opacity="0.4" rx="2"/>
    <text x="570" y="24" fill="#999" font-size="9">ATR Stop</text>
  </g>
</svg>