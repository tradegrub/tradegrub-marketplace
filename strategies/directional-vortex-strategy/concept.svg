  <line x1="510" y1="102" x2="510" y2="138" stroke="#26a69a" stroke-width="1"/>
  <rect x="506" y="110" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="535" y1="98" x2="535" y2="132" stroke="#26a69a" stroke-width="1"/>
  <rect x="531" y="105" width="8" height="18" fill="#26a69a" rx="1"/>
  <!-- Top / reversal down -->
  <line x1="560" y1="95" x2="560" y2="130" stroke="#ef5350" stroke-width="1"/>
  <rect x="556" y="100" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="585" y1="100" x2="585" y2="138" stroke="#ef5350" stroke-width="1"/>
  <rect x="581" y="108" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="610" y1="112" x2="610" y2="150" stroke="#ef5350" stroke-width="1"/>
