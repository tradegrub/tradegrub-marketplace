<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Tail Risk Oscillator</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="360" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="88" fill="#888" font-family="Inter,sans-serif" font-size="10">Kurtosis / Skewness</text>

  <!-- Zero line -->
  <line x1="60" y1="300" x2="760" y2="300" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- High risk line at 3 -->
  <line x1="60" y1="160" x2="760" y2="160" stroke="#EF5350" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="765" y="164" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">3.0</text>

  <!-- High risk bg -->
  <rect x="350" y="70" width="120" height="90" fill="rgba(239,83,80,0.06)"/>

  <!-- Kurtosis line -->
  <polyline points="100,280 150,270 200,250 250,230 300,200 350,140 400,120 450,150 500,220 550,260 600,280 650,290 700,285"
    fill="none" stroke="#FF7043" stroke-width="2.5"/>

  <!-- Skewness line -->
  <polyline points="100,300 150,310 200,290 250,280 300,310 350,330 400,340 450,320 500,300 550,290 600,300 650,310 700,305"
    fill="none" stroke="#42A5F5" stroke-width="2"/>

  <!-- Legend -->
  <rect x="60" y="460" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="475" x2="110" y2="475" stroke="#FF7043" stroke-width="2.5"/>
  <text x="115" y="479" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Excess Kurtosis</text>
  <line x1="300" y1="475" x2="330" y2="475" stroke="#42A5F5" stroke-width="2"/>
  <text x="335" y="479" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Skewness</text>
  <line x1="470" y1="475" x2="500" y2="475" stroke="#EF5350" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="505" y="479" fill="#ccc" font-family="Inter,sans-serif" font-size="11">High Tail Risk (3.0)</text>
</svg>
