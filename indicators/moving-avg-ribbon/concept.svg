<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="ribbonBull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#42a5f5" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="120" x2="760" y2="120"/><line x1="60" y1="200" x2="760" y2="200"/>
    <line x1="60" y1="280" x2="760" y2="280"/><line x1="60" y1="360" x2="760" y2="360"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Rainbow MA Ribbon</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- 10 MA lines from fast (red) to slow (blue), with fill between -->
  <!-- SMA 10 (fastest - red) -->
  <polyline points="80,280 120,265 160,240 200,210 240,185 280,170 320,160 360,155 400,158 440,170 480,190 520,215 560,240 600,248 640,238 680,220 720,200 760,185" fill="none" stroke="#ef5350" stroke-width="1.5" opacity="0.8"/>
  <!-- SMA 20 -->
  <polyline points="80,285 120,272 160,250 200,222 240,198 280,182 320,172 360,168 400,172 440,185 480,205 520,228 560,250 600,255 640,248 680,232 720,215 760,200" fill="none" stroke="#ff7043" stroke-width="1.5" opacity="0.7"/>
  <!-- SMA 30 -->
  <polyline points="80,290 120,278 160,258 200,232 240,210 280,195 320,185 360,180 400,185 440,198 480,218 520,240 560,258 600,262 640,255 680,242 720,228 760,215" fill="none" stroke="#ff9800" stroke-width="1.5" opacity="0.7"/>
  <!-- SMA 40 -->
  <polyline points="80,294 120,284 160,265 200,242 240,222 280,208 320,198 360,192 400,198 440,210 480,230 520,250 560,265 600,268 640,262 680,250 720,238 760,228" fill="none" stroke="#ffc107" stroke-width="1.5" opacity="0.7"/>
  <!-- SMA 50 -->
  <polyline points="80,298 120,289 160,272 200,252 240,234 280,220 320,210 360,205 400,210 440,222 480,240 520,258 560,272 600,275 640,268 680,258 720,248 760,238" fill="none" stroke="#cddc39" stroke-width="1.5" opacity="0.7"/>
  <!-- SMA 60 -->
  <polyline points="80,302 120,294 160,278 200,260 240,244 280,232 320,222 360,218 400,222 440,234 480,250 520,265 560,278 600,280 640,275 680,265 720,255 760,248" fill="none" stroke="#66bb6a" stroke-width="1.5" opacity="0.7"/>
  <!-- SMA 70 -->
  <polyline points="80,305 120,298 160,284 200,268 240,254 280,242 320,232 360,228 400,232 440,244 480,258 520,272 560,284 600,285 640,280 680,272 720,262 760,255" fill="none" stroke="#26a69a" stroke-width="1.5" opacity="0.7"/>
  <!-- SMA 80 -->
  <polyline points="80,308 120,302 160,290 200,275 240,262 280,252 320,242 360,238 400,242 440,252 480,265 520,278 560,288 600,290 640,285 680,278 720,268 760,262" fill="none" stroke="#29b6f6" stroke-width="1.5" opacity="0.7"/>
  <!-- SMA 90 -->
