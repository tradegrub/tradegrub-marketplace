<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="600">MA Deviation Channel</text>

  <!-- Outer upper band (extreme deviation) -->
  <polyline points="60,100 120,95 180,105 240,90 300,85 360,95 420,80 480,90 540,100 600,85 660,90 720,95"
    fill="none" stroke="#ef5350" stroke-width="1.5" opacity="0.7"/>

  <!-- Inner upper band (average deviation) -->
  <polyline points="60,150 120,148 180,155 240,142 300,138 360,147 420,133 480,143 540,152 600,138 660,142 720,147"
    fill="none" stroke="#FF9800" stroke-width="1.5" opacity="0.8"/>

  <!-- Moving average center line -->
  <polyline points="60,220 120,215 180,225 240,210 300,205 360,215 420,200 480,210 540,220 600,205 660,210 720,215"
    fill="none" stroke="#2196F3" stroke-width="2.5"/>

  <!-- Inner lower band (average deviation) -->
  <polyline points="60,290 120,282 180,295 240,278 300,272 360,283 420,267 480,277 540,288 600,272 660,278 720,283"
    fill="none" stroke="#FF9800" stroke-width="1.5" opacity="0.8"/>

  <!-- Outer lower band (extreme deviation) -->
  <polyline points="60,340 120,335 180,345 240,330 300,325 360,335 420,320 480,330 540,340 600,325 660,330 720,335"
    fill="none" stroke="#ef5350" stroke-width="1.5" opacity="0.7"/>

  <!-- Fill between outer bands (subtle) -->
  <polygon points="60,100 120,95 180,105 240,90 300,85 360,95 420,80 480,90 540,100 600,85 660,90 720,95 720,335 660,330 600,325 540,340 480,330 420,320 360,335 300,325 240,330 180,345 120,335 60,340"
    fill="#2196F3" opacity="0.04"/>

  <!-- Fill between inner bands (slightly more visible) -->
  <polygon points="60,150 120,148 180,155 240,142 300,138 360,147 420,133 480,143 540,152 600,138 660,142 720,147 720,283 660,278 600,272 540,288 480,277 420,267 360,283 300,272 240,278 180,295 120,282 60,290"
    fill="#2196F3" opacity="0.06"/>

  <!-- Price line weaving through channels -->
  <polyline points="60,200 90,180 120,160 150,145 180,165 210,190 240,215 270,235 300,270 330,285 360,275 390,240 420,210 450,180 480,155 510,140 540,160 570,185 600,210 630,230 660,250 690,225 720,200"
    fill="none" stroke="#e2e8f0" stroke-width="1.8" stroke-linejoin="round" opacity="0.9"/>

  <!-- Band labels on right side -->
  <text x="735" y="95" fill="#ef5350" font-size="10" font-weight="500">+2 Dev</text>
  <text x="735" y="147" fill="#FF9800" font-size="10" font-weight="500">+1 Dev</text>
  <text x="735" y="215" fill="#2196F3" font-size="10" font-weight="600">MA</text>
  <text x="735" y="283" fill="#FF9800" font-size="10" font-weight="500">-1 Dev</text>
  <text x="735" y="335" fill="#ef5350" font-size="10" font-weight="500">-2 Dev</text>

  <!-- Annotations -->
  <!-- Arrow pointing to price touching outer band -->
  <line x1="150" y1="120" x2="150" y2="140" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="150" y="115" text-anchor="middle" fill="#ef5350" font-size="9">Overbought</text>

  <line x1="330" y1="310" x2="330" y2="290" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="330" y="322" text-anchor="middle" fill="#ef5350" font-size="9">Oversold</text>

  <!-- Legend -->
  <rect x="120" y="400" width="16" height="3" fill="#2196F3" rx="1"/>
  <text x="142" y="405" fill="#e2e8f0" font-size="11">Moving Average</text>

  <rect x="270" y="400" width="16" height="3" fill="#FF9800" rx="1"/>
  <text x="292" y="405" fill="#e2e8f0" font-size="11">Avg Deviation (1x)</text>

  <rect x="450" y="400" width="16" height="3" fill="#ef5350" rx="1"/>
  <text x="472" y="405" fill="#e2e8f0" font-size="11">Extreme Deviation (2x)</text>

  <rect x="170" y="420" width="16" height="3" fill="#e2e8f0" rx="1" opacity="0.9"/>
  <text x="192" y="425" fill="#e2e8f0" font-size="11">Price</text>

  <text x="400" y="470" text-anchor="middle" fill="#787b86" font-size="11">Channels expand and contract based on average deviation from the MA</text>
</svg>