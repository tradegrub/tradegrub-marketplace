<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Pyramid Accumulator Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- SMA line -->
  <polyline points="80,200 140,205 200,210 260,215 320,220 380,218 440,215 500,210 560,205 620,195 680,185"
    fill="none" stroke="#FF9800" stroke-width="2" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="690" y="182" fill="#FF9800" font-size="9">SMA</text>

  <!-- Price line dipping below SMA multiple times -->
  <polyline points="80,190 110,200 140,220 170,240 200,250 230,235 260,215 290,200 320,210 350,230 380,255 410,245 440,220 470,210 500,215 530,235 560,248 590,230 620,200 650,180 680,160 710,140"
    fill="none" stroke="#2196F3" stroke-width="2.5"/>

  <!-- Pyramid buy 1 - smallest -->
  <g filter="url(#glow)">
    <polygon points="170,255 164,245 176,245" fill="#26a69a"/>
  </g>
  <text x="170" y="270" text-anchor="middle" fill="#26a69a" font-size="8" font-weight="500">Buy 1x</text>

  <!-- Pyramid buy 2 - medium -->
  <g filter="url(#glow)">
    <polygon points="380,270 372,258 388,258" fill="#26a69a"/>
  </g>
  <text x="380" y="285" text-anchor="middle" fill="#26a69a" font-size="8" font-weight="500">Buy 2x</text>

  <!-- Pyramid buy 3 - largest -->
  <g filter="url(#glow)">
    <polygon points="560,263 550,248 570,248" fill="#26a69a"/>
  </g>
  <text x="560" y="278" text-anchor="middle" fill="#26a69a" font-size="8" font-weight="500">Buy 3x</text>

  <!-- "Below SMA" labels -->
  <rect x="145" y="225" width="55" height="14" rx="3" fill="#2196F3" fill-opacity="0.1"/>
  <text x="172" y="235" text-anchor="middle" fill="#2196F3" font-size="7">Below SMA</text>
  <rect x="355" y="232" width="55" height="14" rx="3" fill="#2196F3" fill-opacity="0.1"/>
  <text x="382" y="242" text-anchor="middle" fill="#2196F3" font-size="7">Below SMA</text>
  <rect x="535" y="228" width="55" height="14" rx="3" fill="#2196F3" fill-opacity="0.1"/>
  <text x="562" y="238" text-anchor="middle" fill="#2196F3" font-size="7">Below SMA</text>

  <!-- Average entry line -->
  <line x1="170" y1="240" x2="680" y2="240" stroke="#787b86" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="690" y="244" fill="#787b86" font-size="8">Avg Entry</text>

  <!-- Exit point - price above avg entry -->
  <circle cx="680" cy="160" r="7" fill="none" stroke="#26a69a" stroke-width="2"/>
  <rect x="620" y="140" width="55" height="18" rx="4" fill="#26a69a" fill-opacity="0.15" stroke="#26a69a" stroke-width="1" stroke-opacity="0.4"/>
  <text x="647" y="153" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="600">EXIT</text>

  <!-- Profit zone shading -->
  <polygon points="620,200 650,180 680,160 710,140 710,240 680,240 650,240 620,240" fill="#26a69a" fill-opacity="0.06"/>

  <!-- Pyramid size visualization -->
  <g transform="translate(100, 320)">
    <rect width="200" height="80" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <text x="100" y="16" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="500">Pyramid Sizing</text>
    <rect x="65" y="25" width="70" height="12" fill="#26a69a" opacity="0.3" rx="2"/>
    <text x="60" y="35" text-anchor="end" fill="#787b86" font-size="8">Dip 1</text>
    <rect x="65" y="42" width="105" height="12" fill="#26a69a" opacity="0.5" rx="2"/>
    <text x="60" y="52" text-anchor="end" fill="#787b86" font-size="8">Dip 2</text>
    <rect x="65" y="59" width="130" height="12" fill="#26a69a" opacity="0.7" rx="2"/>
    <text x="60" y="69" text-anchor="end" fill="#787b86" font-size="8">Dip 3</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#2196F3"/>
    <text x="30" y="24" fill="#999" font-size="9">Price</text>
    <line x1="90" y1="20" x2="110" y2="20" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="115" y="24" fill="#999" font-size="9">SMA</text>
    <polygon points="185,24 180,14 190,14" fill="#26a69a"/>
    <text x="195" y="24" fill="#999" font-size="9">Pyramid Buy (increasing size)</text>
    <circle cx="385" cy="20" r="4" fill="none" stroke="#26a69a" stroke-width="1.5"/>
    <text x="395" y="24" fill="#999" font-size="9">Profit Exit</text>
  </g>
</svg>