<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="normalZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7e57c2" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#7e57c2" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#7e57c2" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Z-Score Indicator</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price candles in top 45% -->
  <line x1="100" y1="170" x2="100" y2="205" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="178" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="130" y1="162" x2="130" y2="198" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="170" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="160" y1="150" x2="160" y2="188" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="158" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="190" y1="135" x2="190" y2="172" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="142" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="220" y1="118" x2="220" y2="155" stroke="#26a69a" stroke-width="1"/>
  <rect x="216" y="125" width="8" height="20" fill="#26a69a" rx="1"/>
  <!-- Extreme high -->
  <line x1="250" y1="95" x2="250" y2="135" stroke="#26a69a" stroke-width="1"/>
  <rect x="246" y="100" width="8" height="24" fill="#26a69a" rx="1"/>

  <!-- Overbought background zone -->
  <rect x="240" y="80" width="50" height="70" fill="#ef5350" fill-opacity="0.06" rx="4"/>

  <line x1="280" y1="100" x2="280" y2="140" stroke="#ef5350" stroke-width="1"/>
  <rect x="276" y="105" width="8" height="24" fill="#ef5350" rx="1"/>

  <!-- Sell signal annotation -->
  <rect x="295" y="88" width="68" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="329" y="101" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="500">z > +2.0</text>

  <!-- Mean reversion down -->
  <line x1="310" y1="118" x2="310" y2="158" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="125" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="340" y1="140" x2="340" y2="178" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="148" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="370" y1="155" x2="370" y2="192" stroke="#ef5350" stroke-width="1"/>
  <rect x="366" y="162" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="400" y1="165" x2="400" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="396" y="175" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="430" y1="172" x2="430" y2="208" stroke="#ef5350" stroke-width="1"/>
  <rect x="426" y="180" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="460" y1="182" x2="460" y2="218" stroke="#ef5350" stroke-width="1"/>
  <rect x="456" y="190" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="490" y1="195" x2="490" y2="232" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="202" width="8" height="20" fill="#ef5350" rx="1"/>
  <!-- Extreme low -->
  <line x1="520" y1="210" x2="520" y2="252" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="218" width="8" height="24" fill="#ef5350" rx="1"/>

  <!-- Oversold background zone -->
  <rect x="510" y="200" width="50" height="65" fill="#26a69a" fill-opacity="0.06" rx="4"/>

  <line x1="550" y1="215" x2="550" y2="250" stroke="#26a69a" stroke-width="1"/>
  <rect x="546" y="222" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- Buy signal annotation -->
  <rect x="565" y="235" width="68" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="599" y="248" text-anchor="middle" fill="#00e676" font-size="9" font-weight="500">z &lt; -2.0</text>

  <!-- Recovery -->
  <line x1="580" y1="200" x2="580" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="208" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="610" y1="188" x2="610" y2="222" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="195" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="640" y1="178" x2="640" y2="210" stroke="#ef5350" stroke-width="1"/>
  <rect x="636" y="182" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="670" y1="168" x2="670" y2="200" stroke="#26a69a" stroke-width="1"/>
  <rect x="666" y="175" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="700" y1="162" x2="700" y2="192" stroke="#26a69a" stroke-width="1"/>
  <rect x="696" y="168" width="8" height="15" fill="#26a69a" rx="1"/>

  <!-- SMA line overlaid on price -->
  <polyline points="100,188 130,182 160,178 190,172 220,165 250,158 280,152 310,152 340,155 370,162 400,170 430,176 460,182 490,188 520,195 550,198 580,198 610,195 640,190 670,185 700,180" stroke="#888" stroke-width="1" stroke-dasharray="4,3" fill="none" opacity="0.5"/>

  <!-- Z-Score oscillator panel (bottom, y 280-420) -->
  <!-- Axis labels -->
  <text x="72" y="288" text-anchor="end" fill="#888" font-size="8">+3.0</text>
  <text x="72" y="318" text-anchor="end" fill="#888" font-size="8">+2.0</text>
  <text x="72" y="350" text-anchor="end" fill="#888" font-size="8">0</text>
  <text x="72" y="382" text-anchor="end" fill="#888" font-size="8">-2.0</text>
  <text x="72" y="412" text-anchor="end" fill="#888" font-size="8">-3.0</text>

  <!-- Overbought line -->
  <line x1="80" y1="315" x2="740" y2="315" stroke="#ef5350" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="745" y="319" fill="#ef5350" font-size="8">+2.0</text>

  <!-- Zero line -->
  <line x1="80" y1="350" x2="740" y2="350" stroke="#888" stroke-width="0.8" opacity="0.3"/>

  <!-- Oversold line -->
  <line x1="80" y1="385" x2="740" y2="385" stroke="#00e676" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="745" y="389" fill="#00e676" font-size="8">-2.0</text>

  <!-- Normal zone fill between thresholds -->
  <rect x="80" y="315" width="660" height="70" fill="url(#normalZone)" rx="0"/>

  <!-- Z-score line -->
  <polyline points="100,358 130,348 160,338 190,325 220,310 250,292 280,298 310,318 340,335 370,342 400,348 430,352 460,358 490,368 520,392 550,388 580,375 610,358 640,348 670,342 700,348" stroke="#7e57c2" stroke-width="2.5" fill="none"/>

  <!-- Overbought zone highlight -->
  <rect x="210" y="280" width="80" height="38" fill="#ef5350" fill-opacity="0.06" rx="3"/>

  <!-- Oversold zone highlight -->
  <rect x="500" y="380" width="60" height="35" fill="#26a69a" fill-opacity="0.06" rx="3"/>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#7e57c2"/>
    <text x="30" y="24" fill="#999" font-size="9">Z-Score</text>
    <circle cx="105" cy="20" r="4" fill="#ef5350"/>
    <text x="115" y="24" fill="#999" font-size="9">Overbought (+2.0)</text>
    <circle cx="235" cy="20" r="4" fill="#00e676"/>
    <text x="245" y="24" fill="#999" font-size="9">Oversold (-2.0)</text>
    <rect x="360" y="12" width="20" height="16" fill="#7e57c2" opacity="0.15" rx="2"/>
    <text x="385" y="24" fill="#999" font-size="9">Normal Zone</text>
    <circle cx="475" cy="20" r="4" fill="#888"/>
    <text x="485" y="24" fill="#999" font-size="9">SMA (Mean)</text>
  </g>
</svg>