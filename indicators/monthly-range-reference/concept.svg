<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glowLine"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowArrow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="legendBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#16213e" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="55" x2="60" y2="430"/><line x1="160" y1="55" x2="160" y2="430"/>
    <line x1="260" y1="55" x2="260" y2="430"/><line x1="360" y1="55" x2="360" y2="430"/>
    <line x1="460" y1="55" x2="460" y2="430"/><line x1="560" y1="55" x2="560" y2="430"/>
    <line x1="660" y1="55" x2="660" y2="430"/><line x1="760" y1="55" x2="760" y2="430"/>
    <line x1="40" y1="100" x2="770" y2="100"/><line x1="40" y1="160" x2="770" y2="160"/>
    <line x1="40" y1="220" x2="770" y2="220"/><line x1="40" y1="280" x2="770" y2="280"/>
    <line x1="40" y1="340" x2="770" y2="340"/><line x1="40" y1="400" x2="770" y2="400"/>
  </g>

  <!-- Title -->
  <text x="40" y="35" fill="#e0e0e0" font-size="17" font-weight="600">Monthly Range Reference</text>
  <text x="760" y="35" fill="#888" font-size="10" text-anchor="end">tradegrub.finance</text>

  <!-- Monthly High line (red, solid) at y=120 -->
  <line x1="40" y1="120" x2="770" y2="120" stroke="#ef5350" stroke-width="1.8" stroke-opacity="0.85" filter="url(#glowLine)"/>
  <rect x="680" y="107" width="88" height="16" rx="3" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="724" y="119" fill="#ef5350" font-size="9" text-anchor="middle" font-weight="500">Monthly High</text>

  <!-- Monthly Open line (orange, dashed) at y=250 -->
  <line x1="40" y1="250" x2="770" y2="250" stroke="#ffab40" stroke-width="1.5" stroke-dasharray="8,5" stroke-opacity="0.8" filter="url(#glowLine)"/>
  <rect x="680" y="237" width="88" height="16" rx="3" fill="#ffab40" fill-opacity="0.15" stroke="#ffab40" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="724" y="249" fill="#ffab40" font-size="9" text-anchor="middle" font-weight="500">Monthly Open</text>

  <!-- Monthly Low line (green, solid) at y=390 -->
  <line x1="40" y1="390" x2="770" y2="390" stroke="#26a69a" stroke-width="1.8" stroke-opacity="0.85" filter="url(#glowLine)"/>
  <rect x="680" y="377" width="88" height="16" rx="3" fill="#26a69a" fill-opacity="0.15" stroke="#26a69a" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="724" y="389" fill="#26a69a" font-size="9" text-anchor="middle" font-weight="500">Monthly Low</text>

  <!-- Price line (white) - realistic path crossing open line -->
  <polyline fill="none" stroke="#e0e0e0" stroke-width="1.8" stroke-opacity="0.9" stroke-linejoin="round"
    points="50,280 68,275 86,268 104,260 122,255 140,248 158,240 176,230 194,215 212,200
            230,190 248,178 266,168 284,155 302,148 320,145 338,152 356,160 374,170
            392,185 410,195 428,210 446,225 464,238 482,248 500,258 518,270
            536,280 554,290 572,298 590,310 608,320 626,330 644,335 662,325
            680,310 698,295 716,278 734,260 752,245 760,240"/>

  <!-- Trend bias arrow UP (left side, when price goes above open around x=140) -->
  <polygon points="120,215 140,165 160,215" fill="#26a69a" fill-opacity="0.12" stroke="none" filter="url(#glowArrow)"/>
  <polygon points="128,210 140,175 152,210" fill="#26a69a" fill-opacity="0.08"/>
  <!-- Large semi-transparent up arrow in the bullish region -->
  <polygon points="250,130 300,80 350,130 320,130 320,195 280,195 280,130" fill="#26a69a" fill-opacity="0.06" filter="url(#glowArrow)"/>
  <text x="300" y="215" fill="#26a69a" font-size="10" text-anchor="middle" fill-opacity="0.5" font-weight="600">BULLISH BIAS</text>

  <!-- Trend bias arrow DOWN (right side, when price drops below open around x=518) -->
  <polygon points="560,290 610,340 660,290 630,290 630,260 590,260 590,290" fill="#ef5350" fill-opacity="0.06" filter="url(#glowArrow)"/>
  <text x="610" y="365" fill="#ef5350" font-size="10" text-anchor="middle" fill-opacity="0.5" font-weight="600">BEARISH BIAS</text>

  <!-- Y-axis price labels -->
  <text x="30" y="124" fill="#555" font-size="8" text-anchor="end">195</text>
  <text x="30" y="254" fill="#555" font-size="8" text-anchor="end">180</text>
  <text x="30" y="394" fill="#555" font-size="8" text-anchor="end">165</text>

  <!-- Legend bar -->
  <rect x="40" y="450" width="720" height="40" rx="6" fill="url(#legendBg)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="60" y1="472" x2="90" y2="472" stroke="#ef5350" stroke-width="2"/>
  <text x="96" y="476" fill="#aaa" font-size="10">Monthly High</text>
  <line x1="195" y1="472" x2="225" y2="472" stroke="#ffab40" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="231" y="476" fill="#aaa" font-size="10">Monthly Open</text>
  <line x1="340" y1="472" x2="370" y2="472" stroke="#26a69a" stroke-width="2"/>
  <text x="376" y="476" fill="#aaa" font-size="10">Monthly Low</text>
  <line x1="470" y1="472" x2="500" y2="472" stroke="#e0e0e0" stroke-width="1.8"/>
  <text x="506" y="476" fill="#aaa" font-size="10">Price</text>
</svg>