<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Double Top Bottom Detector</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Double Top section -->
  <rect x="60" y="70" width="340" height="360" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="230" y="92" text-anchor="middle" fill="#FF5252" font-family="Inter,sans-serif" font-size="12" font-weight="600">Double Top</text>

  <!-- Price action forming double top -->
  <polyline points="80,300 110,260 140,200 170,150 200,110 200,110 215,130 230,180 250,220 270,180 290,130 310,110 320,130 340,170 360,220 380,280 380,320" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <!-- First peak -->
  <circle cx="200" cy="110" r="5" fill="none" stroke="#FF5252" stroke-width="2"/>
  <text x="200" y="98" text-anchor="middle" fill="#FF5252" font-family="Inter,sans-serif" font-size="9">Peak 1</text>
  <!-- Second peak -->
  <circle cx="310" cy="110" r="5" fill="none" stroke="#FF5252" stroke-width="2"/>
  <text x="310" y="98" text-anchor="middle" fill="#FF5252" font-family="Inter,sans-serif" font-size="9">Peak 2</text>
  <!-- Neckline -->
  <line x1="80" y1="220" x2="390" y2="220" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="395" y="224" fill="#42A5F5" font-family="Inter,sans-serif" font-size="9">Neckline</text>
  <!-- Break signal -->
  <polygon points="360,235 355,225 365,225" fill="#FF5252"/>
  <text x="360" y="250" text-anchor="middle" fill="#FF5252" font-family="Inter,sans-serif" font-size="8">BREAK</text>
  <!-- Tolerance zone -->
  <rect x="185" y="105" width="140" height="15" fill="rgba(239,83,80,0.1)" rx="2"/>
  <text x="255" y="115" text-anchor="middle" fill="#FF5252" font-family="Inter,sans-serif" font-size="7">Tolerance Zone</text>

  <!-- Double Bottom section -->
  <rect x="420" y="70" width="340" height="360" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="590" y="92" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="12" font-weight="600">Double Bottom</text>

  <!-- Price action forming double bottom -->
  <polyline points="440,130 470,170 500,230 530,280 560,320 560,320 575,300 590,250 610,210 630,250 650,300 670,320 680,300 700,260 720,210 740,150 740,120" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <!-- First valley -->
  <circle cx="560" cy="320" r="5" fill="none" stroke="#00e676" stroke-width="2"/>
  <text x="560" y="340" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="9">Valley 1</text>
  <!-- Second valley -->
  <circle cx="670" cy="320" r="5" fill="none" stroke="#00e676" stroke-width="2"/>
  <text x="670" y="340" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="9">Valley 2</text>
  <!-- Neckline -->
  <line x1="440" y1="210" x2="750" y2="210" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="442" y="204" fill="#42A5F5" font-family="Inter,sans-serif" font-size="9">Neckline</text>
  <!-- Break signal -->
  <polygon points="720,198 715,208 725,208" fill="#00e676"/>
  <text x="720" y="188" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="8">BREAK</text>
  <!-- Tolerance zone -->
  <rect x="545" y="315" width="140" height="15" fill="rgba(0,230,118,0.1)" rx="2"/>
  <text x="615" y="325" text-anchor="middle" fill="#00e676" font-family="Inter,sans-serif" font-size="7">Tolerance Zone</text>

  <!-- Legend -->
  <rect x="60" y="455" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <circle cx="100" cy="470" r="4" fill="#FF5252"/>
  <text x="110" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Double Top</text>
  <circle cx="230" cy="470" r="4" fill="#00e676"/>
  <text x="240" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Double Bottom</text>
  <circle cx="380" cy="470" r="4" fill="#42A5F5"/>
  <text x="390" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Neckline</text>
</svg>