<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="curvatureGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b2d8e" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#5c1a7a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#16213e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="curvatureGradDown" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7b2d8e" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#5c1a7a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#16213e" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="massWell" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#16213e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid lines -->
  <g stroke="#445577" stroke-width="0.5" opacity="0.04">
    <line x1="100" y1="80" x2="100" y2="440"/><line x1="200" y1="80" x2="200" y2="440"/>
    <line x1="300" y1="80" x2="300" y2="440"/><line x1="400" y1="80" x2="400" y2="440"/>
    <line x1="500" y1="80" x2="500" y2="440"/><line x1="600" y1="80" x2="600" y2="440"/>
    <line x1="700" y1="80" x2="700" y2="440"/>
    <line x1="60" y1="120" x2="740" y2="120"/><line x1="60" y1="180" x2="740" y2="180"/>
    <line x1="60" y1="240" x2="740" y2="240"/><line x1="60" y1="300" x2="740" y2="300"/>
    <line x1="60" y1="360" x2="740" y2="360"/><line x1="60" y1="420" x2="740" y2="420"/>
  </g>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e8e8f0" font-size="17" font-weight="600">Spacetime Curvature Attractor</text>
  <text x="400" y="56" text-anchor="middle" fill="#6a6a8e" font-size="11">tradegrub.finance</text>

  <!-- Gravity well / mass region -->
  <ellipse cx="420" cy="290" rx="140" ry="90" fill="url(#massWell)"/>

  <!-- Curvature field arcs — concentric curves around attractor -->
  <g fill="none" opacity="0.35">
    <path d="M180,340 Q300,200 420,260 Q540,320 660,230" stroke="#7c3aed" stroke-width="0.8"/>
    <path d="M160,360 Q290,190 420,250 Q550,310 680,210" stroke="#6d28d9" stroke-width="0.7"/>
    <path d="M140,380 Q280,175 420,240 Q560,305 700,190" stroke="#5b21b6" stroke-width="0.6"/>
    <path d="M120,400 Q270,160 420,230 Q570,300 720,170" stroke="#4c1d95" stroke-width="0.5"/>
    <path d="M200,320 Q310,210 420,270 Q530,330 640,250" stroke="#8b5cf6" stroke-width="0.9"/>
  </g>

  <!-- Field lines radiating outward from attractor center -->
  <g stroke="#7c3aed" stroke-width="0.5" opacity="0.2">
    <line x1="420" y1="280" x2="320" y2="140"/>
    <line x1="420" y1="280" x2="370" y2="130"/>
    <line x1="420" y1="280" x2="470" y2="130"/>
    <line x1="420" y1="280" x2="520" y2="140"/>
    <line x1="420" y1="280" x2="560" y2="170"/>
    <line x1="420" y1="280" x2="280" y2="170"/>
    <line x1="420" y1="280" x2="300" y2="400"/>
    <line x1="420" y1="280" x2="540" y2="400"/>
    <line x1="420" y1="280" x2="350" y2="410"/>
    <line x1="420" y1="280" x2="490" y2="410"/>
  </g>

  <!-- Curvature gradient arcs — closer to attractor -->
  <g fill="none" opacity="0.25">
    <path d="M260,310 Q340,230 420,270 Q500,310 580,260" stroke="#a855f7" stroke-width="1.2"/>
    <path d="M290,300 Q350,240 420,270 Q490,300 560,265" stroke="#c084fc" stroke-width="1.0"/>
    <path d="M320,295 Q370,250 420,272 Q470,295 530,268" stroke="#d8b4fe" stroke-width="0.7"/>
  </g>

  <!-- Attractor line (magenta/pink, thicker, with glow) -->
  <polyline points="80,350 140,330 200,310 260,295 320,285 380,275 420,272 460,275 500,280 540,278 580,265 630,250 680,235 730,220"
    fill="none" stroke="#d946ef" stroke-width="3.5" filter="url(#glowStrong)" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Price line (cyan/white) being pulled toward attractor -->
  <polyline points="80,200 120,210 160,190 200,220 240,195 280,230 320,250 360,260 400,258 440,255 480,245 520,240 560,235 600,225 640,220 680,215 730,210"
    fill="none" stroke="#67e8f9" stroke-width="2" filter="url(#glow)" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Pull arrows showing attraction -->
  <g stroke="#d946ef" stroke-width="1" opacity="0.5" fill="none" marker-end="none">
    <path d="M320,250 C325,260 322,270 320,280" stroke-dasharray="3,2"/>
    <path d="M400,258 C402,262 401,268 400,272" stroke-dasharray="3,2"/>
    <path d="M480,245 C482,255 481,265 480,275" stroke-dasharray="3,2"/>
    <path d="M560,235 C558,245 557,255 558,262" stroke-dasharray="3,2"/>
  </g>
  <!-- Small arrow tips -->
  <g fill="#d946ef" opacity="0.5">
    <polygon points="317,280 320,286 323,280"/>
    <polygon points="397,272 400,278 403,272"/>
    <polygon points="477,275 480,281 483,275"/>
    <polygon points="555,262 558,268 561,262"/>
  </g>

  <!-- "Mass = Volume" annotation -->
  <g transform="translate(440,320)">
    <rect x="-50" y="-12" width="100" height="22" rx="4" fill="#1a1a2e" fill-opacity="0.8" stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="500">Mass = Volume</text>
  </g>

  <!-- Data points on price line where pull is strongest -->
  <circle cx="320" cy="250" r="3" fill="#67e8f9" opacity="0.8"/>
  <circle cx="400" cy="258" r="3" fill="#67e8f9" opacity="0.8"/>
  <circle cx="480" cy="245" r="3" fill="#67e8f9" opacity="0.8"/>

  <!-- Legend bar at bottom -->
  <g transform="translate(0,460)">
    <line x1="60" y1="0" x2="740" y2="0" stroke="#334" stroke-width="0.5" opacity="0.3"/>
    <rect x="100" y="8" width="14" height="3" rx="1.5" fill="#67e8f9"/>
    <text x="120" y="14" fill="#8888aa" font-size="10">Price</text>
    <rect x="190" y="8" width="14" height="3" rx="1.5" fill="#d946ef"/>
    <text x="210" y="14" fill="#8888aa" font-size="10">Attractor</text>
    <rect x="300" y="8" width="14" height="3" rx="1.5" fill="#7c3aed" opacity="0.5"/>
    <text x="320" y="14" fill="#8888aa" font-size="10">Curvature Field</text>
    <line x1="440" y1="5" x2="440" y2="17" stroke="#d946ef" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <text x="450" y="14" fill="#8888aa" font-size="10">Gravitational Pull</text>
  </g>
</svg>