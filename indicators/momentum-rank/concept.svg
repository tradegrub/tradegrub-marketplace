<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Percentile Momentum Ranker</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price panel top 45% -->
  <line x1="100" y1="185" x2="100" y2="220" stroke="#26a69a" stroke-width="1"/><rect x="96" y="192" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="135" y1="178" x2="135" y2="215" stroke="#26a69a" stroke-width="1"/><rect x="131" y="185" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="170" y1="168" x2="170" y2="205" stroke="#ef5350" stroke-width="1"/><rect x="166" y="172" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="205" y1="155" x2="205" y2="195" stroke="#26a69a" stroke-width="1"/><rect x="201" y="162" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="240" y1="140" x2="240" y2="180" stroke="#26a69a" stroke-width="1"/><rect x="236" y="148" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="275" y1="128" x2="275" y2="170" stroke="#26a69a" stroke-width="1"/><rect x="271" y="135" width="8" height="22" fill="#26a69a" rx="1"/>
