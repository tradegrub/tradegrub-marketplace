<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">VWAP Deviation Z-Score</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <!-- Price chart with VWAP -->
  <rect x="60" y="70" width="700" height="150" fill="rgba(255,255,255,0.02)" rx="4"/>
  <line x1="100" y1="100" x2="100" y2="160" stroke="#666" stroke-width="1"/>
  <rect x="96" y="110" width="8" height="30" fill="#4CAF50"/>
  <line x1="160" y1="95" x2="160" y2="150" stroke="#666" stroke-width="1"/>
  <rect x="156" y="100" width="8" height="35" fill="#4CAF50"/>
  <line x1="220" y1="90" x2="220" y2="145" stroke="#666" stroke-width="1"/>
  <rect x="216" y="95" width="8" height="30" fill="#4CAF50"/>
  <line x1="280" y1="100" x2="280" y2="155" stroke="#666" stroke-width="1"/>
  <rect x="276" y="105" width="8" height="30" fill="#EF5350"/>
  <line x1="340" y1="110" x2="340" y2="165" stroke="#666" stroke-width="1"/>
  <rect x="336" y="120" width="8" height="25" fill="#EF5350"/>
  <line x1="400" y1="130" x2="400" y2="180" stroke="#666" stroke-width="1"/>
  <rect x="396" y="140" width="8" height="25" fill="#EF5350"/>
  <line x1="460" y1="135" x2="460" y2="185" stroke="#666" stroke-width="1"/>
  <rect x="456" y="140" width="8" height="30" fill="#4CAF50"/>
  <line x1="520" y1="125" x2="520" y2="175" stroke="#666" stroke-width="1"/>
  <rect x="516" y="130" width="8" height="30" fill="#4CAF50"/>
  <line x1="580" y1="115" x2="580" y2="170" stroke="#666" stroke-width="1"/>
  <rect x="576" y="120" width="8" height="35" fill="#4CAF50"/>
  <line x1="640" y1="105" x2="640" y2="160" stroke="#666" stroke-width="1"/>
  <rect x="636" y="110" width="8" height="30" fill="#4CAF50"/>
  <line x1="700" y1="110" x2="700" y2="165" stroke="#666" stroke-width="1"/>
  <rect x="696" y="115" width="8" height="35" fill="#EF5350"/>
  <!-- VWAP line -->
  <polyline points="100,140 160,135 220,130 280,128 340,132 400,138 460,142 520,140 580,135 640,130 700,132" fill="none" stroke="#FFD54F" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="720" y="128" fill="#FFD54F" font-family="Inter,sans-serif" font-size="9">VWAP</text>

  <!-- Z-Score subplot -->
  <rect x="60" y="250" width="700" height="180" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="75" y="268" fill="#999" font-family="Inter,sans-serif" font-size="10">Z-Score</text>
  <!-- Threshold lines -->
  <line x1="60" y1="295" x2="760" y2="295" stroke="#EF5350" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="765" y="299" fill="#EF5350" font-family="Inter,sans-serif" font-size="9">+2.0</text>
  <line x1="60" y1="340" x2="760" y2="340" stroke="#888" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="765" y="344" fill="#888" font-family="Inter,sans-serif" font-size="9">0</text>
  <line x1="60" y1="385" x2="760" y2="385" stroke="#66BB6A" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="765" y="389" fill="#66BB6A" font-family="Inter,sans-serif" font-size="9">-2.0</text>
  <!-- Z-Score line -->
  <polyline points="100,330 160,310 220,285 280,305 340,350 400,390 460,370 520,335 580,300 640,280 700,320" fill="none" stroke="#42A5F5" stroke-width="2"/>
  <!-- OB/OS regions -->
  <rect x="200" y="270" width="40" height="25" fill="rgba(239,83,80,0.12)" rx="2"/>
  <rect x="380" y="385" width="40" height="25" fill="rgba(102,187,106,0.12)" rx="2"/>
  <!-- Signal markers -->
  <polygon points="220,278 216,268 224,268" fill="#EF5350"/>
  <polygon points="400,398 396,408 404,408" fill="#66BB6A"/>

  <!-- Legend -->
  <rect x="60" y="455" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <circle cx="100" cy="470" r="4" fill="#42A5F5"/>
  <text x="110" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Z-Score</text>
  <circle cx="210" cy="470" r="4" fill="#FFD54F"/>
  <text x="220" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">VWAP</text>
  <circle cx="310" cy="470" r="4" fill="#EF5350"/>
  <text x="320" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Overbought</text>
  <circle cx="440" cy="470" r="4" fill="#66BB6A"/>
  <text x="450" y="474" fill="#aaa" font-family="Inter,sans-serif" font-size="11">Oversold</text>
</svg>