<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="600">ATR Range Levels</text>

  <!-- ATR Upper level -->
  <line x1="100" y1="100" x2="700" y2="100" stroke="#ef5350" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="720" y="105" fill="#ef5350" font-size="14" font-weight="500">ATR Upper</text>

  <!-- 50% upper -->
  <line x1="100" y1="185" x2="700" y2="185" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="720" y="190" fill="#FF9800" font-size="13">50%</text>

  <!-- Reference line -->
  <line x1="100" y1="270" x2="700" y2="270" stroke="#2196F3" stroke-width="2.5"/>
  <text x="720" y="275" fill="#2196F3" font-size="14" font-weight="500">Reference</text>

  <!-- 50% lower -->
  <line x1="100" y1="355" x2="700" y2="355" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="720" y="360" fill="#FF9800" font-size="13">50%</text>

  <!-- ATR Lower level -->
  <line x1="100" y1="440" x2="700" y2="440" stroke="#26a69a" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="720" y="445" fill="#26a69a" font-size="14" font-weight="500">ATR Lower</text>

  <!-- Range shading -->
  <rect x="100" y="100" width="600" height="340" fill="#2196F3" opacity="0.04" rx="2"/>

  <!-- Price line bouncing within range -->
  <path d="M100,270 L140,250 L180,220 L220,160 L260,120 L300,140 L340,190 L380,240 L420,280 L460,320 L500,380 L540,420 L580,400 L620,350 L660,300 L700,260" fill="none" stroke="#e2e8f0" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Bounce arrows at extremes -->
  <!-- Top bounce -->
  <circle cx="260" cy="120" r="5" fill="none" stroke="#ef5350" stroke-width="1.5"/>
  <path d="M260,108 L260,95 M255,100 L260,95 L265,100" fill="none" stroke="#ef5350" stroke-width="1.5"/>

  <!-- Bottom bounce -->
  <circle cx="540" cy="420" r="5" fill="none" stroke="#26a69a" stroke-width="1.5"/>
  <path d="M540,432 L540,445 M535,440 L540,445 L545,440" fill="none" stroke="#26a69a" stroke-width="1.5"/>

  <!-- ATR distance annotation -->
  <line x1="80" y1="100" x2="80" y2="270" stroke="#787b86" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="75" y="188" text-anchor="end" fill="#787b86" font-size="11" transform="rotate(-90,75,188)">1x ATR</text>
  <line x1="80" y1="270" x2="80" y2="440" stroke="#787b86" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="75" y="358" text-anchor="end" fill="#787b86" font-size="11" transform="rotate(-90,75,358)">1x ATR</text>

  <!-- Legend -->
  <rect x="200" y="470" width="16" height="3" fill="#e2e8f0"/>
  <text x="222" y="475" fill="#e2e8f0" font-size="12">Price</text>
  <line x1="290" y1="472" x2="306" y2="472" stroke="#ef5350" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="312" y="475" fill="#ef5350" font-size="12">ATR Levels</text>
  <line x1="400" y1="472" x2="416" y2="472" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="422" y="475" fill="#FF9800" font-size="12">50% Levels</text>
  <line x1="510" y1="472" x2="526" y2="472" stroke="#2196F3" stroke-width="2.5"/>
  <text x="532" y="475" fill="#2196F3" font-size="12">Reference</text>
</svg>