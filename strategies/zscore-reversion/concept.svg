<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="obZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef5350" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ef5350" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="osZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26a69a" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#26a69a" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/>
    <line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/>
    <line x1="680" y1="60" x2="680" y2="420"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Z-Score Mean Reversion Strategy</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price chart (top 55%) -->
  <!-- SMA line -->
  <polyline points="80,180 140,178 200,175 260,172 320,170 380,172 440,175 500,178 560,180 620,182 680,185 730,188" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="735" y="191" fill="#ff9800" font-size="8">SMA(20)</text>

  <!-- Price candles - oscillating around SMA -->
  <line x1="100" y1="165" x2="100" y2="195" stroke="#26a69a" stroke-width="1"/>
  <rect x="96" y="172" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="130" y1="155" x2="130" y2="188" stroke="#26a69a" stroke-width="1"/>
  <rect x="126" y="162" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="160" y1="142" x2="160" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="148" width="8" height="22" fill="#26a69a" rx="1"/>
  <!-- Extreme high (z > +2) -->
  <line x1="190" y1="108" x2="190" y2="158" stroke="#26a69a" stroke-width="1"/>
  <rect x="186" y="115" width="8" height="30" fill="#26a69a" rx="1"/>
  <line x1="220" y1="100" x2="220" y2="148" stroke="#26a69a" stroke-width="1.5"/>
  <rect x="214" y="105" width="12" height="28" fill="#26a69a" rx="1"/>
  <!-- Peak and reversal -->
  <line x1="250" y1="105" x2="250" y2="150" stroke="#ef5350" stroke-width="1"/>
  <rect x="246" y="112" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="280" y1="118" x2="280" y2="162" stroke="#ef5350" stroke-width="1"/>
  <rect x="276" y="125" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="310" y1="135" x2="310" y2="175" stroke="#ef5350" stroke-width="1"/>
  <rect x="306" y="142" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="340" y1="152" x2="340" y2="185" stroke="#ef5350" stroke-width="1"/>
  <rect x="336" y="158" width="8" height="18" fill="#ef5350" rx="1"/>
  <!-- Back to mean -->
  <line x1="370" y1="162" x2="370" y2="192" stroke="#26a69a" stroke-width="1"/>
  <rect x="366" y="175" width="8" height="10" fill="#26a69a" rx="1"/>
  <line x1="400" y1="168" x2="400" y2="198" stroke="#ef5350" stroke-width="1"/>
  <rect x="396" y="175" width="8" height="15" fill="#ef5350" rx="1"/>
  <!-- Drop below mean -->
  <line x1="430" y1="178" x2="430" y2="212" stroke="#ef5350" stroke-width="1"/>
  <rect x="426" y="185" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="460" y1="192" x2="460" y2="228" stroke="#ef5350" stroke-width="1"/>
  <rect x="456" y="200" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="490" y1="208" x2="490" y2="248" stroke="#ef5350" stroke-width="1"/>
  <rect x="486" y="218" width="8" height="22" fill="#ef5350" rx="1"/>
  <!-- Extreme low (z < -2) -->
  <line x1="520" y1="228" x2="520" y2="272" stroke="#ef5350" stroke-width="1"/>
  <rect x="516" y="238" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="550" y1="238" x2="550" y2="278" stroke="#ef5350" stroke-width="1.5"/>
  <rect x="544" y="248" width="12" height="22" fill="#ef5350" rx="1"/>
  <!-- Recovery -->
  <line x1="580" y1="232" x2="580" y2="268" stroke="#26a69a" stroke-width="1"/>
  <rect x="576" y="245" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="610" y1="218" x2="610" y2="255" stroke="#26a69a" stroke-width="1"/>
  <rect x="606" y="228" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="640" y1="202" x2="640" y2="238" stroke="#26a69a" stroke-width="1"/>
  <rect x="636" y="212" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="670" y1="188" x2="670" y2="220" stroke="#26a69a" stroke-width="1"/>
  <rect x="666" y="198" width="8" height="15" fill="#26a69a" rx="1"/>

  <!-- Z-Score oscillator panel (bottom 35%) -->
  <line x1="80" y1="300" x2="740" y2="300" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
  <text x="75" y="312" fill="#888" font-size="9" text-anchor="end">Z</text>

  <!-- +2 threshold zone -->
  <rect x="80" y="310" width="660" height="20" fill="url(#obZone)"/>
  <line x1="80" y1="330" x2="740" y2="330" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="745" y="333" fill="#ef5350" font-size="8">+2.0</text>

  <!-- 0 line -->
  <line x1="80" y1="370" x2="740" y2="370" stroke="#888" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.3"/>
  <text x="745" y="373" fill="#888" font-size="8">0.0</text>

  <!-- -2 threshold zone -->
  <rect x="80" y="410" width="660" height="20" fill="url(#osZone)"/>
  <line x1="80" y1="410" x2="740" y2="410" stroke="#00e676" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="745" y="413" fill="#00e676" font-size="8">-2.0</text>

  <!-- Z-score line -->
  <polyline points="100,365 130,355 160,340 190,322 220,315 250,318 280,328 310,342 340,355 370,368 400,372 430,378 460,388 490,400 520,408 550,418 580,412 610,398 640,382 670,370" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.85"/>

  <!-- SHORT signal at z > +2 -->
  <circle cx="220" cy="315" r="6" fill="#ef5350" opacity="0.3"/>
  <circle cx="220" cy="315" r="3" fill="#ef5350" opacity="0.9" filter="url(#softGlow)"/>
  <rect x="228" y="305" width="85" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="270" y="318" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="600">SHORT (z>+2)</text>

  <!-- Exit at z=0 -->
  <circle cx="370" cy="368" r="4" fill="#888" opacity="0.7"/>
  <text x="380" y="365" fill="#888" font-size="8">Exit (z=0)</text>

  <!-- LONG signal at z < -2 -->
  <circle cx="550" cy="418" r="6" fill="#00e676" opacity="0.3"/>
  <circle cx="550" cy="418" r="3" fill="#00e676" opacity="0.9" filter="url(#softGlow)"/>
  <rect x="558" y="418" width="80" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="598" y="431" text-anchor="middle" fill="#00e676" font-size="9" font-weight="600">LONG (z&lt;-2)</text>

  <!-- Vertical alignment lines -->
  <line x1="220" y1="100" x2="220" y2="315" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.2"/>
  <line x1="550" y1="248" x2="550" y2="418" stroke="#00e676" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.2"/>

  <!-- Exit for long at z=0 -->
  <circle cx="670" cy="370" r="4" fill="#888" opacity="0.7"/>
  <text x="675" y="367" fill="#888" font-size="8">Exit</text>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">Z-Score</text>
    <circle cx="100" cy="20" r="4" fill="#ff9800"/>
    <text x="110" y="24" fill="#999" font-size="9">SMA</text>
    <circle cx="160" cy="20" r="4" fill="#ef5350"/>
    <text x="170" y="24" fill="#999" font-size="9">Short Signal (+2)</text>
    <circle cx="300" cy="20" r="4" fill="#00e676"/>
    <text x="310" y="24" fill="#999" font-size="9">Long Signal (-2)</text>
    <circle cx="435" cy="20" r="4" fill="#888"/>
    <text x="445" y="24" fill="#999" font-size="9">Exit (z=0)</text>
    <rect x="530" y="12" width="20" height="16" fill="#ef5350" opacity="0.3" rx="2"/>
    <text x="555" y="24" fill="#999" font-size="9">OB Zone</text>
    <rect x="610" y="12" width="20" height="16" fill="#26a69a" opacity="0.3" rx="2"/>
    <text x="635" y="24" fill="#999" font-size="9">OS Zone</text>
  </g>
</svg>