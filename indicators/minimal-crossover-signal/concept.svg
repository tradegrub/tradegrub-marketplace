<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glowGreen"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowRed"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowSignal"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="legendBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#16213e" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="430"/><line x1="180" y1="60" x2="180" y2="430"/>
    <line x1="280" y1="60" x2="280" y2="430"/><line x1="380" y1="60" x2="380" y2="430"/>
    <line x1="480" y1="60" x2="480" y2="430"/><line x1="580" y1="60" x2="580" y2="430"/>
    <line x1="680" y1="60" x2="680" y2="430"/><line x1="770" y1="60" x2="770" y2="430"/>
    <line x1="40" y1="100" x2="770" y2="100"/><line x1="40" y1="160" x2="770" y2="160"/>
    <line x1="40" y1="220" x2="770" y2="220"/><line x1="40" y1="280" x2="770" y2="280"/>
    <line x1="40" y1="340" x2="770" y2="340"/><line x1="40" y1="400" x2="770" y2="400"/>
  </g>

  <!-- Title -->
  <text x="40" y="35" fill="#e0e0e0" font-size="17" font-weight="600">Minimal Crossover Signal</text>
  <text x="760" y="35" fill="#888" font-size="10" text-anchor="end">tradegrub.finance</text>

  <!-- Price candles (30 candles, x from 55 to 755, spacing ~24) -->
  <!-- Uptrend start -->
  <g>
    <!-- Candle 1: down --><line x1="55" y1="280" x2="55" y2="330" stroke="#ef5350" stroke-width="1"/><rect x="51" y="295" width="8" height="25" fill="#ef5350" rx="1"/>
    <!-- Candle 2: down --><line x1="79" y1="290" x2="79" y2="345" stroke="#ef5350" stroke-width="1"/><rect x="75" y="305" width="8" height="30" fill="#ef5350" rx="1"/>
    <!-- Candle 3: down --><line x1="103" y1="300" x2="103" y2="360" stroke="#ef5350" stroke-width="1"/><rect x="99" y="315" width="8" height="35" fill="#ef5350" rx="1"/>
    <!-- Candle 4: down --><line x1="127" y1="310" x2="127" y2="370" stroke="#ef5350" stroke-width="1"/><rect x="123" y="325" width="8" height="32" fill="#ef5350" rx="1"/>
    <!-- Candle 5: up --><line x1="151" y1="315" x2="151" y2="365" stroke="#26a69a" stroke-width="1"/><rect x="147" y="325" width="8" height="28" fill="#26a69a" rx="1"/>
    <!-- Candle 6: down --><line x1="175" y1="320" x2="175" y2="375" stroke="#ef5350" stroke-width="1"/><rect x="171" y="335" width="8" height="28" fill="#ef5350" rx="1"/>
    <!-- Candle 7: down --><line x1="199" y1="325" x2="199" y2="385" stroke="#ef5350" stroke-width="1"/><rect x="195" y="340" width="8" height="33" fill="#ef5350" rx="1"/>
    <!-- Candle 8: up (bottom) --><line x1="223" y1="340" x2="223" y2="395" stroke="#26a69a" stroke-width="1"/><rect x="219" y="350" width="8" height="30" fill="#26a69a" rx="1"/>
    <!-- Candle 9: up --><line x1="247" y1="330" x2="247" y2="385" stroke="#26a69a" stroke-width="1"/><rect x="243" y="340" width="8" height="30" fill="#26a69a" rx="1"/>
    <!-- Candle 10: up (BUY crossover) --><line x1="271" y1="310" x2="271" y2="370" stroke="#26a69a" stroke-width="1"/><rect x="267" y="320" width="8" height="35" fill="#26a69a" rx="1"/>
    <!-- Candle 11: up --><line x1="295" y1="290" x2="295" y2="345" stroke="#26a69a" stroke-width="1"/><rect x="291" y="300" width="8" height="30" fill="#26a69a" rx="1"/>
    <!-- Candle 12: up --><line x1="319" y1="265" x2="319" y2="320" stroke="#26a69a" stroke-width="1"/><rect x="315" y="275" width="8" height="30" fill="#26a69a" rx="1"/>
    <!-- Candle 13: up --><line x1="343" y1="240" x2="343" y2="295" stroke="#26a69a" stroke-width="1"/><rect x="339" y="250" width="8" height="28" fill="#26a69a" rx="1"/>
    <!-- Candle 14: up --><line x1="367" y1="215" x2="367" y2="270" stroke="#26a69a" stroke-width="1"/><rect x="363" y="225" width="8" height="30" fill="#26a69a" rx="1"/>
    <!-- Candle 15: up --><line x1="391" y1="195" x2="391" y2="245" stroke="#26a69a" stroke-width="1"/><rect x="387" y="205" width="8" height="25" fill="#26a69a" rx="1"/>
    <!-- Candle 16: up --><line x1="415" y1="175" x2="415" y2="225" stroke="#26a69a" stroke-width="1"/><rect x="411" y="185" width="8" height="25" fill="#26a69a" rx="1"/>
    <!-- Candle 17: down --><line x1="439" y1="165" x2="439" y2="215" stroke="#ef5350" stroke-width="1"/><rect x="435" y="175" width="8" height="28" fill="#ef5350" rx="1"/>
    <!-- Candle 18: up --><line x1="463" y1="155" x2="463" y2="200" stroke="#26a69a" stroke-width="1"/><rect x="459" y="162" width="8" height="25" fill="#26a69a" rx="1"/>
    <!-- Candle 19: up --><line x1="487" y1="140" x2="487" y2="185" stroke="#26a69a" stroke-width="1"/><rect x="483" y="148" width="8" height="22" fill="#26a69a" rx="1"/>
    <!-- Candle 20: down --><line x1="511" y1="135" x2="511" y2="180" stroke="#ef5350" stroke-width="1"/><rect x="507" y="145" width="8" height="25" fill="#ef5350" rx="1"/>
    <!-- Candle 21: down (SELL crossover) --><line x1="535" y1="145" x2="535" y2="200" stroke="#ef5350" stroke-width="1"/><rect x="531" y="155" width="8" height="32" fill="#ef5350" rx="1"/>
    <!-- Candle 22: down --><line x1="559" y1="165" x2="559" y2="225" stroke="#ef5350" stroke-width="1"/><rect x="555" y="178" width="8" height="32" fill="#ef5350" rx="1"/>
    <!-- Candle 23: down --><line x1="583" y1="185" x2="583" y2="250" stroke="#ef5350" stroke-width="1"/><rect x="579" y="200" width="8" height="35" fill="#ef5350" rx="1"/>
    <!-- Candle 24: up --><line x1="607" y1="195" x2="607" y2="255" stroke="#26a69a" stroke-width="1"/><rect x="603" y="205" width="8" height="30" fill="#26a69a" rx="1"/>
    <!-- Candle 25: down --><line x1="631" y1="210" x2="631" y2="275" stroke="#ef5350" stroke-width="1"/><rect x="627" y="225" width="8" height="35" fill="#ef5350" rx="1"/>
    <!-- Candle 26: down --><line x1="655" y1="230" x2="655" y2="295" stroke="#ef5350" stroke-width="1"/><rect x="651" y="245" width="8" height="35" fill="#ef5350" rx="1"/>
    <!-- Candle 27: up --><line x1="679" y1="240" x2="679" y2="295" stroke="#26a69a" stroke-width="1"/><rect x="675" y="250" width="8" height="28" fill="#26a69a" rx="1"/>
    <!-- Candle 28: up --><line x1="703" y1="225" x2="703" y2="280" stroke="#26a69a" stroke-width="1"/><rect x="699" y="235" width="8" height="28" fill="#26a69a" rx="1"/>
    <!-- Candle 29: up --><line x1="727" y1="210" x2="727" y2="265" stroke="#26a69a" stroke-width="1"/><rect x="723" y="220" width="8" height="28" fill="#26a69a" rx="1"/>
    <!-- Candle 30: up --><line x1="751" y1="195" x2="751" y2="250" stroke="#26a69a" stroke-width="1"/><rect x="747" y="205" width="8" height="28" fill="#26a69a" rx="1"/>
  </g>

  <!-- Signal line: bearish (red) from candle 1 to crossover at candle 10 -->
  <polyline fill="none" stroke="#ef5350" stroke-width="2.5" stroke-opacity="0.9" filter="url(#glowSignal)"
    points="55,310 79,320 103,332 127,345 151,350 175,355 199,360 223,365 247,355 271,340"/>

  <!-- Signal line: bullish (green) from crossover candle 10 to sell crossover candle 21 -->
  <polyline fill="none" stroke="#26a69a" stroke-width="2.5" stroke-opacity="0.9" filter="url(#glowSignal)"
    points="271,340 295,310 319,280 343,255 367,230 391,210 415,192 439,180 463,168 487,155 511,152 535,160"/>

  <!-- Signal line: bearish (red) from sell crossover candle 21 to end -->
  <polyline fill="none" stroke="#ef5350" stroke-width="2.5" stroke-opacity="0.9" filter="url(#glowSignal)"
    points="535,160 559,185 583,210 607,225 631,242 655,260 679,265 703,255 727,240 751,225"/>

  <!-- Buy arrow at candle 10 -->
  <polygon points="271,405 261,420 281,420" fill="#26a69a" filter="url(#glowGreen)"/>
  <text x="271" y="418" fill="#26a69a" font-size="9" text-anchor="middle" dy="12">BUY</text>

  <!-- Sell arrow at candle 21 -->
  <polygon points="535,120 525,105 545,105" fill="#ef5350" filter="url(#glowRed)"/>
  <text x="535" y="100" fill="#ef5350" font-size="9" text-anchor="middle">SELL</text>

  <!-- Buy Signal callout -->
  <line x1="271" y1="395" x2="271" y2="380" stroke="#26a69a" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.6"/>
  <rect x="215" y="370" width="80" height="16" rx="3" fill="#26a69a" fill-opacity="0.15" stroke="#26a69a" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="255" y="382" fill="#26a69a" font-size="9" text-anchor="middle" font-weight="500">Buy Signal</text>

  <!-- Sell Signal callout -->
  <line x1="535" y1="90" x2="535" y2="78" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,2" stroke-opacity="0.6"/>
  <rect x="488" y="63" width="80" height="16" rx="3" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="528" y="75" fill="#ef5350" font-size="9" text-anchor="middle" font-weight="500">Sell Signal</text>

  <!-- Legend bar -->
  <rect x="40" y="450" width="720" height="40" rx="6" fill="url(#legendBg)" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <rect x="60" y="466" width="12" height="12" rx="2" fill="#26a69a" fill-opacity="0.4" stroke="#26a69a" stroke-width="1"/>
  <text x="78" y="476" fill="#aaa" font-size="10">Price (Up)</text>
  <rect x="155" y="466" width="12" height="12" rx="2" fill="#ef5350" fill-opacity="0.4" stroke="#ef5350" stroke-width="1"/>
  <text x="173" y="476" fill="#aaa" font-size="10">Price (Down)</text>
  <line x1="260" y1="466" x2="290" y2="478" stroke="#26a69a" stroke-width="2.5"/>
  <text x="296" y="476" fill="#aaa" font-size="10">Signal (Bull)</text>
  <line x1="395" y1="466" x2="425" y2="478" stroke="#ef5350" stroke-width="2.5"/>
  <text x="431" y="476" fill="#aaa" font-size="10">Signal (Bear)</text>
  <polygon points="540,478 534,468 546,468" fill="#26a69a"/>
  <text x="552" y="476" fill="#aaa" font-size="10">Buy</text>
  <polygon points="600,468 594,478 606,478" fill="#ef5350"/>
  <text x="612" y="476" fill="#aaa" font-size="10">Sell</text>
</svg>