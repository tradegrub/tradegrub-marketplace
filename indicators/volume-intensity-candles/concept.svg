<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="80" y1="55" x2="80" y2="420"/><line x1="160" y1="55" x2="160" y2="420"/>
    <line x1="240" y1="55" x2="240" y2="420"/><line x1="320" y1="55" x2="320" y2="420"/>
    <line x1="400" y1="55" x2="400" y2="420"/><line x1="480" y1="55" x2="480" y2="420"/>
    <line x1="560" y1="55" x2="560" y2="420"/><line x1="640" y1="55" x2="640" y2="420"/>
    <line x1="720" y1="55" x2="720" y2="420"/>
    <line x1="50" y1="90" x2="760" y2="90"/><line x1="50" y1="140" x2="760" y2="140"/>
    <line x1="50" y1="190" x2="760" y2="190"/><line x1="50" y1="240" x2="760" y2="240"/>
    <line x1="50" y1="290" x2="760" y2="290"/><line x1="50" y1="340" x2="760" y2="340"/>
  </g>

  <!-- Title -->
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="17" fill="#ffffff" font-weight="bold">Volume Intensity Candles</text>
  <text x="30" y="46" font-family="Arial, sans-serif" font-size="11" fill="#888888">tradegrub.finance</text>

  <!-- Y-axis price labels -->
  <text x="15" y="94" font-family="Arial, sans-serif" font-size="9" fill="#555">185</text>
  <text x="15" y="144" font-family="Arial, sans-serif" font-size="9" fill="#555">180</text>
  <text x="15" y="194" font-family="Arial, sans-serif" font-size="9" fill="#555">175</text>
  <text x="15" y="244" font-family="Arial, sans-serif" font-size="9" fill="#555">170</text>
  <text x="15" y="294" font-family="Arial, sans-serif" font-size="9" fill="#555">165</text>
  <text x="15" y="344" font-family="Arial, sans-serif" font-size="9" fill="#555">160</text>

  <!-- 25 Candlesticks with volume-based intensity -->
  <!-- c1: green, low vol -->
  <line x1="68" y1="235" x2="68" y2="290" stroke="#00cc66" stroke-width="1" opacity="0.25"/>
  <rect x="63" y="255" width="10" height="25" fill="#00cc66" opacity="0.25"/>
  <!-- c2: red, low vol -->
  <line x1="96" y1="250" x2="96" y2="305" stroke="#ee4444" stroke-width="1" opacity="0.25"/>
  <rect x="91" y="260" width="10" height="30" fill="#ee4444" opacity="0.25"/>
  <!-- c3: green, med vol -->
  <line x1="124" y1="230" x2="124" y2="280" stroke="#00cc66" stroke-width="1" opacity="0.6"/>
  <rect x="119" y="240" width="10" height="28" fill="#00cc66" opacity="0.6"/>
  <!-- c4: red, low vol -->
  <line x1="152" y1="245" x2="152" y2="295" stroke="#ee4444" stroke-width="1" opacity="0.25"/>
