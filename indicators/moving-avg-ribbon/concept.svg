  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ef5350"/>
    <text x="30" y="24" fill="#999" font-size="9">SMA 10 (Fast)</text>
    <circle cx="130" cy="20" r="4" fill="#ff9800"/>
    <text x="140" y="24" fill="#999" font-size="9">SMA 30-40</text>
    <circle cx="220" cy="20" r="4" fill="#cddc39"/>
    <text x="230" y="24" fill="#999" font-size="9">SMA 50</text>
    <circle cx="310" cy="20" r="4" fill="#26a69a"/>
    <text x="320" y="24" fill="#999" font-size="9">SMA 70</text>
    <circle cx="400" cy="20" r="4" fill="#42a5f5"/>
    <text x="410" y="24" fill="#999" font-size="9">SMA 90</text>
    <circle cx="490" cy="20" r="4" fill="#5c6bc0"/>
    <text x="500" y="24" fill="#999" font-size="9">SMA 100 (Slow)</text>
  </g>
</svg>