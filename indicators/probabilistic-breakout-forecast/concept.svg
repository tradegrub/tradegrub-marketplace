<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="probGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#ffd740"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" in="SourceGraphic" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" rx="8" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#fff" stroke-opacity="0.04" stroke-width="1">
    <line x1="100" y1="60" x2="100" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="300" y1="60" x2="300" y2="420"/><line x1="400" y1="60" x2="400" y2="420"/>
    <line x1="500" y1="60" x2="500" y2="420"/><line x1="600" y1="60" x2="600" y2="420"/>
    <line x1="700" y1="60" x2="700" y2="420"/>
    <line x1="60" y1="100" x2="750" y2="100"/><line x1="60" y1="160" x2="750" y2="160"/>
    <line x1="60" y1="220" x2="750" y2="220"/><line x1="60" y1="280" x2="750" y2="280"/>
    <line x1="60" y1="340" x2="750" y2="340"/><line x1="60" y1="400" x2="750" y2="400"/>
  </g>
  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="17" fill="white" font-weight="bold">Probabilistic Breakout Forecast</text>
  <text x="400" y="50" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888">tradegrub.finance</text>
  <!-- Price line oscillating in tightening range -->
  <polyline points="70,260 95,210 120,280 145,200 170,270 195,215 220,265 245,220 270,258 295,225 320,252 345,230 370,248 395,234 420,245 445,237 470,243 495,239 520,241" fill="none" stroke="white" stroke-width="2" filter="url(#glow)"/>
  <!-- Converging trendlines (yellow dashed) - upper -->
  <line x1="70" y1="185" x2="540" y2="232" stroke="#ffd740" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>
  <!-- Converging trendlines - lower -->
  <line x1="70" y1="295" x2="540" y2="248" stroke="#ffd740" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>
  <!-- Breakout zone shading at apex -->
  <polygon points="480,235 540,240 540,248 480,252" fill="#ffd740" fill-opacity="0.06"/>
  <!-- Up arrow (green) at apex -->
  <polygon points="555,200 565,225 560,225 560,240 550,240 550,225 545,225" fill="#00e676" opacity="0.9"/>
  <text x="555" y="192" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#00e676" font-weight="bold">65%</text>
  <!-- Down arrow (red) at apex -->
  <polygon points="555,290 565,265 560,265 560,250 550,250 550,265 545,265" fill="#ff1744" opacity="0.9"/>
  <text x="555" y="305" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#ff1744" font-weight="bold">35%</text>
  <!-- Probability meter bar (right side) -->
  <rect x="660" y="90" width="30" height="300" rx="4" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <!-- Filled portion 78% from bottom -->
  <rect x="662" y="156" width="26" height="232" rx="3" fill="url(#probGrad)" opacity="0.85"/>
  <!-- Meter label -->
  <text x="675" y="82" text-anchor="middle" font-family="sans-serif" font-size="13" fill="white" font-weight="bold">Breakout Prob</text>
  <text x="675" y="415" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#00e676" font-weight="bold">78%</text>
  <!-- Time in Range label -->
  <text x="320" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#aaa">Time in Range: 14 bars</text>
  <!-- Volatility compression bar -->
  <text x="120" y="405" font-family="sans-serif" font-size="11" fill="#ff9800">Volatility Compression</text>
  <rect x="120" y="410" width="200" height="6" rx="3" fill="#333"/>
  <rect x="120" y="410" width="200" height="6" rx="3" fill="#ff9800" opacity="0.7"/>
  <!-- Shrinking portion overlay showing compression -->
  <rect x="220" y="410" width="100" height="6" rx="3" fill="#1a1a2e" opacity="0.6"/>
  <!-- Legend bar -->
  <rect x="60" y="450" width="680" height="36" rx="6" fill="#0d0d1a" fill-opacity="0.7"/>
  <line x1="100" y1="468" x2="130" y2="468" stroke="white" stroke-width="2"/>
  <text x="136" y="472" font-family="sans-serif" font-size="12" fill="#ccc">Price</text>
  <line x1="210" y1="468" x2="250" y2="468" stroke="#ffd740" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="256" y="472" font-family="sans-serif" font-size="12" fill="#ccc">Range Boundary</text>
  <rect x="400" y="462" width="14" height="14" rx="2" fill="#ffd740" fill-opacity="0.15" stroke="#ffd740" stroke-width="1"/>
  <text x="420" y="472" font-family="sans-serif" font-size="12" fill="#ccc">Breakout Zone</text>
</svg>