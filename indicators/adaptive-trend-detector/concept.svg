<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Adaptive Trend Detector</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="150" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="88" fill="#888" font-family="Inter,sans-serif" font-size="10">Price</text>
  <line x1="100" y1="170" x2="100" y2="195" stroke="#555" stroke-width="1"/><rect x="96" y="172" width="8" height="15" fill="#4CAF50" rx="1"/>
  <line x1="140" y1="160" x2="140" y2="190" stroke="#555" stroke-width="1"/><rect x="136" y="162" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="180" y1="148" x2="180" y2="182" stroke="#555" stroke-width="1"/><rect x="176" y="150" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="220" y1="135" x2="220" y2="170" stroke="#555" stroke-width="1"/><rect x="216" y="138" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="260" y1="125" x2="260" y2="160" stroke="#555" stroke-width="1"/><rect x="256" y="128" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="300" y1="118" x2="300" y2="155" stroke="#555" stroke-width="1"/><rect x="296" y="120" width="8" height="22" fill="#4CAF50" rx="1"/>
  <line x1="340" y1="115" x2="340" y2="155" stroke="#555" stroke-width="1"/><rect x="336" y="125" width="8" height="22" fill="#f44336" rx="1"/>
  <line x1="380" y1="125" x2="380" y2="165" stroke="#555" stroke-width="1"/><rect x="376" y="135" width="8" height="22" fill="#f44336" rx="1"/>
  <line x1="420" y1="140" x2="420" y2="178" stroke="#555" stroke-width="1"/><rect x="416" y="148" width="8" height="22" fill="#f44336" rx="1"/>
  <line x1="460" y1="150" x2="460" y2="185" stroke="#555" stroke-width="1"/><rect x="456" y="155" width="8" height="20" fill="#f44336" rx="1"/>
  <line x1="500" y1="155" x2="500" y2="188" stroke="#555" stroke-width="1"/><rect x="496" y="158" width="8" height="18" fill="#4CAF50" rx="1"/>
  <line x1="540" y1="145" x2="540" y2="180" stroke="#555" stroke-width="1"/><rect x="536" y="148" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="580" y1="132" x2="580" y2="168" stroke="#555" stroke-width="1"/><rect x="576" y="135" width="8" height="20" fill="#4CAF50" rx="1"/>
  <line x1="620" y1="120" x2="620" y2="158" stroke="#555" stroke-width="1"/><rect x="616" y="123" width="8" height="22" fill="#4CAF50" rx="1"/>
  <line x1="660" y1="110" x2="660" y2="148" stroke="#555" stroke-width="1"/><rect x="656" y="113" width="8" height="22" fill="#4CAF50" rx="1"/>
  <line x1="700" y1="100" x2="700" y2="140" stroke="#555" stroke-width="1"/><rect x="696" y="103" width="8" height="22" fill="#4CAF50" rx="1"/>

  <!-- Oscillator subplot -->
  <rect x="60" y="240" width="700" height="190" fill="rgba(255,255,255,0.02)" rx="4"/>
  <text x="70" y="258" fill="#888" font-family="Inter,sans-serif" font-size="10">Trend Score</text>

  <!-- Bullish bg -->
  <rect x="60" y="240" width="260" height="50" fill="rgba(76,175,80,0.07)"/>
  <rect x="490" y="240" width="270" height="50" fill="rgba(76,175,80,0.07)"/>
  <!-- Bearish bg -->
  <rect x="380" y="380" width="150" height="50" fill="rgba(244,67,54,0.07)"/>

  <line x1="60" y1="290" x2="760" y2="290" stroke="#4CAF50" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="765" y="294" fill="#4CAF50" font-family="Inter,sans-serif" font-size="9">+25</text>
  <line x1="60" y1="335" x2="760" y2="335" stroke="#888" stroke-width="1" stroke-dasharray="5,4" opacity="0.3"/>
  <text x="765" y="339" fill="#888" font-family="Inter,sans-serif" font-size="9">0</text>
  <line x1="60" y1="380" x2="760" y2="380" stroke="#f44336" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="765" y="384" fill="#f44336" font-family="Inter,sans-serif" font-size="9">-25</text>

  <!-- Trend score line (cyan) -->
  <polyline points="100,300 140,280 180,265 220,260 260,268 300,278 340,310 380,350 420,385 460,395 500,375 540,340 580,300 620,275 660,260 700,255"
    fill="none" stroke="#00e5ff" stroke-width="2.5"/>

  <!-- Raw score (blue, noisy) -->
  <polyline points="100,295 140,275 180,270 220,255 260,272 300,285 340,318 380,358 420,390 460,400 500,368 540,332 580,295 620,270 660,255 700,250"
    fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.5"/>

  <!-- Legend -->
  <rect x="60" y="455" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="470" x2="100" y2="470" stroke="#00e5ff" stroke-width="2.5"/>
  <text x="105" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Trend Score</text>
  <line x1="220" y1="470" x2="240" y2="470" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="245" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Raw Score</text>
  <line x1="340" y1="470" x2="360" y2="470" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="365" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Bullish (+25)</text>
  <line x1="480" y1="470" x2="500" y2="470" stroke="#f44336" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="505" y="474" fill="#ccc" font-family="Inter,sans-serif" font-size="11">Bearish (-25)</text>
</svg>
