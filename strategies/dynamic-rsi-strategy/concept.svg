  <!-- Dynamic overbought band (dashed, narrows then widens) -->
  <path d="M80,278 Q160,275 240,272 Q320,268 400,265 Q440,268 480,272 Q520,275 560,270 Q600,268 640,272 Q680,278 730,280" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="735" y="283" fill="#ff9800" font-size="8">OB</text>

