<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">N-Bar Range Indicator</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price panel - wide range bars then compression then breakout -->
  <!-- Wide range period -->
  <line x1="100" y1="100" x2="100" y2="200" stroke="#ef5350" stroke-width="1"/><rect x="95" y="115" width="10" height="60" fill="#ef5350" rx="1"/>
  <line x1="135" y1="90" x2="135" y2="195" stroke="#26a69a" stroke-width="1"/><rect x="130" y="130" width="10" height="50" fill="#26a69a" rx="1"/>
  <line x1="170" y1="105" x2="170" y2="210" stroke="#ef5350" stroke-width="1"/><rect x="165" y="115" width="10" height="65" fill="#ef5350" rx="1"/>
  <line x1="205" y1="110" x2="205" y2="205" stroke="#26a69a" stroke-width="1"/><rect x="200" y="140" width="10" height="45" fill="#26a69a" rx="1"/>
  <!-- Normal range -->
  <line x1="250" y1="135" x2="250" y2="195" stroke="#ef5350" stroke-width="1"/><rect x="245" y="145" width="10" height="30" fill="#ef5350" rx="1"/>
  <line x1="285" y1="130" x2="285" y2="190" stroke="#26a69a" stroke-width="1"/><rect x="280" y="148" width="10" height="25" fill="#26a69a" rx="1"/>
  <line x1="320" y1="140" x2="320" y2="192" stroke="#ef5350" stroke-width="1"/><rect x="315" y="148" width="10" height="28" fill="#ef5350" rx="1"/>
  <line x1="355" y1="138" x2="355" y2="188" stroke="#26a69a" stroke-width="1"/><rect x="350" y="155" width="10" height="20" fill="#26a69a" rx="1"/>
  <!-- Compression (narrow range) -->
  <line x1="400" y1="155" x2="400" y2="180" stroke="#ef5350" stroke-width="1"/><rect x="395" y="160" width="10" height="12" fill="#ef5350" rx="1"/>
  <line x1="435" y1="152" x2="435" y2="178" stroke="#26a69a" stroke-width="1"/><rect x="430" y="158" width="10" height="12" fill="#26a69a" rx="1"/>
  <line x1="470" y1="155" x2="470" y2="175" stroke="#ef5350" stroke-width="1"/><rect x="465" y="158" width="10" height="10" fill="#ef5350" rx="1"/>
  <line x1="505" y1="153" x2="505" y2="172" stroke="#26a69a" stroke-width="1"/><rect x="500" y="157" width="10" height="8" fill="#26a69a" rx="1"/>
  <line x1="540" y1="154" x2="540" y2="170" stroke="#ef5350" stroke-width="1"/><rect x="535" y="157" width="10" height="8" fill="#ef5350" rx="1"/>
  <!-- Breakout (range expands) -->
  <line x1="580" y1="125" x2="580" y2="175" stroke="#26a69a" stroke-width="1"/><rect x="575" y="135" width="10" height="28" fill="#26a69a" rx="1" filter="url(#glow)"/>
  <line x1="615" y1="108" x2="615" y2="165" stroke="#26a69a" stroke-width="1"/><rect x="610" y="115" width="10" height="35" fill="#26a69a" rx="1"/>
  <line x1="650" y1="95" x2="650" y2="155" stroke="#26a69a" stroke-width="1"/><rect x="645" y="102" width="10" height="38" fill="#26a69a" rx="1"/>
  <line x1="685" y1="88" x2="685" y2="148" stroke="#ef5350" stroke-width="1"/><rect x="680" y="95" width="10" height="30" fill="#ef5350" rx="1"/>
  <line x1="720" y1="82" x2="720" y2="142" stroke="#26a69a" stroke-width="1"/><rect x="715" y="90" width="10" height="35" fill="#26a69a" rx="1"/>

  <!-- N-bar range bracket annotations -->
  <!-- Wide range bracket -->
  <line x1="88" y1="85" x2="88" y2="215" stroke="#ff9800" stroke-width="1.5" opacity="0.5"/>
  <line x1="85" y1="85" x2="91" y2="85" stroke="#ff9800" stroke-width="1.5" opacity="0.5"/>
  <line x1="85" y1="215" x2="91" y2="215" stroke="#ff9800" stroke-width="1.5" opacity="0.5"/>
  <text x="80" y="155" fill="#ff9800" font-size="8" text-anchor="end" opacity="0.7">Wide</text>

  <!-- Narrow range bracket -->
  <line x1="528" y1="150" x2="528" y2="178" stroke="#42a5f5" stroke-width="1.5" opacity="0.5"/>
  <line x1="525" y1="150" x2="531" y2="150" stroke="#42a5f5" stroke-width="1.5" opacity="0.5"/>
  <line x1="525" y1="178" x2="531" y2="178" stroke="#42a5f5" stroke-width="1.5" opacity="0.5"/>
  <text x="520" y="168" fill="#42a5f5" font-size="8" text-anchor="end" opacity="0.7">Narrow</text>

  <!-- Separator -->
  <line x1="60" y1="235" x2="760" y2="235" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Bottom panel: Range % line and Percentile shading -->
  <text x="65" y="250" fill="#888" font-size="9">Range % / Percentile</text>

  <!-- Percentile zones -->
  <rect x="80" y="255" width="680" height="18" fill="#ef5350" fill-opacity="0.06"/>
  <line x1="80" y1="273" x2="760" y2="273" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="765" y="276" fill="#ef5350" font-size="7" opacity="0.5">90th pctl</text>
  <rect x="80" y="365" width="680" height="18" fill="#26a69a" fill-opacity="0.06"/>
  <line x1="80" y1="365" x2="760" y2="365" stroke="#26a69a" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="765" y="368" fill="#26a69a" font-size="7" opacity="0.5">10th pctl</text>
  <line x1="80" y1="320" x2="760" y2="320" stroke="#888" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.2"/>

  <!-- Range % line -->
  <polyline points="100,265 135,258 170,262 205,270 250,295 285,300 320,305 355,310 400,340 435,348 470,355 505,362 540,368 580,298 615,278 650,268 685,275 720,265" fill="none" stroke="#ff9800" stroke-width="2" opacity="0.9"/>

  <!-- Percentile fill (area under for context) -->
  <polyline points="100,270 135,262 170,268 205,278 250,310 285,315 320,318 355,322 400,348 435,355 470,360 505,365 540,372 580,305 615,285 650,275 685,282 720,272" fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.7" stroke-dasharray="6,3"/>

  <!-- Compression annotation -->
  <rect x="415" y="252" width="125" height="22" rx="4" fill="#42a5f5" fill-opacity="0.12" stroke="#42a5f5" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="477" y="267" text-anchor="middle" fill="#42a5f5" font-size="10" font-weight="500">Compression Zone</text>

  <!-- Breakout annotation -->
  <rect x="575" y="252" width="120" height="22" rx="4" fill="#00e676" fill-opacity="0.12" stroke="#00e676" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="635" y="267" text-anchor="middle" fill="#00e676" font-size="10" font-weight="500">Range Expansion</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="388" width="8" height="25" fill="#ef5350" rx="1"/>
    <rect x="131" y="393" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="166" y="390" width="8" height="23" fill="#ef5350" rx="1"/>
    <rect x="201" y="395" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="246" y="400" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="281" y="402" width="8" height="11" fill="#26a69a" rx="1"/>
    <rect x="316" y="400" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="351" y="403" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="396" y="406" width="8" height="7" fill="#ef5350" rx="1"/>
    <rect x="431" y="407" width="8" height="6" fill="#26a69a" rx="1"/>
    <rect x="466" y="408" width="8" height="5" fill="#ef5350" rx="1"/>
    <rect x="501" y="408" width="8" height="5" fill="#26a69a" rx="1"/>
    <rect x="536" y="409" width="8" height="4" fill="#ef5350" rx="1"/>
    <rect x="576" y="388" width="8" height="25" fill="#26a69a" rx="1" filter="url(#glow)"/>
    <rect x="611" y="390" width="8" height="23" fill="#26a69a" rx="1"/>
    <rect x="646" y="392" width="8" height="21" fill="#26a69a" rx="1"/>
    <rect x="681" y="395" width="8" height="18" fill="#ef5350" rx="1"/>
    <rect x="716" y="393" width="8" height="20" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#ff9800"/>
    <text x="30" y="24" fill="#999" font-size="9">Range % of Close</text>
    <circle cx="160" cy="20" r="4" fill="#42a5f5"/>
    <text x="170" y="24" fill="#999" font-size="9">Historical Percentile</text>
    <rect x="310" y="12" width="16" height="8" rx="2" fill="#ef5350" opacity="0.4"/>
    <text x="332" y="24" fill="#999" font-size="9">Wide Range (>90th)</text>
    <rect x="450" y="12" width="16" height="8" rx="2" fill="#26a69a" opacity="0.4"/>
    <text x="472" y="24" fill="#999" font-size="9">Narrow Range (&lt;10th)</text>
  </g>
</svg>