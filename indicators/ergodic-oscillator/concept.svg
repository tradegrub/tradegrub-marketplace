<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Ergodic Oscillator</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="160" fill="rgba(255,255,255,0.02)" rx="4"/>
  <line x1="100" y1="190" x2="100" y2="140" stroke="#666" stroke-width="1"/><rect x="96" y="150" width="8" height="30" fill="#4CAF50" rx="1"/>
  <line x1="180" y1="175" x2="180" y2="125" stroke="#666" stroke-width="1"/><rect x="176" y="135" width="8" height="28" fill="#4CAF50" rx="1"/>
  <line x1="260" y1="155" x2="260" y2="110" stroke="#666" stroke-width="1"/><rect x="256" y="118" width="8" height="25" fill="#4CAF50" rx="1"/>
  <line x1="340" y1="140" x2="340" y2="100" stroke="#666" stroke-width="1"/><rect x="336" y="110" width="8" height="22" fill="#ff5252" rx="1"/>
  <line x1="420" y1="150" x2="420" y2="110" stroke="#666" stroke-width="1"/><rect x="416" y="118" width="8" height="24" fill="#ff5252" rx="1"/>
  <line x1="500" y1="160" x2="500" y2="120" stroke="#666" stroke-width="1"/><rect x="496" y="128" width="8" height="24" fill="#4CAF50" rx="1"/>
  <line x1="580" y1="145" x2="580" y2="100" stroke="#666" stroke-width="1"/><rect x="576" y="108" width="8" height="28" fill="#4CAF50" rx="1"/>
  <line x1="660" y1="130" x2="660" y2="90" stroke="#666" stroke-width="1"/><rect x="656" y="95" width="8" height="28" fill="#4CAF50" rx="1"/>

  <!-- Subplot -->
  <rect x="60" y="250" width="700" height="200" fill="rgba(255,255,255,0.02)" rx="4"/>
  <line x1="95" y1="350" x2="755" y2="350" stroke="#666" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Histogram -->
  <rect x="96" y="350" width="14" height="12" fill="rgba(126,87,194,0.5)"/>
  <rect x="176" y="338" width="14" height="12" fill="rgba(126,87,194,0.5)"/>
  <rect x="256" y="325" width="14" height="25" fill="rgba(126,87,194,0.6)"/>
  <rect x="336" y="340" width="14" height="10" fill="rgba(126,87,194,0.4)"/>
  <rect x="416" y="355" width="14" height="15" fill="rgba(126,87,194,0.4)"/>
  <rect x="496" y="345" width="14" height="5" fill="rgba(126,87,194,0.3)"/>
  <rect x="576" y="330" width="14" height="20" fill="rgba(126,87,194,0.6)"/>
  <rect x="656" y="315" width="14" height="35" fill="rgba(126,87,194,0.7)"/>

  <!-- Ergodic line -->
  <polyline points="100,340 180,320 260,295 340,310 420,340 500,345 580,320 660,290"
            fill="none" stroke="#42A5F5" stroke-width="2"/>
  <!-- Signal line -->
  <polyline points="100,348 180,332 260,310 340,315 420,335 500,342 580,330 660,305"
            fill="none" stroke="#ff9800" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="180" y="465" width="440" height="25" fill="rgba(255,255,255,0.03)" rx="4"/>
  <rect x="200" y="474" width="12" height="3" fill="#42A5F5"/>
  <text x="218" y="480" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Ergodic</text>
  <rect x="290" y="474" width="12" height="3" fill="#ff9800"/>
  <text x="308" y="480" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Signal</text>
  <rect x="370" y="472" width="8" height="8" fill="rgba(126,87,194,0.6)"/>
  <text x="384" y="480" fill="#aaa" font-family="Inter,sans-serif" font-size="10">Histogram</text>
</svg>
