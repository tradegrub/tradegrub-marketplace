  <text x="420" y="95" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="500">95th Percentile</text>
  <path d="M 420,100 L 420,115" fill="none" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <rect x="550" y="80" width="130" height="22" rx="4" fill="#26a69a" fill-opacity="0.12" stroke="#26a69a" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="615" y="95" text-anchor="middle" fill="#26a69a" font-size="10" font-weight="500">Weak Momentum</text>
  <path d="M 615,100 L 615,155" fill="none" stroke="#26a69a" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="96" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="131" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
