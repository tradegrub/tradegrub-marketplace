<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="160" x2="760" y2="160"/>
    <line x1="60" y1="220" x2="760" y2="220"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Sector Rotation Scorer</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Rotation quadrant diagram (top-left area) -->
  <!-- Quadrant box -->
  <rect x="80" y="70" width="260" height="175" rx="4" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/>
  <!-- Axes -->
  <line x1="210" y1="70" x2="210" y2="245" stroke="#888" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="158" x2="340" y2="158" stroke="#888" stroke-width="1" opacity="0.3"/>
  <!-- Axis labels -->
  <text x="210" y="65" text-anchor="middle" fill="#888" font-size="8">Relative Strength</text>
  <text x="75" y="158" fill="#888" font-size="8" text-anchor="end" transform="rotate(-90,75,158)">Momentum</text>

  <!-- Quadrant labels -->
  <rect x="215" y="75" width="120" height="78" fill="#26a69a" fill-opacity="0.08" rx="2"/>
  <text x="275" y="118" text-anchor="middle" fill="#26a69a" font-size="11" font-weight="600">Leading</text>
  <text x="275" y="132" text-anchor="middle" fill="#26a69a" font-size="8" opacity="0.7">RS+ / Mom+</text>

  <rect x="85" y="75" width="120" height="78" fill="#ff9800" fill-opacity="0.08" rx="2"/>
  <text x="145" y="118" text-anchor="middle" fill="#ff9800" font-size="11" font-weight="600">Improving</text>
  <text x="145" y="132" text-anchor="middle" fill="#ff9800" font-size="8" opacity="0.7">RS- / Mom+</text>

  <rect x="85" y="163" width="120" height="78" fill="#ef5350" fill-opacity="0.08" rx="2"/>
  <text x="145" y="206" text-anchor="middle" fill="#ef5350" font-size="11" font-weight="600">Lagging</text>
  <text x="145" y="220" text-anchor="middle" fill="#ef5350" font-size="8" opacity="0.7">RS- / Mom-</text>

  <rect x="215" y="163" width="120" height="78" fill="#42a5f5" fill-opacity="0.08" rx="2"/>
  <text x="275" y="206" text-anchor="middle" fill="#42a5f5" font-size="11" font-weight="600">Weakening</text>
  <text x="275" y="220" text-anchor="middle" fill="#42a5f5" font-size="8" opacity="0.7">RS+ / Mom-</text>

  <!-- Rotation arrow (clockwise) -->
  <path d="M 275,95 C 310,95 320,120 320,158 C 320,195 295,220 275,225 C 250,230 130,225 120,195 C 110,165 120,108 145,95 C 170,82 245,82 275,95" fill="none" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.3"/>
  <polygon points="275,92 280,85 270,85" fill="#e0e0e0" opacity="0.4"/>

  <!-- Price + Score panel on right -->
  <!-- Candlesticks -->
  <line x1="380" y1="120" x2="380" y2="160" stroke="#26a69a" stroke-width="1"/><rect x="376" y="128" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="410" y1="112" x2="410" y2="155" stroke="#26a69a" stroke-width="1"/><rect x="406" y="120" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="440" y1="105" x2="440" y2="148" stroke="#ef5350" stroke-width="1"/><rect x="436" y="112" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="470" y1="100" x2="470" y2="142" stroke="#26a69a" stroke-width="1"/><rect x="466" y="108" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="500" y1="95" x2="500" y2="138" stroke="#26a69a" stroke-width="1"/><rect x="496" y="102" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="530" y1="92" x2="530" y2="132" stroke="#ef5350" stroke-width="1"/><rect x="526" y="98" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="560" y1="98" x2="560" y2="138" stroke="#ef5350" stroke-width="1"/><rect x="556" y="105" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="590" y1="108" x2="590" y2="148" stroke="#ef5350" stroke-width="1"/><rect x="586" y="115" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="620" y1="115" x2="620" y2="155" stroke="#26a69a" stroke-width="1"/><rect x="616" y="128" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="650" y1="110" x2="650" y2="150" stroke="#26a69a" stroke-width="1"/><rect x="646" y="118" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="680" y1="102" x2="680" y2="145" stroke="#26a69a" stroke-width="1"/><rect x="676" y="110" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="710" y1="95" x2="710" y2="138" stroke="#26a69a" stroke-width="1"/><rect x="706" y="102" width="8" height="22" fill="#26a69a" rx="1"/>
  <line x1="740" y1="88" x2="740" y2="132" stroke="#26a69a" stroke-width="1"/><rect x="736" y="95" width="8" height="22" fill="#26a69a" rx="1"/>

  <!-- Separator -->
  <line x1="360" y1="175" x2="760" y2="175" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="365" y="190" fill="#888" font-size="9">Rotation Score / Quadrant</text>

  <!-- Score oscillator -->
  <line x1="360" y1="260" x2="760" y2="260" stroke="#888" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.2"/>
  <text x="765" y="263" fill="#888" font-size="7" opacity="0.4">0</text>

  <!-- Score line colored by quadrant -->
  <!-- Leading (green) -->
  <polyline points="380,225 410,218 440,228 470,215 500,210 530,222" fill="none" stroke="#26a69a" stroke-width="2.5" opacity="0.9"/>
  <!-- Weakening (blue) -->
  <polyline points="530,222 560,238 590,255" fill="none" stroke="#42a5f5" stroke-width="2.5" opacity="0.9"/>
  <!-- Lagging (red) -->
  <polyline points="590,255 620,275 650,268" fill="none" stroke="#ef5350" stroke-width="2.5" opacity="0.9"/>
  <!-- Improving (orange) -->
  <polyline points="650,268 680,252 710,238 740,225" fill="none" stroke="#ff9800" stroke-width="2.5" opacity="0.9"/>

  <!-- Background quadrant shading on oscillator -->
  <rect x="370" y="198" width="170" height="62" fill="#26a69a" fill-opacity="0.05" rx="2"/>
  <rect x="520" y="198" width="80" height="62" fill="#42a5f5" fill-opacity="0.05" rx="2"/>
  <rect x="580" y="260" width="80" height="40" fill="#ef5350" fill-opacity="0.05" rx="2"/>
  <rect x="640" y="230" width="120" height="40" fill="#ff9800" fill-opacity="0.05" rx="2"/>

  <!-- Quadrant labels on oscillator -->
  <text x="455" y="215" text-anchor="middle" fill="#26a69a" font-size="8" opacity="0.6">Leading</text>
  <text x="560" y="215" text-anchor="middle" fill="#42a5f5" font-size="8" opacity="0.6">Weakening</text>
  <text x="620" y="290" text-anchor="middle" fill="#ef5350" font-size="8" opacity="0.6">Lagging</text>
  <text x="710" y="248" text-anchor="middle" fill="#ff9800" font-size="8" opacity="0.6">Improving</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="376" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="406" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="436" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="466" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="496" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="526" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="556" y="395" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="586" y="393" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="616" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="646" y="397" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="676" y="395" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="706" y="393" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="736" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#26a69a"/>
    <text x="30" y="24" fill="#999" font-size="9">Leading</text>
    <circle cx="110" cy="20" r="4" fill="#42a5f5"/>
    <text x="120" y="24" fill="#999" font-size="9">Weakening</text>
    <circle cx="220" cy="20" r="4" fill="#ef5350"/>
    <text x="230" y="24" fill="#999" font-size="9">Lagging</text>
    <circle cx="310" cy="20" r="4" fill="#ff9800"/>
    <text x="320" y="24" fill="#999" font-size="9">Improving</text>
    <rect x="420" y="12" width="20" height="16" rx="2" fill="#e0e0e0" opacity="0.2"/>
    <text x="446" y="24" fill="#999" font-size="9">Clockwise Rotation</text>
  </g>
</svg>