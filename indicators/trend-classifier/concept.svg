  <text x="45" y="374" fill="#666" font-size="8" text-anchor="end">0.5</text>

  <!-- Bullish probability line (green) -->
  <polyline fill="none" stroke="#26a69a" stroke-width="2" filter="url(#glow)" opacity="0.9"
    points="110,350 130,340 150,330 170,320 190,315 210,310 230,312 250,330 270,345 290,355 310,360 330,370 350,380 370,395 390,410 410,420 430,415 450,400 470,385 490,370 510,355 530,340 550,325 570,315 590,310 610,308 630,312 650,330 670,340 690,335 710,325"/>

  <!-- Bearish probability line (red) -->
