<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e0e0e0" font-family="Inter,sans-serif" font-size="18" font-weight="600">Zero Lag EMA</text>
  <text x="400" y="55" text-anchor="middle" fill="#666" font-family="Inter,sans-serif" font-size="11">tradegrub.finance</text>

  <rect x="60" y="70" width="700" height="370" fill="none" stroke="#333" stroke-width="0.5" rx="4"/>

  <!-- Candlesticks -->
  <line x1="100" y1="320" x2="100" y2="370" stroke="#26a69a" stroke-width="1"/><rect x="97" y="325" width="6" height="35" fill="#26a69a" rx="1"/>
  <line x1="140" y1="290" x2="140" y2="345" stroke="#26a69a" stroke-width="1"/><rect x="137" y="295" width="6" height="38" fill="#26a69a" rx="1"/>
  <line x1="180" y1="250" x2="180" y2="310" stroke="#26a69a" stroke-width="1"/><rect x="177" y="255" width="6" height="40" fill="#26a69a" rx="1"/>
  <line x1="220" y1="210" x2="220" y2="270" stroke="#26a69a" stroke-width="1"/><rect x="217" y="215" width="6" height="40" fill="#26a69a" rx="1"/>
  <line x1="260" y1="180" x2="260" y2="240" stroke="#26a69a" stroke-width="1"/><rect x="257" y="185" width="6" height="38" fill="#26a69a" rx="1"/>
  <line x1="300" y1="155" x2="300" y2="215" stroke="#26a69a" stroke-width="1"/><rect x="297" y="160" width="6" height="40" fill="#26a69a" rx="1"/>
  <line x1="340" y1="140" x2="340" y2="200" stroke="#ef5350" stroke-width="1"/><rect x="337" y="150" width="6" height="38" fill="#ef5350" rx="1"/>
  <line x1="380" y1="150" x2="380" y2="210" stroke="#ef5350" stroke-width="1"/><rect x="377" y="160" width="6" height="38" fill="#ef5350" rx="1"/>
  <line x1="420" y1="170" x2="420" y2="230" stroke="#ef5350" stroke-width="1"/><rect x="417" y="180" width="6" height="38" fill="#ef5350" rx="1"/>
  <line x1="460" y1="195" x2="460" y2="255" stroke="#ef5350" stroke-width="1"/><rect x="457" y="205" width="6" height="38" fill="#ef5350" rx="1"/>
  <line x1="500" y1="220" x2="500" y2="280" stroke="#26a69a" stroke-width="1"/><rect x="497" y="225" width="6" height="38" fill="#26a69a" rx="1"/>
  <line x1="540" y1="200" x2="540" y2="260" stroke="#26a69a" stroke-width="1"/><rect x="537" y="205" width="6" height="38" fill="#26a69a" rx="1"/>
  <line x1="580" y1="175" x2="580" y2="235" stroke="#26a69a" stroke-width="1"/><rect x="577" y="180" width="6" height="38" fill="#26a69a" rx="1"/>
  <line x1="620" y1="155" x2="620" y2="215" stroke="#26a69a" stroke-width="1"/><rect x="617" y="160" width="6" height="38" fill="#26a69a" rx="1"/>
  <line x1="660" y1="140" x2="660" y2="200" stroke="#26a69a" stroke-width="1"/><rect x="657" y="145" width="6" height="38" fill="#26a69a" rx="1"/>
  <line x1="700" y1="130" x2="700" y2="190" stroke="#26a69a" stroke-width="1"/><rect x="697" y="135" width="6" height="38" fill="#26a69a" rx="1"/>

  <!-- Standard EMA (faint white, more lag) -->
  <polyline points="100,350 140,325 180,290 220,255 260,225 300,200 340,180 380,178 420,190 460,210 500,235 540,230 580,215 620,195 660,178 700,165" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- ZLEMA (green, less lag) -->
  <polyline points="100,345 140,315 180,275 220,238 260,205 300,178 340,165 380,172 420,192 460,218 500,240 540,225 580,205 620,182 660,162 700,148" fill="none" stroke="#00e676" stroke-width="2.5"/>

  <!-- Cross up signal -->
  <polygon points="500,252 495,262 505,262" fill="#00e676"/>
  <text x="515" y="262" fill="#00e676" font-size="9" font-family="Inter,sans-serif">Cross Up</text>

  <!-- Cross down signal -->
  <polygon points="340,155 335,145 345,145" fill="#ff1744"/>
  <text x="355" y="148" fill="#ff1744" font-size="9" font-family="Inter,sans-serif">Cross Down</text>

  <!-- Lag difference annotation -->
  <line x1="260" y1="205" x2="260" y2="225" stroke="rgba(0,230,118,0.5)" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="230" y="218" text-anchor="end" fill="rgba(0,230,118,0.5)" font-size="9" font-family="Inter,sans-serif">Lag reduced</text>

  <!-- Legend -->
  <rect x="60" y="460" width="700" height="30" fill="rgba(255,255,255,0.03)" rx="4"/>
  <line x1="80" y1="475" x2="115" y2="475" stroke="#00e676" stroke-width="2.5"/>
  <text x="120" y="479" fill="#aaa" font-size="11" font-family="Inter,sans-serif">ZLEMA</text>
  <line x1="200" y1="475" x2="235" y2="475" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="240" y="479" fill="#aaa" font-size="11" font-family="Inter,sans-serif">Standard EMA</text>
  <polygon points="345,471 340,479 350,479" fill="#00e676"/>
  <text x="355" y="479" fill="#aaa" font-size="11" font-family="Inter,sans-serif">Cross Up</text>
  <polygon points="445,479 440,471 450,471" fill="#ff1744"/>
  <text x="455" y="479" fill="#aaa" font-size="11" font-family="Inter,sans-serif">Cross Down</text>
</svg>
