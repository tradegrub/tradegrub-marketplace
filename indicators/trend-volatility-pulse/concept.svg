  <line x1="302" y1="195" x2="302" y2="165" stroke="#888" stroke-width="1"/>
  <rect x="297" y="170" width="10" height="18" fill="#ff1744" rx="1"/>
  <line x1="324" y1="185" x2="324" y2="155" stroke="#888" stroke-width="1"/>
  <rect x="319" y="160" width="10" height="15" fill="#00c853" rx="1"/>
  <line x1="346" y1="190" x2="346" y2="160" stroke="#888" stroke-width="1"/>
  <rect x="341" y="168" width="10" height="14" fill="#ff1744" rx="1"/>
  <line x1="368" y1="182" x2="368" y2="152" stroke="#888" stroke-width="1"/>
  <rect x="363" y="158" width="10" height="16" fill="#00c853" rx="1"/>
  <line x1="390" y1="188" x2="390" y2="158" stroke="#888" stroke-width="1"/>
  <rect x="385" y="165" width="10" height="15" fill="#ff1744" rx="1"/>
  <line x1="412" y1="180" x2="412" y2="150" stroke="#888" stroke-width="1"/>
  <rect x="407" y="156" width="10" height="16" fill="#00c853" rx="1"/>
  <line x1="434" y1="186" x2="434" y2="156" stroke="#888" stroke-width="1"/>
  <rect x="429" y="162" width="10" height="16" fill="#ff1744" rx="1"/>
