<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="380"/><line x1="200" y1="60" x2="200" y2="380"/>
    <line x1="320" y1="60" x2="320" y2="380"/><line x1="440" y1="60" x2="440" y2="380"/>
    <line x1="560" y1="60" x2="560" y2="380"/><line x1="680" y1="60" x2="680" y2="380"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Complete Trade Planner</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Candlesticks: 28 candles - sideways, then up from entry, hit take profit zone -->
  <!-- Pre-entry sideways (candles 1-8) -->
  <line x1="85" y1="255" x2="85" y2="290" stroke="#ef5350" stroke-width="1"/>
  <rect x="81" y="262" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="110" y1="260" x2="110" y2="295" stroke="#26a69a" stroke-width="1"/>
  <rect x="106" y="270" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="135" y1="252" x2="135" y2="288" stroke="#ef5350" stroke-width="1"/>
  <rect x="131" y="258" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="160" y1="262" x2="160" y2="298" stroke="#26a69a" stroke-width="1"/>
  <rect x="156" y="275" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="185" y1="255" x2="185" y2="292" stroke="#26a69a" stroke-width="1"/>
  <rect x="181" y="265" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="210" y1="248" x2="210" y2="285" stroke="#26a69a" stroke-width="1"/>
  <rect x="206" y="255" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="235" y1="242" x2="235" y2="278" stroke="#26a69a" stroke-width="1"/>
  <rect x="231" y="248" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="260" y1="238" x2="260" y2="272" stroke="#26a69a" stroke-width="1"/>
  <rect x="256" y="245" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- Entry point at candle 9, x=285 -->
  <line x1="285" y1="232" x2="285" y2="268" stroke="#26a69a" stroke-width="1"/>
  <rect x="281" y="238" width="8" height="20" fill="#26a69a" rx="1"/>

  <!-- Uptrend after entry (candles 10-20) -->
  <line x1="310" y1="222" x2="310" y2="258" stroke="#26a69a" stroke-width="1"/>
  <rect x="306" y="228" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="335" y1="210" x2="335" y2="248" stroke="#26a69a" stroke-width="1"/>
  <rect x="331" y="218" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="360" y1="198" x2="360" y2="235" stroke="#26a69a" stroke-width="1"/>
  <rect x="356" y="205" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="385" y1="188" x2="385" y2="225" stroke="#26a69a" stroke-width="1"/>
  <rect x="381" y="195" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="410" y1="178" x2="410" y2="215" stroke="#26a69a" stroke-width="1"/>
  <rect x="406" y="185" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="435" y1="165" x2="435" y2="202" stroke="#ef5350" stroke-width="1"/>
  <rect x="431" y="170" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="460" y1="155" x2="460" y2="192" stroke="#26a69a" stroke-width="1"/>
  <rect x="456" y="162" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="485" y1="142" x2="485" y2="178" stroke="#26a69a" stroke-width="1"/>
  <rect x="481" y="148" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="510" y1="130" x2="510" y2="168" stroke="#26a69a" stroke-width="1"/>
  <rect x="506" y="138" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="535" y1="120" x2="535" y2="155" stroke="#26a69a" stroke-width="1"/>
  <rect x="531" y="128" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="560" y1="112" x2="560" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="556" y="118" width="8" height="20" fill="#26a69a" rx="1"/>

  <!-- Near take profit, pullback (candles 21-28) -->
  <line x1="585" y1="105" x2="585" y2="140" stroke="#26a69a" stroke-width="1"/>
  <rect x="581" y="112" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="610" y1="100" x2="610" y2="135" stroke="#ef5350" stroke-width="1"/>
  <rect x="606" y="105" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="635" y1="108" x2="635" y2="142" stroke="#ef5350" stroke-width="1"/>
  <rect x="631" y="112" width="8" height="20" fill="#ef5350" rx="1"/>
  <line x1="660" y1="115" x2="660" y2="148" stroke="#26a69a" stroke-width="1"/>
  <rect x="656" y="122" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="685" y1="108" x2="685" y2="142" stroke="#26a69a" stroke-width="1"/>
  <rect x="681" y="115" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="710" y1="102" x2="710" y2="138" stroke="#26a69a" stroke-width="1"/>
  <rect x="706" y="108" width="8" height="20" fill="#26a69a" rx="1"/>
  <line x1="735" y1="98" x2="735" y2="132" stroke="#26a69a" stroke-width="1"/>
  <rect x="731" y="105" width="8" height="18" fill="#26a69a" rx="1"/>

  <!-- Entry Price line (blue dashed) at y=245 -->
  <line x1="280" y1="245" x2="750" y2="245" stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="752" y="248" fill="#42a5f5" font-size="8">Entry</text>

  <!-- Stop Loss line (red) at y=310 -->
  <line x1="280" y1="310" x2="750" y2="310" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="752" y="313" fill="#ef5350" font-size="8">Stop</text>

  <!-- Take Profit line (green) at y=95 -->
  <line x1="280" y1="95" x2="750" y2="95" stroke="#00e676" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="752" y="98" fill="#00e676" font-size="8">TP</text>

  <!-- Trailing Stop (orange stepped line) - follows price up -->
  <path d="M285,300 L335,300 L335,280 L385,280 L385,260 L435,260 L435,240 L485,240 L485,215 L535,215 L535,195 L585,195 L585,175 L635,175 L635,168 L735,168" fill="none" stroke="#ff9800" stroke-width="2"/>

  <!-- Shaded zones -->
  <rect x="280" y="245" width="470" height="65" fill="#ef5350" fill-opacity="0.04" rx="2"/>
  <rect x="280" y="95" width="470" height="150" fill="#00e676" fill-opacity="0.03" rx="2"/>

  <!-- BUY signal at entry -->
  <circle cx="285" cy="245" r="8" fill="none" stroke="#00e676" stroke-width="2" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="283,232 293,232 288,219" fill="#00e676"/>
  </g>
  <rect x="238" y="215" width="50" height="18" rx="4" fill="#00e676" fill-opacity="0.15" stroke="#00e676" stroke-width="1" stroke-opacity="0.4"/>
  <text x="263" y="228" text-anchor="middle" fill="#00e676" font-size="10" font-weight="600">BUY</text>

  <!-- EXIT signal at take profit (potential) -->
  <circle cx="610" cy="95" r="8" fill="none" stroke="#ef5350" stroke-width="2" filter="url(#glow)"/>
  <g filter="url(#softGlow)">
    <polygon points="608,78 618,78 613,65" fill="#ef5350"/>
  </g>
  <rect x="620" y="68" width="50" height="18" rx="4" fill="#ef5350" fill-opacity="0.15" stroke="#ef5350" stroke-width="1" stroke-opacity="0.4"/>
  <text x="645" y="81" text-anchor="middle" fill="#ef5350" font-size="10" font-weight="600">EXIT</text>

  <!-- EXIT signal at stop loss (potential, dimmer) -->
  <circle cx="285" cy="310" r="6" fill="none" stroke="#ef5350" stroke-width="1.5" opacity="0.5"/>
  <text x="295" y="325" fill="#ef5350" font-size="8" opacity="0.5">EXIT (stop)</text>

  <!-- Volume bars -->
  <g opacity="0.4">
    <rect x="81" y="400" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="106" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="131" y="398" width="8" height="17" fill="#ef5350" rx="1"/>
    <rect x="156" y="404" width="8" height="11" fill="#26a69a" rx="1"/>
    <rect x="181" y="401" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="206" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="231" y="396" width="8" height="19" fill="#26a69a" rx="1"/>
    <rect x="256" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="281" y="390" width="8" height="25" fill="#26a69a" rx="1"/>
    <rect x="306" y="392" width="8" height="23" fill="#26a69a" rx="1"/>
    <rect x="331" y="394" width="8" height="21" fill="#26a69a" rx="1"/>
    <rect x="356" y="396" width="8" height="19" fill="#26a69a" rx="1"/>
    <rect x="381" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="406" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="431" y="402" width="8" height="13" fill="#ef5350" rx="1"/>
    <rect x="456" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="481" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="506" y="396" width="8" height="19" fill="#26a69a" rx="1"/>
    <rect x="531" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="556" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="581" y="402" width="8" height="13" fill="#26a69a" rx="1"/>
    <rect x="606" y="394" width="8" height="21" fill="#ef5350" rx="1"/>
    <rect x="631" y="396" width="8" height="19" fill="#ef5350" rx="1"/>
    <rect x="656" y="400" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="681" y="398" width="8" height="17" fill="#26a69a" rx="1"/>
    <rect x="706" y="396" width="8" height="19" fill="#26a69a" rx="1"/>
    <rect x="731" y="394" width="8" height="21" fill="#26a69a" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">Entry Price</text>
    <circle cx="120" cy="20" r="4" fill="#ef5350"/>
    <text x="130" y="24" fill="#999" font-size="9">Stop Loss</text>
    <circle cx="210" cy="20" r="4" fill="#00e676"/>
    <text x="220" y="24" fill="#999" font-size="9">Take Profit</text>
    <circle cx="320" cy="20" r="4" fill="#ff9800"/>
    <text x="330" y="24" fill="#999" font-size="9">Trailing Stop</text>
  </g>
</svg>