<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="60" y1="60" x2="60" y2="420"/><line x1="130" y1="60" x2="130" y2="420"/>
    <line x1="200" y1="60" x2="200" y2="420"/><line x1="270" y1="60" x2="270" y2="420"/>
    <line x1="340" y1="60" x2="340" y2="420"/><line x1="410" y1="60" x2="410" y2="420"/>
    <line x1="480" y1="60" x2="480" y2="420"/><line x1="550" y1="60" x2="550" y2="420"/>
    <line x1="620" y1="60" x2="620" y2="420"/><line x1="690" y1="60" x2="690" y2="420"/>
    <line x1="760" y1="60" x2="760" y2="420"/>
    <line x1="60" y1="60" x2="760" y2="60"/><line x1="60" y1="120" x2="760" y2="120"/>
    <line x1="60" y1="180" x2="760" y2="180"/><line x1="60" y1="240" x2="760" y2="240"/>
    <line x1="60" y1="300" x2="760" y2="300"/><line x1="60" y1="360" x2="760" y2="360"/>
    <line x1="60" y1="420" x2="760" y2="420"/>
  </g>
  <!-- Title -->
  <text x="60" y="30" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" font-weight="bold">Range Filter</text>
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="11" fill="#888888">tradegrub.finance</text>
  <!-- Candlesticks - mixed green/red with realistic movement -->
  <g stroke-width="1">
    <!-- Uptrend candles (green) -->
    <line x1="85" y1="295" x2="85" y2="330" stroke="#00cc66"/><rect x="81" y="305" width="8" height="18" fill="#00cc66"/>
    <line x1="108" y1="288" x2="108" y2="320" stroke="#00cc66"/><rect x="104" y="295" width="8" height="16" fill="#00cc66"/>
    <line x1="131" y1="275" x2="131" y2="310" stroke="#ff4444"/><rect x="127" y="280" width="8" height="20" fill="#ff4444"/>
    <line x1="154" y1="270" x2="154" y2="305" stroke="#00cc66"/><rect x="150" y="278" width="8" height="18" fill="#00cc66"/>
    <line x1="177" y1="258" x2="177" y2="290" stroke="#00cc66"/><rect x="173" y="265" width="8" height="16" fill="#00cc66"/>
    <line x1="200" y1="250" x2="200" y2="280" stroke="#00cc66"/><rect x="196" y="255" width="8" height="18" fill="#00cc66"/>
    <line x1="223" y1="242" x2="223" y2="272" stroke="#ff4444"/><rect x="219" y="248" width="8" height="16" fill="#ff4444"/>
    <line x1="246" y1="235" x2="246" y2="268" stroke="#00cc66"/><rect x="242" y="242" width="8" height="18" fill="#00cc66"/>
    <line x1="269" y1="225" x2="269" y2="258" stroke="#00cc66"/><rect x="265" y="230" width="8" height="20" fill="#00cc66"/>
    <line x1="292" y1="218" x2="292" y2="248" stroke="#00cc66"/><rect x="288" y="222" width="8" height="18" fill="#00cc66"/>
    <!-- Transition area - trend reversal -->
    <line x1="315" y1="215" x2="315" y2="250" stroke="#ff4444"/><rect x="311" y="220" width="8" height="22" fill="#ff4444"/>
    <line x1="338" y1="225" x2="338" y2="258" stroke="#ff4444"/><rect x="334" y="232" width="8" height="18" fill="#ff4444"/>
    <line x1="361" y1="238" x2="361" y2="270" stroke="#ff4444"/><rect x="357" y="245" width="8" height="18" fill="#ff4444"/>
    <!-- Downtrend candles (red) -->
    <line x1="384" y1="250" x2="384" y2="285" stroke="#ff4444"/><rect x="380" y="258" width="8" height="20" fill="#ff4444"/>
    <line x1="407" y1="262" x2="407" y2="298" stroke="#ff4444"/><rect x="403" y="270" width="8" height="20" fill="#ff4444"/>
    <line x1="430" y1="278" x2="430" y2="312" stroke="#00cc66"/><rect x="426" y="285" width="8" height="16" fill="#00cc66"/>
    <line x1="453" y1="288" x2="453" y2="322" stroke="#ff4444"/><rect x="449" y="295" width="8" height="20" fill="#ff4444"/>
    <line x1="476" y1="300" x2="476" y2="338" stroke="#ff4444"/><rect x="472" y="308" width="8" height="22" fill="#ff4444"/>
    <line x1="499" y1="312" x2="499" y2="348" stroke="#ff4444"/><rect x="495" y="320" width="8" height="20" fill="#ff4444"/>
    <!-- Another reversal back up -->
    <line x1="522" y1="315" x2="522" y2="350" stroke="#00cc66"/><rect x="518" y="322" width="8" height="18" fill="#00cc66"/>
    <line x1="545" y1="305" x2="545" y2="340" stroke="#00cc66"/><rect x="541" y="310" width="8" height="20" fill="#00cc66"/>
    <line x1="568" y1="292" x2="568" y2="325" stroke="#00cc66"/><rect x="564" y="298" width="8" height="18" fill="#00cc66"/>
    <line x1="591" y1="278" x2="591" y2="310" stroke="#00cc66"/><rect x="587" y="282" width="8" height="20" fill="#00cc66"/>
    <line x1="614" y1="265" x2="614" y2="298" stroke="#ff4444"/><rect x="610" y="272" width="8" height="18" fill="#ff4444"/>
    <line x1="637" y1="255" x2="637" y2="285" stroke="#00cc66"/><rect x="633" y="260" width="8" height="18" fill="#00cc66"/>
    <line x1="660" y1="242" x2="660" y2="275" stroke="#00cc66"/><rect x="656" y="248" width="8" height="18" fill="#00cc66"/>
    <line x1="683" y1="230" x2="683" y2="262" stroke="#00cc66"/><rect x="679" y="235" width="8" height="18" fill="#00cc66"/>
    <line x1="706" y1="220" x2="706" y2="252" stroke="#00cc66"/><rect x="702" y="225" width="8" height="18" fill="#00cc66"/>
    <line x1="729" y1="210" x2="729" y2="242" stroke="#00cc66"/><rect x="725" y="215" width="8" height="18" fill="#00cc66"/>
    <line x1="752" y1="200" x2="752" y2="235" stroke="#00cc66"/><rect x="748" y="208" width="8" height="18" fill="#00cc66"/>
  </g>
  <!-- Range band (semi-transparent) - uptrend segment -->
  <polygon points="85,290 292,195 292,255 85,350" fill="#00cc66" fill-opacity="0.06"/>
  <!-- Range band - downtrend segment -->
  <polygon points="315,195 499,295 499,355 315,255" fill="#ff4444" fill-opacity="0.06"/>
  <!-- Range band - uptrend segment 2 -->
  <polygon points="522,300 752,178 752,238 522,360" fill="#00cc66" fill-opacity="0.06"/>
  <!-- Stepped Range Filter line - Uptrend (green) -->
  <polyline fill="none" stroke="#00cc66" stroke-width="2.5" filter="url(#glow)"
    points="85,320 130,320 131,300 200,300 201,270 269,270 270,248 292,248"/>
  <!-- Stepped line - transition -->
  <polyline fill="none" stroke="#ff4444" stroke-width="2.5" filter="url(#glow)"
    points="292,248 315,248 316,265 361,265 362,285 407,285 408,305 476,305 477,330 499,330"/>
  <!-- Stepped line - uptrend again (green) -->
  <polyline fill="none" stroke="#00cc66" stroke-width="2.5" filter="url(#glow)"
    points="499,330 522,330 523,312 568,312 569,290 614,290 615,270 660,270 661,250 706,250 707,230 752,230"/>
  <!-- Trend change markers -->
  <circle cx="315" cy="248" r="5" fill="none" stroke="#ff4444" stroke-width="1.5" filter="url(#glow)"/>
  <text x="315" y="200" font-family="Arial, sans-serif" font-size="9" fill="#ff4444" text-anchor="middle" opacity="0.8">Sell</text>
  <circle cx="522" cy="330" r="5" fill="none" stroke="#00cc66" stroke-width="1.5" filter="url(#glow)"/>
  <text x="522" y="365" font-family="Arial, sans-serif" font-size="9" fill="#00cc66" text-anchor="middle" opacity="0.8">Buy</text>
  <!-- Legend bar -->
  <g transform="translate(0,455)">
    <rect x="55" y="-5" width="700" height="30" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <line x1="80" y1="10" x2="110" y2="10" stroke="#00cc66" stroke-width="3"/>
    <text x="115" y="14" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">Range Filter</text>
    <rect x="250" y="2" width="30" height="16" rx="2" fill="#00cc66" fill-opacity="0.12" stroke="#00cc66" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="285" y="14" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">Range Band</text>
    <rect x="400" y="6" width="8" height="8" fill="#00cc66"/><text x="414" y="14" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">Up Candle</text>
    <rect x="510" y="6" width="8" height="8" fill="#ff4444"/><text x="524" y="14" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">Down Candle</text>
  </g>
</svg>