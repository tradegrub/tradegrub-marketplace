<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="8"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="80" y1="60" x2="80" y2="420"/><line x1="200" y1="60" x2="200" y2="420"/>
    <line x1="320" y1="60" x2="320" y2="420"/><line x1="440" y1="60" x2="440" y2="420"/>
    <line x1="560" y1="60" x2="560" y2="420"/><line x1="680" y1="60" x2="680" y2="420"/>
    <line x1="60" y1="100" x2="760" y2="100"/><line x1="60" y1="180" x2="760" y2="180"/>
    <line x1="60" y1="260" x2="760" y2="260"/><line x1="60" y1="340" x2="760" y2="340"/>
  </g>

  <text x="400" y="30" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="600">Price-Volume Correlation</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-size="11">tradegrub.finance</text>

  <!-- Price candles top 55% (y=65 to y=245) - uptrend with divergence -->
  <line x1="100" y1="220" x2="100" y2="240" stroke="#26a69a" stroke-width="1"/><rect x="96" y="222" width="8" height="12" fill="#26a69a" rx="1"/>
  <line x1="130" y1="205" x2="130" y2="232" stroke="#26a69a" stroke-width="1"/><rect x="126" y="210" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="160" y1="195" x2="160" y2="222" stroke="#26a69a" stroke-width="1"/><rect x="156" y="198" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="190" y1="182" x2="190" y2="210" stroke="#26a69a" stroke-width="1"/><rect x="186" y="185" width="8" height="18" fill="#26a69a" rx="1"/>
  <line x1="220" y1="170" x2="220" y2="198" stroke="#26a69a" stroke-width="1"/><rect x="216" y="174" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="250" y1="158" x2="250" y2="185" stroke="#26a69a" stroke-width="1"/><rect x="246" y="162" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="280" y1="148" x2="280" y2="172" stroke="#26a69a" stroke-width="1"/><rect x="276" y="150" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="310" y1="140" x2="310" y2="165" stroke="#26a69a" stroke-width="1"/><rect x="306" y="142" width="8" height="16" fill="#26a69a" rx="1"/>
  <!-- Price still rising but volume diverging -->
  <line x1="340" y1="130" x2="340" y2="158" stroke="#26a69a" stroke-width="1"/><rect x="336" y="133" width="8" height="17" fill="#26a69a" rx="1"/>
  <line x1="370" y1="122" x2="370" y2="148" stroke="#26a69a" stroke-width="1"/><rect x="366" y="125" width="8" height="15" fill="#26a69a" rx="1"/>
  <line x1="400" y1="115" x2="400" y2="142" stroke="#26a69a" stroke-width="1"/><rect x="396" y="118" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="430" y1="108" x2="430" y2="135" stroke="#26a69a" stroke-width="1"/><rect x="426" y="112" width="8" height="14" fill="#26a69a" rx="1"/>
  <line x1="460" y1="100" x2="460" y2="128" stroke="#26a69a" stroke-width="1"/><rect x="456" y="104" width="8" height="15" fill="#26a69a" rx="1"/>
  <!-- Reversal -->
  <line x1="490" y1="105" x2="490" y2="135" stroke="#ef5350" stroke-width="1"/><rect x="486" y="108" width="8" height="18" fill="#ef5350" rx="1"/>
  <line x1="520" y1="115" x2="520" y2="148" stroke="#ef5350" stroke-width="1"/><rect x="516" y="118" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="550" y1="130" x2="550" y2="168" stroke="#ef5350" stroke-width="1"/><rect x="546" y="135" width="8" height="25" fill="#ef5350" rx="1"/>
  <line x1="580" y1="148" x2="580" y2="185" stroke="#ef5350" stroke-width="1"/><rect x="576" y="152" width="8" height="24" fill="#ef5350" rx="1"/>
  <line x1="610" y1="160" x2="610" y2="195" stroke="#26a69a" stroke-width="1"/><rect x="606" y="170" width="8" height="16" fill="#26a69a" rx="1"/>
  <line x1="640" y1="155" x2="640" y2="188" stroke="#ef5350" stroke-width="1"/><rect x="636" y="158" width="8" height="22" fill="#ef5350" rx="1"/>
  <line x1="670" y1="168" x2="670" y2="205" stroke="#ef5350" stroke-width="1"/><rect x="666" y="172" width="8" height="25" fill="#ef5350" rx="1"/>

  <!-- Uptrend annotation -->
  <line x1="95" y1="225" x2="460" y2="100" stroke="#26a69a" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="260" y="140" fill="#26a69a" font-size="9" transform="rotate(-12, 260, 140)">Price uptrend</text>

  <!-- Separator -->
  <line x1="60" y1="260" x2="760" y2="260" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <text x="65" y="275" fill="#666" font-size="9">Correlation</text>

  <!-- Correlation oscillator (y=275 to y=420) -->
  <!-- +1.0 at y=275, 0 at y=347, -1.0 at y=420 -->
  <!-- +0.7 threshold -->
  <line x1="80" y1="296" x2="740" y2="296" stroke="#26a69a" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="745" y="300" fill="#26a69a" font-size="8">+0.7</text>
  <!-- Zero line -->
  <line x1="80" y1="347" x2="740" y2="347" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <text x="745" y="351" fill="#666" font-size="8">0.0</text>
  <!-- -0.7 threshold -->
  <line x1="80" y1="398" x2="740" y2="398" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <text x="745" y="402" fill="#ef5350" font-size="8">-0.7</text>

  <!-- Positive correlation zone shading -->
  <rect x="85" y="270" width="300" height="30" fill="#26a69a" fill-opacity="0.06" rx="2"/>

  <!-- Negative correlation zone shading -->
  <rect x="460" y="390" width="220" height="30" fill="#ef5350" fill-opacity="0.06" rx="2"/>

  <!-- Correlation line (raw) -->
  <polyline fill="none" stroke="#42a5f5" stroke-width="2" opacity="0.9"
    points="100,285 130,282 160,288 190,284 220,280 250,283 280,286 310,290 340,310 370,325 400,338 430,352 460,370 490,385 520,398 550,405 580,402 610,395 640,400 670,408"/>

  <!-- Signal line (smoothed) -->
  <polyline fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"
    points="100,286 130,284 160,285 190,285 220,283 250,283 280,285 310,290 340,302 370,318 400,335 430,348 460,365 490,380 520,395 550,402 580,400 610,398 640,400 670,405"/>

  <!-- Divergence annotation -->
  <rect x="350" y="265" width="130" height="20" rx="4" fill="#ff9800" fill-opacity="0.12" stroke="#ff9800" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="415" y="279" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="500">Volume Divergence</text>
  <line x1="415" y1="285" x2="415" y2="320" stroke="#ff9800" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>

  <!-- Confirmed uptrend annotation -->
  <rect x="110" y="268" width="115" height="18" rx="4" fill="#26a69a" fill-opacity="0.12"/>
  <text x="167" y="281" text-anchor="middle" fill="#26a69a" font-size="9" font-weight="500">Confirmed Uptrend</text>

  <!-- Confirmed selling annotation -->
  <rect x="490" y="375" width="105" height="18" rx="4" fill="#ef5350" fill-opacity="0.12"/>
  <text x="542" y="388" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="500">Confirmed Selling</text>

  <!-- Volume bars (declining during price rise = divergence) -->
  <g opacity="0.5">
    <rect x="96" y="425" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="126" y="422" width="8" height="18" fill="#26a69a" rx="1"/>
    <rect x="156" y="420" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="186" y="418" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="216" y="416" width="8" height="24" fill="#26a69a" rx="1"/>
    <rect x="246" y="418" width="8" height="22" fill="#26a69a" rx="1"/>
    <rect x="276" y="420" width="8" height="20" fill="#26a69a" rx="1"/>
    <rect x="306" y="422" width="8" height="18" fill="#26a69a" rx="1"/>
    <!-- Volume declining while price still rising -->
    <rect x="336" y="426" width="8" height="14" fill="#26a69a" rx="1"/>
    <rect x="366" y="428" width="8" height="12" fill="#26a69a" rx="1"/>
    <rect x="396" y="430" width="8" height="10" fill="#26a69a" rx="1"/>
    <rect x="426" y="432" width="8" height="8" fill="#26a69a" rx="1"/>
    <rect x="456" y="434" width="8" height="6" fill="#26a69a" rx="1"/>
    <!-- Selling volume increases -->
    <rect x="486" y="425" width="8" height="15" fill="#ef5350" rx="1"/>
    <rect x="516" y="420" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="546" y="415" width="8" height="25" fill="#ef5350" rx="1"/>
    <rect x="576" y="418" width="8" height="22" fill="#ef5350" rx="1"/>
    <rect x="606" y="425" width="8" height="15" fill="#26a69a" rx="1"/>
    <rect x="636" y="420" width="8" height="20" fill="#ef5350" rx="1"/>
    <rect x="666" y="418" width="8" height="22" fill="#ef5350" rx="1"/>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 445)">
    <rect width="680" height="40" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <circle cx="20" cy="20" r="4" fill="#42a5f5"/>
    <text x="30" y="24" fill="#999" font-size="9">Correlation</text>
    <circle cx="120" cy="20" r="4" fill="#ff9800"/>
    <text x="130" y="24" fill="#999" font-size="9">Signal (SMA)</text>
    <rect x="210" y="12" width="20" height="16" fill="#26a69a" opacity="0.4" rx="2"/>
    <text x="235" y="24" fill="#999" font-size="9">High Corr Zone</text>
    <rect x="340" y="12" width="20" height="16" fill="#ef5350" opacity="0.4" rx="2"/>
    <text x="365" y="24" fill="#999" font-size="9">Low Corr Zone</text>
    <circle cx="480" cy="20" r="4" fill="#ff9800"/>
    <text x="490" y="24" fill="#999" font-size="9">Divergence</text>
  </g>
</svg>